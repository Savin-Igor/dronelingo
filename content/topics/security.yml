title:
  lv: Drošība
  en: Security
  ru: Безопасность
summary:
  lv: >
    Kiberdrošība, fiziskā drošība, atgadījumu ziņošana 72 stundu laikā un
    saskarsme ar pilotētajiem gaisa kuģiem.
  en: >
    Cyber security, physical security, occurrence reporting within 72
    hours, and interaction with manned aircraft.
  ru: >
    Кибербезопасность, физическая защита, уведомления о происшествиях в
    течение 72 часов и взаимодействие с пилотируемой авиацией.
