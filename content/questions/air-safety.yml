- id: as-001
  stem:
    lv: Ko nozīmē "tieša redzamība" (VLOS) Atvērtajā kategorijā?
    en: What does "visual line of sight" (VLOS) mean in the Open category?
    ru: Что означает «прямая видимость» (VLOS) в Открытой категории?
  options:
    - id: a
      text:
        lv: Pilots redz gaisa kuģi bez palīglīdzekļiem (briles atļautas).
        en: The pilot sees the aircraft unaided (corrective glasses are allowed).
        ru: Пилот видит аппарат без вспомогательных средств (очки для коррекции допустимы).
    - id: b
      text:
        lv: Pilots seko gaisa kuģim caur FPV brillēm.
        en: The pilot follows the aircraft through FPV goggles.
        ru: Пилот следит за аппаратом через FPV-очки.
    - id: c
      text:
        lv: Pilots zina UAS atrašanās vietu pēc telefona kartes.
        en: The pilot knows the UAS position from a phone map.
        ru: Пилот знает местоположение по карте на телефоне.
    - id: d
      text:
        lv: Pilots seko dronam caur augstas izšķirtspējas ekrānu uz pults.
        en: The pilot watches the drone through a high-resolution screen on the controller.
        ru: Пилот следит за дроном через экран высокого разрешения на пульте.
  correctOptionId: a
  explanation:
    lv: |
      VLOS prasa, lai pilots redzētu gaisa kuģi neapbruņotu aci un spētu noteikt tā stāvokli un kustības virzienu. Briles atļautas, binokļi un ekrāni — nē.
    en: |
      VLOS requires the pilot to see the aircraft with the unaided eye and to determine its attitude and direction of travel. Corrective glasses are allowed; binoculars and screens are not.
    ru: |
      VLOS требует, чтобы пилот видел аппарат невооружённым глазом и мог определить его положение и направление движения. Очки для коррекции допустимы, бинокли и экраны — нет.
  distractorRationales:
    b:
      lv: FPV brilles aizvieto skatu uz gaisa kuģi ar kameras attēlu — tas ir atsevišķs darba režīms, ne VLOS.
      en: FPV goggles replace the view of the aircraft with a camera feed — that is a separate operating mode, not VLOS.
      ru: FPV-очки заменяют вид аппарата на изображение с камеры — это отдельный режим, а не VLOS.
    c:
      lv: Atrašanās vietas zināšana kartē nav tas pats, kas redzēt stāvokli un kustības virzienu gaisā.
      en: Knowing the position on a map is not the same as seeing attitude and direction in the air.
      ru: Знание положения по карте — не то же, что видеть ориентацию и направление движения в воздухе.
    d:
      lv: Ekrāns uz pults rāda kameras attēlu — tas ir FPV ekvivalents, kas pārkāpj "neapbruņotas acs" prasību.
      en: A screen on the controller shows a camera feed — that is FPV-equivalent and breaks the "unaided eye" requirement.
      ru: Экран на пульте показывает изображение с камеры — это эквивалент FPV, нарушающий требование «невооружённого глаза».
  sourceRef: "Reg (EU) 2019/947 Art. UAS.OPEN.060(3) | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 Art. UAS.OPEN.060(3)
- id: as-002
  stem:
    lv: Kāpēc FPV lidojumiem Atvērtajā kategorijā nepieciešams novērotājs?
    en: Why must FPV flights in the Open category have an observer?
    ru: Зачем FPV-полёт в Открытой категории требует наблюдателя?
  options:
    - id: a
      text:
        lv: Lai nestu rezerves baterijas.
        en: To carry spare batteries.
        ru: Чтобы носить запасные аккумуляторы.
    - id: b
      text:
        lv: Lai uzturētu situācijas apzināšanos par gaisa telpu ap UAS.
        en: To maintain situational awareness of the airspace around the UAS.
        ru: Чтобы поддерживать ситуационную осведомлённость о воздушной обстановке вокруг UAS.
    - id: c
      text:
        lv: Lai vēlāk atskaņotu video ierakstu.
        en: To replay the video later.
        ru: Чтобы позже воспроизводить видеозапись.
    - id: d
      text:
        lv: Lai apmainītu pulti, ja pilota aprīkojums sabojājas.
        en: To swap the controller if the pilot's hardware fails.
        ru: Чтобы передать пульт, если у пилота откажет оборудование.
  correctOptionId: b
  explanation:
    lv: |
      Pilots, kurš skatās FPV brillēs, neredz apkārtējo gaisa telpu. Novērotājs stāv blakus pilotam un seko gaisa telpai, lai nodrošinātu separāciju no citiem gaisa kuģiem un šķēršļiem.
    en: |
      A pilot wearing FPV goggles cannot see the surrounding airspace. The observer stands next to the pilot and watches the airspace to ensure separation from other aircraft and obstacles.
    ru: |
      Пилот в FPV-очках не видит окружающее воздушное пространство. Наблюдатель стоит рядом и следит за воздушной обстановкой, обеспечивая разделение от других участников и препятствий.
  distractorRationales:
    a:
      lv: Novērotāja loma ir operatīva, ne loģistiska. Aprīkojuma pārvietošana nav saistīta ar VLOS uzturēšanu.
      en: The observer's role is operational, not logistical. Carrying gear is unrelated to maintaining VLOS.
      ru: Роль наблюдателя — рабочая, а не логистическая. Перенос снаряжения не связан с поддержанием VLOS.
    c:
      lv: Video atskaņošana ir post-flight darbība. Novērotāja prasība attiecas uz lidojuma laiku, ne uz vēlāku materiāla pārskatīšanu.
      en: Video replay is a post-flight activity. The observer requirement applies during the flight, not to later footage review.
      ru: Воспроизведение видео — действие после полёта. Наблюдатель нужен во время полёта, а не для пересмотра материала.
    d:
      lv: Aparatūras dublēšana nav novērotāja loma. Otra pilota loma — atsevišķs jautājums, ko Atvērtā kategorija neparedz.
      en: Hardware redundancy is not the observer's role. A second pilot is a separate matter not envisioned in the Open category.
      ru: Резервирование оборудования — не задача наблюдателя. Второй пилот — отдельный вопрос, не предусмотренный в Открытой категории.
  sourceRef: "Reg (EU) 2019/947 Art. UAS.OPEN.060(2)(a) | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 1
  cognitiveLevel: apply
  scenarioType: regulatory
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 Art. UAS.OPEN.060(2)(a)
- id: as-003
  stem:
    lv: Kāds ir lidojuma maksimālais augstums Atvērtajā kategorijā virs apkārtējās zemes?
    en: What is the maximum flight altitude in the Open category above ground?
    ru: Какова максимальная высота полёта в Открытой категории над землёй?
  options:
    - id: a
      text:
        lv: 50 m.
        en: 50 m.
        ru: 50 м.
    - id: b
      text:
        lv: 300 m.
        en: 300 m.
        ru: 300 м.
    - id: c
      text:
        lv: 120 m.
        en: 120 m.
        ru: 120 м.
    - id: d
      text:
        lv: Tik augstu, cik ražotāja ģeofence atļauj.
        en: Whatever the manufacturer's geofence allows.
        ru: Сколько разрешает ограничитель производителя (geofence).
  correctOptionId: c
  explanation:
    lv: |
      Atvērtās kategorijas robeža ir 120 m virs zemes vai ūdens virsmas. Vietējā UGZ var noteikt zemāku robežu, bet ne augstāku.
    en: |
      The Open-category cap is 120 m above ground or water. A local UGZ can lower it, never raise it.
    ru: |
      Предел Открытой категории — 120 м над землёй или водой. Локальная UGZ может только понизить, но не поднять его.
  distractorRationales:
    a:
      lv: 50 m ir krietni zem regulatīvās robežas. Tā nav Atvērtās kategorijas griestu vērtība.
      en: 50 m is well below the regulatory cap. It is not the Open-category ceiling.
      ru: 50 м значительно ниже регуляторного предела. Это не потолок Открытой категории.
    b:
      lv: 300 m pārsniedz Atvērtās kategorijas griestus. Lidojumi virs 120 m prasa Specifisko kategoriju.
      en: 300 m exceeds the Open-category cap. Flights above 120 m require the Specific category.
      ru: 300 м превышает потолок Открытой категории. Полёты выше 120 м требуют категории «Специальная».
    d:
      lv: Ražotāja ģeofence ir tehniska iezīme, nevis tiesisks noteikums. Pat ja aparāts ļauj augstāk, regula joprojām fiksē 120 m.
      en: A manufacturer's geofence is a technical feature, not a legal rule. Even if the aircraft permits more, the regulation still fixes the cap at 120 m.
      ru: Ограничитель производителя — это техническая функция, а не правовая норма. Даже если аппарат разрешает больше, регламент фиксирует 120 м.
  sourceRef: "Reg (EU) 2019/947 UAS.OPEN.020/030/040(2) | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 UAS.OPEN.020/030/040(2)
- id: as-004
  stem:
    lv: Vai Atvērtajā kategorijā ir atļauts lidot virs cilvēku pulcēšanās vietām?
    en: Is overflight of assemblies of people allowed in the Open category?
    ru: Разрешён ли пролёт над скоплениями людей в Открытой категории?
  options:
    - id: a
      text:
        lv: Jā, ja pulcēšanās dalībnieki ir devuši rakstisku piekrišanu.
        en: Yes, if the participants in the assembly have given written consent.
        ru: Да, если участники скопления дали письменное согласие.
    - id: b
      text:
        lv: Jā, ja drons ir vieglāks par 250 g.
        en: Yes, if the drone is below 250 g.
        ru: Да, если дрон легче 250 г.
    - id: c
      text:
        lv: Jā, ja pilotam ir A2 kompetences apliecība.
        en: Yes, if the pilot holds an A2 competence certificate.
        ru: Да, если у пилота есть сертификат A2.
    - id: d
      text:
        lv: Nē — nekādā Atvērtās kategorijas apakškategorijā tas nav atļauts.
        en: No — it is not allowed in any Open subcategory.
        ru: Нет — это не разрешено ни в одной из подкатегорий Открытой.
  correctOptionId: d
  explanation:
    lv: |
      Aizliegums lidot virs cilvēku pulcēšanās ir Atvērtās kategorijas iekšējais ierobežojums, kas attiecas uz visām apakškategorijām un visām UAS klasēm.
    en: |
      The ban on overflight of assemblies is intrinsic to the Open category and applies to every subcategory and every UAS class.
    ru: |
      Запрет полётов над скоплениями людей — внутреннее ограничение Открытой категории, действующее для всех подкатегорий и классов UAS.
  distractorRationales:
    a:
      lv: Privāta piekrišana neaizvieto regulu. Pulcēšanās aizliegums Atvērtajā ir absolūts — pārkāpums prasa Specifisko kategoriju.
      en: Private consent does not override regulation. The assembly ban in Open is absolute — crossing it requires the Specific category.
      ru: Частное согласие не отменяет правила. Запрет на скопления в Открытой абсолютен — для исключения нужна категория «Специальная».
    b:
      lv: 250 g robeža ļauj pārlidot atsevišķas personas A1 ietvaros, ne pulcēšanos. Klasei nav nozīmes attiecībā uz pulcēšanās aizliegumu.
      en: The 250 g threshold permits overflight of isolated individuals in A1, not assemblies. Class privilege does not lift the assembly ban.
      ru: Порог 250 г допускает пролёт над отдельными лицами в A1, но не над скоплениями. Класс не отменяет запрет.
    c:
      lv: A2 atvieglo attālumu līdz atsevišķām personām (5 m / 30 m), bet pulcēšanās aizliegumu nekādi nemaina.
      en: A2 relaxes the distance to individuals (5 m / 30 m), but does not affect the assembly prohibition in any way.
      ru: A2 смягчает дистанцию до отдельных лиц (5 м / 30 м), но никак не отменяет запрет на скопления.
  sourceRef: "Reg (EU) 2019/947 Art. UAS.OPEN.010(1) | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; Annex Part A"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 Art. UAS.OPEN.010(1); Annex Part A
- id: as-005
  stem:
    lv: Cik liela ir minimālā horizontālā distance no nepiederošām personām A3 apakškategorijā?
    en: What is the minimum horizontal distance from uninvolved persons in A3?
    ru: Какова минимальная горизонтальная дистанция от посторонних в A3?
  options:
    - id: a
      text:
        lv: 30 m, vai 1:1 noteikums (≥ lidojuma augstumam).
        en: 30 m, or the 1:1 rule (≥ flight altitude).
        ru: 30 м, либо правило 1:1 (≥ высоте полёта).
    - id: b
      text:
        lv: 5 m.
        en: 5 m.
        ru: 5 м.
    - id: c
      text:
        lv: 150 m.
        en: 150 m.
        ru: 150 м.
    - id: d
      text:
        lv: 50 m neatkarīgi no augstuma.
        en: 50 m regardless of altitude.
        ru: 50 м независимо от высоты.
  correctOptionId: a
  explanation:
    lv: |
      A3 prasa vismaz 30 m no nepiederošām personām vai 1:1 noteikumu — horizontālā distance ne mazāka par lidojuma augstumu. 150 m ir attālums no apdzīvotām zonām, ne no atsevišķām personām.
    en: |
      A3 requires at least 30 m from uninvolved persons or the 1:1 rule — horizontal distance not less than flight altitude. 150 m is the distance from residential / commercial areas, not from individuals.
    ru: |
      A3 требует не менее 30 м от посторонних или правило 1:1 — горизонтальная дистанция не меньше высоты полёта. 150 м — это расстояние от жилых/коммерческих зон, не от отдельных лиц.
  distractorRationales:
    b:
      lv: 5 m ir A2 zema ātruma režīma minimums, ne A3. A3 ir atstatu no cilvēkiem operāciju kategorija.
      en: 5 m is the A2 low-speed mode minimum, not A3. A3 is the away-from-people category.
      ru: 5 м — минимум для A2 в режиме низкой скорости, а не для A3. A3 — категория «вдали от людей».
    c:
      lv: 150 m attiecas uz apdzīvotām, komerciālām, industriālām vai atpūtas zonām — ne uz atsevišķām personām.
      en: 150 m applies to residential, commercial, industrial, or recreational areas — not to individuals.
      ru: 150 м относится к жилым, коммерческим, промышленным или рекреационным зонам — не к отдельным людям.
    d:
      lv: Fiksētas 50 m kārtulas regulā nav. A3 izmanto 30 m grīdu plus 1:1 noteikumu — abi vienlaikus.
      en: There is no flat 50 m rule in the regulation. A3 uses a 30 m floor plus the 1:1 rule — both apply simultaneously.
      ru: Постоянного правила 50 м в регламенте нет. A3 использует пол 30 м и правило 1:1 одновременно.
  sourceRef: "Reg (EU) 2019/947 UAS.OPEN.040(1)(b) | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: numeric
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 UAS.OPEN.040(1)(b)
- id: as-006
  stem:
    lv: Pilots filmē piekrastes krauju no 400 m attāluma. Drons ir tikko pamanāms — mazs punkts debesīs. Vai VLOS tiek ievērots?
    en: A pilot films a coastal cliff from 400 m. The drone is barely visible — a small dot in the sky. Is VLOS maintained?
    ru: Пилот снимает прибрежный утёс с расстояния 400 м. Дрон едва виден — маленькая точка в небе. Соблюдается ли VLOS?
  options:
    - id: a
      text:
        lv: Jā — drons ir redzams, tātad VLOS ir ievērots.
        en: Yes — the drone is visible, so VLOS is maintained.
        ru: Да — дрон виден, значит VLOS соблюдается.
    - id: b
      text:
        lv: Nē — VLOS prasa neapšaubāmu vizuālu kontroli pār attieksmi un kursu, ne tikai redzamību.
        en: No — VLOS requires unambiguous visual control of attitude and course, not merely visibility.
        ru: Нет — VLOS требует однозначного визуального контроля ориентации и курса, а не просто видимости.
    - id: c
      text:
        lv: Jā — ražotāja lietotne rāda drona atrašanās vietu kartē.
        en: Yes — the manufacturer app shows the drone's position on a map.
        ru: Да — приложение производителя показывает положение дрона на карте.
    - id: d
      text:
        lv: Tikai tad, ja pilots izmanto binokli.
        en: Only if the pilot uses binoculars.
        ru: Только если пилот использует бинокль.
  correctOptionId: b
  explanation:
    lv: |
      VLOS nozīmē, ka pilots spēj nepārtraukti un bez palīglīdzekļiem noteikt UAS atrašanās vietu, augstumu, ātrumu un kustības virzienu. "Tikko pamanāms" neatbilst šim standartam — vizuālajai kontrolei jābūt neapšaubāmai.
    en: |
      VLOS requires the pilot to continuously and unaided determine the UAS position, altitude, speed, and direction of travel. "Barely visible" does not meet this standard — visual control must be unambiguous.
    ru: |
      VLOS означает, что пилот способен непрерывно и без вспомогательных средств определять положение, высоту, скорость и направление движения UAS. «Едва виден» этому стандарту не соответствует.
  distractorRationales:
    a:
      lv: Vienkārša redzamība bez spējas noteikt attieksmi un kursu nav pietiekama VLOS ievērošanai.
      en: Mere visibility without the ability to determine attitude and course is insufficient for VLOS.
      ru: Простой видимости без возможности определить ориентацию и курс недостаточно для VLOS.
    c:
      lv: Kartes rādīšana lietotnē ir GPS pozīcija, ne vizuālā kontrole. VLOS neaizstāj ar digitāliem rīkiem.
      en: The app map shows a GPS position, not visual control. VLOS cannot be substituted with digital tools.
      ru: Карта приложения показывает GPS-позицию, а не визуальный контроль. VLOS нельзя заменить цифровыми инструментами.
    d:
      lv: Binoklis ir palīglīdzeklis — VLOS ir tieši definēts kā "neapbruņotas acs" prasība (brilles atļautas, binokļi nav).
      en: Binoculars are an aid — VLOS is explicitly defined as an "unaided eye" requirement (corrective glasses allowed, binoculars are not).
      ru: Бинокль — вспомогательное средство. VLOS явно определён как требование «невооружённым глазом» (очки для коррекции допустимы, бинокли — нет).
  sourceRef: "Reg (EU) 2019/947 Art. UAS.OPEN.060(3) | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; EASA AMC1 UAS.OPEN.060 | https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019R0947"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 Art. UAS.OPEN.060(3); EASA AMC1 UAS.OPEN.060
- id: as-007
  stem:
    lv: Pilots ar C1 klases dronu vēlas filmēt atklāta futbola mača skatītājus no 50 m augstuma. Tribīnēs ir 300 cilvēki. Kāda ir pareizā darbība?
    en: A pilot with a C1 drone wants to film spectators at an outdoor football match from 50 m altitude. There are 300 people in the stands. What is the correct action?
    ru: Пилот с дроном C1 хочет снимать зрителей открытого футбольного матча с высоты 50 м. На трибунах 300 человек. Какое правильное действие?
  options:
    - id: a
      text:
        lv: Lidot — C1 ir vislīdzīgākais klasei un atļauts A1 apakškategorijā.
        en: Fly — C1 is the lightest class and is allowed in A1.
        ru: Лететь — C1 — лёгкий класс, разрешён в A1.
    - id: b
      text:
        lv: Lidot, ja augstums ir virs 100 m.
        en: Fly if altitude is above 100 m.
        ru: Лететь, если высота выше 100 м.
    - id: c
      text:
        lv: Nelidot — lidojumi virs cilvēku pulcēšanās vietām ir aizliegti visā Atvērtajā kategorijā.
        en: Do not fly — overflights of assemblies of people are prohibited across the entire Open category.
        ru: Не летать — полёты над скоплениями людей запрещены во всей Открытой категории.
    - id: d
      text:
        lv: Lidot, ja organizators devis rakstveida atļauju.
        en: Fly if the organiser has given written permission.
        ru: Лететь, если организатор дал письменное разрешение.
  correctOptionId: c
  explanation:
    lv: |
      Lidojums virs cilvēku pulcēšanās vietām ir absolūts aizliegums Atvērtajā kategorijā — tas attiecas uz visām apakškategorijām (A1, A2, A3) un visām UAS klasēm (C0–C4). Ne klase, ne sertifikāts, ne organizatora atļauja neaizstāj šo aizliegumu.
    en: |
      Overflight of assemblies of people is an absolute prohibition across the entire Open category — it applies to all subcategories (A1, A2, A3) and all UAS classes (C0–C4). No class, certificate, or organiser permission overrides this prohibition.
    ru: |
      Полёт над скоплениями людей — абсолютный запрет во всей Открытой категории, для всех подкатегорий (A1, A2, A3) и классов (C0–C4). Никакой класс, сертификат или разрешение организатора не отменяет этот запрет.
  distractorRationales:
    a:
      lv: C1 atļauj A1 operācijas, bet A1 neatļauj lidot virs cilvēku pulcēšanās vietām. Klases priekšrocības neattiecas uz pulcēšanās aizliegumu.
      en: C1 permits A1 operations, but A1 does not permit overflights of assemblies. The class privileges do not override the assembly prohibition.
      ru: C1 разрешает A1-операции, но A1 не допускает полётов над скоплениями. Привилегии класса не отменяют запрет.
    b:
      lv: Augstums nemaina pulcēšanās aizliegumu — tas ir absolūts neatkarīgi no lidojuma augstuma.
      en: Altitude does not modify the assembly prohibition — it is absolute regardless of flight altitude.
      ru: Высота не меняет запрет на скопления — он абсолютен вне зависимости от высоты полёта.
    d:
      lv: Organizatora atļauja ir privātpersonas piekrišana, nevis regulatīvā atļauja. Regulā nav paredzēta iespēja atcelt šo aizliegumu ar privātu atļauju.
      en: An organiser's permission is private consent, not a regulatory authorisation. The regulation provides no mechanism to waive this prohibition via private permission.
      ru: Разрешение организатора — это частное согласие, а не официальное разрешение регулятора. Правила не позволяют отменить этот запрет частным образом.
  sourceRef: "Reg (EU) 2019/947 Art. UAS.OPEN.010(1) | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; UAS.OPEN.020/030/040 | https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019R0947"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 Art. UAS.OPEN.010(1); UAS.OPEN.020/030/040
- id: as-008
  stem:
    lv: Pilots pēc infrastruktūras īpašnieka pieprasījuma pārbauda 130 m augstu mākslīgu mastu un lido 40 m horizontālā attālumā no tā. Kāds ir maksimālais atļautais augstums šajā īpašajā gadījumā?
    en: A pilot inspects a 130 m artificial mast at the request of the infrastructure owner and flies 40 m horizontally from it. What is the maximum permitted height in this special case?
    ru: Пилот по запросу владельца инфраструктуры инспектирует искусственную мачту 130 м и летит в 40 м по горизонтали от неё. Какая максимальная высота разрешена в этом особом случае?
  options:
    - id: a
      text:
        lv: 120 m — Atvērtās kategorijas augstuma robeža.
        en: 120 m — the Open-category altitude limit.
        ru: 120 м — предел высоты Открытой категории.
    - id: b
      text:
        lv: 130 m — masta augstums.
        en: 130 m — the mast height.
        ru: 130 м — высота мачты.
    - id: c
      text:
        lv: 50 m — rezerves augstums blakus šķēršļiem.
        en: 50 m — conservative altitude near obstacles.
        ru: 50 м — консервативная высота рядом с препятствиями.
    - id: d
      text:
        lv: 145 m — masta augstums + 15 m pagarinājums.
        en: 145 m — mast height + 15 m extension.
        ru: 145 м — высота мачты + расширение 15 м.
  correctOptionId: d
  explanation:
    lv: |
      Regula 2019/947 ļauj pārsniegt standarta 120 m robežu tikai tad, ja UAS lido ne tālāk kā 50 m horizontāli no mākslīga šķēršļa, kas ir augstāks par 105 m, un tas notiek pēc par šķērsli atbildīgās personas pieprasījuma. 130 + 15 = 145 m.
    en: |
      Regulation 2019/947 allows the standard 120 m ceiling to be exceeded only when the UAS flies within 50 m horizontally of an artificial obstacle taller than 105 m, at the request of the entity responsible for the obstacle. 130 + 15 = 145 m.
    ru: |
      Регламент 2019/947 позволяет превысить стандартный потолок 120 м только если БВС летит в пределах 50 м по горизонтали от искусственного препятствия выше 105 м и это делается по запросу лица, ответственного за препятствие. 130 + 15 = 145 м.
  distractorRationales:
    a:
      lv: 120 m ir standarta robeža, bet šajā scenārijā izpildās konkrētais mākslīgā šķēršļa izņēmums.
      en: 120 m is the standard ceiling, but this scenario satisfies the specific artificial-obstacle exception.
      ru: 120 м — стандартный потолок, но в этом сценарии выполняется специальное исключение для искусственного препятствия.
    b:
      lv: Masta augstums ir pamats, bet regulā šādos apstākļos atļauts +15 m virs tā.
      en: The mast height is the base, but the regulation allows +15 m above it in these conditions.
      ru: Высота мачты — базовое значение, но в этих условиях разрешены ещё +15 м.
    c:
      lv: 50 m ir horizontālās distances nosacījums līdz šķērslim, nevis maksimālais lidojuma augstums.
      en: 50 m is the horizontal-distance condition from the obstacle, not the maximum flight height.
      ru: 50 м — условие горизонтального расстояния до препятствия, а не максимальная высота полёта.
  sourceRef: "Reg (EU) 2019/947 UAS.OPEN.010(3) — artificial obstacle altitude exception | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: numeric
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 UAS.OPEN.010(3) — artificial obstacle altitude exception
- id: as-009
  stem:
    lv: C0 drona pilots šķērso parka ceļu, kur atsevišķas personas staigā turpat apakšā. Pilotam nav C1 sertifikāta, tikai reģistrācija kā operators. Vai lidojums ir likumīgs?
    en: A C0 drone pilot crosses a park path where isolated individuals are walking directly below. The pilot holds no C1 certificate, only operator registration. Is the flight legal?
    ru: Пилот C0-дрона пролетает над парковой дорожкой, по которой идут отдельные люди. Пилот не имеет сертификата C1, только регистрацию оператора. Законен ли полёт?
  options:
    - id: a
      text:
        lv: Jā — C0 ir vienīgā klase, kurai atļauts pārlaisties virs atsevišķām nepiederošām personām, un C0 pilotam nav nepieciešams sertifikāts.
        en: Yes — C0 is the only class allowed to overfly isolated uninvolved individuals, and C0 requires no pilot certificate.
        ru: Да — C0 единственный класс, которому разрешено пролетать над отдельными посторонними, и C0 не требует сертификата пилота.
    - id: b
      text:
        lv: Nē — pilotam nav nepieciešamā sertifikāta.
        en: No — the pilot lacks the required certificate.
        ru: Нет — у пилота нет необходимого сертификата.
    - id: c
      text:
        lv: Jā, bet tikai zem 50 m augstumā.
        en: Yes, but only below 50 m altitude.
        ru: Да, но только ниже 50 м.
    - id: d
      text:
        lv: Nē — šāds lidojums prasa rakstisku piekrišanu no personām apakšā.
        en: No — such a flight requires written consent from the individuals below.
        ru: Нет — такой полёт требует письменного согласия от людей внизу.
  correctOptionId: a
  explanation:
    lv: |
      C0 ir vienīgā klase A1 apakškategorijā, kurai atļauts pārlaisties virs atsevišķām nepiederošām personām (nevis pulcēšanās). Pilotam nav nepieciešams tālvadības pilota sertifikāts C0 operācijām, tikai operators jāreģistrē, ja drona masa vai aprīkojums to prasa.
    en: |
      C0 is the only class in A1 permitted to overfly isolated uninvolved individuals (not assemblies). No pilot certificate is required for C0 operations — only operator registration where required by mass or equipment.
    ru: |
      C0 — единственный класс в A1, которому разрешено пролетать над отдельными посторонними (не скоплениями). Сертификат пилота для C0 не требуется — только регистрация оператора там, где она обязательна по массе или оборудованию.
  distractorRationales:
    b:
      lv: C0 operācijām sertifikāts nav obligāts — tas ir C0 klases priekšrocība. Sertifikāts nepieciešams C1 un augstākām klasēm.
      en: No certificate is required for C0 — this is the C0 class privilege. A certificate is required for C1 and above.
      ru: Для C0 сертификат не обязателен — это преимущество класса. Сертификат нужен для C1 и выше.
    c:
      lv: Augstuma ierobežojums nav saistīts ar atļauju pārlaisties virs personām. Drīkst pārlaisties līdz 120 m robežai.
      en: The altitude limit is not linked to the permission to overfly individuals. The 120 m cap still applies.
      ru: Ограничение по высоте не связано с разрешением летать над людьми. Применяется стандартный предел 120 м.
    d:
      lv: Piekrišana no atsevišķām personām nav prasīta C0 pārlidojumam. Pulcēšanās aizliegums ir absolūts, bet atsevišķas personas ir atļautas ar C0.
      en: Consent from isolated individuals is not required for C0 overflights. The assembly prohibition is absolute; individual persons are permitted with C0.
      ru: Согласие отдельных людей не требуется для C0. Запрет на скопления абсолютен, но отдельные люди разрешены для C0.
  sourceRef: "Reg (EU) 2019/947 UAS.OPEN.020(1)(c) | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; C0"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 UAS.OPEN.020(1)(c); Reg (EU) 2019/945 Part 1 — C0
- id: as-010
  stem:
    lv: Lidojuma laikā drons aizlido aiz koku rindas un kļūst vizuāli nepieejams. GPS rāda atrašanās vietu un lietotne darbojas normāli. Ko pilotam darīt?
    en: During flight the drone flies behind a tree line and becomes visually inaccessible. GPS shows the position and the app works normally. What must the pilot do?
    ru: Во время полёта дрон улетает за деревья и становится визуально недоступен. GPS показывает положение, приложение работает нормально. Что должен сделать пилот?
  options:
    - id: a
      text:
        lv: Turpināt lidojumu — GPS un lietotnes dati aizvieto VLOS.
        en: Continue — GPS and app data substitute for VLOS.
        ru: Продолжать — данные GPS и приложения заменяют VLOS.
    - id: b
      text:
        lv: Nekavējoties atgriezt dronu VLOS robežās.
        en: Return the drone to VLOS immediately.
        ru: Немедленно вернуть дрон в зону VLOS.
    - id: c
      text:
        lv: Aktivēt FPV režīmu, lai uzturētu situācijas apzināšanos.
        en: Activate FPV mode to maintain situational awareness.
        ru: Включить FPV для поддержания ситуационной осведомлённости.
    - id: d
      text:
        lv: Turpināt, ja novērotājs var redzēt dronu no citas vietas.
        en: Continue if an observer can see the drone from another position.
        ru: Продолжать, если наблюдатель видит дрон с другой позиции.
  correctOptionId: b
  explanation:
    lv: |
      VLOS ir nepārtraukta prasība visā lidojumā. GPS un digitālie rīki neaizvieto vizuālo kontroli. Tiklīdz drons kļūst vizuāli nepieejams, pilots pārkāpj VLOS prasību un ir jāatjauno redzamība.
    en: |
      VLOS is a continuous requirement throughout the flight. GPS and digital tools do not substitute for visual control. Once the drone is visually inaccessible, the pilot is violating VLOS and must restore visibility.
    ru: |
      VLOS — непрерывное требование на протяжении всего полёта. GPS и цифровые инструменты не заменяют визуальный контроль. Как только дрон стал визуально недоступен, пилот нарушает VLOS и обязан восстановить видимость.
  distractorRationales:
    a:
      lv: GPS un lietotnes dati nodrošina pozīciju informāciju, bet ne vizuālo kontroli pār attieksmi un orientāciju, ko prasa VLOS.
      en: GPS and app data provide position information but not the visual control of attitude and orientation that VLOS requires.
      ru: GPS и данные приложения дают информацию о положении, но не визуальный контроль ориентации, который требует VLOS.
    c:
      lv: FPV paplašina pilota uztveri, bet nav VLOS aizstājējs — tas ir atsevišķs darba režīms ar savām prasībām (novērotājs).
      en: FPV extends the pilot's perception but is not a VLOS substitute — it is a separate operating mode with its own requirements (observer).
      ru: FPV расширяет восприятие пилота, но не заменяет VLOS — это отдельный режим со своими требованиями (наблюдатель).
    d:
      lv: Atklātajā kategorijā nav paredzēts darba veids ar novērotāju atsevišķā vietā (bez FPV brilles). Novērotāja loma ir stāvēt blakus pilotam, nevis aizstāt VLOS no attālas vietas.
      en: Open category does not provide for operation with a separated observer (without FPV). The observer's role is to stand next to the pilot, not to substitute VLOS from a remote position.
      ru: Открытая категория не предусматривает работу с наблюдателем на отдельной позиции (без FPV). Роль наблюдателя — стоять рядом с пилотом, а не заменять VLOS с удалённой точки.
  sourceRef: "Reg (EU) 2019/947 Art. UAS.OPEN.060(3) | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; AMC1 UAS.OPEN.060 | https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019R0947"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 Art. UAS.OPEN.060(3); AMC1 UAS.OPEN.060
- id: as-011
  stem:
    lv: Kura UAS klase ir VIENĪGĀ, kurai nav jāatbilst Direct Remote ID prasībai?
    en: Which UAS class is the ONLY one exempt from the Direct Remote ID requirement?
    ru: Какой класс UAS является ЕДИНСТВЕННЫМ, освобождённым от требования Direct Remote ID?
  options:
    - id: a
      text:
        lv: C1.
        en: C1.
        ru: C1.
    - id: b
      text:
        lv: C2.
        en: C2.
        ru: C2.
    - id: c
      text:
        lv: C0.
        en: C0.
        ru: C0.
    - id: d
      text:
        lv: C4.
        en: C4.
        ru: C4.
  correctOptionId: c
  explanation:
    lv: |
      C0 klase (< 250 g, maks. ātrums 19 m/s) ir atbrīvota no Direct Remote ID prasības, jo tā pārstāv zemākā riska kategoriju. C1, C2, C3 ir obligāta Direct Remote ID. C4 klases prasības atšķiras — tam nav autonomo lidojumu režīmu.
    en: |
      C0 class (< 250 g, max 19 m/s) is exempt from Direct Remote ID as the lowest-risk class. C1, C2, C3 require Direct Remote ID. C4 has different requirements — it is manual-only with no autonomous modes.
    ru: |
      Класс C0 (< 250 г, макс. 19 м/с) освобождён от Direct Remote ID как низкорисковый. C1, C2, C3 требуют Direct Remote ID. C4 имеет особые требования — только ручное управление.
  distractorRationales:
    a:
      lv: C1 klasei ir obligāts Direct Remote ID — tas ir viena no galvenajām C1 drošības prasībām.
      en: C1 requires Direct Remote ID — it is one of the core C1 safety requirements.
      ru: C1 требует Direct Remote ID — это одно из ключевых требований безопасности C1.
    b:
      lv: C2 klasei ir obligāts Direct Remote ID — tas ļauj identifikāciju tuvākās apkārtnes zonās un atvieglot uzraudzību.
      en: C2 requires Direct Remote ID — it enables identification in close-range operating areas and supports oversight.
      ru: C2 требует Direct Remote ID — это обеспечивает идентификацию в зонах близкого контакта.
    d:
      lv: C4 klasei nav autonomo lidojumu režīmu, bet tam ir obligāts Direct Remote ID, lai nodrošinātu identifikāciju A3 zonās.
      en: C4 has no autonomous modes but still requires Direct Remote ID to enable identification in A3 zones.
      ru: C4 не имеет автономных режимов, но всё равно требует Direct Remote ID для идентификации в зонах A3.
  sourceRef: "Reg (EU) 2019/945 Annex Parts 1–5 — Remote ID requirements per class | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/945 Annex Parts 1–5 — Remote ID requirements per class
- id: as-012
  stem:
    lv: Pilots A3 apakškategorijā lido 70 m augstumā. Cik liela ir minimālā horizontālā distance no nepiederošām personām pēc 1:1 noteikuma?
    en: A pilot in A3 is flying at 70 m altitude. What is the minimum horizontal distance from uninvolved persons under the 1:1 rule?
    ru: Пилот в A3 летит на высоте 70 м. Какова минимальная горизонтальная дистанция от посторонних по правилу 1:1?
  options:
    - id: a
      text:
        lv: 30 m — minimālā A3 distance neatkarīgi no augstuma.
        en: 30 m — the minimum A3 distance regardless of altitude.
        ru: 30 м — минимальная дистанция A3 вне зависимости от высоты.
    - id: b
      text:
        lv: 150 m — A3 distance no apdzīvotām zonām.
        en: 150 m — the A3 distance from inhabited areas.
        ru: 150 м — дистанция A3 от жилых зон.
    - id: c
      text:
        lv: 35 m — puse no lidojuma augstuma.
        en: 35 m — half the flight altitude.
        ru: 35 м — половина высоты полёта.
    - id: d
      text:
        lv: 70 m — 1:1 noteikums nosaka distance ≥ lidojuma augstumam.
        en: 70 m — the 1:1 rule sets distance ≥ flight altitude.
        ru: 70 м — правило 1:1 задаёт дистанцию ≥ высоте полёта.
  correctOptionId: d
  explanation:
    lv: |
      A3 apakškategorijā distance no nepiederošām personām ir vismaz 30 m VAI 1:1 noteikums — horizontālā distance ne mazāka par lidojuma augstumu — kas ir lielāks. Pie 70 m augstuma 1:1 nosaka 70 m, kas ir lielāks par minimālo 30 m, tātad 70 m ir pareizā atbilde.
    en: |
      In A3 the distance from uninvolved persons is at least 30 m OR the 1:1 rule — horizontal distance not less than flight altitude — whichever is greater. At 70 m altitude, 1:1 yields 70 m which exceeds the 30 m minimum, so 70 m is correct.
    ru: |
      В A3 дистанция от посторонних — не менее 30 м ИЛИ правило 1:1 — горизонтальная дистанция не меньше высоты полёта — что больше. При высоте 70 м правило 1:1 даёт 70 м, что превышает минимум 30 м, следовательно, правильный ответ — 70 м.
  distractorRationales:
    a:
      lv: 30 m ir minimums, bet tikai tad, ja lidojuma augstums ir ≤ 30 m. Pie 70 m augstuma 1:1 noteikums nosaka 70 m.
      en: 30 m is the minimum but only when flight altitude is ≤ 30 m. At 70 m altitude the 1:1 rule sets 70 m.
      ru: 30 м — минимум, но только если высота полёта ≤ 30 м. При 70 м правило 1:1 устанавливает 70 м.
    b:
      lv: 150 m ir minimālā distance no apdzīvotām, komerciālām, rūpnieciskām vai atpūtas zonām — ne no atsevišķām personām. Personas tiek regulētas ar 30 m / 1:1 noteikumu.
      en: 150 m is the minimum distance from residential, commercial, industrial, or recreational areas — not from individual persons. Persons are governed by the 30 m / 1:1 rule.
      ru: 150 м — минимальная дистанция от жилых, коммерческих, промышленных или рекреационных зон, а не от отдельных людей. Люди регулируются правилом 30 м / 1:1.
    c:
      lv: 1:1 noteikums nozīmē distance = augstums, nevis puse no augstuma. Nav 1:0,5 noteikuma.
      en: The 1:1 rule means distance equals altitude, not half the altitude. There is no 1:0.5 rule.
      ru: Правило 1:1 означает дистанция = высота, а не половина высоты. Правила 1:0,5 не существует.
  sourceRef: "Reg (EU) 2019/947 UAS.OPEN.040(1)(b) | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: numeric
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 UAS.OPEN.040(1)(b)
- id: as-013
  stem:
    lv: Pilots lido ar C1 dronu 100 m no palaišanas punkta. Baterija nokrītas līdz 8 %. Tuvākā droša nolaišanās vieta ir 40 m no trīs gājējiem. Vai pilots drīkst nolaisties tajā vietā?
    en: A pilot is flying a C1 drone 100 m from the launch point. Battery drops to 8 %. The nearest safe landing spot is 40 m from three pedestrians. May the pilot land there?
    ru: Пилот летит с C1-дроном в 100 м от точки запуска. Батарея падает до 8 %. Ближайшее безопасное место посадки — в 40 м от трёх пешеходов. Может ли пилот там посадить дрон?
  options:
    - id: a
      text:
        lv: Jā — C1 A1 apakškategorijā drīkst lidot tuvu atsevišķām personām, un ārkārtas nolaišanās ir pamatota situācijā.
        en: Yes — C1 in A1 may fly near isolated individuals, and an emergency landing is justified in this situation.
        ru: Да — C1 в A1 может летать рядом с отдельными лицами, и аварийная посадка оправдана в данной ситуации.
    - id: b
      text:
        lv: Nē — C1 nekad nedrīkst nolaisties 40 m no cilvēkiem.
        en: No — C1 may never land within 40 m of people.
        ru: Нет — C1 никогда не может приземлиться в 40 м от людей.
    - id: c
      text:
        lv: Jā, bet tikai tad, ja gājēji tiek brīdināti ar skaļu kliedzēšanu.
        en: Yes, but only if the pedestrians are warned by loud shouting.
        ru: Да, но только если пешеходы предупреждены громким криком.
    - id: d
      text:
        lv: Nē — pilotam jāatgriežas sākuma punktā, lai nolaišanās varētu notikt tur.
        en: No — the pilot must return to the launch point so landing can occur there.
        ru: Нет — пилот должен вернуться к точке запуска, чтобы приземление произошло там.
  correctOptionId: a
  explanation:
    lv: |
      C1 A1 apakškategorijā drīkst lidot pāri atsevišķām personām (ne pulcēšanās). Gājēji ir atsevišķas personas, nevis pulcēšanās. Ārkārtas situācijā — kritiski zema baterija — pilots izvēlas tuvāko drošo pieejamo vietu. Alternatīva (atgriešanās) var beigties ar nekontrolētu kritienu. Ārkārtas nolaišanās netālu no atsevišķām personām ir labāka nekā nekontrolēta nolaišanās.
    en: |
      C1 in A1 may fly over isolated individuals (not assemblies). Three pedestrians are isolated individuals, not an assembly. In an emergency — critically low battery — the pilot chooses the nearest safe available spot. The alternative (returning) risks an uncontrolled crash. An emergency landing near isolated individuals is preferable to an uncontrolled descent.
    ru: |
      C1 в A1 может летать над отдельными лицами (не над скоплениями). Три пешехода — это отдельные лица, а не скопление. В аварийной ситуации — критически низкий заряд батареи — пилот выбирает ближайшее безопасное доступное место. Альтернатива (возврат) грозит неконтролируемым падением. Аварийная посадка рядом с отдельными лицами предпочтительнее неконтролируемого снижения.
  distractorRationales:
    b:
      lv: C1 A1 apakškategorijā var lidot tuvu atsevišķām personām. Aizliegums attiecas uz pulcēšanos, nevis atsevišķiem gājējiem.
      en: C1 in A1 may fly near isolated individuals. The prohibition applies to assemblies, not isolated pedestrians.
      ru: C1 в A1 может летать рядом с отдельными лицами. Запрет касается скоплений, а не отдельных пешеходов.
    c:
      lv: Brīdināšana ar kliedzēšanu nav regulatīva prasība nolaišanās vietas izvēlei. Izvēle balstās uz drošību, nevis brīdināšanas procedūru.
      en: Warning by shouting is not a regulatory requirement for landing-spot selection. The choice is based on safety, not a warning procedure.
      ru: Предупреждение криком не относится к нормативным требованиям при выборе места посадки. Выбор основывается на безопасности, а не на процедуре предупреждения.
    d:
      lv: Atgriešanās pie sākuma punkta ar 8 % bateriju 100 m attālumā var nebūt iespējama. Ārkārtas situācijā tuvākā droša vieta ir pareizā izvēle.
      en: Returning to the launch point at 8 % battery 100 m away may not be achievable. In an emergency the nearest safe spot is the correct choice.
      ru: Возврат к точке запуска с зарядом 8 % на расстоянии 100 м может быть невозможен. В аварийной ситуации ближайшее безопасное место — правильный выбор.
  sourceRef: "Reg 2019/947 Art. UAS.OPEN.020 — A1 sub-category | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; UAS.OPEN.060 | https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019R0947"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg 2019/947 Art. UAS.OPEN.020 — A1 sub-category; UAS.OPEN.060
- id: as-014
  stem:
    lv: Vai Atvērtajā kategorijā ir atļauti nakts lidojumi?
    en: Are night flights permitted in the Open category?
    ru: Допускаются ли ночные полёты в Открытой категории?
  options:
    - id: a
      text:
        lv: Jā — bez papildu ierobežojumiem.
        en: Yes — with no additional restrictions.
        ru: Да — без дополнительных ограничений.
    - id: b
      text:
        lv: Jā — ja UAS ir apgaismojuma sistēma un pilots saglabā VLOS.
        en: Yes — if the UAS has a lighting system and the pilot maintains VLOS.
        ru: Да — если UAS оборудован системой освещения и пилот сохраняет VLOS.
    - id: c
      text:
        lv: Nē — Atvērtajā kategorijā nakts lidojumi ir pilnīgi aizliegti.
        en: No — night flights are entirely prohibited in the Open category.
        ru: Нет — ночные полёты полностью запрещены в Открытой категории.
    - id: d
      text:
        lv: Jā — tikai C0 (< 250 g) bez papildu prasībām.
        en: Yes — only C0 (< 250 g) with no additional requirements.
        ru: Да — только C0 (< 250 г) без дополнительных требований.
  correctOptionId: b
  explanation:
    lv: |
      Regula 2019/947 UAS.OPEN.060(2)(d) ļauj nakts lidojumus Atvērtajā kategorijā, ja UAS ir aprīkots ar apgaismojuma sistēmu, kas nodrošina pilotam spēju saglabāt VLOS un noteikt UAS orientāciju. Lidojums nakts laikā bez šāda apgaismojuma nav atļauts, jo nav iespējams uzturēt VLOS.
    en: |
      Reg 2019/947 UAS.OPEN.060(2)(d) permits night flights in the Open category provided the UAS is equipped with a lighting system that enables the pilot to maintain VLOS and determine the UAS orientation. Night flight without such lighting is not permitted because VLOS cannot be maintained.
    ru: |
      Регл. 2019/947 UAS.OPEN.060(2)(d) разрешает ночные полёты в Открытой категории при условии, что UAS оснащён системой освещения, позволяющей пилоту сохранять VLOS и определять ориентацию. Ночной полёт без такого освещения не разрешён, так как VLOS невозможно поддерживать.
  distractorRationales:
    a:
      lv: Papildu prasība ir apgaismojuma sistēma, kas nodrošina VLOS. Bez tās nakts lidojums nav atļauts.
      en: The additional requirement is a lighting system enabling VLOS. Without it night flight is not permitted.
      ru: Дополнительное требование — система освещения, обеспечивающая VLOS. Без неё ночной полёт не разрешён.
    c:
      lv: Regula atļauj nakts lidojumus ar nosacījumu, ka UAS ir atbilstoša apgaismošanas sistēma VLOS uzturēšanai. Tas nav pilnīgs aizliegums.
      en: The regulation permits night flights provided the UAS has adequate lighting for VLOS maintenance. It is not a blanket prohibition.
      ru: Регламент разрешает ночные полёты при наличии у UAS соответствующего освещения для поддержания VLOS. Это не абсолютный запрет.
    d:
      lv: Prasība par apgaismojuma sistēmu attiecas uz visām UAS klasēm, ne tikai C0. Svars viens pats nakts lidojumu neatļauj.
      en: The lighting system requirement applies to all UAS classes, not only C0. Weight alone does not determine night flight permission.
      ru: Требование о системе освещения распространяется на все классы UAS, а не только C0. Только масса не определяет разрешение на ночной полёт.
  sourceRef: "Reg 2019/947 Art. UAS.OPEN.060(2)(d) — night operations | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: regulatory
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg 2019/947 Art. UAS.OPEN.060(2)(d) — night operations
- id: as-015
  stem:
    lv: Ko regula saprot ar terminu "nepiederoša persona" (uninvolved person)?
    en: What does the regulation mean by the term "uninvolved person"?
    ru: Что подразумевает регламент под термином «непричастное лицо» (uninvolved person)?
  options:
    - id: a
      text:
        lv: Jebkura persona, kas nav operatora ģimenes loceklis.
        en: Any person who is not a family member of the operator.
        ru: Любое лицо, не являющееся членом семьи оператора.
    - id: b
      text:
        lv: Persona, kas atrodas vairāk nekā 150 m no operatora.
        en: A person located more than 150 m from the operator.
        ru: Лицо, находящееся более чем в 150 м от оператора.
    - id: c
      text:
        lv: Persona, kas nav iesaistīta UAS operācijā.
        en: A person who is not involved in the UAS operation.
        ru: Лицо, не участвующее в операции UAS.
    - id: d
      text:
        lv: Persona, kas nav EASA sertificēts pilots.
        en: A person who is not an EASA-certified pilot.
        ru: Лицо, не являющееся пилотом с сертификатом EASA.
  correctOptionId: c
  explanation:
    lv: |
      Regula 2019/947 AMC1 definē "uninvolved person" kā personu, kas nav iesaistīta UAS operācijā. Tā ietver visus, kas nav operatīvā komanda — pilotu, novērotāju un jebkuru citu, kas ir informēts un pilda lomu lidojumā. Attālums vai sertifikācija šo definīciju neietekmē.
    en: |
      Reg 2019/947 AMC1 defines "uninvolved person" as a person not involved in the UAS operation. It includes everyone who is not part of the operating crew — the pilot, observer, and any other person who is briefed and filling a role in the flight. Distance or certification do not affect this definition.
    ru: |
      AMC1 Регл. 2019/947 определяет «непричастное лицо» как лицо, не участвующее в операции UAS. Это включает всех, кто не входит в лётный экипаж — пилота, наблюдателя и любого другого человека, проинструктированного и выполняющего роль в полёте. Расстояние или сертификация на это определение не влияют.
  distractorRationales:
    a:
      lv: Ģimenes locekļi nav izslēgti no "nepiederoša personas" definīcijas — tie ir nepiederošas personas, ja nav iesaistīti operācijā.
      en: Family members are not excluded from the "uninvolved person" definition — they are uninvolved persons if not part of the operation.
      ru: Члены семьи не исключены из определения «непричастного лица» — они являются непричастными лицами, если не участвуют в операции.
    b:
      lv: Attālums nenosaka, vai persona ir "piederīga" vai "nepiederīga". To nosaka dalība operācijā.
      en: Distance does not determine whether a person is "involved" or "uninvolved". Participation in the operation determines this.
      ru: Расстояние не определяет, считается ли лицо «причастным» или «непричастным». Это зависит от участия в операции.
    d:
      lv: EASA sertifikāts ir pilota kompetences rādītājs, nevis kritērijs, lai klasificētu personu kā "nepiederošu".
      en: An EASA certificate is a pilot competence indicator, not a criterion to classify a person as "uninvolved".
      ru: Сертификат EASA — показатель компетентности пилота, а не критерий для классификации лица как «непричастного».
  sourceRef: "Reg 2019/947 AMC1 to UAS.OPEN.060 — definition of uninvolved person | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: regulatory
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg 2019/947 AMC1 to UAS.OPEN.060 — definition of uninvolved person
- id: as-016
  stem:
    lv: Pilots lido ar mantotu dronu (nav C klases zīmola), kas sver 480 g. Drona lidojums šķērso vientuļas personas ceļu 10 m augstumā, horizontāli 15 m attālumā. Kāds ir juridiskais statuss?
    en: A pilot flies a legacy drone (no C-class marking) weighing 480 g. The drone's flight path crosses above an isolated person's route at 10 m altitude, 15 m horizontally. What is the legal status?
    ru: Пилот управляет унаследованным дроном (без маркировки C-класса) массой 480 г. Траектория дрона пересекает путь одинокого человека на высоте 10 м, 15 м по горизонтали. Каков правовой статус?
  options:
    - id: a
      text:
        lv: Atļauts — mantoti droni zem 500 g automātiski iegūst C0 tiesības.
        en: Permitted — legacy drones under 500 g automatically gain C0 rights.
        ru: Разрешено — унаследованные дроны до 500 г автоматически получают права C0.
    - id: b
      text:
        lv: Atļauts — mantoti droni ≤ 500 g var darboties A1 apakškategorijā.
        en: Permitted — legacy drones ≤ 500 g may operate in A1.
        ru: Разрешено — унаследованные дроны ≤ 500 г могут работать в A1.
    - id: c
      text:
        lv: Atļauts, jo drons sver mazāk par 500 g un ir personīgai lietošanai.
        en: Permitted because the drone weighs less than 500 g and is for personal use.
        ru: Разрешено, так как дрон весит менее 500 г и используется для личных целей.
    - id: d
      text:
        lv: Aizliegts — mantots drons bez C klases zīmola ≥ 250 g darbojas A3 apakškategorijā, kur pārlidošana virs atsevišķām personām nav atļauta.
        en: Prohibited — a legacy drone without C-class marking ≥ 250 g operates in A3, where overflight of isolated individuals is not permitted.
        ru: Запрещено — унаследованный дрон без маркировки C-класса ≥ 250 г работает в A3, где облёт отдельных лиц не разрешён.
  correctOptionId: d
  explanation:
    lv: |
      Mantots drons bez C klases zīmola, kas sver 250 g vai vairāk, tiek klasificēts atbilstoši pārejas noteikumiem un atbilstoši savam apakšklases statusam. Tā kā tam nav C1 zīmola, tas darbojas A3 apakškategorijā, kur prasīts 150 m no apdzīvotām zonām un 1:1 noteikums attiecībā uz personām. Pārlidošana virs atsevišķām personām A3 nav atļauta — tikai A1 (ar C0/C1) pieļauj pārlidošanu virs atsevišķām personām.
    en: |
      A legacy drone without a C-class marking weighing 250 g or more is classified under transition rules and operates in A3. Without a C1 marking it cannot benefit from A1 overflight permissions. A3 requires the 1:1 rule for persons and 150 m from populated areas. Overflight of isolated individuals is only permitted in A1 (with C0/C1 class drones).
    ru: |
      Унаследованный дрон без маркировки C-класса массой 250 г и более классифицируется по переходным правилам и работает в A3. Без маркировки C1 он не может пользоваться разрешениями на облёт лиц в A1. В A3 требуются правило 1:1 для людей и 150 м от населённых районов. Облёт отдельных лиц разрешён только в A1 (с дронами класса C0/C1).
  distractorRationales:
    a:
      lv: Mantoti droni automātiski nekļūst par C0 UAS. C0 ir ražotāja piešķirta klase, nevis pārejas noteikumu piešķirta svara kategorija.
      en: Legacy drones do not automatically become C0 UAS. C0 is a manufacturer-assigned class, not a transitional weight category.
      ru: Унаследованные дроны автоматически не становятся C0. C0 — это класс, присвоенный производителем, а не весовая категория переходных правил.
    b:
      lv: Mantoti droni ≤ 500 g var darboties A3 apakškategorijā, bet ne A1. A1 prasa C1 vai C0 zīmolu.
      en: Legacy drones ≤ 500 g operate in A3, not A1. A1 requires a C1 or C0 marking.
      ru: Унаследованные дроны ≤ 500 г работают в A3, а не A1. A1 требует маркировки C1 или C0.
    c:
      lv: Personīgā lietošana un svars neietekmē apakškategorijas noteikumus. Juridiskais statuss ir atkarīgs no C klases zīmola esamības.
      en: Personal use and weight do not override sub-category rules. The legal status depends on the presence of a C-class marking.
      ru: Личное использование и масса не отменяют правила подкатегории. Правовой статус зависит от наличия маркировки C-класса.
  sourceRef: "Reg 2019/947 Art. 20 — transitional provisions for legacy drones | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: regulatory
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg 2019/947 Art. 20 — transitional provisions for legacy drones
- id: as-017
  stem:
    lv: Divi piloti vienā vietā vienlaikus lido ar saviem droniem. Pilotu A drons ir 80 m augstumā; Pilota B drons ir 60 m augstumā un tuvojas Pilota A dronam. Kurš ir atbildīgs par sadursmes novēršanu?
    en: Two pilots at the same location simultaneously fly their drones. Pilot A's drone is at 80 m; Pilot B's drone is at 60 m and approaching Pilot A's drone. Who is responsible for preventing a collision?
    ru: Два пилота в одном месте одновременно управляют своими дронами. Дрон пилота A на высоте 80 м; дрон пилота B на высоте 60 м и приближается к дрону пилота A. Кто отвечает за предотвращение столкновения?
  options:
    - id: a
      text:
        lv: Abi piloti kopīgi ir atbildīgi par saviem droniem un sadursmes novēršanu.
        en: Both pilots are jointly responsible for their drones and for preventing a collision.
        ru: Оба пилота несут совместную ответственность за свои дроны и за предотвращение столкновения.
    - id: b
      text:
        lv: Tikai pilotam B, jo viņa drons tuvojas.
        en: Pilot B only, because their drone is approaching.
        ru: Только пилот B, так как его дрон приближается.
    - id: c
      text:
        lv: Tikai pilotam A, jo viņa drons ir augstākā.
        en: Pilot A only, because their drone is higher.
        ru: Только пилот A, так как его дрон выше.
    - id: d
      text:
        lv: Neviens — VLOS lidojumā sadursmes novēršana ir automātiska sistēma.
        en: Neither — in VLOS flight collision avoidance is an automated system.
        ru: Никто — в полёте VLOS предотвращение столкновений — автоматическая система.
  correctOptionId: a
  explanation:
    lv: |
      Katrs pilots ir atbildīgs par sava UAS drošu ekspluatāciju saskaņā ar Reg 2019/947 UAS.OPEN.060. Tai skaitā ietilpst sadursmes novēršana ar citiem gaisa kuģiem, ieskaitot citiem UAS. Abiem pilotiem ir jākoordinē lidojumi, jāsazinās un jāveic tūlītēji pasākumi, lai novērstu sadursmi — vienam vien "pirmtiesības" nav.
    en: |
      Each pilot is responsible for the safe conduct of their own UAS under Reg 2019/947 UAS.OPEN.060. This includes collision avoidance with other aircraft, including other UAS. Both pilots must coordinate flights, communicate, and take immediate action to avoid a collision — neither has exclusive "right of way".
    ru: |
      Каждый пилот несёт ответственность за безопасное управление своим UAS в соответствии с Регл. 2019/947 UAS.OPEN.060. Это включает предотвращение столкновений с другими воздушными судами, в том числе другими UAS. Оба пилота должны координировать полёты, общаться и принимать немедленные меры для предотвращения столкновения — ни у одного нет исключительного «преимущества».
  distractorRationales:
    b:
      lv: Arī tuvojoties UAS puse nenes vienīgo atbildību. Pilots A arī var mainīt trajektoriju vai augstumu.
      en: The approaching UAS side does not bear sole responsibility either. Pilot A can also change trajectory or altitude.
      ru: Сторона приближающегося UAS также не несёт единоличной ответственности. Пилот A тоже может изменить траекторию или высоту.
    c:
      lv: Augstums viens pats nenosaka atbildību. Abi piloti atbild par saviem UAS.
      en: Altitude alone does not assign responsibility. Both pilots are responsible for their own UAS.
      ru: Высота одна не определяет ответственность. Оба пилота несут ответственность за свои UAS.
    d:
      lv: Automātiska sadursmes novēršana nav obligāta Atvērtās kategorijas UAS. VLOS lidojumā atbildība ir pilota, ne sistēmas.
      en: Automated collision avoidance is not mandatory for Open-category UAS. In VLOS flight the responsibility is the pilot's, not the system's.
      ru: Автоматическое предотвращение столкновений не обязательно для UAS Открытой категории. В полёте VLOS ответственность лежит на пилоте, а не на системе.
  sourceRef: "Reg 2019/947 Art. UAS.OPEN.060 — pilot responsibilities | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg 2019/947 Art. UAS.OPEN.060 — pilot responsibilities
- id: as-018
  stem:
    lv: Ko Atvērtajā kategorijā pilots dara pirms pacelšanās, lai samazinātu risku?
    en: What should an Open-category remote pilot do before take-off to reduce risk?
    ru: Что должен сделать дистанционный пилот в Открытой категории перед взлётом, чтобы снизить риск?
  options:
    - id: a
      text:
        lv: Paceļas uzreiz un “paskatās”, vai ir droši.
        en: Take off immediately and “see if it’s safe”.
        ru: Взлететь сразу и «посмотреть, безопасно ли».
    - id: b
      text:
        lv: Veic pirmslidojuma pārbaudi (vietu, laikapstākļus, UAS stāvokli, geozonas/NOTAM).
        en: Perform a pre-flight check (site, weather, UAS condition, geo-zones/NOTAM).
        ru: Выполнить предполётную проверку (место, погода, состояние БПЛА, геозоны/NOTAM).
    - id: c
      text:
        lv: Palielina augstumu virs 120 m, lai labāk redzētu apkārtni.
        en: Climb above 120 m to get a better view.
        ru: Подняться выше 120 м, чтобы лучше видеть вокруг.
    - id: d
      text:
        lv: Paļaujas tikai uz automātisko atgriešanos mājās (RTH) kā drošības pasākumu.
        en: Rely only on Return-to-Home (RTH) as the safety measure.
        ru: Полагаться только на Return-to-Home (RTH) как меру безопасности.
  correctOptionId: b
  explanation:
    lv: |
      Pirmspacelšanās pārbaude ir pilota pienākums: vieta, cilvēki, šķēršļi, laikapstākļi, UAS tehniskais stāvoklis un vietējie ierobežojumi.
    en: |
      A pre-flight check is a pilot responsibility: site, people, obstacles, weather, UAS technical condition and local restrictions.
    ru: |
      Предполётная проверка — обязанность пилота: место, люди, препятствия, погода, техническое состояние БПЛА и местные ограничения.
  distractorRationales:
    a:
      lv: “Pārbaudīt lidojumā” palielina risku. Drošības pasākumi jāveic pirms starta.
      en: “Checking in flight” increases risk. Safety checks belong before launch.
      ru: «Проверять в полёте» — значит повышать риск. Проверки делаются до старта.
    c:
      lv: 120 m limits Atvērtajā kategorijā ir pamatprasība; augstuma palielināšana nav risinājums drošībai.
      en: The 120 m limit is a core Open-category rule; climbing higher is not a safety solution.
      ru: Предел 120 м — базовое правило Открытой категории; подниматься выше — не «мера безопасности».
    d:
      lv: RTH ir palīgfunkcija, bet tā neaizvieto risku novērtējumu un vietas/ierobežojumu pārbaudi.
      en: RTH is a helper feature; it does not replace risk assessment and restriction checks.
      ru: RTH — вспомогательная функция; она не заменяет оценку рисков и проверку ограничений.
  sourceRef: "UAS.OPEN.060(1) — pilot responsibilities | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; pre-flight"
  difficulty: 1
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS.OPEN.060(1) — pilot responsibilities; pre-flight
- id: as-019
  stem:
    lv: Kurš apgalvojums par “neiesaistītu personu” (uninvolved person) ir pareizs?
    en: Which statement about an “uninvolved person” is correct?
    ru: Какое утверждение о «не вовлечённом лице» (uninvolved person) верно?
  options:
    - id: a
      text:
        lv: Draugi vienmēr skaitās iesaistīti, pat ja neko nezina par lidojumu.
        en: Friends are always involved, even if they know nothing about the flight.
        ru: Друзья всегда вовлечены, даже если ничего не знают о полёте.
    - id: b
      text:
        lv: Ikviens, kurš skatās uz dronu, automātiski kļūst par iesaistītu personu.
        en: Anyone who looks at the drone automatically becomes involved.
        ru: Любой, кто смотрит на дрон, автоматически становится вовлечённым.
    - id: c
      text:
        lv: Persona, kas nav informēta par UAS operāciju un nevar kontrolēt risku, ir neiesaistīta.
        en: A person who is not informed about the UAS operation and cannot control the risk is uninvolved.
        ru: Лицо, не проинформированное об операции и не контролирующее риск, считается не вовлечённым.
    - id: d
      text:
        lv: Persona ir iesaistīta tikai tad, ja paraksta rakstisku piekrišanu.
        en: A person is involved only if they sign written consent.
        ru: Лицо считается вовлечённым только при письменном согласии.
  correctOptionId: c
  explanation:
    lv: |
      Neiesaistīta persona nav informēta par operāciju un nevar saprātīgi pieņemt risku vai to kontrolēt. Informēšana un brīvprātīga līdzdalība maina statusu.
    en: |
      An uninvolved person is not informed about the operation and cannot reasonably accept or control the risk. Being informed and participating voluntarily changes the status.
    ru: |
      Не вовлечённое лицо не проинформировано об операции и не может разумно принять или контролировать риск. Информирование и добровольное участие меняют статус.
  distractorRationales:
    a:
      lv: Attiecības (draugs/ģimene) nenosaka statusu. Izšķiroši ir informēšana un brīvprātīga līdzdalība.
      en: Relationship (friend/family) doesn’t determine status. Information and voluntary participation do.
      ru: Статус не зависит от «друг/семья». Важно информирование и добровольное участие.
    b:
      lv: Skatīšanās pati par sevi nenozīmē informētu līdzdalību vai spēju kontrolēt risku.
      en: Looking alone does not equal informed participation or risk control.
      ru: Сам факт наблюдения не означает информированного участия или контроля риска.
    d:
      lv: Noteikumi neprasa “rakstisku” formu kā vienīgo kritēriju; būtiska ir informēta piekrišana un līdzdalība.
      en: Rules do not require “written” form as the sole criterion; informed consent and participation matter.
      ru: Правила не требуют только «письменной» формы; важны информированное согласие и участие.
  sourceRef: "AMC/GM on “uninvolved persons” for Open category | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: regulatory
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — AMC/GM on “uninvolved persons” for Open category
- id: as-020
  stem:
    lv: FPV lidojumā Atvērtajā kategorijā novērotājs drīkst stāvēt…
    en: In an Open-category FPV flight, the observer may stand…
    ru: При FPV-полёте в Открытой категории наблюдатель может находиться…
  options:
    - id: a
      text:
        lv: Jebkur, ja pilots ir reģistrēts operators.
        en: Anywhere, if the pilot is a registered operator.
        ru: Где угодно, если пилот зарегистрирован как оператор.
    - id: b
      text:
        lv: Citā vietā, ja vien novērotājs redz video straumi telefonā.
        en: Elsewhere, as long as the observer watches the video feed on a phone.
        ru: В другом месте, если наблюдатель смотрит видеопоток на телефоне.
    - id: c
      text:
        lv: Automašīnā, jo tas ir drošāk pret vēju.
        en: Inside a car, because it’s safer from wind.
        ru: В машине, так как там безопаснее от ветра.
    - id: d
      text:
        lv: Blakus pilotam tā, lai viņi varētu efektīvi sazināties un novērotājs redzētu UAS.
        en: Next to the pilot so they can communicate effectively and the observer can see the UAS.
        ru: Рядом с пилотом, чтобы эффективно общаться и чтобы наблюдатель видел БПЛА.
  correctOptionId: d
  explanation:
    lv: |
      Novērotājs palīdz uzturēt situācijas apzināšanos un VLOS uz UAS. Praktiski tas nozīmē fizisku tuvumu un reāllaika saziņu ar pilotu.
    en: |
      The observer supports situational awareness and VLOS on the UAS. In practice this means physical proximity and real-time communication.
    ru: |
      Наблюдатель обеспечивает ситуационную осведомлённость и VLOS по БПЛА. На практике это означает близость и связь в реальном времени.
  distractorRationales:
    a:
      lv: Operatora reģistrācija nemaina FPV novērotāja prasību.
      en: Operator registration does not change the FPV observer requirement.
      ru: Регистрация оператора не отменяет требование наблюдателя при FPV.
    b:
      lv: Novērotāja uzdevums ir skatīt gaisa telpu un UAS tieši, nevis video plūsmu.
      en: The observer’s job is to monitor the airspace and UAS directly, not a video feed.
      ru: Задача наблюдателя — контролировать воздушную обстановку и БПЛА напрямую, а не по видео.
    c:
      lv: No auto bieži nav iespējams uzturēt VLOS un saziņu; tā arī var radīt papildu riskus.
      en: From a car it’s often impossible to maintain VLOS and communication; it can introduce extra risks.
      ru: Из машины часто нельзя поддерживать VLOS и связь; это добавляет риски.
  sourceRef: "UAS.OPEN.060(2)(a) — FPV observer conditions | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS.OPEN.060(2)(a) — FPV observer conditions
- id: as-021
  stem:
    lv: Kā rīkoties, ja lidojuma laikā pēkšņi parādās helikopters tajā pašā apgabalā?
    en: What should you do if a helicopter suddenly appears in the same area during your flight?
    ru: Что делать, если во время полёта в том же районе внезапно появляется вертолёт?
  options:
    - id: a
      text:
        lv: "Nekavējoties samazināt risku: nolaisties vai attālināties, saglabājot drošu separāciju."
        en: "Immediately reduce risk: land or move away while maintaining safe separation."
        ru: "Немедленно снизить риск: приземлиться или уйти в сторону, сохраняя безопасное разделение."
    - id: b
      text:
        lv: Palielināt augstumu, lai helikopters noteikti tevi redzētu.
        en: Climb higher so the helicopter will definitely see you.
        ru: Подняться выше, чтобы вертолёт точно вас увидел.
    - id: c
      text:
        lv: Turpināt misiju, jo Atvērtajā kategorijā ir prioritāte virs pilotējamiem gaisa kuģiem.
        en: Continue the mission because Open category has priority over manned aircraft.
        ru: Продолжать миссию, потому что Открытая категория имеет приоритет над пилотируемыми ВС.
    - id: d
      text:
        lv: Lidot tuvāk, lai nofilmētu incidentu.
        en: Fly closer to film the incident.
        ru: Подлететь ближе, чтобы снять инцидент.
  correctOptionId: a
  explanation:
    lv: |
      Pilota pienākums ir izvairīties no konflikta ar citiem gaisa kuģiem un nekavējoties samazināt risku. Drošākā izvēle parasti ir nolaisties.
    en: |
      The pilot must avoid conflicts with other aircraft and immediately reduce risk. The safest choice is usually to land.
    ru: |
      Пилот обязан избегать конфликтов с другими воздушными судами и сразу снижать риск. Самый безопасный вариант обычно — посадка.
  distractorRationales:
    b:
      lv: Augstuma palielināšana var pasliktināt situāciju un pārkāpt 120 m limitu.
      en: Climbing can worsen the situation and may breach the 120 m limit.
      ru: Набор высоты может ухудшить ситуацию и привести к нарушению лимита 120 м.
    c:
      lv: UAS nekad nav “prioritāte” pret pilotējamiem gaisa kuģiem; tie ir jāizlaiž.
      en: UAS never has “priority” over manned aircraft; you must give way.
      ru: БПЛА не имеет «приоритета» над пилотируемыми ВС; нужно уступать.
    d:
      lv: Filmēšana palielina risku un motivē lidot tuvāk konfliktam.
      en: Filming increases risk and encourages flying into the conflict.
      ru: Съёмка повышает риск и провоцирует приближение к конфликту.
  sourceRef: "UAS.OPEN.060 — avoid hazards and give way | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS.OPEN.060 — avoid hazards and give way
- id: as-022
  stem:
    lv: Kad Atvērtajā kategorijā drīkst lidot virs cilvēku pulcēšanās (assembly of people)?
    en: When may you fly over an assembly of people in the Open category?
    ru: Когда в Открытой категории можно летать над скоплением людей (assembly of people)?
  options:
    - id: a
      text:
        lv: Ja drons ir zem 250 g un ir C0 klase.
        en: If the drone is under 250 g and class C0.
        ru: Если дрон легче 250 г и класса C0.
    - id: b
      text:
        lv: Nekad — lidojums virs pulcēšanās ir aizliegts Atvērtajā kategorijā.
        en: Never — flying over assemblies of people is prohibited in Open category.
        ru: Никогда — полёт над скоплением людей запрещён в Открытой категории.
    - id: c
      text:
        lv: Ja pilots ir nokārtojis A2 eksāmenu.
        en: If the pilot has passed the A2 exam.
        ru: Если пилот сдал экзамен A2.
    - id: d
      text:
        lv: Ja lidojumam ir uzlikts “kino režīms” ar zemu ātrumu.
        en: If the flight uses “cinematic mode” with low speed.
        ru: Если включён «кинорежим» с низкой скоростью.
  correctOptionId: b
  explanation:
    lv: |
      Atvērtajā kategorijā ir aizliegts lidot virs cilvēku pulcēšanās. Pat ar vieglu UAS drīkst lidot “virs neiesaistītām personām” tikai noteiktos apstākļos, bet ne virs pulcēšanās.
    en: |
      In the Open category, flying over assemblies of people is prohibited. Even with a light UAS, flying over uninvolved persons is only allowed under specific conditions — not over assemblies.
    ru: |
      В Открытой категории запрещено летать над скоплением людей. Даже с лёгким БПЛА полёт над не вовлечёнными лицами возможен только при условиях — но не над скоплениями.
  distractorRationales:
    a:
      lv: C0 var atļaut lidojumu virs atsevišķām neiesaistītām personām, bet “assembly” ir atsevišķs aizliegums.
      en: C0 may allow flight over individual uninvolved persons, but “assembly” is a separate prohibition.
      ru: C0 может допускать полёт над отдельными не вовлечёнными лицами, но «скопление» — отдельный запрет.
    c:
      lv: A2 attiecas uz A2 apakškategoriju, bet neatceļ aizliegumu lidot virs pulcēšanās.
      en: A2 relates to the A2 subcategory but does not remove the assembly prohibition.
      ru: A2 относится к подкатегории A2, но не отменяет запрет над скоплениями.
    d:
      lv: Lidojuma režīms neietekmē juridisko aizliegumu virs pulcēšanās.
      en: Flight mode does not change the legal prohibition over assemblies.
      ru: Режим полёта не меняет юридический запрет над скоплениями.
  sourceRef: "Open category limitations — assemblies of people | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: regulatory
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Open category limitations — assemblies of people
- id: as-023
  stem:
    lv: Kura rīcība vislabāk palīdz samazināt risku “fly-away” (nekontrolēta aizlidošana)?
    en: Which action best helps reduce “fly-away” risk?
    ru: Какое действие лучше всего снижает риск «fly-away» (неконтролируемого улёта)?
  options:
    - id: a
      text:
        lv: Izslēgt geozonu brīdinājumus, lai tie netraucētu.
        en: Disable geo-zone warnings so they don’t distract you.
        ru: Отключить предупреждения о геозонах, чтобы не отвлекали.
    - id: b
      text:
        lv: Lidot tikai “sporta režīmā”, lai ātrāk atgrieztos.
        en: Fly only in “sport mode” to return faster.
        ru: Летать только в «sport mode», чтобы быстрее возвращаться.
    - id: c
      text:
        lv: Pārbaudīt GNSS/kompasa stāvokli un iestatīt drošu RTH augstumu pirms starta.
        en: Check GNSS/compass status and set a safe RTH altitude before launch.
        ru: Проверить состояние GNSS/компаса и задать безопасную высоту RTH до старта.
    - id: d
      text:
        lv: Vienmēr pacelties tieši virs cilvēkiem, lai mazāk zaudētu signālu.
        en: Always take off directly above people to lose signal less.
        ru: Всегда взлетать прямо над людьми, чтобы меньше терять сигнал.
  correctOptionId: c
  explanation:
    lv: |
      Fly-away risks samazinās ar labu iestatījumu pārbaudi un “fail-safe” parametriem (piem., RTH augstums), kā arī ar vietas izvēli un VLOS.
    en: |
      Fly-away risk is reduced by checking status and fail-safe settings (e.g., RTH altitude), plus good site selection and VLOS.
    ru: |
      Риск неконтролируемого улёта снижается проверкой состояния и fail-safe настроек (например, высоты RTH), а также выбором места и VLOS.
  distractorRationales:
    a:
      lv: Geozonu brīdinājumi palīdz izvairīties no pārkāpumiem un bīstamām zonām.
      en: Geo-zone warnings help avoid violations and unsafe areas.
      ru: Предупреждения о геозонах помогают избегать нарушений и опасных зон.
    b:
      lv: “Sport mode” parasti palielina risku (ātrums, bremzēšana), nevis to samazina.
      en: “Sport mode” typically increases risk (speed, braking), not reduce it.
      ru: «Sport mode» обычно повышает риск (скорость, торможение), а не снижает.
    d:
      lv: Lidojums virs cilvēkiem palielina sekas avārijas gadījumā un var būt aizliegts.
      en: Flying over people increases consequences in an accident and may be prohibited.
      ru: Полёт над людьми увеличивает последствия при аварии и может быть запрещён.
  sourceRef: "UAS.OPEN.060 — safe operation | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; fail-safe considerations"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS.OPEN.060 — safe operation; fail-safe considerations
- id: as-024
  stem:
    lv: Ko nozīmē “lidojuma pārtraukšana” (terminate the flight) Atvērtajā kategorijā?
    en: What does “terminate the flight” mean in the Open category?
    ru: Что означает «прекратить полёт» (terminate the flight) в Открытой категории?
  options:
    - id: a
      text:
        lv: Pārtraukt lidojumu drīkst tikai pēc policijas pieprasījuma.
        en: You may terminate a flight only when police request it.
        ru: Прекратить полёт можно только по требованию полиции.
    - id: b
      text:
        lv: Izslēgt motorus gaisā, lai drons nokristu uz zemes.
        en: Cut motors mid-air so the drone falls to the ground.
        ru: Выключить моторы в воздухе, чтобы дрон упал.
    - id: c
      text:
        lv: Pārtraukt tikai video ierakstu.
        en: Stop only the video recording.
        ru: Остановить только запись видео.
    - id: d
      text:
        lv: Nekavējoties pabeigt lidojumu drošā veidā (nolaisties vai atgriezties), ja risks pieaug.
        en: End the flight safely without delay (land or return) when risk increases.
        ru: Немедленно безопасно завершить полёт (посадка/возврат), если риск вырос.
  correctOptionId: d
  explanation:
    lv: |
      Ja apstākļi kļūst nedroši, pilots pabeidz lidojumu drošā veidā, piemēram, nolaidoties vai atgriežoties uz starta vietu.
    en: |
      When conditions become unsafe, the pilot ends the flight in a safe way, e.g., landing or returning to the launch point.
    ru: |
      Если условия стали небезопасными, пилот завершает полёт безопасно, например посадкой или возвращением к месту старта.
  distractorRationales:
    a:
      lv: Pilots pats ir atbildīgs par risku un var pārtraukt lidojumu jebkurā brīdī drošības dēļ.
      en: The pilot is responsible for risk and may terminate anytime for safety.
      ru: Пилот отвечает за риск и может прекратить полёт в любой момент из соображений безопасности.
    b:
      lv: Apzināta “brīva krišana” var apdraudēt cilvēkus un īpašumu; terminācija nav “nometšana”.
      en: Intentionally “free-falling” can endanger people/property; termination is not “dropping it”.
      ru: Намеренное «свободное падение» опасно; прекращение полёта — не «уронить».
    c:
      lv: Video nav lidojuma drošības kritērijs. Jārisina lidojums, nevis ieraksts.
      en: Video is not the safety criterion. The flight itself must be addressed.
      ru: Видео — не критерий безопасности. Важно завершить полёт.
  sourceRef: "UAS.OPEN.060 — obligation to avoid hazards | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; terminate when needed"
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS.OPEN.060 — obligation to avoid hazards; terminate when needed
- id: as-025
  stem:
    lv: Kāda ir drošākā rīcība, ja tu zaudē VLOS (vairs neredzi UAS ar neapbruņotu aci)?
    en: What is the safest action if you lose VLOS (you can’t see the UAS with the unaided eye)?
    ru: Что безопаснее всего сделать, если вы потеряли VLOS (не видите БПЛА невооружённым глазом)?
  options:
    - id: a
      text:
        lv: Nekavējoties atjaunot VLOS vai pārtraukt lidojumu (RTH/landing), izvairoties no riska.
        en: Immediately regain VLOS or terminate the flight (RTH/land) to reduce risk.
        ru: Немедленно восстановить VLOS или завершить полёт (RTH/посадка), снижая риск.
    - id: b
      text:
        lv: Turpināt, jo GPS parāda atrašanās vietu.
        en: Continue because GPS shows the position.
        ru: Продолжать, ведь GPS показывает позицию.
    - id: c
      text:
        lv: Lidot augstāk, lai to atkal ieraudzītu.
        en: Fly higher to see it again.
        ru: Подняться выше, чтобы снова увидеть.
    - id: d
      text:
        lv: Pārslēgties uz FPV režīmu bez novērotāja.
        en: Switch to FPV mode without an observer.
        ru: Перейти на FPV без наблюдателя.
  correctOptionId: a
  explanation:
    lv: |
      VLOS ir pamatprasība. Ja to zaudē, pilots atjauno kontroli un redzamību vai droši pabeidz lidojumu, nepalielinot risku.
    en: |
      VLOS is a core requirement. If it’s lost, the pilot regains visual control or safely ends the flight without increasing risk.
    ru: |
      VLOS — базовое требование. При его потере пилот восстанавливает визуальный контроль или безопасно завершает полёт, не повышая риск.
  distractorRationales:
    b:
      lv: GPS koordinātes neaizvieto spēju redzēt kustību, orientāciju un šķēršļus.
      en: GPS coordinates don’t replace seeing attitude, movement and obstacles.
      ru: Координаты GPS не заменяют видимость ориентации, движения и препятствий.
    c:
      lv: Augstuma palielināšana var pārkāpt limitus un palielināt konfliktu risku.
      en: Climbing can breach limits and increase conflict risk.
      ru: Набор высоты может нарушить ограничения и увеличить риск конфликта.
    d:
      lv: FPV bez novērotāja neatbilst prasībām un samazina situācijas apzināšanos.
      en: FPV without an observer is non-compliant and reduces situational awareness.
      ru: FPV без наблюдателя нарушает требования и снижает осведомлённость.
  sourceRef: "UAS.OPEN.060(3) — VLOS requirement | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS.OPEN.060(3) — VLOS requirement
- id: as-026
  stem:
    lv: Kura rīcība ir piemērota, ja cilvēks tuvojas tavam pacelšanās/zemēšanās laukumiņam?
    en: What is appropriate if a person approaches your take-off/landing spot?
    ru: Что правильно, если человек приближается к вашей площадке взлёта/посадки?
  options:
    - id: a
      text:
        lv: Ignorēt, jo pilots ir “atbildīgs” un var turpināt.
        en: Ignore it because the pilot is “responsible” and can continue.
        ru: "Игнорировать: пилот «ответственный» и может продолжать."
    - id: b
      text:
        lv: Apturēt vai atlikt startu/zemēšanos un nodrošināt drošu attālumu.
        en: Pause or delay take-off/landing and ensure a safe separation.
        ru: Остановить/отложить взлёт/посадку и обеспечить безопасную дистанцию.
    - id: c
      text:
        lv: Paātrināt pacelšanos, lai ātrāk aizlidotu prom.
        en: Speed up take-off to get away faster.
        ru: Ускорить взлёт, чтобы быстрее улететь.
    - id: d
      text:
        lv: Uzsākt lidojumu tieši virs personas, lai to neapdraudētu propelleri uz zemes.
        en: Take off directly above the person so propellers don’t endanger them on the ground.
        ru: Взлететь прямо над человеком, чтобы винты «не опасны на земле».
  correctOptionId: b
  explanation:
    lv: |
      Pilots uztur drošu attālumu no personām un izvēlas drošu pacelšanās/zemēšanās vietu. Ja apstākļi mainās, lidojumu pārtrauc vai atliek.
    en: |
      The pilot maintains a safe distance to people and chooses a safe take-off/landing area. If conditions change, the flight is paused or terminated.
    ru: |
      Пилот поддерживает безопасную дистанцию до людей и выбирает безопасное место взлёта/посадки. При изменении условий полёт откладывается или прекращается.
  distractorRationales:
    a:
      lv: Atbildība nozīmē rīkoties droši, nevis ignorēt riskus.
      en: Responsibility means acting safely, not ignoring risks.
      ru: Ответственность означает действовать безопасно, а не игнорировать риск.
    c:
      lv: Steiga palielina kļūdu risku tieši kritiskajā fāzē (take-off/landing).
      en: Rushing increases error risk in a critical phase (take-off/landing).
      ru: Спешка повышает риск ошибок в критической фазе (взлёт/посадка).
    d:
      lv: Lidojums virs cilvēka palielina risku; arī uz zemes propelleri ir bīstami.
      en: Flying above a person increases risk; propellers are dangerous on the ground too.
      ru: Полёт над человеком повышает риск; винты опасны и на земле.
  sourceRef: "UAS.OPEN.060 — keep safe distances | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; avoid endangering people"
  difficulty: 1
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS.OPEN.060 — keep safe distances; avoid endangering people
- id: as-027
  stem:
    lv: Kāpēc “zems akumulatora līmenis” ir drošības risks?
    en: Why is “low battery” a safety risk?
    ru: Почему «низкий заряд батареи» — это риск безопасности?
  options:
    - id: a
      text:
        lv: Tas ir risks tikai virs 120 m augstuma.
        en: It’s a risk only above 120 m altitude.
        ru: Это риск только выше 120 м.
    - id: b
      text:
        lv: Tas tikai samazina video kvalitāti, bet drošību neietekmē.
        en: It only reduces video quality and doesn’t affect safety.
        ru: Это лишь ухудшает качество видео и не влияет на безопасность.
    - id: c
      text:
        lv: Tas var izraisīt neplānotu nosēšanos vai kontroles zudumu kritiskā brīdī.
        en: It can cause an unplanned landing or loss of control at a critical moment.
        ru: Это может привести к незапланированной посадке или потере управления в критический момент.
    - id: d
      text:
        lv: Tas nav risks, ja UAS ir C1 klase.
        en: It’s not a risk if the UAS is class C1.
        ru: Это не риск, если БПЛА класса C1.
  correctOptionId: c
  explanation:
    lv: |
      Zems akumulators var piespiest UAS veikt avārijas nosēšanos vai ierobežot jaudu (vējš, manevri), kas palielina incidentu risku.
    en: |
      Low battery can force emergency landing or reduce available power (wind, manoeuvres), increasing incident risk.
    ru: |
      Низкий заряд может привести к аварийной посадке или снижению доступной мощности (ветер, манёвры), повышая риск инцидента.
  distractorRationales:
    a:
      lv: Risks pastāv jebkurā augstumā — īpaši tuvu cilvēkiem un šķēršļiem.
      en: The risk exists at any altitude—especially near people and obstacles.
      ru: Риск существует на любой высоте — особенно рядом с людьми и препятствиями.
    b:
      lv: Akumulators ietekmē ne tikai kameru, bet arī lidojuma stabilitāti un atgriešanos.
      en: Battery affects not only the camera but flight stability and return capability.
      ru: Батарея влияет не только на камеру, но и на устойчивость полёта и возможность возврата.
    d:
      lv: "UAS klase neizslēdz fiziskos ierobežojumus: zema baterija joprojām ir risks."
      en: "UAS class doesn’t remove physics: low battery is still a risk."
      ru: "Класс БПЛА не отменяет физику: низкий заряд всё равно риск."
  sourceRef: "operational safety | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; battery management"
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — operational safety; battery management
- id: as-028
  stem:
    lv: Ko nozīmē “situācijas apzināšanās” (situational awareness) dronu lidojumā?
    en: What does “situational awareness” mean in drone operations?
    ru: Что означает «ситуационная осведомлённость» в управлении дроном?
  options:
    - id: a
      text:
        lv: Aizvērt vienu aci, lai labāk fokusētos uz dronu.
        en: Closing one eye to focus better on the drone.
        ru: Закрыть один глаз, чтобы лучше фокусироваться на дроне.
    - id: b
      text:
        lv: Tikai zināt, cik procentu akumulators ir palicis.
        en: Only knowing the remaining battery percentage.
        ru: Только знать процент заряда батареи.
    - id: c
      text:
        lv: Skatīties tikai uz FPV attēlu, lai “nepalaistu garām” kadrus.
        en: Watching only the FPV feed so you don’t “miss the shot”.
        ru: Смотреть только FPV-картинку, чтобы «не упустить кадр».
    - id: d
      text:
        lv: Pastāvīga izpratne par UAS, vidi, citiem dalībniekiem un riskiem, lai laicīgi pieņemtu lēmumus.
        en: Continuous understanding of the UAS, environment, other airspace users and risks to make timely decisions.
        ru: Постоянное понимание БПЛА, среды, других участников и рисков для своевременных решений.
  correctOptionId: d
  explanation:
    lv: |
      Situācijas apzināšanās ietver UAS stāvokli, apkārtējo vidi, cilvēkus, gaisa telpu, laikapstākļus un ierobežojumus — lai nepieļautu konfliktus.
    en: |
      Situational awareness includes UAS status, environment, people, airspace, weather and restrictions—so you can avoid conflicts.
    ru: |
      Ситуационная осведомлённость включает состояние БПЛА, среду, людей, воздушное пространство, погоду и ограничения — чтобы избегать конфликтов.
  distractorRationales:
    a:
      lv: Tas nav situācijas apzināšanās jēdziens un neveicina drošu lidojumu.
      en: That’s not what situational awareness means and doesn’t improve safety.
      ru: Это не про ситуационную осведомлённость и не повышает безопасность.
    b:
      lv: Akumulators ir tikai viens no faktoriem; risks var pieaugt arī citu iemeslu dēļ.
      en: Battery is only one factor; risk can increase for many other reasons.
      ru: Батарея — лишь один фактор; риск растёт и по другим причинам.
    c:
      lv: FPV vien var pasliktināt apzināšanos par apkārtējo gaisa telpu; vajadzīga plašāka bilde.
      en: FPV-only can reduce awareness of surrounding airspace; you need the bigger picture.
      ru: Только FPV снижает понимание окружающего пространства; нужна «общая картина».
  sourceRef: "safe operation concepts | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; pilot responsibilities"
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/EASA-QA-UAS-regulations.pdf — safe operation concepts; pilot responsibilities
- id: as-029
  stem:
    lv: Kura no izvēlēm ir piemērots “kontingences plāna” (contingency plan) piemērs?
    en: Which is an example of a suitable contingency plan?
    ru: Что является примером подходящего плана действий на случай непредвиденных обстоятельств (contingency plan)?
  options:
    - id: a
      text:
        lv: “Ja zaudēju signālu, aktivizēju RTH; ja tas nav droši, veicu kontrolētu nosēšanos brīvā zonā.”
        en: “If I lose link, I trigger RTH; if that’s unsafe, I perform a controlled landing in a clear area.”
        ru: «При потере связи включаю RTH; если это небезопасно — выполняю контролируемую посадку в свободной зоне».
    - id: b
      text:
        lv: “Ja kas notiek, turpinu filmēt līdz beigām.”
        en: “If anything happens, I keep filming until the end.”
        ru: «Если что-то случится, продолжаю снимать до конца».
    - id: c
      text:
        lv: “Ja ir problēmas, vienkārši skrienu pakaļ dronam.”
        en: “If there’s a problem, I just run after the drone.”
        ru: «Если проблема — просто бегу за дроном».
    - id: d
      text:
        lv: “Man nav vajadzīgs plāns, jo man ir apdrošināšana.”
        en: “I don’t need a plan because I have insurance.”
        ru: «План не нужен, потому что у меня есть страховка».
  correctOptionId: a
  explanation:
    lv: |
      Kontingences plāns ir iepriekš izdomāts drošības scenārijs neparedzētām situācijām (signāla zudums, baterija, cilvēku parādīšanās), lai ātri samazinātu risku.
    en: |
      A contingency plan is a pre-thought safety response to unexpected situations (link loss, battery, people entering area) to reduce risk quickly.
    ru: |
      Contingency plan — заранее продуманная реакция на неожиданные ситуации (потеря связи, батарея, появление людей), чтобы быстро снизить риск.
  distractorRationales:
    b:
      lv: Filmēšana nav prioritāte salīdzinājumā ar drošību un atbilstību.
      en: Filming is not a priority over safety and compliance.
      ru: Съёмка не важнее безопасности и соблюдения правил.
    c:
      lv: Skriešana var pasliktināt situāciju (zaudē VLOS, satiksme, šķēršļi) un nav strukturēts plāns.
      en: Running can worsen the situation (lose VLOS, traffic, obstacles) and isn’t a structured plan.
      ru: Бег может ухудшить ситуацию (потеря VLOS, транспорт, препятствия) и не считается планом.
    d:
      lv: Apdrošināšana nemazina tūlītējo risku lidojuma laikā.
      en: Insurance does not reduce immediate operational risk during flight.
      ru: Страховка не снижает оперативный риск во время полёта.
  sourceRef: "operational procedures | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; emergencies"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — operational procedures; emergencies
- id: as-030
  stem:
    lv: Kurš ir labs iemesls izvēlēties lielāku drošības buferi (attālumu) nekā minimums?
    en: What is a good reason to keep a larger safety buffer than the minimum?
    ru: Какова хорошая причина держать больший запас безопасности (дистанцию), чем минимум?
  options:
    - id: a
      text:
        lv: Jo tā var lidot virs cilvēku pulcēšanās.
        en: So you can fly over assemblies of people.
        ru: Чтобы можно было летать над скоплениями людей.
    - id: b
      text:
        lv: Vējš, signāla aizture un cilvēku neparedzama kustība var palielināt risku, tāpēc buferis palīdz.
        en: Wind, control latency and unpredictable human movement increase risk, so extra buffer helps.
        ru: Ветер, задержка управления и непредсказуемые движения людей повышают риск — дополнительный запас помогает.
    - id: c
      text:
        lv: Lai nebūtu jāievēro 120 m augstuma limits.
        en: To avoid the 120 m altitude limit.
        ru: Чтобы не соблюдать ограничение 120 м.
    - id: d
      text:
        lv: Jo tas ļauj pilotam izmantot binokli VLOS vietā.
        en: Because it allows the pilot to use binoculars instead of VLOS.
        ru: Потому что это позволяет использовать бинокль вместо VLOS.
  correctOptionId: b
  explanation:
    lv: |
      Minimālie limiti ir juridiskā robeža, nevis “drošākais attālums”. Mainīgos apstākļos lielāks buferis samazina incidentu risku.
    en: |
      Minimum limits are legal boundaries, not “the safest distance”. With changing conditions, a larger buffer reduces incident risk.
    ru: |
      Минимальные ограничения — это юридическая граница, а не «самая безопасная дистанция». При изменяющихся условиях больший запас снижает риск.
  distractorRationales:
    a:
      lv: Virs pulcēšanās lidot nedrīkst neatkarīgi no bufera.
      en: Flying over assemblies is prohibited regardless of buffer.
      ru: Полёт над скоплениями запрещён независимо от «запаса».
    c:
      lv: Buferis neietekmē augstuma limitu.
      en: Buffer does not affect the altitude limit.
      ru: Запас дистанции не отменяет высотное ограничение.
    d:
      lv: VLOS prasa neapbruņotu aci; binokļi nav VLOS aizvietotājs.
      en: VLOS requires the unaided eye; binoculars are not a VLOS substitute.
      ru: VLOS требует невооружённый глаз; бинокль не заменяет VLOS.
  sourceRef: "safety distances | https://droni.caa.gov.lv/darbibas-kategorijas/atverta-kategorija/; keep clear of people"
  difficulty: 1
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/EASA-open-category-rules.pdf — safety distances; keep clear of people
- id: as-031
  stem:
    lv: Kura situācija visbiežāk prasa “GO/NO-GO” lēmumu pirms pacelšanās?
    en: Which situation most often calls for a GO/NO-GO decision before take-off?
    ru: Какая ситуация чаще всего требует решения GO/NO-GO перед взлётом?
  options:
    - id: a
      text:
        lv: Tu maini telefona fona attēlu.
        en: You change your phone wallpaper.
        ru: Меняете обои на телефоне.
    - id: b
      text:
        lv: Tu vēlies labāku kadrējumu video.
        en: You want a better video framing.
        ru: Хочется лучше кадрировать видео.
    - id: c
      text:
        lv: Vējš pastiprinās un brāzmas pārsniedz UAS drošu vadāmību.
        en: Wind increases and gusts exceed safe controllability for the UAS.
        ru: Усиливается ветер и порывы превышают безопасную управляемость БПЛА.
    - id: d
      text:
        lv: Tu aizver aplikāciju, lai taupītu bateriju.
        en: You close an app to save battery.
        ru: Закрываете приложение, чтобы экономить батарею.
  correctOptionId: c
  explanation:
    lv: |
      GO/NO-GO lēmums balstās drošībā: laikapstākļi, cilvēki, vieta, ierobežojumi un UAS spēja droši izpildīt lidojumu.
    en: |
      GO/NO-GO decisions are safety-based: weather, people, site, restrictions, and whether the UAS can be operated safely.
    ru: |
      Решение GO/NO-GO основано на безопасности: погода, люди, место, ограничения и возможность безопасно выполнить полёт.
  distractorRationales:
    a:
      lv: Tas nav saistīts ar lidojuma drošību.
      en: This is unrelated to flight safety.
      ru: Это не связано с безопасностью полёта.
    b:
      lv: Video kvalitāte nav drošības kritērijs; tas nedrīkst dominēt pār riskiem.
      en: Video quality is not a safety criterion; it must not override risk.
      ru: Качество видео не критерий безопасности и не должно перевешивать риск.
    d:
      lv: Aplikāciju aizvēršana var būt noderīga, bet tā nav tipisks GO/NO-GO drošības faktors.
      en: Closing apps may help, but it’s not a typical GO/NO-GO safety driver.
      ru: Закрытие приложений может помочь, но это не типичный фактор GO/NO-GO.
  sourceRef: "meteorology and decision-making basics | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/"
  difficulty: 1
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — meteorology and decision-making basics
- id: as-032
  stem:
    lv: Kāda ir drošības priekšrocība lidojumam ar mazāku ātrumu sarežģītā vidē?
    en: What is a safety advantage of flying slower in a complex environment?
    ru: Какое преимущество для безопасности даёт меньшая скорость в сложной среде?
  options:
    - id: a
      text:
        lv: Tas automātiski padara lidojumu atļautu virs pulcēšanās.
        en: It automatically makes over-assembly flight allowed.
        ru: Это автоматически делает полёт над скоплениями разрешённым.
    - id: b
      text:
        lv: Lielāka iespēja pārkāpt augstuma limitu.
        en: Higher chance to exceed the altitude limit.
        ru: Больший шанс превысить ограничение по высоте.
    - id: c
      text:
        lv: Tas garantē, ka UAS nekad nezaudēs GNSS signālu.
        en: It guarantees the UAS will never lose GNSS.
        ru: Это гарантирует, что БПЛА никогда не потеряет GNSS.
    - id: d
      text:
        lv: Vairāk laika reakcijai un precīzākai vadībai, mazāks sadursmes risks.
        en: More time to react and control precisely, reducing collision risk.
        ru: Больше времени на реакцию и точное управление, меньше риск столкновения.
  correctOptionId: d
  explanation:
    lv: |
      Mazāks ātrums dod lielāku drošības rezervi: īsāks bremzēšanas ceļš, mazākas kļūdas un labāka spēja reaģēt uz šķēršļiem.
    en: |
      Lower speed increases safety margin: shorter stopping distance, fewer control errors and better obstacle avoidance.
    ru: |
      Меньшая скорость увеличивает запас безопасности: короче тормозной путь, меньше ошибок управления и легче избегать препятствий.
  distractorRationales:
    a:
      lv: Juridiskie aizliegumi nav atkarīgi no ātruma.
      en: Legal prohibitions are not speed-dependent.
      ru: Юридические запреты не зависят от скорости.
    b:
      lv: Ātrums tieši nepalielina augstumu; augstums ir atsevišķs parametrs.
      en: Speed doesn’t directly increase altitude; altitude is separate.
      ru: Скорость не увеличивает высоту напрямую; высота — отдельный параметр.
    c:
      lv: GNSS signāls atkarīgs no apstākļiem, nevis no ātruma.
      en: GNSS depends on conditions, not speed.
      ru: GNSS зависит от условий, а не от скорости.
  sourceRef: "safe operating practices | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 1
  cognitiveLevel: apply
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/EASA-QA-UAS-regulations.pdf — safe operating practices
- id: as-033
  stem:
    lv: Kura situācija vislabāk raksturo “cilvēku riska” pieaugumu lidojuma laikā?
    en: Which situation best describes increased “people risk” during a flight?
    ru: Какая ситуация лучше всего описывает рост «риска для людей» во время полёта?
  options:
    - id: a
      text:
        lv: Pie lidojuma zonas pēkšņi parādās bērni vai gājēji, kas nav informēti par operāciju.
        en: Children or pedestrians unexpectedly enter the area and are not informed about the operation.
        ru: В зону полёта неожиданно заходят дети/пешеходы, не проинформированные об операции.
    - id: b
      text:
        lv: Tu nomaini kameras filtrus aplikācijā.
        en: You change camera filters in the app.
        ru: Вы меняете фильтры камеры в приложении.
    - id: c
      text:
        lv: Tu palielini video bitreitu.
        en: You increase the video bitrate.
        ru: Вы увеличиваете битрейт видео.
    - id: d
      text:
        lv: Tu atver karti, lai atzīmētu punktu.
        en: You open the map to mark a point.
        ru: Вы открываете карту, чтобы отметить точку.
  correctOptionId: a
  explanation:
    lv: |
      Neiesaistītas personas palielina risku un var prasīt lidojuma pārtraukšanu vai distances palielināšanu.
    en: |
      Uninvolved people increase risk and may require terminating the flight or increasing separation.
    ru: |
      Не вовлечённые лица повышают риск и могут потребовать прекращения полёта или увеличения дистанции.
  distractorRationales:
    b:
      lv: Tas ir sekundārs iestatījums un nepalielina cilvēku risku pats par sevi.
      en: This is a secondary setting and doesn’t increase people risk by itself.
      ru: Это второстепенная настройка и сама по себе не повышает риск для людей.
    c:
      lv: Bitreits neietekmē drošību tieši.
      en: Bitrate does not directly affect safety.
      ru: Битрейт напрямую не влияет на безопасность.
    d:
      lv: Kartes izmantošana var palīdzēt, bet tā nav tipiska “riska pieauguma” situācija.
      en: Maps can help, but it’s not a typical “risk increase” event.
      ru: Карта может помочь, но это не типичный «рост риска» сам по себе.
  sourceRef: "Open category — uninvolved persons and safety | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 1
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Open category — uninvolved persons and safety
- id: as-034
  stem:
    lv: Ko nozīmē “atbildīga rīcība” (due regard) Open kategorijā praktiski?
    en: What does “due regard” mean in practice in the Open category?
    ru: Что на практике означает «должная осмотрительность» (due regard) в Открытой категории?
  options:
    - id: a
      text:
        lv: Lidot pēc iespējas tuvāk cilvēkiem, lai parādītu kontroli.
        en: Fly as close as possible to people to demonstrate control.
        ru: Летать как можно ближе к людям, чтобы показать контроль.
    - id: b
      text:
        lv: Izvērtēt riskus un rīkoties tā, lai neapdraudētu cilvēkus, īpašumu un citus gaisa telpas lietotājus.
        en: Assess risks and act so you don’t endanger people, property or other airspace users.
        ru: Оценивать риски и действовать так, чтобы не подвергать опасности людей, имущество и других пользователей воздушного пространства.
    - id: c
      text:
        lv: Ignorēt vietējos noteikumus, ja tie traucē filmēšanai.
        en: Ignore local rules if they interfere with filming.
        ru: Игнорировать местные правила, если они мешают съёмке.
    - id: d
      text:
        lv: Paļauties, ka citi vienmēr pamanīs dronu un izvairīsies.
        en: Assume others will always notice the drone and avoid it.
        ru: Считать, что другие всегда заметят дрон и разойдутся.
  correctOptionId: b
  explanation:
    lv: |
      “Due regard” nozīmē aktīvu riska pārvaldību: plānošanu, distances, lidojuma pārtraukšanu, ja nepieciešams, un noteikumu ievērošanu.
    en: |
      “Due regard” means active risk management: planning, separation, terminating when needed, and following rules.
    ru: |
      Due regard — это активное управление риском: планирование, дистанция, прекращение полёта при необходимости и соблюдение правил.
  distractorRationales:
    a:
      lv: Tuvums palielina risku un var pārkāpt noteikumus par cilvēku drošību.
      en: Closeness increases risk and may breach people-safety rules.
      ru: Близость повышает риск и может нарушать требования безопасности людей.
    c:
      lv: Vietējie noteikumi un geozonas ir daļa no drošības prasībām.
      en: Local rules and geo-zones are part of safety requirements.
      ru: Местные правила и геозоны — часть требований безопасности.
    d:
      lv: Atbildība ir pilota pusē; citi var tevi nepamanīt vai rīkoties neparedzami.
      en: Responsibility is on the pilot; others may not notice or act unpredictably.
      ru: Ответственность на пилоте; другие могут не заметить или вести себя непредсказуемо.
  sourceRef: "general obligations | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; due regard"
  difficulty: 2
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/EASA-QA-UAS-regulations.pdf — general obligations; due regard
- id: as-035
  stem:
    lv: Kāpēc ir bīstami paļauties tikai uz kartes aplikāciju, ignorējot reālo vidi?
    en: Why is it dangerous to rely only on a map app while ignoring the real environment?
    ru: Почему опасно полагаться только на карту в приложении, игнорируя реальную обстановку?
  options:
    - id: a
      text:
        lv: Jo karte palielina UAS ātrumu.
        en: Because a map increases UAS speed.
        ru: Потому что карта увеличивает скорость БПЛА.
    - id: b
      text:
        lv: Karte vienmēr ir precīzāka par redzi.
        en: A map is always more accurate than eyesight.
        ru: Карта всегда точнее зрения.
    - id: c
      text:
        lv: Karte var nebūt aktuāla vai pilnīga; šķēršļi un cilvēki jānovērtē uz vietas.
        en: Maps may be outdated/incomplete; obstacles and people must be assessed on-site.
        ru: Карта может быть неактуальной/неполной; препятствия и люди оцениваются на месте.
    - id: d
      text:
        lv: Jo karte automātiski atceļ VLOS prasību.
        en: Because a map automatically removes the VLOS requirement.
        ru: Потому что карта автоматически отменяет требование VLOS.
  correctOptionId: c
  explanation:
    lv: |
      Plānošana ir noderīga, bet drošība ir atkarīga no reālās situācijas: cilvēki, šķēršļi, vējš, signāla apstākļi un negaidīti notikumi.
    en: |
      Planning helps, but safety depends on the real situation: people, obstacles, wind, link conditions and unexpected events.
    ru: |
      Планирование полезно, но безопасность зависит от реальной ситуации: люди, препятствия, ветер, связь и неожиданные события.
  distractorRationales:
    a:
      lv: Karte neietekmē UAS ātrumu.
      en: A map doesn’t affect UAS speed.
      ru: Карта не влияет на скорость БПЛА.
    b:
      lv: Karte neuzrāda dinamiskus riskus (cilvēki, auto), un var būt novecojusi.
      en: Maps don’t show dynamic risks (people, cars) and can be outdated.
      ru: Карта не показывает динамические риски (люди, машины) и может быть устаревшей.
    d:
      lv: VLOS ir juridiska prasība; kartes izmantošana to neatceļ.
      en: VLOS is a legal requirement; using maps doesn’t remove it.
      ru: VLOS — юридическое требование; карта его не отменяет.
  sourceRef: "pilot responsibilities and safe operation | https://droni.caa.gov.lv/darbibas-kategorijas/atverta-kategorija/"
  difficulty: 1
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/EASA-open-category-rules.pdf — pilot responsibilities and safe operation
- id: as-036
  stem:
    lv: Kura pazīme var liecināt par “vēja bīdi” vai bīstamām brāzmām zemu virs zemes?
    en: Which sign can indicate wind shear or dangerous gusts near the ground?
    ru: Какой признак может указывать на сдвиг ветра или опасные порывы у земли?
  options:
    - id: a
      text:
        lv: Vējš ir bīstams tikai virs 120 m.
        en: Wind is dangerous only above 120 m.
        ru: Ветер опасен только выше 120 м.
    - id: b
      text:
        lv: Pilnīgi skaidras debesis vienmēr nozīmē nulles vēju.
        en: Perfectly clear skies always mean zero wind.
        ru: Полностью ясное небо всегда означает нулевой ветер.
    - id: c
      text:
        lv: UAS klase C1 garantē stabilitāti jebkurā vējā.
        en: Class C1 guarantees stability in any wind.
        ru: Класс C1 гарантирует устойчивость при любом ветре.
    - id: d
      text:
        lv: Straujas virziena/ātruma izmaiņas, koku galotņu “raustīšanās”, neprognozējama UAS dreife.
        en: Rapid changes in direction/speed, tree tops “twitching”, unpredictable UAS drift.
        ru: Резкие изменения направления/скорости, «дёргание» верхушек деревьев, непредсказуемый снос БПЛА.
  correctOptionId: d
  explanation:
    lv: |
      Vējš un brāzmas var būt nevienmērīgas, īpaši pie ēkām un reljefa. Pazīmes dabā un UAS uzvedībā palīdz laikus pieņemt NO-GO lēmumu.
    en: |
      Wind and gusts can be uneven, especially near buildings and terrain. Signs in the environment and UAS behaviour help make timely NO-GO decisions.
    ru: |
      Ветер и порывы бывают неравномерными, особенно у зданий и рельефа. Признаки в окружающей среде и поведении БПЛА помогают вовремя принять решение NO-GO.
  distractorRationales:
    a:
      lv: Vējš ir bīstams arī zemā augstumā, īpaši tuvu šķēršļiem un cilvēkiem.
      en: Wind can be dangerous at low altitude too, especially near obstacles and people.
      ru: Ветер опасен и на малой высоте — особенно рядом с препятствиями и людьми.
    b:
      lv: Vējš var būt arī skaidrā laikā; jāskatās uz apstākļiem, ne tikai uz mākoņiem.
      en: Wind can exist in clear weather; assess conditions, not just clouds.
      ru: Ветер бывает и при ясной погоде; оценивайте условия, а не только облака.
    c:
      lv: UAS klase nosaka prasības, bet ne “maģisku” stabilitāti; vējš joprojām ietekmē lidojumu.
      en: Class defines requirements, not “magic” stability; wind still affects flight.
      ru: Класс задаёт требования, но не «магическую» устойчивость; ветер влияет на полёт.
  sourceRef: "meteorology basics | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; wind and gusts"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — meteorology basics; wind and gusts
- id: as-037
  stem:
    lv: Kas ir “drošā nosēšanās zona” ārkārtas situācijā?
    en: What is a “safe landing area” in an emergency?
    ru: Что такое «безопасная зона посадки» при аварийной ситуации?
  options:
    - id: a
      text:
        lv: Brīva vieta prom no cilvēkiem, satiksmes un kritiskām konstrukcijām.
        en: A clear area away from people, traffic and critical structures.
        ru: Свободное место вдали от людей, транспорта и критически важных объектов.
    - id: b
      text:
        lv: Vislabākā vieta ir jebkura cilvēku pūļa vidū, jo tur ir “mīkstāk”.
        en: Best is the middle of a crowd because it’s “softer”.
        ru: Лучшее место — в центре толпы, потому что «мягче».
    - id: c
      text:
        lv: Uz ceļa, lai policija var redzēt incidentu.
        en: On a road so police can see the incident.
        ru: На дороге, чтобы полиция увидела инцидент.
    - id: d
      text:
        lv: Uz elektrolīnijas balsta, jo tas ir augsts.
        en: On a power pole because it’s high.
        ru: На опоре ЛЭП, потому что она высокая.
  correctOptionId: a
  explanation:
    lv: |
      Ārkārtas situācijā mērķis ir samazināt sekas: izvēlēties vietu ar minimālu iespēju savainot cilvēkus vai radīt bojājumus.
    en: |
      In an emergency the goal is to reduce consequences: choose an area that minimizes risk to people and property.
    ru: |
      В аварийной ситуации цель — снизить последствия: выбрать место с минимальным риском для людей и имущества.
  distractorRationales:
    b:
      lv: Pūlis palielina cilvēku risku un ir aizlieguma zona.
      en: A crowd increases people risk and is a prohibited context.
      ru: Толпа увеличивает риск для людей и относится к запрещённым ситуациям.
    c:
      lv: Ceļš nozīmē satiksmes risku un sekundārus negadījumus.
      en: Roads introduce traffic hazards and secondary accidents.
      ru: Дорога — это риск ДТП и вторичных происшествий.
    d:
      lv: Elektrolīnijas ir kritiska infrastruktūra; kontakts var būt bīstams un radīt lielus bojājumus.
      en: Power lines are critical infrastructure; contact is dangerous and can cause major damage.
      ru: ЛЭП — критическая инфраструктура; контакт опасен и может вызвать серьёзный ущерб.
  sourceRef: "emergency landing considerations | https://droni.caa.gov.lv/darbibas-kategorijas/atverta-kategorija/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/EASA-open-category-rules.pdf — emergency landing considerations
- id: as-038
  stem:
    lv: Kura no darbībām vislabāk palīdz novērst “cilvēku faktora” kļūdas lidojumā?
    en: Which action best helps prevent “human factor” errors in flight?
    ru: Какое действие лучше всего помогает предотвращать ошибки «человеческого фактора» в полёте?
  options:
    - id: a
      text:
        lv: Lidot bez pārtraukuma vairākas stundas, lai “iestrādātos”.
        en: Fly for many hours without breaks to “get in the zone”.
        ru: Летать много часов без перерывов, чтобы «войти в поток».
    - id: b
      text:
        lv: Izmantot kontrolsarakstu (checklist) un neuzsākt lidojumu nogurumā vai stresa stāvoklī.
        en: Use a checklist and avoid flying when fatigued or stressed.
        ru: Использовать чек-лист и не летать в состоянии усталости или стресса.
    - id: c
      text:
        lv: Palielināt ātrumu, lai ātrāk pabeigtu lidojumu.
        en: Increase speed to finish faster.
        ru: Увеличить скорость, чтобы быстрее закончить.
    - id: d
      text:
        lv: Atcelt pirmslidojuma pārbaudes, ja tu “jūties pārliecināts”.
        en: Skip pre-flight checks if you “feel confident”.
        ru: Пропустить проверки, если «уверен в себе».
  correctOptionId: b
  explanation:
    lv: |
      Checklists un pašnovērtējums (nogurums/stress) samazina kļūdu iespējamību, īpaši rutīnas lidojumos un mainīgos apstākļos.
    en: |
      Checklists and self-assessment (fatigue/stress) reduce error likelihood, especially in routine flights and changing conditions.
    ru: |
      Чек-листы и самоконтроль (усталость/стресс) снижают вероятность ошибок, особенно при рутинных полётах и изменяющихся условиях.
  distractorRationales:
    a:
      lv: Ilgi lidojumi bez pauzēm palielina nogurumu un kļūdu risku.
      en: Long flights without breaks increase fatigue and error risk.
      ru: Долгие полёты без пауз повышают усталость и риск ошибок.
    c:
      lv: Ātrums bieži samazina drošības rezervi un palielina kļūdu sekas.
      en: Speed often reduces safety margin and increases consequences of errors.
      ru: Скорость уменьшает запас безопасности и увеличивает последствия ошибок.
    d:
      lv: Pārbaudes nav atkarīgas no pārliecības; tās ir process, kas atrod kļūdas, kuras cilvēks nepamana.
      en: Checks aren’t confidence-based; they catch mistakes humans miss.
      ru: Проверки не зависят от «уверенности»; они выявляют ошибки, которые человек не замечает.
  sourceRef: "human factors | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; pilot responsibilities"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — human factors; pilot responsibilities
- id: as-039
  stem:
    lv: Kura izvēle ir pareiza attiecībā uz “drošu attālumu” no cilvēkiem?
    en: Which statement about “safe distance” from people is correct?
    ru: Какое утверждение о «безопасной дистанции» от людей верно?
  options:
    - id: a
      text:
        lv: Vienmēr pietiek ar 1 metru, jo droni ir mazi.
        en: 1 meter is always enough because drones are small.
        ru: Всегда достаточно 1 метра, потому что дроны маленькие.
    - id: b
      text:
        lv: Ja noteikumos nav skaitļa, tad attālums nav svarīgs.
        en: If rules don’t give a number, distance doesn’t matter.
        ru: Если в правилах нет числа, дистанция не важна.
    - id: c
      text:
        lv: “Drošs” attālums nav tikai minimums noteikumos — tas jāpielāgo apstākļiem (vējš, masa, vide).
        en: “Safe” distance isn’t only the legal minimum; it must be adapted to conditions (wind, mass, environment).
        ru: «Безопасная» дистанция — это не только юридический минимум; её нужно адаптировать к условиям (ветер, масса, среда).
    - id: d
      text:
        lv: Drošs attālums ir tikai horizontāli; vertikālais nav svarīgs.
        en: Safe distance is only horizontal; vertical separation doesn’t matter.
        ru: Безопасная дистанция только по горизонтали; вертикаль не важна.
  correctOptionId: c
  explanation:
    lv: |
      Praksē drošība ir atkarīga no apstākļiem. Pat ja juridiski ir atļauts, pilotam jāizvēlas attālums, kas samazina risku.
    en: |
      In practice safety depends on conditions. Even if something is legally allowed, the pilot must choose separation that reduces risk.
    ru: |
      На практике безопасность зависит от условий. Даже если что-то юридически разрешено, пилот выбирает дистанцию, снижающую риск.
  distractorRationales:
    a:
      lv: 1 m var būt nepietiekams (propwash, kļūda, bremzēšana). “Vienmēr” ir nepareizi.
      en: 1 m may be insufficient (propwash, error, braking). “Always” is wrong.
      ru: 1 м может быть недостаточно (поток винтов, ошибка, торможение). «Всегда» неверно.
    b:
      lv: Noteikumi apraksta principi (“neapdraudēt”), un attālums ir daļa no riska pārvaldības.
      en: Rules define principles (“don’t endanger”); distance is part of risk management.
      ru: Правила задают принципы («не подвергать опасности»); дистанция — часть управления риском.
    d:
      lv: "Separācija ir 3D: gan horizontāli, gan vertikāli, it īpaši pie šķēršļiem."
      en: "Separation is 3D: horizontal and vertical, especially near obstacles."
      ru: "Разделение трёхмерное: и по горизонтали, и по вертикали, особенно у препятствий."
  sourceRef: "keep safe distance | https://droni.caa.gov.lv/darbibas-kategorijas/atverta-kategorija/; due regard"
  difficulty: 2
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/EASA-open-category-rules.pdf — keep safe distance; due regard
- id: as-040
  stem:
    lv: Kāds ir labs veids, kā samazināt risku, lidojot tuvu kokiem vai ēkām?
    en: What is a good way to reduce risk when flying near trees or buildings?
    ru: Какой хороший способ снизить риск при полёте рядом с деревьями или зданиями?
  options:
    - id: a
      text:
        lv: Izslēgt brīdinājumus par šķēršļiem, lai netraucē.
        en: Disable obstacle warnings so they don’t distract you.
        ru: Отключить предупреждения о препятствиях, чтобы не мешали.
    - id: b
      text:
        lv: Lidot pēc iespējas ātrāk, lai “izlidotu cauri” riskam.
        en: Fly as fast as possible to “punch through” the risk.
        ru: Летать как можно быстрее, чтобы «проскочить» риск.
    - id: c
      text:
        lv: Lidot tikai augstāk par 120 m.
        en: Fly only above 120 m.
        ru: Летать только выше 120 м.
    - id: d
      text:
        lv: Uzturēt lielāku distanci, lidot lēnāk un izvairīties no turbulences pie šķēršļiem.
        en: Keep more separation, fly slower, and account for turbulence near obstacles.
        ru: Держать большую дистанцию, летать медленнее и учитывать турбулентность у препятствий.
  correctOptionId: d
  explanation:
    lv: |
      Šķēršļi rada turbulenci, signāla ēnas un “propwash” efektus. Lēnāks lidojums un distance dod vairāk laika korekcijām un samazina sadursmes risku.
    en: |
      Obstacles create turbulence, signal shadows and propwash effects. Slower flight and separation give more time for corrections and reduce collision risk.
    ru: |
      Препятствия создают турбулентность, «тени» связи и эффекты propwash. Более медленный полёт и дистанция дают время на корректировки и снижают риск столкновения.
  distractorRationales:
    a:
      lv: Brīdinājumi palīdz, bet pat ar tiem vajadzīga distance un pareiza lidošanas taktika.
      en: Warnings help, but you still need separation and good technique.
      ru: Предупреждения помогают, но всё равно нужна дистанция и правильная тактика.
    b:
      lv: Liels ātrums samazina reakcijas laiku un palielina kļūdu sekas.
      en: High speed reduces reaction time and increases consequences of mistakes.
      ru: Большая скорость уменьшает время реакции и увеличивает последствия ошибок.
    c:
      lv: 120 m limits ir maksimums, nevis drošības rīks; turklāt tas var būt pārkāpums.
      en: 120 m is a maximum, not a safety tool; exceeding it is non-compliant.
      ru: 120 м — максимум, а не «инструмент безопасности»; превышение — нарушение.
  sourceRef: "practical safety | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; obstacles and wind effects"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — practical safety; obstacles and wind effects
- id: as-041
  stem:
    lv: Tu lido ar C0 UAS (190 g) virs publiska parka. Tieši zem tevis pikniku rīko 30 cilvēku grupa. Vai tas ir atļauts?
    en: You are flying a C0 drone (190 g) over a public park. A group of 30 people is having a picnic directly below you. Is this permitted?
    ru: Ты летишь на C0-дроне (190 г) над общественным парком. Прямо под тобой группа из 30 человек устроила пикник. Это разрешено?
  options:
    - id: a
      text:
        lv: Nē — pulcēšanās ir aizliegta visās Atvērtās apakškategorijās.
        en: No — assemblies of people are forbidden in all Open sub-categories.
        ru: Нет — полёт над скоплениями людей запрещён во всех подкатегориях Open.
    - id: b
      text:
        lv: Jā — parks ir publiska atklāta vieta, ne kontrolēta zona.
        en: Yes — the park is a public open space, not a controlled area.
        ru: Да — парк является открытым общественным местом, а не контролируемой зоной.
    - id: c
      text:
        lv: Jā — C0 zem 250 g drīkst lidot virs atsevišķām personām.
        en: Yes — C0 drones under 250 g may fly over individuals.
        ru: Да — C0 до 250 г может летать над отдельными людьми.
    - id: d
      text:
        lv: Jā — ja lidojums ir zem 30 m.
        en: Yes — if the flight is below 30 m.
        ru: Да — если полёт ниже 30 м.
  correctOptionId: a
  explanation:
    lv: Pulcēšanās noteikums (nelido virs cilvēku saiešanās) attiecas uz katru Atvērto apakškategoriju, ieskaitot A1 ar C0 UAS. 250 g izņēmums ļauj pārlidot tikai atsevišķas personas — ne pulcēšanos.
    en: The assembly rule (no overflight of gatherings of people) applies to every Open sub-category, including A1 with C0 drones. The 250 g exemption allows overflight of individuals only — not assemblies.
    ru: Правило о скоплениях людей действует во всех подкатегориях Open, включая A1 с C0-дроном. Исключение до 250 г допускает пролёт над отдельными людьми, но не над скоплением.
  distractorRationales:
    b:
      lv: Vietas raksturs pulcēšanās noteikumu neatceļ.
      en: The type of space does not override the assembly rule.
      ru: Тип места не отменяет запрет на полёт над скоплением людей.
    c:
      lv: C0 ļauj pārlidot atsevišķas personas, ne pulcēšanos. Pikniku grupa ir pulcēšanās.
      en: C0 allows overflight of individuals, not assemblies. A picnic group is an assembly.
      ru: C0 может пролетать над отдельными людьми, но не над скоплениями. Группа на пикнике — это скопление.
    d:
      lv: Augstums nerada izņēmumu pulcēšanās noteikumam.
      en: Altitude does not create an exception to the assembly rule.
      ru: Высота полёта не создаёт исключения из правила о скоплениях людей.
  sourceRef: "air safety and VLOS principles | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — air safety and VLOS principles
- id: as-042
  stem:
    lv: Lidojums A3 60 m augstumā. Kāds ir minimālais horizontālais attālums līdz nepiederošām personām?
    en: Flying in A3 at 60 m altitude. What is the minimum horizontal distance you must keep from uninvolved persons?
    ru: Полёт в A3 на высоте 60 м. Какую минимальную горизонтальную дистанцию нужно держать от посторонних лиц?
  options:
    - id: a
      text:
        lv: 30 m — fiksētais A3 minimums.
        en: 30 m — the fixed A3 minimum.
        ru: 30 м — фиксированный минимум A3.
    - id: b
      text:
        lv: 60 m — 1:1 noteikums vienāds ar lidojuma augstumu.
        en: 60 m — the 1:1 rule equals flight altitude.
        ru: 60 м — правило 1:1 равно высоте полёта.
    - id: c
      text:
        lv: 120 m — divkāršs augstums drošībai.
        en: 120 m — double the altitude for safety.
        ru: 120 м — двойная высота для безопасности.
    - id: d
      text:
        lv: 150 m — tāds pats kā attālums līdz dzīvojamai zonai.
        en: 150 m — same as the residential area distance.
        ru: 150 м — как дистанция до жилой зоны.
  correctOptionId: b
  explanation:
    lv: 1:1 noteikums prasa horizontālo attālumu ≥ lidojuma augstumam. Pie 60 m tas nozīmē ≥ 60 m. 30 m ir grīda, kas darbojas ļoti zemā augstumā (piem., pie 10 m augstuma tev joprojām vajadzīgi 30 m, nevis 10 m).
    en: The 1:1 rule requires horizontal distance ≥ flight altitude. At 60 m, that means ≥ 60 m. The 30 m is a floor that applies when flying very low (e.g. at 10 m altitude, you still need 30 m, not 10 m).
    ru: Правило 1:1 требует горизонтальную дистанцию не меньше высоты полёта. При 60 м это означает минимум 60 м. 30 м — нижняя граница, которая работает на очень малых высотах (например, при 10 м всё равно нужно 30 м, а не 10 м).
  distractorRationales:
    a:
      lv: 30 m ir minimālā grīda, bet 60 m augstumā strādā 1:1, tāpēc vajadzīgi 60 m.
      en: 30 m is the minimum floor, but 1:1 applies at 60 m altitude, making the required distance 60 m.
      ru: 30 м — минимальная нижняя граница, но при высоте 60 м действует правило 1:1, поэтому нужно 60 м.
    c:
      lv: Noteikums ir 1:1, ne 2:1.
      en: The rule is 1:1, not 2:1.
      ru: Правило — 1:1, а не 2:1.
    d:
      lv: 150 m ir atsevišķs noteikums attālumam līdz apdzīvotām zonām — ne līdz atsevišķiem cilvēkiem.
      en: 150 m is a separate rule for distance from inhabited areas — not from individuals.
      ru: 150 м — отдельное правило для дистанции до жилых, коммерческих, промышленных или рекреационных зон, а не до отдельных людей.
  sourceRef: "air safety and VLOS principles | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — air safety and VLOS principles
- id: as-043
  stem:
    lv: Kāda ir labākā pirmā operatīvā reakcija uz skaidri vājinātu vadības vai video saiti?
    en: What is the best first operational response to a clearly weakening control or video link?
    ru: Какой лучший первый operational response на явное ослабление канала управления или видео?
  options:
    - id: a
      text:
        lv: Turpināt filmēt un skatīties, vai kļūst sliktāk.
        en: Keep filming while monitoring whether it gets worse.
        ru: Продолжать съёмку и смотреть, станет ли хуже.
    - id: b
      text:
        lv: Lidot tālāk, lai atrastu labāku kadru.
        en: Fly farther away to find a better camera angle.
        ru: Улететь дальше ради лучшего кадра.
    - id: c
      text:
        lv: Pārtraukt misijas uzdevumu, vienkāršot lidaparāta stāvokli un gatavoties nolaišanai.
        en: Stop the mission task, simplify the aircraft position, and prepare to land.
        ru: Остановить задачу миссии, упростить положение аппарата и готовиться к посадке.
    - id: d
      text:
        lv: Ignorēt brīdinājumus, ja baterija un augstums vēl izskatās normāli.
        en: Ignore the warnings if battery and altitude still look normal.
        ru: Игнорировать предупреждения, если батарея и высота пока выглядят нормально.
  correctOptionId: c
  explanation:
    lv: "Pareizā atbilde ir agrīna riska samazināšana: pārtraukt nebūtiskos uzdevumus, ieņemt vienkāršāku atgūšanas pozīciju un gatavoties nolaišanai, pirms problēma kļūst nopietnāka."
    en: "The correct response is early risk reduction: stop non-essential tasks, bring the aircraft into a simpler recovery position, and prepare to land before the problem escalates."
    ru: "Правильный ответ — раннее снижение риска: остановить несущественные задачи, перевести аппарат в более простое положение для восстановления и готовиться к посадке до эскалации проблемы."
  distractorRationales:
    a:
      lv: Gaidīšana un darba turpināšana patērē atlikušo drošības rezervi.
      en: Waiting while continuing the task consumes the remaining safety margin.
      ru: Ожидание при продолжающейся задаче сжигает запас безопасности.
    b:
      lv: Palielināt attālumu nozīmē padarīt problēmu grūtāku, nevis vieglāku.
      en: Increasing range makes the problem harder, not easier.
      ru: Увеличение дистанции делает проблему сложнее, а не проще.
    d:
      lv: Normāla baterija un augstums nepierāda, ka vadības ķēde ir vesela.
      en: Normal battery and altitude do not prove the control chain is healthy.
      ru: Нормальные батарея и высота не доказывают, что канал управления остаётся здоровым.
  sourceRef: "remote pilot responsibilities and emergency handling | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; practical UAS emergency procedures | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: "docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — remote pilot responsibilities and emergency handling; docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — practical UAS emergency procedures"
- id: as-044
  stem:
    lv: Kad return-to-home ir slikts noklusējuma risinājums?
    en: When is return-to-home a poor default response?
    ru: Когда return-to-home является плохим решением по умолчанию?
  options:
    - id: a
      text:
        lv: Kad baterija ir virs 50%.
        en: When battery level is above 50%.
        ru: Когда батарея выше 50%.
    - id: b
      text:
        lv: Kad lidaparāts jau ir tuvu un stabili virs drošas nolaišanās vietas.
        en: When the aircraft is already close and stable over a safe landing area.
        ru: Когда аппарат уже рядом и стабилен над безопасной площадкой посадки.
    - id: c
      text:
        lv: Kad pilots saglabā VLOS.
        en: When the pilot is in VLOS.
        ru: Когда пилот сохраняет VLOS.
    - id: d
      text:
        lv: Kad GNSS vai home point uzticamība ir apšaubāma un ceļā var būt šķēršļi.
        en: When GNSS or home-point reliability is uncertain and obstacles may be involved.
        ru: Когда надёжность GNSS или home point сомнительна, а по маршруту могут быть препятствия.
  correctOptionId: d
  explanation:
    lv: RTH balstās uz uzticamu pozicionēšanu, pareizu home point un drošu maršrutu. Ja šie pieņēmumi ir vāji, akla paļaušanās uz automātiku var ārkārtas situāciju tikai saasināt.
    en: RTH depends on reliable positioning, a correct home point, and an obstacle-safe path. If those assumptions are weak, blind trust in automation can worsen the emergency.
    ru: RTH зависит от надёжного позиционирования, правильного home point и безопасного маршрута. Если эти предпосылки слабы, слепая вера в автоматику может только ухудшить аварийную ситуацию.
  distractorRationales:
    a:
      lv: Baterijas procents nav galvenais iemesls, kāpēc RTH šeit kļūst nedrošs.
      en: Battery percentage is not the main reason RTH becomes unsafe in this context.
      ru: Процент батареи здесь не главная причина, по которой RTH становится опасным.
    b:
      lv: Ja lidaparāts jau ir tuvu drošai vietai, tieša nolaišanās bieži ir labāka par papildu automātiku.
      en: If the aircraft is already close to a safe area, landing directly is often better than invoking more automation.
      ru: Если аппарат уже рядом с безопасной зоной, прямая посадка часто лучше лишней автоматики.
    c:
      lv: VLOS vien nenozīmē, ka RTH ir slikts; problēma ir datu kvalitāte un maršruta drošums.
      en: VLOS alone does not make RTH bad; the issue is data quality and route safety.
      ru: Сам по себе VLOS не делает RTH плохим; вопрос в качестве данных и безопасности маршрута.
  sourceRef: "remote pilot responsibilities and emergency handling | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; practical UAS emergency procedures | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: "docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — remote pilot responsibilities and emergency handling; docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — practical UAS emergency procedures"
- id: as-045
  stem:
    lv: Kāds ir drošākais pirmais princips, kad pie darbības zonas parādās pilotējams gaisa kuģis?
    en: What is the safest first principle when a manned aircraft appears near your operating area?
    ru: Какой самый безопасный первый принцип, когда рядом с зоной полёта появляется пилотируемый борт?
  options:
    - id: a
      text:
        lv: "Nekavējoties samazināt konfliktu: samazināt augstumu, atdalīties un nolaisties, ja ir šaubas."
        en: "Reduce conflict: descend, separate, and land if there is any doubt."
        ru: "Сразу уменьшить конфликт: снизиться, создать разделение и сесть при любом сомнении."
    - id: b
      text:
        lv: Kāpt augstāk, lai dronu būtu vieglāk pamanīt.
        en: Climb to make your drone easier to spot.
        ru: Набрать высоту, чтобы дрон было легче заметить.
    - id: c
      text:
        lv: Turpināt filmēt un vērot karti, līdz gaisa kuģis pietuvojas.
        en: Keep filming and monitor the map until the aircraft gets closer.
        ru: Продолжать съёмку и следить по карте, пока он не подойдёт ближе.
    - id: d
      text:
        lv: Pieņemt, ka otram pilotam vienmēr būs labāka situācijas apzināšanās.
        en: Assume the other pilot will always have better awareness than you.
        ru: Предположить, что другой пилот точно видит ситуацию лучше.
  correctOptionId: a
  explanation:
    lv: "Drošā atbilde ir nekavējoties samazināt konfliktu: pārtraukt nebūtisko, samazināt augstumu, radīt separāciju un nolaisties, ja saglabājas nenoteiktība."
    en: "The safe response is to reduce conflict immediately: stop non-essential tasks, reduce altitude, create separation, and land if uncertainty remains."
    ru: "Безопасный ответ — сразу уменьшать конфликт: прекратить второстепенные действия, снизить высоту, создать разделение и садиться, если остаётся неопределённость."
  distractorRationales:
    b:
      lv: Kāpšana bieži palielina konflikta potenciālu un pasliktina separāciju.
      en: Climbing usually increases conflict potential and may worsen visibility and separation.
      ru: Набор высоты часто ухудшает разделение и увеличивает конфликтный потенциал.
    c:
      lv: Vērošana viena pati nav pietiekama, ja tā aizkavē riska samazināšanu.
      en: Monitoring is not enough if it delays the risk-reduction action.
      ru: Наблюдение само по себе недостаточно, если оно задерживает снижение риска.
    d:
      lv: Drošību nevar balstīt uz cita pilota situācijas apzināšanos.
      en: You cannot outsource your safety case to the other pilot's awareness.
      ru: Нельзя строить свою безопасность на ситуационной осведомлённости другого пилота.
  sourceRef: "Open-category pilot responsibilities and conflict avoidance | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; practical safety guidance | https://droni.caa.gov.lv/darbibas-kategorijas/atverta-kategorija/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Open-category pilot responsibilities and conflict avoidance; docs/knowledge/training-guides/EASA-open-category-rules.pdf — practical safety guidance
- id: as-046
  stem:
    lv: Kāpēc kāpšana augstāk, lai “būtu redzamāks”, parasti ir slikta reakcija?
    en: Why is climbing to be 'more visible' usually a poor response?
    ru: Почему подъём выше, чтобы “быть заметнее”, обычно плохая реакция?
  options:
    - id: a
      text:
        lv: Tāpēc, ka helikopteriem juridiski vienmēr jānovēršas pirmajiem.
        en: Because helicopters are legally required to turn away first.
        ru: Потому что вертолёты юридически обязаны уступать первыми.
    - id: b
      text:
        lv: Tāpēc, ka tas var novest UAS tuvāk konflikta trajektorijai, nevis tālāk no tās.
        en: Because it can place the UAS closer to the conflict path instead of farther from it.
        ru: Потому что это может привести UAS ближе к траектории конфликта, а не дальше от неё.
    - id: c
      text:
        lv: Tāpēc, ka droni nedrīkst mainīt augstumu pēc pacelšanās.
        en: Because drones may never change altitude once airborne.
        ru: Потому что дроны вообще не могут менять высоту после взлёта.
    - id: d
      text:
        lv: Tāpēc, ka citus gaisa kuģus drīkst meklēt tikai novērotājs.
        en: Because only observers are allowed to look for other aircraft.
        ru: Потому что искать другие ВС имеет право только наблюдатель.
  correctOptionId: b
  explanation:
    lv: Kāpšana bieži palielina risku, jo UAS nonāk tuvāk tai vertikālajai joslai, kur konflikts var attīstīties. Augstuma samazināšana parasti vienkāršo separāciju.
    en: Climbing often increases the risk by moving the UAS toward the vertical band where the conflict may develop. Descending usually simplifies separation.
    ru: Набор высоты часто повышает риск, потому что UAS попадает ближе к вертикальной зоне возможного конфликта. Снижение обычно упрощает разделение.
  distractorRationales:
    a:
      lv: Drošākā pieeja nav pieņemt, ka otrs gaisa kuģis dos ceļu.
      en: The safer assumption is not that the other aircraft will yield.
      ru: Безопаснее не предполагать, что другой борт уступит или успеет заметить тебя.
    c:
      lv: Droni drīkst mainīt augstumu; jautājums ir, vai izvēlētā darbība samazina risku.
      en: Drones can change altitude; the issue is whether the chosen action reduces risk.
      ru: Дроны могут менять высоту; вопрос в том, уменьшает ли выбранное действие риск.
    d:
      lv: Novērotājs palīdz, bet par drošu konflikta reakciju joprojām atbild pilots.
      en: Observers help, but the pilot remains responsible for safe conflict response.
      ru: Наблюдатель помогает, но ответственность за реакцию остаётся на пилоте.
  sourceRef: "Open-category pilot responsibilities and conflict avoidance | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; practical safety guidance | https://droni.caa.gov.lv/darbibas-kategorijas/atverta-kategorija/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Open-category pilot responsibilities and conflict avoidance; docs/knowledge/training-guides/EASA-open-category-rules.pdf — practical safety guidance
- id: as-047
  stem:
    lv: Ko Atvērtajā kategorijā nozīmē VLOS?
    en: What does VLOS mean in the Open category?
    ru: Что означает VLOS в Открытой категории?
  options:
    - id: a
      text:
        lv: Pilots zina UAS atrašanās vietu pēc telefona kartes.
        en: The pilot knows the UAS position from a phone map.
        ru: Пилот знает местоположение аппарата по карте на телефоне.
    - id: b
      text:
        lv: Pilots seko gaisa kuģim caur FPV brillēm.
        en: The pilot follows the aircraft through FPV goggles.
        ru: Пилот следит за аппаратом через FPV-очки.
    - id: c
      text:
        lv: Pilots redz gaisa kuģi bez palīglīdzekļiem (briles atļautas).
        en: The pilot sees the aircraft unaided (corrective glasses are allowed).
        ru: Пилот видит аппарат без вспомогательных средств (очки для коррекции допустимы).
    - id: d
      text:
        lv: Pilots seko dronam ar binokli.
        en: The pilot tracks the drone with binoculars.
        ru: Пилот следит за дроном через бинокль.
  correctOptionId: c
  explanation:
    lv: VLOS prasa, lai pilots redzētu gaisa kuģi neapbruņotu aci un spētu noteikt tā stāvokli un kustības virzienu. Briles atļautas, binokļi un ekrāni — nē.
    en: VLOS requires the pilot to see the aircraft with the unaided eye and to determine its attitude and direction. Corrective glasses are allowed; binoculars and screens are not.
    ru: VLOS требует, чтобы пилот видел аппарат невооружённым глазом и мог определить его положение и направление движения. Очки для коррекции допустимы, бинокли и экраны — нет.
  distractorRationales:
    a:
      lv: Atrašanās vietas zināšana kartē nav tas pats, kas redzēt stāvokli un virzienu gaisā.
      en: Knowing position on a map is not the same as seeing attitude and direction in the air.
      ru: Знание положения на карте не равно видеть положение и направление в воздухе.
    b:
      lv: FPV brilles aizvieto skatu uz gaisa kuģi ar kameras attēlu — tas nav VLOS.
      en: FPV goggles replace the view of the aircraft with a camera feed — that is not VLOS.
      ru: FPV-очки заменяют вид аппарата на изображение с камеры — это не VLOS.
    d:
      lv: Binokļi ir tieši izslēgti — noteikums prasa neapbruņotu aci.
      en: Binoculars are explicitly excluded — the rule is unaided vision.
      ru: Бинокли явно исключены — правило требует невооружённого глаза.
  sourceRef: "air safety and VLOS principles | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — air safety and VLOS principles
- id: as-048
  stem:
    lv: Tu vēlies Atvērtajā kategorijā lidot ar FPV brillēm. Kas ir vienīgais legālais veids?
    en: You want to fly FPV in the Open category. What's the only legal way?
    ru: Ты хочешь летать в Открытой категории в FPV-очках. Какой единственный законный способ?
  options:
    - id: a
      text:
        lv: Izmantot kvalitatīvu video saiti ar latentumu zem 50 ms.
        en: Use a high-quality video link with sub-50 ms latency.
        ru: Использовать качественный видеоканал с задержкой ниже 50 мс.
    - id: b
      text:
        lv: Lidot tikai virs sava zemesgabala.
        en: Fly only over your own land.
        ru: Летать только над собственным участком.
    - id: c
      text:
        lv: Novērotājs ar raciju 100 m attālumā.
        en: Have an observer on a radio 100 m away.
        ru: Наблюдатель с рацией на расстоянии 100 м.
    - id: d
      text:
        lv: Blakus stāv novērotājs ar tiešu balss kontaktu, kas vēro gaisa telpu.
        en: Have an observer next to you, in direct voice contact, watching the airspace.
        ru: Рядом стоит наблюдатель с прямым голосовым контактом, который следит за воздухом.
  correctOptionId: d
  explanation:
    lv: Atvērtajā kategorijā FPV ir atļauta tikai tad, ja UAS novērotājs stāv blakus pilotam, ar tiešu balss kontaktu, un vēro apkārtējo gaisa telpu.
    en: FPV is allowed in the Open category only if a UAS observer stands next to the pilot, in direct voice contact, and keeps the surrounding airspace under watch.
    ru: FPV в Открытой категории разрешён только если рядом с пилотом стоит наблюдатель UAS, имеется прямой голосовой контакт, и наблюдатель следит за окружающим воздухом.
  distractorRationales:
    a:
      lv: Latentums noteikumu nemaina — pilots joprojām neredz apkārtējo gaisu.
      en: Latency does not change the rule — the pilot still cannot see the airspace around the aircraft.
      ru: Задержка не меняет правила — пилот всё равно не видит окружающий воздух.
    b:
      lv: Sava zeme noteikumu par VLOS / FPV nemaina.
      en: The land you own does not change the VLOS / FPV rule.
      ru: Собственная земля не меняет правило о VLOS / FPV.
    c:
      lv: Radio nav tiešs balss kontakts; noteikums prasa novērotāju blakus pilotam.
      en: Radio links are not direct voice contact; the rule requires the observer next to the pilot.
      ru: Рация — это не прямой голосовой контакт; правило требует наблюдателя рядом.
  sourceRef: "air safety and VLOS principles | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — air safety and VLOS principles
- id: as-049
  stem:
    lv: Dūmakainā dienā tavs C1 drons 250 m attālumā kļūst par punktu. Tu redzi punktu, bet vairs ne stāvokli. Vai esi VLOS?
    en: On a hazy day your C1 drone becomes a dot at 250 m. You can see the dot but no longer its attitude. Are you in VLOS?
    ru: В лёгкой дымке твой дрон C1 на 250 м превратился в точку. Точку видишь, положение — уже нет. Ты в VLOS?
  options:
    - id: a
      text:
        lv: Nē — VLOS prasa redzēt stāvokli un virzienu, ne tikai klātbūtni.
        en: No — VLOS requires you to see attitude and direction, not just presence.
        ru: Нет — VLOS требует видеть положение и направление, а не только присутствие.
    - id: b
      text:
        lv: Jā — C1 ir atļauts līdz 500 m.
        en: Yes — C1 is allowed up to 500 m.
        ru: Да — для C1 разрешено до 500 м.
    - id: c
      text:
        lv: Jā — punkts redzams, ar to pietiek.
        en: Yes — you can see the dot, that's enough.
        ru: Да — точку видно, этого достаточно.
    - id: d
      text:
        lv: Jā, ja tiek atvērts kameras skats.
        en: Yes, if you keep the camera feed open.
        ru: Да, если включить камеру.
  correctOptionId: a
  explanation:
    lv: VLOS nav par to, ka apstiprini gaisa kuģa esamību — tā prasa spēju noteikt stāvokli un virzienu. Tiklīdz tas nav iespējams, operācija vairs nav Atvērtajā kategorijā.
    en: VLOS is not about confirming the aircraft exists — it requires being able to detect attitude and direction. The moment you can't, the operation is no longer in the Open category.
    ru: VLOS — это не подтверждение существования аппарата, а способность определять его положение и направление. Как только это невозможно, полёт уже не в Открытой категории.
  distractorRationales:
    b:
      lv: Regulā nav fiksēta VLOS metru robeža; noteikums ir funkcionāls, ne ar mērvienībām.
      en: There is no fixed VLOS distance in the regulation; the rule is functional, not metric.
      ru: В регламенте нет фиксированной метровой границы VLOS; правило функциональное, а не метровое.
    c:
      lv: Punkts nav pietiekams — tev vajadzīga spēja reaģēt, bet tā prasa redzēt stāvokli.
      en: Seeing a dot is not enough — you need to be able to react, which requires attitude.
      ru: Видеть точку недостаточно — нужна способность реагировать, а для этого нужно видеть положение.
    d:
      lv: Kameras skats ir FPV — tas neatjauno VLOS.
      en: Camera feed is FPV — it does not restore VLOS.
      ru: Камера — это FPV, и она не возвращает VLOS.
  sourceRef: "air safety and VLOS principles | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — air safety and VLOS principles
