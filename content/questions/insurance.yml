- id: in-037
  stem:
    lv: Pilots pēc festivāla Siguldā lido alkohola ietekmē un ietriecas stāvvietā esošā auto. Kāds ir apdrošināšanas risks?
    en: After a festival in Sigulda, a pilot flies under the influence of alcohol and hits a parked car. What is the insurance risk?
    ru: После фестиваля в Сигулде пилот летит под воздействием алкоголя и сталкивается с припаркованным авто. Какой страховой риск?
  options:
    - id: a
      text:
        lv: Apdrošinātājs var piemērot izņēmumus vai regresa prasību rupji nedrošas rīcības dēļ.
        en: The insurer may apply exclusions or recovery because of grossly unsafe conduct.
        ru: Страховщик может применить исключения или регресс из-за грубо небезопасного поведения.
    - id: b
      text:
        lv: Alkohols palielina seguma limitu, jo risks bija lielāks.
        en: Alcohol increases the coverage limit because the risk was higher.
        ru: Алкоголь увеличивает лимит покрытия, потому что риск был выше.
    - id: c
      text:
        lv: Polise vienmēr sedz visu, ja cietis tikai auto.
        en: The policy always covers everything if only a car was damaged.
        ru: Полис всегда покрывает всё, если повреждён только автомобиль.
    - id: d
      text:
        lv: Tas ir tikai cilvēkfaktoru jautājums, nevis apdrošināšana.
        en: It is only a human-performance issue, not insurance.
        ru: Это только человеческий фактор, не страхование.
  correctOptionId: a
  explanation:
    lv: Rupji nedroša vai aizliegta rīcība var radīt seguma izņēmumu un personisku finansiālu risku operatoram.
    en: Grossly unsafe or prohibited conduct can trigger exclusions and personal financial exposure for the operator.
    ru: Грубо небезопасное или запрещённое поведение может вызвать исключения и личный финансовый риск оператора.
