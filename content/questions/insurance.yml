- id: in-001
  stem:
    lv: Kāds ir minimālais civiltiesiskās apdrošināšanas segums Latvijā A1 (C1) lidojumiem?
    en: What is the minimum third-party liability cover in Latvia for A1 (C1) flights?
    ru: Каков минимум страхования гражданской ответственности в Латвии для полётов A1 (C1)?
  options:
    - id: a
      text:
        lv: 50 000 EUR.
        en: €50 000.
        ru: 50 000 EUR.
    - id: b
      text:
        lv: 1 000 EUR.
        en: €1 000.
        ru: 1 000 EUR.
    - id: c
      text:
        lv: Nav obligāts.
        en: Not required.
        ru: Не обязателен.
  correctOptionId: a
  explanation:
    lv: >
      MK noteikumi Nr. 447 nosaka 50 000 EUR minimumu A1 (C1), A2 un A3
      līdz 20 kg masai. Bezklasveida < 250 g (C0) lidojumiem
      apdrošināšana nav obligāta.
    en: >
      Cabinet Reg. No. 447 sets a €50 000 minimum for A1 (C1), A2 and
      A3 up to 20 kg. C0 (< 250 g) flights are exempt.
    ru: >
      Правила КМ № 447 устанавливают минимум 50 000 EUR для A1 (C1), A2
      и A3 до 20 кг. C0 (< 250 г) от обязательного страхования
      освобождён.
  sourceRef: "MK noteikumi Nr. 447 (10.07.2018)"
  difficulty: 2

- id: in-002
  stem:
    lv: Vai obligātā apdrošināšana sedz paša UAS bojājumus (hull)?
    en: Does mandatory insurance cover damage to the UAS itself (hull)?
    ru: Покрывает ли обязательное страхование ущерб самому UAS (hull)?
  options:
    - id: a
      text:
        lv: Nē — obligātā apdrošināšana sedz tikai trešo personu zaudējumus.
        en: No — mandatory insurance covers only third-party loss.
        ru: Нет — обязательное страхование покрывает только третьих лиц.
    - id: b
      text:
        lv: Jā, vienmēr.
        en: Yes, always.
        ru: Да, всегда.
    - id: c
      text:
        lv: Tikai komerciālajiem operatoriem.
        en: Only for commercial operators.
        ru: Только для коммерческих операторов.
  correctOptionId: a
  explanation:
    lv: >
      Obligātā polise sedz trešo personu dzīvības, veselības un mantas
      zaudējumus. Paša UAS bojājumi ir brīvprātīgs hull-segums.
    en: >
      The mandatory policy covers third-party bodily and property loss.
      Damage to the UAS itself is voluntary hull cover.
    ru: >
      Обязательный полис покрывает вред жизни/здоровью/имуществу третьих
      лиц. Ущерб самому UAS — добровольное hull-страхование.
  sourceRef: "MK noteikumi Nr. 447; Reg (EC) 785/2004"
  difficulty: 2

- id: in-003
  stem:
    lv: Kuram UAS lidojumam Latvijā apdrošināšana NAV obligāta?
    en: For which UAS flight in Latvia is insurance NOT mandatory?
    ru: Для какого полёта UAS в Латвии страхование НЕ обязательно?
  options:
    - id: a
      text:
        lv: C0 (< 250 g) atpūtas lidojums.
        en: C0 (< 250 g) recreational flight.
        ru: Развлекательный полёт C0 (< 250 г).
    - id: b
      text:
        lv: A2 ar C2 dronu.
        en: A2 with a C2 drone.
        ru: A2 с C2-дроном.
    - id: c
      text:
        lv: A3 ar C3 dronu.
        en: A3 with a C3 drone.
        ru: A3 с C3-дроном.
  correctOptionId: a
  explanation:
    lv: >
      C0 (< 250 g) lidojumiem MK noteikumi Nr. 447 neuzliek obligāto
      apdrošināšanu. Tomēr brīvprātīgi to ieteicams iegādāties.
    en: >
      C0 (< 250 g) flights are exempt from the mandatory insurance under
      Cabinet Reg. No. 447. Voluntary cover is still recommended.
    ru: >
      Полёты C0 (< 250 г) освобождены от обязательного страхования по
      Правилам КМ № 447. Добровольное страхование всё же рекомендуется.
  sourceRef: "MK noteikumi Nr. 447 (10.07.2018) — exemption for C0"
  difficulty: 2

- id: in-004
  stem:
    lv: Kāds ir minimālais segums Specifiskās kategorijas UAS lidojumam < 500 kg?
    en: What is the minimum cover for a Specific-category UAS flight under 500 kg?
    ru: Каков минимум покрытия для полёта UAS Специальной категории < 500 кг?
  options:
    - id: a
      text:
        lv: 750 000 SDR.
        en: 750 000 SDR.
        ru: 750 000 SDR.
    - id: b
      text:
        lv: 50 000 EUR.
        en: €50 000.
        ru: 50 000 EUR.
    - id: c
      text:
        lv: 1 000 000 EUR.
        en: €1 000 000.
        ru: 1 000 000 EUR.
  correctOptionId: a
  explanation:
    lv: >
      Specifiskās kategorijas operatoriem ar UAS < 500 kg piemēro
      Regulu (EK) 785/2004 — 750 000 SDR.
    en: >
      Specific-category operators with UAS < 500 kg fall under
      Reg (EC) 785/2004 — 750 000 SDR.
    ru: >
      Операторы Специальной категории с UAS < 500 кг подпадают под
      Регл. (ЕС) 785/2004 — 750 000 SDR.
  sourceRef: "Reg (EC) 785/2004 — air carriers' liability minima"
  difficulty: 3

- id: in-005
  stem:
    lv: Kas notiek, ja CAA Latvia inspektors konstatē, ka operatoram nav apdrošināšanas?
    en: What happens if a CAA Latvia inspector finds an operator without insurance?
    ru: Что происходит, если инспектор CAA Latvia обнаружит, что у оператора нет страховки?
  options:
    - id: a
      text:
        lv: Operators saņem administratīvo sodu un nedrīkst lidot.
        en: The operator is fined and not allowed to fly.
        ru: Оператор получает административный штраф и не вправе летать.
    - id: b
      text:
        lv: Inspektors ieteic apdrošināšanu un atstāj operatoru lidot.
        en: The inspector recommends insurance and lets the operator fly on.
        ru: Инспектор рекомендует оформить и позволяет летать дальше.
    - id: c
      text:
        lv: Nekādu seku — civiltiesiska atbildība ir brīvprātīga.
        en: No consequences — third-party liability is voluntary.
        ru: Никаких последствий — гражданская ответственность добровольна.
  correctOptionId: a
  explanation:
    lv: >
      Bez derīgas civiltiesiskās polises operators nav kvalificēts
      lidojumam. Lidojums tiek pārtraukts, un piemēro administratīvo
      sodu.
    en: >
      Without a valid third-party policy the operator is not qualified
      to fly. The flight is grounded and an administrative fine is
      imposed.
    ru: >
      Без действующего полиса оператор не имеет права летать. Полёт
      прекращается и налагается административный штраф.
  sourceRef: "Latvian Aviation Law; MK noteikumi Nr. 447"
  difficulty: 2
