- id: in-039
  stem:
    lv: Operators īrē dronu no cita Latvijas uzņēmuma un pats nodrošina pilotu. Kas jānoskaidro pirms lidojuma?
    en: An operator rents a drone from another Latvian company and provides the pilot. What must be clarified before flight?
    ru: Оператор арендует дрон у другой латвийской компании и сам предоставляет пилота. Что выяснить до полёта?
  options:
    - id: a
      text:
        lv: "Nekas: apdrošināšana vienmēr seko dronam."
        en: "Nothing: insurance always follows the drone."
        ru: "Ничего: страховка всегда следует за дроном."
    - id: b
      text:
        lv: Tikai kurš pēc lidojuma uzlādēs baterijas.
        en: Only who will charge batteries after the flight.
        ru: Только кто зарядит батареи после полёта.
    - id: c
      text:
        lv: Kurš ir UAS operators, kurš sedz trešo personu atbildību un vai paša drona/kameras bojājumi ir segti.
        en: Who is the UAS operator, who covers third-party liability, and whether drone/camera damage is covered.
        ru: Кто оператор БВС, кто покрывает ответственность перед третьими лицами и покрыты ли повреждения дрона/камеры.
    - id: d
      text:
        lv: Tikai vai pilotam ir A1/A3 apliecinājums.
        en: Only whether the pilot has A1/A3 proof.
        ru: Только есть ли у пилота A1/A3.
  correctOptionId: c
  explanation:
    lv: Īrētā operācijā jānodala operators, īpašnieks, pilots un seguma veids; citādi pēc incidenta rodas seguma plaisa.
    en: In a rented operation, operator, owner, pilot and cover type must be separated; otherwise a coverage gap can appear after an incident.
    ru: В арендованной операции нужно разделить оператора, владельца, пилота и тип покрытия; иначе после инцидента возникает пробел в покрытии.
