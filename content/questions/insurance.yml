- id: in-040
  stem:
    lv: Latvijas CAA materiālos apdrošināšanas kontekstā minēta Regula (EK) Nr. 785/2004. Kāds ir praktiskais secinājums?
    en: Latvian CAA material mentions Regulation (EC) No 785/2004 in the insurance context. What is the practical conclusion?
    ru: В материалах CAA Латвии по страхованию упоминается Регламент (EC) № 785/2004. Какой практический вывод?
  options:
    - id: a
      text:
        lv: Tā ir tikai privātuma regula par video glabāšanu.
        en: It is only a privacy regulation about video storage.
        ru: Это только регламент о приватности и хранении видео.
    - id: b
      text:
        lv: Tā atceļ vajadzību lasīt Latvijas CAA skaidrojumu.
        en: It removes the need to read Latvian CAA guidance.
        ru: Он отменяет необходимость читать разъяснения CAA Латвии.
    - id: c
      text:
        lv: Visiem UAS neatkarīgi no masas ir viens vienāds EUR limits.
        en: All UAS regardless of mass have one identical EUR limit.
        ru: У всех БВС независимо от массы один одинаковый лимит в EUR.
    - id: d
      text:
        lv: Tā ir ES atbildības apdrošināšanas atsauce; segums jāpiemēro UAS masai un darbībai.
        en: It is an EU liability-insurance reference; cover must fit the UAS mass and operation.
        ru: Это ссылка на страхование ответственности в ЕС; покрытие должно соответствовать массе БВС и операции.
  correctOptionId: d
  explanation:
