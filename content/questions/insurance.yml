- id: in-038
  stem:
    lv: Pēc nosēšanās bojāts tikai paša drona kardāns; citiem kaitējuma nav. Kura polises daļa to varētu segt?
    en: After landing, only the drone’s own gimbal is damaged; nobody else is harmed. Which policy part could cover it?
    ru: После посадки повреждён только собственный подвес дрона; другим вреда нет. Какая часть полиса может это покрыть?
  options:
    - id: a
      text:
        lv: Trešo personu atbildība, jo drons ir “trešā persona”.
        en: Third-party liability because the drone is a “third party”.
        ru: Ответственность перед третьими лицами, потому что дрон — “третье лицо”.
    - id: b
      text:
        lv: Paša UAS kasko vai aprīkojuma segums, ja tas ir nopirkts.
        en: Hull or equipment cover for the operator’s own UAS, if purchased.
        ru: Каско или покрытие оборудования собственного БВС, если оно куплено.
    - id: c
      text:
        lv: Obligātais atbildības limits automātiski sedz paša dronu.
        en: The mandatory liability limit automatically covers the drone itself.
        ru: Обязательный лимит ответственности автоматически покрывает сам дрон.
    - id: d
      text:
        lv: Klienta īpašuma apdrošināšana.
        en: The client’s property insurance.
        ru: Страхование имущества клиента.
  correctOptionId: b
  explanation:
    lv: Atbildības polise sedz kaitējumu citiem. Paša drona bojājumiem vajadzīgs atsevišķs kasko/aprīkojuma segums.
    en: Liability cover protects against harm to others. Damage to the operator’s own drone needs separate hull/equipment cover.
    ru: Страхование ответственности покрывает вред другим. Повреждение собственного дрона требует отдельного каско/покрытия оборудования.
