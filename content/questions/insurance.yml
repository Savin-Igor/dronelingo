  stem:
    lv: Pēc incidenta Rīgā apdrošinātājs atzīst prasību, bet norāda 500 EUR pašrisku. Ko tas nozīmē?
    en: After an incident in Riga, the insurer accepts the claim but states a EUR 500 deductible. What does it mean?
    ru: После инцидента в Риге страховщик признаёт требование, но указывает франшизу 500 EUR. Что это значит?
  options:
    - id: a
      text:
        lv: Apdrošinātājs maksās par 500 EUR vairāk nekā zaudējums.
        en: The insurer will pay EUR 500 more than the loss.
        ru: Страховщик выплатит на 500 EUR больше ущерба.
    - id: b
      text:
        lv: Prasība automātiski tiek noraidīta.
        en: The claim is automatically rejected.
        ru: Требование автоматически отклоняется.
    - id: c
      text:
        lv: Tas attiecas tikai uz valsts sodiem.
        en: It applies only to government fines.
        ru: Это относится только к государственным штрафам.
    - id: d
      text:
        lv: Operators sedz līgumā noteikto zaudējuma daļu līdz pašriska apmēram.
        en: The operator bears the agreed part of the loss up to the deductible.
        ru: Оператор несёт согласованную часть ущерба в пределах франшизы.
  correctOptionId: d
  explanation:
    lv: Pašrisks ir operatora līdzdalība zaudējumā, kas jāzina pirms lidojuma un līguma slēgšanas.
    en: A deductible is the operator’s retained part of the loss and should be known before the flight and contract.
    ru: Франшиза — часть ущерба, остающаяся на операторе; её нужно знать до полёта и договора.
  distractorRationales:
    a:
      lv: Šis variants sajauc seguma veidu, polises derīgumu vai operatora atbildību konkrētajā situācijā.
      en: This option confuses the cover type, policy validity or operator liability in this situation.
      ru: Этот вариант смешивает тип покрытия, действительность полиса или ответственность оператора в этой ситуации.
    b:
      lv: Šis variants sajauc seguma veidu, polises derīgumu vai operatora atbildību konkrētajā situācijā.
      en: This option confuses the cover type, policy validity or operator liability in this situation.
      ru: Этот вариант смешивает тип покрытия, действительность полиса или ответственность оператора в этой ситуации.
