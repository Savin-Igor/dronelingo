    en: A Latvian company buys a drone and gives it to an employee to film client sites. In whose name should operator registration normally be?
    ru: Латвийская компания покупает дрон и выдаёт сотруднику для съёмки объектов клиентов. На чьё имя обычно нужна регистрация оператора?
