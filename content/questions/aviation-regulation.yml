    lv: Lauksaimnieks Latgalē vēlas Open kategorijā lidot ar 26 kg pašbūvētu dronu virs savas pļavas, tālu no cilvēkiem. Kāds secinājums?
    en: A farmer in Latgale wants to fly a 26 kg privately built drone in Open category over his meadow, far from people. What is the conclusion?
    ru: Фермер в Латгалии хочет летать в Open category на самодельном дроне 26 кг над своим лугом, далеко от людей. Какой вывод?
