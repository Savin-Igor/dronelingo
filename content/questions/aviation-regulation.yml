        ru: Порог C1 — менее 900 г; нужно проверить маркировку и документы соответствия.
    - id: d
      text:
        lv: 910 g drons Latvijā vienmēr ir aizliegts.
        en: A 910 g drone is always prohibited in Latvia.
        ru: Дрон 910 г в Латвии всегда запрещён.
