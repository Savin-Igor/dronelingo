- id: ar-034
  stem:
    lv: Būvobjekts Rīgā lūdz ar C2 dronu lidot 20 m no strādniekiem. Pilotam ir tikai A1/A3. Kāds secinājums?
    en: A Riga construction site asks for a C2 drone flight 20 m from workers. The pilot only has A1/A3. What is the conclusion?
    ru: Стройплощадка в Риге просит полёт C2 в 20 м от рабочих. У пилота только A1/A3. Какой вывод?
  options:
    - id: a
      text:
        lv: Atļauts, ja strādnieki redz dronu un neiebilst.
        en: Allowed if workers see the drone and do not object.
        ru: Разрешено, если рабочие видят дрон и не возражают.
    - id: b
      text:
        lv: Ar A1/A3 šādu C2 lidojumu tuvumā cilvēkiem neplāno; jāmaina kompetence vai operācija.
        en: With A1/A3 this close C2 operation near people should not be planned; change competence or operation.
        ru: С A1/A3 такой близкий полёт C2 рядом с людьми не планируют; нужна другая компетенция или операция.
    - id: c
      text:
        lv: Tas vienmēr ir Specific kategorijā neatkarīgi no cilvēku statusa.
        en: It is always Specific category regardless of people status.
        ru: Это всегда Specific category независимо от статуса людей.
    - id: d
      text:
        lv: Būvobjektā Open kategorijas attālumi neattiecas.
        en: Open category distances do not apply on construction sites.
        ru: На стройплощадке дистанции Open category не применяются.
  correctOptionId: b
  explanation:
    lv: C2 tuvāk cilvēkiem prasa atbilstošu apakškategoriju, kompetenci un cilvēku statusa kontroli. A1/A3 to automātiski nenodrošina.
