- id: ar-040
  stem:
    lv: 15 gadus vecs skolēns Latvijā vēlas patstāvīgi lidot Open kategorijā bez uzraudzības. Kas jāpārbauda?
    en: A 15-year-old student in Latvia wants to fly independently in Open category without supervision. What must be checked?
    ru: 15-летний школьник в Латвии хочет самостоятельно летать в Open category без надзора. Что нужно проверить?
  options:
    - id: a
      text:
        lv: Vecumam nav nozīmes, ja drons ir zem 250 g.
        en: Age does not matter if the drone is below 250 g.
        ru: Возраст не важен, если дрон легче 250 г.
    - id: b
      text:
        lv: Patstāvīgi drīkst lidot no 12 gadiem visās Open apakškategorijās.
        en: Independent flying is allowed from age 12 in all Open subcategories.
        ru: Самостоятельные полёты разрешены с 12 лет во всех Open подкатегориях.
    - id: c
      text:
        lv: Vecāku rakstiska atļauja aizstāj vecuma prasību.
        en: Written parental permission replaces the age requirement.
        ru: Письменное разрешение родителей заменяет возрастное требование.
    - id: d
      text:
        lv: Minimālais tālvadības pilota vecums; parasti Open kategorijā tas ir 16 gadi, ja nav izņēmuma vai uzraudzības.
        en: The minimum remote-pilot age; normally it is 16 in Open category unless an exception or supervision applies.
        ru: Минимальный возраст дистанционного пилота; обычно в Open category это 16 лет, если нет исключения или надзора.
  correctOptionId: d
  explanation:
