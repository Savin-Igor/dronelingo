- id: ar-036
  stem:
    lv: Pārdevējs C4 klases dronam reklamē pilnībā automātisku maršruta lidošanu. Kas šeit ir jāpārbauda?
    en: A seller advertises fully automatic route flying for a C4 class drone. What must be checked?
    ru: Продавец рекламирует полностью автоматический маршрутный полёт для дрона C4. Что нужно проверить?
  options:
    - id: a
      text:
        lv: "Nekas: C4 klase paredzēta autonomām misijām."
        en: "Nothing: C4 class is intended for autonomous missions."
        ru: "Ничего: класс C4 предназначен для автономных миссий."
    - id: b
      text:
        lv: Automātika ir atļauta, ja drons ir zem 25 kg.
        en: Automation is allowed if the drone is below 25 kg.
        ru: Автоматика разрешена, если дрон легче 25 кг.
    - id: c
      text:
        lv: C4 droni ir tikai iekštelpu lietošanai.
        en: C4 drones are for indoor use only.
        ru: Дроны C4 только для помещений.
    - id: d
      text:
        lv: C4 klasei parasti nedrīkst būt automātiskas vadības režīmi, izņemot stabilizāciju.
        en: C4 class generally must not have automatic control modes except stabilisation.
        ru: У класса C4 обычно не должно быть автоматических режимов управления, кроме стабилизации.
  correctOptionId: d
  explanation:
    lv: C4 ir vienkāršāka manuāli vadāma klase, tāpēc automātisku misiju reklāma jāsalīdzina ar atbilstības dokumentiem.
    en: C4 is a simpler manually controlled class, so automatic-mission claims must be checked against conformity documents.
    ru: C4 — более простой класс ручного управления, поэтому заявления об автоматических миссиях нужно сверять с документами соответствия.
