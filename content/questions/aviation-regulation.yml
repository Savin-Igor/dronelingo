- id: ar-039
  stem:
    lv: Sludinājumā drons norādīts kā C1, bet datu plāksnītē masa ir 910 g. Kāpēc tas ir risks?
    en: A listing says a drone is C1, but the data plate shows 910 g. Why is that a risk?
    ru: В объявлении дрон указан как C1, но на табличке масса 910 г. Почему это риск?
  options:
    - id: a
      text:
        lv: C1 vienmēr ir līdz 2 kg, tāpēc viss kārtībā.
        en: C1 is always up to 2 kg, so it is fine.
        ru: C1 всегда до 2 кг, значит всё в порядке.
    - id: b
      text:
        lv: Masa nav svarīga, ja pārdevējs raksta “EU compliant”.
        en: Mass does not matter if the seller writes “EU compliant”.
