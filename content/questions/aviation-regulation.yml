  cognitiveLevel: apply
  scenarioType: decision
- id: ar-032
  stem:
    lv: Kura atbilde vislabāk atbilst situācijai? Kuri Latvijas MK noteikumi nosaka UAS pilota kvalifikācijas kārtību?
    en: Which answer best fits the situation? Which Latvian Cabinet Regulation governs UAS pilot qualification?
    ru: Какой ответ лучше всего подходит к ситуации? Какие правила Кабинета министров Латвии регулируют квалификацию пилота UAS?
  options:
  - id: a
    text:
      lv: MK noteikumi Nr. 627.
      en: Cabinet Regulation No. 627.
      ru: Правила КМ № 627.
  - id: b
    text:
      lv: MK noteikumi Nr. 447.
      en: Cabinet Regulation No. 447.
      ru: Правила КМ № 447.
  - id: c
    text:
      lv: MK noteikumi Nr. 436.
      en: Cabinet Regulation No. 436.
      ru: Правила КМ № 436.
  - id: d
    text:
      lv: MK noteikumi Nr. 248.
      en: Cabinet Regulation No. 248.
      ru: Правила КМ № 248.
  correctOptionId: c
  explanation:
    lv: 'MK Nr. 436 ir par UAS pilota kvalifikāciju. MK Nr. 248 — par lidojuma noteikumiem; MK Nr. 627 — par modeļa lidaparātu klubiem.

      '
    en: 'Cabinet Reg. No. 436 covers UAS pilot qualification. No. 248 sets flight rules; No. 627 deals with model-aircraft clubs.

      '
    ru: 'Правила КМ № 436 — о квалификации пилота UAS. № 248 — о правилах полётов; № 627 — о клубах авиамоделистов.

      '
  distractorRationales:
    a:
      lv: MK Nr. 627 ir par modeļa lidaparātu klubiem, ne par UAS pilota individuālo kvalifikāciju.
      en: Cabinet Reg. No. 627 covers model-aircraft clubs, not the individual UAS pilot qualification.
      ru: Правила КМ № 627 — о клубах авиамоделистов, не об индивидуальной квалификации пилота UAS.
    b:
      lv: MK Nr. 447 reglamentē civiltiesisko apdrošināšanu, nevis pilota kvalifikāciju.
      en: Cabinet Reg. No. 447 governs civil-liability insurance, not pilot qualification.
      ru: Правила КМ № 447 регулируют гражданскую страховку, а не квалификацию пилота.
    d:
      lv: MK Nr. 248 nosaka lidojuma noteikumus kopumā, nevis pilota kvalifikāciju.
      en: Cabinet Reg. No. 248 sets general flight rules, not pilot qualification.
      ru: Правила КМ № 248 задают общие правила полётов, а не квалификацию пилота.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — MK noteikumi Nr. 436 (Latvia) — UAS pilot qualification
