- id: ar-001
  stem:
    lv: Kura ES regula nosaka UAS ekspluatācijas noteikumus (operācijas)?
    en: Which EU regulation lays down UAS operational rules?
    ru: Какой регламент ЕС задаёт правила эксплуатации UAS?
  options:
  - id: a
    text:
      lv: Regula (ES) 2019/947.
      en: Regulation (EU) 2019/947.
      ru: Регламент (ЕС) 2019/947.
  - id: b
    text:
      lv: Regula (ES) 2019/945.
      en: Regulation (EU) 2019/945.
      ru: Регламент (ЕС) 2019/945.
  - id: c
    text:
      lv: Regula (ES) 2018/1139.
      en: Regulation (EU) 2018/1139.
      ru: Регламент (ЕС) 2018/1139.
  - id: d
    text:
      lv: Regula (ES) 376/2014.
      en: Regulation (EU) 376/2014.
      ru: Регламент (ЕС) 376/2014.
  correctOptionId: a
  explanation:
    lv: '2019/947 ir par operācijām (Open / Specific / Certified). 2019/945 ir par UAS tehniskajām prasībām (klases C0–C6). 2018/1139 ir pamatregula par EASA.

      '
    en: '2019/947 covers operations (Open / Specific / Certified). 2019/945 covers UAS technical requirements (C0–C6 classes). 2018/1139 is the basic EASA regulation.

      '
    ru: '2019/947 — об эксплуатации (Open / Specific / Certified). 2019/945 — о технических требованиях к UAS (классы C0–C6). 2018/1139 — базовый регламент по EASA.

      '
  distractorRationales:
    b:
      lv: 2019/945 ir par UAS tehniskām prasībām un CE klašu marķējumu, ne par operāciju kategorijām.
      en: 2019/945 covers UAS technical requirements and CE class marking, not operational categories.
      ru: 2019/945 — о технических требованиях к UAS и CE-маркировке классов, не об эксплуатации.
    c:
      lv: 2018/1139 ir EASA pamatregula. Tā nosaka EASA pilnvaras, bet konkrētie UAS operāciju noteikumi ir 2019/947.
      en: 2018/1139 is the EASA basic regulation. It defines EASA powers, but the specific UAS operating rules are in 2019/947.
      ru: 2018/1139 — базовый регламент EASA. Он задаёт полномочия EASA, но конкретные правила эксплуатации UAS — в 2019/947.
    d:
      lv: 376/2014 ir par atgadījumu ziņošanu civilajā aviācijā. Tas nav UAS operāciju noteikumu avots.
      en: 376/2014 is about occurrence reporting in civil aviation. It is not the source of UAS operating rules.
      ru: 376/2014 — об уведомлениях о происшествиях в гражданской авиации. Это не источник правил эксплуатации UAS.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 — Operations; Reg (EU) 2019/945 — Technical; Reg 2018/1139 — Basic
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-002
  stem:
    lv: Kurā kategorijā ir jāveic SORA riska novērtējums vai jāizmanto STS standarta scenārijs?
    en: In which category is a SORA risk assessment or an STS standard scenario required?
    ru: В какой категории требуется оценка риска SORA или стандартный сценарий STS?
  options:
  - id: a
    text:
      lv: Atvērtā.
      en: Open.
      ru: Открытая.
  - id: b
    text:
      lv: Specifiskā.
      en: Specific.
      ru: Специальная.
  - id: c
    text:
      lv: Sertificētā.
      en: Certified.
      ru: Сертифицированная.
  - id: d
    text:
      lv: Gan Specifiskā, gan Sertificētā.
      en: Both Specific and Certified.
      ru: И Специальная, и Сертифицированная.
  correctOptionId: b
  explanation:
    lv: 'Specifiskā kategorija prasa SORA vai STS. Atvērtajā nav iepriekšējas atļaujas. Sertificētā prasa pilnu UAS un operatora sertifikāciju.

      '
    en: 'The Specific category requires SORA or STS. Open requires no prior authorisation. Certified requires full UAS and operator certification.

      '
    ru: 'Специальная требует SORA или STS. Открытая — без предварительного разрешения. Сертифицированная — полная сертификация UAS и оператора.

      '
  distractorRationales:
    a:
      lv: Atvērtā kategorija ir definēta tā, lai nebūtu vajadzīga iepriekšēja atļauja — limits ir iebūvēti (120 m, VLOS, masa, pulcēšanās).
      en: The Open category is defined so that no prior authorisation is needed — limits are intrinsic (120 m, VLOS, mass, assemblies).
      ru: Открытая категория устроена так, что предварительное разрешение не требуется — ограничения встроены (120 м, VLOS, масса, скопления).
    c:
      lv: Sertificētā prasa pilnvērtīgu UAS un operatora sertifikāciju, nevis SORA vai STS — tā ir pilnīgi atsevišķa procedūra ar augstāku risku.
      en: Certified requires full UAS and operator certification rather than SORA or STS — it is a separate, higher-risk procedure.
      ru: Сертифицированная требует полной сертификации UAS и оператора, а не SORA или STS — это отдельная процедура более высокого риска.
    d:
      lv: Sertificētā kategorija neizmanto SORA mehānismu — tā ir augstāka riska procedūra. SORA/STS ir tikai Specifiskās kategorijas mehānismi.
      en: The Certified category does not use the SORA mechanism — it is a higher-risk procedure. SORA/STS belongs only to the Specific category.
      ru: Сертифицированная категория не использует механизм SORA — это процедура более высокого риска. SORA/STS — только для Специальной.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 Art. 5; AMC1 Article 11 — SORA
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
- id: ar-003
  stem:
    lv: Kāds ir Atvērtās kategorijas maksimālais UAS lidojuma augstums virs zemes?
    en: What is the maximum UAS altitude above ground in the Open category?
    ru: Какова максимальная высота полёта UAS над землёй в Открытой категории?
  options:
  - id: a
    text:
      lv: 50 m.
      en: 50 m.
      ru: 50 м.
  - id: b
    text:
      lv: 120 m.
      en: 120 m.
      ru: 120 м.
  - id: c
    text:
      lv: 150 m.
      en: 150 m.
      ru: 150 м.
  - id: d
    text:
      lv: 100 m.
      en: 100 m.
      ru: 100 м.
  correctOptionId: b
  explanation:
    lv: 'Atvērtās kategorijas augstums ir 120 m virs zemes vai ūdens virsmas, ja vien UGZ neuzliek zemāku ierobežojumu.

      '
    en: 'Open-category altitude is 120 m above ground or water, unless a UGZ imposes a lower cap.

      '
    ru: 'Высота Открытой категории — 120 м над землёй или водой, если UGZ не задаёт более низкий предел.

      '
  distractorRationales:
    a:
      lv: 50 m ir krietni zem standarta robežas. Tas ir piesardzīgs operatīvs lēmums, ne regulatīvais limits.
      en: 50 m is well below the standard cap. It is a cautious operational choice, not the regulatory limit.
      ru: 50 м значительно ниже стандартного предела. Это осторожное операционное решение, а не регуляторная граница.
    c:
      lv: 150 m attiecas uz distances no apdzīvotām zonām A3, nevis uz augstuma robežu.
      en: 150 m relates to the distance from inhabited areas in A3, not to the altitude cap.
      ru: 150 м относится к дистанции до жилых зон в A3, а не к пределу высоты.
    d:
      lv: 100 m ir pat tuvu pareizajai vērtībai, bet regulā ir tieši 120 m. Tā ir maza atšķirība, kas eksāmenā ir izšķiroša.
      en: 100 m is close to the right value, but the regulation says exactly 120 m. The 20 m difference is decisive in the exam.
      ru: 100 м близко к верному значению, но в регламенте именно 120 м. Разница в 20 м для экзамена принципиальна.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 UAS.OPEN.020/030/040(2)
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: factual
- id: ar-004
  stem:
    lv: Kura ES regula nosaka UAS klašu (C0–C6) tehniskās prasības?
    en: Which EU regulation lays down the technical requirements for UAS classes (C0–C6)?
    ru: Какой регламент ЕС задаёт технические требования к классам UAS (C0–C6)?
  options:
  - id: a
    text:
      lv: Regula (ES) 2019/945.
      en: Regulation (EU) 2019/945.
      ru: Регламент (ЕС) 2019/945.
  - id: b
    text:
      lv: Regula (ES) 2019/947.
      en: Regulation (EU) 2019/947.
      ru: Регламент (ЕС) 2019/947.
  - id: c
    text:
      lv: Regula (ES) 376/2014.
      en: Regulation (EU) 376/2014.
      ru: Регламент (ЕС) 376/2014.
  - id: d
    text:
      lv: Regula (ES) 2018/1139.
      en: Regulation (EU) 2018/1139.
      ru: Регламент (ЕС) 2018/1139.
  correctOptionId: a
  explanation:
    lv: '2019/945 ir tehniskās prasības (klases C0–C6, CE marķējums). 2019/947 attiecas uz operācijām. 376/2014 — par atgadījumu ziņošanu.

      '
    en: '2019/945 covers technical requirements (C0–C6 classes, CE marking). 2019/947 concerns operations. 376/2014 is about occurrence reporting.

      '
    ru: '2019/945 — технические требования (классы C0–C6, маркировка CE). 2019/947 — об эксплуатации. 376/2014 — об уведомлениях о происшествиях.

      '
  distractorRationales:
    b:
      lv: 2019/947 ir par operāciju kategorijām (Open / Specific / Certified). Tehniskās prasības ir 945, ne 947.
      en: 2019/947 covers operational categories (Open / Specific / Certified). The technical requirements live in 945, not 947.
      ru: 2019/947 — об операционных категориях (Open / Specific / Certified). Технические требования — в 945, а не в 947.
    c:
      lv: 376/2014 ir par atgadījumu ziņošanu civilajā aviācijā, ne par UAS tehniskām prasībām.
      en: 376/2014 covers occurrence reporting in civil aviation, not UAS technical requirements.
      ru: 376/2014 — об отчётности о происшествиях в гражданской авиации, не о технических требованиях к UAS.
    d:
      lv: 2018/1139 ir EASA pamatregula. UAS klašu tehniskās prasības ir 945, deleģēta regula uz pamatregulas pamata.
      en: 2018/1139 is the EASA basic regulation. UAS class technical requirements are in 945, a delegated regulation under the basic regulation.
      ru: 2018/1139 — базовый регламент EASA. Технические требования к классам UAS — в 945, делегированном регламенте на основе базового.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/945 — Technical requirements for UAS
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-005
  stem:
    lv: Kuri Latvijas MK noteikumi nosaka UAS pilota kvalifikācijas kārtību?
    en: Which Latvian Cabinet Regulation governs UAS pilot qualification?
    ru: Какие правила Кабинета министров Латвии регулируют квалификацию пилота UAS?
  options:
  - id: a
    text:
      lv: MK noteikumi Nr. 436.
      en: Cabinet Regulation No. 436.
      ru: Правила КМ № 436.
  - id: b
    text:
      lv: MK noteikumi Nr. 248.
      en: Cabinet Regulation No. 248.
      ru: Правила КМ № 248.
  - id: c
    text:
      lv: MK noteikumi Nr. 627.
      en: Cabinet Regulation No. 627.
      ru: Правила КМ № 627.
  - id: d
    text:
      lv: MK noteikumi Nr. 447.
      en: Cabinet Regulation No. 447.
      ru: Правила КМ № 447.
  correctOptionId: a
  explanation:
    lv: 'MK Nr. 436 ir par UAS pilota kvalifikāciju. MK Nr. 248 — par lidojuma noteikumiem; MK Nr. 627 — par modeļa lidaparātu klubiem.

      '
    en: 'Cabinet Reg. No. 436 covers UAS pilot qualification. No. 248 sets flight rules; No. 627 deals with model-aircraft clubs.

      '
    ru: 'Правила КМ № 436 — о квалификации пилота UAS. № 248 — о правилах полётов; № 627 — о клубах авиамоделистов.

      '
  distractorRationales:
    b:
      lv: MK Nr. 248 nosaka lidojuma noteikumus kopumā, nevis pilota kvalifikāciju.
      en: Cabinet Reg. No. 248 sets general flight rules, not pilot qualification.
      ru: Правила КМ № 248 задают общие правила полётов, а не квалификацию пилота.
    c:
      lv: MK Nr. 627 ir par modeļa lidaparātu klubiem, ne par UAS pilota individuālo kvalifikāciju.
      en: Cabinet Reg. No. 627 covers model-aircraft clubs, not the individual UAS pilot qualification.
      ru: Правила КМ № 627 — о клубах авиамоделистов, не об индивидуальной квалификации пилота UAS.
    d:
      lv: MK Nr. 447 reglamentē civiltiesisko apdrošināšanu, nevis pilota kvalifikāciju.
      en: Cabinet Reg. No. 447 governs civil-liability insurance, not pilot qualification.
      ru: Правила КМ № 447 регулируют гражданскую страховку, а не квалификацию пилота.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — MK noteikumi Nr. 436 (Latvia) — UAS pilot qualification
  difficulty: 3
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-006
  stem:
    lv: Papildus A2 teorijas eksāmenam, kas vēl nepieciešams, lai iegūtu A2 kompetences sertifikātu?
    en: Beyond the A2 theory exam, what else is required to obtain the A2 competence certificate?
    ru: Помимо теоретического экзамена A2, что ещё требуется для получения свидетельства о компетентности A2?
  options:
  - id: a
    text:
      lv: Pilnīgs praktiskais kurss ar instruktoru un praktiskais eksāmens.
      en: A full practical course with an instructor and a practical exam.
      ru: Полный практический курс с инструктором и практический экзамен.
  - id: b
    text:
      lv: Pašdeklarācija par 5 praktisko prasmju jomām pēc patstāvīgas apmācības.
      en: Self-declaration of practical skills covering 5 skill areas after self-study training.
      ru: Самодекларация о практических навыках в 5 областях после самостоятельного обучения.
  - id: c
    text:
      lv: Pilnīgi nekā — teorijas eksāmens ir pietiekams.
      en: Nothing else — the theory exam alone is sufficient.
      ru: Ничего — теоретического экзамена достаточно.
  - id: d
    text:
      lv: 100 stundu praktiskā lidojuma laika pierādīšana.
      en: Demonstrating 100 hours of practical flight time.
      ru: Подтверждение 100 часов практического налёта.
  correctOptionId: b
  explanation:
    lv: 'A2 kompetences sertifikāts prasa: (1) spēkā esošu A1/A3 sertifikātu, (2) A2 papildu teorijas eksāmenu (60 jautājumi, ≥75 %), un (3) pašdeklarāciju par patstāvīgi apmācīto praktisko prasmju 5 jomām. Nav obligāta instruktora uzraudzīta apmācība vai formāls praktiskais eksāmens.

      '
    en: 'The A2 competence certificate requires: (1) a valid A1/A3 certificate, (2) the A2 additional theory exam (60 questions, ≥75 %), and (3) a self-declaration of practical skills covering 5 areas after self-study. No instructor-supervised training or formal practical exam is mandatory.

      '
    ru: 'Свидетельство компетентности A2 требует: (1) действующего сертификата A1/A3, (2) дополнительного теоретического экзамена A2 (60 вопросов, ≥75 %), и (3) самодекларации о практических навыках в 5 областях после самостоятельного обучения. Обязательного курса под руководством инструктора или формального практического экзамена нет.

      '
  distractorRationales:
    a:
      lv: A2 neparedz obligātu instruktora kursu vai formālu praktisko eksāmenu. Praktiskās prasmes apliecina pašdeklarācijā.
      en: A2 does not require a mandatory instructor course or formal practical exam. Practical skills are attested through self-declaration.
      ru: A2 не предусматривает обязательного курса с инструктором или формального практического экзамена. Практические навыки подтверждаются самодекларацией.
    c:
      lv: Teorijas eksāmens vien nav pietiekams — pašdeklarācija par praktiskajām prasmēm ir obligāta A2 prasība.
      en: The theory exam alone is insufficient — the self-declaration of practical skills is a mandatory A2 requirement.
      ru: Одного теоретического экзамена недостаточно — самодекларация о практических навыках является обязательным требованием A2.
    d:
      lv: Nav noteiktas minimālās stundu prasības A2 sertifikātam. Pašdeklarācija nav atkarīga no skaitliski uzraudzīta lidojuma laika.
      en: There is no minimum flight-hour requirement for the A2 certificate. The self-declaration is not contingent on a numerically audited flight time.
      ru: Для сертификата A2 нет требований по минимальному налёту. Самодекларация не зависит от подтверждённого количества часов налёта.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 Art. UAS.OPEN.030; EASA AMC1 UAS.OPEN.030
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-007
  stem:
    lv: Pilots ar A1/A3 sertifikātu vēlas ar C2 dronu filmēt būvlaukumu 20 m no strādniekiem (bez piekrišanas). Kurā apakškategorijā jādarbojas un vai 20 m ir atļauti?
    en: A pilot with only the A1/A3 certificate wants to film a construction site with a C2 drone at 20 m from workers (without consent). Which sub-category applies and is 20 m permitted?
    ru: Пилот, имеющий только сертификат A1/A3, хочет снимать строительную площадку дроном C2 в 20 м от рабочих (без согласия). Какая подкатегория применяется и разрешены ли 20 м?
  options:
  - id: a
    text:
      lv: A2 — 20 m ir atļauti zemā ātruma režīmā.
      en: A2 — 20 m is permitted in low-speed mode.
      ru: A2 — 20 м разрешены в режиме малой скорости.
  - id: b
    text:
      lv: A1 — C2 drons var darboties A1, kur nav distanču prasību.
      en: A1 — a C2 drone can operate in A1, where there are no distance requirements.
      ru: A1 — C2-дрон может работать в A1, где нет требований к дистанции.
  - id: c
    text:
      lv: A3 — C2 ar tikai A1/A3 sertifikātu prasa A3 noteikumus. A3 prasa ≥30 m no nepiederošām personām. 20 m nav atļauti.
      en: A3 — a C2 with only the A1/A3 certificate must follow A3 rules. A3 requires ≥30 m from uninvolved persons. 20 m is not permitted.
      ru: A3 — C2 только с сертификатом A1/A3 должен соответствовать правилам A3. A3 требует ≥30 м от посторонних. 20 м не разрешены.
  - id: d
    text:
      lv: A3 — bet strādnieku piekrišana ļauj tuvināties līdz 5 m.
      en: A3 — but the workers' consent allows approach to 5 m.
      ru: A3 — но согласие рабочих позволяет приблизиться до 5 м.
  correctOptionId: c
  explanation:
    lv: 'C2 drons bez A2 kompetences sertifikāta var darboties tikai A3 apakškategorijā. A3 prasa ≥30 m no nepiederošām personām (vai 1:1 noteikumu). 20 m ir mazāk par 30 m — tas nav atļauts. 5 m distanču atvieglojums (zemā ātruma režīmā) attiecas tikai uz A2 operācijām ar A2 sertifikātu.

      '
    en: 'A C2 drone without the A2 competence certificate may only operate in A3. A3 requires ≥30 m from uninvolved persons (or the 1:1 rule). 20 m is less than 30 m — not permitted. The 5 m distance reduction (in low-speed mode) applies only to A2 operations with the A2 certificate.

      '
    ru: 'C2-дрон без сертификата A2 может работать только в A3. A3 требует ≥30 м от посторонних (или правило 1:1). 20 м меньше 30 м — не разрешено. Уменьшение до 5 м (в режиме малой скорости) применяется только к операциям A2 с сертификатом A2.

      '
  distractorRationales:
    a:
      lv: A2 rules (including the 5 m low-speed reduction) require both a C2 drone AND the A2 competence certificate. The pilot in this scenario holds only A1/A3.
      en: A2 rules (including the 5 m low-speed reduction) require both a C2 drone AND the A2 competence certificate. The pilot in this scenario holds only A1/A3.
      ru: Правила A2 (включая снижение до 5 м в режиме малой скорости) требуют как C2-дрона, так и сертификата A2. Пилот в данном сценарии имеет только A1/A3.
    b:
      lv: C2 klase nevar darboties A1 apakškategorijā. Klase nosaka minimālo apakškategoriju — C2 sākas ar A2 vai A3.
      en: C2 class cannot operate in A1. The class determines the minimum sub-category — C2 starts at A2 or A3.
      ru: Класс C2 не может работать в A1. Класс определяет минимальную подкатегорию — C2 начинается с A2 или A3.
    d:
      lv: Strādnieku piekrišana A3 kontekstā neietekmē minimālās distanču prasības. A3 distanču noteikumi ir absolūti — tos nevar aizstāt ar privātu piekrišanu.
      en: Worker consent in the A3 context does not affect the minimum distance requirements. A3 distance rules are absolute — they cannot be replaced by private consent.
      ru: Согласие рабочих в контексте A3 не влияет на минимальные требования к дистанции. Правила расстояний A3 абсолютны — их нельзя заменить частным согласием.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 UAS.OPEN.030/040; UAS.OPEN.030(2)
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: ar-008
  stem:
    lv: Uzņēmums nosūta darbinieku lidot ar uzņēmuma dronu. Kurš jāreģistrē kā UAS operators?
    en: A company sends an employee to fly the company's drone. Who must register as the UAS operator?
    ru: Компания посылает сотрудника летать на корпоративном дроне. Кто должен быть зарегистрирован как оператор UAS?
  options:
  - id: a
    text:
      lv: Darbinieks — jo viņš ir tālvadības pilots.
      en: The employee — because they are the remote pilot.
      ru: Сотрудник — потому что он дистанционный пилот.
  - id: b
    text:
      lv: Uzņēmums — UAS operators ir juridiskā vai fiziskā persona, kas ekspluatē UAS.
      en: The company — the UAS operator is the legal or natural person operating the UAS.
      ru: Компания — оператор UAS — это юридическое или физическое лицо, эксплуатирующее UAS.
  - id: c
    text:
      lv: Abi — uzņēmums un darbinieks atsevišķi jāreģistrē.
      en: Both — the company and employee must register separately.
      ru: Оба — компания и сотрудник должны регистрироваться отдельно.
  - id: d
    text:
      lv: Neviens — juridiskas personas ir atbrīvotas no reģistrācijas.
      en: Neither — legal entities are exempt from registration.
      ru: Никто — юридические лица освобождены от регистрации.
  correctOptionId: b
  explanation:
    lv: 'Reg 2019/947 definē UAS operatoru kā juridisko vai fizisko personu, kas ekspluatē UAS. Uzņēmums, kura īpašums ir drons, ir operators un jāreģistrē. Darbinieks ir tālvadības pilots un jākvalificē (sertifikāts), bet nav operators. Reģistrācija un kvalifikācija ir atsevišķas prasības atsevišķām pusēm.

      '
    en: 'Reg 2019/947 defines the UAS operator as the legal or natural person operating the UAS. The company that owns the drone is the operator and must register. The employee is the remote pilot and must be qualified (certificate) but is not the operator. Registration and qualification are separate requirements for separate parties.

      '
    ru: 'Регл. 2019/947 определяет оператора UAS как юридическое или физическое лицо, эксплуатирующее UAS. Компания, которой принадлежит дрон, — оператор и должна зарегистрироваться. Сотрудник — дистанционный пилот и должен иметь квалификацию (сертификат), но не является оператором.

      '
  distractorRationales:
    a:
      lv: Tālvadības pilots nav tas pats, kas UAS operators. Pilots var būt darbinieks; operators ir tas, kurš ekspluatē sistēmu (parasti īpašnieks/darba devējs).
      en: The remote pilot is not the same as the UAS operator. The pilot may be an employee; the operator is the entity that operates the system (typically the owner/employer).
      ru: Дистанционный пилот — не то же самое, что оператор UAS. Пилот может быть сотрудником; оператор — юридическое лицо, эксплуатирующее систему.
    c:
      lv: Atsevišķa darbinieka reģistrācija nav prasīta. Operators reģistrējas; pilots iegūst sertifikātu. Šīs ir divas dažādas prasības — nevis dubultā reģistrācija.
      en: Separate employee registration is not required. The operator registers; the pilot gets certified. These are two different requirements — not double registration.
      ru: Отдельная регистрация сотрудника не требуется. Оператор регистрируется; пилот сертифицируется. Это два разных требования, а не двойная регистрация.
    d:
      lv: Juridiskas personas nav atbrīvotas — tās ir galvenais reģistrācijas subjekts kā UAS operatori.
      en: Legal entities are not exempt — they are the primary registration subject as UAS operators.
      ru: Юридические лица не освобождены — они являются основным субъектом регистрации как операторы UAS.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 Art. 2(2) — definition of UAS operator; Art. 14 — registration
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-009
  stem:
    lv: Kāds ir C4 klases UAS unikālais operacionālais ierobežojums salīdzinājumā ar C3?
    en: What is the unique operational restriction of a C4 class UAS compared to C3?
    ru: Каково уникальное операционное ограничение UAS класса C4 по сравнению с C3?
  options:
  - id: a
    text:
      lv: C4 droni nevar laisties ārā no A3 zonas.
      en: C4 drones cannot be operated outside A3 zones.
      ru: Дроны C4 не могут эксплуатироваться за пределами зон A3.
  - id: b
    text:
      lv: C4 droni nedrīkst izmantot autonomos vai daļēji autonomos lidojuma režīmus — tikai manuālā vadība.
      en: C4 drones must not use autonomous or semi-autonomous flight modes — manual control only.
      ru: Дроны C4 не должны использовать автономные или полуавтономные режимы полёта — только ручное управление.
  - id: c
    text:
      lv: C4 droni nedrīkst izmantot kameras.
      en: C4 drones may not use cameras.
      ru: Дроны C4 не могут использовать камеры.
  - id: d
    text:
      lv: C4 droniem ir ļoti zems ātruma limits — 19 m/s.
      en: C4 drones have a very low speed limit — 19 m/s.
      ru: У дронов C4 очень низкий предел скорости — 19 м/с.
  correctOptionId: b
  explanation:
    lv: 'C4 klase definē manuālās vadības aviomodeļa stilu, kas ir nozarē pirmsregulācijas periodā. C4 droni var darboties A3, bet tiem nav atļautas autonomas vai daļēji autonomas sistēmas (GPS autopilots, maršruta sekošana, sevis uzturēšanas režīmi). C3 šādu ierobežojumu nav — tas var būt pilnībā autonoms.

      '
    en: 'C4 class defines the manual-control model-aircraft style that predates regulation in the industry. C4 may operate in A3 but must not use autonomous or semi-autonomous systems (GPS autopilot, route following, hold modes). C3 has no such restriction — it can be fully autonomous.

      '
    ru: 'Класс C4 определяет стиль авиамодели с ручным управлением, существовавший до регулирования. C4 может работать в A3, но не должен использовать автономные или полуавтономные системы (GPS-автопилот, следование маршруту, режимы удержания). У C3 такого ограничения нет.

      '
  distractorRationales:
    a:
      lv: C3 arī darbojas tikai A3 — A3 nav C4 unikāls ierobežojums.
      en: C3 also operates only in A3 — A3 is not a unique C4 restriction.
      ru: C3 также работает только в A3 — это не уникальное ограничение C4.
    c:
      lv: Kamera nav C4 ierobežojums — C4 droni var būt aprīkoti ar kamerām. Ierobežojums attiecas uz vadības veidu, ne uz aprīkojumu.
      en: Cameras are not a C4 restriction — C4 drones may be equipped with cameras. The restriction concerns the control mode, not the equipment.
      ru: Камеры не являются ограничением C4 — дроны C4 могут быть оснащены камерами. Ограничение касается режима управления, а не оборудования.
    d:
      lv: 19 m/s ātruma limits ir C0, nevis C4 prasība. C4 (< 25 kg) nav šāds specifisks ātruma limits.
      en: The 19 m/s speed cap is a C0, not a C4, requirement. C4 (< 25 kg) has no such specific speed limit.
      ru: Предел 19 м/с — требование C0, а не C4. C4 (< 25 кг) не имеет такого конкретного ограничения скорости.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/945 Annex Part 5 — C4 requirements
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
- id: ar-010
  stem:
    lv: Kāda ir Atvērtās kategorijas maksimālā UAS masa (MTOM)?
    en: What is the maximum UAS mass (MTOM) for the Open category?
    ru: Какова максимальная масса UAS (MTOM) для Открытой категории?
  options:
  - id: a
    text:
      lv: 4 kg.
      en: 4 kg.
      ru: 4 кг.
  - id: b
    text:
      lv: 25 kg.
      en: 25 kg.
      ru: 25 кг.
  - id: c
    text:
      lv: 150 kg.
      en: 150 kg.
      ru: 150 кг.
  - id: d
    text:
      lv: Nav ierobežojuma.
      en: No limit.
      ru: Без ограничений.
  correctOptionId: b
  explanation:
    lv: 'Atvērtā kategorija ir ierobežota UAS ar MTOM < 25 kg. Virs 25 kg nepieciešama Specifiskā kategorija ar SORA riska novērtējumu vai STS standartscenāriju, vai Sertificētā kategorija attiecīgajiem riska līmeņiem.

      '
    en: 'Open category is limited to UAS with MTOM < 25 kg. Above 25 kg a Specific category with SORA risk assessment or STS standard scenario is required, or the Certified category for appropriate risk levels.

      '
    ru: 'Открытая категория ограничена UAS с MTOM < 25 кг. Свыше 25 кг требуется Специальная категория с оценкой риска SORA или стандартным сценарием STS, либо Сертифицированная категория.

      '
  distractorRationales:
    a:
      lv: 4 kg ir C2 klases limits, nevis Atvērtās kategorijas kopējais limits. C3 un C4 ļauj lidot Atvērtajā līdz 25 kg.
      en: 4 kg is the C2 class limit, not the Open category overall limit. C3 and C4 allow Open operations up to 25 kg.
      ru: 4 кг — предел класса C2, а не общий предел Открытой категории. C3 и C4 разрешают Открытые операции до 25 кг.
    c:
      lv: 150 kg ir Sertificētās kategorijas slieksnis, nevis Atvērtās. Atvērtā beidzas pie 25 kg.
      en: 150 kg is the Certified category threshold, not Open. Open ends at 25 kg.
      ru: 150 кг — порог Сертифицированной категории, а не Открытой. Открытая заканчивается на 25 кг.
    d:
      lv: Atvērtajai kategorijai ir stingra 25 kg masa. Tā nav bezmasa kategorija.
      en: The Open category has a firm 25 kg mass cap. It is not a mass-unlimited category.
      ru: Открытая категория имеет жёсткий предел в 25 кг. Это не категория без ограничений по массе.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 Art. 4(1) — Open category definition
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: factual
- id: ar-011
  stem:
    lv: Kas ir UAS operatora reģistrācija un no kādas masas tā ir obligāta?
    en: What is UAS operator registration and from what mass is it mandatory?
    ru: Что такое регистрация оператора UAS и с какой массы она обязательна?
  options:
  - id: a
    text:
      lv: Reģistrācija ir dronam piešķirts numurs; obligāta no 1 kg.
      en: Registration is a number assigned to the drone; mandatory from 1 kg.
      ru: Регистрация — это номер, присвоенный дрону; обязательна с 1 кг.
  - id: b
    text:
      lv: Reģistrācija identificē operatoru (juridisko/fizisko personu); obligāta visiem UAS ≥ 250 g vai tiem, kas ar sensoru/kameru, vai Specifiskajā kategorijā.
      en: Registration identifies the operator (legal/natural person); mandatory for all UAS ≥ 250 g or those with a sensor/camera, or in the Specific category.
      ru: Регистрация идентифицирует оператора (юридическое/физическое лицо); обязательна для всех UAS ≥ 250 г, а также оснащённых датчиком/камерой или в Специальной категории.
  - id: c
    text:
      lv: Reģistrācija identificē pilotu; obligāta visiem pilotiem neatkarīgi no masas.
      en: Registration identifies the pilot; mandatory for all pilots regardless of mass.
      ru: Регистрация идентифицирует пилота; обязательна для всех пилотов независимо от массы.
  - id: d
    text:
      lv: Reģistrācija ir lidojuma atļauja; tā jāsaņem pirms katra lidojuma.
      en: Registration is a flight permit; it must be obtained before each flight.
      ru: Регистрация — это разрешение на полёт; её необходимо получать перед каждым полётом.
  correctOptionId: b
  explanation:
    lv: 'Saskaņā ar Reg 2019/947 Art. 14, operators (nevis drons, nevis pilots) reģistrējas dalībvalsts kompetentajā iestādē. Reģistrācija obligāta: UAS MTOM ≥ 250 g, vai jebkuram UAS ar sensoru/kameru, vai Specifiskajā kategorijā. Reģistrācija piešķir operatoram numuru, kas tiek norādīts dronam (uzlīme/Remote ID). Latvijā reģistrācija notiek e.caa.gov.lv.

      '
    en: 'Under Reg 2019/947 Art. 14, the operator (not the drone, not the pilot) registers with the member state competent authority. Registration is mandatory: UAS MTOM ≥ 250 g, or any UAS with a sensor/camera, or in the Specific category. Registration assigns the operator a number displayed on the drone (sticker/Remote ID). In Latvia registration is at e.caa.gov.lv.

      '
    ru: 'Согласно ст. 14 Регл. 2019/947, оператор (не дрон, не пилот) регистрируется в компетентном органе государства-члена. Регистрация обязательна: MTOM UAS ≥ 250 г, или для любого UAS с датчиком/камерой, или в Специальной категории. Регистрация присваивает оператору номер, отображаемый на дроне (наклейка/Remote ID). В Латвии регистрация осуществляется через e.caa.gov.lv.

      '
  distractorRationales:
    a:
      lv: Reģistrācija identificē operatoru, nevis dronu, un piešķir operatora numuru. Obligātais sliekšnis ir 250 g, nevis 1 kg.
      en: Registration identifies the operator, not the drone, and assigns an operator number. The mandatory threshold is 250 g, not 1 kg.
      ru: Регистрация идентифицирует оператора, а не дрон, и присваивает номер оператора. Обязательный порог — 250 г, а не 1 кг.
    c:
      lv: Operators reģistrējas, nevis pilots. Pilota kompetenci apliecina atsevišķs sertifikāts (piemēram, A1/A3 tiešsaistes apmācības apliecība).
      en: The operator registers, not the pilot. Pilot competence is demonstrated by a separate certificate (e.g. A1/A3 online training certificate).
      ru: Регистрируется оператор, а не пилот. Компетентность пилота подтверждается отдельным сертификатом (например, свидетельством об онлайн-обучении A1/A3).
    d:
      lv: Operatora reģistrācija ir vienreizēja vai periodiska administrācijas procedūra, nevis katras lidojuma atļauja. Tā nav lidojuma atļauja.
      en: Operator registration is a one-time or periodic administrative procedure, not a per-flight permit. It is not a flight permit.
      ru: Регистрация оператора — это единовременная или периодическая административная процедура, а не разрешение на каждый полёт. Это не разрешение на полёт.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg 2019/947 Art. 14 — UAS operator registration
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-012
  stem:
    lv: Pilots ir A1/A3 sertificēts un vēlas lidot ar C1 klases dronu virs atsevišķas personas. Cik liela masa ir C1 klases UAS robežvērtība?
    en: A pilot is A1/A3 certified and wants to fly a C1-class drone over an isolated person. What is the mass threshold for a C1-class UAS?
    ru: Пилот имеет сертификат A1/A3 и хочет летать на дроне класса C1 над одиноким человеком. Каков массовый порог для UAS класса C1?
  options:
  - id: a
    text:
      lv: < 250 g.
      en: < 250 g.
      ru: < 250 г.
  - id: b
    text:
      lv: < 900 g.
      en: < 900 g.
      ru: < 900 г.
  - id: c
    text:
      lv: < 4 kg.
      en: < 4 kg.
      ru: < 4 кг.
  - id: d
    text:
      lv: < 2 kg.
      en: < 2 kg.
      ru: < 2 кг.
  correctOptionId: b
  explanation:
    lv: 'Regula 2019/945 definē C1 klasi: UAS ar MTOM < 900 g (bez uzlādētāja vai baterijas). C1 klases UAS darbojas A1 apakškategorijā, kur ir atļauts lidot pāri atsevišķām personām (bet nekad virs pulcēšanās). C0 robežvērtība ir < 250 g; C2 — < 4 kg; C3 — < 25 kg.

      '
    en: 'Reg 2019/945 defines C1 class: UAS with MTOM < 900 g (excluding charger or battery). C1-class UAS operates in A1 sub-category, where overflight of isolated individuals is permitted (but never over assemblies). C0 threshold is < 250 g; C2 — < 4 kg; C3 — < 25 kg.

      '
    ru: 'Регл. 2019/945 определяет класс C1: UAS с MTOM < 900 г (без зарядного устройства или аккумулятора). UAS класса C1 работает в подкатегории A1, где облёт отдельных лиц разрешён (но никогда над скоплениями). Порог C0 — < 250 г; C2 — < 4 кг; C3 — < 25 кг.

      '
  distractorRationales:
    a:
      lv: 250 g ir C0 klases robežvērtība, nevis C1. C0 ir vieglākā un mazāk ierobežotā klase.
      en: 250 g is the C0 class threshold, not C1. C0 is the lightest and least restricted class.
      ru: 250 г — порог класса C0, а не C1. C0 — самый лёгкий и наименее ограниченный класс.
    c:
      lv: 4 kg ir C2 klases robežvērtība, nevis C1. C2 klase darbojas A2 apakškategorijā.
      en: 4 kg is the C2 class threshold, not C1. C2 class operates in the A2 sub-category.
      ru: 4 кг — порог класса C2, а не C1. Класс C2 работает в подкатегории A2.
    d:
      lv: 2 kg nav nevienas C klases robežvērtība. Klases ir C0 (< 250 g), C1 (< 900 g), C2 (< 4 kg), C3 (< 25 kg), C4 (< 25 kg ar papildu apstākļiem).
      en: 2 kg is not a threshold for any C class. The classes are C0 (< 250 g), C1 (< 900 g), C2 (< 4 kg), C3 (< 25 kg), C4 (< 25 kg with additional conditions).
      ru: '2 кг не является порогом ни для одного класса C. Классы: C0 (< 250 г), C1 (< 900 г), C2 (< 4 кг), C3 (< 25 кг), C4 (< 25 кг с дополнительными условиями).'
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg 2019/945 Part 2 — C1 class definition; Reg 2019/947 A1 sub-category
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-013
  stem:
    lv: Kāds ir minimālais vecums A1/A3 drona pilotam saskaņā ar Regulu 2019/947?
    en: What is the minimum age for an A1/A3 drone pilot under Regulation 2019/947?
    ru: Каков минимальный возраст пилота дрона A1/A3 согласно Регламенту 2019/947?
  options:
  - id: a
    text:
      lv: 14 gadi.
      en: 14 years.
      ru: 14 лет.
  - id: b
    text:
      lv: 16 gadi.
      en: 16 years.
      ru: 16 лет.
  - id: c
    text:
      lv: 18 gadi.
      en: 18 years.
      ru: 18 лет.
  - id: d
    text:
      lv: Nav minimālā vecuma prasības.
      en: There is no minimum age requirement.
      ru: Минимального возрастного требования нет.
  correctOptionId: b
  explanation:
    lv: 'Reg 2019/947 nosaka minimālo vecumu 16 gadi A1/A3 sertifikāta saņemšanai. Izņēmumi: < 250 g UAS bez kameras (C0 bez sensora) — vecuma prasību nav. Jaunāki piloti var lidot kluba vai asociācijas uzraudzībā. Dalībvalstis var noteikt augstāku, bet ne zemāku minimālo vecumu.

      '
    en: 'Reg 2019/947 sets the minimum age at 16 years for obtaining the A1/A3 certificate. Exceptions: < 250 g UAS without camera (C0 without sensor) — no age requirement. Younger pilots may fly under club or association supervision. Member states may set a higher but not lower minimum age.

      '
    ru: 'Регл. 2019/947 устанавливает минимальный возраст 16 лет для получения сертификата A1/A3. Исключения: UAS < 250 г без камеры (C0 без датчика) — возрастных требований нет. Молодые пилоты могут летать под надзором клуба или ассоциации. Государства-члены могут устанавливать более высокий, но не более низкий минимальный возраст.

      '
  distractorRationales:
    a:
      lv: 14 gadi nav norādīti kā minimālais vecums Reg 2019/947. Regulā norādīts 16 gadi.
      en: 14 years is not stated as the minimum age in Reg 2019/947. The regulation states 16 years.
      ru: 14 лет не указано как минимальный возраст в Регл. 2019/947. В регламенте указано 16 лет.
    c:
      lv: 18 gadi ir vecāku darbību tiesiskās kapacitātes vecums dažās valstīs, bet Reg 2019/947 minimums ir 16 gadi, nevis 18.
      en: 18 years is the legal capacity age for adults in some countries, but Reg 2019/947 minimum is 16 years, not 18.
      ru: 18 лет — возраст правовой дееспособности совершеннолетних в некоторых странах, но минимум Регл. 2019/947 составляет 16 лет, а не 18.
    d:
      lv: Vecuma prasība pastāv — 16 gadi par A1/A3 sertifikātu. Bez prasības ir tikai UAS bez sensora < 250 g.
      en: An age requirement exists — 16 years for the A1/A3 certificate. Only UAS without sensor < 250 g have no age requirement.
      ru: Возрастное требование существует — 16 лет для сертификата A1/A3. Только UAS без датчика < 250 г не имеют возрастного требования.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg 2019/947 Art. UAS.OPEN.020 — minimum age
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-014
  stem:
    lv: Operators beidz izmantot savu dronu un nodod to citam operatoram. Kādas ir operatora reģistrācijas sekas?
    en: An operator stops using their drone and transfers it to another operator. What are the operator registration implications?
    ru: Оператор прекращает использовать свой дрон и передаёт его другому оператору. Каковы последствия для регистрации оператора?
  options:
  - id: a
    text:
      lv: Reģistrācija automātiski pāriet uz jauno operatoru.
      en: Registration automatically transfers to the new operator.
      ru: Регистрация автоматически переходит к новому оператору.
  - id: b
    text:
      lv: Jaunajam operatoram jāreģistrējas atsevišķi; vecajam operatoram nav jādara nekas.
      en: The new operator must register separately; the old operator need do nothing.
      ru: Новый оператор должен зарегистрироваться отдельно; старому оператору ничего делать не нужно.
  - id: c
    text:
      lv: Jaunajam operatoram jāreģistrējas atsevišķi; vecajam operatoram jāatjaunina reģistrācija vai jāatreģistrējas, ja vairs nelieto nevienu UAS.
      en: The new operator must register separately; the old operator must update their registration or deregister if they no longer operate any UAS.
      ru: Новый оператор должен зарегистрироваться отдельно; старый оператор должен обновить регистрацию или аннулировать её, если больше не эксплуатирует UAS.
  - id: d
    text:
      lv: Reģistrācija paliek pie vecā operatora uz 1 gadu pēc nodošanas.
      en: Registration remains with the old operator for 1 year after transfer.
      ru: Регистрация остаётся у старого оператора на 1 год после передачи.
  correctOptionId: c
  explanation:
    lv: 'Operatora reģistrācija ir saistīta ar operatoru, nevis ar konkrētu dronu. Nododot dronu, jaunajam operatoram jāreģistrējas (ja vēl nav), un dronā jāmarķē ar jauno operatora numuru. Vecajam operatoram nav aktīvu UAS — reģistrācija jāatjaunina vai jāatreģistrējas, lai dati būtu precīzi.

      '
    en: 'Operator registration is tied to the operator, not to a specific drone. Upon transfer, the new operator must register (if not already), and the drone must be marked with the new operator number. The old operator has no active UAS — registration should be updated or cancelled to keep data accurate.

      '
    ru: 'Регистрация оператора привязана к оператору, а не к конкретному дрону. При передаче новый оператор должен зарегистрироваться (если ещё не зарегистрирован), а дрон должен быть промаркирован новым номером оператора. У старого оператора нет активных UAS — регистрацию следует обновить или аннулировать для точности данных.

      '
  distractorRationales:
    a:
      lv: Reģistrācija nav automātisks nodošanas process. Katrs operators reģistrējas pats.
      en: Registration is not an automatic transfer process. Each operator registers themselves.
      ru: Регистрация не является автоматическим процессом передачи. Каждый оператор регистрируется самостоятельно.
    b:
      lv: Vecajam operatoram arī ir pienākums atjaunināt vai anulēt savu reģistrāciju, ja vairs nav aktīvu UAS. Regulatīvā precizitāte prasa to.
      en: The old operator also has an obligation to update or cancel their registration if they have no more active UAS. Regulatory accuracy requires this.
      ru: У старого оператора также есть обязательство обновить или аннулировать регистрацию, если у него больше нет активных UAS. Точность данных требует этого.
    d:
      lv: Nav 1 gada "pagaidām aktīvas" reģistrācijas perioda pēc UAS nodošanas. Atjaunināšanas pienākums ir tūlītējs.
      en: There is no 1-year "temporarily active" registration period after UAS transfer. The update obligation is immediate.
      ru: Нет 1-годичного периода «временно активной» регистрации после передачи UAS. Обязательство по обновлению является немедленным.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg 2019/947 Art. 14 — operator registration obligations
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
- id: ar-015
  stem:
    lv: Pilots ir nokārtojis A1/A3 tiešsaistes apmācību. Kad viņam jāatjauno sertifikāts?
    en: A pilot has completed A1/A3 online training. When must they renew the certificate?
    ru: Пилот прошёл онлайн-обучение A1/A3. Когда необходимо обновить сертификат?
  options:
  - id: a
    text:
      lv: Sertifikātam nav derīguma termiņa — tas paliek spēkā mūžīgi.
      en: The certificate has no expiry — it remains valid indefinitely.
      ru: Сертификат не имеет срока действия — он действует бессрочно.
  - id: b
    text:
      lv: Ik pēc 1 gada.
      en: Every 1 year.
      ru: Каждый год.
  - id: c
    text:
      lv: Ik pēc 5 gadiem Regulas 2019/947 ietvaros; dalībvalstis var noteikt atšķirīgus termiņus.
      en: Every 5 years under Reg 2019/947; member states may set different intervals.
      ru: Каждые 5 лет в соответствии с Регл. 2019/947; государства-члены могут устанавливать разные интервалы.
  - id: d
    text:
      lv: Ik pēc 3 gadiem.
      en: Every 3 years.
      ru: Каждые 3 года.
  correctOptionId: c
  explanation:
    lv: 'Reg 2019/947 paredz 5 gadu derīguma periodu A1/A3 tiešsaistes apmācības sertifikātam. Pēc 5 gadiem apmācība jāatjauno. Latvijas CAA var noteikt atšķirīgus termiņus, tāpēc jāpārbauda aktuālā nacionālā prasība e.caa.gov.lv.

      '
    en: 'Reg 2019/947 provides for a 5-year validity period for the A1/A3 online training certificate. After 5 years the training must be renewed. Latvia''s CAA may set different intervals, so the current national requirement should be checked at e.caa.gov.lv.

      '
    ru: 'Регл. 2019/947 предусматривает 5-летний срок действия сертификата онлайн-обучения A1/A3. По истечении 5 лет обучение необходимо обновить. CAA Латвии может устанавливать разные интервалы, поэтому следует проверить актуальные национальные требования на e.caa.gov.lv.

      '
  distractorRationales:
    a:
      lv: Sertifikātam ir derīguma termiņš — Reg 2019/947 nosaka 5 gadus. Mūžīgs sertifikāts neatbilst regulai.
      en: The certificate does have an expiry — Reg 2019/947 sets 5 years. A perpetual certificate does not comply with the regulation.
      ru: Сертификат имеет срок действия — Регл. 2019/947 устанавливает 5 лет. Бессрочный сертификат не соответствует регламенту.
    b:
      lv: 1 gads nav norādīts kā A1/A3 sertifikāta derīguma periods Reg 2019/947. Pareizais periods ir 5 gadi.
      en: 1 year is not stated as the A1/A3 certificate validity period in Reg 2019/947. The correct period is 5 years.
      ru: 1 год не указан как срок действия сертификата A1/A3 в Регл. 2019/947. Правильный период — 5 лет.
    d:
      lv: 3 gadi nav norādīts kā A1/A3 sertifikāta derīguma periods Reg 2019/947. Pareizais periods ir 5 gadi.
      en: 3 years is not stated as the A1/A3 certificate validity period in Reg 2019/947. The correct period is 5 years.
      ru: 3 года не указаны как срок действия сертификата A1/A3 в Регл. 2019/947. Правильный период — 5 лет.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg 2019/947 Art. UAS.OPEN.020 — certificate validity period
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-016
  stem:
    lv: Kas nosaka, kurā apakškategorijā (A1, A2, A3) operators var darboties?
    en: What determines which sub-category (A1, A2, A3) an operator may operate in?
    ru: Что определяет, в какой подкатегории (A1, A2, A3) может работать оператор?
  options:
  - id: a
    text:
      lv: Operators izvēlas apakškategoriju brīvi, pamatojoties uz darba vajadzībām.
      en: The operator chooses the sub-category freely based on work needs.
      ru: Оператор свободно выбирает подкатегорию в зависимости от рабочих потребностей.
  - id: b
    text:
      lv: UAS klase (C0–C4), pilota kompetences sertifikāts un plānotās operācijas veids kopā nosaka pieļaujamo apakškategoriju.
      en: The UAS class (C0–C4), pilot competence certificate, and planned operation type together determine the permitted sub-category.
      ru: Класс UAS (C0–C4), сертификат компетентности пилота и тип планируемой операции вместе определяют разрешённую подкатегорию.
  - id: c
    text:
      lv: Tikai pilota sertifikāta līmenis — jo augstāks, jo augstāka apakškategorija.
      en: Only the pilot certificate level — the higher it is, the higher the sub-category.
      ru: Только уровень сертификата пилота — чем он выше, тем выше подкатегория.
  - id: d
    text:
      lv: Tikai UAS masa — jo smagāks, jo zemāka apakškategorija.
      en: Only UAS mass — the heavier, the lower the sub-category.
      ru: Только масса UAS — чем тяжелее, тем ниже подкатегория.
  correctOptionId: b
  explanation:
    lv: 'Apakškategoriju nosaka trīs faktoru kombinācija: (1) UAS klase — C0/C1 → A1; C2 → A2; C3/C4 un mantotie → A3; (2) pilota kompetences sertifikāts — A1/A3 vai A2 papildu sertifikāts; (3) plānotās operācijas veids — piemēram, lidojums virs cilvēkiem prasa noteiktu klasi un sertifikātu.

      '
    en: 'Sub-category is determined by a combination of three factors: (1) UAS class — C0/C1 → A1; C2 → A2; C3/C4 and legacy → A3; (2) pilot competence certificate — A1/A3 or A2 additional certificate; (3) planned operation type — e.g. flying over people requires a specific class and certificate.

      '
    ru: 'Подкатегория определяется сочетанием трёх факторов: (1) класс UAS — C0/C1 → A1; C2 → A2; C3/C4 и унаследованные → A3; (2) сертификат компетентности пилота — A1/A3 или дополнительный сертификат A2; (3) тип планируемой операции — например, полёт над людьми требует определённого класса и сертификата.

      '
  distractorRationales:
    a:
      lv: Apakškategorija nav brīva izvēle. To nosaka regulatīvie faktori — UAS klase un pilota sertifikāts.
      en: Sub-category is not a free choice. It is determined by regulatory factors — UAS class and pilot certificate.
      ru: Подкатегория — не свободный выбор. Она определяется нормативными факторами — классом UAS и сертификатом пилота.
    c:
      lv: Pilota sertifikāts ir viens no faktoriem, bet ne vienīgais. UAS klase ir galvenais parametrs, kas nosaka apakškategoriju.
      en: The pilot certificate is one factor but not the only one. The UAS class is the primary parameter determining the sub-category.
      ru: Сертификат пилота — один из факторов, но не единственный. Класс UAS является основным параметром, определяющим подкатегорию.
    d:
      lv: Masa ir saistīta ar klasi (C0, C1, C2 u.c.), bet klase nosaka apakškategoriju, nevis masa tieši.
      en: Mass is related to class (C0, C1, C2, etc.) but class determines sub-category, not mass directly.
      ru: Масса связана с классом (C0, C1, C2 и т.д.), но класс определяет подкатегорию, а не масса напрямую.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg 2019/947 Art. UAS.OPEN.020/030/040 — sub-category requirements
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
- id: ar-017
  stem:
    lv: Operators pirmo reizi reģistrējas e.caa.gov.lv. Kādā solis ir PIRMAIS?
    en: An operator registers for the first time at e.caa.gov.lv. What is the FIRST step?
    ru: Оператор впервые регистрируется на e.caa.gov.lv. Каков ПЕРВЫЙ шаг?
  options:
  - id: a
    text:
      lv: Iegādāties apdrošināšanas polisi.
      en: Purchase an insurance policy.
      ru: Приобрести страховой полис.
  - id: b
    text:
      lv: Nokārtot A1/A3 tiešsaistes pārbaudījumu.
      en: Pass the A1/A3 online test.
      ru: Сдать онлайн-тест A1/A3.
  - id: c
    text:
      lv: Izveidot kontu e.caa.gov.lv, norādot personas datus, un iesniegt operatora reģistrācijas pieteikumu.
      en: Create an account at e.caa.gov.lv, providing personal data, and submit the operator registration application.
      ru: Создать учётную запись на e.caa.gov.lv, указав персональные данные, и подать заявку на регистрацию оператора.
  - id: d
    text:
      lv: Aizpildīt papīra formu un iesniegt CAA Latvia birojā Rīgā.
      en: Fill in a paper form and submit it at the CAA Latvia office in Riga.
      ru: Заполнить бумажную форму и сдать её в офис CAA Latvia в Риге.
  correctOptionId: c
  explanation:
    lv: 'Operators reģistrācija Latvijā notiek pilnībā tiešsaistē caur e.caa.gov.lv. Pirmais solis ir konta izveide portālā, personas datu ievade un operators pieteikuma iesniegšana. Sertifikāts un apdrošināšana ir atsevišķas, paralēlas prasības, bet tie nav operators reģistrācijas priekšnoteikums.

      '
    en: 'Operator registration in Latvia is done entirely online via e.caa.gov.lv. The first step is creating an account in the portal, entering personal data, and submitting the operator application. The certificate and insurance are separate, parallel requirements, but they are not prerequisites for operator registration.

      '
    ru: 'Регистрация оператора в Латвии осуществляется полностью онлайн через e.caa.gov.lv. Первый шаг — создание учётной записи на портале, ввод персональных данных и подача заявки оператора. Сертификат и страхование — отдельные, параллельные требования, но они не являются предварительными условиями для регистрации оператора.

      '
  distractorRationales:
    a:
      lv: Apdrošināšanas iegāde ir atsevišķa prasība, ne pirmais operators reģistrācijas solis. Reģistrācija un apdrošināšana var notikt paralēli.
      en: Purchasing insurance is a separate requirement, not the first operator registration step. Registration and insurance can happen in parallel.
      ru: Приобретение страховки — отдельное требование, а не первый шаг регистрации оператора. Регистрация и страхование могут происходить параллельно.
    b:
      lv: A1/A3 pārbaudījums ir pilota kompetences apliecināšana, nevis operators reģistrācijas priekšnoteikums. Reg 2019/947 Art. 14 atļauj operators reģistrāciju neatkarīgi no pilota sertifikāta.
      en: The A1/A3 test is pilot competence demonstration, not a prerequisite for operator registration. Reg 2019/947 Art. 14 allows operator registration independently of the pilot certificate.
      ru: Тест A1/A3 — подтверждение компетентности пилота, а не предварительное условие регистрации оператора. Ст. 14 Регл. 2019/947 разрешает регистрацию оператора независимо от сертификата пилота.
    d:
      lv: Papīra formu iesniegšana CAA Latvia birojā nav prasīta — reģistrācija ir pilnībā elektroniski caur e.caa.gov.lv.
      en: Submitting a paper form at the CAA Latvia office is not required — registration is entirely electronic via e.caa.gov.lv.
      ru: Подача бумажной формы в офис CAA Latvia не требуется — регистрация полностью электронная через e.caa.gov.lv.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — CAA Latvia — e.caa.gov.lv operator registration; Reg 2019/947 Art. 14
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-018
  stem:
    lv: Kādas ir trīs UAS operāciju kategorijas ES regulējumā?
    en: What are the three UAS operation categories in the EU framework?
    ru: Какие три категории операций UAS существуют в регулировании ЕС?
  options:
  - id: a
    text:
      lv: Atvērtā, Specifiskā, Sertificētā.
      en: Open, Specific, Certified.
      ru: Открытая, Специальная, Сертифицированная.
  - id: b
    text:
      lv: Privātā, Komerciālā, Militārā.
      en: Private, Commercial, Military.
      ru: Частная, Коммерческая, Военная.
  - id: c
    text:
      lv: Dienas, Nakts, Miglas.
      en: Day, Night, Fog.
      ru: Дневная, Ночная, Туманная.
  - id: d
    text:
      lv: A1, A2, A3.
      en: A1, A2, A3.
      ru: A1, A2, A3.
  correctOptionId: a
  explanation:
    lv: 'ES sistēmā operācijas tiek sadalītas Open / Specific / Certified pēc riska līmeņa. A1/A2/A3 ir Open kategorijas apakškategorijas.

      '
    en: 'The EU framework groups operations into Open / Specific / Certified based on risk. A1/A2/A3 are Open subcategories.

      '
    ru: 'В системе ЕС операции делятся на Open / Specific / Certified по риску. A1/A2/A3 — подкатегории Open.

      '
  distractorRationales:
    b:
      lv: Kategorijas nav “privāts/komerciāls”; tās ir risku balstītas.
      en: Categories are not “private/commercial”; they are risk-based.
      ru: Категории не «частная/коммерческая», а риск‑ориентированные.
    c:
      lv: Diennakts laiks nav kategorija; tas ir operācijas nosacījums.
      en: Time of day is not a category; it is an operating condition.
      ru: Время суток — не категория, а условие выполнения.
    d:
      lv: A1/A2/A3 ir apakškategorijas Open kategorijā, nevis visas sistēmas kategorijas.
      en: A1/A2/A3 are subcategories within Open, not the full category set.
      ru: A1/A2/A3 — подкатегории Open, а не весь набор категорий.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Open/Specific/Certified categories; definitions
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-019
  stem:
    lv: Kura regula galvenokārt nosaka UAS tehniskās prasības un CE klašu marķējumu?
    en: Which regulation primarily sets UAS technical requirements and CE class marking?
    ru: Какой регламент в основном задаёт технические требования и CE‑классы UAS?
  options:
  - id: a
    text:
      lv: Regula (ES) 2019/945.
      en: Regulation (EU) 2019/945.
      ru: Регламент (ЕС) 2019/945.
  - id: b
    text:
      lv: Regula (ES) 2019/947.
      en: Regulation (EU) 2019/947.
      ru: Регламент (ЕС) 2019/947.
  - id: c
    text:
      lv: Regula (ES) 2018/1139.
      en: Regulation (EU) 2018/1139.
      ru: Регламент (ЕС) 2018/1139.
  - id: d
    text:
      lv: Regula (ES) 376/2014.
      en: Regulation (EU) 376/2014.
      ru: Регламент (ЕС) 376/2014.
  correctOptionId: a
  explanation:
    lv: '2019/945 attiecas uz UAS produktu prasībām un klašu marķējumu (C0–C6). 2019/947 attiecas uz operācijām un procedūrām.

      '
    en: '2019/945 covers product requirements and class marking (C0–C6). 2019/947 covers operations and procedures.

      '
    ru: '2019/945 — требования к продукту и маркировке классов (C0–C6). 2019/947 — правила эксплуатации.

      '
  distractorRationales:
    b:
      lv: 2019/947 ir operāciju regula, nevis produktu (CE klašu) regula.
      en: 2019/947 is about operations, not product class marking.
      ru: 2019/947 — про эксплуатацию, а не CE‑классы.
    c:
      lv: 2018/1139 ir EASA pamatregula, bet ne detalizētas UAS klašu prasības.
      en: 2018/1139 is the EASA basic regulation, not detailed UAS class requirements.
      ru: 2018/1139 — базовый регламент EASA, не детализация классов UAS.
    d:
      lv: 376/2014 ir par atgadījumu ziņošanu, ne par UAS klasēm.
      en: 376/2014 is about occurrence reporting, not UAS classes.
      ru: 376/2014 — про сообщения об инцидентах, не про классы UAS.
  sourceRef: docs/knowledge/eu-regulations/EU-2019-945-delegated-regulation-EN.pdf — UAS class requirements and marking
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: regulatory
- id: ar-020
  stem:
    lv: Kurš apgalvojums pareizi apraksta Atvērtās kategorijas robežu?
    en: Which statement correctly describes the Open category boundary?
    ru: Какое утверждение правильно описывает границу Открытой категории?
  options:
  - id: a
    text:
      lv: Atvērtā attiecas uz visiem atpūtas UAS lidojumiem.
      en: Open applies to all recreational drone flights.
      ru: Открытая применяется ко всем полётам «для хобби».
  - id: b
    text:
      lv: Atvērtā strādā, kad UAS < 25 kg, VLOS, maks. 120 m AGL, bez bīstamām kravām, bez lidojuma virs pulcēšanās.
      en: Open applies when UAS < 25 kg, VLOS, max 120 m AGL, no dangerous goods, no flight over assemblies.
      ru: Открытая применяется, когда UAS < 25 кг, есть VLOS, максимум 120 м AGL, нет опасных грузов и нет полёта над скоплениями.
  - id: c
    text:
      lv: Atvērtā attiecas uz jebkuru UAS zem 250 g neatkarīgi no citiem apstākļiem.
      en: Open applies to any drone under 250 g regardless of other conditions.
      ru: Открытая применяется к любому UAS легче 250 г независимо от условий.
  - id: d
    text:
      lv: Atvērtā strādā, kad pilotam ir A1/A3 sertifikāts.
      en: Open applies when the pilot holds an A1/A3 certificate.
      ru: Открытая применяется, если у пилота есть сертификат A1/A3.
  correctOptionId: b
  explanation:
    lv: 'Atvērto kategoriju definē piecu vienlaicīgu nosacījumu kopa: zem 25 kg, VLOS, zem 120 m AGL, bez bīstamām kravām, bez pārlidojuma virs pulcēšanās. Visi pieci jāizpilda. Pilota sertifikāts ir prasīts dažās apakškategorijās, bet pats par sevi nedefinē kategorijas robežu.'
    en: 'Open category is defined by five simultaneous conditions: under 25 kg, VLOS, below 120 m AGL, no dangerous goods, no overflight of assemblies. All five must hold. The pilot certificate is required for some sub-categories, but it does not by itself define the category boundary.'
    ru: 'Открытая категория определяется пятью условиями, которые должны выполняться одновременно: UAS < 25 кг, VLOS, ниже 120 м AGL, без опасных грузов, без полёта над скоплениями. Сертификат нужен для некоторых подкатегорий, но сам по себе не определяет границу категории.'
  distractorRationales:
    a:
      lv: Atpūtas/komerciālā nošķiršana nav būtiska — kategoriju definē operatīvie parametri.
      en: The recreational/commercial distinction is irrelevant — category is defined by operational parameters.
      ru: Разделение «хобби/коммерция» не определяет категорию — категория определяется параметрами операции и риском.
    c:
      lv: 250 g robežvērtība ir saistīta ar C0 klasi un apdrošināšanu, ne ar Atvērtās kategorijas robežu.
      en: The 250 g threshold is related to C0 class and insurance, not to the Open category boundary.
      ru: Порог 250 г связан с классом C0 и некоторыми требованиями, но не определяет саму границу Открытой категории.
    d:
      lv: Sertifikāts ir pilota kompetences prasība, nevis tas, kas definē kategoriju.
      en: The certificate is a pilot competence requirement, not what defines the category.
      ru: Сертификат — требование компетентности пилота, но он не является тем, что определяет категорию операции.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Open / Specific / Certified and operator obligations
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: ar-021
  stem:
    lv: UAS pilots ar A1/A3 sertifikātu vēlas lidot ar C1 UAS ārpus tiešās redzamības (BVLOS) tukšā laukā. Vai tas ir atļauts?
    en: A drone pilot with an A1/A3 certificate wants to fly a C1 drone beyond visual line of sight (BVLOS) in an empty field. Is this permitted?
    ru: Пилот с сертификатом A1/A3 хочет лететь дроном класса C1 вне прямой видимости (BVLOS) над пустым полем. Разрешено ли это?
  options:
  - id: a
    text:
      lv: Jā — lauks ir tukšs, tāpēc drošība saglabāta.
      en: Yes — the field is empty, so safety is maintained.
      ru: Да — поле пустое, значит безопасность обеспечена.
  - id: b
    text:
      lv: Jā — C1 ar A1/A3 sertifikātu drīkst BVLOS.
      en: Yes — C1 drones may fly BVLOS with an A1/A3 certificate.
      ru: Да — дроны класса C1 могут летать BVLOS с сертификатом A1/A3.
  - id: c
    text:
      lv: Nē — BVLOS ir ārpus Atvērtās, neatkarīgi no apvidus vai UAS klases.
      en: No — BVLOS is outside the Open category, regardless of terrain or drone class.
      ru: Нет — BVLOS всегда вне Открытой категории, независимо от местности и класса UAS.
  - id: d
    text:
      lv: Jā — Atvērtā ļauj BVLOS līdz 500 m.
      en: Yes — Open category allows BVLOS up to 500 m.
      ru: Да — Открытая категория позволяет BVLOS до 500 м.
  correctOptionId: c
  explanation:
    lv: VLOS ir nesamazināmais Atvērtās kategorijas nosacījums. Jebkura BVLOS operācija, neatkarīgi no UAS klases, lauka tukšuma vai sertifikāta, atstāj Atvērto un prasa Specifiskās kategorijas atļauju.
    en: VLOS is a non-negotiable condition of the Open category. Any BVLOS operation, regardless of drone class, field emptiness, or certificate held, exits Open category and requires Specific category authorisation.
    ru: VLOS — обязательное условие Открытой категории. Любой BVLOS-полёт, независимо от класса UAS, пустоты поля или наличия сертификата, выходит из Открытой и требует разрешения Специальной категории.
  distractorRationales:
    a:
      lv: Drošības arguments neatceļ regulas kategoriju definīciju.
      en: The safety rationale does not override regulatory category definitions.
      ru: Аргумент «так безопасно» не отменяет юридического определения категорий в регламенте.
    b:
      lv: Neviens Atvērtās sertifikāts neautorizē BVLOS. A1/A3 ir Atvērtās kvalifikācija.
      en: No Open-category certificate authorises BVLOS. The A1/A3 certificate is an Open-category qualification.
      ru: Ни один сертификат Открытой категории не разрешает BVLOS. A1/A3 — это квалификация для Открытой категории.
    d:
      lv: Atvērtajā nav BVLOS attāluma rezerves.
      en: There is no BVLOS distance allowance in Open category.
      ru: В Открытой категории нет «допуска BVLOS на расстояние».
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Open / Specific / Certified and operator obligations
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: ar-022
  stem:
    lv: Kurš portāls atbild uz praktisko jautājumu “vai šajā konkrētajā vietā Latvijā drīkst lidot un ar kādiem zonas nosacījumiem”?
    en: Which portal answers the practical question 'may I fly at this exact place in Latvia, and under what zone conditions?'
    ru: 'Какой портал отвечает на практический вопрос: “можно ли летать именно в этой точке Латвии и на каких зональных условиях”?'
  options:
  - id: a
    text:
      lv: Tikai ražotāja lietotne.
      en: Only the manufacturer app.
      ru: Только приложение производителя.
  - id: b
    text:
      lv: airspace.lv/drones.
      en: airspace.lv/drones.
      ru: airspace.lv/drones.
  - id: c
    text:
      lv: Jebkura laikapstākļu lietotne ar kartes slāni.
      en: Any weather app with a map layer.
      ru: Любое погодное приложение с картой.
  - id: d
    text:
      lv: Vispārīgs meklētāja rezultāts.
      en: A general search engine result.
      ru: Любой результат поисковика.
  correctOptionId: b
  explanation:
    lv: Praktiskai vietas pārbaudei Latvijā `airspace.lv/drones` ir operatīvā karte UAS ģeogrāfiskajām zonām un to nosacījumiem.
    en: For practical field checking in Latvia, `airspace.lv/drones` is the operational map for UAS geographical zones and their conditions.
    ru: Для практической проверки места полёта в Латвии рабочим источником по UAS geographical zones является `airspace.lv/drones`.
  distractorRationales:
    a:
      lv: Ražotāja lietotnē var būt geofence, bet tā nav Latvijas zonu juridiski saistošais avots.
      en: Manufacturer apps may have geofencing, but they are not the legal source of Latvian zone conditions.
      ru: У производителя может быть geofence, но это не юридически значимый источник латвийских зональных условий.
    c:
      lv: Laikapstākļu kartes nedefinē UAS ģeogrāfisko zonu likumību.
      en: Weather maps do not define UAS geographical-zone legality.
      ru: Погодные карты не определяют законность UAS-операции.
    d:
      lv: Meklētāja rezultāts nav regulēts operatīvais avots.
      en: Search results are not a regulated operational source.
      ru: Результат поисковика не является регулируемым операционным источником.
  sourceRef: docs/knowledge/latvia-caa/web-snapshots/14-normativais-regulejums.md — Latvian regulatory stack; docs/knowledge/latvia-caa/web-snapshots/08-registracija.md — operator registration; docs/knowledge/latvia-caa/web-snapshots/11-geographical-zones.md — geozones and BGKIS
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: ar-023
  stem:
    lv: Pilots saņem BGKIS apstiprinājumu ierobežotai zonai. Ko šis apstiprinājums NEDARA?
    en: A pilot receives BGKIS approval for a restricted zone. What does that approval NOT do?
    ru: Пилот получил одобрение BGKIS для ограниченной зоны. Что это одобрение НЕ делает?
  options:
  - id: a
    text:
      lv: Apstiprina lidojuma logu konkrētajai zonai.
      en: It confirms the flight window for that zone.
      ru: Подтверждает временное окно для полёта в этой зоне.
  - id: b
    text:
      lv: Aizvieto Atvērtās kategorijas robežas, piemēram, VLOS un 120 m griestus.
      en: It replaces Open-category limits such as VLOS and the 120 m ceiling.
      ru: Отменяет ограничения Открытой категории, такие как VLOS и потолок 120 м.
  - id: c
    text:
      lv: Fiksē, ka pilots ir iesniedzis prasīto lokālo pieteikumu.
      en: It records that the pilot submitted the required local notification.
      ru: Подтверждает, что пилот выполнил требуемую локальную процедуру уведомления.
  - id: d
    text:
      lv: Ļauj zonas pārvaldniekam noteikt piekļuves nosacījumus teritorijai.
      en: It allows the local zone manager to condition access to the area.
      ru: Позволяет управляющему зоной задать условия доступа к территории.
  correctOptionId: b
  explanation:
    lv: 'BGKIS apstiprinājums ir lokāls zonas piekļuves mehānisms. Tas neaizvieto Atvērtās kategorijas iekšējās robežas: VLOS, 120 m AGL, bez bīstamām kravām, bez pārlidojuma virs pulcēšanās.'
    en: BGKIS approval is a local zone-access mechanism. It does not replace intrinsic Open-category limits such as VLOS, 120 m AGL, no dangerous goods, and no flight over assemblies of people.
    ru: 'Одобрение BGKIS — это локальный механизм доступа к зоне. Оно не отменяет внутренние ограничения Открытой категории: VLOS, 120 м AGL, отсутствие опасных грузов и запрет на полёт над скоплениями людей.'
  distractorRationales:
    a:
      lv: Laika loga apstiprināšana ir tieši tas, ko BGKIS dara ierobežotās zonās.
      en: Time-window confirmation is exactly what BGKIS approval does for restricted operations.
      ru: Подтверждение временного окна — как раз одна из основных функций одобрения BGKIS.
    c:
      lv: Pieteikuma/apstiprinājuma plūsma ir daļa no BGKIS administratīvās funkcijas.
      en: The notification/approval flow is part of the administrative function of BGKIS.
      ru: Административная процедура уведомления/одобрения — часть самой логики BGKIS.
    d:
      lv: Piekļuve ierobežotajai zonai ir viens no iemesliem, kāpēc BGKIS vispār eksistē.
      en: Restricted-zone access is one of the reasons BGKIS exists.
      ru: Условный доступ к ограниченной зоне — одна из причин существования BGKIS.
  sourceRef: docs/knowledge/latvia-caa/web-snapshots/14-normativais-regulejums.md — Latvian regulatory stack; docs/knowledge/latvia-caa/web-snapshots/08-registracija.md — operator registration; docs/knowledge/latvia-caa/web-snapshots/11-geographical-zones.md — geozones and BGKIS
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: ar-024
  stem:
    lv: Ko primāri identificē operatora reģistrācijas numurs?
    en: What does the operator registration number primarily identify?
    ru: Что в первую очередь идентифицирует регистрационный номер оператора?
  options:
  - id: a
    text:
      lv: Tālvadības pilota apmācības līmeni.
      en: The remote pilot's level of training.
      ru: Уровень подготовки удалённого пилота.
  - id: b
    text:
      lv: Juridisko operatoru, kas atbild par lidaparātu.
      en: The legal operator responsible for the aircraft.
      ru: Юридического оператора, ответственного за аппарат.
  - id: c
    text:
      lv: Drona tehnisko klasi.
      en: The drone's technical class.
      ru: Технический класс дрона.
  - id: d
    text:
      lv: BGKIS atļaujas statusu misijai.
      en: The BGKIS approval status of the mission.
      ru: Статус одобрения BGKIS для миссии.
  correctOptionId: b
  explanation:
    lv: Operatora reģistrācijas numurs saista lidaparātu ar atbildīgo operatora vienību. Tas ir par atbildību, nevis pilota prasmi vai gaisa telpas atļauju.
    en: The operator registration number links the aircraft to the responsible operator entity. It is about accountability, not pilot skill or airspace approval.
    ru: Регистрационный номер оператора связывает аппарат с ответственным оператором как субъектом. Это вопрос ответственности, а не навыка пилота или статуса воздушного пространства.
  distractorRationales:
    a:
      lv: Pilota apmācību pierāda pilota sertifikāts, nevis operatora numurs.
      en: Pilot training is shown by the pilot's certificate, not the operator number.
      ru: Подготовка пилота подтверждается сертификатом пилота, а не номером оператора.
    c:
      lv: Tehnisko klasi parāda klases marķējums, piemēram, C0/C1/C2.
      en: Technical class is shown by the class marking such as C0/C1/C2.
      ru: Технический класс показывается маркировкой класса, например C0/C1/C2.
    d:
      lv: BGKIS statuss ir konkrētas misijas gaisa telpas jautājums, nevis operatora identitāte.
      en: BGKIS status is a mission-specific airspace matter, not the operator identity.
      ru: BGKIS относится к конкретной миссии и воздушному пространству, а не к идентичности оператора.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — operator registration; docs/knowledge/latvia-caa/web-snapshots/ — Latvia CAA registration guidance
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: ar-025
  stem:
    lv: Uzņēmumam pieder vairāki droni, ar kuriem lido dažādi darbinieki. Kurš apgalvojums ir pareizs?
    en: A company owns multiple drones flown by different employees. Which statement is correct?
    ru: Компания владеет несколькими дронами, которыми летают разные сотрудники. Какое утверждение верно?
  options:
  - id: a
    text:
      lv: Katra pilota sertifikāta numuram jāaizstāj operatora numurs uz lidaparāta.
      en: Each pilot's certificate number must replace the operator number on the aircraft.
      ru: Номер сертификата каждого пилота должен заменять номер оператора на аппарате.
  - id: b
    text:
      lv: Uzņēmuma operatora reģistrācija var identificēt visus šī uzņēmuma lidaparātus.
      en: The company's operator registration can identify all aircraft operated by that company.
      ru: Регистрация оператора компании может идентифицировать все аппараты этого оператора.
  - id: c
    text:
      lv: Operatora numurs vajadzīgs tikai smagākajam dronam.
      en: Only the heaviest drone needs an operator number.
      ru: Номер оператора нужен только самому тяжёлому дрону.
  - id: d
    text:
      lv: Klases marķējums atceļ operatora identifikācijas vajadzību.
      en: The class marking removes the need for operator identification.
      ru: Маркировка класса отменяет необходимость идентификации оператора.
  correctOptionId: b
  explanation:
    lv: Operatora reģistrācija pieder operatora vienībai. Ja operators ir viens uzņēmums, tā reģistrācija var identificēt vairākus lidaparātus, ko tas ekspluatē.
    en: The operator registration belongs to the operator entity. If one company is the operator, its registration can identify multiple aircraft operated under that entity.
    ru: Регистрация принадлежит оператору как субъекту. Если оператором является одна компания, её регистрация может идентифицировать несколько аппаратов, эксплуатируемых этой компанией.
  distractorRationales:
    a:
      lv: Pilota sertifikāts neaizvieto operatora identitāti.
      en: Pilot certificates do not replace operator identity.
      ru: Сертификат пилота не заменяет идентичность оператора.
    c:
      lv: Operatora identifikācija nav balstīta tikai uz to, kurš lidaparāts ir smagākais.
      en: Operator identification is not based only on which aircraft is heaviest.
      ru: Требование идентификации оператора не основано только на том, какой аппарат самый тяжёлый.
    d:
      lv: Klases marķējums un operatora identifikācija pilda atšķirīgas funkcijas, un abi var būt vajadzīgi.
      en: Class marking and operator identification serve different functions and both may be required.
      ru: Маркировка класса и идентичность оператора выполняют разные функции, и обе могут быть обязательны.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — operator registration; docs/knowledge/latvia-caa/web-snapshots/ — Latvia CAA registration guidance
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: ar-026
  stem:
    lv: UAS ir marķēts C2, un pilotam ir tikai A1/A3 sertifikāts. Kura apakškategorija ir minimālā, kurā viņš drīkst lidot, un kāds attālums no nepiederošām personām piemērojams?
    en: A drone is marked C2 and the pilot holds only an A1/A3 certificate. What is the minimum sub-category the pilot may use, and what distance from uninvolved persons applies?
    ru: Дрон маркирован C2, пилот имеет только A1/A3. Минимальная подкатегория и дистанция от посторонних?
  options:
  - id: a
    text:
      lv: A1 — bez attāluma prasības, jo A1 atļauj pārlidojumu virs atsevišķām personām.
      en: A1 — no distance requirement because A1 allows overflight of individuals.
      ru: A1 — нет требований по дистанции, A1 допускает пролёт над людьми.
  - id: b
    text:
      lv: A2 ar 5 m (zems ātrums) vai 30 m (parasts) — A1/A3 sertifikāts sedz A2.
      en: A2 with 5 m (low-speed) or 30 m (normal) — the A1/A3 certificate covers A2.
      ru: 'A2 — 5 м (малая скорость) или 30 м: A1/A3 покрывает A2.'
  - id: c
    text:
      lv: A3 ar 30 m (vai 1:1 noteikumu) no nepiederošām personām un 150 m no dzīvojamām zonām.
      en: A3 with 30 m (or 1:1 rule) from uninvolved persons and 150 m from residential areas.
      ru: A3 — ≥ 30 м (или 1:1) от посторонних, ≥ 150 м от жилых зон.
  - id: d
    text:
      lv: Lidot nedrīkst vispār — C2 vienmēr prasa A2 sertifikātu.
      en: No flight is permitted — C2 drones require an A2 certificate for all operations.
      ru: Полёт запрещён — C2 требует A2 для любых операций.
  correctOptionId: c
  explanation:
    lv: C2 UAS var ekspluatēt A3 tikai ar A1/A3 sertifikātu. A3 prasa ≥ 30 m no nepiederošām personām (vai 1:1, atkarībā no tā, kurš ir lielāks) un ≥ 150 m no apdzīvotām zonām. Lai izmantotu A2 noteikumus (5 m vai 30 m), pilotam vajadzīgs arī A2 kompetences sertifikāts.
    en: A C2 drone can be operated in A3 with only an A1/A3 certificate. A3 requires ≥ 30 m from uninvolved persons (or 1:1, whichever is greater) and ≥ 150 m from inhabited areas. To use A2 rules (5 m or 30 m), the pilot also needs the A2 competence certificate.
    ru: C2 без сертификата A2 работает только в A3. A3 требует ≥ 30 м от посторонних (или правило 1:1) и ≥ 150 м от населённых зон. Для A2-правил (5/30 м) нужен отдельный сертификат A2.
  distractorRationales:
    a:
      lv: C2 UAS nevar ekspluatēt pēc A1 noteikumiem. Klase fiksē minimālo apakškategoriju.
      en: A C2 drone cannot be operated under A1 rules. The class fixes the minimum sub-category.
      ru: C2 не может работать в A1 — класс определяет минимальную подкатегорию.
    b:
      lv: A2 noteikumi (5 m / 30 m) prasa papildu A2 kompetences sertifikātu papildus A1/A3.
      en: A2 rules (5 m / 30 m) require an additional A2 competence certificate beyond A1/A3.
      ru: A2-правила (5/30 м) требуют отдельного сертификата A2 помимо A1/A3.
    d:
      lv: C2 UAS drīkst lidot A3 ar tikai A1/A3 sertifikātu. A2 operācijas prasa papildu A2 sertifikātu.
      en: C2 drones can be flown in A3 with only the A1/A3 certificate. A2 operations require the extra A2 certificate.
      ru: C2 в A3 с только A1/A3 разрешено. Запрет не абсолютный — просто ограничен более строгими правилами A3.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Open / Specific / Certified and operator obligations
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: ar-027
  stem:
    lv: Kuriem UAS NAV vajadzīgs pilota sertifikāts lidošanai A1?
    en: Which drones require NO pilot certificate to fly in A1?
    ru: Какие дроны не требуют сертификата для полёта в A1?
  options:
  - id: a
    text:
      lv: C0 UAS zem 250 g.
      en: C0 drones under 250 g.
      ru: C0 — дроны до 250 г.
  - id: b
    text:
      lv: C0 un C1 UAS, jo A1 ir ievada apakškategorija.
      en: C0 and C1 drones, since A1 is the entry-level sub-category.
      ru: C0 и C1, так как A1 — начальный уровень.
  - id: c
    text:
      lv: Jebkuram UAS, ja pilotam ir mazāk par 16 gadiem.
      en: All drones flown by pilots under age 16.
      ru: Все дроны до 250 г при рекреационном использовании.
  - id: d
    text:
      lv: Jebkuram UAS, ko izmanto tikai atpūtai.
      en: Any drone used for recreational purposes only.
      ru: Любой дрон у пилота до 16 лет.
  correctOptionId: a
  explanation:
    lv: Tikai C0 UAS (zem 250 g, maks. ātrums 19 m/s) drīkst lidot A1 bez pilota sertifikāta. C1 UAS A1 prasa A1/A3 tiešsaistes eksāmenu. Atpūtas/komerciālā nošķiršana un vecums sertifikāta prasību C1 neietekmē.
    en: Only C0 drones (under 250 g, max speed 19 m/s) may be flown in A1 without a pilot certificate. C1 drones in A1 require the A1/A3 online exam. The recreational/commercial distinction and age do not affect the certificate requirement for C1.
    ru: Только C0 (< 250 г, макс. скорость 19 м/с) может летать в A1 без сертификата. C1 в A1 требует онлайн-экзамен A1/A3.
  distractorRationales:
    b:
      lv: C1 UAS A1 prasa A1/A3 sertifikātu.
      en: C1 drones require the A1/A3 certificate even in A1.
      ru: C1 требует сертификат даже в A1. Освобождение — только для C0.
    c:
      lv: Vecums ietekmē minimālo lidotāja vecumu (16 gadi vairumam), nevis sertifikāta atbrīvojumu pēc klases.
      en: Age affects minimum age to operate (16 years minimum for most), not certificate exemption by class.
      ru: Рекреационное использование не освобождает C1 от требования сертификата.
    d:
      lv: Atpūtas izmantošana C1 pilotus no sertifikāta prasības neatbrīvo.
      en: Recreational use does not exempt C1 pilots from the certificate requirement.
      ru: Минимальный возраст — 16 лет. Это условие допуска к полётам, а не освобождение от сертификата.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Open / Specific / Certified and operator obligations
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: ar-028
  stem:
    lv: 'Pirms lidojuma pārbaudes operators sev uzdod jautājumu: Kura ES regula nosaka UAS ekspluatācijas noteikumus (operācijas)?'
    en: 'During preflight review, the operator asks: Which EU regulation lays down UAS operational rules?'
    ru: 'Во время предполётной проверки оператор задаёт вопрос: Какой регламент ЕС задаёт правила эксплуатации UAS?'
  options:
  - id: a
    text:
      lv: Regula (ES) 2019/945.
      en: Regulation (EU) 2019/945.
      ru: Регламент (ЕС) 2019/945.
  - id: b
    text:
      lv: Regula (ES) 2018/1139.
      en: Regulation (EU) 2018/1139.
      ru: Регламент (ЕС) 2018/1139.
  - id: c
    text:
      lv: Regula (ES) 376/2014.
      en: Regulation (EU) 376/2014.
      ru: Регламент (ЕС) 376/2014.
  - id: d
    text:
      lv: Regula (ES) 2019/947.
      en: Regulation (EU) 2019/947.
      ru: Регламент (ЕС) 2019/947.
  correctOptionId: d
  explanation:
    lv: '2019/947 ir par operācijām (Open / Specific / Certified). 2019/945 ir par UAS tehniskajām prasībām (klases C0–C6). 2018/1139 ir pamatregula par EASA.

      '
    en: '2019/947 covers operations (Open / Specific / Certified). 2019/945 covers UAS technical requirements (C0–C6 classes). 2018/1139 is the basic EASA regulation.

      '
    ru: '2019/947 — об эксплуатации (Open / Specific / Certified). 2019/945 — о технических требованиях к UAS (классы C0–C6). 2018/1139 — базовый регламент по EASA.

      '
  distractorRationales:
    a:
      lv: 2019/945 ir par UAS tehniskām prasībām un CE klašu marķējumu, ne par operāciju kategorijām.
      en: 2019/945 covers UAS technical requirements and CE class marking, not operational categories.
      ru: 2019/945 — о технических требованиях к UAS и CE-маркировке классов, не об эксплуатации.
    b:
      lv: 2018/1139 ir EASA pamatregula. Tā nosaka EASA pilnvaras, bet konkrētie UAS operāciju noteikumi ir 2019/947.
      en: 2018/1139 is the EASA basic regulation. It defines EASA powers, but the specific UAS operating rules are in 2019/947.
      ru: 2018/1139 — базовый регламент EASA. Он задаёт полномочия EASA, но конкретные правила эксплуатации UAS — в 2019/947.
    c:
      lv: 376/2014 ir par atgadījumu ziņošanu civilajā aviācijā. Tas nav UAS operāciju noteikumu avots.
      en: 376/2014 is about occurrence reporting in civil aviation. It is not the source of UAS operating rules.
      ru: 376/2014 — об уведомлениях о происшествиях в гражданской авиации. Это не источник правил эксплуатации UAS.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 — Operations; Reg (EU) 2019/945 — Technical; Reg 2018/1139 — Basic
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: ar-029
  stem:
    lv: Kura atbilde vislabāk atbilst situācijai? Kurā kategorijā ir jāveic SORA riska novērtējums vai jāizmanto STS standarta scenārijs?
    en: Which answer best fits the situation? In which category is a SORA risk assessment or an STS standard scenario required?
    ru: Какой ответ лучше всего подходит к ситуации? В какой категории требуется оценка риска SORA или стандартный сценарий STS?
  options:
  - id: a
    text:
      lv: Sertificētā.
      en: Certified.
      ru: Сертифицированная.
  - id: b
    text:
      lv: Gan Specifiskā, gan Sertificētā.
      en: Both Specific and Certified.
      ru: И Специальная, и Сертифицированная.
  - id: c
    text:
      lv: Atvērtā.
      en: Open.
      ru: Открытая.
  - id: d
    text:
      lv: Specifiskā.
      en: Specific.
      ru: Специальная.
  correctOptionId: d
  explanation:
    lv: 'Specifiskā kategorija prasa SORA vai STS. Atvērtajā nav iepriekšējas atļaujas. Sertificētā prasa pilnu UAS un operatora sertifikāciju.

      '
    en: 'The Specific category requires SORA or STS. Open requires no prior authorisation. Certified requires full UAS and operator certification.

      '
    ru: 'Специальная требует SORA или STS. Открытая — без предварительного разрешения. Сертифицированная — полная сертификация UAS и оператора.

      '
  distractorRationales:
    a:
      lv: Sertificētā prasa pilnvērtīgu UAS un operatora sertifikāciju, nevis SORA vai STS — tā ir pilnīgi atsevišķa procedūra ar augstāku risku.
      en: Certified requires full UAS and operator certification rather than SORA or STS — it is a separate, higher-risk procedure.
      ru: Сертифицированная требует полной сертификации UAS и оператора, а не SORA или STS — это отдельная процедура более высокого риска.
    b:
      lv: Sertificētā kategorija neizmanto SORA mehānismu — tā ir augstāka riska procedūra. SORA/STS ir tikai Specifiskās kategorijas mehānismi.
      en: The Certified category does not use the SORA mechanism — it is a higher-risk procedure. SORA/STS belongs only to the Specific category.
      ru: Сертифицированная категория не использует механизм SORA — это процедура более высокого риска. SORA/STS — только для Специальной.
    c:
      lv: Atvērtā kategorija ir definēta tā, lai nebūtu vajadzīga iepriekšēja atļauja — limits ir iebūvēti (120 m, VLOS, masa, pulcēšanās).
      en: The Open category is defined so that no prior authorisation is needed — limits are intrinsic (120 m, VLOS, mass, assemblies).
      ru: Открытая категория устроена так, что предварительное разрешение не требуется — ограничения встроены (120 м, VLOS, масса, скопления).
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 Art. 5; AMC1 Article 11 — SORA
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: ar-030
  stem:
    lv: Operatīvā situācija — pieņem pareizo lēmumu. Kāds ir Atvērtās kategorijas maksimālais UAS lidojuma augstums virs zemes?
    en: Operational scenario — choose the correct decision. What is the maximum UAS altitude above ground in the Open category?
    ru: Операционная ситуация — выбери правильное решение. Какова максимальная высота полёта UAS над землёй в Открытой категории?
  options:
  - id: a
    text:
      lv: 100 m.
      en: 100 m.
      ru: 100 м.
  - id: b
    text:
      lv: 50 m.
      en: 50 m.
      ru: 50 м.
  - id: c
    text:
      lv: 120 m.
      en: 120 m.
      ru: 120 м.
  - id: d
    text:
      lv: 150 m.
      en: 150 m.
      ru: 150 м.
  correctOptionId: c
  explanation:
    lv: 'Atvērtās kategorijas augstums ir 120 m virs zemes vai ūdens virsmas, ja vien UGZ neuzliek zemāku ierobežojumu.

      '
    en: 'Open-category altitude is 120 m above ground or water, unless a UGZ imposes a lower cap.

      '
    ru: 'Высота Открытой категории — 120 м над землёй или водой, если UGZ не задаёт более низкий предел.

      '
  distractorRationales:
    a:
      lv: 100 m ir pat tuvu pareizajai vērtībai, bet regulā ir tieši 120 m. Tā ir maza atšķirība, kas eksāmenā ir izšķiroša.
      en: 100 m is close to the right value, but the regulation says exactly 120 m. The 20 m difference is decisive in the exam.
      ru: 100 м близко к верному значению, но в регламенте именно 120 м. Разница в 20 м для экзамена принципиальна.
    b:
      lv: 50 m ir krietni zem standarta robežas. Tas ir piesardzīgs operatīvs lēmums, ne regulatīvais limits.
      en: 50 m is well below the standard cap. It is a cautious operational choice, not the regulatory limit.
      ru: 50 м значительно ниже стандартного предела. Это осторожное операционное решение, а не регуляторная граница.
    d:
      lv: 150 m attiecas uz distances no apdzīvotām zonām A3, nevis uz augstuma robežu.
      en: 150 m relates to the distance from inhabited areas in A3, not to the altitude cap.
      ru: 150 м относится к дистанции до жилых зон в A3, а не к пределу высоты.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/947 UAS.OPEN.020/030/040(2)
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: ar-031
  stem:
    lv: 'Pirms lidojuma pārbaudes operators sev uzdod jautājumu: Kura ES regula nosaka UAS klašu (C0–C6) tehniskās prasības?'
    en: 'During preflight review, the operator asks: Which EU regulation lays down the technical requirements for UAS classes (C0–C6)?'
    ru: 'Во время предполётной проверки оператор задаёт вопрос: Какой регламент ЕС задаёт технические требования к классам UAS (C0–C6)?'
  options:
  - id: a
    text:
      lv: Regula (ES) 2019/947.
      en: Regulation (EU) 2019/947.
      ru: Регламент (ЕС) 2019/947.
  - id: b
    text:
      lv: Regula (ES) 376/2014.
      en: Regulation (EU) 376/2014.
      ru: Регламент (ЕС) 376/2014.
  - id: c
    text:
      lv: Regula (ES) 2018/1139.
      en: Regulation (EU) 2018/1139.
      ru: Регламент (ЕС) 2018/1139.
  - id: d
    text:
      lv: Regula (ES) 2019/945.
      en: Regulation (EU) 2019/945.
      ru: Регламент (ЕС) 2019/945.
  correctOptionId: d
  explanation:
    lv: '2019/945 ir tehniskās prasības (klases C0–C6, CE marķējums). 2019/947 attiecas uz operācijām. 376/2014 — par atgadījumu ziņošanu.

      '
    en: '2019/945 covers technical requirements (C0–C6 classes, CE marking). 2019/947 concerns operations. 376/2014 is about occurrence reporting.

      '
    ru: '2019/945 — технические требования (классы C0–C6, маркировка CE). 2019/947 — об эксплуатации. 376/2014 — об уведомлениях о происшествиях.

      '
  distractorRationales:
    a:
      lv: 2019/947 ir par operāciju kategorijām (Open / Specific / Certified). Tehniskās prasības ir 945, ne 947.
      en: 2019/947 covers operational categories (Open / Specific / Certified). The technical requirements live in 945, not 947.
      ru: 2019/947 — об операционных категориях (Open / Specific / Certified). Технические требования — в 945, а не в 947.
    b:
      lv: 376/2014 ir par atgadījumu ziņošanu civilajā aviācijā, ne par UAS tehniskām prasībām.
      en: 376/2014 covers occurrence reporting in civil aviation, not UAS technical requirements.
      ru: 376/2014 — об отчётности о происшествиях в гражданской авиации, не о технических требованиях к UAS.
    c:
      lv: 2018/1139 ir EASA pamatregula. UAS klašu tehniskās prasības ir 945, deleģēta regula uz pamatregulas pamata.
      en: 2018/1139 is the EASA basic regulation. UAS class technical requirements are in 945, a delegated regulation under the basic regulation.
      ru: 2018/1139 — базовый регламент EASA. Технические требования к классам UAS — в 945, делегированном регламенте на основе базового.
  sourceRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — Reg (EU) 2019/945 — Technical requirements for UAS
