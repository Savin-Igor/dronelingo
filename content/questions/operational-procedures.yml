- id: op-036
  stem:
    lv: Pie meža malas Latgalē drons īslaicīgi nereaģē pēc signāla zuduma, bet VLOS vēl ir. Kāds process pareizs?
    en: Near a forest edge in Latgale, the drone briefly stops responding after signal loss, but VLOS remains. What process is correct?
    ru: У края леса в Латгалии дрон кратко не реагирует после потери сигнала, но VLOS сохраняется. Какой процесс верный?
  options:
    - id: a
      text:
        lv: Uzreiz izslēgt kontrolieri, lai drons izvēlas režīmu.
        en: Immediately switch off the controller so the drone chooses a mode.
        ru: Сразу выключить пульт, чтобы дрон выбрал режим.
    - id: b
      text:
        lv: Skriet pakaļ dronam, neskatoties uz apkārtni.
        en: Run after the drone without watching surroundings.
        ru: Бежать за дроном, не следя за окружением.
    - id: c
      text:
        lv: Turpināt klienta uzdevumu, ja video saite vēl ir.
        en: Continue the client task if video link remains.
        ru: Продолжать задачу клиента, если видеосвязь остаётся.
    - id: d
      text:
        lv: Pārtraukt uzdevumu, saglabāt vizuālo kontaktu, lietot lost-link procedūru un avārijas funkcijas tikai riska mazināšanai.
        en: Stop the task, keep visual contact, use the lost-link procedure and emergency functions only to reduce risk.
        ru: Прекратить задачу, сохранить визуальный контакт, применить lost-link процедуру и аварийные функции только для снижения риска.
  correctOptionId: d
  explanation:
    lv: Avārijas režīmi nav panikas pogas. Tie jālieto pēc procedūras un tikai tad, ja samazina risku cilvēkiem un īpašumam.
    en: Emergency modes are not panic buttons. Use them by procedure and only when they reduce risk to people and property.
    ru: Аварийные режимы — не кнопки паники. Их применяют по процедуре и только когда они снижают риск для людей и имущества.
