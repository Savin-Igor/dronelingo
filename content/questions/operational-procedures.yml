- id: op-035
  stem:
    lv: Pie metāla angāra Ventspilī aplikācija prasa kompasa kalibrāciju. Kāds risinājums ir pareizākais?
    en: Near a metal hangar in Ventspils, the app asks for compass calibration. What is the best solution?
    ru: У металлического ангара в Вентспилсе приложение просит калибровку компаса. Какое решение лучше?
  options:
    - id: a
      text:
        lv: Kalibrēt tieši pie angāra, jo tur ir starts.
        en: Calibrate right by the hangar because that is the launch point.
        ru: Калибровать прямо у ангара, потому что там старт.
    - id: b
      text:
        lv: Ignorēt brīdinājumu, ja iepriekš viss strādāja.
        en: Ignore the warning if it worked before.
        ru: Игнорировать предупреждение, если раньше всё работало.
    - id: c
      text:
        lv: Pārvietoties prom no metāla/traucējumiem, izpildīt ražotāja procedūru vai mainīt starta vietu.
        en: Move away from metal/interference, follow manufacturer procedure or change launch site.
        ru: Отойти от металла/помех, выполнить процедуру производителя или сменить место старта.
    - id: d
      text:
        lv: Kalibrēt kompasu katru reizi jebkurā vietā.
        en: Calibrate the compass every time anywhere.
        ru: Калибровать компас каждый раз в любом месте.
  correctOptionId: c
  explanation:
    lv: Kalibrācija magnētisku traucējumu zonā var pasliktināt drošību. Vispirms jānoņem traucējums vai jāmaina vieta.
    en: Calibration in magnetic interference can reduce safety. Remove the interference or change site first.
    ru: Калибровка в магнитных помехах может снизить безопасность. Сначала убрать помехи или сменить место.
