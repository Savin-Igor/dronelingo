- id: op-039
  stem:
    lv: Ražotāja aplikācija rāda “allowed”, bet lidojums ir 800 m no lidlauka malas Latvijā. Kas ir nākamais solis?
    en: The manufacturer app shows “allowed”, but the flight is 800 m from an aerodrome boundary in Latvia. What is the next step?
    ru: Приложение производителя показывает “allowed”, но полёт в 800 м от границы аэродрома в Латвии. Какой следующий шаг?
  options:
    - id: a
      text:
        lv: Paļauties uz ražotāja aplikāciju kā uz oficiālo avotu.
        en: Rely on the manufacturer app as the official source.
        ru: Положиться на приложение производителя как на официальный источник.
    - id: b
      text:
        lv: Lidot zem 30 m, lai zonas vairs neattiektos.
        en: Fly below 30 m so zones no longer apply.
        ru: Лететь ниже 30 м, чтобы зоны не применялись.
    - id: c
      text:
        lv: Pārbaudīt oficiālās Latvijas UAS ģeogrāfiskās zonas un vajadzīgos nosacījumus/atļaujas.
        en: Check official Latvian UAS geographical zones and required conditions/permissions.
        ru: Проверить официальные географические зоны БВС Латвии и нужные условия/разрешения.
    - id: d
      text:
        lv: Pietiek ar ēkas īpašnieka atļauju.
        en: Building owner permission is enough.
        ru: Достаточно разрешения владельца здания.
  correctOptionId: c
  explanation:
    lv: Ražotāja ģeozonas ir palīgs, nevis oficiāls tiesiskais avots. Latvijā jāskatās oficiālās zonas un to nosacījumi.
    en: Manufacturer geozones are an aid, not the official legal source. In Latvia, official zones and their conditions must be checked.
    ru: Геозоны производителя — помощь, а не официальный правовой источник. В Латвии нужно проверять официальные зоны и их условия.
