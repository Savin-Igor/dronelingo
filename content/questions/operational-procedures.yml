- id: op-038
  stem:
    lv: Maršruts gar augstsprieguma līniju Zemgalē dod labu kadru, bet avārijas nolaišanās zonas ir otrā līnijas pusē. Kā plānot?
    en: A route along a high-voltage line in Zemgale gives a good shot, but emergency landing areas are on the other side. How should it be planned?
    ru: Маршрут вдоль высоковольтной линии в Земгале даёт хороший кадр, но зоны аварийной посадки на другой стороне. Как планировать?
  options:
    - id: a
      text:
        lv: Lidot zem vadiem, lai vieglāk šķērsotu līniju.
        en: Fly under the wires to cross more easily.
        ru: Лететь под проводами, чтобы легче пересечь линию.
    - id: b
      text:
        lv: Pārplānot maršrutu ar drošu distanci un avārijas nolaišanos bez šķēršļu šķērsošanas.
        en: Replan with safe distance and emergency landing without crossing obstacles.
        ru: Перепланировать с безопасной дистанцией и аварийной посадкой без пересечения препятствий.
    - id: c
      text:
        lv: Atstāt plānu, jo vadi kamerā ir labi redzami.
        en: Keep the plan because wires are visible on camera.
        ru: Оставить план, потому что провода видны в камере.
    - id: d
      text:
        lv: Paļauties uz sensoriem, jo tie vienmēr atpazīst vadus.
        en: Rely on sensors because they always detect wires.
        ru: Положиться на датчики, потому что они всегда обнаруживают провода.
  correctOptionId: b
  explanation:
    lv: Plānā jābūt drošai izejai. Vadi var būt grūti uztverami sensoriem un atstāt maz manevra telpas.
    en: The plan needs a safe exit. Wires may be hard for sensors to detect and leave little manoeuvre room.
    ru: В плане нужен безопасный выход. Провода могут плохо распознаваться датчиками и оставлять мало пространства для манёвра.
