- id: op-037
  stem:
    lv: Propellers pieskaras elektrolīnijas balstam laukos; cilvēki nav cietuši, bet iespējams infrastruktūras bojājums. Ko darīt pēc nosēdināšanas?
    en: A propeller contacts a power-line support in a rural area; no one is hurt, but infrastructure damage is possible. What after landing?
    ru: Пропеллер задел опору электролинии в сельской местности; люди не пострадали, но возможен ущерб инфраструктуре. Что после посадки?
  options:
    - id: a
      text:
        lv: Nodrošināt vietu, nepieskarties infrastruktūrai, informēt atbildīgo turētāju un izvērtēt ziņošanu CAA/incidenta kārtībā.
        en: Secure the area, do not touch infrastructure, inform the responsible operator and assess CAA/incident reporting.
        ru: Обеспечить место, не трогать инфраструктуру, сообщить ответственному владельцу и оценить сообщение в CAA/по процедуре инцидента.
    - id: b
      text:
        lv: Aizbraukt, ja drons joprojām darbojas.
        en: Leave if the drone still works.
        ru: Уехать, если дрон ещё работает.
    - id: c
      text:
        lv: Pašam pārbaudīt balstu tuvumā.
        en: Inspect the support yourself up close.
        ru: Самостоятельно осмотреть опору вблизи.
    - id: d
      text:
        lv: Ziņot tikai klientam, jo nav cietušo.
        en: Report only to the client because nobody is injured.
        ru: Сообщить только клиенту, потому что пострадавших нет.
  correctOptionId: a
  explanation:
    lv: Iespējams infrastruktūras bojājums ir drošības un ziņošanas jautājums. Operators nedrīkst pats radīt papildu elektroapdraudējumu.
    en: Possible infrastructure damage is a safety and reporting issue. The operator must not create additional electrical danger.
    ru: Возможное повреждение инфраструктуры — вопрос безопасности и отчётности. Оператор не должен создавать дополнительную электрическую опасность.
