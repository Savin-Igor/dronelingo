- id: op-033
  stem:
    lv: Lidojot starp ēkām Jelgavā, aplikācija ziņo par GNSS zudumu un drons dreifē. Kā reaģēt?
    en: While flying between buildings in Jelgava, the app reports GNSS loss and the drone drifts. How should the pilot react?
    ru: При полёте между зданиями в Елгаве приложение сообщает о потере GNSS, дрон дрейфует. Как реагировать?
  options:
    - id: a
      text:
        lv: Pārtraukt uzdevumu, saglabāt VLOS, pārņemt kontroli pēc procedūras un droši nosēdināt/atgriezt.
        en: Stop the task, maintain VLOS, take control by procedure and land/return safely.
        ru: Прекратить задачу, сохранить VLOS, взять управление по процедуре и безопасно посадить/вернуть.
    - id: b
      text:
        lv: Aktivizēt RTH bez vērtēšanas, jo tas vienmēr strādā bez GNSS.
        en: Activate RTH without assessment because it always works without GNSS.
        ru: Включить RTH без оценки, потому что он всегда работает без GNSS.
    - id: c
      text:
        lv: Turpināt filmēt, ja video stabilizācija darbojas.
        en: Continue filming if video stabilisation works.
        ru: Продолжать съёмку, если стабилизация видео работает.
    - id: d
      text:
        lv: Lidot augstāk virs ēkām, lai saglabātu kadru.
        en: Climb above buildings to keep the shot.
        ru: Подняться выше зданий, чтобы сохранить кадр.
  correctOptionId: a
  explanation:
    lv: GNSS zudums ir signāls pārtraukt uzdevumu. Kontrole un droša nosēšanās ir svarīgāka par kadru.
    en: GNSS loss is a trigger to stop the task. Control and safe landing are more important than the shot.
    ru: Потеря GNSS — сигнал прекратить задачу. Контроль и безопасная посадка важнее кадра.
