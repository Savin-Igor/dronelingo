- id: op-040
  stem:
    lv: Pirms pacelšanās pie jūras Liepājā RTH augstums palicis no iepriekšējā meža lidojuma, mājas punkts nav apstiprināts. Ko darīt?
    en: Before take-off by the sea in Liepāja, RTH altitude remains from a previous forest flight and home point is not confirmed. What should be done?
    ru: Перед взлётом у моря в Лиепае высота RTH осталась от прошлого лесного полёта, home point не подтверждена. Что делать?
  options:
    - id: a
      text:
        lv: Pacelties, jo RTH svarīgs tikai pie zemas baterijas.
        en: Take off because RTH matters only on low battery.
        ru: Взлетать, потому что RTH важен только при низкой батарее.
    - id: b
      text:
        lv: Atstāt veco RTH augstumu, jo augstāks vienmēr drošāks.
        en: Keep the old RTH altitude because higher is always safer.
        ru: Оставить старую высоту RTH, потому что выше всегда безопаснее.
    - id: c
      text:
        lv: Pārvietot mājas punktu pēc pacelšanās virs ūdens.
        en: Move the home point after take-off over water.
        ru: Перенести home point после взлёта над водой.
    - id: d
      text:
        lv: Neuzsākt lidojumu, līdz mājas punkts, GNSS, RTH augstums/maršruts un baterijas rezerve ir pārbaudīti konkrētajai vietai.
        en: Do not start until home point, GNSS, RTH altitude/route and battery reserve are checked for the site.
        ru: Не начинать полёт, пока home point, GNSS, высота/маршрут RTH и резерв батареи не проверены для места.
  correctOptionId: d
  explanation:
    lv: RTH ir vietai specifisks avārijas plāns. Veci iestatījumi var radīt nepareizu atgriešanās maršrutu vai augstumu.
    en: RTH is a site-specific contingency plan. Old settings can create the wrong return route or altitude.
    ru: RTH — аварийный план для конкретного места. Старые настройки могут дать неправильный маршрут или высоту возврата.
