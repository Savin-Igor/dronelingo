- id: op-034
  stem:
    lv: Dronam virs Gaujas senlejas paliek 24% baterijas, tas ir 500 m attālumā, klients prasa vēl trīs minūtes. Ko darīt?
    en: A drone over the Gauja valley has 24% battery left, is 500 m away, and the client asks for three more minutes. What should be done?
    ru: У дрона над долиной Гауи осталось 24% батареи, он в 500 м, клиент просит ещё три минуты. Что делать?
  options:
    - id: a
      text:
        lv: Turpināt līdz 10%, ja kadrs ir svarīgs.
        en: Continue to 10% if the shot is important.
        ru: Продолжать до 10%, если кадр важен.
    - id: b
      text:
        lv: Pārtraukt uzdevumu un sākt drošu atgriešanos/nolaišanos ar rezervi.
        en: Stop the task and begin safe return/landing with reserve.
        ru: Прекратить задачу и начать безопасный возврат/посадку с резервом.
    - id: c
      text:
        lv: Lidot tālāk pa ieleju, jo vējš palīdzēs atpakaļceļā.
        en: Fly further down the valley because wind will help on return.
        ru: Лететь дальше по долине, потому что ветер поможет на обратном пути.
    - id: d
      text:
        lv: Atdot vadību klientam, lai viņš pabeidz kadru.
        en: Hand control to the client to finish the shot.
        ru: Передать управление клиенту, чтобы он закончил кадр.
