- id: pr-001
  stem:
    lv: Kura institūcija ir UAS datu aizsardzības uzraugs Latvijā?
    en: Which authority supervises UAS data protection in Latvia?
    ru: Какой орган надзирает за защитой данных UAS в Латвии?
  options:
    - id: a
      text:
        lv: Datu valsts inspekcija (DVI).
        en: Datu valsts inspekcija (DVI).
        ru: Datu valsts inspekcija (DVI).
    - id: b
      text:
        lv: Civilās aviācijas aģentūra (CAA Latvia).
        en: Civil Aviation Agency (CAA Latvia).
        ru: Агентство гражданской авиации (CAA Latvia).
    - id: c
      text:
        lv: Valsts robežsardze.
        en: State Border Guard.
        ru: Государственная пограничная служба.
  correctOptionId: a
  explanation:
    lv: >
      Datu aizsardzības uzraudzību Latvijā veic Datu valsts inspekcija
      (DVI). CAA Latvia uzrauga aviācijas drošības prasības, ne datu
      aizsardzību.
    en: >
      Data protection supervision in Latvia is the role of Datu valsts
      inspekcija (DVI). CAA Latvia oversees aviation safety requirements,
      not data protection.
    ru: >
      Надзор за защитой данных в Латвии ведёт Datu valsts inspekcija
      (DVI). CAA Latvia надзирает за безопасностью авиации, а не за
      данными.
  sourceRef: "GDPR Art. 51; Latvian Personal Data Processing Law"
  difficulty: 1

- id: pr-002
  stem:
    lv: Vai automašīnas valsts numurs uzskatāms par personas datiem GDPR izpratnē?
    en: Is a vehicle licence plate personal data under GDPR?
    ru: Является ли автомобильный номер персональными данными по GDPR?
  options:
    - id: a
      text:
        lv: Jā, jo to var sasaistīt ar konkrētu personu.
        en: Yes, because it can be linked to a specific person.
        ru: Да, его можно связать с конкретным лицом.
    - id: b
      text:
        lv: Nē, jo numurs ir publisks.
        en: No, because the plate is public.
        ru: Нет, потому что номер публичен.
    - id: c
      text:
        lv: Tikai komercreģistrācijai.
        en: Only for commercial registrations.
        ru: Только для коммерческих регистраций.
  correctOptionId: a
  explanation:
    lv: >
      GDPR personas dati ir jebkura informācija, kas ļauj identificēt
      personu — tieši vai netieši. Numurs ir reģistrēts uz fiziskas
      personas un tādēļ ir personas dati.
    en: >
      Under GDPR personal data is any information that allows identifying
      a person — directly or indirectly. A plate is registered to a
      natural person and therefore is personal data.
    ru: >
      По GDPR персональные данные — любая информация, позволяющая
      идентифицировать лицо прямо или косвенно. Номер привязан к
      физическому лицу и потому является персональными данными.
  sourceRef: "Reg (EU) 2016/679 (GDPR) Art. 4(1)"
  difficulty: 2

- id: pr-003
  stem:
    lv: Cik liels var būt maksimālais GDPR sods?
    en: What is the maximum GDPR fine?
    ru: Каков максимальный штраф по GDPR?
  options:
    - id: a
      text:
        lv: 4 % no gada apgrozījuma vai 20 milj. EUR (lielākā summa).
        en: 4 % of annual turnover or €20 million (whichever is higher).
        ru: 4 % годового оборота или 20 млн евро (что больше).
    - id: b
      text:
        lv: 100 EUR par incidentu.
        en: €100 per incident.
        ru: 100 евро за инцидент.
    - id: c
      text:
        lv: 1000 EUR.
        en: €1000.
        ru: 1000 евро.
  correctOptionId: a
  explanation:
    lv: >
      GDPR Art. 83 paredz maksimumu 4 % no globālā gada apgrozījuma vai
      20 milj. EUR, atkarībā no tā, kura summa ir lielāka.
    en: >
      GDPR Art. 83 sets the cap at 4 % of global annual turnover or
      €20 million, whichever is higher.
    ru: >
      Ст. 83 GDPR устанавливает потолок: 4 % мирового годового оборота
      или 20 млн евро — что больше.
  sourceRef: "Reg (EU) 2016/679 (GDPR) Art. 83(5)"
  difficulty: 2

- id: pr-004
  stem:
    lv: Kāds GDPR pamatojums visdrošāk attiecas uz tehniskā objekta apsekošanas drona lidojumu?
    en: Which GDPR lawful basis most safely fits a technical-site inspection drone flight?
    ru: Какое правовое основание GDPR безопаснее всего подходит для осмотра технического объекта?
  options:
    - id: a
      text:
        lv: Leģitīmas intereses (Art. 6(1)(f)).
        en: Legitimate interests (Art. 6(1)(f)).
        ru: Законные интересы (ст. 6(1)(f)).
    - id: b
      text:
        lv: Līgums (Art. 6(1)(b)).
        en: Contract (Art. 6(1)(b)).
        ru: Договор (ст. 6(1)(b)).
    - id: c
      text:
        lv: Vitālas intereses (Art. 6(1)(d)).
        en: Vital interests (Art. 6(1)(d)).
        ru: Жизненно важные интересы (ст. 6(1)(d)).
  correctOptionId: a
  explanation:
    lv: >
      Tehniskās apsekošanas, kur cilvēki kadrā ir nejauši, parasti
      pamatojas uz leģitīmām interesēm. Pilotam jāveic interešu
      līdzsvara tests un jādokumentē rezultāts.
    en: >
      Technical inspection where people in frame are incidental
      typically relies on legitimate interests. The pilot must run a
      balancing test and document the outcome.
    ru: >
      Осмотр техники, при котором люди в кадре случайны, обычно
      опирается на законные интересы. Пилот должен провести тест
      баланса и зафиксировать результат.
  sourceRef: "Reg (EU) 2016/679 (GDPR) Art. 6(1)(f); EDPB Guidelines 06/2020"
  difficulty: 3

- id: pr-005
  stem:
    lv: Kā apzīmē objektu, kuru aizliegts fotografēt vai filmēt bez saskaņošanas?
    en: How is a site marked that is forbidden to photograph or film without authorisation?
    ru: Как обозначен объект, который запрещено фотографировать или снимать без согласования?
  options:
    - id: a
      text:
        lv: Ar zīmi "BEZ SASKAŅOŠANAS FOTOGRAFĒT, FILMĒT AIZLIEGTS".
        en: With a sign "BEZ SASKAŅOŠANAS FOTOGRAFĒT, FILMĒT AIZLIEGTS".
        ru: Знаком «BEZ SASKAŅOŠANAS FOTOGRAFĒT, FILMĒT AIZLIEGTS».
    - id: b
      text:
        lv: Ar trīsstūri.
        en: With a triangle.
        ru: Треугольником.
    - id: c
      text:
        lv: Ar dzeltenu līniju.
        en: With a yellow line.
        ru: Жёлтой линией.
  correctOptionId: a
  explanation:
    lv: >
      Latvijā kritiskās infrastruktūras objektus apzīmē ar šo tieši
      formulēto zīmi. Filmēšana bez saskaņošanas ir administratīvi
      sodāma.
    en: >
      In Latvia critical-infrastructure sites carry that exact wording.
      Filming without authorisation is an administrative offence.
    ru: >
      В Латвии объекты критической инфраструктуры маркируются именно
      такой надписью. Съёмка без согласования — административное
      правонарушение.
  sourceRef: "Latvia: critical-infrastructure protection rules; CAA Latvia guidance"
  difficulty: 3

- id: pr-006
  stem:
    lv: Pilots filmē pilsētas maratonu komerciālam klientam. Dalībnieku sejas ir atpazīstamas. Kāds GDPR juridiskais pamats der un kas jādara pirms publicēšanas?
    en: A pilot films a city marathon for a commercial client. Runners' faces are identifiable. Which GDPR lawful basis applies and what must be done before publishing?
    ru: Пилот снимает городской марафон для коммерческого клиента. Лица участников узнаваемы. Какое правовое основание GDPR применяется и что необходимо сделать перед публикацией?
  options:
    - id: a
      text:
        lv: Nav nepieciešams juridiskais pamats — publiski notikumi ir atbrīvoti.
        en: No lawful basis needed — public events are exempt.
        ru: Правовое основание не нужно — публичные мероприятия освобождены.
    - id: b
      text:
        lv: Leģitīmas intereses var piemērot publiskam notikumam, bet pirms publicēšanas atpazīstamās sejas jāaizklāj vai jāveic leģitīmo interešu novērtējums.
        en: Legitimate interest may apply to a public event, but identifiable faces must be blurred before publishing or a Legitimate Interest Assessment must be completed.
        ru: Законные интересы могут применяться к публичному мероприятию, но перед публикацией нужно размыть узнаваемые лица или провести оценку законных интересов.
    - id: c
      text:
        lv: Publiski notikumi automātiski nozīmē piekrišanu — dalībnieki ir piekrituši, startējot.
        en: Public events imply automatic consent — participants consented by entering.
        ru: Публичные мероприятия подразумевают автоматическое согласие — участники дали его при регистрации.
    - id: d
      text:
        lv: GDPR neattiecas uz ārā uzfilmētu saturu.
        en: GDPR does not apply to content filmed outdoors.
        ru: GDPR не применяется к контенту, снятому на улице.
  correctOptionId: b
  explanation:
    lv: >
      Publiski pasākumi var pamatot leģitīmās intereses kā juridisko pamatu,
      ja privātuma ietekme ir samērīga. Tomēr atpazīstamas sejas ir personas
      dati. Pirms publicēšanas vai nu jāveic Leģitīmo interešu novērtējums
      (LIA) ar secinājumu, ka privātuma ietekme ir minimāla, vai arī jāaizklāj
      visas atpazīstamās sejas un numura zīmes.
    en: >
      Public events can support legitimate interest as a lawful basis if the
      privacy impact is proportionate. However, identifiable faces are personal
      data. Before publishing, either a Legitimate Interest Assessment (LIA)
      must conclude that privacy impact is minimal, or all identifiable faces
      and plates must be blurred.
    ru: >
      Публичные мероприятия могут быть основанием для законных интересов, если
      воздействие на конфиденциальность соразмерно. Однако узнаваемые лица —
      персональные данные. Перед публикацией либо Оценка законных интересов
      должна подтвердить минимальное воздействие, либо все узнаваемые лица
      нужно размыть.
  distractorRationales:
    a:
      lv: GDPR nav "publisku notikumu izņēmuma". Atpazīstamas personas joprojām ir personas dati neatkarīgi no pasākuma publiskā rakstura.
      en: GDPR has no "public event exemption". Identifiable persons remain personal data regardless of the event's public character.
      ru: GDPR не имеет «исключения для публичных мероприятий». Узнаваемые люди по-прежнему являются персональными данными независимо от публичного характера мероприятия.
    c:
      lv: Dalība maratonā nav GDPR piekrišana filmēšanai un publicēšanai komerciālos nolūkos. Piekrišanai jābūt brīvi dotai, konkrētai un informētai.
      en: Entering a marathon is not GDPR consent to being filmed and published for commercial purposes. Consent must be freely given, specific, and informed.
      ru: Участие в марафоне не является согласием GDPR на съёмку и публикацию в коммерческих целях. Согласие должно быть свободным, конкретным и информированным.
    d:
      lv: GDPR attiecas uz personas datu apstrādi neatkarīgi no filmēšanas vietas. Āra filmēšana nav atbrīvota kategorija.
      en: GDPR applies to the processing of personal data regardless of where filming takes place. Outdoor filming is not an exempt category.
      ru: GDPR применяется к обработке персональных данных независимо от места съёмки. Съёмка на улице не является освобождённой категорией.
  sourceRef: "Reg (EU) 2016/679 (GDPR) Art. 6(1)(f); EDPB Guidelines 06/2020"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision

- id: pr-007
  stem:
    lv: Objekts neatrodas UGZ ierobežotajā zonā, bet tam ir filmēšanas aizlieguma zīme. Vai apstiprināts BGKIS pieteikums dod tiesības filmēt?
    en: A site is not in a restricted UGZ zone but carries a filming prohibition sign. Does an approved BGKIS application grant filming rights?
    ru: Объект не находится в ограниченной зоне UGZ, но имеет знак запрета съёмки. Даёт ли одобренная заявка BGKIS право снимать?
  options:
    - id: a
      text:
        lv: Jā — BGKIS apstiprinājums aptver visus izmantošanas tiesību aspektus.
        en: Yes — BGKIS approval covers all use-rights aspects.
        ru: Да — одобрение BGKIS охватывает все аспекты прав использования.
    - id: b
      text:
        lv: Jā, bet tikai komerciāliem operatoriem.
        en: Yes, but only for commercial operators.
        ru: Да, но только для коммерческих операторов.
    - id: c
      text:
        lv: Nē — UGZ atļauja un filmēšanas aizliegums ir paralēlas tiesiskās sistēmas. BGKIS neaizstāj objekta operatora atļauju.
        en: No — UGZ airspace access and the filming prohibition are parallel legal frameworks. BGKIS does not replace the site operator's authorisation.
        ru: Нет — UGZ (доступ к воздушному пространству) и запрет съёмки — параллельные правовые системы. BGKIS не заменяет разрешение оператора объекта.
    - id: d
      text:
        lv: Tikai tad, ja zīme ir novecojusi — jaunās UGZ izstrādes atceļ vecās aizlieguma zīmes.
        en: Only if the sign is outdated — new UGZ developments override old prohibition signs.
        ru: Только если знак устарел — новые решения UGZ отменяют старые знаки запрета.
  correctOptionId: c
  explanation:
    lv: >
      BGKIS ir gaisa telpas pārvaldības sistēma, ko pārvalda CAA Latvia.
      Filmēšanas aizliegums ir nacionālās drošības/privātuma prasība, ko
      pārvalda attiecīgais ministrija vai drošības dienests. Tās ir divas
      neatkarīgas tiesiskās sistēmas ar atšķirīgām izdevošajām iestādēm.
      Abas jāatrisina atsevišķi.
    en: >
      BGKIS is an airspace management system administered by CAA Latvia. The
      filming prohibition is a national security/privacy requirement administered
      by the relevant ministry or security service. They are two independent
      legal frameworks with different issuing authorities. Both must be resolved
      separately.
    ru: >
      BGKIS — система управления воздушным пространством, администрируемая
      CAA Latvia. Запрет съёмки — требование национальной безопасности/
      конфиденциальности, администрируемое соответствующим министерством
      или службой безопасности. Это две независимые правовые системы с разными
      выдающими органами. Обе должны решаться отдельно.
  distractorRationales:
    a:
      lv: BGKIS aptver tikai gaisa telpas piekļuvi. Tas nav juridisks instruments filmēšanas tiesību piešķiršanai.
      en: BGKIS covers only airspace access. It is not a legal instrument for granting filming rights.
      ru: BGKIS охватывает только доступ к воздушному пространству. Это не юридический инструмент для предоставления прав на съёмку.
    b:
      lv: Komerciālais statuss neietekmē filmēšanas aizlieguma neatkarību no BGKIS. Abi — gan komerciālie, gan atpūtas piloti — jāizvērtē atsevišķi.
      en: Commercial status does not affect the filming prohibition's independence from BGKIS. Both commercial and recreational pilots must resolve both separately.
      ru: Коммерческий статус не влияет на независимость запрета съёмки от BGKIS. Как коммерческие, так и рекреационные пилоты должны решать оба вопроса отдельно.
    d:
      lv: UGZ zonas un filmēšanas aizlieguma zīmes ir neatkarīgas — pirmā neaizstāj otru. Nav mehānisma, kurā UGZ izstrāde "atceļ" drošības marķētas zonas filmēšanas aizliegumu.
      en: UGZ zones and filming prohibition signs are independent — the former does not replace the latter. There is no mechanism by which UGZ developments "override" security-marked site filming prohibitions.
      ru: Зоны UGZ и знаки запрета съёмки независимы — первое не заменяет второе. Не существует механизма, при котором решения UGZ «отменяют» запреты съёмки на объектах с охраной.
  sourceRef: "Latvia Critical Infrastructure Protection Law; CAA Latvia BGKIS rules"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory

- id: pr-008
  stem:
    lv: Pilots uzfilmē inspekcijas materiālu klientam. Klients ir pieņēmis darbu. Cik ilgi pilotam ir tiesības uzglabāt attēlus?
    en: A pilot captures inspection footage for a client. The client has accepted the deliverable. How long may the pilot retain the footage?
    ru: Пилот снимает инспекционные материалы для клиента. Клиент принял результат. Как долго пилот может хранить видеозаписи?
  options:
    - id: a
      text:
        lv: Neierobežoti — tās ir pilota darba materiāls.
        en: Indefinitely — it is the pilot's work product.
        ru: Бессрочно — это рабочий материал пилота.
    - id: b
      text:
        lv: Tik ilgi, cik nepieciešams konkrētajam nolūkam, pēc tam dzēst.
        en: Only as long as necessary for the specific purpose, then delete.
        ru: Только пока необходимо для конкретной цели, затем удалить.
    - id: c
      text:
        lv: Vismaz 5 gadus — kā pierādījums potenciālām juridiskām prasībām.
        en: At least 5 years — as evidence for potential legal claims.
        ru: Не менее 5 лет — как доказательство для возможных претензий.
    - id: d
      text:
        lv: Kamēr operators ir reģistrēts CAA Latvia — pēc tam var dzēst.
        en: Until the operator's CAA Latvia registration expires — then may delete.
        ru: До истечения регистрации оператора в CAA Latvia — затем можно удалить.
  correctOptionId: b
  explanation:
    lv: >
      GDPR Art. 5(1)(e) — datu minimizēšanas un uzglabāšanas ierobežojuma
      principi — prasa personas datu dzēšanu, tiklīdz tie vairs nav
      nepieciešami nolūkam, kādam tika savākti. Pēc klienta pieņemšanas
      inspekcijas materiāls nav nepieciešams, ja vien nav atsevišķas juridiskās
      prasības. Paziņojums par GDPR pamatā ir nolūks, ne ilgums.
    en: >
      GDPR Art. 5(1)(e) — the data minimisation and storage limitation
      principles — require deletion of personal data once it is no longer
      necessary for the purpose for which it was collected. After client
      acceptance the inspection footage is not necessary unless there is a
      separate legal hold. GDPR retention is purpose-driven, not duration-driven.
    ru: >
      Ст. 5(1)(e) GDPR — принципы минимизации данных и ограничения хранения
      — требуют удаления персональных данных, как только они больше не нужны
      для цели, ради которой были собраны. После принятия клиентом
      инспекционный материал не нужен, если нет отдельного правового
      требования. Хранение по GDPR определяется целью, а не сроком.
  distractorRationales:
    a:
      lv: >-
        "Darba materiāls" nav GDPR kategorija. Personas dati ir jādzēš,
        kad to nolūks ir izpildīts — neatkarīgi no to komerciālās vērtības.
      en: >-
        "Work product" is not a GDPR category. Personal data must be deleted
        when its purpose is fulfilled — regardless of its commercial value.
      ru: >-
        «Рабочий материал» — не категория GDPR. Персональные данные должны
        быть удалены по выполнении цели — независимо от их коммерческой ценности.
    c:
      lv: 5 gadu uzglabāšana bez konkrēta juridiskā pamata pārkāpj GDPR uzglabāšanas ierobežojumu principu.
      en: 5-year retention without a specific legal basis violates the GDPR storage limitation principle.
      ru: Хранение 5 лет без конкретного правового основания нарушает принцип ограничения хранения GDPR.
    d:
      lv: CAA Latvia reģistrācijas termiņš nav saistīts ar GDPR datu uzglabāšanas termiņu. Tie ir neatkarīgas tiesiskās prasības.
      en: CAA Latvia registration period is not linked to GDPR data retention periods. They are independent legal requirements.
      ru: Период регистрации CAA Latvia не связан со сроками хранения данных GDPR. Это независимые правовые требования.
  sourceRef: "Reg (EU) 2016/679 (GDPR) Art. 5(1)(e) — storage limitation"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
