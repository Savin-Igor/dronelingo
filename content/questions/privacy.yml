- id: pr-001
  stem:
    lv: Kura institūcija ir UAS datu aizsardzības uzraugs Latvijā?
    en: Which authority supervises UAS data protection in Latvia?
    ru: Какой орган надзирает за защитой данных UAS в Латвии?
  options:
  - id: a
    text:
      lv: Datu valsts inspekcija (DVI).
      en: Datu valsts inspekcija (DVI).
      ru: Datu valsts inspekcija (DVI).
  - id: b
    text:
      lv: Civilās aviācijas aģentūra (CAA Latvia).
      en: Civil Aviation Agency (CAA Latvia).
      ru: Агентство гражданской авиации (CAA Latvia).
  - id: c
    text:
      lv: Valsts robežsardze.
      en: State Border Guard.
      ru: Государственная пограничная служба.
  - id: d
    text:
      lv: Patērētāju tiesību aizsardzības centrs.
      en: Consumer Rights Protection Centre.
      ru: Центр защиты прав потребителей.
  correctOptionId: a
  explanation:
    lv: 'Datu aizsardzības uzraudzību Latvijā veic Datu valsts inspekcija (DVI). CAA Latvia uzrauga aviācijas drošības prasības, ne datu aizsardzību.

      '
    en: 'Data protection supervision in Latvia is the role of Datu valsts inspekcija (DVI). CAA Latvia oversees aviation safety requirements, not data protection.

      '
    ru: 'Надзор за защитой данных в Латвии ведёт Datu valsts inspekcija (DVI). CAA Latvia надзирает за безопасностью авиации, а не за данными.

      '
  distractorRationales:
    b:
      lv: CAA Latvia uzrauga aviācijas drošības prasības (UGZ, sertifikāti, BGKIS). Datu aizsardzība ir DVI kompetencē.
      en: CAA Latvia oversees aviation safety (UGZ, certificates, BGKIS). Data protection is DVI's competence.
      ru: CAA Latvia надзирает за безопасностью авиации (UGZ, сертификаты, BGKIS). Защита данных — компетенция DVI.
    c:
      lv: Robežsardze nodarbojas ar valsts robežas aizsardzību, ne ar datu aizsardzību.
      en: The Border Guard handles state border protection, not data protection.
      ru: Пограничная служба занимается охраной государственной границы, а не защитой данных.
    d:
      lv: Patērētāju centrs uzrauga patērētāju tiesības, nevis GDPR — pat ja datu pārkāpumi var skart patērētājus, formālais regulators ir DVI.
      en: The Consumer Centre oversees consumer rights, not GDPR — even though data breaches can affect consumers, the formal regulator is DVI.
      ru: Центр защиты прав потребителей надзирает за правами потребителей, а не за GDPR — формальный регулятор это DVI.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 51; Latvian Personal Data Processing Law
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: regulatory
- id: pr-002
  stem:
    lv: Vai automašīnas valsts numurs uzskatāms par personas datiem GDPR izpratnē?
    en: Is a vehicle licence plate personal data under GDPR?
    ru: Является ли автомобильный номер персональными данными по GDPR?
  options:
  - id: a
    text:
      lv: Nē, jo numurs ir publisks.
      en: No, because the plate is public.
      ru: Нет, потому что номер публичен.
  - id: b
    text:
      lv: Jā, jo to var sasaistīt ar konkrētu personu.
      en: Yes, because it can be linked to a specific person.
      ru: Да, его можно связать с конкретным лицом.
  - id: c
    text:
      lv: Tikai komercreģistrācijai.
      en: Only for commercial registrations.
      ru: Только для коммерческих регистраций.
  - id: d
    text:
      lv: Tikai tad, ja kadrā ir redzams arī vadītājs.
      en: Only if the driver is also visible in the frame.
      ru: Только если в кадре виден и водитель.
  correctOptionId: b
  explanation:
    lv: 'GDPR personas dati ir jebkura informācija, kas ļauj identificēt personu — tieši vai netieši. Numurs ir reģistrēts uz fiziskas personas un tādēļ ir personas dati.

      '
    en: 'Under GDPR personal data is any information that allows identifying a person — directly or indirectly. A plate is registered to a natural person and therefore is personal data.

      '
    ru: 'По GDPR персональные данные — любая информация, позволяющая идентифицировать лицо прямо или косвенно. Номер привязан к физическому лицу и потому является персональными данными.

      '
  distractorRationales:
    a:
      lv: Datu publiskums neizslēdz to no GDPR. Publiska informācija paliek personas dati, ja to var attiecināt uz indivīdu.
      en: Public visibility does not remove data from GDPR scope. Public information remains personal data if it can be linked to an individual.
      ru: Публичность данных не выводит их из GDPR. Публичная информация остаётся персональными данными, если её можно соотнести с лицом.
    c:
      lv: Numura statuss kā personas dati nav atkarīgs no reģistrācijas veida — gan privātās, gan komerciālās reģistrācijas attiecināmas uz personu.
      en: A plate's status as personal data does not depend on registration type — both private and commercial registrations trace back to a person.
      ru: Статус номера как персональных данных не зависит от типа регистрации — и частный, и коммерческий ведут к лицу.
    d:
      lv: Vadītāja redzamība papildina datu apjomu, bet nemaina to, ka numurs pats par sevi jau ir personas dati.
      en: The driver's visibility adds data, but it does not change that the plate alone is already personal data.
      ru: Видимость водителя добавляет данных, но не меняет факт, что сам номер — уже персональные данные.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Reg (EU) 2016/679 (GDPR) Art. 4(1)
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
- id: pr-003
  stem:
    lv: Cik liels var būt maksimālais GDPR sods?
    en: What is the maximum GDPR fine?
    ru: Каков максимальный штраф по GDPR?
  options:
  - id: a
    text:
      lv: 1000 EUR.
      en: €1000.
      ru: 1000 евро.
  - id: b
    text:
      lv: 100 EUR par incidentu.
      en: €100 per incident.
      ru: 100 евро за инцидент.
  - id: c
    text:
      lv: 4 % no gada apgrozījuma vai 20 milj. EUR (lielākā summa).
      en: 4 % of annual turnover or €20 million (whichever is higher).
      ru: 4 % годового оборота или 20 млн евро (что больше).
  - id: d
    text:
      lv: 2 % no apgrozījuma vai 10 milj. EUR.
      en: 2 % of turnover or €10 million.
      ru: 2 % оборота или 10 млн евро.
  correctOptionId: c
  explanation:
    lv: 'GDPR Art. 83 paredz maksimumu 4 % no globālā gada apgrozījuma vai 20 milj. EUR, atkarībā no tā, kura summa ir lielāka.

      '
    en: 'GDPR Art. 83 sets the cap at 4 % of global annual turnover or €20 million, whichever is higher.

      '
    ru: 'Ст. 83 GDPR устанавливает потолок: 4 % мирового годового оборота или 20 млн евро — что больше.

      '
  distractorRationales:
    a:
      lv: 1000 EUR būtu administratīva soda fragmentārs minimums, ne maksimums. GDPR sods var sasniegt desmitiem miljonu.
      en: €1000 would be a fragmentary minimum of an administrative penalty, not the maximum. GDPR fines reach tens of millions.
      ru: 1000 EUR — фрагмент минимума административного штрафа, а не максимум. Штрафы GDPR доходят до десятков миллионов.
    b:
      lv: 100 EUR par incidentu ir simboliska summa, kas neatbilst GDPR riska un ietekmes mērogam.
      en: €100 per incident is a token amount and does not match the risk and impact scale GDPR is designed for.
      ru: 100 EUR за инцидент — символическая сумма, не соответствующая масштабу риска GDPR.
    d:
      lv: 2 % / 10 milj. EUR ir GDPR mazāks sliedzis (Art. 83(4)), kas attiecas uz operatīvām pārkāpšanām, ne uz augstākajiem nopietnajiem (4 % / 20 milj.).
      en: 2 % / €10 million is the lower GDPR tier (Art. 83(4)) for operational infringements, not the highest one (4 % / €20 million).
      ru: 2 % / 10 млн EUR — это нижний уровень GDPR (ст. 83(4)) для операционных нарушений, а не максимум.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Reg (EU) 2016/679 (GDPR) Art. 83(5)
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: regulatory
- id: pr-004
  stem:
    lv: Kāds GDPR pamatojums visdrošāk attiecas uz tehniskā objekta apsekošanas drona lidojumu?
    en: Which GDPR lawful basis most safely fits a technical-site inspection drone flight?
    ru: Какое правовое основание GDPR безопаснее всего подходит для осмотра технического объекта?
  options:
  - id: a
    text:
      lv: Piekrišana (Art. 6(1)(a)) no visiem nejaušiem garāmgājējiem.
      en: Consent (Art. 6(1)(a)) from every incidental passer-by.
      ru: Согласие (ст. 6(1)(a)) от каждого случайного прохожего.
  - id: b
    text:
      lv: Līgums (Art. 6(1)(b)).
      en: Contract (Art. 6(1)(b)).
      ru: Договор (ст. 6(1)(b)).
  - id: c
    text:
      lv: Vitālas intereses (Art. 6(1)(d)).
      en: Vital interests (Art. 6(1)(d)).
      ru: Жизненно важные интересы (ст. 6(1)(d)).
  - id: d
    text:
      lv: Leģitīmas intereses (Art. 6(1)(f)).
      en: Legitimate interests (Art. 6(1)(f)).
      ru: Законные интересы (ст. 6(1)(f)).
  correctOptionId: d
  explanation:
    lv: 'Tehniskās apsekošanas, kur cilvēki kadrā ir nejauši, parasti pamatojas uz leģitīmām interesēm. Pilotam jāveic interešu līdzsvara tests un jādokumentē rezultāts.

      '
    en: 'Technical inspection where people in frame are incidental typically relies on legitimate interests. The pilot must run a balancing test and document the outcome.

      '
    ru: 'Осмотр техники, при котором люди в кадре случайны, обычно опирается на законные интересы. Пилот должен провести тест баланса и зафиксировать результат.

      '
  distractorRationales:
    a:
      lv: Piekrišana no katra nejauša garāmgājēja praktiski nav iespējama un nav prasīta — leģitīmā interese šādiem gadījumiem ir piemērotāks pamats.
      en: Consent from every incidental passer-by is practically impossible and not required — legitimate interest fits such cases better.
      ru: Согласие от каждого случайного прохожего практически невозможно и не требуется — для таких случаев лучше подходит законный интерес.
    b:
      lv: Līgums attiecas uz datu subjekta līgumu (klients-uzņēmums). Tehniskā apsekošana ar nejaušiem cilvēkiem kadrā nav līguma pamats.
      en: Contract basis covers the data subject's contract (client-business). Technical inspection with incidental people in frame does not fit it.
      ru: Договорное основание касается договора с самим субъектом данных. Технический осмотр со случайными людьми в кадре под него не подпадает.
    c:
      lv: Vitālas intereses ir dzīvības glābšana — neattiecas uz tehnisko apsekošanu.
      en: Vital interests covers life-saving emergencies — it does not fit a routine technical inspection.
      ru: Жизненно важные интересы — про спасение жизни. К плановому осмотру это не относится.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Reg (EU) 2016/679 (GDPR) Art. 6(1)(f); EDPB Guidelines 06/2020
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: regulatory
- id: pr-005
  stem:
    lv: Kā apzīmē objektu, kuru aizliegts fotografēt vai filmēt bez saskaņošanas?
    en: How is a site marked that is forbidden to photograph or film without authorisation?
    ru: Как обозначен объект, который запрещено фотографировать или снимать без согласования?
  options:
  - id: a
    text:
      lv: Ar zīmi "BEZ SASKAŅOŠANAS FOTOGRAFĒT, FILMĒT AIZLIEGTS".
      en: With a sign "BEZ SASKAŅOŠANAS FOTOGRAFĒT, FILMĒT AIZLIEGTS".
      ru: Знаком «BEZ SASKAŅOŠANAS FOTOGRAFĒT, FILMĒT AIZLIEGTS».
  - id: b
    text:
      lv: Ar trīsstūri.
      en: With a triangle.
      ru: Треугольником.
  - id: c
    text:
      lv: Ar dzeltenu līniju.
      en: With a yellow line.
      ru: Жёлтой линией.
  - id: d
    text:
      lv: Ar sarkanu krustu.
      en: With a red cross.
      ru: Красным крестом.
  correctOptionId: a
  explanation:
    lv: 'Latvijā kritiskās infrastruktūras objektus apzīmē ar šo tieši formulēto zīmi. Filmēšana bez saskaņošanas ir administratīvi sodāma.

      '
    en: 'In Latvia critical-infrastructure sites carry that exact wording. Filming without authorisation is an administrative offence.

      '
    ru: 'В Латвии объекты критической инфраструктуры маркируются именно такой надписью. Съёмка без согласования — административное правонарушение.

      '
  distractorRationales:
    b:
      lv: Trīsstūris ir vispārēja brīdinājuma forma, nevis Latvijas standarta apzīmējums kritiskās infrastruktūras filmēšanas aizliegumam.
      en: A triangle is a generic warning shape, not the Latvian standard sign for the critical-infrastructure filming ban.
      ru: Треугольник — общая форма предупреждения, не латвийский стандартный знак запрета съёмки критической инфраструктуры.
    c:
      lv: Dzeltena līnija parasti apzīmē perimetra robežu, ne filmēšanas aizliegumu.
      en: A yellow line usually marks a perimeter boundary, not a filming prohibition.
      ru: Жёлтая линия обычно отмечает границу периметра, а не запрет на съёмку.
    d:
      lv: Sarkans krusts ir medicīnas vai bīstamības simbols, kas neapzīmē filmēšanas aizliegumu.
      en: A red cross is a medical or danger symbol, unrelated to filming prohibitions.
      ru: Красный крест — медицинский или знак опасности, не запрет на съёмку.
  sourceRef: 'docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Latvia: critical-infrastructure protection rules; CAA Latvia guidance'
  difficulty: 3
  cognitiveLevel: recall
  scenarioType: factual
- id: pr-006
  stem:
    lv: Pilots filmē pilsētas maratonu komerciālam klientam. Dalībnieku sejas ir atpazīstamas. Kāds GDPR juridiskais pamats der un kas jādara pirms publicēšanas?
    en: A pilot films a city marathon for a commercial client. Runners' faces are identifiable. Which GDPR lawful basis applies and what must be done before publishing?
    ru: Пилот снимает городской марафон для коммерческого клиента. Лица участников узнаваемы. Какое правовое основание GDPR применяется и что необходимо сделать перед публикацией?
  options:
  - id: a
    text:
      lv: Nav nepieciešams juridiskais pamats — publiski notikumi ir atbrīvoti.
      en: No lawful basis needed — public events are exempt.
      ru: Правовое основание не нужно — публичные мероприятия освобождены.
  - id: b
    text:
      lv: Leģitīmas intereses var piemērot publiskam notikumam, bet pirms publicēšanas atpazīstamās sejas jāaizklāj vai jāveic leģitīmo interešu novērtējums.
      en: Legitimate interest may apply to a public event, but identifiable faces must be blurred before publishing or a Legitimate Interest Assessment must be completed.
      ru: Законные интересы могут применяться к публичному мероприятию, но перед публикацией нужно размыть узнаваемые лица или провести оценку законных интересов.
  - id: c
    text:
      lv: Publiski notikumi automātiski nozīmē piekrišanu — dalībnieki ir piekrituši, startējot.
      en: Public events imply automatic consent — participants consented by entering.
      ru: Публичные мероприятия подразумевают автоматическое согласие — участники дали его при регистрации.
  - id: d
    text:
      lv: GDPR neattiecas uz ārā uzfilmētu saturu.
      en: GDPR does not apply to content filmed outdoors.
      ru: GDPR не применяется к контенту, снятому на улице.
  correctOptionId: b
  explanation:
    lv: 'Publiski pasākumi var pamatot leģitīmās intereses kā juridisko pamatu, ja privātuma ietekme ir samērīga. Tomēr atpazīstamas sejas ir personas dati. Pirms publicēšanas vai nu jāveic Leģitīmo interešu novērtējums (LIA) ar secinājumu, ka privātuma ietekme ir minimāla, vai arī jāaizklāj visas atpazīstamās sejas un numura zīmes.

      '
    en: 'Public events can support legitimate interest as a lawful basis if the privacy impact is proportionate. However, identifiable faces are personal data. Before publishing, either a Legitimate Interest Assessment (LIA) must conclude that privacy impact is minimal, or all identifiable faces and plates must be blurred.

      '
    ru: 'Публичные мероприятия могут быть основанием для законных интересов, если воздействие на конфиденциальность соразмерно. Однако узнаваемые лица — персональные данные. Перед публикацией либо Оценка законных интересов должна подтвердить минимальное воздействие, либо все узнаваемые лица нужно размыть.

      '
  distractorRationales:
    a:
      lv: GDPR nav "publisku notikumu izņēmuma". Atpazīstamas personas joprojām ir personas dati neatkarīgi no pasākuma publiskā rakstura.
      en: GDPR has no "public event exemption". Identifiable persons remain personal data regardless of the event's public character.
      ru: GDPR не имеет «исключения для публичных мероприятий». Узнаваемые люди по-прежнему являются персональными данными независимо от публичного характера мероприятия.
    c:
      lv: Dalība maratonā nav GDPR piekrišana filmēšanai un publicēšanai komerciālos nolūkos. Piekrišanai jābūt brīvi dotai, konkrētai un informētai.
      en: Entering a marathon is not GDPR consent to being filmed and published for commercial purposes. Consent must be freely given, specific, and informed.
      ru: Участие в марафоне не является согласием GDPR на съёмку и публикацию в коммерческих целях. Согласие должно быть свободным, конкретным и информированным.
    d:
      lv: GDPR attiecas uz personas datu apstrādi neatkarīgi no filmēšanas vietas. Āra filmēšana nav atbrīvota kategorija.
      en: GDPR applies to the processing of personal data regardless of where filming takes place. Outdoor filming is not an exempt category.
      ru: GDPR применяется к обработке персональных данных независимо от места съёмки. Съёмка на улице не является освобождённой категорией.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Reg (EU) 2016/679 (GDPR) Art. 6(1)(f); EDPB Guidelines 06/2020
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: pr-007
  stem:
    lv: Objekts neatrodas UGZ ierobežotajā zonā, bet tam ir filmēšanas aizlieguma zīme. Vai apstiprināts BGKIS pieteikums dod tiesības filmēt?
    en: A site is not in a restricted UGZ zone but carries a filming prohibition sign. Does an approved BGKIS application grant filming rights?
    ru: Объект не находится в ограниченной зоне UGZ, но имеет знак запрета съёмки. Даёт ли одобренная заявка BGKIS право снимать?
  options:
  - id: a
    text:
      lv: Jā — BGKIS apstiprinājums aptver visus izmantošanas tiesību aspektus.
      en: Yes — BGKIS approval covers all use-rights aspects.
      ru: Да — одобрение BGKIS охватывает все аспекты прав использования.
  - id: b
    text:
      lv: Jā, bet tikai komerciāliem operatoriem.
      en: Yes, but only for commercial operators.
      ru: Да, но только для коммерческих операторов.
  - id: c
    text:
      lv: Nē — UGZ atļauja un filmēšanas aizliegums ir paralēlas tiesiskās sistēmas. BGKIS neaizstāj objekta operatora atļauju.
      en: No — UGZ airspace access and the filming prohibition are parallel legal frameworks. BGKIS does not replace the site operator's authorisation.
      ru: Нет — UGZ (доступ к воздушному пространству) и запрет съёмки — параллельные правовые системы. BGKIS не заменяет разрешение оператора объекта.
  - id: d
    text:
      lv: Tikai tad, ja zīme ir novecojusi — jaunās UGZ izstrādes atceļ vecās aizlieguma zīmes.
      en: Only if the sign is outdated — new UGZ developments override old prohibition signs.
      ru: Только если знак устарел — новые решения UGZ отменяют старые знаки запрета.
  correctOptionId: c
  explanation:
    lv: 'BGKIS ir gaisa telpas pārvaldības sistēma, ko pārvalda CAA Latvia. Filmēšanas aizliegums ir nacionālās drošības/privātuma prasība, ko pārvalda attiecīgais ministrija vai drošības dienests. Tās ir divas neatkarīgas tiesiskās sistēmas ar atšķirīgām izdevošajām iestādēm. Abas jāatrisina atsevišķi.

      '
    en: 'BGKIS is an airspace management system administered by CAA Latvia. The filming prohibition is a national security/privacy requirement administered by the relevant ministry or security service. They are two independent legal frameworks with different issuing authorities. Both must be resolved separately.

      '
    ru: 'BGKIS — система управления воздушным пространством, администрируемая CAA Latvia. Запрет съёмки — требование национальной безопасности/ конфиденциальности, администрируемое соответствующим министерством или службой безопасности. Это две независимые правовые системы с разными выдающими органами. Обе должны решаться отдельно.

      '
  distractorRationales:
    a:
      lv: BGKIS aptver tikai gaisa telpas piekļuvi. Tas nav juridisks instruments filmēšanas tiesību piešķiršanai.
      en: BGKIS covers only airspace access. It is not a legal instrument for granting filming rights.
      ru: BGKIS охватывает только доступ к воздушному пространству. Это не юридический инструмент для предоставления прав на съёмку.
    b:
      lv: Komerciālais statuss neietekmē filmēšanas aizlieguma neatkarību no BGKIS. Abi — gan komerciālie, gan atpūtas piloti — jāizvērtē atsevišķi.
      en: Commercial status does not affect the filming prohibition's independence from BGKIS. Both commercial and recreational pilots must resolve both separately.
      ru: Коммерческий статус не влияет на независимость запрета съёмки от BGKIS. Как коммерческие, так и рекреационные пилоты должны решать оба вопроса отдельно.
    d:
      lv: UGZ zonas un filmēšanas aizlieguma zīmes ir neatkarīgas — pirmā neaizstāj otru. Nav mehānisma, kurā UGZ izstrāde "atceļ" drošības marķētas zonas filmēšanas aizliegumu.
      en: UGZ zones and filming prohibition signs are independent — the former does not replace the latter. There is no mechanism by which UGZ developments "override" security-marked site filming prohibitions.
      ru: Зоны UGZ и знаки запрета съёмки независимы — первое не заменяет второе. Не существует механизма, при котором решения UGZ «отменяют» запреты съёмки на объектах с охраной.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Latvia Critical Infrastructure Protection Law; CAA Latvia BGKIS rules
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
- id: pr-008
  stem:
    lv: Pilots uzfilmē inspekcijas materiālu klientam. Klients ir pieņēmis darbu. Cik ilgi pilotam ir tiesības uzglabāt attēlus?
    en: A pilot captures inspection footage for a client. The client has accepted the deliverable. How long may the pilot retain the footage?
    ru: Пилот снимает инспекционные материалы для клиента. Клиент принял результат. Как долго пилот может хранить видеозаписи?
  options:
  - id: a
    text:
      lv: Neierobežoti — tās ir pilota darba materiāls.
      en: Indefinitely — it is the pilot's work product.
      ru: Бессрочно — это рабочий материал пилота.
  - id: b
    text:
      lv: Kamēr operators ir reģistrēts CAA Latvia — pēc tam var dzēst.
      en: Until the operator's CAA Latvia registration expires — then may delete.
      ru: До истечения регистрации оператора в CAA Latvia — затем можно удалить.
  - id: c
    text:
      lv: Vismaz 5 gadus — kā pierādījums potenciālām juridiskām prasībām.
      en: At least 5 years — as evidence for potential legal claims.
      ru: Не менее 5 лет — как доказательство для возможных претензий.
  - id: d
    text:
      lv: Tik ilgi, cik nepieciešams konkrētajam nolūkam, pēc tam dzēst.
      en: Only as long as necessary for the specific purpose, then delete.
      ru: Только пока необходимо для конкретной цели, затем удалить.
  correctOptionId: d
  explanation:
    lv: 'GDPR Art. 5(1)(e) — datu minimizēšanas un uzglabāšanas ierobežojuma principi — prasa personas datu dzēšanu, tiklīdz tie vairs nav nepieciešami nolūkam, kādam tika savākti. Pēc klienta pieņemšanas inspekcijas materiāls nav nepieciešams, ja vien nav atsevišķas juridiskās prasības. Paziņojums par GDPR pamatā ir nolūks, ne ilgums.

      '
    en: 'GDPR Art. 5(1)(e) — the data minimisation and storage limitation principles — require deletion of personal data once it is no longer necessary for the purpose for which it was collected. After client acceptance the inspection footage is not necessary unless there is a separate legal hold. GDPR retention is purpose-driven, not duration-driven.

      '
    ru: 'Ст. 5(1)(e) GDPR — принципы минимизации данных и ограничения хранения — требуют удаления персональных данных, как только они больше не нужны для цели, ради которой были собраны. После принятия клиентом инспекционный материал не нужен, если нет отдельного правового требования. Хранение по GDPR определяется целью, а не сроком.

      '
  distractorRationales:
    a:
      lv: '"Darba materiāls" nav GDPR kategorija. Personas dati ir jādzēš, kad to nolūks ir izpildīts — neatkarīgi no to komerciālās vērtības.'
      en: '"Work product" is not a GDPR category. Personal data must be deleted when its purpose is fulfilled — regardless of its commercial value.'
      ru: «Рабочий материал» — не категория GDPR. Персональные данные должны быть удалены по выполнении цели — независимо от их коммерческой ценности.
    b:
      lv: CAA Latvia reģistrācijas termiņš nav saistīts ar GDPR datu uzglabāšanas termiņu. Tie ir neatkarīgas tiesiskās prasības.
      en: CAA Latvia registration period is not linked to GDPR data retention periods. They are independent legal requirements.
      ru: Период регистрации CAA Latvia не связан со сроками хранения данных GDPR. Это независимые правовые требования.
    c:
      lv: 5 gadu uzglabāšana bez konkrēta juridiskā pamata pārkāpj GDPR uzglabāšanas ierobežojumu principu.
      en: 5-year retention without a specific legal basis violates the GDPR storage limitation principle.
      ru: Хранение 5 лет без конкретного правового основания нарушает принцип ограничения хранения GDPR.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Reg (EU) 2016/679 (GDPR) Art. 5(1)(e) — storage limitation
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
- id: pr-009
  stem:
    lv: Drona kamera nejauši uzņem personu privātajā pagalmā. Persona pieprasa dzēst uzņemto materiālu. Kāds ir GDPR pienākums?
    en: A drone camera accidentally captures a person in their private garden. The person requests deletion of the footage. What is the GDPR obligation?
    ru: Камера дрона случайно снимает человека в его личном саду. Человек требует удалить запись. Каково обязательство по GDPR?
  options:
  - id: a
    text:
      lv: Materiāls jādzēš nekavējoties, jo nav tiesiska pamata personas personas datu apstrādei.
      en: The footage must be deleted immediately, as there is no legal basis for processing the person's personal data.
      ru: Запись должна быть немедленно удалена, так как нет правового основания для обработки персональных данных лица.
  - id: b
    text:
      lv: Nav pienākuma dzēst — lidojums bija no publiskas gaisa telpas.
      en: No obligation to delete — the flight was from public airspace.
      ru: Обязательства по удалению нет — полёт выполнялся из общедоступного воздушного пространства.
  - id: c
    text:
      lv: Operators var glabāt materiālu, bet nedrīkst to publicēt.
      en: The operator may retain the footage but must not publish it.
      ru: Оператор может хранить запись, но не должен её публиковать.
  - id: d
    text:
      lv: Persona var prasīt dzēšanu tikai tad, ja tā var pierādīt, ka tika nodarīts kaitējums.
      en: The person can only demand deletion if they can prove harm was caused.
      ru: Лицо может требовать удаления только при наличии доказательств причинённого вреда.
  correctOptionId: a
  explanation:
    lv: 'GDPR Art. 17 paredz tiesības uz dzēšanu ("tiesības tikt aizmirstam"). Personas attēls privātajā pagalmā ir personas dati. Ja nav tiesiska pamata (piekrišana, leģitīmas intereses u.c.) personas datu apstrādei, operators pēc pieprasījuma ir pienākums dzēst materiālu. Publiskas gaisa telpas izmantošana neatceļ GDPR pienākumus.

      '
    en: 'GDPR Art. 17 provides the right to erasure ("right to be forgotten"). A person''s image in their private garden is personal data. If there is no legal basis (consent, legitimate interests, etc.) for processing the personal data, the operator is obliged to delete the footage upon request. Using public airspace does not cancel GDPR obligations.

      '
    ru: 'Ст. 17 GDPR предусматривает право на стирание («право быть забытым»). Изображение человека в его частном саду является персональными данными. Если нет правового основания (согласие, законные интересы и т.д.) для обработки персональных данных, оператор обязан удалить запись по запросу. Использование общедоступного воздушного пространства не отменяет обязательства по GDPR.

      '
  distractorRationales:
    b:
      lv: Publiskā gaisa telpa ir par lidojuma atļauju; GDPR attiecas uz personas datu apstrādi neatkarīgi no tā, no kurienes tas tika ierakstīts.
      en: Public airspace is about flight permission; GDPR applies to personal data processing regardless of where the recording was made from.
      ru: Общедоступное воздушное пространство касается разрешения на полёт; GDPR применяется к обработке персональных данных независимо от того, откуда сделана запись.
    c:
      lv: Glabāšana bez tiesiska pamata un bez dzēšanas pēc pieprasījuma ir GDPR pārkāpums. Personas dati bez tiesiska pamata jādzēš pēc pieprasījuma.
      en: Retaining data without a legal basis and without deleting upon request is a GDPR violation. Personal data without legal basis must be deleted upon request.
      ru: Хранение данных без правового основания и без удаления по запросу является нарушением GDPR. Персональные данные без правового основания должны быть удалены по запросу.
    d:
      lv: Kaitējums nav priekšnoteikums dzēšanas tiesībām GDPR Art. 17. Pietiek ar personas pieprasījumu un tiesiska pamata neesamību.
      en: Harm is not a prerequisite for erasure rights under GDPR Art. 17. A person's request and the absence of a legal basis are sufficient.
      ru: Причинённый вред не является предварительным условием для права на стирание по ст. 17 GDPR. Достаточно запроса лица и отсутствия правового основания.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 17 — right to erasure; Art. 6 — lawful basis
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
- id: pr-010
  stem:
    lv: UAS operators apstrādā lidojuma žurnāla datus, kas satur GPS pozīcijas un laika zīmogus. Vai tie ir uzskatāmi par personas datiem?
    en: A UAS operator processes flight log data containing GPS positions and time stamps. Are these considered personal data?
    ru: Оператор UAS обрабатывает данные журнала полётов, содержащие GPS-координаты и метки времени. Считаются ли они персональными данными?
  options:
  - id: a
    text:
      lv: Nē — GPS koordinātas un laika zīmogi ir tehniski dati, nevis personas dati.
      en: No — GPS coordinates and time stamps are technical data, not personal data.
      ru: Нет — координаты GPS и метки времени являются техническими данными, а не персональными.
  - id: b
    text:
      lv: Jā, ja tie atklāj identificējamas personas atrašanās vietu vai darbības laiku un vietu.
      en: Yes, if they reveal an identifiable person's location or activity time and place.
      ru: Да, если они раскрывают местонахождение или время и место деятельности идентифицируемого лица.
  - id: c
    text:
      lv: Tikai tad, ja lidojumu žurnālā ir iekļauts arī pilota vārds.
      en: Only if the flight log also includes the pilot's name.
      ru: Только если журнал полётов также содержит имя пилота.
  - id: d
    text:
      lv: Nē — GDPR attiecas tikai uz attēliem un video, nevis metadatiem.
      en: No — GDPR applies only to images and video, not metadata.
      ru: Нет — GDPR применяется только к изображениям и видео, а не к метаданным.
  correctOptionId: b
  explanation:
    lv: 'GDPR Art. 4(1) definē personas datus kā "jebkādu informāciju par identificētu vai identificējamu fizisku personu". GPS koordinātes un laika zīmogi, kas atklāj identificētas personas atrašanās vietu vai kustības modeli, ir personas dati. Atrašanās vietas dati tieši minēti GDPR recitālos.

      '
    en: 'GDPR Art. 4(1) defines personal data as "any information relating to an identified or identifiable natural person". GPS coordinates and time stamps that reveal an identified person''s location or movement pattern are personal data. Location data is specifically mentioned in GDPR recitals.

      '
    ru: 'Ст. 4(1) GDPR определяет персональные данные как «любую информацию, относящуюся к идентифицированному или идентифицируемому физическому лицу». Координаты GPS и метки времени, раскрывающие местонахождение или паттерн движения идентифицированного лица, являются персональными данными. Данные о местоположении специально упоминаются в преамбуле GDPR.

      '
  distractorRationales:
    a:
      lv: GDPR neierobežo "personas datu" jēdzienu ar vārdu vai attēlu. Jebkura informācija, kas ļauj identificēt personu (ieskaitot atrašanās vietu), ir personas dati.
      en: GDPR does not limit the concept of "personal data" to names or images. Any information enabling identification of a person (including location) is personal data.
      ru: GDPR не ограничивает понятие «персональных данных» именами или изображениями. Любая информация, позволяющая идентифицировать лицо (включая местоположение), является персональными данными.
    c:
      lv: Personas dati nav atkarīgi tikai no pilota vārda esamības. Atrašanās vieta + laiks var būt pietiekami identifikācijai bez vārda.
      en: Personal data does not depend solely on the pilot's name being present. Location + time can be sufficient for identification without a name.
      ru: Персональные данные не зависят только от наличия имени пилота. Местоположение + время может быть достаточным для идентификации без имени.
    d:
      lv: GDPR attiecas uz jebkādu personas datu apstrādi — attēlus, video, metadatus, finanšu datus u.c. Nav ierobežojuma tikai uz vizuālajiem formātiem.
      en: GDPR applies to any processing of personal data — images, video, metadata, financial data, etc. There is no restriction to visual formats only.
      ru: GDPR применяется к любой обработке персональных данных — изображения, видео, метаданные, финансовые данные и т.д. Нет ограничения только на визуальные форматы.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 4(1) — personal data definition; Recital 30 — location data
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
- id: pr-011
  stem:
    lv: Pilots filmē privātīpašumu no publiskas gaisa telpas (ārpus pārkāptām ģeogrāfiskajām zonām). Īpašnieks nevar būt filmēts. Vai filma ir legāla?
    en: A pilot films private property from public airspace (outside any violated geographical zones). The owner cannot be identified in the footage. Is the filming legal?
    ru: Пилот снимает частную собственность из общедоступного воздушного пространства (за пределами нарушенных географических зон). Владелец не может быть идентифицирован на видео. Законна ли съёмка?
  options:
  - id: a
    text:
      lv: Jā — publiska gaisa telpa nozīmē brīvu filmēšanu.
      en: Yes — public airspace means free filming.
      ru: Да — общедоступное воздушное пространство означает свободную съёмку.
  - id: b
    text:
      lv: Jā — tā kā īpašnieks nav identificējams, GDPR nav piemērojams.
      en: Yes — since the owner is not identifiable, GDPR does not apply.
      ru: Да — поскольку владелец не идентифицируем, GDPR не применяется.
  - id: c
    text:
      lv: Iespējams jā — gaisa telpa atļauj lidojumu, bet nacionālie privātuma likumi var aizliegt filmēšanu virs privātīpašuma pat bez identifikācijas.
      en: Possibly yes — airspace permits the flight, but national privacy laws may prohibit filming above private property even without identification.
      ru: Возможно да — воздушное пространство разрешает полёт, но национальные законы о конфиденциальности могут запрещать съёмку над частной собственностью даже без идентификации.
  - id: d
    text:
      lv: Nē — jebkāda filmēšana no drona ir aizliegta ārpus pilnvarotajiem lidlaukiem.
      en: No — any filming from a drone is prohibited outside authorised aerodromes.
      ru: Нет — любая съёмка с дрона запрещена за пределами авторизованных аэродромов.
  correctOptionId: c
  explanation:
    lv: 'Tiesisko regulējumu nosaka divi slāņi: (1) gaisa telpas regulējums (BGKIS, CAA Latvia) — atļauj lidot vai nē; (2) privātuma likumi (GDPR + nacionālie) — nosaka, vai filmēšana ir legāla. Gaisa telpa var būt brīva, bet dažas valstis aizliedz filmēt no augšas virs privātā īpašuma bez atļaujas, pat ja persona nav identificēta. Latvijā piemēro GDPR un Fizisko personu datu apstrādes likumu.

      '
    en: 'The legal framework has two layers: (1) airspace regulation (BGKIS, CAA Latvia) — permits flight or not; (2) privacy laws (GDPR + national) — determine whether filming is legal. Airspace may be free, but some countries prohibit filming from above over private property without consent, even if no person is identified. Latvia applies GDPR and the Personal Data Processing Law.

      '
    ru: 'Правовая база состоит из двух уровней: (1) регулирование воздушного пространства (BGKIS, CAA Latvia) — разрешает полёт или нет; (2) законы о конфиденциальности (GDPR + национальные) — определяют, законна ли съёмка. Воздушное пространство может быть открытым, но некоторые страны запрещают съёмку сверху над частной собственностью без согласия даже при отсутствии идентифицируемых лиц. В Латвии применяются GDPR и Закон об обработке персональных данных физических лиц.

      '
  distractorRationales:
    a:
      lv: Publiska gaisa telpa ir par tiesībām lidot, nevis par tiesībām filmēt. Filmēšanas tiesiskumu nosaka privātuma un datu aizsardzības likums.
      en: Public airspace is about the right to fly, not the right to film. The legality of filming is determined by privacy and data protection law.
      ru: Общедоступное воздушное пространство касается права летать, а не права снимать. Законность съёмки определяется законодательством о конфиденциальности и защите данных.
    b:
      lv: Pat bez personas identifikācijas atrašanās vietas dati (kura mājā tika filmēts) var būt personas dati. Turklāt nacionālie privātuma likumi var aizsargāt vairāk nekā GDPR.
      en: Even without personal identification, location data (which property was filmed) can be personal data. Additionally national privacy laws may protect more than GDPR.
      ru: Даже без идентификации лица данные о местоположении (какое имущество снималось) могут быть персональными данными. Кроме того, национальные законы о конфиденциальности могут предоставлять большую защиту, чем GDPR.
    d:
      lv: Nav vispārēja filmēšanas aizlieguma ārpus lidlaukiem. Filmēšanas legālumu nosaka konkrētie gaisa telpas un privātuma noteikumi.
      en: There is no general filming prohibition outside aerodromes. Filming legality is determined by specific airspace and privacy rules.
      ru: Нет общего запрета на съёмку за пределами аэродромов. Законность съёмки определяется конкретными правилами воздушного пространства и конфиденциальности.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 6 — lawful basis; Latvia Personal Data Processing Law; Datu valsts inspekcija
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: regulatory
- id: pr-012
  stem:
    lv: Pilots filmu kritiskās infrastruktūras tuvumā, kas marķēta ar "Fotografēšana aizliegta" zīmi. BGKIS pieteikums ir apstiprināts. Vai filmēšana ir atļauta?
    en: A pilot films near critical infrastructure marked with a "Photography prohibited" sign. The BGKIS application is approved. Is filming permitted?
    ru: Пилот снимает вблизи критической инфраструктуры, помеченной знаком «Съёмка запрещена». Заявка BGKIS одобрена. Разрешена ли съёмка?
  options:
  - id: a
    text:
      lv: Jā — BGKIS apstiprinājums atļauj gan lidojumu, gan filmēšanu.
      en: Yes — BGKIS approval authorises both the flight and filming.
      ru: Да — одобрение BGKIS разрешает как полёт, так и съёмку.
  - id: b
    text:
      lv: Jā — "Fotografēšana aizliegta" attiecas tikai uz virszemes foto, nevis uz dronu.
      en: Yes — "Photography prohibited" applies only to ground-level photos, not drones.
      ru: Да — «Съёмка запрещена» относится только к наземной съёмке, а не к дронам.
  - id: c
    text:
      lv: Jā, ja uzņemtais materiāls netiek publicēts.
      en: Yes, if the footage is not published.
      ru: Да, если запись не публикуется.
  - id: d
    text:
      lv: Nē — BGKIS apstiprina lidojumu gaisa telpā, bet aizlieguma zīme attiecas uz citiem tiesību aktiem (drošība, valsts noslēpums) un ir spēkā neatkarīgi.
      en: No — BGKIS approves airspace flight, but the prohibition sign relates to other legislation (security, state secrets) and is in force independently.
      ru: Нет — BGKIS одобряет полёт в воздушном пространстве, но запретный знак относится к другому законодательству (безопасность, государственная тайна) и действует независимо.
  correctOptionId: d
  explanation:
    lv: 'BGKIS atļauja ir gaisa telpas atļauja — tā regulē, vai UAS drīkst atraties konkrētā gaisa telpas sadaļā. "Fotografēšana aizliegta" zīme norāda uz atsevišķu tiesību normu — parasti valsts drošības likumu vai Kriminālkodeksa noteikumu par kritiskās infrastruktūras dokumentēšanu. Šī aizlieguma pārkāpums ir neatkarīgi no BGKIS atļaujas statusa.

      '
    en: 'A BGKIS authorisation is an airspace authorisation — it regulates whether a UAS may be in a specific airspace section. A "Photography prohibited" sign indicates a separate legal norm — usually the national security law or Criminal Code provisions on documenting critical infrastructure. Violating this prohibition is independent of the BGKIS authorisation status.

      '
    ru: 'Разрешение BGKIS — это разрешение воздушного пространства, регулирующее, может ли UAS находиться в определённом разделе воздушного пространства. Знак «Съёмка запрещена» указывает на отдельную правовую норму — обычно закон о национальной безопасности или нормы Уголовного кодекса об документировании критической инфраструктуры. Нарушение этого запрета независимо от статуса разрешения BGKIS.

      '
  distractorRationales:
    a:
      lv: BGKIS atļauja ir gaisa telpas atļauja, nevis filmēšanas atļauja. Tās ir divi dažādi tiesiskuma aspekti.
      en: BGKIS authorisation is an airspace authorisation, not a filming authorisation. These are two separate legal aspects.
      ru: Разрешение BGKIS — это разрешение воздушного пространства, а не разрешение на съёmку. Это два разных правовых аспекта.
    b:
      lv: '"Fotografēšana aizliegta" attiecas uz jebkādu dokumentēšanu — ar kameru uz zemes, no drona vai ar jebkuru citu līdzekli. Tas nav ierobežots tikai ar virszemes foto.'
      en: '"Photography prohibited" refers to any documentation — with a camera on the ground, from a drone, or by any other means. It is not restricted to ground-level photos.'
      ru: «Съёмка запрещена» относится к любой документации — наземной камерой, с дрона или любым другим способом. Это не ограничивается только наземными фотографиями.
    c:
      lv: Publicēšana ir atsevišķs GDPR jautājums. Pats uzņemšanas fakts var būt pārkāpums, ja ir aizliegts filmēt.
      en: Publishing is a separate GDPR matter. The act of filming itself may be a violation if photography is prohibited.
      ru: Публикация — отдельный вопрос GDPR. Сам факт съёмки может быть нарушением, если фотографирование запрещено.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Latvia security legislation; GDPR Art. 6; Datu valsts inspekcija guidance
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: pr-013
  stem:
    lv: Kāds GDPR tiesiskais pamats ir vispiemērotākais drona uzņemšanai pilsētas sporta sacensībās komerciālam lietojumam?
    en: What GDPR lawful basis is most appropriate for drone filming at a city sports competition for commercial use?
    ru: Какое правовое основание GDPR наиболее подходит для коммерческой съёмки с дрона на городских спортивных соревнованиях?
  options:
  - id: a
    text:
      lv: Art. 6(1)(f) — leģitīmās intereses ar iepriekšēju LIA un pastāvīgu informēšanu (GDPR ietvars sporta sacensībām ir leģitīmas intereses).
      en: Art. 6(1)(f) — legitimate interests with a prior LIA and prominent informing (GDPR framework for sports events is legitimate interests).
      ru: Ст. 6(1)(f) — законные интересы с предварительной оценкой LIA и видимым информированием (структура GDPR для спортивных мероприятий — законные интересы).
  - id: b
    text:
      lv: Art. 6(1)(b) — nepieciešamība līguma izpildei.
      en: Art. 6(1)(b) — necessity for contract performance.
      ru: Ст. 6(1)(b) — необходимость для исполнения договора.
  - id: c
    text:
      lv: Art. 6(1)(a) — piekrišana — katra dalībnieka individuāla piekrišana.
      en: Art. 6(1)(a) — consent — individual consent from each participant.
      ru: Ст. 6(1)(a) — согласие — индивидуальное согласие от каждого участника.
  - id: d
    text:
      lv: Nav vajadzīgs tiesiskais pamats — sporta sacensības ir publisks pasākums.
      en: No legal basis is needed — sports competitions are public events.
      ru: Правовое основание не требуется — спортивные соревнования являются публичным мероприятием.
  correctOptionId: a
  explanation:
    lv: 'GDPR Art. 6(1)(f) (leģitīmās intereses) ir tipiskākais pamats komerciālai filmēšanai publiskos sporta pasākumos. Tas prasa: (1) Leģitīmo Interešu Novērtējumu (LIA) — komerciāls mērķis sver pret personu interesēm; (2) redzamu informēšanu sacensības vietā (plakāti, skaļrunis). Individuāla piekrišana katram dalībniekam nav praktiski iespējama lielā pasākumā.

      '
    en: 'GDPR Art. 6(1)(f) (legitimate interests) is the most typical basis for commercial filming at public sports events. It requires: (1) a Legitimate Interests Assessment (LIA) — commercial purpose weighed against individuals'' interests; (2) visible informing at the event venue (posters, PA system). Individual consent from each participant is not practically feasible at a large event.

      '
    ru: 'Ст. 6(1)(f) GDPR (законные интересы) является наиболее типичным основанием для коммерческой съёмки на публичных спортивных мероприятиях. Требуется: (1) Оценка законных интересов (LIA) — коммерческая цель взвешивается против интересов лиц; (2) видимое информирование на месте мероприятия (плакаты, громкоговоритель). Индивидуальное согласие каждого участника практически нецелесообразно на крупном мероприятии.

      '
  distractorRationales:
    b:
      lv: Art. 6(1)(b) attiecas uz līgumattiecībās esošo pušu datu apstrādi — sporta dalībnieki nav operators līgumdarba puse.
      en: Art. 6(1)(b) applies to data processing of parties in a contractual relationship — sports participants are not a party in the operator's contract.
      ru: Ст. 6(1)(b) применяется к обработке данных сторон в договорных отношениях — участники соревнований не являются стороной договора оператора.
    c:
      lv: Individuāla piekrišana ikvienam dalībniekam lielā sporta pasākumā nav praktiski iespējama un ir nevajadzīga, ja leģitīmās intereses ir pienācīgi novērtētas.
      en: Individual consent from every participant at a large sports event is not practically feasible and is unnecessary if legitimate interests are properly assessed.
      ru: Индивидуальное согласие от каждого участника на крупном спортивном мероприятии практически нецелесообразно и не обязательно при правильно оценённых законных интересах.
    d:
      lv: Publisks pasākums neizslēdz GDPR piemērojamību. GDPR attiecas uz visu personas datu apstrādi, neatkarīgi no pasākuma rakstura.
      en: A public event does not exclude GDPR applicability. GDPR applies to all personal data processing, regardless of the event's public character.
      ru: Публичное мероприятие не исключает применимости GDPR. GDPR применяется ко всей обработке персональных данных независимо от публичного характера мероприятия.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 6(1)(f) — legitimate interests; European Data Protection Board guidelines
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: regulatory
- id: pr-014
  stem:
    lv: Kas ir "datu pārzinis" (data controller) GDPR izpratnē drona operācijas kontekstā?
    en: Who is the "data controller" under GDPR in the context of a drone operation?
    ru: Кто является «контролёром данных» (data controller) по GDPR в контексте операции с дроном?
  options:
  - id: a
    text:
      lv: CAA Latvia kā drona lidojumu regulators.
      en: CAA Latvia as the drone flight regulator.
      ru: CAA Latvia как регулятор полётов дронов.
  - id: b
    text:
      lv: Operators — persona vai uzņēmums, kas lemj par filmēšanas mērķiem un metodēm.
      en: The operator — the person or company that decides on the filming purposes and means.
      ru: Оператор — лицо или компания, определяющее цели и средства съёмки.
  - id: c
    text:
      lv: Drona ražotājs.
      en: The drone manufacturer.
      ru: Производитель дрона.
  - id: d
    text:
      lv: Remote pilota kompetences sertifikāta izdevējs.
      en: The issuer of the remote pilot competence certificate.
      ru: Орган, выдавший свидетельство компетентности дистанционного пилота.
  correctOptionId: b
  explanation:
    lv: 'GDPR Art. 4(7) definē "pārzini" kā fizisku vai juridisku personu, kas nosaka personas datu apstrādes mērķus un līdzekļus. Drona operācijā tas ir operators — tas, kurš nolemj, KO filmēt, KĀ filmēt un KO darīt ar materiālu. Faktiskais pilots var būt datu apstrādātājs, ja operators ir atsevišķa juridiskā persona.

      '
    en: 'GDPR Art. 4(7) defines the "controller" as the natural or legal person that determines the purposes and means of processing personal data. In a drone operation this is the operator — the one who decides WHAT to film, HOW to film, and WHAT to do with the footage. The actual pilot may be a data processor if the operator is a separate legal person.

      '
    ru: 'Ст. 4(7) GDPR определяет «контролёра» как физическое или юридическое лицо, определяющее цели и средства обработки персональных данных. В операции с дроном это оператор — тот, кто решает, ЧТО снимать, КАК снимать и ЧТО делать с материалом. Фактический пилот может быть обработчиком данных, если оператор является отдельным юридическим лицом.

      '
  distractorRationales:
    a:
      lv: CAA Latvia ir regulators, kas uzrauga lidojumu atbilstību — tā nav persona, kas nosaka filmēšanas mērķus un metodes.
      en: CAA Latvia is a regulator overseeing flight compliance — it is not the person who determines filming purposes and means.
      ru: CAA Latvia — регулятор, контролирующий соответствие полётов — это не лицо, определяющее цели и средства съёмки.
    c:
      lv: Ražotājs izstrādā dronu, bet nenosaka, ko, kā un kāpēc konkrēts operators filmē.
      en: The manufacturer builds the drone but does not determine what, how, and why a specific operator films.
      ru: Производитель строит дрон, но не определяет, что, как и почему конкретный оператор снимает.
    d:
      lv: Sertifikāta izdevējs (CAA) apliecina pilota kompetenci, bet nenosaka personas datu apstrādes mērķus operācijā.
      en: The certificate issuer (CAA) certifies pilot competence but does not determine personal data processing purposes in an operation.
      ru: Орган, выдавший сертификат (CAA), удостоверяет компетентность пилота, но не определяет цели обработки персональных данных в операции.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 4(7) — data controller definition
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: regulatory
- id: pr-015
  stem:
    lv: Komerciāls operators filmē apdzīvotu pilsētas rajonu. Viņa GDPR apstrādes reģistrā (Art. 30) nav šīs konkrētās operācijas. Vai tas ir pārkāpums?
    en: A commercial operator films a populated urban area. Their GDPR processing register (Art. 30) does not include this specific operation. Is this a violation?
    ru: Коммерческий оператор снимает населённый городской район. В его реестре обработки по GDPR (ст. 30) эта конкретная операция не включена. Является ли это нарушением?
  options:
  - id: a
    text:
      lv: Nē — Art. 30 attiecas tikai uz lieluzņēmumiem ar > 250 darbiniekiem.
      en: No — Art. 30 applies only to large companies with > 250 employees.
      ru: Нет — ст. 30 применяется только к крупным компаниям с более чем 250 сотрудниками.
  - id: b
    text:
      lv: Nē — drona filmēšana ir atbrīvota no Art. 30 prasībām.
      en: No — drone filming is exempt from Art. 30 requirements.
      ru: Нет — съёмка с дрона освобождена от требований ст. 30.
  - id: c
    text:
      lv: Jā — komerciālam operatoram jāuztur apstrādes darbību reģistrs, iekļaujot drona filmēšanas operācijas ar personas datiem.
      en: Yes — a commercial operator must maintain a register of processing activities, including drone filming operations involving personal data.
      ru: Да — коммерческий оператор обязан вести реестр операций обработки, включая съёмку с дрона с участием персональных данных.
  - id: d
    text:
      lv: Tikai tad, ja operators pārsniedz 5000 EUR apgrozījumu gadā.
      en: Only if the operator exceeds €5,000 turnover per year.
      ru: Только если оборот оператора превышает 5 000 EUR в год.
  correctOptionId: c
  explanation:
    lv: 'GDPR Art. 30 prasa, lai pārziņi uzturētu apstrādes darbību reģistru. Izņēmums (< 250 darbinieki) ir ierobežots — tas neattiecas, ja apstrāde var radīt risku personu tiesībām un brīvībām. Cilvēku filmēšana pilsētā ir riskanta apstrāde, kas izslēdz izņēmumu. Komerciāls operators parasti arī pārsniedz 250 darbinieku slieksni vai nebauda izņēmumu.

      '
    en: 'GDPR Art. 30 requires controllers to maintain a register of processing activities. The exception (< 250 employees) is limited — it does not apply if the processing is likely to result in risk to individuals'' rights and freedoms. Filming people in a city is risky processing that excludes the exception. A commercial operator typically also exceeds the 250 employee threshold or does not benefit from the exception.

      '
    ru: 'Ст. 30 GDPR требует от контролёров вести реестр операций обработки. Исключение (< 250 сотрудников) ограничено — оно не применяется, если обработка может представлять риск для прав и свобод лиц. Съёмка людей в городе является рискованной обработкой, исключающей это исключение. Коммерческий оператор обычно также превышает порог в 250 сотрудников или не пользуется исключением.

      '
  distractorRationales:
    a:
      lv: 250 darbinieku izņēmums tieši nesedz apstrādes operācijas, kas rada risku. Filmēšana apdzīvotos rajonos ir riska operācija.
      en: The 250 employee exception does not cover processing operations that pose a risk. Filming in populated areas is a risk operation.
      ru: Исключение для 250 сотрудников не распространяется на операции обработки, создающие риск. Съёмка в населённых районах является рискованной операцией.
    b:
      lv: Drona filmēšana nav atbrīvota no Art. 30. Tā ir personas datu apstrāde, kurai piemērojamas GDPR prasības.
      en: Drone filming is not exempt from Art. 30. It is personal data processing subject to GDPR requirements.
      ru: Съёмка с дрона не освобождена от ст. 30. Это обработка персональных данных, на которую распространяются требования GDPR.
    d:
      lv: GDPR prasības nebalstās uz apgrozījuma slieksni. Tās balstās uz personas datu apstrādes faktu un tā riskiem.
      en: GDPR requirements are not based on a turnover threshold. They are based on the fact of personal data processing and its risks.
      ru: Требования GDPR не основаны на пороге оборота. Они основаны на факте обработки персональных данных и связанных с ней рисках.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 30 — records of processing activities
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: regulatory
- id: pr-016
  stem:
    lv: Pilots filmē pilsētas panorāmu atpūtas nolūkiem. Kāda ir minimālā GDPR prasība, kas piemērojama šim gadījumam?
    en: A pilot films a city panorama for recreational purposes. What is the minimum GDPR requirement applicable in this case?
    ru: Пилот снимает городскую панораму в рекреационных целях. Каково минимальное требование GDPR, применимое в данном случае?
  options:
  - id: a
    text:
      lv: Nekādas — atpūtas filmēšana ir atbrīvota no GDPR (mājas izņēmums Art. 2(2)(c)).
      en: None — recreational filming is exempt from GDPR (household exemption Art. 2(2)(c)).
      ru: Никаких — рекреационная съёмка освобождена от GDPR (исключение для домохозяйств ст. 2(2)(c)).
  - id: b
    text:
      lv: Operators jāreģistrē DVI Latvia.
      en: The operator must register with DVI Latvia.
      ru: Оператор должен зарегистрироваться в DVI Latvia.
  - id: c
    text:
      lv: Atpūtas pilots nekad nav GDPR pārzinis.
      en: A recreational pilot is never a GDPR controller.
      ru: Рекреационный пилот никогда не является контролёром по GDPR.
  - id: d
    text:
      lv: Mājas izņēmums var attiekties, ja filmēšana ir tīri personiskai, ne sabiedriskai publiskošanai; ja materiāls tiek publicēts tiešsaistē — GDPR piemērojams pilnā mērā.
      en: The household exemption may apply if filming is purely personal with no public dissemination; if footage is published online — GDPR applies in full.
      ru: Исключение для домохозяйств может применяться при условии, что съёмка носит сугубо личный характер без публичного распространения; если запись публикуется онлайн — GDPR применяется в полном объёме.
  correctOptionId: d
  explanation:
    lv: 'GDPR Art. 2(2)(c) atbrīvo personas datu apstrādi "fiziskas personas veikta darbība, kas ir tīri personiska vai mājas darbība". Pilsētas panorāma personiskai glabāšanai var atbilst. Taču, ja attēli tiek publicēti sociālajos tīklos vai citā platformā — tie kļūst publiski, un izņēmums beidzas.

      '
    en: 'GDPR Art. 2(2)(c) exempts personal data processing "carried out by a natural person in the course of a purely personal or household activity". A city panorama for personal storage may qualify. However, if images are published on social media or another platform — they become public and the exemption ends.

      '
    ru: 'Ст. 2(2)(c) GDPR освобождает обработку персональных данных, «осуществляемую физическим лицом в ходе сугубо личной или домашней деятельности». Городская панорама для личного хранения может соответствовать этому. Однако если изображения публикуются в социальных сетях или другой платформе — они становятся публичными и исключение прекращает действие.

      '
  distractorRationales:
    a:
      lv: Mājas izņēmums nav absolūts. Tas attiecas tikai uz tīri personisko sfēru — sabiedriska izplatīšana to anulē.
      en: The household exemption is not absolute. It applies only to the purely personal sphere — public dissemination nullifies it.
      ru: Исключение для домохозяйств не является абсолютным. Оно применяется только к сугубо личной сфере — публичное распространение его аннулирует.
    b:
      lv: Atpūtas filmētājam nav obligāti jāreģistrējas DVI kā pārzinim — reģistrācija ir komerciālo operatoru jautājums ar liela mēroga vai augsta riska apstrādi.
      en: A recreational filmmaker is not required to register with DVI as a controller — registration is a matter for commercial operators with large-scale or high-risk processing.
      ru: Рекреационный оператор не обязан регистрироваться в DVI как контролёр — регистрация касается коммерческих операторов с масштабной или высокорисковой обработкой.
    c:
      lv: Atpūtas pilots var kļūt par GDPR pārzini, ja publicē materiālu ar identificējamām personām. Darbības raksturs (atpūtas/komerciāls) neatceļ GDPR, kad materiāls tiek izplatīts.
      en: A recreational pilot can become a GDPR controller if they publish footage with identifiable persons. The recreational nature of the activity does not override GDPR when material is disseminated.
      ru: Рекреационный пилот может стать контролёром по GDPR, если публикует материал с идентифицируемыми лицами. Рекреационный характер деятельности не отменяет GDPR при распространении материала.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 2(2)(c) — household exemption; CJEU Case C-212/13 (Ryneš)
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: regulatory
- id: pr-017
  stem:
    lv: Kurā Latvijas iestādē UAS operators iesniedz sūdzību par personas datu aizsardzību saistībā ar drona filmēšanu?
    en: At which Latvian authority does a UAS operator submit a complaint about personal data protection related to drone filming?
    ru: В какой латвийский орган оператор UAS подаёт жалобу о защите персональных данных, связанную со съёмкой с дрона?
  options:
  - id: a
    text:
      lv: Datu valsts inspekcija (DVI).
      en: Datu valsts inspekcija (DVI).
      ru: Datu valsts inspekcija (DVI).
  - id: b
    text:
      lv: CAA Latvia.
      en: CAA Latvia.
      ru: CAA Latvia.
  - id: c
    text:
      lv: Eiropas Datu aizsardzības uzraudzītājs (EDAU).
      en: European Data Protection Supervisor (EDPS).
      ru: Европейский инспектор по защите данных (EDPS).
  - id: d
    text:
      lv: Latvijas Policija.
      en: Latvian Police.
      ru: Полиция Латвии.
  correctOptionId: a
  explanation:
    lv: 'Datu valsts inspekcija (DVI) ir Latvijas nacionālā datu aizsardzības uzraudzības iestāde (GDPR Art. 51 prasītā "supervisory authority"). Sūdzības par personas datu aizsardzības pārkāpumiem, ieskaitot drona filmēšanu, iesniedz DVI. CAA Latvia uzrauga aviācijas drošību, nevis datu aizsardzību.

      '
    en: 'Datu valsts inspekcija (DVI) is Latvia''s national data protection supervisory authority (the "supervisory authority" required by GDPR Art. 51). Complaints about personal data protection violations, including drone filming, are submitted to DVI. CAA Latvia oversees aviation safety, not data protection.

      '
    ru: 'Datu valsts inspekcija (DVI) является национальным надзорным органом по защите данных Латвии («надзорный орган», требуемый ст. 51 GDPR). Жалобы на нарушения защиты персональных данных, включая съёмку с дрона, подаются в DVI. CAA Latvia осуществляет надзор за авиационной безопасностью, а не защитой данных.

      '
  distractorRationales:
    b:
      lv: CAA Latvia ir aviācijas drošības iestāde — tā nesaņem GDPR sūdzības par drona filmēšanu.
      en: CAA Latvia is the aviation safety authority — it does not receive GDPR complaints about drone filming.
      ru: CAA Latvia — орган авиационной безопасности, он не принимает жалобы по GDPR о съёмке с дрона.
    c:
      lv: EDAU uzrauga ES iestādes, nevis privātpersonas vai uzņēmumus dalībvalstīs. Privāto sūdzību iesniegt EDAU neatbilst kompetencei.
      en: EDPS supervises EU institutions, not private persons or companies in member states. Submitting a private complaint to EDPS is outside its jurisdiction.
      ru: EDPS осуществляет надзор за учреждениями ЕС, а не за частными лицами или компаниями в государствах-членах. Подача частной жалобы в EDPS выходит за рамки его компетенции.
    d:
      lv: Policija var iesaistīties, ja ir kriminālpārkāpums, bet GDPR sūdzības primārā adrese ir DVI — regulatīvā iestāde datu aizsardzībai.
      en: Police may be involved if there is a criminal offence, but the primary address for GDPR complaints is DVI — the regulatory authority for data protection.
      ru: Полиция может участвовать при уголовном правонарушении, но основной адрес для жалоб по GDPR — DVI, регулирующий орган по защите данных.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 51 — supervisory authority; Datu valsts inspekcija — dvi.gov.lv
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: regulatory
- id: pr-018
  stem:
    lv: Pilotam ir derīgs BGKIS apstiprinājums lidot virs industriālas zonas. Plānotais ceļš iet pār elektrisko apakšstaciju ar filmēšanas aizlieguma zīmi. Ko pilots drīkst darīt?
    en: A pilot holds a valid BGKIS approval to fly over an industrial area. The planned route passes above an electrical substation with the filming prohibition sign. What may the pilot do?
    ru: Пилот имеет действующее одобрение BGKIS на полёт в промышленной зоне. Маршрут проходит над электроподстанцией со знаком запрета на съёмку. Что разрешено?
  options:
  - id: a
    text:
      lv: Filmēt brīvi — BGKIS apstiprinājums sedz gan lidojumu, gan filmēšanu.
      en: Film freely — the BGKIS approval covers both flight and filming.
      ru: Снимать свободно — одобрение BGKIS покрывает и полёт, и съёмку.
  - id: b
    text:
      lv: Lidot ceļu, bet nedrīkst ierakstīt video vai foto par apakšstaciju bez atsevišķas filmēšanas atļaujas no operatora.
      en: Fly the route but must not record video or photos of the substation without separate filming authorisation from the operator.
      ru: Лететь, но не снимать подстанцию без отдельного разрешения оператора объекта.
  - id: c
    text:
      lv: Zīmes klātbūtne nozīmē, ka viss lidojums jāatceļ.
      en: The presence of the sign means the entire flight must be cancelled.
      ru: Весь полёт должен быть отменён из-за знака.
  - id: d
    text:
      lv: Filmēt augstumā — aizliegums attiecas tikai uz zemu augstumu pie objekta.
      en: Film at altitude — the prohibition only applies at low altitude near the site.
      ru: Снимать разрешено с любой высоты — запрет действует только вблизи земли.
  correctOptionId: b
  explanation:
    lv: BGKIS apstiprinājums dod piekļuvi gaisa telpai. Filmēšanas atļauju atsevišķi izsniedz objekta operators. Pilots drīkst lidot apstiprinātajā maršrutā, bet nedrīkst ierakstīt aizsargāto apakšstaciju bez operatora rakstiskas atļaujas. Filmēšanas aizliegumam nav augstuma izņēmuma.
    en: BGKIS approval grants airspace access. Filming authorisation is granted separately by the site operator. The pilot may fly the approved route but must not record the protected substation without the operator's written permission. The filming ban has no altitude exemption.
    ru: Одобрение BGKIS даёт доступ к воздушному пространству. Разрешение на съёмку даётся отдельно оператором объекта. Пилот может летать по одобренному маршруту, но не должен снимать охраняемую подстанцию без письменного разрешения её оператора.
  distractorRationales:
    a:
      lv: BGKIS izsniedz CAA Latvia par gaisa telpas piekļuvi. Filmēšanas aizliegumu uzrauga objekta operators pēc atsevišķa tiesiska instrumenta.
      en: BGKIS is issued by CAA Latvia for airspace access. The filming ban is enforced by the site operator under a separate legal instrument.
      ru: BGKIS выдаётся CAA Latvia на доступ к воздушному пространству. Запрет на съёмку — отдельный правовой инструмент другого органа.
    c:
      lv: Filmēšanas aizliegums automātiski neatceļ lidojumu — tas ierobežo, ko kamera drīkst ierakstīt, ne to, vai UAS drīkst lidot.
      en: The filming ban does not automatically ground the flight — it restricts what the camera may record, not whether the drone may fly.
      ru: Запрет на съёмку не отменяет полёт — он ограничивает то, что снимает камера, а не право находиться в воздухе.
    d:
      lv: Filmēšanas aizliegums attiecas uz jebkuru kadru ar aizsargāto objektu, neatkarīgi no augstuma.
      en: The filming prohibition applies to any footage capturing the protected site, regardless of the altitude from which it is taken.
      ru: Запрет на съёмку распространяется на любые записи охраняемого объекта независимо от высоты.
  sourceRef: docs/knowledge/latvia-caa/web-snapshots/07-open-category.md — privacy-aware operation basics
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-019
  stem:
    lv: Kurš pareizi apraksta saistību starp UGZ ierobežoto zonu un kritiskās infrastruktūras filmēšanas aizliegumu?
    en: Which of the following correctly describes the relationship between a UGZ restricted zone and a critical infrastructure filming ban?
    ru: Что точнее всего описывает соотношение зоны ограничения UGZ и запрета на съёмку критической инфраструктуры?
  options:
  - id: a
    text:
      lv: Tie ir identiski — ja vieta UGZ zonā, filmēt aizliegts; ja nav — drīkst.
      en: They are identical — if a site is in a UGZ zone, filming is banned; if not, filming is permitted.
      ru: Они идентичны — если объект в UGZ, съёмка запрещена; если нет — разрешена.
  - id: b
    text:
      lv: UGZ ir prioritāte — UGZ apstiprinājums pārmāc jebkuru filmēšanas aizliegumu.
      en: UGZ takes precedence — a UGZ approval overrides any filming prohibition.
      ru: UGZ имеет приоритет — одобрение UGZ отменяет любой запрет на съёмку.
  - id: c
    text:
      lv: Tie ir paralēli ietvari — vieta var atrasties ārpus jebkuras UGZ zonas un joprojām nest filmēšanas aizliegumu.
      en: They are parallel frameworks — a site can be outside any UGZ zone while still carrying a filming prohibition.
      ru: Это параллельные системы — объект может быть вне UGZ, но иметь запрет на съёмку.
  - id: d
    text:
      lv: Filmēšanas aizliegumi piemērojami tikai UGZ ierobežotās zonās.
      en: Filming bans only apply within UGZ restricted zones.
      ru: Запреты на съёмку действуют только внутри UGZ-зон ограничений.
  correctOptionId: c
  explanation:
    lv: UGZ (gaisa telpas ierobežojums) un filmēšanas aizliegums (satura ierobežojums) ir neatkarīgi tiesiskie instrumenti pēc dažādām iestādēm. Vieta var atrasties ārpus jebkuras UGZ zonas un joprojām nest derīgu filmēšanas aizliegumu. Abi jāpārbauda atsevišķi pirmslidojuma vides novērtējumā.
    en: UGZ (airspace restriction) and the filming ban (content restriction) are independent legal instruments under different authorities. A site may sit outside any UGZ zone and still carry a valid filming prohibition. Both must be checked separately during the pre-flight environment assessment.
    ru: UGZ (ограничение воздушного пространства) и запрет на съёмку (ограничение контента) — независимые правовые инструменты разных органов. Объект может не входить ни в одну UGZ-зону и при этом иметь действующий запрет на съёмку. Оба нужно проверять отдельно.
  distractorRationales:
    a:
      lv: Vieta var atrasties ārpus UGZ zonas un joprojām nest filmēšanas aizliegumu. Abas sistēmas savstarpēji nesakrīt.
      en: A site may be outside any UGZ zone and still have a filming prohibition sign. The two systems are not co-extensive.
      ru: Объект может быть вне любой UGZ и всё равно иметь знак запрета. Эти системы не совпадают.
    b:
      lv: UGZ apstiprinājums neatceļ filmēšanas aizliegumus. Tos izdod dažādas iestādes dažādiem mērķiem.
      en: A UGZ approval does not override filming bans. They are issued by different authorities for different purposes.
      ru: Одобрение UGZ не отменяет запреты на съёмку — они выданы разными органами для разных целей.
    d:
      lv: Filmēšanas aizliegumus nosaka Kritiskās infrastruktūras aizsardzības likums, ne UGZ regula. Tie attiecas uz visām vietām ar aizlieguma zīmi, neatkarīgi no UGZ robežām.
      en: Filming bans are defined by the Critical Infrastructure Protection Law, not by the UGZ regulation. They apply at all sites with the prohibition sign, regardless of UGZ boundaries.
      ru: Запреты на съёмку определяются законом о защите критической инфраструктуры, а не границами UGZ.
  sourceRef: docs/knowledge/latvia-caa/web-snapshots/07-open-category.md — privacy-aware operation basics
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-020
  stem:
    lv: Kurš ir spēcīgākais iemesls glabāt neapstrādātu drona materiālu ilgāk par gala montāžas ciklu?
    en: What is the strongest reason to keep raw drone footage for longer than the final edit cycle?
    ru: Какова самая сильная причина хранить сырой материал с дрона дольше, чем длится финальный монтажный цикл?
  options:
  - id: a
    text:
      lv: Tas vēlāk varētu būt interesanti paskatīties.
      en: It might be interesting to watch later.
      ru: Потом может быть интересно посмотреть.
  - id: b
    text:
      lv: Operators negrib organizēt failus.
      en: The operator prefers not to organise files.
      ru: Оператору не хочется организовывать файлы.
  - id: c
    text:
      lv: Lieli diski ir lēti.
      en: Large storage drives are inexpensive.
      ru: Большие диски стоят недорого.
  - id: d
    text:
      lv: Ir skaidrs līgumisks, juridisks, apdrošināšanas vai incidenta pamatojums.
      en: There is a clear contractual, legal, insurance, or incident-related reason.
      ru: Есть ясное договорное, юридическое, страховое или инцидентное основание.
  correctOptionId: d
  explanation:
    lv: Pagarinātai glabāšanai jābalstās uz reālu mērķi, piemēram, līguma izpildi, strīdu, apdrošināšanu, incidenta ziņošanu vai juridisku pienākumu.
    en: Extended retention should be tied to a real purpose such as contract performance, dispute handling, insurance evidence, incident reporting, or legal obligation.
    ru: 'Продлённое хранение должно опираться на реальную цель: исполнение договора, спор, страховые доказательства, отчёт по инциденту или юридическую обязанность.'
  distractorRationales:
    a:
      lv: Personiska interese nav pietiekams glabāšanas pamats privātuma jutīgam materiālam.
      en: Personal curiosity is not a strong retention basis for privacy-sensitive footage.
      ru: Личный интерес не является сильным основанием для хранения приватностно чувствительного материала.
    b:
      lv: Slikta failu disciplīna nav juridisks vai ētisks glabāšanas iemesls.
      en: Poor file discipline is not a legal or ethical retention reason.
      ru: Плохая файловая дисциплина не является правовым или этическим основанием хранения.
    c:
      lv: Lēta glabāšana neattaisno nevajadzīgu personas datu turēšanu.
      en: Cheap storage does not justify retaining unnecessary personal data.
      ru: Дешёвое хранилище не оправдывает удержание лишних персональных данных.
  sourceRef: docs/knowledge/eu-regulations/ — GDPR principles; docs/knowledge/latvia-caa/web-snapshots/ and training materials — privacy handling in UAS operations
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-021
  stem:
    lv: Kāda ir labāka noklusējuma plūsma pēc klienta filmēšanas?
    en: What is the better default workflow after a client shoot?
    ru: Какой workflow по умолчанию лучше после клиентской съёмки?
  options:
  - id: a
    text:
      lv: Atdalīt gala materiālu no izejmateriāla un atstāt tikai to, kam vēl ir skaidrs mērķis.
      en: Separate deliverables from raw material and retain only what still has a defined purpose.
      ru: Отделить deliverables от сырого материала и оставить только то, у чего ещё есть ясная цель.
  - id: b
    text:
      lv: Automātiski iedot klientam visu neapstrādāto kartes saturu.
      en: Give the client the full raw card dump automatically.
      ru: Автоматически отдать клиенту весь сырой дамп карты.
  - id: c
    text:
      lv: Augšupielādēt visu personīgā mākoņa mapē ar atvērtu piekļuvi.
      en: Upload everything to a personal cloud folder with open sharing.
      ru: Залить всё в личное облако с открытым доступом.
  - id: d
    text:
      lv: Glabāt visas kopijas mūžīgi, lai izvairītos no nejaušas dzēšanas.
      en: Keep all copies forever to avoid accidental deletion.
      ru: Хранить все копии вечно, чтобы избежать случайного удаления.
  correctOptionId: a
  explanation:
    lv: 'Labākā plūsma ir mērķī balstīta glabāšana: atstāt tikai to, kas vajadzīgs nodošanai, pierādīšanai vai drošības vajadzībām, un noņemt materiālu, kam vairs nav derīga mērķa.'
    en: 'The better workflow is purpose-based retention: isolate what is needed for delivery, proof, or evidence, and remove material that no longer has a valid purpose.'
    ru: 'Лучший workflow — хранение по цели: оставить только то, что нужно для передачи, доказательства или безопасности, и удалить материал без действительной цели.'
  distractorRationales:
    b:
      lv: Klientam parasti vajag saskaņoto rezultātu, nevis nekontrolētu datu masu.
      en: Clients usually need the agreed deliverables, not uncontrolled bulk data.
      ru: Клиенту обычно нужен согласованный результат, а не неконтролируемая масса сырых данных.
    c:
      lv: Atvērta dalīšanās palielina noplūdes risku un vājina kontroli pār personas datiem.
      en: Open sharing increases disclosure risk and weakens control over personal data.
      ru: Открытый доступ повышает риск раскрытия и ослабляет контроль над персональными данными.
    d:
      lv: Bezgalīga glabāšana palielina privātuma un drošības risku.
      en: Infinite retention increases privacy and security exposure.
      ru: Бесконечное хранение увеличивает приватностный и security-риск.
  sourceRef: docs/knowledge/eu-regulations/ — GDPR principles; docs/knowledge/latvia-caa/web-snapshots/ and training materials — privacy handling in UAS operations
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-022
  stem:
    lv: UAS pilots filmē piekrastes ainavu tūrisma klientam. Vienā kadrā redzami trīs pārgājējus — viņu sejas skaidras. Piekrišanas pilotam nav. Kas obligāti jādara pirms klipa publicēšanas?
    en: A drone pilot films a coastal landscape for a tourism client. Three hikers are visible in one shot — their faces are clear. The pilot has no consent from them. What must be done before publishing the clip?
    ru: Пилот снимает прибрежный пейзаж для туристического клиента. В кадре трое туристов с различимыми лицами. Согласия нет. Что нужно сделать до публикации?
  options:
  - id: a
    text:
      lv: Nekas — filmēšana publiskā āra vietā vienmēr ir atļauta.
      en: Nothing — filming in a public outdoor area is always permitted.
      ru: Ничего — съёмка на улице всегда разрешена.
  - id: b
    text:
      lv: Aizmiglot pārgājēju sejas pirms publicēšanas.
      en: Blur the hikers' faces before publishing.
      ru: Размыть лица туристов перед публикацией.
  - id: c
    text:
      lv: Iegūt pārgājēju piekrišanu pēc fakta sociālajos tīklos.
      en: Get the hikers' retrospective consent via social media.
      ru: Получить ретроспективное согласие туристов через соцсети.
  - id: d
    text:
      lv: Dzēst tikai kadrus, kur pārgājēji ir priekšplānā.
      en: Delete only the shots where the hikers are in the foreground.
      ru: Удалить только крупные планы с туристами.
  correctOptionId: b
  explanation:
    lv: GDPR strādā neatkarīgi no tā, ka vieta ir publiska. Identificējamas sejas ir personas dati. Bez piekrišanas vai cita derīga tiesiska pamata materiāls pirms publicēšanas ir jāanonimizē (sejas jāaizmiglo). Retrospektīva piekrišana sociālajos tīklos GDPR ietvaros nav derīga mehānisms jau apstrādātiem datiem.
    en: GDPR applies regardless of the location being public. Identifiable faces constitute personal data. Without consent or another valid lawful basis, the footage must be anonymised (faces blurred) before publishing. Retrospective social media consent is not a valid GDPR mechanism for data already processed.
    ru: GDPR применяется независимо от места съёмки. Идентифицируемые лица — персональные данные. Без согласия или иного правового основания запись нужно анонимизировать (размыть лица) до публикации.
  distractorRationales:
    a:
      lv: Publiska vieta neatbrīvo pilotu no GDPR pienākumiem par identificējamiem indivīdiem.
      en: Public location does not exempt the pilot from GDPR obligations regarding identifiable individuals.
      ru: Публичное расположение не освобождает пилота от GDPR-обязательств в отношении идентифицируемых людей.
    c:
      lv: GDPR piekrišana jādod pirms datu vākšanas, ne pēc. 'Piekrišana' sociālajos tīklos pēc fakta nav juridiski derīga.
      en: GDPR consent must be given before the data is collected, not after. Social media 'consent' after the fact is not legally valid.
      ru: Согласие GDPR должно быть получено до сбора данных. Ретроспективное согласие через соцсети юридически не действительно.
    d:
      lv: Tikai priekšplāna kadru dzēšana problēmu neatrisina, ja sejas ir identificējamas arī fonā. Pareiza pieeja ir aizmiglot visas identificējamās sejas.
      en: Deleting only foreground shots does not resolve the issue if faces are identifiable in background shots. Blurring all identifiable faces is the correct approach.
      ru: Удаление крупных планов не решает проблему, если лица идентифицируемы в других кадрах. Размытие применяется везде, где люди распознаваемы.
  sourceRef: docs/knowledge/latvia-caa/web-snapshots/07-open-category.md — privacy-aware operation basics
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-023
  stem:
    lv: Kurš no šiem ir derīgs tiesiskais pamats komerciālam UAS operatoram filmēt identificējamus indivīdus bez viņu skaidras piekrišanas?
    en: Which of the following is a valid lawful basis for a commercial drone operator to film identifiable individuals without their explicit consent?
    ru: Какое из следующих является допустимым правовым основанием для коммерческого пилота дрона, снимающего идентифицируемых людей без явного согласия?
  options:
  - id: a
    text:
      lv: Operators ir samaksājis par lidojuma atļauju.
      en: The operator paid for the flight permit.
      ru: Пилот заплатил за разрешение на полёт.
  - id: b
    text:
      lv: Operators ir reģistrēta uzņēmējdarbības struktūra.
      en: The operator is a registered business entity.
      ru: Пилот является зарегистрированным юридическим лицом.
  - id: c
    text:
      lv: Leģitīma interese, kur privātuma ietekme ir proporcionāla un dokumentēta.
      en: Legitimate interest, where the privacy impact is proportionate and documented.
      ru: Законные интересы — с документально подтверждённой соразмерностью воздействия на конфиденциальность.
  - id: d
    text:
      lv: Indivīdi atrodas publiski pieejamā vietā.
      en: The individuals are in a publicly accessible area.
      ru: Люди находятся в общедоступном месте.
  correctOptionId: c
  explanation:
    lv: Leģitīma interese (6. panta 1. (f) punkts) ir derīgs tiesiskais pamats, kad operatoram ir patiess mērķis un privātuma ietekme ir proporcionāla šim mērķim. Tas prasa dokumentētu leģitīmās intereses novērtējumu (LIA). Uzņēmuma reģistrācija vai lidojuma atļauja nav GDPR tiesiskie pamati.
    en: Legitimate interest (Art. 6(1)(f)) is a valid lawful basis when the operator has a genuine purpose and the privacy impact is proportionate to that purpose. This requires a documented Legitimate Interest Assessment (LIA). Being a registered business or holding a flight permit are not GDPR legal bases.
    ru: Законные интересы (ст. 6(1)(f)) — допустимое основание, если есть реальная цель и воздействие соразмерно. Требуется документальная Оценка законных интересов (LIA). Разрешение на полёт, статус юрлица и нахождение в публичном месте — не основания GDPR.
  distractorRationales:
    a:
      lv: Lidojuma atļauja ir gaisa telpas autorizācija no aviācijas iestādes. Tai nav saistības ar GDPR.
      en: A flight permit is airspace authorisation from the aviation authority. It has no bearing on GDPR.
      ru: Разрешение на полёт — это доступ к воздушному пространству от авиационных органов. К GDPR не имеет отношения.
    b:
      lv: Uzņēmējdarbības reģistrācijas statuss neietekmē GDPR pienākumus. GDPR vienlīdz strādā indivīdiem un uzņēmumiem.
      en: Business registration status does not affect GDPR obligations. GDPR applies to individuals and businesses equally.
      ru: Статус юридического лица не влияет на GDPR-обязательства. GDPR применяется к физическим и юридическим лицам одинаково.
    d:
      lv: Publiska pieejamība nav GDPR izņēmums. Identificējamas personas publiskās telpās saglabā savas datu aizsardzības tiesības.
      en: Public accessibility is not a GDPR exemption. Identifiable persons in public spaces retain their data protection rights.
      ru: Доступность места не является основанием GDPR. Идентифицируемые люди в публичных местах сохраняют права на защиту данных.
  sourceRef: docs/knowledge/latvia-caa/web-snapshots/07-open-category.md — privacy-aware operation basics
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-024
  stem:
    lv: Kāda ir galvenā privātuma atšķirība, kas dronu pilotam jāatceras, filmējot publiskā vietā?
    en: What is the key privacy distinction a drone pilot must remember in public-space filming?
    ru: Какое ключевое различие по приватности должен помнить пилот дрона при съёмке в публичном месте?
  options:
  - id: a
    text:
      lv: Ja lidojums bija legāls gaisa telpā, tad arī publikācija automātiski ir legāla.
      en: If the flight was legal in airspace terms, publication is automatically legal too.
      ru: Если полёт был законным по правилам воздушного пространства, публикация тоже автоматически законна.
  - id: b
    text:
      lv: Privātums ir svarīgs tikai privātā teritorijā.
      en: Privacy matters only when filming on private property.
      ru: Приватность важна только при съёмке на частной территории.
  - id: c
    text:
      lv: GDPR attiecas tikai uz iekštelpām.
      en: GDPR applies only indoors.
      ru: GDPR действует только внутри помещений.
  - id: d
    text:
      lv: Gaisa telpas likumība un datu aizsardzības likumība ir divi dažādi jautājumi.
      en: Airspace legality and data-protection legality are separate questions.
      ru: Законность полёта и законность обработки/публикации данных — это разные вопросы.
  correctOptionId: d
  explanation:
    lv: Legāls lidojums un legāla uzņemto datu izmantošana/publicēšana ir divi atsevišķi juridiski jautājumi. Gaisa telpas atļauja neatceļ privātuma pienākumus.
    en: A lawful flight and a lawful use/publication of footage are different legal questions. Airspace permission does not erase privacy obligations.
    ru: Законный полёт и законное использование/публикация отснятого материала — это разные юридические вопросы. Разрешение в воздушном пространстве не отменяет обязанности по защите данных.
  distractorRationales:
    a:
      lv: Tiesības lidot automātiski nedod tiesības publicēt identificējamus cilvēkus.
      en: The legal right to fly does not automatically include the legal right to publish identifiable people.
      ru: Право летать не означает автоматического права публиковать узнаваемых людей.
    b:
      lv: Privātuma pienākumi var rasties arī publiskā vidē.
      en: Privacy obligations can arise in public spaces as well.
      ru: Обязанности по приватности могут возникать и в публичной среде.
    c:
      lv: GDPR neattiecas tikai uz telpām; arī ārā atpazīstami cilvēki var radīt pienākumus.
      en: GDPR is not an indoor-only rule; identifiable people outdoors can trigger it too.
      ru: GDPR не ограничен помещениями; узнаваемые люди на улице тоже могут подпадать под защиту.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR and identifiable persons; docs/knowledge/latvia-caa/web-snapshots/14-normativais-regulejums.md — Latvian privacy and critical-infrastructure context
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-025
  stem:
    lv: Kas bieži ir drošākais risinājums, ja citādi noderīgā kadrā nejauši ir identificējami cilvēki?
    en: What is often the safest route when incidental identifiable people appear in otherwise useful footage?
    ru: Что часто является самым безопасным решением, если в полезный кадр случайно попали идентифицируемые люди?
  options:
  - id: a
    text:
      lv: Anonimizēt materiālu pirms kopīgošanas vai publikācijas.
      en: Anonymise the footage before sharing or publishing.
      ru: Анонимизировать материал до передачи или публикации.
  - id: b
    text:
      lv: Publicēt ātri, pirms kāds pamana.
      en: Publish quickly before anyone notices.
      ru: Публиковать быстро, пока никто не заметил.
  - id: c
    text:
      lv: Pieņemt, ka pūlis piekrita, vienkārši paliekot tur.
      en: Assume the crowd accepted filming by staying there.
      ru: Считать, что толпа согласилась уже тем, что осталась на месте.
  - id: d
    text:
      lv: Ignorēt jautājumu, ja lidojums bija zem 120 m.
      en: Ignore the issue if the drone flew under 120 m.
      ru: Игнорировать проблему, если полёт был ниже 120 м.
  correctOptionId: a
  explanation:
    lv: 'Ja cilvēki kadrā ir nejauši, bet materiāls citādi noderīgs, bieži tīrākais ceļš ir anonimizācija: seju un numurzīmju aizmiglošana, kadrējuma maiņa vai kadra aizvietošana.'
    en: 'When incidental people appear but the footage is otherwise useful, anonymisation is often the cleanest route: blur faces, blur plates, crop or replace the shot.'
    ru: 'Если люди попали в полезный материал случайно, самым чистым маршрутом часто будет анонимизация: размытие лиц и номеров, кадрирование или замена кадра.'
  distractorRationales:
    b:
      lv: Publicēšanas ātrums neatceļ privātuma pienākumus.
      en: Speed of publication does not reduce privacy obligations.
      ru: Скорость публикации не уменьшает обязанности по приватности.
    c:
      lv: Pasīva atrašanās vietā nav tas pats, kas informēta piekrišana.
      en: Passive presence is not the same thing as informed consent.
      ru: Пассивное присутствие — не то же самое, что информированное согласие.
    d:
      lv: 120 m griesti attiecas uz gaisa telpu, nevis privātuma likumību.
      en: The 120 m airspace ceiling has nothing to do with privacy legality.
      ru: Потолок 120 м относится к воздушному пространству, а не к законности обработки персональных данных.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR and identifiable persons; docs/knowledge/latvia-caa/web-snapshots/14-normativais-regulejums.md — Latvian privacy and critical-infrastructure context
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-026
  stem:
    en: A Latvian drone operator receives a complaint that identifiable people were published without a lawful basis. Which authority supervises data protection in Latvia?
    lv: Latvijas drona operators saņem sūdzību, ka identificējami cilvēki publicēti bez tiesiska pamata. Kura iestāde Latvijā uzrauga datu aizsardzību?
    ru: Латвийский оператор дрона получает жалобу, что идентифицируемые люди опубликованы без правового основания. Какой орган в Латвии контролирует защиту данных?
  options:
  - id: a
    text:
      lv: Civilās aviācijas aģentūra (CAA Latvia).
      en: Civil Aviation Agency (CAA Latvia).
      ru: Агентство гражданской авиации (CAA Latvia).
  - id: b
    text:
      lv: Datu valsts inspekcija (DVI).
      en: Datu valsts inspekcija (DVI).
      ru: Datu valsts inspekcija (DVI).
  - id: c
    text:
      lv: Patērētāju tiesību aizsardzības centrs.
      en: Consumer Rights Protection Centre.
      ru: Центр защиты прав потребителей.
  - id: d
    text:
      lv: Valsts robežsardze.
      en: State Border Guard.
      ru: Государственная пограничная служба.
  correctOptionId: b
  explanation:
    lv: 'Datu aizsardzības uzraudzību Latvijā veic Datu valsts inspekcija (DVI). CAA Latvia uzrauga aviācijas drošības prasības, ne datu aizsardzību.

      '
    en: 'Data protection supervision in Latvia is the role of Datu valsts inspekcija (DVI). CAA Latvia oversees aviation safety requirements, not data protection.

      '
    ru: 'Надзор за защитой данных в Латвии ведёт Datu valsts inspekcija (DVI). CAA Latvia надзирает за безопасностью авиации, а не за данными.

      '
  distractorRationales:
    a:
      lv: CAA Latvia uzrauga aviācijas drošības prasības (UGZ, sertifikāti, BGKIS). Datu aizsardzība ir DVI kompetencē.
      en: CAA Latvia oversees aviation safety (UGZ, certificates, BGKIS). Data protection is DVI's competence.
      ru: CAA Latvia надзирает за безопасностью авиации (UGZ, сертификаты, BGKIS). Защита данных — компетенция DVI.
    c:
      lv: Patērētāju centrs uzrauga patērētāju tiesības, nevis GDPR — pat ja datu pārkāpumi var skart patērētājus, formālais regulators ir DVI.
      en: The Consumer Centre oversees consumer rights, not GDPR — even though data breaches can affect consumers, the formal regulator is DVI.
      ru: Центр защиты прав потребителей надзирает за правами потребителей, а не за GDPR — формальный регулятор это DVI.
    d:
      lv: Robežsardze nodarbojas ar valsts robežas aizsardzību, ne ar datu aizsardzību.
      en: The Border Guard handles state border protection, not data protection.
      ru: Пограничная служба занимается охраной государственной границы, а не защитой данных.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 51; Latvian Personal Data Processing Law
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-027
  stem:
    en: A car number plate is clearly visible in an inspection clip that the client wants to publish. Under GDPR, how should the licence plate be treated?
    lv: Inspekcijas klipā skaidri redzama automašīnas numura zīme, un klients grib to publicēt. Kā saskaņā ar GDPR jāvērtē numura zīme?
    ru: В инспекционном ролике чётко виден номер автомобиля, и клиент хочет опубликовать материал. Как по GDPR следует рассматривать номерной знак?
  options:
  - id: a
    text:
      lv: Tikai komercreģistrācijai.
      en: Only for commercial registrations.
      ru: Только для коммерческих регистраций.
  - id: b
    text:
      lv: Tikai tad, ja kadrā ir redzams arī vadītājs.
      en: Only if the driver is also visible in the frame.
      ru: Только если в кадре виден и водитель.
  - id: c
    text:
      lv: Jā, jo to var sasaistīt ar konkrētu personu.
      en: Yes, because it can be linked to a specific person.
      ru: Да, его можно связать с конкретным лицом.
  - id: d
    text:
      lv: Nē, jo numurs ir publisks.
      en: No, because the plate is public.
      ru: Нет, потому что номер публичен.
  correctOptionId: c
  explanation:
    lv: 'GDPR personas dati ir jebkura informācija, kas ļauj identificēt personu — tieši vai netieši. Numurs ir reģistrēts uz fiziskas personas un tādēļ ir personas dati.

      '
    en: 'Under GDPR personal data is any information that allows identifying a person — directly or indirectly. A plate is registered to a natural person and therefore is personal data.

      '
    ru: 'По GDPR персональные данные — любая информация, позволяющая идентифицировать лицо прямо или косвенно. Номер привязан к физическому лицу и потому является персональными данными.

      '
  distractorRationales:
    a:
      lv: Numura statuss kā personas dati nav atkarīgs no reģistrācijas veida — gan privātās, gan komerciālās reģistrācijas attiecināmas uz personu.
      en: A plate's status as personal data does not depend on registration type — both private and commercial registrations trace back to a person.
      ru: Статус номера как персональных данных не зависит от типа регистрации — и частный, и коммерческий ведут к лицу.
    b:
      lv: Vadītāja redzamība papildina datu apjomu, bet nemaina to, ka numurs pats par sevi jau ir personas dati.
      en: The driver's visibility adds data, but it does not change that the plate alone is already personal data.
      ru: Видимость водителя добавляет данных, но не меняет факт, что сам номер — уже персональные данные.
    d:
      lv: Datu publiskums neizslēdz to no GDPR. Publiska informācija paliek personas dati, ja to var attiecināt uz indivīdu.
      en: Public visibility does not remove data from GDPR scope. Public information remains personal data if it can be linked to an individual.
      ru: Публичность данных не выводит их из GDPR. Публичная информация остаётся персональными данными, если её можно соотнести с лицом.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Reg (EU) 2016/679 (GDPR) Art. 4(1)
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-028
  stem:
    en: A commercial operator ignores GDPR obligations during repeated public filming. What is the upper fine level under GDPR for the most serious infringements?
    lv: Komerciāls operators atkārtoti ignorē GDPR pienākumus publiskas filmēšanas laikā. Kāds ir maksimālais sods par smagākajiem GDPR pārkāpumiem?
    ru: Коммерческий оператор repeatedly игнорирует обязанности GDPR при публичной съёмке. Каков верхний уровень штрафа GDPR за самые серьёзные нарушения?
  options:
  - id: a
    text:
      lv: 2 % no apgrozījuma vai 10 milj. EUR.
      en: 2 % of turnover or €10 million.
      ru: 2 % оборота или 10 млн евро.
  - id: b
    text:
      lv: 1000 EUR.
      en: €1000.
      ru: 1000 евро.
  - id: c
    text:
      lv: 100 EUR par incidentu.
      en: €100 per incident.
      ru: 100 евро за инцидент.
  - id: d
    text:
      lv: 4 % no gada apgrozījuma vai 20 milj. EUR (lielākā summa).
      en: 4 % of annual turnover or €20 million (whichever is higher).
      ru: 4 % годового оборота или 20 млн евро (что больше).
  correctOptionId: d
  explanation:
    lv: 'GDPR Art. 83 paredz maksimumu 4 % no globālā gada apgrozījuma vai 20 milj. EUR, atkarībā no tā, kura summa ir lielāka.

      '
    en: 'GDPR Art. 83 sets the cap at 4 % of global annual turnover or €20 million, whichever is higher.

      '
    ru: 'Ст. 83 GDPR устанавливает потолок: 4 % мирового годового оборота или 20 млн евро — что больше.

      '
  distractorRationales:
    a:
      lv: 2 % / 10 milj. EUR ir GDPR mazāks sliedzis (Art. 83(4)), kas attiecas uz operatīvām pārkāpšanām, ne uz augstākajiem nopietnajiem (4 % / 20 milj.).
      en: 2 % / €10 million is the lower GDPR tier (Art. 83(4)) for operational infringements, not the highest one (4 % / €20 million).
      ru: 2 % / 10 млн EUR — это нижний уровень GDPR (ст. 83(4)) для операционных нарушений, а не максимум.
    b:
      lv: 1000 EUR būtu administratīva soda fragmentārs minimums, ne maksimums. GDPR sods var sasniegt desmitiem miljonu.
      en: €1000 would be a fragmentary minimum of an administrative penalty, not the maximum. GDPR fines reach tens of millions.
      ru: 1000 EUR — фрагмент минимума административного штрафа, а не максимум. Штрафы GDPR доходят до десятков миллионов.
    c:
      lv: 100 EUR par incidentu ir simboliska summa, kas neatbilst GDPR riska un ietekmes mērogam.
      en: €100 per incident is a token amount and does not match the risk and impact scale GDPR is designed for.
      ru: 100 EUR за инцидент — символическая сумма, не соответствующая масштабу риска GDPR.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Reg (EU) 2016/679 (GDPR) Art. 83(5)
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-029
  stem:
    en: A utility company hires a drone operator to inspect a technical site, and some passers-by may appear incidentally. Which lawful basis normally fits this processing best?
    lv: Komunālo pakalpojumu uzņēmums nolīgst drona operatoru tehniska objekta inspekcijai, un kadrā var nejauši nonākt garāmgājēji. Kurš tiesiskais pamats parasti šādai apstrādei der vislabāk?
    ru: Коммунальная компания нанимает оператора дрона для инспекции технического объекта, и в кадр могут случайно попасть прохожие. Какое правовое основание обычно лучше всего подходит для такой обработки?
  options:
  - id: a
    text:
      lv: Leģitīmas intereses (Art. 6(1)(f)).
      en: Legitimate interests (Art. 6(1)(f)).
      ru: Законные интересы (ст. 6(1)(f)).
  - id: b
    text:
      lv: Vitālas intereses (Art. 6(1)(d)).
      en: Vital interests (Art. 6(1)(d)).
      ru: Жизненно важные интересы (ст. 6(1)(d)).
  - id: c
    text:
      lv: Piekrišana (Art. 6(1)(a)) no visiem nejaušiem garāmgājējiem.
      en: Consent (Art. 6(1)(a)) from every incidental passer-by.
      ru: Согласие (ст. 6(1)(a)) от каждого случайного прохожего.
  - id: d
    text:
      lv: Līgums (Art. 6(1)(b)).
      en: Contract (Art. 6(1)(b)).
      ru: Договор (ст. 6(1)(b)).
  correctOptionId: a
  explanation:
    lv: 'Tehniskās apsekošanas, kur cilvēki kadrā ir nejauši, parasti pamatojas uz leģitīmām interesēm. Pilotam jāveic interešu līdzsvara tests un jādokumentē rezultāts.

      '
    en: 'Technical inspection where people in frame are incidental typically relies on legitimate interests. The pilot must run a balancing test and document the outcome.

      '
    ru: 'Осмотр техники, при котором люди в кадре случайны, обычно опирается на законные интересы. Пилот должен провести тест баланса и зафиксировать результат.

      '
  distractorRationales:
    b:
      lv: Vitālas intereses ir dzīvības glābšana — neattiecas uz tehnisko apsekošanu.
      en: Vital interests covers life-saving emergencies — it does not fit a routine technical inspection.
      ru: Жизненно важные интересы — про спасение жизни. К плановому осмотру это не относится.
    c:
      lv: Piekrišana no katra nejauša garāmgājēja praktiski nav iespējama un nav prasīta — leģitīmā interese šādiem gadījumiem ir piemērotāks pamats.
      en: Consent from every incidental passer-by is practically impossible and not required — legitimate interest fits such cases better.
      ru: Согласие от каждого случайного прохожего практически невозможно и не требуется — для таких случаев лучше подходит законный интерес.
    d:
      lv: Līgums attiecas uz datu subjekta līgumu (klients-uzņēmums). Tehniskā apsekošana ar nejaušiem cilvēkiem kadrā nav līguma pamats.
      en: Contract basis covers the data subject's contract (client-business). Technical inspection with incidental people in frame does not fit it.
      ru: Договорное основание касается договора с самим субъектом данных. Технический осмотр со случайными людьми в кадре под него не подпадает.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Reg (EU) 2016/679 (GDPR) Art. 6(1)(f); EDPB Guidelines 06/2020
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-030
  stem:
    en: While planning a route near infrastructure, the pilot sees a Latvian sign prohibiting filming without authorisation. What wording should the pilot recognise?
    lv: Plānojot maršrutu pie infrastruktūras, pilots redz Latvijas zīmi, kas aizliedz filmēt bez saskaņošanas. Kādu tekstu pilotam jāatpazīst?
    ru: Планируя маршрут рядом с инфраструктурой, пилот видит латвийский знак, запрещающий съёмку без согласования. Какую надпись должен распознать пилот?
  options:
  - id: a
    text:
      lv: Ar dzeltenu līniju.
      en: With a yellow line.
      ru: Жёлтой линией.
  - id: b
    text:
      lv: Ar zīmi "BEZ SASKAŅOŠANAS FOTOGRAFĒT, FILMĒT AIZLIEGTS".
      en: With a sign "BEZ SASKAŅOŠANAS FOTOGRAFĒT, FILMĒT AIZLIEGTS".
      ru: Знаком «BEZ SASKAŅOŠANAS FOTOGRAFĒT, FILMĒT AIZLIEGTS».
  - id: c
    text:
      lv: Ar sarkanu krustu.
      en: With a red cross.
      ru: Красным крестом.
  - id: d
    text:
      lv: Ar trīsstūri.
      en: With a triangle.
      ru: Треугольником.
  correctOptionId: b
  explanation:
    lv: 'Latvijā kritiskās infrastruktūras objektus apzīmē ar šo tieši formulēto zīmi. Filmēšana bez saskaņošanas ir administratīvi sodāma.

      '
    en: 'In Latvia critical-infrastructure sites carry that exact wording. Filming without authorisation is an administrative offence.

      '
    ru: 'В Латвии объекты критической инфраструктуры маркируются именно такой надписью. Съёмка без согласования — административное правонарушение.

      '
  distractorRationales:
    a:
      lv: Dzeltena līnija parasti apzīmē perimetra robežu, ne filmēšanas aizliegumu.
      en: A yellow line usually marks a perimeter boundary, not a filming prohibition.
      ru: Жёлтая линия обычно отмечает границу периметра, а не запрет на съёмку.
    c:
      lv: Sarkans krusts ir medicīnas vai bīstamības simbols, kas neapzīmē filmēšanas aizliegumu.
      en: A red cross is a medical or danger symbol, unrelated to filming prohibitions.
      ru: Красный крест — медицинский или знак опасности, не запрет на съёмку.
    d:
      lv: Trīsstūris ir vispārēja brīdinājuma forma, nevis Latvijas standarta apzīmējums kritiskās infrastruktūras filmēšanas aizliegumam.
      en: A triangle is a generic warning shape, not the Latvian standard sign for the critical-infrastructure filming ban.
      ru: Треугольник — общая форма предупреждения, не латвийский стандартный знак запрета съёмки критической инфраструктуры.
  sourceRef: 'docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Latvia: critical-infrastructure protection rules; CAA Latvia guidance'
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-031
  stem:
    en: A commercial client asks for a public city-marathon video where runners’ faces are identifiable. What GDPR handling is required before publication?
    lv: Komerciāls klients prasa publicēt pilsētas maratona video, kur skrējēju sejas ir identificējamas. Kāda GDPR apstrāde vajadzīga pirms publicēšanas?
    ru: Коммерческий клиент просит опубликовать видео городского марафона, где лица бегунов идентифицируемы. Какая обработка по GDPR нужна до публикации?
  options:
  - id: a
    text:
      lv: GDPR neattiecas uz ārā uzfilmētu saturu.
      en: GDPR does not apply to content filmed outdoors.
      ru: GDPR не применяется к контенту, снятому на улице.
  - id: b
    text:
      lv: Nav nepieciešams juridiskais pamats — publiski notikumi ir atbrīvoti.
      en: No lawful basis needed — public events are exempt.
      ru: Правовое основание не нужно — публичные мероприятия освобождены.
  - id: c
    text:
      lv: Leģitīmas intereses var piemērot publiskam notikumam, bet pirms publicēšanas atpazīstamās sejas jāaizklāj vai jāveic leģitīmo interešu novērtējums.
      en: Legitimate interest may apply to a public event, but identifiable faces must be blurred before publishing or a Legitimate Interest Assessment must be completed.
      ru: Законные интересы могут применяться к публичному мероприятию, но перед публикацией нужно размыть узнаваемые лица или провести оценку законных интересов.
  - id: d
    text:
      lv: Publiski notikumi automātiski nozīmē piekrišanu — dalībnieki ir piekrituši, startējot.
      en: Public events imply automatic consent — participants consented by entering.
      ru: Публичные мероприятия подразумевают автоматическое согласие — участники дали его при регистрации.
  correctOptionId: c
  explanation:
    lv: 'Publiski pasākumi var pamatot leģitīmās intereses kā juridisko pamatu, ja privātuma ietekme ir samērīga. Tomēr atpazīstamas sejas ir personas dati. Pirms publicēšanas vai nu jāveic Leģitīmo interešu novērtējums (LIA) ar secinājumu, ka privātuma ietekme ir minimāla, vai arī jāaizklāj visas atpazīstamās sejas un numura zīmes.

      '
    en: 'Public events can support legitimate interest as a lawful basis if the privacy impact is proportionate. However, identifiable faces are personal data. Before publishing, either a Legitimate Interest Assessment (LIA) must conclude that privacy impact is minimal, or all identifiable faces and plates must be blurred.

      '
    ru: 'Публичные мероприятия могут быть основанием для законных интересов, если воздействие на конфиденциальность соразмерно. Однако узнаваемые лица — персональные данные. Перед публикацией либо Оценка законных интересов должна подтвердить минимальное воздействие, либо все узнаваемые лица нужно размыть.

      '
  distractorRationales:
    a:
      lv: GDPR attiecas uz personas datu apstrādi neatkarīgi no filmēšanas vietas. Āra filmēšana nav atbrīvota kategorija.
      en: GDPR applies to the processing of personal data regardless of where filming takes place. Outdoor filming is not an exempt category.
      ru: GDPR применяется к обработке персональных данных независимо от места съёмки. Съёмка на улице не является освобождённой категорией.
    b:
      lv: GDPR nav "publisku notikumu izņēmuma". Atpazīstamas personas joprojām ir personas dati neatkarīgi no pasākuma publiskā rakstura.
      en: GDPR has no "public event exemption". Identifiable persons remain personal data regardless of the event's public character.
      ru: GDPR не имеет «исключения для публичных мероприятий». Узнаваемые люди по-прежнему являются персональными данными независимо от публичного характера мероприятия.
    d:
      lv: Dalība maratonā nav GDPR piekrišana filmēšanai un publicēšanai komerciālos nolūkos. Piekrišanai jābūt brīvi dotai, konkrētai un informētai.
      en: Entering a marathon is not GDPR consent to being filmed and published for commercial purposes. Consent must be freely given, specific, and informed.
      ru: Участие в марафоне не является согласием GDPR на съёмку и публикацию в коммерческих целях. Согласие должно быть свободным, конкретным и информированным.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Reg (EU) 2016/679 (GDPR) Art. 6(1)(f); EDPB Guidelines 06/2020
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: pr-032
  stem:
    en: The airspace approval is valid, but the site itself displays a filming-prohibition sign. Does BGKIS approval give the operator filming rights?
    lv: Gaisa telpas atļauja ir derīga, bet pašā objektā ir filmēšanas aizlieguma zīme. Vai BGKIS atļauja dod operatoram filmēšanas tiesības?
    ru: Разрешение на воздушное пространство действительно, но на самом объекте есть знак запрета съёмки. Даёт ли одобрение BGKIS право на съёмку?
  options:
  - id: a
    text:
      lv: Jā, bet tikai komerciāliem operatoriem.
      en: Yes, but only for commercial operators.
      ru: Да, но только для коммерческих операторов.
  - id: b
    text:
      lv: Jā — BGKIS apstiprinājums aptver visus izmantošanas tiesību aspektus.
      en: Yes — BGKIS approval covers all use-rights aspects.
      ru: Да — одобрение BGKIS охватывает все аспекты прав использования.
  - id: c
    text:
      lv: Tikai tad, ja zīme ir novecojusi — jaunās UGZ izstrādes atceļ vecās aizlieguma zīmes.
      en: Only if the sign is outdated — new UGZ developments override old prohibition signs.
      ru: Только если знак устарел — новые решения UGZ отменяют старые знаки запрета.
  - id: d
    text:
      lv: Nē — UGZ atļauja un filmēšanas aizliegums ir paralēlas tiesiskās sistēmas. BGKIS neaizstāj objekta operatora atļauju.
      en: No — UGZ airspace access and the filming prohibition are parallel legal frameworks. BGKIS does not replace the site operator's authorisation.
      ru: Нет — UGZ (доступ к воздушному пространству) и запрет съёмки — параллельные правовые системы. BGKIS не заменяет разрешение оператора объекта.
  correctOptionId: d
  explanation:
    lv: 'BGKIS ir gaisa telpas pārvaldības sistēma, ko pārvalda CAA Latvia. Filmēšanas aizliegums ir nacionālās drošības/privātuma prasība, ko pārvalda attiecīgais ministrija vai drošības dienests. Tās ir divas neatkarīgas tiesiskās sistēmas ar atšķirīgām izdevošajām iestādēm. Abas jāatrisina atsevišķi.

      '
    en: 'BGKIS is an airspace management system administered by CAA Latvia. The filming prohibition is a national security/privacy requirement administered by the relevant ministry or security service. They are two independent legal frameworks with different issuing authorities. Both must be resolved separately.

      '
    ru: 'BGKIS — система управления воздушным пространством, администрируемая CAA Latvia. Запрет съёмки — требование национальной безопасности/ конфиденциальности, администрируемое соответствующим министерством или службой безопасности. Это две независимые правовые системы с разными выдающими органами. Обе должны решаться отдельно.

      '
  distractorRationales:
    a:
      lv: Komerciālais statuss neietekmē filmēšanas aizlieguma neatkarību no BGKIS. Abi — gan komerciālie, gan atpūtas piloti — jāizvērtē atsevišķi.
      en: Commercial status does not affect the filming prohibition's independence from BGKIS. Both commercial and recreational pilots must resolve both separately.
      ru: Коммерческий статус не влияет на независимость запрета съёмки от BGKIS. Как коммерческие, так и рекреационные пилоты должны решать оба вопроса отдельно.
    b:
      lv: BGKIS aptver tikai gaisa telpas piekļuvi. Tas nav juridisks instruments filmēšanas tiesību piešķiršanai.
      en: BGKIS covers only airspace access. It is not a legal instrument for granting filming rights.
      ru: BGKIS охватывает только доступ к воздушному пространству. Это не юридический инструмент для предоставления прав на съёмку.
    c:
      lv: UGZ zonas un filmēšanas aizlieguma zīmes ir neatkarīgas — pirmā neaizstāj otru. Nav mehānisma, kurā UGZ izstrāde "atceļ" drošības marķētas zonas filmēšanas aizliegumu.
      en: UGZ zones and filming prohibition signs are independent — the former does not replace the latter. There is no mechanism by which UGZ developments "override" security-marked site filming prohibitions.
      ru: Зоны UGZ и знаки запрета съёмки независимы — первое не заменяет второе. Не существует механизма, при котором решения UGZ «отменяют» запреты съёмки на объектах с охраной.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Latvia Critical Infrastructure Protection Law; CAA Latvia BGKIS rules
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-033
  stem:
    en: Inspection footage has been delivered and accepted by the client. No dispute, incident or legal hold exists. What is the correct retention approach?
    lv: Inspekcijas materiāls ir nodots un klienta pieņemts. Nav strīda, incidenta vai juridiskas glabāšanas prasības. Kāda ir pareizā glabāšanas pieeja?
    ru: Инспекционный материал передан и принят клиентом. Нет спора, инцидента или юридического удержания. Какой подход к хранению правильный?
  options:
  - id: a
    text:
      lv: Tik ilgi, cik nepieciešams konkrētajam nolūkam, pēc tam dzēst.
      en: Only as long as necessary for the specific purpose, then delete.
      ru: Только пока необходимо для конкретной цели, затем удалить.
  - id: b
    text:
      lv: Kamēr operators ir reģistrēts CAA Latvia — pēc tam var dzēst.
      en: Until the operator's CAA Latvia registration expires — then may delete.
      ru: До истечения регистрации оператора в CAA Latvia — затем можно удалить.
  - id: c
    text:
      lv: Neierobežoti — tās ir pilota darba materiāls.
      en: Indefinitely — it is the pilot's work product.
      ru: Бессрочно — это рабочий материал пилота.
  - id: d
    text:
      lv: Vismaz 5 gadus — kā pierādījums potenciālām juridiskām prasībām.
      en: At least 5 years — as evidence for potential legal claims.
      ru: Не менее 5 лет — как доказательство для возможных претензий.
  correctOptionId: a
  explanation:
    lv: 'GDPR Art. 5(1)(e) — datu minimizēšanas un uzglabāšanas ierobežojuma principi — prasa personas datu dzēšanu, tiklīdz tie vairs nav nepieciešami nolūkam, kādam tika savākti. Pēc klienta pieņemšanas inspekcijas materiāls nav nepieciešams, ja vien nav atsevišķas juridiskās prasības. Paziņojums par GDPR pamatā ir nolūks, ne ilgums.

      '
    en: 'GDPR Art. 5(1)(e) — the data minimisation and storage limitation principles — require deletion of personal data once it is no longer necessary for the purpose for which it was collected. After client acceptance the inspection footage is not necessary unless there is a separate legal hold. GDPR retention is purpose-driven, not duration-driven.

      '
    ru: 'Ст. 5(1)(e) GDPR — принципы минимизации данных и ограничения хранения — требуют удаления персональных данных, как только они больше не нужны для цели, ради которой были собраны. После принятия клиентом инспекционный материал не нужен, если нет отдельного правового требования. Хранение по GDPR определяется целью, а не сроком.

      '
  distractorRationales:
    b:
      lv: CAA Latvia reģistrācijas termiņš nav saistīts ar GDPR datu uzglabāšanas termiņu. Tie ir neatkarīgas tiesiskās prasības.
      en: CAA Latvia registration period is not linked to GDPR data retention periods. They are independent legal requirements.
      ru: Период регистрации CAA Latvia не связан со сроками хранения данных GDPR. Это независимые правовые требования.
    c:
      lv: '"Darba materiāls" nav GDPR kategorija. Personas dati ir jādzēš, kad to nolūks ir izpildīts — neatkarīgi no to komerciālās vērtības.'
      en: '"Work product" is not a GDPR category. Personal data must be deleted when its purpose is fulfilled — regardless of its commercial value.'
      ru: «Рабочий материал» — не категория GDPR. Персональные данные должны быть удалены по выполнении цели — независимо от их коммерческой ценности.
    d:
      lv: 5 gadu uzglabāšana bez konkrēta juridiskā pamata pārkāpj GDPR uzglabāšanas ierobežojumu principu.
      en: 5-year retention without a specific legal basis violates the GDPR storage limitation principle.
      ru: Хранение 5 лет без конкретного правового основания нарушает принцип ограничения хранения GDPR.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Reg (EU) 2016/679 (GDPR) Art. 5(1)(e) — storage limitation
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-034
  stem:
    lv: Pēc-lidojuma pārskatā operatoram jāizlemj, ko drīkst glabāt, nodot vai dzēst. Drona kamera nejauši uzņem personu privātajā pagalmā. Persona pieprasa dzēst uzņemto materiālu. Kāds ir GDPR pienākums?
    en: During post-flight review, the operator must decide what may be kept, shared or deleted. A drone camera accidentally captures a person in their private garden. The person requests deletion of the footage. What is the GDPR obligation?
    ru: Во время послеполётного просмотра оператор решает, что можно хранить, передавать или удалять. Камера дрона случайно снимает человека в его личном саду. Человек требует удалить запись. Каково обязательство по GDPR?
  options:
  - id: a
    text:
      lv: Persona var prasīt dzēšanu tikai tad, ja tā var pierādīt, ka tika nodarīts kaitējums.
      en: The person can only demand deletion if they can prove harm was caused.
      ru: Лицо может требовать удаления только при наличии доказательств причинённого вреда.
  - id: b
    text:
      lv: Materiāls jādzēš nekavējoties, jo nav tiesiska pamata personas personas datu apstrādei.
      en: The footage must be deleted immediately, as there is no legal basis for processing the person's personal data.
      ru: Запись должна быть немедленно удалена, так как нет правового основания для обработки персональных данных лица.
  - id: c
    text:
      lv: Nav pienākuma dzēst — lidojums bija no publiskas gaisa telpas.
      en: No obligation to delete — the flight was from public airspace.
      ru: Обязательства по удалению нет — полёт выполнялся из общедоступного воздушного пространства.
  - id: d
    text:
      lv: Operators var glabāt materiālu, bet nedrīkst to publicēt.
      en: The operator may retain the footage but must not publish it.
      ru: Оператор может хранить запись, но не должен её публиковать.
  correctOptionId: b
  explanation:
    lv: 'GDPR Art. 17 paredz tiesības uz dzēšanu ("tiesības tikt aizmirstam"). Personas attēls privātajā pagalmā ir personas dati. Ja nav tiesiska pamata (piekrišana, leģitīmas intereses u.c.) personas datu apstrādei, operators pēc pieprasījuma ir pienākums dzēst materiālu. Publiskas gaisa telpas izmantošana neatceļ GDPR pienākumus.

      '
    en: 'GDPR Art. 17 provides the right to erasure ("right to be forgotten"). A person''s image in their private garden is personal data. If there is no legal basis (consent, legitimate interests, etc.) for processing the personal data, the operator is obliged to delete the footage upon request. Using public airspace does not cancel GDPR obligations.

      '
    ru: 'Ст. 17 GDPR предусматривает право на стирание («право быть забытым»). Изображение человека в его частном саду является персональными данными. Если нет правового основания (согласие, законные интересы и т.д.) для обработки персональных данных, оператор обязан удалить запись по запросу. Использование общедоступного воздушного пространства не отменяет обязательства по GDPR.

      '
  distractorRationales:
    a:
      lv: Kaitējums nav priekšnoteikums dzēšanas tiesībām GDPR Art. 17. Pietiek ar personas pieprasījumu un tiesiska pamata neesamību.
      en: Harm is not a prerequisite for erasure rights under GDPR Art. 17. A person's request and the absence of a legal basis are sufficient.
      ru: Причинённый вред не является предварительным условием для права на стирание по ст. 17 GDPR. Достаточно запроса лица и отсутствия правового основания.
    c:
      lv: Publiskā gaisa telpa ir par lidojuma atļauju; GDPR attiecas uz personas datu apstrādi neatkarīgi no tā, no kurienes tas tika ierakstīts.
      en: Public airspace is about flight permission; GDPR applies to personal data processing regardless of where the recording was made from.
      ru: Общедоступное воздушное пространство касается разрешения на полёт; GDPR применяется к обработке персональных данных независимо от того, откуда сделана запись.
    d:
      lv: Glabāšana bez tiesiska pamata un bez dzēšanas pēc pieprasījuma ir GDPR pārkāpums. Personas dati bez tiesiska pamata jādzēš pēc pieprasījuma.
      en: Retaining data without a legal basis and without deleting upon request is a GDPR violation. Personal data without legal basis must be deleted upon request.
      ru: Хранение данных без правового основания и без удаления по запросу является нарушением GDPR. Персональные данные без правового основания должны быть удалены по запросу.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 17 — right to erasure; Art. 6 — lawful basis
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-035
  stem:
    lv: Legāls lidojums operatoram joprojām rada atsevišķu privātuma lēmumu. UAS operators apstrādā lidojuma žurnāla datus, kas satur GPS pozīcijas un laika zīmogus. Vai tie ir uzskatāmi par personas datiem?
    en: A legal flight still creates a separate privacy decision for the operator. A UAS operator processes flight log data containing GPS positions and time stamps. Are these considered personal data?
    ru: Законный полёт всё равно создаёт отдельное privacy-решение для оператора. Оператор UAS обрабатывает данные журнала полётов, содержащие GPS-координаты и метки времени. Считаются ли они персональными данными?
  options:
  - id: a
    text:
      lv: Nē — GDPR attiecas tikai uz attēliem un video, nevis metadatiem.
      en: No — GDPR applies only to images and video, not metadata.
      ru: Нет — GDPR применяется только к изображениям и видео, а не к метаданным.
  - id: b
    text:
      lv: Tikai tad, ja lidojumu žurnālā ir iekļauts arī pilota vārds.
      en: Only if the flight log also includes the pilot's name.
      ru: Только если журнал полётов также содержит имя пилота.
  - id: c
    text:
      lv: Jā, ja tie atklāj identificējamas personas atrašanās vietu vai darbības laiku un vietu.
      en: Yes, if they reveal an identifiable person's location or activity time and place.
      ru: Да, если они раскрывают местонахождение или время и место деятельности идентифицируемого лица.
  - id: d
    text:
      lv: Nē — GPS koordinātas un laika zīmogi ir tehniski dati, nevis personas dati.
      en: No — GPS coordinates and time stamps are technical data, not personal data.
      ru: Нет — координаты GPS и метки времени являются техническими данными, а не персональными.
  correctOptionId: c
  explanation:
    lv: 'GDPR Art. 4(1) definē personas datus kā "jebkādu informāciju par identificētu vai identificējamu fizisku personu". GPS koordinātes un laika zīmogi, kas atklāj identificētas personas atrašanās vietu vai kustības modeli, ir personas dati. Atrašanās vietas dati tieši minēti GDPR recitālos.

      '
    en: 'GDPR Art. 4(1) defines personal data as "any information relating to an identified or identifiable natural person". GPS coordinates and time stamps that reveal an identified person''s location or movement pattern are personal data. Location data is specifically mentioned in GDPR recitals.

      '
    ru: 'Ст. 4(1) GDPR определяет персональные данные как «любую информацию, относящуюся к идентифицированному или идентифицируемому физическому лицу». Координаты GPS и метки времени, раскрывающие местонахождение или паттерн движения идентифицированного лица, являются персональными данными. Данные о местоположении специально упоминаются в преамбуле GDPR.

      '
  distractorRationales:
    a:
      lv: GDPR attiecas uz jebkādu personas datu apstrādi — attēlus, video, metadatus, finanšu datus u.c. Nav ierobežojuma tikai uz vizuālajiem formātiem.
      en: GDPR applies to any processing of personal data — images, video, metadata, financial data, etc. There is no restriction to visual formats only.
      ru: GDPR применяется к любой обработке персональных данных — изображения, видео, метаданные, финансовые данные и т.д. Нет ограничения только на визуальные форматы.
    b:
      lv: Personas dati nav atkarīgi tikai no pilota vārda esamības. Atrašanās vieta + laiks var būt pietiekami identifikācijai bez vārda.
      en: Personal data does not depend solely on the pilot's name being present. Location + time can be sufficient for identification without a name.
      ru: Персональные данные не зависят только от наличия имени пилота. Местоположение + время может быть достаточным для идентификации без имени.
    d:
      lv: GDPR neierobežo "personas datu" jēdzienu ar vārdu vai attēlu. Jebkura informācija, kas ļauj identificēt personu (ieskaitot atrašanās vietu), ir personas dati.
      en: GDPR does not limit the concept of "personal data" to names or images. Any information enabling identification of a person (including location) is personal data.
      ru: GDPR не ограничивает понятие «персональных данных» именами или изображениями. Любая информация, позволяющая идентифицировать лицо (включая местоположение), является персональными данными.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 4(1) — personal data definition; Recital 30 — location data
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-036
  stem:
    lv: Klients pieprasa materiālu, kurā var būt identificējami cilvēki vai aizsargāts īpašums. Pilots filmē privātīpašumu no publiskas gaisa telpas (ārpus pārkāptām ģeogrāfiskajām zonām). Īpašnieks nevar būt filmēts. Vai filma ir legāla?
    en: A client asks for footage that may include identifiable people or protected property. A pilot films private property from public airspace (outside any violated geographical zones). The owner cannot be identified in the footage. Is the filming legal?
    ru: Клиент просит материал, где могут быть идентифицируемые люди или защищённый объект. Пилот снимает частную собственность из общедоступного воздушного пространства (за пределами нарушенных географических зон). Владелец не может быть идентифицирован на видео. Законна ли съёмка?
  options:
  - id: a
    text:
      lv: Jā — tā kā īpašnieks nav identificējams, GDPR nav piemērojams.
      en: Yes — since the owner is not identifiable, GDPR does not apply.
      ru: Да — поскольку владелец не идентифицируем, GDPR не применяется.
  - id: b
    text:
      lv: Nē — jebkāda filmēšana no drona ir aizliegta ārpus pilnvarotajiem lidlaukiem.
      en: No — any filming from a drone is prohibited outside authorised aerodromes.
      ru: Нет — любая съёмка с дрона запрещена за пределами авторизованных аэродромов.
  - id: c
    text:
      lv: Jā — publiska gaisa telpa nozīmē brīvu filmēšanu.
      en: Yes — public airspace means free filming.
      ru: Да — общедоступное воздушное пространство означает свободную съёмку.
  - id: d
    text:
      lv: Iespējams jā — gaisa telpa atļauj lidojumu, bet nacionālie privātuma likumi var aizliegt filmēšanu virs privātīpašuma pat bez identifikācijas.
      en: Possibly yes — airspace permits the flight, but national privacy laws may prohibit filming above private property even without identification.
      ru: Возможно да — воздушное пространство разрешает полёт, но национальные законы о конфиденциальности могут запрещать съёмку над частной собственностью даже без идентификации.
  correctOptionId: d
  explanation:
    lv: 'Tiesisko regulējumu nosaka divi slāņi: (1) gaisa telpas regulējums (BGKIS, CAA Latvia) — atļauj lidot vai nē; (2) privātuma likumi (GDPR + nacionālie) — nosaka, vai filmēšana ir legāla. Gaisa telpa var būt brīva, bet dažas valstis aizliedz filmēt no augšas virs privātā īpašuma bez atļaujas, pat ja persona nav identificēta. Latvijā piemēro GDPR un Fizisko personu datu apstrādes likumu.

      '
    en: 'The legal framework has two layers: (1) airspace regulation (BGKIS, CAA Latvia) — permits flight or not; (2) privacy laws (GDPR + national) — determine whether filming is legal. Airspace may be free, but some countries prohibit filming from above over private property without consent, even if no person is identified. Latvia applies GDPR and the Personal Data Processing Law.

      '
    ru: 'Правовая база состоит из двух уровней: (1) регулирование воздушного пространства (BGKIS, CAA Latvia) — разрешает полёт или нет; (2) законы о конфиденциальности (GDPR + национальные) — определяют, законна ли съёмка. Воздушное пространство может быть открытым, но некоторые страны запрещают съёмку сверху над частной собственностью без согласия даже при отсутствии идентифицируемых лиц. В Латвии применяются GDPR и Закон об обработке персональных данных физических лиц.

      '
  distractorRationales:
    a:
      lv: Pat bez personas identifikācijas atrašanās vietas dati (kura mājā tika filmēts) var būt personas dati. Turklāt nacionālie privātuma likumi var aizsargāt vairāk nekā GDPR.
      en: Even without personal identification, location data (which property was filmed) can be personal data. Additionally national privacy laws may protect more than GDPR.
      ru: Даже без идентификации лица данные о местоположении (какое имущество снималось) могут быть персональными данными. Кроме того, национальные законы о конфиденциальности могут предоставлять большую защиту, чем GDPR.
    b:
      lv: Nav vispārēja filmēšanas aizlieguma ārpus lidlaukiem. Filmēšanas legālumu nosaka konkrētie gaisa telpas un privātuma noteikumi.
      en: There is no general filming prohibition outside aerodromes. Filming legality is determined by specific airspace and privacy rules.
      ru: Нет общего запрета на съёмку за пределами аэродромов. Законность съёмки определяется конкретными правилами воздушного пространства и конфиденциальности.
    c:
      lv: Publiska gaisa telpa ir par tiesībām lidot, nevis par tiesībām filmēt. Filmēšanas tiesiskumu nosaka privātuma un datu aizsardzības likums.
      en: Public airspace is about the right to fly, not the right to film. The legality of filming is determined by privacy and data protection law.
      ru: Общедоступное воздушное пространство касается права летать, а не права снимать. Законность съёмки определяется законодательством о конфиденциальности и защите данных.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 6 — lawful basis; Latvia Personal Data Processing Law; Datu valsts inspekcija
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: pr-037
  stem:
    lv: Pēc-lidojuma pārskatā operatoram jāizlemj, ko drīkst glabāt, nodot vai dzēst. Pilots filmu kritiskās infrastruktūras tuvumā, kas marķēta ar "Fotografēšana aizliegta" zīmi. BGKIS pieteikums ir apstiprināts. Vai filmēšana ir atļauta?
    en: During post-flight review, the operator must decide what may be kept, shared or deleted. A pilot films near critical infrastructure marked with a "Photography prohibited" sign. The BGKIS application is approved. Is filming permitted?
    ru: Во время послеполётного просмотра оператор решает, что можно хранить, передавать или удалять. Пилот снимает вблизи критической инфраструктуры, помеченной знаком «Съёмка запрещена». Заявка BGKIS одобрена. Разрешена ли съёмка?
  options:
  - id: a
    text:
      lv: Nē — BGKIS apstiprina lidojumu gaisa telpā, bet aizlieguma zīme attiecas uz citiem tiesību aktiem (drošība, valsts noslēpums) un ir spēkā neatkarīgi.
      en: No — BGKIS approves airspace flight, but the prohibition sign relates to other legislation (security, state secrets) and is in force independently.
      ru: Нет — BGKIS одобряет полёт в воздушном пространстве, но запретный знак относится к другому законодательству (безопасность, государственная тайна) и действует независимо.
  - id: b
    text:
      lv: Jā — BGKIS apstiprinājums atļauj gan lidojumu, gan filmēšanu.
      en: Yes — BGKIS approval authorises both the flight and filming.
      ru: Да — одобрение BGKIS разрешает как полёт, так и съёмку.
  - id: c
    text:
      lv: Jā — "Fotografēšana aizliegta" attiecas tikai uz virszemes foto, nevis uz dronu.
      en: Yes — "Photography prohibited" applies only to ground-level photos, not drones.
      ru: Да — «Съёмка запрещена» относится только к наземной съёмке, а не к дронам.
  - id: d
    text:
      lv: Jā, ja uzņemtais materiāls netiek publicēts.
      en: Yes, if the footage is not published.
      ru: Да, если запись не публикуется.
  correctOptionId: a
  explanation:
    lv: 'BGKIS atļauja ir gaisa telpas atļauja — tā regulē, vai UAS drīkst atraties konkrētā gaisa telpas sadaļā. "Fotografēšana aizliegta" zīme norāda uz atsevišķu tiesību normu — parasti valsts drošības likumu vai Kriminālkodeksa noteikumu par kritiskās infrastruktūras dokumentēšanu. Šī aizlieguma pārkāpums ir neatkarīgi no BGKIS atļaujas statusa.

      '
    en: 'A BGKIS authorisation is an airspace authorisation — it regulates whether a UAS may be in a specific airspace section. A "Photography prohibited" sign indicates a separate legal norm — usually the national security law or Criminal Code provisions on documenting critical infrastructure. Violating this prohibition is independent of the BGKIS authorisation status.

      '
    ru: 'Разрешение BGKIS — это разрешение воздушного пространства, регулирующее, может ли UAS находиться в определённом разделе воздушного пространства. Знак «Съёмка запрещена» указывает на отдельную правовую норму — обычно закон о национальной безопасности или нормы Уголовного кодекса об документировании критической инфраструктуры. Нарушение этого запрета независимо от статуса разрешения BGKIS.

      '
  distractorRationales:
    b:
      lv: BGKIS atļauja ir gaisa telpas atļauja, nevis filmēšanas atļauja. Tās ir divi dažādi tiesiskuma aspekti.
      en: BGKIS authorisation is an airspace authorisation, not a filming authorisation. These are two separate legal aspects.
      ru: Разрешение BGKIS — это разрешение воздушного пространства, а не разрешение на съёmку. Это два разных правовых аспекта.
    c:
      lv: '"Fotografēšana aizliegta" attiecas uz jebkādu dokumentēšanu — ar kameru uz zemes, no drona vai ar jebkuru citu līdzekli. Tas nav ierobežots tikai ar virszemes foto.'
      en: '"Photography prohibited" refers to any documentation — with a camera on the ground, from a drone, or by any other means. It is not restricted to ground-level photos.'
      ru: «Съёмка запрещена» относится к любой документации — наземной камерой, с дрона или любым другим способом. Это не ограничивается только наземными фотографиями.
    d:
      lv: Publicēšana ir atsevišķs GDPR jautājums. Pats uzņemšanas fakts var būt pārkāpums, ja ir aizliegts filmēt.
      en: Publishing is a separate GDPR matter. The act of filming itself may be a violation if photography is prohibited.
      ru: Публикация — отдельный вопрос GDPR. Сам факт съёмки может быть нарушением, если фотографирование запрещено.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — Latvia security legislation; GDPR Art. 6; Datu valsts inspekcija guidance
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: pr-038
  stem:
    lv: Legāls lidojums operatoram joprojām rada atsevišķu privātuma lēmumu. Kāds GDPR tiesiskais pamats ir vispiemērotākais drona uzņemšanai pilsētas sporta sacensībās komerciālam lietojumam?
    en: A legal flight still creates a separate privacy decision for the operator. What GDPR lawful basis is most appropriate for drone filming at a city sports competition for commercial use?
    ru: Законный полёт всё равно создаёт отдельное privacy-решение для оператора. Какое правовое основание GDPR наиболее подходит для коммерческой съёмки с дрона на городских спортивных соревнованиях?
  options:
  - id: a
    text:
      lv: Art. 6(1)(a) — piekrišana — katra dalībnieka individuāla piekrišana.
      en: Art. 6(1)(a) — consent — individual consent from each participant.
      ru: Ст. 6(1)(a) — согласие — индивидуальное согласие от каждого участника.
  - id: b
    text:
      lv: Art. 6(1)(f) — leģitīmās intereses ar iepriekšēju LIA un pastāvīgu informēšanu (GDPR ietvars sporta sacensībām ir leģitīmas intereses).
      en: Art. 6(1)(f) — legitimate interests with a prior LIA and prominent informing (GDPR framework for sports events is legitimate interests).
      ru: Ст. 6(1)(f) — законные интересы с предварительной оценкой LIA и видимым информированием (структура GDPR для спортивных мероприятий — законные интересы).
  - id: c
    text:
      lv: Nav vajadzīgs tiesiskais pamats — sporta sacensības ir publisks pasākums.
      en: No legal basis is needed — sports competitions are public events.
      ru: Правовое основание не требуется — спортивные соревнования являются публичным мероприятием.
  - id: d
    text:
      lv: Art. 6(1)(b) — nepieciešamība līguma izpildei.
      en: Art. 6(1)(b) — necessity for contract performance.
      ru: Ст. 6(1)(b) — необходимость для исполнения договора.
  correctOptionId: b
  explanation:
    lv: 'GDPR Art. 6(1)(f) (leģitīmās intereses) ir tipiskākais pamats komerciālai filmēšanai publiskos sporta pasākumos. Tas prasa: (1) Leģitīmo Interešu Novērtējumu (LIA) — komerciāls mērķis sver pret personu interesēm; (2) redzamu informēšanu sacensības vietā (plakāti, skaļrunis). Individuāla piekrišana katram dalībniekam nav praktiski iespējama lielā pasākumā.

      '
    en: 'GDPR Art. 6(1)(f) (legitimate interests) is the most typical basis for commercial filming at public sports events. It requires: (1) a Legitimate Interests Assessment (LIA) — commercial purpose weighed against individuals'' interests; (2) visible informing at the event venue (posters, PA system). Individual consent from each participant is not practically feasible at a large event.

      '
    ru: 'Ст. 6(1)(f) GDPR (законные интересы) является наиболее типичным основанием для коммерческой съёмки на публичных спортивных мероприятиях. Требуется: (1) Оценка законных интересов (LIA) — коммерческая цель взвешивается против интересов лиц; (2) видимое информирование на месте мероприятия (плакаты, громкоговоритель). Индивидуальное согласие каждого участника практически нецелесообразно на крупном мероприятии.

      '
  distractorRationales:
    a:
      lv: Individuāla piekrišana ikvienam dalībniekam lielā sporta pasākumā nav praktiski iespējama un ir nevajadzīga, ja leģitīmās intereses ir pienācīgi novērtētas.
      en: Individual consent from every participant at a large sports event is not practically feasible and is unnecessary if legitimate interests are properly assessed.
      ru: Индивидуальное согласие от каждого участника на крупном спортивном мероприятии практически нецелесообразно и не обязательно при правильно оценённых законных интересах.
    c:
      lv: Publisks pasākums neizslēdz GDPR piemērojamību. GDPR attiecas uz visu personas datu apstrādi, neatkarīgi no pasākuma rakstura.
      en: A public event does not exclude GDPR applicability. GDPR applies to all personal data processing, regardless of the event's public character.
      ru: Публичное мероприятие не исключает применимости GDPR. GDPR применяется ко всей обработке персональных данных независимо от публичного характера мероприятия.
    d:
      lv: Art. 6(1)(b) attiecas uz līgumattiecībās esošo pušu datu apstrādi — sporta dalībnieki nav operators līgumdarba puse.
      en: Art. 6(1)(b) applies to data processing of parties in a contractual relationship — sports participants are not a party in the operator's contract.
      ru: Ст. 6(1)(b) применяется к обработке данных сторон в договорных отношениях — участники соревнований не являются стороной договора оператора.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 6(1)(f) — legitimate interests; European Data Protection Board guidelines
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: pr-039
  stem:
    lv: Klients pieprasa materiālu, kurā var būt identificējami cilvēki vai aizsargāts īpašums. Kas ir "datu pārzinis" (data controller) GDPR izpratnē drona operācijas kontekstā?
    en: A client asks for footage that may include identifiable people or protected property. Who is the "data controller" under GDPR in the context of a drone operation?
    ru: Клиент просит материал, где могут быть идентифицируемые люди или защищённый объект. Кто является «контролёром данных» (data controller) по GDPR в контексте операции с дроном?
  options:
  - id: a
    text:
      lv: CAA Latvia kā drona lidojumu regulators.
      en: CAA Latvia as the drone flight regulator.
      ru: CAA Latvia как регулятор полётов дронов.
  - id: b
    text:
      lv: Remote pilota kompetences sertifikāta izdevējs.
      en: The issuer of the remote pilot competence certificate.
      ru: Орган, выдавший свидетельство компетентности дистанционного пилота.
  - id: c
    text:
      lv: Operators — persona vai uzņēmums, kas lemj par filmēšanas mērķiem un metodēm.
      en: The operator — the person or company that decides on the filming purposes and means.
      ru: Оператор — лицо или компания, определяющее цели и средства съёмки.
  - id: d
    text:
      lv: Drona ražotājs.
      en: The drone manufacturer.
      ru: Производитель дрона.
  correctOptionId: c
  explanation:
    lv: 'GDPR Art. 4(7) definē "pārzini" kā fizisku vai juridisku personu, kas nosaka personas datu apstrādes mērķus un līdzekļus. Drona operācijā tas ir operators — tas, kurš nolemj, KO filmēt, KĀ filmēt un KO darīt ar materiālu. Faktiskais pilots var būt datu apstrādātājs, ja operators ir atsevišķa juridiskā persona.

      '
    en: 'GDPR Art. 4(7) defines the "controller" as the natural or legal person that determines the purposes and means of processing personal data. In a drone operation this is the operator — the one who decides WHAT to film, HOW to film, and WHAT to do with the footage. The actual pilot may be a data processor if the operator is a separate legal person.

      '
    ru: 'Ст. 4(7) GDPR определяет «контролёра» как физическое или юридическое лицо, определяющее цели и средства обработки персональных данных. В операции с дроном это оператор — тот, кто решает, ЧТО снимать, КАК снимать и ЧТО делать с материалом. Фактический пилот может быть обработчиком данных, если оператор является отдельным юридическим лицом.

      '
  distractorRationales:
    a:
      lv: CAA Latvia ir regulators, kas uzrauga lidojumu atbilstību — tā nav persona, kas nosaka filmēšanas mērķus un metodes.
      en: CAA Latvia is a regulator overseeing flight compliance — it is not the person who determines filming purposes and means.
      ru: CAA Latvia — регулятор, контролирующий соответствие полётов — это не лицо, определяющее цели и средства съёмки.
    b:
      lv: Sertifikāta izdevējs (CAA) apliecina pilota kompetenci, bet nenosaka personas datu apstrādes mērķus operācijā.
      en: The certificate issuer (CAA) certifies pilot competence but does not determine personal data processing purposes in an operation.
      ru: Орган, выдавший сертификат (CAA), удостоверяет компетентность пилота, но не определяет цели обработки персональных данных в операции.
    d:
      lv: Ražotājs izstrādā dronu, bet nenosaka, ko, kā un kāpēc konkrēts operators filmē.
      en: The manufacturer builds the drone but does not determine what, how, and why a specific operator films.
      ru: Производитель строит дрон, но не определяет, что, как и почему конкретный оператор снимает.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 4(7) — data controller definition
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: pr-040
  stem:
    lv: Komerciāls operators filmē apdzīvotu pilsētas teritoriju, bet Art. 30 apstrādes darbību reģistrā šī operācija nav iekļauta. Vai tā ir problēma?
    en: A commercial operator films a populated urban area, but the Article 30 processing register does not include this operation. Is that a compliance problem?
    ru: Коммерческий оператор снимает населённую городскую зону, но в реестре операций обработки по Art. 30 эта операция не указана. Это проблема соответствия?
  options:
  - id: a
    text:
      lv: Tikai tad, ja operators pārsniedz 5000 EUR apgrozījumu gadā.
      en: Only if the operator exceeds €5,000 turnover per year.
      ru: Только если оборот оператора превышает 5 000 EUR в год.
  - id: b
    text:
      lv: Nē — Art. 30 attiecas tikai uz lieluzņēmumiem ar > 250 darbiniekiem.
      en: No — Art. 30 applies only to large companies with > 250 employees.
      ru: Нет — ст. 30 применяется только к крупным компаниям с более чем 250 сотрудниками.
  - id: c
    text:
      lv: Nē — drona filmēšana ir atbrīvota no Art. 30 prasībām.
      en: No — drone filming is exempt from Art. 30 requirements.
      ru: Нет — съёмка с дрона освобождена от требований ст. 30.
  - id: d
    text:
      lv: Jā — komerciālam operatoram jāuztur apstrādes darbību reģistrs, iekļaujot drona filmēšanas operācijas ar personas datiem.
      en: Yes — a commercial operator must maintain a register of processing activities, including drone filming operations involving personal data.
      ru: Да — коммерческий оператор обязан вести реестр операций обработки, включая съёмку с дрона с участием персональных данных.
  correctOptionId: d
  explanation:
    lv: 'GDPR Art. 30 prasa, lai pārziņi uzturētu apstrādes darbību reģistru. Izņēmums (< 250 darbinieki) ir ierobežots — tas neattiecas, ja apstrāde var radīt risku personu tiesībām un brīvībām. Cilvēku filmēšana pilsētā ir riskanta apstrāde, kas izslēdz izņēmumu. Komerciāls operators parasti arī pārsniedz 250 darbinieku slieksni vai nebauda izņēmumu.

      '
    en: 'GDPR Art. 30 requires controllers to maintain a register of processing activities. The exception (< 250 employees) is limited — it does not apply if the processing is likely to result in risk to individuals'' rights and freedoms. Filming people in a city is risky processing that excludes the exception. A commercial operator typically also exceeds the 250 employee threshold or does not benefit from the exception.

      '
    ru: 'Ст. 30 GDPR требует от контролёров вести реестр операций обработки. Исключение (< 250 сотрудников) ограничено — оно не применяется, если обработка может представлять риск для прав и свобод лиц. Съёмка людей в городе является рискованной обработкой, исключающей это исключение. Коммерческий оператор обычно также превышает порог в 250 сотрудников или не пользуется исключением.

      '
  distractorRationales:
    a:
      lv: GDPR prasības nebalstās uz apgrozījuma slieksni. Tās balstās uz personas datu apstrādes faktu un tā riskiem.
      en: GDPR requirements are not based on a turnover threshold. They are based on the fact of personal data processing and its risks.
      ru: Требования GDPR не основаны на пороге оборота. Они основаны на факте обработки персональных данных и связанных с ней рисках.
    b:
      lv: 250 darbinieku izņēmums tieši nesedz apstrādes operācijas, kas rada risku. Filmēšana apdzīvotos rajonos ir riska operācija.
      en: The 250 employee exception does not cover processing operations that pose a risk. Filming in populated areas is a risk operation.
      ru: Исключение для 250 сотрудников не распространяется на операции обработки, создающие риск. Съёмка в населённых районах является рискованной операцией.
    c:
      lv: Drona filmēšana nav atbrīvota no Art. 30. Tā ir personas datu apstrāde, kurai piemērojamas GDPR prasības.
      en: Drone filming is not exempt from Art. 30. It is personal data processing subject to GDPR requirements.
      ru: Съёмка с дрона не освобождена от ст. 30. Это обработка персональных данных, на которую распространяются требования GDPR.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — GDPR Art. 30 — records of processing activities
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
