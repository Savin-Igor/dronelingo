- id: met-001
  stem:
    lv: Ko nozīmē METAR vēja ziņojums "27012G22KT"?
    en: What does the METAR wind report "27012G22KT" mean?
    ru: Что означает ветровой раздел METAR «27012G22KT»?
  options:
    - id: a
      text:
        lv: Vējš no 270° ar vidējo ātrumu 12 mezgli un brāzmām līdz 22 mezgliem.
        en: Wind from 270° at mean speed 12 knots, gusting to 22 knots.
        ru: Ветер с 270° со средней скоростью 12 узлов, порывы до 22 узлов.
    - id: b
      text:
        lv: Vējš no 270° ar vidējo ātrumu 22 mezgli un brāzmām 12 mezgļi.
        en: Wind from 270° at mean speed 22 knots, gusting to 12 knots.
        ru: Ветер с 270° со средней скоростью 22 узла, порывы до 12 узлов.
    - id: c
      text:
        lv: Vējš no 120° ar ātrumu 27 mezgli.
        en: Wind from 120° at 27 knots.
        ru: Ветер со 120° со скоростью 27 узлов.
    - id: d
      text:
        lv: Vēja attālums 2712 metru virzienā ar brāzmām 22 KT.
        en: Wind distance 2712 m in direction with gusts of 22 KT.
        ru: Ветровое расстояние 2712 м в направлении с порывами 22 KT.
  correctOptionId: a
  explanation:
    lv: |
      METAR vēja formāts: [virziens 3 cipari]°[vidējais ātrums 2–3 cipari]G[brāzmas]KT. 27012G22KT: 270° (rietumi), vidējais ātrums 12 mezgļi, brāzmas līdz 22 mezgliem.
    en: |
      METAR wind format: [direction 3 digits]°[mean speed 2-3 digits]G[gusts]KT. 27012G22KT: 270° (west), mean 12 knots, gusting to 22 knots.
    ru: |
      Формат ветра METAR: [направление 3 цифры]°[средняя скорость 2-3 цифры]G[порывы]KT. 27012G22KT: 270° (запад), средняя 12 узлов, порывы до 22 узлов.
  distractorRationales:
    b:
      lv: G nozīmē brāzmas — tas seko pēc vidējā ātruma. Brāzmas vienmēr ir augstākas par vidējo ātrumu.
      en: G stands for gusts — it follows the mean speed. Gusts are always higher than mean speed.
      ru: G означает порывы — следует после средней скорости. Порывы всегда выше средней скорости.
    c:
      lv: 270 ir vēja virziens (grādos no ziemeļiem pulksteņa rādītāja virzienā), nevis attālums.
      en: 270 is the wind direction (degrees clockwise from north), not distance.
      ru: 270 — это направление ветра (градусы по часовой стрелке от севера), а не расстояние.
    d:
      lv: METAR nesatur "attāluma" laukus. 270 ir virziens grādos, 12 ir ātrums mezglos, 22 ir brāzmu ātrums mezglos.
      en: METAR does not contain "distance" fields. 270 is direction in degrees, 12 is speed in knots, 22 is gust speed in knots.
      ru: METAR не содержит поля «расстояния». 270 — направление в градусах, 12 — скорость в узлах, 22 — скорость порывов в узлах.
  sourceRef: "ICAO Annex 3 — Meteorological Service for International Air Navigation | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; METAR format"
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — Meteorological Service for International Air Navigation; METAR format
- id: met-002
  stem:
    lv: Tavs drons ir novērtēts 10 m/s. METAR rāda 09008G18KT. Vai drīkst lidot?
    en: Your drone is rated at 10 m/s. METAR shows 09008G18KT. Is flight permitted?
    ru: Твой дрон рассчитан на 10 м/с. METAR показывает 09008G18KT. Разрешён ли полёт?
  options:
    - id: a
      text:
        lv: Jā — vidējais vējš (8 KT = 4,1 m/s) ir labi robežās.
        en: Yes — the mean wind (8 KT = 4.1 m/s) is well within limits.
        ru: Да — средний ветер (8 KT = 4,1 м/с) значительно в пределах нормы.
    - id: b
      text:
        lv: Nē — 18 KT ≈ 9,3 m/s pārsniedz 10 m/s limitu.
        en: No — 18 KT ≈ 9.3 m/s exceeds the 10 m/s limit.
        ru: Нет — 18 KT ≈ 9,3 м/с превышает предел 10 м/с.
    - id: c
      text:
        lv: Jā, ja lidojums ir zem 50 m augstuma.
        en: Yes if the flight stays below 50 m altitude.
        ru: Да, если полёт остаётся ниже 50 м.
    - id: d
      text:
        lv: Nē — brāzmas (18 KT ≈ 9,3 m/s) tuvojas 10 m/s limitam; drošāk atlikt.
        en: No — the gusts (18 KT ≈ 9.3 m/s) approach the 10 m/s limit; safer to postpone.
        ru: Нет — порывы (18 KT ≈ 9,3 м/с) приближаются к пределу 10 м/с; безопаснее отложить.
  correctOptionId: b
  explanation:
    lv: |
      18 KT × 0,514 ≈ 9,3 m/s. Tas NAV pārsniedzis 10 m/s limitu matemātiski, bet brāzmas ir pīķa slodzes, kas dronu spēj radikāli destabilizēt pat pie 9,3 m/s. Atbilde b ir piesardzīga (nenovērtē pīķus ienākošo slodžu dēļ), bet d ir precīzāka — 9,3 m/s ir ļoti tuvu 10 m/s, un jebkura papildu brāzma var pārsniegt. Pareizā atbilde ir d — 9,3 m/s ir nepieļaujami tuvu limitam.
    en: |
      18 KT × 0.514 ≈ 9.3 m/s. This does NOT technically exceed the 10 m/s limit, but at 9.3 m/s the drone is operating extremely close to its rated maximum. Any additional gust spike can exceed the limit. The safest answer is d — operating at 93% of the rated maximum in gusty conditions is not safe practice.
    ru: |
      18 KT × 0,514 ≈ 9,3 м/с. Технически это НЕ превышает предел 10 м/с, но при 9,3 м/с дрон работает крайне близко к расчётному максимуму. Любой дополнительный пик порыва может его превысить. Правильный ответ d — работа при 93% расчётного максимума в порывистых условиях не считается безопасной практикой.
  distractorRationales:
    a:
      lv: Vidējais vējš nenorāda pīķa slodzes — brāzmas ir pīķi. Pie 9,3 m/s brāzmām tuvumā pie 10 m/s limita drona vadāmības rezerve ir minimāla.
      en: Mean wind does not indicate peak loads — gusts are the peaks. At 9.3 m/s gusts close to the 10 m/s limit the drone's control margin is minimal.
      ru: Средний ветер не определяет пиковые нагрузки — порывы это и есть пики. При порывах 9,3 м/с близко к пределу 10 м/с запас управляемости дрона минимален.
    c:
      lv: Augstums nemaina brāzmu slodzi. Gust novērtējums attiecas uz visu darbības diapazonu, ne tikai augstu augstumu.
      en: Altitude does not change the gust load. The gust rating applies to the full operating range, not only high altitudes.
      ru: Высота не изменяет нагрузку от порывов. Расчёт порывов применяется ко всему рабочему диапазону, а не только к большим высотам.
    d:
      lv: Piesardzīgi pareizs — brāzmas 9,3 m/s ir bīstami tuvas 10 m/s maksimumam. Tomēr atbilde d ir precīzāka par to, ka 9,3 m/s ir pārāk tuvu.
      en: Cautiously correct — 9.3 m/s gusts are dangerously close to the 10 m/s maximum. However answer d is more precise that 9.3 m/s is too close.
      ru: "Осторожно правильно — порывы 9,3 м/с опасно близко к максимуму 10 м/с. Однако ответ d точнее: 9,3 м/с слишком близко."
  sourceRef: "EASA Easy Access Rules — AMC1 UAS.OPEN.030 | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; manufacturer wind rating standards"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; manufacturer wind rating standards
- id: met-003
  stem:
    lv: Kāds ir kumulonimba (Cb) mazākais drošais attālums UAS lidojumam?
    en: What is the minimum safe distance from a cumulonimbus (Cb) for UAS operations?
    ru: Каково минимальное безопасное расстояние от кучево-дождевого (Cb) для полётов UAS?
  options:
    - id: a
      text:
        lv: 1 km.
        en: 1 km.
        ru: 1 км.
    - id: b
      text:
        lv: 5 km.
        en: 5 km.
        ru: 5 км.
    - id: c
      text:
        lv: 10 km.
        en: 10 km.
        ru: 10 км.
    - id: d
      text:
        lv: 20 km.
        en: 20 km.
        ru: 20 км.
  correctOptionId: c
  explanation:
    lv: |
      Minimālais ieteicamais attālums no aktīva kumulonimba ir 10 km. Zibens izlādes diapazons, stipra turbulence un lielgabarīta krusu risks pastāv ievērojami tālu ārpus redzamā mākoņa robežas. 10 km ir minimums — jo tāk, jo drošāk.
    en: |
      The minimum recommended distance from an active cumulonimbus is 10 km. Lightning discharge range, severe turbulence, and large hail risk extend significantly beyond the visible cloud boundary. 10 km is the minimum — further is always safer.
    ru: |
      Минимальное рекомендуемое расстояние от активного кучево-дождевого — 10 км. Радиус молниевого разряда, сильная турбулентность и риск крупного града распространяются значительно за пределы видимых границ облака. 10 км — минимум, дальше — безопаснее.
  distractorRationales:
    a:
      lv: 1 km atrodas tieši kumulonimba bīstamākajā zonā — turbulence, brāzmas un zibens var skart UAS.
      en: 1 km is directly in the most dangerous zone of a cumulonimbus — turbulence, gusts, and lightning can reach the UAS.
      ru: 1 км — прямо в самой опасной зоне кучево-дождевого. Турбулентность, порывы и молния могут поразить UAS.
    b:
      lv: 5 km nav pietiekams — zibens un stipra turbulence var sasniegt UAS šajā attālumā no Cb.
      en: 5 km is not sufficient — lightning and severe turbulence can reach the UAS at this distance from Cb.
      ru: 5 км недостаточно — молния и сильная турбулентность могут достичь UAS на этом расстоянии.
    d:
      lv: 20 km ir vēl drošāk, bet 10 km ir atzītais minimums. 20 km nav operatīvi obligāts.
      en: 20 km is even safer, but 10 km is the recognised minimum. 20 km is not operationally required.
      ru: 20 км ещё безопаснее, но 10 км — признанный минимум. 20 км оперативно не требуется.
  sourceRef: "ICAO Doc 8896 — Manual of Aeronautical Meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; A2 syllabus meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a2-apakskategorijas-teoretisko-zinasanu-eksamens/"
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Doc 8896 — Manual of Aeronautical Meteorology; A2 syllabus meteorology
- id: met-004
  stem:
    lv: Kādā apstākļu kombinācijā veidojas propelleru apledojums?
    en: Under which combination of conditions does propeller icing form?
    ru: При каком сочетании условий формируется обледенение пропеллеров?
  options:
    - id: a
      text:
        lv: Temperatūra +20°C, augsts mitrums.
        en: Temperature +20°C, high humidity.
        ru: Температура +20°C, высокая влажность.
    - id: b
      text:
        lv: Temperatūra -5°C, sauss skaidrs gaiss.
        en: Temperature -5°C, dry clear air.
        ru: Температура -5°C, сухой чистый воздух.
    - id: c
      text:
        lv: Temperatūra +10°C, viegls lietus.
        en: Temperature +10°C, light rain.
        ru: Температура +10°C, лёгкий дождь.
    - id: d
      text:
        lv: Temperatūra +2°C, lidojums caur mākoni vai saldējoša migla.
        en: Temperature +2°C, flying through cloud or freezing drizzle.
        ru: Температура +2°C, полёт через облако или ледяная морось.
  correctOptionId: d
  explanation:
    lv: |
      Apledojums prasa divus vienlaicīgus apstākļus: temperatūru tuvu vai zem 0°C UN redzamu mitrumu (mākoņu pilieni, saldējoša migla). +2°C mākonī pārsaldēti ūdens pilieni sasalst kontaktā ar propellera virsmu.
    en: |
      Icing requires two simultaneous conditions: temperature near or below 0°C AND visible moisture (cloud droplets, freezing drizzle). At +2°C in cloud, supercooled water droplets freeze on contact with the propeller surface.
    ru: |
      Обледенение требует двух одновременных условий: температуры около или ниже 0°C И видимой влаги (капли облака, ледяная морось). При +2°C в облаке переохлаждённые капли воды замерзают при контакте с поверхностью пропеллера.
  distractorRationales:
    a:
      lv: +20°C ūdens ir šķidrs un nevar sasalt uz propellera virsmām.
      en: At +20°C water is liquid and cannot freeze on propeller surfaces.
      ru: При +20°C вода жидкая и не может замерзать на поверхностях пропеллеров.
    b:
      lv: Auksta temperatūra vien nav pietiekama — apledojumam nepieciešami pārsaldēti ūdens pilieni (redzams mitrums). Sausam gaisam pie -5°C šādu pilienu nav.
      en: Cold temperature alone is not sufficient — icing requires supercooled water droplets (visible moisture). Dry air at -5°C contains no such droplets.
      ru: Только холодная температура недостаточна — для обледенения нужны переохлаждённые капли (видимая влага). Сухой воздух при -5°C их не содержит.
    c:
      lv: +10°C ūdens paliek šķidrs — lietus nogulsnējas uz propelleriem, bet nesasalst.
      en: At +10°C water remains liquid — rain deposits on propellers but does not freeze.
      ru: При +10°C вода остаётся жидкой — дождь осаждается на пропеллерах, но не замерзает.
  sourceRef: "ICAO Doc 8896 — aeronautical meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; A2 syllabus icing conditions | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a2-apakskategorijas-teoretisko-zinasanu-eksamens/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Doc 8896 — aeronautical meteorology; A2 syllabus icing conditions
- id: met-005
  stem:
    lv: Ko nozīmē TAF prognoze ar "TEMPO 1012/1014 29018G28KT"?
    en: What does a TAF forecast of "TEMPO 1012/1014 29018G28KT" mean?
    ru: Что означает прогноз TAF «TEMPO 1012/1014 29018G28KT»?
  options:
    - id: a
      text:
        lv: "Pagaidu apstākļi: vējš no 290° ar 18 mezgliem un brāzmām 28 mezgļi, kas ilgst starp 12:00–14:00 UTC."
        en: "Temporary conditions: wind from 290° at 18 knots, gusting 28 knots, occurring between 12:00–14:00 UTC."
        ru: "Временны́е условия: ветер с 290° 18 узлов, порывы 28 узлов, в период 12:00–14:00 UTC."
    - id: b
      text:
        lv: Pastāvīgs vējš 29018 mezgļi no 10. līdz 14. datumam.
        en: Permanent wind 29018 knots from the 10th to the 14th.
        ru: Постоянный ветер 29018 узлов с 10-го по 14-е.
    - id: c
      text:
        lv: Vēja izmaiņas uz 290° no 10:12 līdz 10:14 pēcpusdienas vietējā laikā.
        en: Wind change to 290° from 10:12 to 10:14 afternoon local time.
        ru: Изменение ветра до 290° с 10:12 до 10:14 после полудня местного времени.
    - id: d
      text:
        lv: Mainīgi vēji starp 290° un 180° ar ātrumu 28 mezgļi.
        en: Variable wind between 290° and 180° at 28 knots.
        ru: Переменный ветер между 290° и 180° со скоростью 28 узлов.
  correctOptionId: a
  explanation:
    lv: |
      TEMPO nozīmē pagaidu apstākļi — īslaicīgi apstākļi, kas ir gaidāmi, bet neturpinās vairāk kā pusi no norādītā perioda. 1012/1014 ir laika logs: 10. datuma 12:00 UTC līdz 10. datuma 14:00 UTC. 29018G28KT: vējš no 290° ar 18 mezgliem un brāzmām 28 mezgļi.
    en: |
      TEMPO means temporary conditions — conditions expected to occur but last less than half of the indicated period. 1012/1014 is the time window: 10th 12:00 UTC to 10th 14:00 UTC. 29018G28KT: wind from 290° at 18 knots, gusting 28 knots.
    ru: |
      TEMPO означает временны́е условия — условия, которые ожидаются, но продолжаются менее половины указанного периода. 1012/1014 — временно́е окно: 10-е 12:00 UTC до 10-е 14:00 UTC. 29018G28KT: ветер с 290° 18 узлов, порывы 28 узлов.
  distractorRationales:
    b:
      lv: TEMPO nenorāda pastāvīgus apstākļus — tā ir pagaidu parādība. Skaitlis arī nav interpretējams kā vēja ātrums.
      en: TEMPO indicates temporary, not permanent, conditions. The numbers also cannot be read as continuous wind speed.
      ru: TEMPO означает временны́е, а не постоянные условия. Числа также нельзя читать как непрерывную скорость ветра.
    c:
      lv: DDHH/DDHH formāts TAF ir dienas (DD) un stundas (HH) UTC, nevis minūtes vai vietējais laiks.
      en: The DDHH/DDHH format in TAF is day (DD) and hour (HH) UTC, not minutes or local time.
      ru: Формат DDHH/DDHH в TAF — день (DD) и час (HH) UTC, а не минуты или местное время.
    d:
      lv: 29018G28KT ir fiksēts vēja virziens (290°) ar ātrumu un brāzmām — nevis mainīgs starp diviem virzieniem.
      en: 29018G28KT is a fixed wind direction (290°) with speed and gusts — not variable between two directions.
      ru: 29018G28KT — фиксированное направление ветра (290°) со скоростью и порывами, а не переменное между двумя направлениями.
  sourceRef: "ICAO Annex 3 — TAF format | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; EASA meteorology module"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — TAF format; EASA meteorology module
- id: met-006
  stem:
    lv: Pilotam ir lidojums plānots pulksten 11:00. METAR parāda apstākļus robežās. TAF rāda TEMPO starp 10:00 un 12:00 ar brāzmām, kas pārsniedz drona limitu. Kāda ir pareizā darbība?
    en: A pilot has a flight planned at 11:00. METAR shows conditions within limits. TAF shows TEMPO between 10:00 and 12:00 with gusts exceeding the drone's limit. What is the correct action?
    ru: Пилот планирует полёт на 11:00. METAR показывает условия в пределах. TAF показывает TEMPO между 10:00 и 12:00 с порывами, превышающими предел дрона. Правильное действие?
  options:
    - id: a
      text:
        lv: Lidot — pašreizējais METAR ir galvenais avots, TAF ir tikai prognoze.
        en: Fly — the current METAR is the primary source, TAF is only a forecast.
        ru: Лететь — текущий METAR является основным источником, TAF — только прогноз.
    - id: b
      text:
        lv: Pārcelt lidojumu uz laiku pēc 12:00 UTC, pārbaudot METAR apstiprinājumu.
        en: Reschedule to after 12:00 UTC, confirming with METAR at that time.
        ru: Перенести на после 12:00 UTC, подтвердив METAR в это время.
    - id: c
      text:
        lv: Lidot — TEMPO ir īss un iespējams nenotiks.
        en: Fly — TEMPO is brief and may not occur.
        ru: Лететь — TEMPO кратковременное и может не произойти.
    - id: d
      text:
        lv: Lidot zem 30 m augstuma, kur vējš parasti ir mazāks.
        en: Fly below 30 m altitude where wind is typically lower.
        ru: Лететь ниже 30 м, где ветер обычно слабее.
  correctOptionId: b
  explanation:
    lv: |
      TEMPO norāda uz īslaicīgiem apstākļiem, kas var rasties norādītajā periodā. Ja šajā periodā prognozētās brāzmas pārsniedz drona limitu un pārklājas ar tavu lidojuma logu, drošā rīcība ir pārcelt lidojumu un pēc tam pārbaudīt svaigu METAR.
    en: |
      TEMPO indicates temporary conditions that may occur during the stated period. If those forecast gusts exceed the drone limit and overlap the planned flight window, the safe decision is to postpone and confirm improvement with a fresh METAR before launch.
    ru: |
      TEMPO указывает на временные условия, которые могут возникать в указанный период. Если такие порывы превышают предел дрона и попадают в твоё окно полёта, безопасное решение — перенести вылет и перед запуском подтвердить улучшение свежим METAR.
  distractorRationales:
    a:
      lv: METAR rāda pašreizējos apstākļus; TAF prognozē nākotnes apstākļus. Abi jālasa. TEMPO prognoze plānotā logā ir derīgs drošības apsvērums.
      en: METAR shows current conditions; TAF forecasts future conditions. Both must be read. A TEMPO forecast within the planned window is a valid safety consideration.
      ru: METAR показывает текущие условия; TAF прогнозирует будущие. Оба нужно читать. TEMPO в плановом окне — обоснованное соображение безопасности.
    c:
      lv: TEMPO prognozes nav "iespēja" — tās norāda apstākļus, kas notiks. "Iespējams nenotiks" nav derīgs drošības arguments.
      en: Even a temporary TEMPO period matters if it overlaps the flight window and contains conditions above the drone limit.
      ru: Даже временный период TEMPO важен, если он попадает в окно полёта и содержит условия выше пределов дрона.
    d:
      lv: Vēja ātruma limiti attiecas uz visu darbības augstumu diapazonu, ne tikai augstu augstumu. Lidojums zem 30 m nelikvidē TAF TEMPO apstākļus.
      en: Wind speed limits apply to the full operating altitude range, not only high altitudes. Flying below 30 m does not negate the TAF TEMPO conditions.
      ru: Ветровые пределы применяются ко всему рабочему диапазону высот. Полёт ниже 30 м не устраняет условия TEMPO по TAF.
  sourceRef: "EASA Easy Access Rules — AMC1 UAS.OPEN.030 | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; TAF interpretation"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; TAF interpretation
- id: met-007
  stem:
    lv: Ko nozīmē "blīvuma augstums" drona lidojuma kontekstā?
    en: What does "density altitude" mean in the context of drone flight?
    ru: Что означает «плотностная высота» в контексте полёта дрона?
  options:
    - id: a
      text:
        lv: Faktiskais lidojuma augstums pār jūras līmeni.
        en: The actual flight altitude above sea level.
        ru: Фактическая высота полёта над уровнем моря.
    - id: b
      text:
        lv: Attālums no zemes, kuru drons var droši pārsniegt.
        en: The distance from the ground that the drone can safely exceed.
        ru: Расстояние от земли, которое дрон может безопасно превысить.
    - id: c
      text:
        lv: Gaisa blīvuma novērtējums, kas atspoguļo temperatūras, spiediena un mitruma ietekmi uz drona veiktspēju.
        en: An air density measure reflecting the effect of temperature, pressure, and humidity on drone performance.
        ru: Показатель плотности воздуха, отражающий влияние температуры, давления и влажности на характеристики дрона.
    - id: d
      text:
        lv: Minimālā drošā lidojuma augstums virs apdzīvotām zonām.
        en: The minimum safe flight altitude above populated areas.
        ru: Минимальная безопасная высота полёта над населёнными районами.
  correctOptionId: c
  explanation:
    lv: |
      Blīvuma augstums apvieno temperatūru, atmosfēras spiedienu un mitrumu, lai atspoguļotu efektīvo gaisa blīvumu, kurā drons darbojas. Augsts blīvuma augstums (karsts, zems spiediens) nozīmē mazāku gaisa blīvumu, mazāk pacēluma katrā propellera apgriezienā, lielāku baterijas patēriņu un samazinātu vēja pretestību.
    en: |
      Density altitude combines temperature, atmospheric pressure, and humidity to express the effective air density in which the drone is operating. High density altitude (hot, low pressure) means less dense air, less lift per propeller revolution, more battery consumption, and reduced wind resistance.
    ru: |
      Плотностная высота объединяет температуру, атмосферное давление и влажность для выражения эффективной плотности воздуха, в которой работает дрон. Высокая плотностная высота (жара, низкое давление) означает менее плотный воздух, меньше подъёмной силы на оборот, больше расхода аккумулятора и сниженную ветровую нагрузку.
  distractorRationales:
    a:
      lv: Augstums virs jūras līmeņa ir ģeogrāfisks fakts; blīvuma augstums ir fizisks gaisa blīvuma mērījums, kuru ietekmē arī temperatūra un spiediens.
      en: Altitude above sea level is a geographic fact; density altitude is a physical air density measure also influenced by temperature and pressure.
      ru: Высота над уровнем моря — географический факт; плотностная высота — физический показатель плотности воздуха, зависящий также от температуры и давления.
    b:
      lv: Drona maksimālais augstums ir noteikts regulā (120 m AGL Atvērtajā kategorijā); blīvuma augstums ir veiktspējas jēdziens, kas nav saistīts ar juridiskajiem augstuma limitiem.
      en: The drone's maximum altitude is set by regulation (120 m AGL in Open category); density altitude is a performance concept unrelated to legal altitude limits.
      ru: Максимальная высота дрона установлена правилами (120 м AGL в Открытой категории); плотностная высота — концепция характеристик, не связанная с юридическими пределами.
    d:
      lv: Minimālie augstumi virs apdzīvotām zonām ir tiesisks ierobežojums; blīvuma augstums ir meteoroloģisks veiktspējas faktors.
      en: Minimum altitudes above populated areas are a legal restriction; density altitude is a meteorological performance factor.
      ru: Минимальные высоты над населёнными районами — правовое ограничение; плотностная высота — метеорологический фактор характеристик.
  sourceRef: "EASA Easy Access Rules — AMC1 UAS.OPEN.030 | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; A2 syllabus meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a2-apakskategorijas-teoretisko-zinasanu-eksamens/"
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; A2 syllabus meteorology
- id: met-008
  stem:
    lv: Cik stundu intervālos parasti tiek publicēts TAF?
    en: At what time intervals is a TAF typically published?
    ru: С какой периодичностью обычно публикуется TAF?
  options:
    - id: a
      text:
        lv: Ik 30 minūtes — tāpat kā METAR.
        en: Every 30 minutes — the same as METAR.
        ru: Каждые 30 минут — так же как METAR.
    - id: b
      text:
        lv: Ik 3 stundas.
        en: Every 3 hours.
        ru: Каждые 3 часа.
    - id: c
      text:
        lv: Vienu reizi dienā.
        en: Once a day.
        ru: Раз в сутки.
    - id: d
      text:
        lv: Ik 6 stundas (0000, 0600, 1200, 1800 UTC).
        en: Every 6 hours (0000, 0600, 1200, 1800 UTC).
        ru: Каждые 6 часов (0000, 0600, 1200, 1800 UTC).
  correctOptionId: d
  explanation:
    lv: |
      TAF prognozes tiek publicētas četras reizes dienā UTC laika 0000, 0600, 1200 un 1800. Katra prognoze aptver 24–30 stundas. METAR tiek publicēts biežāk — parasti ik 30 vai 60 minūtes.
    en: |
      TAF forecasts are published four times per day at 0000, 0600, 1200, and 1800 UTC. Each forecast covers 24–30 hours. METAR is issued more frequently — typically every 30 or 60 minutes.
    ru: |
      Прогнозы TAF публикуются четыре раза в сутки в 0000, 0600, 1200 и 1800 UTC. Каждый прогноз охватывает 24–30 часов. METAR выпускается чаще — обычно каждые 30 или 60 минут.
  distractorRationales:
    a:
      lv: METAR tiek publicēts ik 30–60 minūtes; TAF ir 6 stundu intervālos.
      en: METAR is published every 30–60 minutes; TAF is on 6-hour intervals.
      ru: METAR публикуется каждые 30–60 минут; TAF — с 6-часовыми интервалами.
    b:
      lv: 3 stundu intervāls ir SIGMET (nozīmīgu meteoroloģisko apstākļu informācija) publicēšanas biežums, nevis TAF.
      en: The 3-hour interval is the SIGMET (Significant Meteorological Information) update frequency, not TAF.
      ru: 3-часовой интервал — частота обновления SIGMET (сигнификантная метеорологическая информация), а не TAF.
    c:
      lv: Viena TAF dienā nenodrošinātu pietiekamu precizitāti laika apstākļu prognozēšanai aviācijai — tiek publicēts četras reizes dienā.
      en: One TAF per day would not provide sufficient precision for aviation weather forecasting — it is published four times per day.
      ru: Один TAF в сутки не обеспечил бы достаточной точности авиационного прогноза — публикуется четыре раза в сутки.
  sourceRef: "ICAO Annex 3 — Meteorological Service for International Air Navigation | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; TAF issuance"
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — Meteorological Service for International Air Navigation; TAF issuance
- id: met-009
  stem:
    lv: Pilots METAR lasa "CAVOK". Ko tas nozīmē?
    en: A pilot reads "CAVOK" in a METAR. What does it mean?
    ru: Пилот читает «CAVOK» в METAR. Что это означает?
  options:
    - id: a
      text:
        lv: Mākļu zem 5000 pēdām nav, redzamība ≥ 10 km, nav nozīmīgu laika apstākļu apdraudējumu.
        en: No cloud below 5,000 ft, visibility ≥ 10 km, no significant weather hazards.
        ru: Нет облаков ниже 5000 футов, видимость ≥ 10 км, нет значительных погодных угроз.
    - id: b
      text:
        lv: Redzamība ir zem 1500 m.
        en: Visibility is below 1500 m.
        ru: Видимость ниже 1500 м.
    - id: c
      text:
        lv: Kumulonimbs tuvumā.
        en: Cumulonimbus nearby.
        ru: Кучево-дождевое поблизости.
    - id: d
      text:
        lv: Celiņu un redzamību pārbauda — pagaidu ierobežojums lidostā.
        en: Runway and visibility check — temporary restriction at airport.
        ru: Проверка взлётной полосы и видимости — временное ограничение в аэропорту.
  correctOptionId: a
  explanation:
    lv: |
      CAVOK (Ceiling And Visibility OK) nozīmē: redzamība ≥ 10 km, nav mākoņu zem 5000 pēdām (1500 m) vai zemāk par augstāko minimālo sektoru augstumu, un nav nozīmīgu laika apstākļu fenomenu. Lidotājiem tas ir labs laiks.
    en: |
      CAVOK (Ceiling And Visibility OK) means: visibility ≥ 10 km, no cloud below 5,000 ft (1,500 m) or below the highest minimum sector altitude, and no significant weather phenomena. For pilots this represents excellent conditions.
    ru: |
      CAVOK (Ceiling And Visibility OK) означает: видимость ≥ 10 км, нет облаков ниже 5000 футов (1500 м) или ниже минимальной высоты сектора, нет значительных метеорологических явлений. Для пилотов это отличные условия.
  distractorRationales:
    b:
      lv: Zema redzamība METAR tiek ziņota kā skaitliska vērtība metros vai kilometros — ne CAVOK, kas apzīmē labus apstākļus.
      en: Low visibility is reported in METAR as a numeric value in metres or kilometres — not CAVOK, which denotes good conditions.
      ru: Низкая видимость в METAR указывается числовым значением в метрах или километрах, а не CAVOK, который означает хорошие условия.
    c:
      lv: Kumulonimbs METAR tiek ziņots kā CB mākoņu veids (piem., FEW020CB). CAVOK nozīmē labus apstākļus — bez nozīmīgu laika apstākļu draudiem.
      en: Cumulonimbus in METAR is reported as CB cloud type (e.g. FEW020CB). CAVOK means good conditions — no significant weather hazards.
      ru: Кучево-дождевое в METAR сообщается как тип облаков CB (например, FEW020CB). CAVOK означает хорошие условия без значительных угроз.
    d:
      lv: CAVOK nav saistīts ar lidostas darbības ierobežojumiem. Tas ir standartizēts starptautisks kods labiem laika apstākļiem METAR.
      en: CAVOK is not related to airport operational restrictions. It is a standardised international code for good weather conditions in METAR.
      ru: CAVOK не связан с ограничениями работы аэропорта. Это стандартизированный международный код хороших условий в METAR.
  sourceRef: "ICAO Annex 3 — METAR | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; CAVOK definition"
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — METAR; CAVOK definition
- id: met-010
  stem:
    lv: Ar cik km skaita Latvijā minimālo redzamību praktiskai VLOS operācijai?
    en: What is the practical minimum visibility in km for VLOS operations in Latvia?
    ru: Какова практическая минимальная видимость в км для операций VLOS в Латвии?
  options:
    - id: a
      text:
        lv: 500 m.
        en: 500 m.
        ru: 500 м.
    - id: b
      text:
        lv: 3 km — lai uzturētu nepārtrauktu VLOS plānotajā maksimālajā attālumā.
        en: 3 km — to maintain continuous VLOS at the planned maximum range.
        ru: 3 км — для поддержания непрерывного VLOS на планируемой максимальной дистанции.
    - id: c
      text:
        lv: 1 km.
        en: 1 km.
        ru: 1 км.
    - id: d
      text:
        lv: 10 km.
        en: 10 km.
        ru: 10 км.
  correctOptionId: b
  explanation:
    lv: |
      VLOS prasība ir funkcionāla: pilots spēj nepārtraukti un neapbruņotu aci noteikt UAS pozīciju, attieksmi un virzienu. Praksē 3 km redzamība ir praktiskais minimums jebkurai jēgpilnai VLOS operācijai. Pie zemākas redzamības VLOS prasību var nebūt iespējams izpildīt pat mazos attālumos.
    en: |
      The VLOS requirement is functional: the pilot can continuously and unaided determine the UAS position, attitude, and direction. In practice, 3 km visibility is the practical minimum for any meaningful VLOS operation. Below this VLOS may not be achievable even at short ranges.
    ru: |
      Требование VLOS функциональное: пилот может непрерывно и невооружённым глазом определять положение, ориентацию и направление UAS. На практике 3 км — практический минимум для любой содержательной операции VLOS. При меньшей видимости VLOS может быть недостижим даже на малых расстояниях.
  distractorRationales:
    a:
      lv: 500 m redzamībā VLOS var uzturēt tikai ļoti īsam, fiksētam lidojumam pie fiksētas vietas. Tas ir nepraktiski lielākajai daļai operāciju.
      en: At 500 m visibility VLOS can only be maintained for a very short, fixed-position flight. This is impractical for most operations.
      ru: При 500 м видимости VLOS можно поддерживать только при очень коротком полёте с фиксированной позицией. Это нецелесообразно для большинства операций.
    c:
      lv: 1 km var būt pietiekams ļoti tuvajos operācijās (< 200 m), bet nav pietiekams vidējas attālinātības operācijām.
      en: 1 km may be adequate for very close-range operations (< 200 m) but is insufficient for medium-range operations.
      ru: 1 км может быть достаточен для операций очень близкого радиуса (< 200 м), но недостаточен для операций среднего радиуса.
    d:
      lv: 10 km ir maksimāli ziņojamā redzamība METAR, nevis minimums VLOS. Lielākā daļa VLOS operāciju notiek tuvāk par 1 km attālumā.
      en: 10 km is the maximum reportable visibility in METAR, not the VLOS minimum. Most VLOS operations take place at under 1 km range.
      ru: 10 км — максимальная отчётная видимость в METAR, а не минимум VLOS. Большинство операций VLOS происходит на расстоянии менее 1 км.
  sourceRef: "Reg (EU) 2019/947 UAS.OPEN.060(3) | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; EASA AMC1 UAS.OPEN.060 VLOS | https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019R0947"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — Reg (EU) 2019/947 UAS.OPEN.060(3); EASA AMC1 UAS.OPEN.060 VLOS
- id: met-011
  stem:
    lv: Pilots lido 80 m AGL. METAR virszemes vējš ir 5 m/s. Kāds ir drošākais plānošanas pieņēmums par vēju šajā augstumā?
    en: A pilot flies at 80 m AGL. METAR surface wind is 5 m/s. What is the safest planning assumption about the wind at 80 m?
    ru: Пилот летит на 80 м AGL. Приземный ветер METAR — 5 м/с. Какое допущение о ветре на 80 м безопаснее всего?
  options:
    - id: a
      text:
        lv: Tāpat 5 m/s — METAR mēra operatīvajā augstumā.
        en: The same 5 m/s — METAR measures at operational altitude.
        ru: Те же 5 м/с — METAR измеряет на рабочей высоте.
    - id: b
      text:
        lv: 3–4 m/s — vējš samazinās ar augstumu pilsētā.
        en: 3–4 m/s — wind decreases with altitude in the city.
        ru: 3–4 м/с — ветер ослабевает с высотой в городе.
    - id: c
      text:
        lv: Vējš augstumā var būt stiprāks nekā pie virszemes, tāpēc jāatstāj rezerve un, ja iespējams, jāpārbauda prognozētais vējš darba augstumā.
        en: Wind aloft may be stronger than at the surface, so leave margin and, if possible, check a forecast wind for operating height.
        ru: На высоте ветер может быть сильнее, чем у земли, поэтому нужно оставлять запас и, если возможно, смотреть прогноз ветра на рабочей высоте.
    - id: d
      text:
        lv: 10+ m/s — vējš dubultosies katrās 40 m.
        en: 10+ m/s — wind doubles every 40 m.
        ru: 10+ м/с — ветер удваивается каждые 40 м.
  correctOptionId: c
  explanation:
    lv: |
      METAR ir virszemes novērojums, nevis mērījums darba augstumā. Tuvu zemei berze bieži bremzē vēju, tāpēc augstāk tas var būt stiprāks. Drošā pieeja ir atstāt rezervi un izmantot prognozēto vēju darba augstumā, ja tāds ir pieejams.
    en: |
      METAR is a surface observation, not a measurement at operating height. Near the ground, friction often slows the wind, so it may be stronger aloft. The safe approach is to leave margin and use a forecast wind at operating height when one is available.
    ru: |
      METAR — это приземное наблюдение, а не измерение на рабочей высоте. У земли ветер часто тормозится трением, поэтому выше он может быть сильнее. Безопасный подход — оставлять запас и, если доступно, использовать прогноз ветра на рабочей высоте.
  distractorRationales:
    a:
      lv: METAR nemēra vēju darba augstumā; to nevar lasīt kā tiešu 80 m prognozi.
      en: METAR does not measure the wind at operating height; it cannot be treated as a direct 80 m forecast.
      ru: METAR не измеряет ветер на рабочей высоте; его нельзя считать прямым прогнозом для 80 м.
    b:
      lv: Pieņēmums, ka vējš droši samazināsies, nav derīgs plānošanai.
      en: Assuming the wind will safely decrease with height is not sound planning.
      ru: Предполагать, что с высотой ветер надёжно ослабнет, нельзя.
    d:
      lv: Vēja ātruma dubultošanās katrās 40 m nav precīzs fizisks modelis. 30–50 % pieaugums no 10 m uz 80 m ir labākā piesarobeža.
      en: Wind speed doubling every 40 m is not an accurate physical model. A 30–50 % increase from 10 m to 80 m is the better approximation.
      ru: Удвоение скорости ветра каждые 40 м — неточная физическая модель. Увеличение на 30–50 % от 10 м до 80 м — лучшее приближение.
  sourceRef: "EASA Easy Access Rules — AMC1 UAS.OPEN.030 | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; wind profile standard atmosphere"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: numeric
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; wind profile standard atmosphere
- id: met-012
  stem:
    lv: Ko nozīmē TAF kods "BECMG 1022/1024 29018KT"?
    en: What does the TAF code "BECMG 1022/1024 29018KT" mean?
    ru: Что означает код TAF «BECMG 1022/1024 29018KT»?
  options:
    - id: a
      text:
        lv: Vējš momentāni mainīsies uz 290°/18 KT pulksten 22:00 UTC.
        en: Wind will instantly change to 290°/18 KT at 22:00 UTC.
        ru: Ветер мгновенно изменится до 290°/18 KT в 22:00 UTC.
    - id: b
      text:
        lv: Sākas uz 22 stundām laika apstākļu logs ar vēju 290°/18 KT.
        en: A 22-hour weather window with wind 290°/18 KT begins.
        ru: Начинается 22-часовое погодное окно с ветром 290°/18 KT.
    - id: c
      text:
        lv: Pagaidu vējš 290°/18 KT starp 22:00 un 24:00 UTC.
        en: Temporary wind 290°/18 KT between 22:00 and 24:00 UTC.
        ru: Временный ветер 290°/18 KT между 22:00 и 24:00 UTC.
    - id: d
      text:
        lv: Pakāpeniskas izmaiņas no 22:00 līdz 24:00 UTC — finālais vējš 290°/18 KT.
        en: Gradual change from 22:00 to 24:00 UTC — final wind 290°/18 KT.
        ru: Постепенное изменение с 22:00 до 24:00 UTC — итоговый ветер 290°/18 KT.
  correctOptionId: d
  explanation:
    lv: |
      BECMG nozīmē pakāpeniskas, pastāvīgas izmaiņas sākas starp norādītajām stundām. 1022/1024 = 10. datums 22:00 UTC līdz 10. datums 24:00 UTC (= 11. datums 00:00 UTC). Pēc 24:00 UTC galīgais vējš ir 290°/18 KT. TEMPO ir pagaidu; BECMG ir pastāvīgas izmaiņas.
    en: |
      BECMG means gradual, permanent changes begin between the stated hours. 1022/1024 = 10th 22:00 UTC to 10th 24:00 UTC (= 11th 00:00 UTC). After 24:00 UTC the final wind is 290°/18 KT. TEMPO is temporary; BECMG is permanent change.
    ru: |
      BECMG означает постепенное, постоянное изменение, начинающееся в указанные часы. 1022/1024 = 10-е 22:00 UTC до 10-е 24:00 UTC (= 11-е 00:00 UTC). После 24:00 UTC итоговый ветер 290°/18 KT. TEMPO — временное; BECMG — постоянное изменение.
  distractorRationales:
    a:
      lv: FM (from) norāda tūlītējas izmaiņas noteiktā laikā. BECMG norāda pakāpeniskas izmaiņas noteiktā laika logā.
      en: FM (from) indicates instantaneous changes at a specific time. BECMG indicates gradual changes over a time window.
      ru: FM (from) указывает мгновенные изменения в конкретное время. BECMG указывает постепенные изменения в течение временно́го окна.
    b:
      lv: BECMG laika logs norāda izmaiņu periodu, nevis kopējo laika apstākļu ilgumu. 1022/1024 ir divu stundu izmaiņu periods, ne 22 stundu.
      en: The BECMG time window indicates the change period, not total weather duration. 1022/1024 is a 2-hour change period, not 22 hours.
      ru: Временно́е окно BECMG указывает период изменения, а не общую продолжительность погоды. 1022/1024 — 2-часовой период изменения, а не 22 часа.
    c:
      lv: Pagaidu apstākļi ir TEMPO; BECMG norāda pastāvīgas izmaiņas, kas saglabāsies arī pēc norādītā laika loga.
      en: Temporary conditions are indicated by TEMPO; BECMG indicates permanent changes that persist after the time window.
      ru: Временны́е условия обозначаются TEMPO; BECMG указывает постоянные изменения, сохраняющиеся после временно́го окна.
  sourceRef: "ICAO Annex 3 — TAF format | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; BECMG vs TEMPO vs FM"
  difficulty: 3
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — TAF format; BECMG vs TEMPO vs FM
- id: met-013
  stem:
    lv: Kāda mākoņu izohrona (kods) METAR norāda kumulonimbu?
    en: Which cloud type code in METAR indicates a cumulonimbus?
    ru: Какой код типа облаков в METAR указывает на кучево-дождевое?
  options:
    - id: a
      text:
        lv: CB — kumulonimbs, norādīts papildus mākoņu grupas koda aizmugurē.
        en: CB — cumulonimbus, appended after the cloud group code.
        ru: CB — кучево-дождевое, добавляется после кода группы облаков.
    - id: b
      text:
        lv: OVC — pārsegs.
        en: OVC — overcast.
        ru: OVC — сплошная.
    - id: c
      text:
        lv: BKN — plaukumi.
        en: BKN — broken.
        ru: BKN — разорванная.
    - id: d
      text:
        lv: TCU — torējoše kumuluss.
        en: TCU — towering cumulus.
        ru: TCU — мощно-кучевое.
  correctOptionId: a
  explanation:
    lv: |
      Kumulonimbi METAR tiek norādīti ar "CB" sufiksu pēc mākoņu grupas koda. Piemērs: FEW010CB = daži kumulonimbi 1000 pēdu augstumā. TCU (torējoše kumuluss) ir atsevišķs kods, kas norāda attīstošus kumulusus — potenciālu Cb priekšteci.
    en: |
      Cumulonimbus clouds are indicated in METAR with the "CB" suffix after the cloud group code. Example: FEW010CB = few cumulonimbus at 1,000 ft. TCU (towering cumulus) is a separate code indicating developing cumulus — a potential Cb precursor.
    ru: |
      Кучево-дождевые в METAR указываются суффиксом «CB» после кода группы облаков. Пример: FEW010CB = незначительная кучево-дождевая облачность на 1000 футов. TCU (мощно-кучевое) — отдельный код, указывающий на развивающийся кумулюс — потенциальный предшественник Cb.
  distractorRationales:
    b:
      lv: OVC nozīmē "pārsegs" — 8 astotdaļas debesu pārklājuma. Tas ir pārklājuma daudzums, nevis mākoņu veids.
      en: OVC means "overcast" — 8 eighths cloud cover. It is a coverage amount, not a cloud type indicator.
      ru: OVC означает «сплошная» — 8 октантов покрова. Это количество покрова, а не тип облаков.
    c:
      lv: BKN nozīmē "plaukumi" — 5–7 mākoņu astotdaļas debesu pārklājuma. Tas nenorāda mākoņu veidu.
      en: BKN means "broken" — 5–7 eighths cloud cover. It indicates coverage amount, not cloud type.
      ru: BKN означает «разорванная» — 5–7 октантов облачного покрова. Это указывает количество покрова, а не тип облаков.
    d:
      lv: TCU (torējoše kumuluss) norāda attīstošos kumulusus, kas var izveidoties kumulonimbā — bet TCU pats nav kumulonimbs. Pieredzējušam pilotam TCU jāuzskata par brīdinājumu.
      en: TCU (towering cumulus) indicates developing cumulus that may become a cumulonimbus — but TCU itself is not a cumulonimbus. An experienced pilot treats TCU as a warning.
      ru: TCU (мощно-кучевое) указывает на развивающийся кумулюс, который может стать кучево-дождевым, но сам по себе им не считается. Опытный пилот воспринимает TCU как предупреждение.
  sourceRef: "ICAO Annex 3 — METAR cloud type codes | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; CB and TCU"
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — METAR cloud type codes; CB and TCU
- id: met-014
  stem:
    lv: Kāda ir temperatūras inversijas galvenā sekas UAS lidojumam?
    en: What is the primary consequence of a temperature inversion for UAS operations?
    ru: Каковы основные последствия температурной инверсии для полётов UAS?
  options:
    - id: a
      text:
        lv: Uzlabota drona veiktspēja augstumā.
        en: Improved drone performance at altitude.
        ru: Улучшенные характеристики дрона на высоте.
    - id: b
      text:
        lv: Samazināta redzamība un miglājs pie virszemes; turbulence zem inversijas slāņa.
        en: Reduced visibility and haze at the surface; turbulence below the inversion layer.
        ru: Пониженная видимость и дымка у поверхности; турбулентность под инверсионным слоем.
    - id: c
      text:
        lv: Pastiprināts GPS signāls.
        en: Enhanced GPS signal.
        ru: Усиленный GPS-сигнал.
    - id: d
      text:
        lv: Automātiska VLOS paplašināšanās inversijas slāņa refleksijas dēļ.
        en: Automatic VLOS extension due to inversion layer reflections.
        ru: Автоматическое расширение VLOS из-за отражений инверсионного слоя.
  correctOptionId: b
  explanation:
    lv: |
      Temperatūras inversija "iesloga" mitru, piesārņotu gaisu pie virszemes, kas samazina redzamību un var izraisīt miglu. Turklāt inversijas slānis darbojas kā "vāks", kas intensificē turbulenci zem tā — sevišķi termisko turbulenci no virszemes sildīšanas. Inversijas bieži novērojamas Latvijas rudenī un ziemā, no rīta.
    en: |
      A temperature inversion "traps" moist, polluted air at the surface, reducing visibility and potentially causing fog. Additionally the inversion layer acts as a "lid" that intensifies turbulence below it — especially thermal turbulence from surface heating. Inversions are common in Latvia in autumn and winter, in the morning.
    ru: |
      Температурная инверсия «задерживает» влажный, загрязнённый воздух у поверхности, снижая видимость и потенциально вызывая туман. Кроме того, инверсионный слой действует как «крышка», усиливающая турбулентность под ним — особенно термическую от нагрева поверхности. Инверсии часты в Латвии осенью и зимой, по утрам.
  distractorRationales:
    a:
      lv: Temperatūras inversija samazina gaisa blīvumu augstumā, bet galvenais efekts ir redzamības samazināšanās un turbulence pie virszemes, nevis uzlabota veiktspēja.
      en: Temperature inversion does not improve drone performance at altitude — its primary effects are visibility reduction and turbulence at the surface level.
      ru: "Температурная инверсия не улучшает характеристики дрона на высоте — её основные эффекты: снижение видимости и турбулентность у поверхности."
    c:
      lv: Temperatūras inversija neietekmē GPS signālu tādā veidā, kas uzlabotu tā uztveri.
      en: Temperature inversion does not affect GPS signals in a way that would improve reception.
      ru: Температурная инверсия не влияет на GPS-сигналы так, чтобы улучшить приём.
    d:
      lv: VLOS ir vizuāla prasība — to ietekmē vidējā optiskā redzamība, nevis atmosfēras optiskās refleksijas.
      en: VLOS is a visual requirement — it is affected by ambient optical visibility, not atmospheric optical reflections.
      ru: VLOS — визуальное требование, зависящее от фактической оптической видимости, а не атмосферных отражений.
  sourceRef: "EASA Easy Access Rules — AMC1 UAS.OPEN.030 | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; ICAO meteorology training"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: factual
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; ICAO meteorology training
- id: met-015
  stem:
    lv: Pilots plāno lidojumu pāri piejūras ezeram vēsā rudens rītā. Gaiss ir mitrs, temperatūra +3°C. Ko jāpārbauda papildus standarta laika pārbaudei?
    en: A pilot plans a flight over a coastal lake on a cool autumn morning. Air is damp, temperature +3°C. What should be checked in addition to the standard weather check?
    ru: Пилот планирует полёт над прибрежным озером прохладным осенним утром. Воздух влажный, температура +3°C. Что проверить дополнительно к стандартной проверке погоды?
  options:
    - id: a
      text:
        lv: Lidostas laikapstākļi tuvumā.
        en: Nearby airport weather.
        ru: Погода ближайшего аэропорта.
    - id: b
      text:
        lv: NOTAM par ūdens sporta aktivitātēm.
        en: NOTAMs for water sports activities.
        ru: NOTAM для водных спортивных мероприятий.
    - id: c
      text:
        lv: Apledojuma risku — +3°C + augsts mitrums tuvu ūdenim var radīt apledojumu uz propelleriem.
        en: Icing risk — +3°C + high humidity near water can create propeller icing.
        ru: Риск обледенения — +3°C + высокая влажность у воды может вызвать обледенение пропеллеров.
    - id: d
      text:
        lv: Nekas papildus — +3°C ir augstāk par 0°C, tāpēc apledojuma risks nav.
        en: Nothing additional — +3°C is above 0°C, so there is no icing risk.
        ru: Ничего дополнительного — +3°C выше 0°C, поэтому риска обледенения нет.
  correctOptionId: c
  explanation:
    lv: |
      +3°C ar augstu mitrumu tuvu ūdens virsmai ir potenciāls apledojuma scenārijs. Ūdens var radīt zemtemperatūras gaisa slāni tieši virs virsmas, kas var pazemināt faktisko propellera kontakttemperatūru zem 0°C. Pārsaldētu ūdens pilienu klātbūtne miglā vai plānas mākonīšu veidās virs ezera var radīt apledojumu pat +3°C gaisa temperatūrā. Pārbaudīt augšzemes virszemes temperatūru un miglas ziņojumus pirms pacelšanās.
    en: |
      +3°C with high humidity near a water surface is a potential icing scenario. Water bodies can create a cold surface air layer directly above that can drive the actual propeller contact temperature below 0°C. Supercooled droplets in mist or thin cloud above the lake can cause icing even at +3°C ambient temperature. Check surface temperature and fog reports before departure.
    ru: |
      +3°C с высокой влажностью вблизи водной поверхности — потенциальный сценарий обледенения. Водоёмы могут создавать холодный приземный слой воздуха, снижающий фактическую контактную температуру пропеллера ниже 0°C. Переохлаждённые капли в дымке или тонкой облачности над озером могут вызывать обледенение даже при +3°C. Проверить приземную температуру и сообщения о тумане до взлёта.
  distractorRationales:
    a:
      lv: Lidostas laika apstākļi ir daļa no standarta pārbaudes, nevis papildu apledojuma specifiska pārbaude.
      en: Nearby airport weather is part of the standard check, not an icing-specific additional check.
      ru: Погода ближайшего аэропорта — часть стандартной проверки, а не специфическая дополнительная проверка обледенения.
    b:
      lv: Ūdens sporta NOTAM var būt aktuāls par drošu attālumu, bet tas nav galvenais drošības apsvērums šajā situācijā — tā ir apledojuma riski.
      en: Water sports NOTAMs may be relevant for safe distances, but are not the primary safety consideration in this scenario — icing is.
      ru: NOTAM для водных видов спорта может влиять на безопасное расстояние, но в этом сценарии он не главный фактор безопасности — главный риск здесь обледенение.
    d:
      lv: +3°C ir tuvu 0°C, un ūdens virsma var samazināt faktisko gaisa temperatūru zem 0°C tieši pie ezera. Apledojums iespējams pat pie +5°C pārsaldētu pilienu klātbūtnē.
      en: +3°C is close to 0°C, and the water surface can reduce the actual air temperature below 0°C right over the lake. Icing is possible even at +5°C in the presence of supercooled droplets.
      ru: +3°C близко к 0°C, и водная поверхность может снизить фактическую температуру воздуха ниже 0°C прямо над озером. Обледенение возможно даже при +5°C при наличии переохлаждённых капель.
  sourceRef: "ICAO Doc 8896 — icing conditions | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; A2 syllabus meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a2-apakskategorijas-teoretisko-zinasanu-eksamens/"
  difficulty: 4
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Doc 8896 — icing conditions; A2 syllabus meteorology
- id: met-016
  stem:
    lv: Pilots pamana, ka lidojuma laikā drons strauji maina ātrumu un augstumu, kaut gan vadības ievade nav mainīta. Kāds meteoroloģisks faktors to visbiežāk izraisa?
    en: A pilot notices the drone rapidly changes speed and altitude during flight despite no control input change. Which meteorological factor most commonly causes this?
    ru: Пилот замечает, что дрон резко меняет скорость и высоту в полёте, хотя ввод управления не изменился. Какой метеорологический фактор чаще всего это вызывает?
  options:
    - id: a
      text:
        lv: Temperatūras inversija, kas nomāc horizontālo vēja plūsmu.
        en: Temperature inversion suppressing horizontal air flow.
        ru: Температурная инверсия, подавляющая горизонтальный воздушный поток.
    - id: b
      text:
        lv: Saulriets, kas samazina gaisa temperatūru.
        en: Sunset reducing air temperature.
        ru: Закат, снижающий температуру воздуха.
    - id: c
      text:
        lv: Liels relatīvais mitrums, kas palielina gaisa blīvumu.
        en: High relative humidity increasing air density.
        ru: Высокая относительная влажность, увеличивающая плотность воздуха.
    - id: d
      text:
        lv: Vēja bīde — strauja vēja ātruma vai virziena maiņa īsā attālumā.
        en: Wind shear — a rapid change in wind speed or direction over a short distance.
        ru: Сдвиг ветра — резкое изменение скорости или направления ветра на коротком расстоянии.
  correctOptionId: d
  explanation:
    lv: |
      Vēja bīde ir strauja vēja ātruma vai virziena maiņa uz īsu attālumu — horizontāli vai vertikāli. Kad drons šķērso bīdes slāni, tas iegūst vai zaudē ātrgaitu pēkšņi, liekot kontroles sistēmai kompensēt. Ar spēcīgu bīdi UAS var zaudēt stabilitāti.
    en: |
      Wind shear is a rapid change in wind speed or direction across a short distance — horizontal or vertical. When the drone crosses the shear layer it suddenly gains or loses airspeed, forcing the control system to compensate. With strong shear the UAS can lose stability entirely.
    ru: |
      Сдвиг ветра — резкое изменение скорости или направления ветра на коротком расстоянии — горизонтальном или вертикальном. При пересечении дроном слоя сдвига он внезапно набирает или теряет скорость, заставляя систему управления компенсировать. При сильном сдвиге UAS может полностью потерять стабильность.
  distractorRationales:
    a:
      lv: Inversija kavē vertikālo sajaukšanos un bieži rada miglāju, bet nerada pēkšņas ātruma izmaiņas, kas raksturīgas bīdei.
      en: An inversion inhibits vertical mixing and often causes haze, but does not produce the sudden speed changes characteristic of shear.
      ru: Инверсия подавляет вертикальное перемешивание и часто вызывает дымку, но не создаёт резких изменений скорости, характерных для сдвига.
    b:
      lv: Saulriets pāris stundu laikā samazina temperatūru. Tas ir pārāk lēns, lai izskaidrotu pēkšņas izmaiņas lidojuma laikā.
      en: Sunset lowers temperature gradually over hours. This is far too slow to explain sudden in-flight changes.
      ru: Закат снижает температуру в течение нескольких часов — слишком медленно, чтобы объяснить внезапные изменения в полёте.
    c:
      lv: Augsts mitrums ietekmē baterijas un motorus pakāpeniski, nevis rada pēkšņas reaktīvas kustības. Tas arī nedaudz samazina gaisa blīvumu (mitrais gaiss ir vieglāks par sausu).
      en: High humidity degrades batteries and motors gradually, not producing sudden reactive movement. It also slightly decreases air density (moist air is lighter than dry).
      ru: Высокая влажность постепенно снижает работоспособность аккумуляторов и моторов, не создавая резких движений. Кроме того, она незначительно снижает плотность воздуха (влажный воздух легче сухого).
  sourceRef: "EASA Easy Access Rules UAS 2024 — meteorology section | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; ICAO Annex 3"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules UAS 2024 — meteorology section; ICAO Annex 3
- id: met-017
  stem:
    lv: Vasaras dienā pēc karstas rīta saules apspīdēšanas parādās augošas kumulusa mākoņu torņi. Kādu lidojuma apdraudējumu tas signalizē?
    en: On a summer afternoon after strong morning sunshine, growing cumulus cloud towers appear. What flight hazard does this signal?
    ru: Летним днём после сильного утреннего солнечного прогрева появляются башнеобразные кучевые облака. Какую лётную опасность это сигнализирует?
  options:
    - id: a
      text:
        lv: Termiskā turbulence un augošs konvektīvās aktivitātes risks, iespējams attīstoties kumulonimbā.
        en: Thermal turbulence and growing risk of convective activity, potentially developing into cumulonimbus.
        ru: Термическая турбулентность и нарастающий риск конвективной активности с возможным развитием кучево-дождевого облака.
    - id: b
      text:
        lv: Zema augstuma inversija, kas bloķē dūmus.
        en: Low-level inversion trapping smoke.
        ru: Приземная инверсия, удерживающая дым.
    - id: c
      text:
        lv: Samazināta redzamība miglāja dēļ.
        en: Reduced visibility due to haze.
        ru: Сниженная видимость из-за дымки.
    - id: d
      text:
        lv: Auksts fronts, kas nes ilgstošas lietusgāzes.
        en: Cold front bringing prolonged rain.
        ru: Холодный фронт, приносящий продолжительные дожди.
  correctOptionId: a
  explanation:
    lv: |
      Augošu kumulusa torņu parādīšanās dienas siltākajā daļā pēc intensīvas saules apkarsēšanas norāda uz aktīviem termiskiem procesiem. Šādos apstākļos UAS var piedzīvot negaidītu turbulenci un straujas vertikālās plūsmas. Spēcīgi kumulusi var attīstīties par kumulonimbiem ar pērkona negaisu un zibeni. Ja mākoņi strauji aug — laiks beigt lidojumu.
    en: |
      Towering cumulus appearing in the warmest part of the afternoon following intense heating signals active thermal convection. UAS can encounter sudden turbulence and strong updrafts/downdrafts. Strong cumulus may develop into cumulonimbus with thunderstorm and lightning. If clouds are growing rapidly — time to end the flight.
    ru: |
      Появление башнеобразных кучевых облаков в самую тёплую часть дня после интенсивного прогрева свидетельствует об активной тепловой конвекции. UAS может встретить внезапную турбулентность и сильные восходящие/нисходящие потоки. Мощные кучевые облака могут развиться в кучево-дождевые с грозой и молниями. Если облака быстро растут — пора завершать полёт.
  distractorRationales:
    b:
      lv: Inversijas dūmu slazds rada miglāju un horizontālu gaisa piesārņojumu, ne vertikāli augošus mākoņus. Kumulusa torņi norāda, ka inversijas nav.
      en: An inversion smoke trap produces haze and horizontal pollution, not vertically growing clouds. Towering cumulus signals the inversion is absent.
      ru: Ловушка дыма при инверсии создаёт горизонтальное загрязнение, а не вертикально растущие облака. Башнеобразные кучевые сигнализируют об отсутствии инверсии.
    c:
      lv: Miglājs veidojas pie temperatūras inversijas un mitruma, ne pie kumulusa torņiem. Kumulusa torņi norāda uz pretējo — aktīvu konvekciju un vertikālu sajaukšanos.
      en: Haze forms under temperature inversions with moisture, not under towering cumulus. Towering cumulus signals the opposite — active convection and vertical mixing.
      ru: Дымка образуется при температурной инверсии и влажности, а не при башнеобразных кучевых облаках. Башнеобразные кучевые указывают на противоположное — активную конвекцию.
    d:
      lv: Aukstā fronte parasti rada plakanus slāņveida mākoņus un ienesīgs ilgstošas lietusgāzes, ne kumulusa torņus. Kumulusa torņi ir lokālas konvektīvas aktivitātes pazīme, ne frontālas sistēmas.
      en: A cold front typically produces flat stratiform clouds and steady rain, not towering cumulus. Towering cumulus is a sign of local convective activity, not a frontal system.
      ru: Холодный фронт обычно формирует плоские слоистые облака и продолжительные осадки, а не башнеобразные кучевые. Башнеобразные кучевые — признак локальной конвективной активности, а не фронтальной системы.
  sourceRef: "EASA Easy Access Rules UAS 2024 — meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; ICAO Annex 3 cloud types"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules UAS 2024 — meteorology; ICAO Annex 3 cloud types
- id: met-018
  stem:
    lv: Kumulonimba mākonis redzams 8 km uz ziemeļrietumiem. Vējš pastiprinās. Tev vēl 10 minūtes filmēšanas. Pareizā rīcība?
    en: A cumulonimbus cloud is visible 8 km to the northwest. Wind is picking up. You have 10 minutes of footage remaining. What is the correct action?
    ru: Кучево-дождевое облако видно в 8 км на северо-западе. Ветер усиливается. Осталось 10 минут съёмки. Правильное действие?
  options:
    - id: a
      text:
        lv: Turpināt — 8 km atrodas ārpus tūlītējās bīstamības zonas.
        en: Continue — 8 km is outside the immediate danger zone.
        ru: Продолжать — 8 км вне зоны непосредственной опасности.
    - id: b
      text:
        lv: Nekavējoties uzsākt atgriešanos — 8 km atrodas 10 km izslēgšanas zonā.
        en: Initiate return immediately — 8 km is within the 10 km exclusion zone.
        ru: Немедленно начать возврат — 8 км в зоне исключения 10 км.
    - id: c
      text:
        lv: Vērot un nolaisties tikai tad, ja mākonis pietuvojas 5 km.
        en: Monitor closely and land only if the cloud gets within 5 km.
        ru: Наблюдать и садиться только при приближении до 5 км.
    - id: d
      text:
        lv: Samazināt augstumu zem mākoņa pamata un turpināt filmēt.
        en: Reduce altitude to below the cloud base and continue filming.
        ru: Снизить высоту ниже основания облака и продолжать снимать.
  correctOptionId: b
  explanation:
    lv: 10 km noteikums prasa vismaz 10 km atdalīšanu no jebkura aktīva kumulonimba. 8 km atrodas bīstamajā zonā — zibens un stipra turbulence var sasniegt tevi pirms mākonis nonāk virs galvas. Nekavējoties uzsākt atgriešanos.
    en: The 10 km rule requires a minimum 10 km separation from any active cumulonimbus. At 8 km you are already within the risk zone — lightning and severe turbulence can reach you before the cloud arrives overhead. Initiate return now.
    ru: "Правило 10 км требует минимум 10 км разделения от любого активного кучево-дождевого. 8 км — уже в зоне риска: молния и сильная турбулентность могут достичь тебя прежде, чем облако окажется над головой. Немедленно начать возврат."
  distractorRationales:
    a:
      lv: 8 km atrodas iekšā, nevis ārpus 10 km izslēgšanas zonas. Risks jau pastāv.
      en: 8 km is inside, not outside, the 10 km exclusion zone. The risk is already present.
      ru: 8 км — внутри, а не вне зоны исключения 10 км. Риск уже существует.
    c:
      lv: Gaidīt, līdz 5 km, ir daudz par vēlu — 5 km brāzmu fronte un zibens risks ir kritisks. Slieksnis ir 10 km.
      en: Waiting until 5 km is far too late — at 5 km the gust front and lightning risk are critical. The threshold is 10 km.
      ru: Ждать до 5 км — слишком поздно. Шквалистый фронт и риск молнии при 5 км критичны. Порог — 10 км.
    d:
      lv: Augstuma samazināšana nesamazina zibens risku. Turbulence arī stiepjas lejup no Cb.
      en: Reducing altitude does not reduce the lightning risk — lightning discharges extend from cloud to ground regardless of the drone's altitude. Turbulence also extends downward from the Cb.
      ru: Снижение высоты не снижает риск молнии. Турбулентность тоже распространяется вниз от Cb.
  sourceRef: "meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
- id: met-019
  stem:
    lv: Kura apstākļu kombinācija rada vislielāko propelleru apledojuma risku?
    en: Which combination of conditions creates the highest risk of propeller icing?
    ru: Какое сочетание условий создаёт наибольший риск обледенения пропеллеров?
  options:
    - id: a
      text:
        lv: Temperatūra +20°C, augsts mitrums.
        en: Temperature +20°C, high humidity.
        ru: Температура +20°C, высокая влажность.
    - id: b
      text:
        lv: Temperatūra -5°C, sauss un skaidrs gaiss.
        en: Temperature -5°C, dry clear air.
        ru: Температура -5°C, сухой чистый воздух.
    - id: c
      text:
        lv: Temperatūra +2°C, lidojums caur mākoni vai saldējoša migla.
        en: Temperature +2°C, flying through cloud or freezing drizzle.
        ru: Температура +2°C, полёт через облако или ледяная морось.
    - id: d
      text:
        lv: Temperatūra +10°C, viegls lietus.
        en: Temperature +10°C, light rain.
        ru: Температура +10°C, лёгкий дождь.
  correctOptionId: c
  explanation:
    lv: "Apledojumam nepieciešami divi apstākļi vienlaicīgi: temperatūra tuvu vai zem 0°C UN redzams mitrums (mākoņu pilieni, saldējoša migla). +2°C mākonī vai saldējoša miglā pārsaldēti ūdens pilieni sasalst, nonākot saskarē ar propellera virsmu."
    en: "Icing requires two conditions simultaneously: temperature near or below 0°C AND visible moisture (cloud droplets, freezing drizzle). At +2°C in cloud or freezing drizzle, supercooled water droplets exist and freeze on contact with the propeller surface. -5°C in dry clear air has no moisture to form ice."
    ru: "Обледенение требует двух условий одновременно: температура около или ниже 0°C И видимая влага (капли облака, ледяная морось). При +2°C в облаке или ледяной мороси переохлаждённые капли воды замерзают при контакте с поверхностью пропеллера."
  distractorRationales:
    a:
      lv: +20°C ūdens ir šķidrs un nevar sasalt uz propellera virsmām.
      en: At +20°C water is liquid and cannot freeze on propeller surfaces. High humidity at warm temperatures causes water deposition, not ice.
      ru: При +20°C вода жидкая и не может замерзать на поверхностях пропеллеров.
    b:
      lv: Auksta temperatūra viena nav pietiekama — apledojumam nepieciešami pārsaldēti ūdens pilieni (redzams mitrums). Sausam skaidram gaisam pie -5°C šādu pilienu nav.
      en: Cold temperature alone is not sufficient — icing requires the presence of supercooled water droplets (visible moisture). Dry clear air at -5°C carries no such droplets.
      ru: Только холодная температура недостаточна — для обледенения нужны переохлаждённые капли (видимая влага). Сухой чистый воздух при -5°C их не содержит.
    d:
      lv: +10°C ūdens paliek šķidrs. Viegls lietus nogulsnējas uz propelleriem, bet nesasalst.
      en: At +10°C water remains liquid. Light rain deposits water on the propellers but does not freeze. Icing risk is near or below 0°C.
      ru: При +10°C вода остаётся жидкой. Лёгкий дождь осаждается на пропеллерах, но не замерзает.
  sourceRef: "meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
- id: met-020
  stem:
    lv: Kurš avots nodrošina 24 stundu aviācijas klases laika prognozi konkrētai Latvijas lidostai?
    en: Which source provides a 24-hour aviation-grade weather forecast for a specific airport in Latvia?
    ru: Какой источник предоставляет 24-часовой авиационный прогноз погоды для конкретного аэропорта Латвии?
  options:
    - id: a
      text:
        lv: DJI Fly lietotnes laika logrīks.
        en: The weather widget in the DJI Fly app.
        ru: Виджет погоды в приложении DJI Fly.
    - id: b
      text:
        lv: Google Weather tuvākajai pilsētai.
        en: Google Weather for the nearest city.
        ru: Google Weather для ближайшего города.
    - id: c
      text:
        lv: METAR tuvākajai lidostai.
        en: METAR for the nearest airport.
        ru: METAR ближайшего аэропорта.
    - id: d
      text:
        lv: TAF (Terminal Aerodrome Forecast) no meteo.lv vai NOAA aviationweather.gov.
        en: TAF (Terminal Aerodrome Forecast) from meteo.lv or NOAA aviationweather.gov.
        ru: TAF (Terminal Aerodrome Forecast) с meteo.lv или NOAA aviationweather.gov.
  correctOptionId: d
  explanation:
    lv: TAF (Terminal Aerodrome Forecast) ir standarta aviācijas klases 24–30 stundu prognoze lidostām. METAR nodrošina pašreizējos novērotos apstākļus, ne prognozi. Ražotāja lietotnes logrīki un vispārīgie patērētāju laika dienesti nav aviācijas klases avoti.
    en: A TAF (Terminal Aerodrome Forecast) is the standard aviation-grade 24–30 hour forecast for airports. METAR provides current observed conditions, not a forecast. Manufacturer app widgets and general consumer weather apps are not aviation-grade sources.
    ru: TAF — стандартный авиационный 24–30-часовой прогноз для аэродромов. METAR предоставляет только текущие наблюдения. Виджеты приложений производителей и потребительские сервисы погоды — не авиационные источники.
  distractorRationales:
    a:
      lv: Ražotāja lietotnes laika logrīki izmanto komerciālus prognožu API, nevis aviācijas klases datus.
      en: Manufacturer app weather widgets use commercial forecast APIs, not aviation-grade data. They are not reliable for pre-flight decision-making.
      ru: Виджеты погоды приложений производителей используют коммерческие API прогнозов, а не авиационные данные.
    b:
      lv: Patērētāju laika dienesti nesniedz aviācijas klases prognozes un tiem trūkst METAR/TAF precizitātes.
      en: Consumer weather services do not provide aviation-grade forecasts and lack the precision and standardisation of METAR/TAF.
      ru: Потребительские сервисы погоды не предоставляют авиационных прогнозов и не имеют точности METAR/TAF.
    c:
      lv: METAR nodrošina tikai pašreizējos apstākļus — jauns novērojums tiek izlaists aptuveni ik 30–60 minūtes. Tas neprognoze nākotnes apstākļus.
      en: METAR provides current conditions only — a new observation is issued approximately every 30–60 minutes. It does not forecast future conditions.
      ru: METAR предоставляет только текущие условия — новый отчёт выходит каждые 30–60 минут. Прогноз будущих условий он не даёт.
  sourceRef: "meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
- id: met-021
  stem:
    lv: Virszemes METAR rāda 06008KT (8 mezgļi). Plāno lidot 100 m AGL. Kāds ir drošākais plānošanas pieņēmums?
    en: The surface METAR shows 06008KT (8 knots). You plan to fly at 100 m AGL. What is the safest planning assumption?
    ru: METAR у поверхности показывает 06008KT (8 узлов). Планируешь лететь на 100 м AGL. Какое допущение для планирования безопаснее?
  options:
    - id: a
      text:
        lv: Jāatstāj rezerve, jo darba augstumā vējš var būt stiprāks nekā pie virszemes.
        en: Leave margin, because wind at operating height may be stronger than at the surface.
        ru: Нужно оставлять запас, потому что на рабочей высоте ветер может быть сильнее, чем у земли.
    - id: b
      text:
        lv: Aptuveni 4 m/s — tāpat kā pie virszemes.
        en: Approximately 4 m/s — the same as surface.
        ru: Около 4 м/с — то же, что у поверхности.
    - id: c
      text:
        lv: Aptuveni 4 m/s — vējš samazinās ar augstumu.
        en: Approximately 4 m/s — wind decreases with altitude.
        ru: Около 4 м/с — ветер уменьшается с высотой.
    - id: d
      text:
        lv: Tieši 8 mezgļi — METAR mēra lidojuma augstumā.
        en: Exactly 8 knots — METAR is measured at flight altitude.
        ru: Ровно 8 узлов — METAR измеряется на рабочей высоте.
  correctOptionId: a
  explanation:
    lv: METAR ir virszemes novērojums. Darba augstumā vējš bieži ir stiprāks, īpaši virs atklātas teritorijas vai piekrastē. Drošāk ir plānot ar rezervi, nevis pieņemt, ka virszemes vērtība paliks nemainīga.
    en: METAR is a surface observation. At operating height the wind is often stronger, especially over open terrain or near the coast. It is safer to plan with margin than to assume the surface value stays unchanged aloft.
    ru: METAR — это приземное наблюдение. На рабочей высоте ветер часто сильнее, особенно над открытой местностью или у побережья. Безопаснее планировать с запасом, чем считать, что приземное значение останется тем же.
  distractorRationales:
    b:
      lv: Vējš darba augstumā nav obligāti vienāds ar virszemes novērojumu.
      en: Wind at operating height does not have to match the surface observation.
      ru: Ветер на рабочей высоте не обязан совпадать с приземным наблюдением.
    c:
      lv: Pieņēmums, ka augstumā vējš samazināsies, nav drošs.
      en: Assuming the wind will decrease with height is not a safe default.
      ru: Считать, что с высотой ветер ослабнет, небезопасно.
    d:
      lv: METAR nav mērījums 100 m augstumā.
      en: METAR is not a measurement taken at 100 m.
      ru: METAR не измеряется на высоте 100 м.
  sourceRef: "meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
- id: met-022
  stem:
    lv: Ko dronu pilotam pasaka burts `G` kodā `18012G22KT`?
    en: What does the `G` in `18012G22KT` tell a drone pilot?
    ru: Что подсказывает пилоту дрона буква `G` в коде `18012G22KT`?
  options:
    - id: a
      text:
        lv: Ka vējš garantēti paliks 12 mezglu līmenī.
        en: That the wind is guaranteed to stay at 12 knots.
        ru: Что ветер гарантированно останется на 12 узлах.
    - id: b
      text:
        lv: Ka brāzmas var sasniegt 22 mezglus un mazam UAS tās var būt svarīgākas par vidējo vēju.
        en: That gusts may reach 22 knots and can matter more than the average wind.
        ru: Что порывы могут достигать 22 узлов и для маленького UAS это может быть важнее среднего ветра.
    - id: c
      text:
        lv: Ka vējš attiecas tikai uz lielajiem gaisa kuģiem.
        en: That the wind is only relevant to large aircraft.
        ru: Что эта информация относится только к большим самолётам.
    - id: d
      text:
        lv: Ka GPS uztveršana būs pasliktināta.
        en: That GPS reception will be degraded.
        ru: Что ухудшится GPS.
  correctOptionId: b
  explanation:
    lv: Brāzmu vērtība mazam UAS ir ļoti svarīga. Īsi stiprāka vēja uzplūdi var radīt vadības problēmas, pat ja noturīgais vējš šķiet pieņemams.
    en: The gust figure is crucial for small UAS. Short bursts of stronger wind can create control problems even if the sustained wind looks manageable.
    ru: Порывы критичны для лёгких UAS. Короткие усиления ветра могут создавать проблемы управления, даже если средний ветер выглядит приемлемым.
  distractorRationales:
    a:
      lv: Kods tieši parāda, ka vēja stiprums var pieaugt līdz brāzmu vērtībai.
      en: The code explicitly says wind is variable in strength up to the gust value.
      ru: Код как раз показывает, что сила ветра может расти до значения порывов.
    c:
      lv: Brāzmas ir ļoti svarīgas tieši vieglajiem droniem.
      en: Gusts are highly relevant to light drones.
      ru: Порывы очень важны именно для лёгких дронов.
    d:
      lv: Vēja kodējums tieši neapraksta GPS kvalitāti.
      en: Wind coding does not directly describe GPS performance.
      ru: Код ветра напрямую не описывает качество GPS.
  sourceRef: "weather observation and decoding basics | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; meteorology and pre-flight weather reading | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — weather observation and decoding basics; docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology and pre-flight weather reading
- id: met-023
  stem:
    lv: Kāpēc TAF ir noderīgs arī īsai drona misijai?
    en: Why is TAF useful to a drone pilot even for a short mission?
    ru: Почему TAF полезен даже для короткой миссии дроном?
  options:
    - id: a
      text:
        lv: Tāpēc, ka tas dod juridisku atļauju lidot.
        en: Because it gives a legal permission to fly.
        ru: Потому что даёт юридическое разрешение на полёт.
    - id: b
      text:
        lv: Tāpēc, ka tas aizvieto vajadzību paskatīties ārā.
        en: Because it replaces the need to check outside visually.
        ru: Потому что заменяет визуальную оценку погоды на месте.
    - id: c
      text:
        lv: Tāpēc, ka tas parāda iespējamo tendenci tavā reālajā lidojuma logā.
        en: Because it shows the likely trend across the planned flight window.
        ru: Потому что показывает вероятную тенденцию на реальное окно полёта.
    - id: d
      text:
        lv: Tāpēc, ka tas ir vajadzīgs tikai IFR satiksmei.
        en: Because it is only for IFR traffic.
        ru: Потому что он нужен только IFR-трафику.
  correctOptionId: c
  explanation:
    lv: TAF ir vērtīgs, jo dronu lidojumi notiek laikā, nevis vienā sastingušā sekundē. Tendence ir svarīga pacelšanās, uzdevuma un nolaišanās fāzēs.
    en: TAF is valuable because drone flights still happen over time, not at a frozen instant. Trend matters for launch, task, and recovery.
    ru: Полет происходит во времени, а не в одной секунде. TAF полезен именно тем, что показывает вероятное развитие условий в окне миссии.
  distractorRationales:
    a:
      lv: Laikapstākļu prognoze nav juridiska atļauja.
      en: A forecast is not a legal authorisation.
      ru: Прогноз погоды не заменяет разрешение на полёт.
    b:
      lv: Prognoze palīdz, bet neaizvieto reālo apstākļu novērtējumu uz vietas.
      en: Forecasts help, but they do not replace looking at real conditions.
      ru: Прогноз помогает, но не заменяет реальную оценку на месте.
    d:
      lv: TAF nav “tikai IFR” informācija; tas ir noderīgs laikapstākļu avots daudz plašāk.
      en: TAF is not restricted to IFR decision-making; it is useful weather information broadly.
      ru: TAF полезен не только IFR; это общий источник структурированной погодной информации.
  sourceRef: "weather observation and decoding basics | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; meteorology and pre-flight weather reading | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — weather observation and decoding basics; docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology and pre-flight weather reading
- id: met-024
  stem:
    lv: METAR rāda 18015G25KT. Tavs drons ir novērtēts maksimumam 12 m/s. Vai lidojums ir droši?
    en: A METAR shows 18015G25KT. Your drone is rated for a maximum of 12 m/s. Is flight safe?
    ru: METAR показывает 18015G25KT. Твой дрон рассчитан на максимум 12 м/с. Безопасен ли полёт?
  options:
    - id: a
      text:
        lv: Jā — vidējais vējš (15 KT = 7,7 m/s) ir labi robežās.
        en: Yes — the mean wind (15 KT = 7.7 m/s) is well within limits.
        ru: Да — средний ветер (15 KT = 7,7 м/с) значительно в пределах нормы.
    - id: b
      text:
        lv: Jā, ja lidojums paliek zem 50 m, kur vējš ir mazāks.
        en: Yes, if the flight stays below 50 m where wind is lower.
        ru: Да, если полёт останется ниже 50 м, где ветер слабее.
    - id: c
      text:
        lv: Jā — METAR vēji ir konservatīvi; faktiskie apstākļi būs zemāki.
        en: Yes — METAR winds are conservative; actual conditions will be lower.
        ru: Да — данные METAR консервативны; реальные условия будут ниже.
    - id: d
      text:
        lv: Nē — brāzmas (25 KT = 12,9 m/s) pārsniedz 12 m/s limitu.
        en: No — the gusts (25 KT = 12.9 m/s) exceed the 12 m/s limit.
        ru: Нет — порывы (25 KT = 12,9 м/с) превышают предел 12 м/с.
  correctOptionId: d
  explanation:
    lv: 25 KT × 0,514 ≈ 12,9 m/s, kas pārsniedz 12 m/s drona limitu. Brāzmu vērtības, ne vidējais vējš, reprezentē pīķa slodzes. Lidojot brāzmainā vidē pie novērtētā maksimuma, pastāv vadības zaudēšanas vai strukturāla stresa risks.
    en: 25 KT × 0.514 ≈ 12.9 m/s, which exceeds the 12 m/s drone limit. Gust values, not mean wind, represent the peak loads the drone must survive. Flying in gusty conditions near the rated limit risks loss of control or structural stress.
    ru: 25 KT × 0,514 ≈ 12,9 м/с, что превышает предел дрона 12 м/с. Значения порывов, а не средний ветер, представляют пиковые нагрузки. Полёт в порывистых условиях у расчётного предела создаёт риск потери управления.
  distractorRationales:
    a:
      lv: Vidējā vēja robežu ievērošana nedara lidojumu drošu, ja brāzmas pārsniedz novērtēto maksimumu.
      en: Mean wind being within limits does not make flight safe when gusts exceed the rated maximum.
      ru: Средний ветер в норме не делает полёт безопасным, если порывы превышают расчётный максимум.
    b:
      lv: Vēja ātrums 50 m augstumā ne vienmēr ir mazāks, un brāzmas joprojām pārsniedz novērtēto limitu.
      en: Wind speed does not reliably decrease at 50 m in all conditions — and the gust still exceeds the rated limit regardless of altitude.
      ru: Скорость ветра на 50 м не всегда ниже, а порывы всё равно превышают расчётный предел вне зависимости от высоты.
    c:
      lv: METAR novērojumi ir precīzas mērītas vērtības, nevis konservatīvas aplēses.
      en: METAR observations are precise measured values, not conservative estimates. They should not be discounted.
      ru: Наблюдения METAR — точные измеренные значения, а не консервативные оценки. Их нельзя занижать.
  sourceRef: "meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
- id: met-025
  stem:
    lv: Karstā vasaras dienā (35°C), kāda ir blīvuma augstuma ietekme uz dronu salīdzinājumā ar standarta dienu (15°C)?
    en: On a hot summer day (35°C), what effect does density altitude have on your drone compared to a standard day (15°C)?
    ru: В жаркий летний день (+35°C) как плотностная высота влияет на дрон по сравнению со стандартным днём (+15°C)?
  options:
    - id: a
      text:
        lv: Samazināta veiktspēja — propelleri rada mazāk pacēluma, baterijas iztukšojas ātrāk, vēja pretestība samazinās.
        en: Reduced performance — propellers generate less lift, batteries drain faster, wind resistance decreases.
        ru: Сниженные характеристики — пропеллеры создают меньше подъёмной силы, батарея разряжается быстрее, ветровая нагрузка снижается.
    - id: b
      text:
        lv: Nav ietekmes — droni ir elektriski un gaisa blīvums tos neietekmē.
        en: No effect — drones are electrically powered and not affected by air density.
        ru: Никак — дроны электрические и не зависят от плотности воздуха.
    - id: c
      text:
        lv: Uzlabota veiktspēja — karstais gaiss paceļas ātrāk un palīdz dronam turēt augstumu.
        en: Improved performance — hot air rises faster, helping the drone maintain altitude.
        ru: Улучшенные характеристики — горячий воздух поднимается быстрее, помогая дрону держать высоту.
    - id: d
      text:
        lv: Ietekmē tikai baterija — propellera efektivitāti temperatūra neietekmē.
        en: Only the battery is affected — propeller efficiency is unaffected by temperature.
        ru: Влияет только аккумулятор — эффективность пропеллеров от температуры не зависит.
  correctOptionId: a
  explanation:
    lv: Karstais gaiss ir mazāk blīvs. Propelleri strādā pret gaisa masu, lai radītu pacēlumu — mazāks gaisa blīvums nozīmē mazāk pacēluma katrā apgriezienā, nepieciešami lielāki RPM, kas ātrāk iztukšo bateriju. Maksimālā slodze un vēja pretestība arī samazinās.
    en: Hot air is less dense. Propellers work against the air mass to generate lift — lower air density means less lift per revolution, requiring higher RPM, which drains the battery faster. Maximum payload and wind resistance also decrease at high density altitude.
    ru: Горячий воздух менее плотный. Пропеллеры создают тягу, отталкиваясь от воздуха — меньшая плотность означает меньше подъёмной силы на оборот, больше оборотов, быстрее разряд. Максимальная нагрузка и ветровая нагрузка тоже снижаются.
  distractorRationales:
    b:
      lv: Elektriskais dzinējs joprojām balstās uz gaisa masu thrustu ģenerēšanai. Mazāks gaisa blīvums samazina vilkmes spēku neatkarīgi no dzinēja veida.
      en: Electric propulsion still relies on pushing against an air mass for thrust. Lower air density reduces thrust regardless of the power source.
      ru: Электрический двигатель всё равно создаёт тягу, отталкиваясь от воздушной массы. Меньшая плотность снижает тягу вне зависимости от источника питания.
    c:
      lv: Termiskie paceļošies strāvas no karstas zemes ir lokāli un neparedzami — ne uzticama veiktspējas uzlabošana.
      en: Thermal updrafts from hot ground are real, but they are localised and unpredictable — not a reliable performance boost. Overall propeller efficiency still decreases.
      ru: Термические потоки от горячей земли реальны, но локальны и непредсказуемы — не надёжное улучшение характеристик.
    d:
      lv: Ietekmē gan baterija, gan propellera efektivitāte. Mazāks gaisa blīvums nozīmē, ka propelleri jāgriež ātrāk, kas palielina strāvas patēriņu.
      en: Both the battery and propeller efficiency are affected. Reduced air density means propellers must spin faster for the same thrust, which increases current draw.
      ru: Влияет и аккумулятор, и эффективность пропеллеров. При меньшей плотности воздуха пропеллеры должны вращаться быстрее, что увеличивает потребление тока.
  sourceRef: "meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
- id: met-026
  stem:
    en: On the morning weather briefing for a field flight near Jelgava, the METAR reports wind as 27012G22KT. How should the pilot read this wind information?
    lv: Rīta laikapstākļu pārskatā lidojumam pie Jelgavas METAR rāda vēju 27012G22KT. Kā pilotam jālasa šī vēja informācija?
    ru: В утреннем погодном брифинге для полёта возле Елгавы METAR показывает ветер 27012G22KT. Как пилот должен прочитать эту информацию о ветре?
  options:
    - id: a
      text:
        lv: Vējš no 120° ar ātrumu 27 mezgli.
        en: Wind from 120° at 27 knots.
        ru: Ветер со 120° со скоростью 27 узлов.
    - id: b
      text:
        lv: Vējš no 270° ar vidējo ātrumu 12 mezgli un brāzmām līdz 22 mezgliem.
        en: Wind from 270° at mean speed 12 knots, gusting to 22 knots.
        ru: Ветер с 270° со средней скоростью 12 узлов, порывы до 22 узлов.
    - id: c
      text:
        lv: Vēja attālums 2712 metru virzienā ar brāzmām 22 KT.
        en: Wind distance 2712 m in direction with gusts of 22 KT.
        ru: Ветровое расстояние 2712 м в направлении с порывами 22 KT.
    - id: d
      text:
        lv: Vējš no 270° ar vidējo ātrumu 22 mezgli un brāzmām 12 mezgļi.
        en: Wind from 270° at mean speed 22 knots, gusting to 12 knots.
        ru: Ветер с 270° со средней скоростью 22 узла, порывы до 12 узлов.
  correctOptionId: b
  explanation:
    lv: |
      METAR vēja formāts: [virziens 3 cipari]°[vidējais ātrums 2–3 cipari]G[brāzmas]KT. 27012G22KT: 270° (rietumi), vidējais ātrums 12 mezgļi, brāzmas līdz 22 mezgliem.
    en: |
      METAR wind format: [direction 3 digits]°[mean speed 2-3 digits]G[gusts]KT. 27012G22KT: 270° (west), mean 12 knots, gusting to 22 knots.
    ru: |
      Формат ветра METAR: [направление 3 цифры]°[средняя скорость 2-3 цифры]G[порывы]KT. 27012G22KT: 270° (запад), средняя 12 узлов, порывы до 22 узлов.
  distractorRationales:
    a:
      lv: 270 ir vēja virziens (grādos no ziemeļiem pulksteņa rādītāja virzienā), nevis attālums.
      en: 270 is the wind direction (degrees clockwise from north), not distance.
      ru: 270 — это направление ветра (градусы по часовой стрелке от севера), а не расстояние.
    c:
      lv: METAR nesatur "attāluma" laukus. 270 ir virziens grādos, 12 ir ātrums mezglos, 22 ir brāzmu ātrums mezglos.
      en: METAR does not contain "distance" fields. 270 is direction in degrees, 12 is speed in knots, 22 is gust speed in knots.
      ru: METAR не содержит поля «расстояния». 270 — направление в градусах, 12 — скорость в узлах, 22 — скорость порывов в узлах.
    d:
      lv: G nozīmē brāzmas — tas seko pēc vidējā ātruma. Brāzmas vienmēr ir augstākas par vidējo ātrumu.
      en: G stands for gusts — it follows the mean speed. Gusts are always higher than mean speed.
      ru: G означает порывы — следует после средней скорости. Порывы всегда выше средней скорости.
  sourceRef: "ICAO Annex 3 — Meteorological Service for International Air Navigation | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; METAR format"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — Meteorological Service for International Air Navigation; METAR format
- id: met-027
  stem:
    en: A small UAS is rated for 10 m/s wind. Before a coastal flight, the latest METAR shows 09008G18KT. What is the safest go/no-go decision?
    lv: Neliels UAS ir sertificēts vējam līdz 10 m/s. Pirms piekrastes lidojuma jaunākais METAR rāda 09008G18KT. Kāds ir drošākais lēmums lidot/nelidot?
    ru: Малый UAS рассчитан на ветер до 10 м/с. Перед полётом у побережья последний METAR показывает 09008G18KT. Какое самое безопасное решение go/no-go?
  options:
    - id: a
      text:
        lv: Jā, ja lidojums ir zem 50 m augstuma.
        en: Yes if the flight stays below 50 m altitude.
        ru: Да, если полёт остаётся ниже 50 м.
    - id: b
      text:
        lv: Jā — vidējais vējš (8 KT = 4,1 m/s) ir labi robežās.
        en: Yes — the mean wind (8 KT = 4.1 m/s) is well within limits.
        ru: Да — средний ветер (8 KT = 4,1 м/с) значительно в пределах нормы.
    - id: c
      text:
        lv: Nē — 18 KT ≈ 9,3 m/s pārsniedz 10 m/s limitu.
        en: No — 18 KT ≈ 9.3 m/s exceeds the 10 m/s limit.
        ru: Нет — 18 KT ≈ 9,3 м/с превышает предел 10 м/с.
    - id: d
      text:
        lv: Nē — brāzmas (18 KT ≈ 9,3 m/s) tuvojas 10 m/s limitam; drošāk atlikt.
        en: No — the gusts (18 KT ≈ 9.3 m/s) approach the 10 m/s limit; safer to postpone.
        ru: Нет — порывы (18 KT ≈ 9,3 м/с) приближаются к пределу 10 м/с; безопаснее отложить.
  correctOptionId: c
  explanation:
    lv: |
      18 KT × 0,514 ≈ 9,3 m/s. Tas NAV pārsniedzis 10 m/s limitu matemātiski, bet brāzmas ir pīķa slodzes, kas dronu spēj radikāli destabilizēt pat pie 9,3 m/s. Atbilde b ir piesardzīga (nenovērtē pīķus ienākošo slodžu dēļ), bet d ir precīzāka — 9,3 m/s ir ļoti tuvu 10 m/s, un jebkura papildu brāzma var pārsniegt. Pareizā atbilde ir d — 9,3 m/s ir nepieļaujami tuvu limitam.
    en: |
      18 KT × 0.514 ≈ 9.3 m/s. This does NOT technically exceed the 10 m/s limit, but at 9.3 m/s the drone is operating extremely close to its rated maximum. Any additional gust spike can exceed the limit. The safest answer is d — operating at 93% of the rated maximum in gusty conditions is not safe practice.
    ru: |
      18 KT × 0,514 ≈ 9,3 м/с. Технически это НЕ превышает предел 10 м/с, но при 9,3 м/с дрон работает крайне близко к расчётному максимуму. Любой дополнительный пик порыва может его превысить. Правильный ответ d — работа при 93% расчётного максимума в порывистых условиях не считается безопасной практикой.
  distractorRationales:
    a:
      lv: Augstums nemaina brāzmu slodzi. Gust novērtējums attiecas uz visu darbības diapazonu, ne tikai augstu augstumu.
      en: Altitude does not change the gust load. The gust rating applies to the full operating range, not only high altitudes.
      ru: Высота не изменяет нагрузку от порывов. Расчёт порывов применяется ко всему рабочему диапазону, а не только к большим высотам.
    b:
      lv: Vidējais vējš nenorāda pīķa slodzes — brāzmas ir pīķi. Pie 9,3 m/s brāzmām tuvumā pie 10 m/s limita drona vadāmības rezerve ir minimāla.
      en: Mean wind does not indicate peak loads — gusts are the peaks. At 9.3 m/s gusts close to the 10 m/s limit the drone's control margin is minimal.
      ru: Средний ветер не определяет пиковые нагрузки — порывы это и есть пики. При порывах 9,3 м/с близко к пределу 10 м/с запас управляемости дрона минимален.
    d:
      lv: Piesardzīgi pareizs — brāzmas 9,3 m/s ir bīstami tuvas 10 m/s maksimumam. Tomēr atbilde d ir precīzāka par to, ka 9,3 m/s ir pārāk tuvu.
      en: Cautiously correct — 9.3 m/s gusts are dangerously close to the 10 m/s maximum. However answer d is more precise that 9.3 m/s is too close.
      ru: "Осторожно правильно — порывы 9,3 м/с опасно близко к максимуму 10 м/с. Однако ответ d точнее: 9,3 м/с слишком близко."
  sourceRef: "EASA Easy Access Rules — AMC1 UAS.OPEN.030 | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; manufacturer wind rating standards"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; manufacturer wind rating standards
- id: met-028
  stem:
    en: A cumulonimbus cell is visible near the planned operating area, and the client asks for one short flight before rain arrives. What minimum separation should the pilot keep from the Cb cloud?
    lv: Plānotās darbības zonas tuvumā redzams cumulonimbus mākonis, un klients prasa īsu lidojumu pirms lietus. Kāda minimālā distance pilotam jāievēro no Cb mākoņa?
    ru: Рядом с планируемой зоной работы видна кучево-дождевая облачность, и клиент просит короткий полёт до дождя. Какую минимальную дистанцию пилот должен держать от Cb?
  options:
    - id: a
      text:
        lv: 20 km.
        en: 20 km.
        ru: 20 км.
    - id: b
      text:
        lv: 1 km.
        en: 1 km.
        ru: 1 км.
    - id: c
      text:
        lv: 5 km.
        en: 5 km.
        ru: 5 км.
    - id: d
      text:
        lv: 10 km.
        en: 10 km.
        ru: 10 км.
  correctOptionId: d
  explanation:
    lv: |
      Minimālais ieteicamais attālums no aktīva kumulonimba ir 10 km. Zibens izlādes diapazons, stipra turbulence un lielgabarīta krusu risks pastāv ievērojami tālu ārpus redzamā mākoņa robežas. 10 km ir minimums — jo tāk, jo drošāk.
    en: |
      The minimum recommended distance from an active cumulonimbus is 10 km. Lightning discharge range, severe turbulence, and large hail risk extend significantly beyond the visible cloud boundary. 10 km is the minimum — further is always safer.
    ru: |
      Минимальное рекомендуемое расстояние от активного кучево-дождевого — 10 км. Радиус молниевого разряда, сильная турбулентность и риск крупного града распространяются значительно за пределы видимых границ облака. 10 км — минимум, дальше — безопаснее.
  distractorRationales:
    a:
      lv: 20 km ir vēl drošāk, bet 10 km ir atzītais minimums. 20 km nav operatīvi obligāts.
      en: 20 km is even safer, but 10 km is the recognised minimum. 20 km is not operationally required.
      ru: 20 км ещё безопаснее, но 10 км — признанный минимум. 20 км оперативно не требуется.
    b:
      lv: 1 km atrodas tieši kumulonimba bīstamākajā zonā — turbulence, brāzmas un zibens var skart UAS.
      en: 1 km is directly in the most dangerous zone of a cumulonimbus — turbulence, gusts, and lightning can reach the UAS.
      ru: 1 км — прямо в самой опасной зоне кучево-дождевого. Турбулентность, порывы и молния могут поразить UAS.
    c:
      lv: 5 km nav pietiekams — zibens un stipra turbulence var sasniegt UAS šajā attālumā no Cb.
      en: 5 km is not sufficient — lightning and severe turbulence can reach the UAS at this distance from Cb.
      ru: 5 км недостаточно — молния и сильная турбулентность могут достичь UAS на этом расстоянии.
  sourceRef: "ICAO Doc 8896 — Manual of Aeronautical Meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; A2 syllabus meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a2-apakskategorijas-teoretisko-zinasanu-eksamens/"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Doc 8896 — Manual of Aeronautical Meteorology; A2 syllabus meteorology
- id: met-029
  stem:
    en: A pilot plans a low-level flight through damp air after sunrise. Which temperature and moisture combination creates a realistic propeller-icing risk?
    lv: Pilots pēc saullēkta plāno zema augstuma lidojumu mitrā gaisā. Kura temperatūras un mitruma kombinācija rada reālu propelleru apledojuma risku?
    ru: Пилот планирует низкий полёт во влажном воздухе после восхода. Какая комбинация температуры и влаги создаёт реальный риск обледенения пропеллеров?
  options:
    - id: a
      text:
        lv: Temperatūra +2°C, lidojums caur mākoni vai saldējoša migla.
        en: Temperature +2°C, flying through cloud or freezing drizzle.
        ru: Температура +2°C, полёт через облако или ледяная морось.
    - id: b
      text:
        lv: Temperatūra -5°C, sauss skaidrs gaiss.
        en: Temperature -5°C, dry clear air.
        ru: Температура -5°C, сухой чистый воздух.
    - id: c
      text:
        lv: Temperatūra +10°C, viegls lietus.
        en: Temperature +10°C, light rain.
        ru: Температура +10°C, лёгкий дождь.
    - id: d
      text:
        lv: Temperatūra +20°C, augsts mitrums.
        en: Temperature +20°C, high humidity.
        ru: Температура +20°C, высокая влажность.
  correctOptionId: a
  explanation:
    lv: |
      Apledojums prasa divus vienlaicīgus apstākļus: temperatūru tuvu vai zem 0°C UN redzamu mitrumu (mākoņu pilieni, saldējoša migla). +2°C mākonī pārsaldēti ūdens pilieni sasalst kontaktā ar propellera virsmu.
    en: |
      Icing requires two simultaneous conditions: temperature near or below 0°C AND visible moisture (cloud droplets, freezing drizzle). At +2°C in cloud, supercooled water droplets freeze on contact with the propeller surface.
    ru: |
      Обледенение требует двух одновременных условий: температуры около или ниже 0°C И видимой влаги (капли облака, ледяная морось). При +2°C в облаке переохлаждённые капли воды замерзают при контакте с поверхностью пропеллера.
  distractorRationales:
    b:
      lv: Auksta temperatūra vien nav pietiekama — apledojumam nepieciešami pārsaldēti ūdens pilieni (redzams mitrums). Sausam gaisam pie -5°C šādu pilienu nav.
      en: Cold temperature alone is not sufficient — icing requires supercooled water droplets (visible moisture). Dry air at -5°C contains no such droplets.
      ru: Только холодная температура недостаточна — для обледенения нужны переохлаждённые капли (видимая влага). Сухой воздух при -5°C их не содержит.
    c:
      lv: +10°C ūdens paliek šķidrs — lietus nogulsnējas uz propelleriem, bet nesasalst.
      en: At +10°C water remains liquid — rain deposits on propellers but does not freeze.
      ru: При +10°C вода остаётся жидкой — дождь осаждается на пропеллерах, но не замерзает.
    d:
      lv: +20°C ūdens ir šķidrs un nevar sasalt uz propellera virsmām.
      en: At +20°C water is liquid and cannot freeze on propeller surfaces.
      ru: При +20°C вода жидкая и не может замерзать на поверхностях пропеллеров.
  sourceRef: "ICAO Doc 8896 — aeronautical meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; A2 syllabus icing conditions | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a2-apakskategorijas-teoretisko-zinasanu-eksamens/"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Doc 8896 — aeronautical meteorology; A2 syllabus icing conditions
- id: met-030
  stem:
    en: The TAF for the nearest aerodrome includes TEMPO 1012/1014 29018G28KT during the intended operating window. What does that forecast element mean?
    lv: Tuvākās lidostas TAF paredzētajā darbības laikā satur TEMPO 1012/1014 29018G28KT. Ko nozīmē šis prognozes elements?
    ru: TAF ближайшего аэродрома на планируемое время работы содержит TEMPO 1012/1014 29018G28KT. Что означает этот элемент прогноза?
  options:
    - id: a
      text:
        lv: Vēja izmaiņas uz 290° no 10:12 līdz 10:14 pēcpusdienas vietējā laikā.
        en: Wind change to 290° from 10:12 to 10:14 afternoon local time.
        ru: Изменение ветра до 290° с 10:12 до 10:14 после полудня местного времени.
    - id: b
      text:
        lv: "Pagaidu apstākļi: vējš no 290° ar 18 mezgliem un brāzmām 28 mezgļi, kas ilgst starp 12:00–14:00 UTC."
        en: "Temporary conditions: wind from 290° at 18 knots, gusting 28 knots, occurring between 12:00–14:00 UTC."
        ru: "Временны́е условия: ветер с 290° 18 узлов, порывы 28 узлов, в период 12:00–14:00 UTC."
    - id: c
      text:
        lv: Pastāvīgs vējš 29018 mezgļi no 10. līdz 14. datumam.
        en: Permanent wind 29018 knots from the 10th to the 14th.
        ru: Постоянный ветер 29018 узлов с 10-го по 14-е.
    - id: d
      text:
        lv: Mainīgi vēji starp 290° un 180° ar ātrumu 28 mezgļi.
        en: Variable wind between 290° and 180° at 28 knots.
        ru: Переменный ветер между 290° и 180° со скоростью 28 узлов.
  correctOptionId: b
  explanation:
    lv: |
      TEMPO nozīmē pagaidu apstākļi — īslaicīgi apstākļi, kas ir gaidāmi, bet neturpinās vairāk kā pusi no norādītā perioda. 1012/1014 ir laika logs: 10. datuma 12:00 UTC līdz 10. datuma 14:00 UTC. 29018G28KT: vējš no 290° ar 18 mezgliem un brāzmām 28 mezgļi.
    en: |
      TEMPO means temporary conditions — conditions expected to occur but last less than half of the indicated period. 1012/1014 is the time window: 10th 12:00 UTC to 10th 14:00 UTC. 29018G28KT: wind from 290° at 18 knots, gusting 28 knots.
    ru: |
      TEMPO означает временны́е условия — условия, которые ожидаются, но продолжаются менее половины указанного периода. 1012/1014 — временно́е окно: 10-е 12:00 UTC до 10-е 14:00 UTC. 29018G28KT: ветер с 290° 18 узлов, порывы 28 узлов.
  distractorRationales:
    a:
      lv: DDHH/DDHH formāts TAF ir dienas (DD) un stundas (HH) UTC, nevis minūtes vai vietējais laiks.
      en: The DDHH/DDHH format in TAF is day (DD) and hour (HH) UTC, not minutes or local time.
      ru: Формат DDHH/DDHH в TAF — день (DD) и час (HH) UTC, а не минуты или местное время.
    c:
      lv: TEMPO nenorāda pastāvīgus apstākļus — tā ir pagaidu parādība. Skaitlis arī nav interpretējams kā vēja ātrums.
      en: TEMPO indicates temporary, not permanent, conditions. The numbers also cannot be read as continuous wind speed.
      ru: TEMPO означает временны́е, а не постоянные условия. Числа также нельзя читать как непрерывную скорость ветра.
    d:
      lv: 29018G28KT ir fiksēts vēja virziens (290°) ar ātrumu un brāzmām — nevis mainīgs starp diviem virzieniem.
      en: 29018G28KT is a fixed wind direction (290°) with speed and gusts — not variable between two directions.
      ru: 29018G28KT — фиксированное направление ветра (290°) со скоростью и порывами, а не переменное между двумя направлениями.
  sourceRef: "ICAO Annex 3 — TAF format | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; EASA meteorology module"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — TAF format; EASA meteorology module
- id: met-031
  stem:
    en: The mission is planned for 11:00. Current METAR is within limits, but the TAF has TEMPO 10:00-12:00 with gusts above the aircraft limit. What should the pilot do?
    lv: Misija plānota 11:00. Pašreizējais METAR ir limitos, bet TAF rāda TEMPO 10:00-12:00 ar brāzmām virs lidaparāta limita. Kā pilotam jārīkojas?
    ru: Миссия запланирована на 11:00. Текущий METAR в пределах лимитов, но TAF даёт TEMPO 10:00-12:00 с порывами выше лимита аппарата. Что должен сделать пилот?
  options:
    - id: a
      text:
        lv: Lidot zem 30 m augstuma, kur vējš parasti ir mazāks.
        en: Fly below 30 m altitude where wind is typically lower.
        ru: Лететь ниже 30 м, где ветер обычно слабее.
    - id: b
      text:
        lv: Lidot — pašreizējais METAR ir galvenais avots, TAF ir tikai prognoze.
        en: Fly — the current METAR is the primary source, TAF is only a forecast.
        ru: Лететь — текущий METAR является основным источником, TAF — только прогноз.
    - id: c
      text:
        lv: Pārcelt lidojumu uz laiku pēc 12:00 UTC, pārbaudot METAR apstiprinājumu.
        en: Reschedule to after 12:00 UTC, confirming with METAR at that time.
        ru: Перенести на после 12:00 UTC, подтвердив METAR в это время.
    - id: d
      text:
        lv: Lidot — TEMPO ir īss un iespējams nenotiks.
        en: Fly — TEMPO is brief and may not occur.
        ru: Лететь — TEMPO кратковременное и может не произойти.
  correctOptionId: c
  explanation:
    lv: |
      TAF TEMPO prognozē apstākļus, kas notiks plānotā lidojuma loga laikā. Kaut arī METAR pašlaik ir robežās, TEMPO norāda, ka apstākļi var kļūt bīstami jebkurā brīdī starp 10:00 un 12:00 UTC. Profesionālais padoms: pārcelt uz pēc 12:00 un apstiprināt ar tā brīža METAR.
    en: |
      The TAF TEMPO forecasts conditions that will occur during the planned flight window. Although the current METAR is within limits, TEMPO indicates conditions may become hazardous at any point between 10:00 and 12:00 UTC. Professional approach: reschedule to after 12:00 and confirm with the METAR at that time.
    ru: |
      TEMPO в TAF прогнозирует условия, которые произойдут в течение планового окна полёта. Хотя текущий METAR в пределах нормы, TEMPO указывает, что условия могут стать опасными в любой момент между 10:00 и 12:00 UTC. Профессиональный подход: перенести на после 12:00 и подтвердить METAR в это время.
  distractorRationales:
    a:
      lv: Vēja ātruma limiti attiecas uz visu darbības augstumu diapazonu, ne tikai augstu augstumu. Lidojums zem 30 m nelikvidē TAF TEMPO apstākļus.
      en: Wind speed limits apply to the full operating altitude range, not only high altitudes. Flying below 30 m does not negate the TAF TEMPO conditions.
      ru: Ветровые пределы применяются ко всему рабочему диапазону высот. Полёт ниже 30 м не устраняет условия TEMPO по TAF.
    b:
      lv: METAR rāda pašreizējos apstākļus; TAF prognozē nākotnes apstākļus. Abi jālasa. TEMPO prognoze plānotā logā ir derīgs drošības apsvērums.
      en: METAR shows current conditions; TAF forecasts future conditions. Both must be read. A TEMPO forecast within the planned window is a valid safety consideration.
      ru: METAR показывает текущие условия; TAF прогнозирует будущие. Оба нужно читать. TEMPO в плановом окне — обоснованное соображение безопасности.
    d:
      lv: Pat īslaicīgs pasliktinājums nav ignorējams, ja tas iekrīt tavā lidojuma logā un pārsniedz drona limitus.
      en: Even a temporary deterioration cannot be ignored if it overlaps your flight window and exceeds the aircraft limits.
      ru: Даже кратковременное ухудшение нельзя игнорировать, если оно попадает в окно полёта и превышает пределы аппарата.
  sourceRef: "EASA Easy Access Rules — AMC1 UAS.OPEN.030 | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; TAF interpretation"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; TAF interpretation
- id: met-032
  stem:
    en: On a hot, humid day, the drone feels sluggish even though the launch altitude is modest. Which statement best explains density altitude for UAS performance?
    lv: Karstā, mitrā dienā drons reaģē gausi, lai gan starta augstums nav liels. Kurš apgalvojums vislabāk skaidro density altitude ietekmi uz UAS veiktspēju?
    ru: В жаркий влажный день дрон ведёт себя вяло, хотя высота старта невелика. Какое утверждение лучше всего объясняет density altitude для характеристик UAS?
  options:
    - id: a
      text:
        lv: Faktiskais lidojuma augstums pār jūras līmeni.
        en: The actual flight altitude above sea level.
        ru: Фактическая высота полёта над уровнем моря.
    - id: b
      text:
        lv: Attālums no zemes, kuru drons var droši pārsniegt.
        en: The distance from the ground that the drone can safely exceed.
        ru: Расстояние от земли, которое дрон может безопасно превысить.
    - id: c
      text:
        lv: Minimālā drošā lidojuma augstums virs apdzīvotām zonām.
        en: The minimum safe flight altitude above populated areas.
        ru: Минимальная безопасная высота полёта над населёнными районами.
    - id: d
      text:
        lv: Gaisa blīvuma novērtējums, kas atspoguļo temperatūras, spiediena un mitruma ietekmi uz drona veiktspēju.
        en: An air density measure reflecting the effect of temperature, pressure, and humidity on drone performance.
        ru: Показатель плотности воздуха, отражающий влияние температуры, давления и влажности на характеристики дрона.
  correctOptionId: d
  explanation:
    lv: |
      Blīvuma augstums apvieno temperatūru, atmosfēras spiedienu un mitrumu, lai atspoguļotu efektīvo gaisa blīvumu, kurā drons darbojas. Augsts blīvuma augstums (karsts, zems spiediens) nozīmē mazāku gaisa blīvumu, mazāk pacēluma katrā propellera apgriezienā, lielāku baterijas patēriņu un samazinātu vēja pretestību.
    en: |
      Density altitude combines temperature, atmospheric pressure, and humidity to express the effective air density in which the drone is operating. High density altitude (hot, low pressure) means less dense air, less lift per propeller revolution, more battery consumption, and reduced wind resistance.
    ru: |
      Плотностная высота объединяет температуру, атмосферное давление и влажность для выражения эффективной плотности воздуха, в которой работает дрон. Высокая плотностная высота (жара, низкое давление) означает менее плотный воздух, меньше подъёмной силы на оборот, больше расхода аккумулятора и сниженную ветровую нагрузку.
  distractorRationales:
    a:
      lv: Augstums virs jūras līmeņa ir ģeogrāfisks fakts; blīvuma augstums ir fizisks gaisa blīvuma mērījums, kuru ietekmē arī temperatūra un spiediens.
      en: Altitude above sea level is a geographic fact; density altitude is a physical air density measure also influenced by temperature and pressure.
      ru: Высота над уровнем моря — географический факт; плотностная высота — физический показатель плотности воздуха, зависящий также от температуры и давления.
    b:
      lv: Drona maksimālais augstums ir noteikts regulā (120 m AGL Atvērtajā kategorijā); blīvuma augstums ir veiktspējas jēdziens, kas nav saistīts ar juridiskajiem augstuma limitiem.
      en: The drone's maximum altitude is set by regulation (120 m AGL in Open category); density altitude is a performance concept unrelated to legal altitude limits.
      ru: Максимальная высота дрона установлена правилами (120 м AGL в Открытой категории); плотностная высота — концепция характеристик, не связанная с юридическими пределами.
    c:
      lv: Minimālie augstumi virs apdzīvotām zonām ir tiesisks ierobežojums; blīvuma augstums ir meteoroloģisks veiktspējas faktors.
      en: Minimum altitudes above populated areas are a legal restriction; density altitude is a meteorological performance factor.
      ru: Минимальные высоты над населёнными районами — правовое ограничение; плотностная высота — метеорологический фактор характеристик.
  sourceRef: "EASA Easy Access Rules — AMC1 UAS.OPEN.030 | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; A2 syllabus meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a2-apakskategorijas-teoretisko-zinasanu-eksamens/"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; A2 syllabus meteorology
- id: met-033
  stem:
    en: The pilot wants a forecast product for the next operating window, not only the latest observation. How often is a standard TAF typically issued?
    lv: Pilotam vajadzīgs prognozes produkts nākamajam darbības logam, ne tikai pēdējais novērojums. Cik bieži parasti tiek izdots standarta TAF?
    ru: Пилоту нужен прогноз на следующее рабочее окно, а не только последнее наблюдение. Как часто обычно выпускается стандартный TAF?
  options:
    - id: a
      text:
        lv: Ik 6 stundas (0000, 0600, 1200, 1800 UTC).
        en: Every 6 hours (0000, 0600, 1200, 1800 UTC).
        ru: Каждые 6 часов (0000, 0600, 1200, 1800 UTC).
    - id: b
      text:
        lv: Vienu reizi dienā.
        en: Once a day.
        ru: Раз в сутки.
    - id: c
      text:
        lv: Ik 30 minūtes — tāpat kā METAR.
        en: Every 30 minutes — the same as METAR.
        ru: Каждые 30 минут — так же как METAR.
    - id: d
      text:
        lv: Ik 3 stundas.
        en: Every 3 hours.
        ru: Каждые 3 часа.
  correctOptionId: a
  explanation:
    lv: |
      TAF prognozes tiek publicētas četras reizes dienā UTC laika 0000, 0600, 1200 un 1800. Katra prognoze aptver 24–30 stundas. METAR tiek publicēts biežāk — parasti ik 30 vai 60 minūtes.
    en: |
      TAF forecasts are published four times per day at 0000, 0600, 1200, and 1800 UTC. Each forecast covers 24–30 hours. METAR is issued more frequently — typically every 30 or 60 minutes.
    ru: |
      Прогнозы TAF публикуются четыре раза в сутки в 0000, 0600, 1200 и 1800 UTC. Каждый прогноз охватывает 24–30 часов. METAR выпускается чаще — обычно каждые 30 или 60 минут.
  distractorRationales:
    b:
      lv: Viena TAF dienā nenodrošinātu pietiekamu precizitāti laika apstākļu prognozēšanai aviācijai — tiek publicēts četras reizes dienā.
      en: One TAF per day would not provide sufficient precision for aviation weather forecasting — it is published four times per day.
      ru: Один TAF в сутки не обеспечил бы достаточной точности авиационного прогноза — публикуется четыре раза в сутки.
    c:
      lv: METAR tiek publicēts ik 30–60 minūtes; TAF ir 6 stundu intervālos.
      en: METAR is published every 30–60 minutes; TAF is on 6-hour intervals.
      ru: METAR публикуется каждые 30–60 минут; TAF — с 6-часовыми интервалами.
    d:
      lv: 3 stundu intervāls ir SIGMET (nozīmīgu meteoroloģisko apstākļu informācija) publicēšanas biežums, nevis TAF.
      en: The 3-hour interval is the SIGMET (Significant Meteorological Information) update frequency, not TAF.
      ru: 3-часовой интервал — частота обновления SIGMET (сигнификантная метеорологическая информация), а не TAF.
  sourceRef: "ICAO Annex 3 — Meteorological Service for International Air Navigation | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; TAF issuance"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — Meteorological Service for International Air Navigation; TAF issuance
- id: met-034
  stem:
    lv: Pirms lidojuma pilots METAR redz kodu CAVOK. Ko tas nozīmē praktiskai laikapstākļu novērtēšanai?
    en: Before flight, the pilot sees CAVOK in a METAR. What does it mean for practical weather assessment?
    ru: Перед полётом пилот видит CAVOK в METAR. Что это означает для практической оценки погоды?
  options:
    - id: a
      text:
        lv: Celiņu un redzamību pārbauda — pagaidu ierobežojums lidostā.
        en: Runway and visibility check — temporary restriction at airport.
        ru: Проверка взлётной полосы и видимости — временное ограничение в аэропорту.
    - id: b
      text:
        lv: Mākļu zem 5000 pēdām nav, redzamība ≥ 10 km, nav nozīmīgu laika apstākļu apdraudējumu.
        en: No cloud below 5,000 ft, visibility ≥ 10 km, no significant weather hazards.
        ru: Нет облаков ниже 5000 футов, видимость ≥ 10 км, нет значительных погодных угроз.
    - id: c
      text:
        lv: Redzamība ir zem 1500 m.
        en: Visibility is below 1500 m.
        ru: Видимость ниже 1500 м.
    - id: d
      text:
        lv: Kumulonimbs tuvumā.
        en: Cumulonimbus nearby.
        ru: Кучево-дождевое поблизости.
  correctOptionId: b
  explanation:
    lv: |
      CAVOK (Ceiling And Visibility OK) nozīmē: redzamība ≥ 10 km, nav mākoņu zem 5000 pēdām (1500 m) vai zemāk par augstāko minimālo sektoru augstumu, un nav nozīmīgu laika apstākļu fenomenu. Lidotājiem tas ir labs laiks.
    en: |
      CAVOK (Ceiling And Visibility OK) means: visibility ≥ 10 km, no cloud below 5,000 ft (1,500 m) or below the highest minimum sector altitude, and no significant weather phenomena. For pilots this represents excellent conditions.
    ru: |
      CAVOK (Ceiling And Visibility OK) означает: видимость ≥ 10 км, нет облаков ниже 5000 футов (1500 м) или ниже минимальной высоты сектора, нет значительных метеорологических явлений. Для пилотов это отличные условия.
  distractorRationales:
    a:
      lv: CAVOK nav saistīts ar lidostas darbības ierobežojumiem. Tas ir standartizēts starptautisks kods labiem laika apstākļiem METAR.
      en: CAVOK is not related to airport operational restrictions. It is a standardised international code for good weather conditions in METAR.
      ru: CAVOK не связан с ограничениями работы аэропорта. Это стандартизированный международный код хороших условий в METAR.
    c:
      lv: Zema redzamība METAR tiek ziņota kā skaitliska vērtība metros vai kilometros — ne CAVOK, kas apzīmē labus apstākļus.
      en: Low visibility is reported in METAR as a numeric value in metres or kilometres — not CAVOK, which denotes good conditions.
      ru: Низкая видимость в METAR указывается числовым значением в метрах или километрах, а не CAVOK, который означает хорошие условия.
    d:
      lv: Kumulonimbs METAR tiek ziņots kā CB mākoņu veids (piem., FEW020CB). CAVOK nozīmē labus apstākļus — bez nozīmīgu laika apstākļu draudiem.
      en: Cumulonimbus in METAR is reported as CB cloud type (e.g. FEW020CB). CAVOK means good conditions — no significant weather hazards.
      ru: Кучево-дождевое в METAR сообщается как тип облаков CB (например, FEW020CB). CAVOK означает хорошие условия без значительных угроз.
  sourceRef: "ICAO Annex 3 — METAR | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; CAVOK definition"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — METAR; CAVOK definition
- id: met-035
  stem:
    lv: Pilots salīdzina METAR un TAF pirms došanās uz objektu. Kā pareizi novērtēt, vai prognozētā redzamība ir pietiekama VLOS lidojumam?
    en: A pilot compares METAR and TAF before leaving for the site. What is the correct way to judge whether forecast visibility is sufficient for a VLOS flight?
    ru: Пилот сравнивает METAR и TAF перед выездом на площадку. Как правильно оценить, достаточно ли прогнозируемой видимости для полёта VLOS?
  options:
    - id: a
      text:
        lv: Pietiek ar 500 m — ja drons nav tālāk par to.
        en: 500 m is enough as long as the drone stays inside that range.
        ru: Достаточно 500 м, если дрон не улетает дальше.
    - id: b
      text:
        lv: Latvijā VLOS ir likumīgs tikai no 3 km un vairāk.
        en: In Latvia, VLOS is legal only from 3 km visibility upward.
        ru: В Латвии VLOS законен только при видимости от 3 км и выше.
    - id: c
      text:
        lv: Jāvērtē, vai pilots ar neapbruņotu aci var nepārtraukti redzēt dronu, noteikt tā orientāciju un droši uzturēt VLOS plānotajā attālumā.
        en: Judge whether the pilot can keep continuous unaided visual contact, determine the drone’s attitude, and safely maintain VLOS at the planned range.
        ru: Нужно оценить, сможет ли пилот непрерывно видеть дрон невооружённым глазом, понимать его ориентацию и надёжно сохранять VLOS на планируемой дистанции.
    - id: d
      text:
        lv: Vajag tieši 10 km, jo tā ir vienīgā drošā VLOS redzamība.
        en: Exactly 10 km is required because that is the only safe VLOS visibility.
        ru: Нужны ровно 10 км, потому что только такая видимость безопасна для VLOS.
  correctOptionId: c
  explanation:
    lv: |
      VLOS prasība nav piesaistīta vienam kilometru skaitlim. Pareizais tests ir funkcionāls: vai pilots var nepārtraukti redzēt dronu ar neapbruņotu aci, noteikt tā stāvokli un laikus pamanīt konfliktus gaisā paredzētajā lidojuma profilā.
    en: |
      VLOS is not tied to a single legal visibility number. The correct test is functional: can the pilot continuously keep the drone in unaided visual contact, determine its attitude and direction, and scan the airspace in time for the planned flight profile.
    ru: |
      VLOS не привязан к одному юридическому числу километров. Правильный критерий — функциональный: может ли пилот непрерывно видеть дрон невооружённым глазом, понимать его положение и вовремя контролировать воздушную обстановку для запланированного профиля полёта.
  distractorRationales:
    a:
      lv: Fiksēts īss skaitlis pats par sevi neko negarantē — jāvērtē reālais attālums, fons, kontrasts un lidojuma profils.
      en: A short fixed number by itself guarantees nothing — the real test depends on range, background, contrast, and mission profile.
      ru: Короткое фиксированное число само по себе ничего не гарантирует — всё зависит от дистанции, фона, контраста и профиля полёта.
    b:
      lv: 3 km nav Latvijas “likumiskais minimums” VLOS lidojumiem.
      en: 3 km is not a Latvian legal minimum for VLOS operations.
      ru: 3 км — не установленный в Латвии юридический минимум для VLOS.
    d:
      lv: 10 km nav universāls obligāts slieksnis VLOS; svarīgs ir tas, vai konkrētajā misijā var droši uzturēt vizuālu kontaktu.
      en: 10 km is not a universal mandatory VLOS threshold; the issue is whether safe visual contact can be maintained for that mission.
      ru: 10 км — не универсальный обязательный порог для VLOS; важно, можно ли безопасно сохранять визуальный контакт в конкретной миссии.
  sourceRef: "Reg (EU) 2019/947 UAS.OPEN.060(3) | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; EASA AMC1 UAS.OPEN.060 VLOS | https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019R0947"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — Reg (EU) 2019/947 UAS.OPEN.060(3); EASA AMC1 UAS.OPEN.060 VLOS
- id: met-036
  stem:
    lv: METAR pie zemes rāda 5 m/s vēju, bet pilots plāno lidojumu 80 m AGL. Kāds ir drošākais plānošanas pieņēmums par vēju šajā augstumā?
    en: METAR shows 5 m/s wind at the surface, but the pilot plans to fly at 80 m AGL. What is the safest planning assumption about the wind at that height?
    ru: METAR показывает ветер 5 м/с у земли, но пилот планирует полёт на 80 м AGL. Какое допущение о ветре на этой высоте безопаснее всего?
  options:
    - id: a
      text:
        lv: 3–4 m/s — vējš samazinās ar augstumu pilsētā.
        en: 3–4 m/s — wind decreases with altitude in the city.
        ru: 3–4 м/с — ветер ослабевает с высотой в городе.
    - id: b
      text:
        lv: 10+ m/s — vējš dubultosies katrās 40 m.
        en: 10+ m/s — wind doubles every 40 m.
        ru: 10+ м/с — ветер удваивается каждые 40 м.
    - id: c
      text:
        lv: Tāpat 5 m/s — METAR mēra operatīvajā augstumā.
        en: The same 5 m/s — METAR measures at operational altitude.
        ru: Те же 5 м/с — METAR измеряет на рабочей высоте.
    - id: d
      text:
        lv: Vējš augstumā var būt stiprāks nekā pie virszemes, tāpēc jāatstāj rezerve un, ja iespējams, jāpārbauda prognozētais vējš 100 m augstumā.
        en: Wind aloft may be stronger than at the surface, so leave margin and, if available, check the forecast wind at 100 m.
        ru: На высоте ветер может быть сильнее, чем у земли, поэтому нужно оставлять запас и, если возможно, смотреть прогноз ветра на 100 м.
  correctOptionId: d
  explanation:
    lv: |
      METAR ir virszemes novērojums, nevis mērījums darba augstumā. Tuvu zemei berze bieži bremzē vēju, tāpēc augstāk tas var būt stiprāks. Drošā pieeja ir atstāt rezervi un izmantot prognozēto vēju darba augstumā, ja tāds ir pieejams.
    en: |
      METAR is a surface observation, not a measurement at operating height. Near the ground, friction often slows the wind, so it may be stronger aloft. The safe approach is to leave margin and use a forecast wind at operating height when one is available.
    ru: |
      METAR — это приземное наблюдение, а не измерение на рабочей высоте. У земли ветер часто тормозится трением, поэтому выше он может быть сильнее. Безопасный подход — оставлять запас и, если доступно, использовать прогноз ветра на рабочей высоте.
  distractorRationales:
    a:
      lv: Pieņēmums, ka vējš droši samazināsies, nav derīgs plānošanai.
      en: Assuming the wind will safely decrease with height is not sound planning.
      ru: Предполагать, что с высотой ветер надёжно ослабнет, нельзя.
    b:
      lv: Vienkārša “dubultošanās” formula nav uzticams vēja modelis.
      en: A simple “doubling” rule is not a reliable wind model.
      ru: Простое правило «удвоения» не считается надёжной моделью ветра.
    c:
      lv: METAR nemēra vēju darba augstumā; to nevar lasīt kā tiešu 80 m prognozi.
      en: METAR does not measure the wind at operating height; it cannot be treated as a direct 80 m forecast.
      ru: METAR не измеряет ветер на рабочей высоте; его нельзя считать прямым прогнозом для 80 м.
  sourceRef: "EASA Easy Access Rules — AMC1 UAS.OPEN.030 | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; wind profile standard atmosphere"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; wind profile standard atmosphere
- id: met-037
  stem:
    lv: Laikapstākļu plānošanas laikā pilotam jāizlemj, vai lidaparātam vēl būs pietiekama rezerve. Ko nozīmē TAF kods "BECMG 1022/1024 29018KT"?
    en: During weather planning, the pilot must decide whether the aircraft will still have enough margin. What does the TAF code "BECMG 1022/1024 29018KT" mean?
    ru: При погодном планировании пилот должен решить, останется ли у аппарата достаточный запас. Что означает код TAF «BECMG 1022/1024 29018KT»?
  options:
    - id: a
      text:
        lv: Pakāpeniskas izmaiņas no 22:00 līdz 24:00 UTC — finālais vējš 290°/18 KT.
        en: Gradual change from 22:00 to 24:00 UTC — final wind 290°/18 KT.
        ru: Постепенное изменение с 22:00 до 24:00 UTC — итоговый ветер 290°/18 KT.
    - id: b
      text:
        lv: Vējš momentāni mainīsies uz 290°/18 KT pulksten 22:00 UTC.
        en: Wind will instantly change to 290°/18 KT at 22:00 UTC.
        ru: Ветер мгновенно изменится до 290°/18 KT в 22:00 UTC.
    - id: c
      text:
        lv: Sākas uz 22 stundām laika apstākļu logs ar vēju 290°/18 KT.
        en: A 22-hour weather window with wind 290°/18 KT begins.
        ru: Начинается 22-часовое погодное окно с ветром 290°/18 KT.
    - id: d
      text:
        lv: Pagaidu vējš 290°/18 KT starp 22:00 un 24:00 UTC.
        en: Temporary wind 290°/18 KT between 22:00 and 24:00 UTC.
        ru: Временный ветер 290°/18 KT между 22:00 и 24:00 UTC.
  correctOptionId: a
  explanation:
    lv: |
      BECMG nozīmē pakāpeniskas, pastāvīgas izmaiņas sākas starp norādītajām stundām. 1022/1024 = 10. datums 22:00 UTC līdz 10. datums 24:00 UTC (= 11. datums 00:00 UTC). Pēc 24:00 UTC galīgais vējš ir 290°/18 KT. TEMPO ir pagaidu; BECMG ir pastāvīgas izmaiņas.
    en: |
      BECMG means gradual, permanent changes begin between the stated hours. 1022/1024 = 10th 22:00 UTC to 10th 24:00 UTC (= 11th 00:00 UTC). After 24:00 UTC the final wind is 290°/18 KT. TEMPO is temporary; BECMG is permanent change.
    ru: |
      BECMG означает постепенное, постоянное изменение, начинающееся в указанные часы. 1022/1024 = 10-е 22:00 UTC до 10-е 24:00 UTC (= 11-е 00:00 UTC). После 24:00 UTC итоговый ветер 290°/18 KT. TEMPO — временное; BECMG — постоянное изменение.
  distractorRationales:
    b:
      lv: FM (from) norāda tūlītējas izmaiņas noteiktā laikā. BECMG norāda pakāpeniskas izmaiņas noteiktā laika logā.
      en: FM (from) indicates instantaneous changes at a specific time. BECMG indicates gradual changes over a time window.
      ru: FM (from) указывает мгновенные изменения в конкретное время. BECMG указывает постепенные изменения в течение временно́го окна.
    c:
      lv: BECMG laika logs norāda izmaiņu periodu, nevis kopējo laika apstākļu ilgumu. 1022/1024 ir divu stundu izmaiņu periods, ne 22 stundu.
      en: The BECMG time window indicates the change period, not total weather duration. 1022/1024 is a 2-hour change period, not 22 hours.
      ru: Временно́е окно BECMG указывает период изменения, а не общую продолжительность погоды. 1022/1024 — 2-часовой период изменения, а не 22 часа.
    d:
      lv: Pagaidu apstākļi ir TEMPO; BECMG norāda pastāvīgas izmaiņas, kas saglabāsies arī pēc norādītā laika loga.
      en: Temporary conditions are indicated by TEMPO; BECMG indicates permanent changes that persist after the time window.
      ru: Временны́е условия обозначаются TEMPO; BECMG указывает постоянные изменения, сохраняющиеся после временно́го окна.
  sourceRef: "ICAO Annex 3 — TAF format | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; BECMG vs TEMPO vs FM"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — TAF format; BECMG vs TEMPO vs FM
- id: met-038
  stem:
    lv: Pilots salīdzina METAR un TAF pirms došanās uz objektu. Kāda mākoņu izohrona (kods) METAR norāda kumulonimbu?
    en: A pilot compares METAR and TAF before leaving for the site. Which cloud type code in METAR indicates a cumulonimbus?
    ru: Пилот сравнивает METAR и TAF перед выездом на площадку. Какой код типа облаков в METAR указывает на кучево-дождевое?
  options:
    - id: a
      text:
        lv: OVC — pārsegs.
        en: OVC — overcast.
        ru: OVC — сплошная.
    - id: b
      text:
        lv: CB — kumulonimbs, norādīts papildus mākoņu grupas koda aizmugurē.
        en: CB — cumulonimbus, appended after the cloud group code.
        ru: CB — кучево-дождевое, добавляется после кода группы облаков.
    - id: c
      text:
        lv: TCU — torējoše kumuluss.
        en: TCU — towering cumulus.
        ru: TCU — мощно-кучевое.
    - id: d
      text:
        lv: BKN — plaukumi.
        en: BKN — broken.
        ru: BKN — разорванная.
  correctOptionId: b
  explanation:
    lv: |
      Kumulonimbi METAR tiek norādīti ar "CB" sufiksu pēc mākoņu grupas koda. Piemērs: FEW010CB = daži kumulonimbi 1000 pēdu augstumā. TCU (torējoše kumuluss) ir atsevišķs kods, kas norāda attīstošus kumulusus — potenciālu Cb priekšteci.
    en: |
      Cumulonimbus clouds are indicated in METAR with the "CB" suffix after the cloud group code. Example: FEW010CB = few cumulonimbus at 1,000 ft. TCU (towering cumulus) is a separate code indicating developing cumulus — a potential Cb precursor.
    ru: |
      Кучево-дождевые в METAR указываются суффиксом «CB» после кода группы облаков. Пример: FEW010CB = незначительная кучево-дождевая облачность на 1000 футов. TCU (мощно-кучевое) — отдельный код, указывающий на развивающийся кумулюс — потенциальный предшественник Cb.
  distractorRationales:
    a:
      lv: OVC nozīmē "pārsegs" — 8 astotdaļas debesu pārklājuma. Tas ir pārklājuma daudzums, nevis mākoņu veids.
      en: OVC means "overcast" — 8 eighths cloud cover. It is a coverage amount, not a cloud type indicator.
      ru: OVC означает «сплошная» — 8 октантов покрова. Это количество покрова, а не тип облаков.
    c:
      lv: TCU (torējoše kumuluss) norāda attīstošos kumulusus, kas var izveidoties kumulonimbā — bet TCU pats nav kumulonimbs. Pieredzējušam pilotam TCU jāuzskata par brīdinājumu.
      en: TCU (towering cumulus) indicates developing cumulus that may become a cumulonimbus — but TCU itself is not a cumulonimbus. An experienced pilot treats TCU as a warning.
      ru: TCU (мощно-кучевое) указывает на развивающийся кумулюс, который может стать кучево-дождевым, но сам по себе им не считается. Опытный пилот воспринимает TCU как предупреждение.
    d:
      lv: BKN nozīmē "plaukumi" — 5–7 mākoņu astotdaļas debesu pārklājuma. Tas nenorāda mākoņu veidu.
      en: BKN means "broken" — 5–7 eighths cloud cover. It indicates coverage amount, not cloud type.
      ru: BKN означает «разорванная» — 5–7 октантов облачного покрова. Это указывает количество покрова, а не тип облаков.
  sourceRef: "ICAO Annex 3 — METAR cloud type codes | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; CB and TCU"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — METAR cloud type codes; CB and TCU
- id: met-039
  stem:
    lv: Laikapstākļi starta vietā izskatās pieņemami, bet prognozē ir ierobežojoša detaļa. Kāda ir temperatūras inversijas galvenā sekas UAS lidojumam?
    en: Weather at the launch point looks acceptable, but the forecast contains a limiting detail. What is the primary consequence of a temperature inversion for UAS operations?
    ru: Погода в точке старта выглядит приемлемой, но в прогнозе есть ограничивающая деталь. Каковы основные последствия температурной инверсии для полётов UAS?
  options:
    - id: a
      text:
        lv: Pastiprināts GPS signāls.
        en: Enhanced GPS signal.
        ru: Усиленный GPS-сигнал.
    - id: b
      text:
        lv: Automātiska VLOS paplašināšanās inversijas slāņa refleksijas dēļ.
        en: Automatic VLOS extension due to inversion layer reflections.
        ru: Автоматическое расширение VLOS из-за отражений инверсионного слоя.
    - id: c
      text:
        lv: Samazināta redzamība un miglājs pie virszemes; turbulence zem inversijas slāņa.
        en: Reduced visibility and haze at the surface; turbulence below the inversion layer.
        ru: Пониженная видимость и дымка у поверхности; турбулентность под инверсионным слоем.
    - id: d
      text:
        lv: Uzlabota drona veiktspēja augstumā.
        en: Improved drone performance at altitude.
        ru: Улучшенные характеристики дрона на высоте.
  correctOptionId: c
  explanation:
    lv: |
      Temperatūras inversija "iesloga" mitru, piesārņotu gaisu pie virszemes, kas samazina redzamību un var izraisīt miglu. Turklāt inversijas slānis darbojas kā "vāks", kas intensificē turbulenci zem tā — sevišķi termisko turbulenci no virszemes sildīšanas. Inversijas bieži novērojamas Latvijas rudenī un ziemā, no rīta.
    en: |
      A temperature inversion "traps" moist, polluted air at the surface, reducing visibility and potentially causing fog. Additionally the inversion layer acts as a "lid" that intensifies turbulence below it — especially thermal turbulence from surface heating. Inversions are common in Latvia in autumn and winter, in the morning.
    ru: |
      Температурная инверсия «задерживает» влажный, загрязнённый воздух у поверхности, снижая видимость и потенциально вызывая туман. Кроме того, инверсионный слой действует как «крышка», усиливающая турбулентность под ним — особенно термическую от нагрева поверхности. Инверсии часты в Латвии осенью и зимой, по утрам.
  distractorRationales:
    a:
      lv: Temperatūras inversija neietekmē GPS signālu tādā veidā, kas uzlabotu tā uztveri.
      en: Temperature inversion does not affect GPS signals in a way that would improve reception.
      ru: Температурная инверсия не влияет на GPS-сигналы так, чтобы улучшить приём.
    b:
      lv: VLOS ir vizuāla prasība — to ietekmē vidējā optiskā redzamība, nevis atmosfēras optiskās refleksijas.
      en: VLOS is a visual requirement — it is affected by ambient optical visibility, not atmospheric optical reflections.
      ru: VLOS — визуальное требование, зависящее от фактической оптической видимости, а не атмосферных отражений.
    d:
      lv: Temperatūras inversija samazina gaisa blīvumu augstumā, bet galvenais efekts ir redzamības samazināšanās un turbulence pie virszemes, nevis uzlabota veiktspēja.
      en: Temperature inversion does not improve drone performance at altitude — its primary effects are visibility reduction and turbulence at the surface level.
      ru: "Температурная инверсия не улучшает характеристики дрона на высоте — её основные эффекты: снижение видимости и турбулентность у поверхности."
  sourceRef: "EASA Easy Access Rules — AMC1 UAS.OPEN.030 | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; ICAO meteorology training"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; ICAO meteorology training
- id: met-040
  stem:
    lv: "Plānots lidojums virs piekrastes ezera vēsā rudens rītā: mitrs gaiss un +3 °C. Kas jāpārbauda papildus standarta laikapstākļu pārbaudei?"
    en: A flight is planned over a coastal lake on a cool autumn morning with damp air and +3°C. What should be checked in addition to the standard weather check?
    ru: "Полёт запланирован над прибрежным озером прохладным осенним утром: влажный воздух и +3 °C. Что нужно проверить дополнительно к стандартной погодной проверке?"
  options:
    - id: a
      text:
        lv: Nekas papildus — +3°C ir augstāk par 0°C, tāpēc apledojuma risks nav.
        en: Nothing additional — +3°C is above 0°C, so there is no icing risk.
        ru: Ничего дополнительного — +3°C выше 0°C, поэтому риска обледенения нет.
    - id: b
      text:
        lv: Lidostas laikapstākļi tuvumā.
        en: Nearby airport weather.
        ru: Погода ближайшего аэропорта.
    - id: c
      text:
        lv: NOTAM par ūdens sporta aktivitātēm.
        en: NOTAMs for water sports activities.
        ru: NOTAM для водных спортивных мероприятий.
    - id: d
      text:
        lv: Apledojuma risku — +3°C + augsts mitrums tuvu ūdenim var radīt apledojumu uz propelleriem.
        en: Icing risk — +3°C + high humidity near water can create propeller icing.
        ru: Риск обледенения — +3°C + высокая влажность у воды может вызвать обледенение пропеллеров.
  correctOptionId: d
  explanation:
    lv: |
      +3°C ar augstu mitrumu tuvu ūdens virsmai ir potenciāls apledojuma scenārijs. Ūdens var radīt zemtemperatūras gaisa slāni tieši virs virsmas, kas var pazemināt faktisko propellera kontakttemperatūru zem 0°C. Pārsaldētu ūdens pilienu klātbūtne miglā vai plānas mākonīšu veidās virs ezera var radīt apledojumu pat +3°C gaisa temperatūrā. Pārbaudīt augšzemes virszemes temperatūru un miglas ziņojumus pirms pacelšanās.
    en: |
      +3°C with high humidity near a water surface is a potential icing scenario. Water bodies can create a cold surface air layer directly above that can drive the actual propeller contact temperature below 0°C. Supercooled droplets in mist or thin cloud above the lake can cause icing even at +3°C ambient temperature. Check surface temperature and fog reports before departure.
    ru: |
      +3°C с высокой влажностью вблизи водной поверхности — потенциальный сценарий обледенения. Водоёмы могут создавать холодный приземный слой воздуха, снижающий фактическую контактную температуру пропеллера ниже 0°C. Переохлаждённые капли в дымке или тонкой облачности над озером могут вызывать обледенение даже при +3°C. Проверить приземную температуру и сообщения о тумане до взлёта.
  distractorRationales:
    a:
      lv: +3°C ir tuvu 0°C, un ūdens virsma var samazināt faktisko gaisa temperatūru zem 0°C tieši pie ezera. Apledojums iespējams pat pie +5°C pārsaldētu pilienu klātbūtnē.
      en: +3°C is close to 0°C, and the water surface can reduce the actual air temperature below 0°C right over the lake. Icing is possible even at +5°C in the presence of supercooled droplets.
      ru: +3°C близко к 0°C, и водная поверхность может снизить фактическую температуру воздуха ниже 0°C прямо над озером. Обледенение возможно даже при +5°C при наличии переохлаждённых капель.
    b:
      lv: Lidostas laika apstākļi ir daļa no standarta pārbaudes, nevis papildu apledojuma specifiska pārbaude.
      en: Nearby airport weather is part of the standard check, not an icing-specific additional check.
      ru: Погода ближайшего аэропорта — часть стандартной проверки, а не специфическая дополнительная проверка обледенения.
    c:
      lv: Ūdens sporta NOTAM var būt aktuāls par drošu attālumu, bet tas nav galvenais drošības apsvērums šajā situācijā — tā ir apledojuma riski.
      en: Water sports NOTAMs may be relevant for safe distances, but are not the primary safety consideration in this scenario — icing is.
      ru: NOTAM для водных видов спорта может влиять на безопасное расстояние, но в этом сценарии он не главный фактор безопасности — главный риск здесь обледенение.
  sourceRef: "ICAO Doc 8896 — icing conditions | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a1-a3-tiessaistes-apmacibu-kurss-un-eksamens/; A2 syllabus meteorology | https://droni.caa.gov.lv/talvadibas-pilotu-kvalifikacija/a2-apakskategorijas-teoretisko-zinasanu-eksamens/"
  difficulty: 4
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Doc 8896 — icing conditions; A2 syllabus meteorology
- id: met-041
  image: met-041-cumulonimbus.png
  imageAlt:
    lv: Kumulonimba mākonis ar laktas formas virsotni, kreisajā pusē ar augšupejošām un labajā pusē ar lejupejošām gaisa plūsmām, zibens zonu un stipru nokrišņu joslu.
    en: Cumulonimbus cloud with anvil top, updrafts on the left, downdrafts and heavy precipitation on the right, lightning zone in the centre.
    ru: Кучево-дождевое облако с наковальней, восходящие потоки слева, нисходящие и сильные осадки справа, зона молний в центре.
  stem:
    lv: Attēlā redzams mākoņa veids. Kāds ir galvenais risks drona ekspluatācijai pat 5 km attālumā no šī mākoņa?
    en: The image shows a cloud type. What is the primary risk to drone operations even at a distance of 5 km from this cloud?
    ru: На изображении показан тип облака. Какова основная опасность для дрона даже на расстоянии 5 км от этого облака?
  options:
    - id: a
      text:
        lv: Nav riska — 5 km ir drošs attālums.
        en: No risk — 5 km is a safe distance.
        ru: Никакой опасности — 5 км безопасное расстояние.
    - id: b
      text:
        lv: Stipra turbulence, lejupejošas plūsmas un brāzmas, kas var izplatīties tālu no mākoņa.
        en: Severe turbulence, downdrafts and gust fronts that can extend far from the cloud.
        ru: Сильная турбулентность, нисходящие потоки и шквалы, которые могут распространяться далеко от облака.
    - id: c
      text:
        lv: Tikai vāja lietusgāze, ja vējš pūš mākoņa virzienā.
        en: Only light drizzle if the wind blows from the cloud direction.
        ru: Только лёгкая морось, если ветер дует со стороны облака.
    - id: d
      text:
        lv: Uzlabota redzamība dēļ mitruma absorbcijas mākonī.
        en: Improved visibility due to moisture absorption inside the cloud.
        ru: Улучшенная видимость из-за поглощения влаги облаком.
  correctOptionId: b
  explanation:
    lv: |
      Kumulonimbs ir visbīstamākais mākoņu veids mazam UAS. Pat ja stiprās nokrišņu zonas vēl nav virs tevis, šāds mākonis var nest spēcīgas brāzmas, lejupejošas plūsmas un zibens risku arī attālumā. Pie 5 km konservatīvā atbilde ir nelidot.
    en: |
      A cumulonimbus is the most dangerous cloud type for a small UAS. Even if the heavy rain has not yet reached your position, it can still bring strong gusts, downdrafts and lightning risk at a distance. At 5 km the conservative answer is no-go.
    ru: |
      Кучево-дождевое облако — самый опасный тип облачности для малого UAS. Даже если сильные осадки ещё не дошли до площадки, такое облако может давать резкие порывы, нисходящие потоки и риск молнии на удалении. На 5 км консервативный ответ — не летать.
  distractorRationales:
    a:
      lv: 5 km no nobrieduša negaisa nav droša rezerve mazam dronam.
      en: 5 km is not a safe margin from a mature thunderstorm for a small drone.
      ru: 5 км от зрелой грозовой ячейки — не безопасный запас для малого дрона.
    c:
      lv: CB nekad neizraisa "vāju lietusgāzi" — tikai intensīvas nokrišņus, krusu, zibeni un brāzmas.
      en: A CB never produces "light drizzle" — only intense precipitation, hail, lightning and gusts.
      ru: CB никогда не даёт «лёгкую морось» — только интенсивные осадки, град, молнии и шквалы.
    d:
      lv: CB tuvumā redzamība dramatiski pasliktinās lietus un krusa dēļ, nevis uzlabojas.
      en: Visibility near a CB dramatically worsens due to rain and hail — it does not improve.
      ru: Вблизи CB видимость резко ухудшается из-за дождя и града, а не улучшается.
  sourceRef: "AMC1 UAS.OPEN.030 | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; meteorological hazards (cumulonimbus)"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — AMC1 UAS.OPEN.030; ICAO Doc 8896 — meteorological hazards (cumulonimbus)
- id: met-042
  image: met-042-cold-front.png
  imageAlt:
    lv: "Aukstās frontes šķērsgriezuma diagramma: aukstā gaisa masa kā ķīlis paceļ silto gaisa masu, izveidojoties kumulonimba mākoņiem virs frontes virsmas. Apakšā zilā līnija ar trijstūriem norāda frontes kustības virzienu."
    en: "Cross-section diagram of a cold front: cold air mass as a wedge lifting the warm air mass, forming cumulonimbus clouds above the front surface. A blue line with triangles at the bottom indicates the direction of motion."
    ru: "Поперечное сечение холодного фронта: холодная воздушная масса в виде клина поднимает тёплую воздушную массу, формируя кучево-дождевые облака над поверхностью фронта. Синяя линия с треугольниками внизу указывает направление движения."
  stem:
    lv: Attēlā redzams aukstās frontes šķērsgriezums. Kādi laikapstākļi visdrīzāk gaidāmi pēc tās pārejas pār jūsu lidojuma vietu?
    en: The image shows a cold-front cross-section. Which weather conditions are most likely after it passes over your flight location?
    ru: На изображении показано сечение холодного фронта. Какие погодные условия наиболее вероятны после его прохождения над местом полёта?
  options:
    - id: a
      text:
        lv: Strauja vēja virziena maiņa, brāzmas, īslaicīgas lietusgāzes vai krusa, pēc tam redzamība uzlabojas un temperatūra pazeminās.
        en: Sudden wind shift, gusts, brief heavy showers or hail, then improving visibility and lower temperature.
        ru: Резкая смена ветра, шквалы, кратковременные ливни или град, затем улучшение видимости и понижение температуры.
    - id: b
      text:
        lv: Vienmērīgs siltais lietus, kas turpinās 12–24 stundas.
        en: Steady warm rain lasting 12–24 hours.
        ru: Равномерный тёплый дождь, продолжающийся 12–24 часа.
    - id: c
      text:
        lv: Bezvēja apstākļi un dūmaka uz vairākām dienām.
        en: Calm windless conditions and haze for several days.
        ru: Безветренные условия и дымка на несколько дней.
    - id: d
      text:
        lv: Temperatūra paaugstinās par 10°C un mākoņi izklīst.
        en: Temperature rises by 10°C and clouds dissipate.
        ru: Температура поднимается на 10°C и облака рассеиваются.
  correctOptionId: a
  explanation:
    lv: |
      Aukstā fronte parasti nes strauju vēja maiņu, brāzmas, īslaicīgas spēcīgākas lietusgāzes vai krusu, bet pēc pārejas bieži ienāk vēsāks un skaidrāks gaiss. Dronu pilotam svarīgākais ir nelidot frontes pārejas laikā un pēc tās pārbaudīt, vai brāzmas tiešām ir mazinājušās.
    en: |
      A cold front often brings an abrupt wind shift, gusts, brief heavier showers or hail, followed by cooler and clearer air. For a drone pilot, the key point is not to launch through the frontal passage and to re-check gusts after it has moved through.
    ru: |
      Холодный фронт обычно приносит резкую смену ветра, порывы, кратковременные ливни или град, а после прохождения — более прохладный и часто более ясный воздух. Для пилота дрона главное — не пытаться лететь через проход фронта и после него заново проверить порывы.
  distractorRationales:
    b:
      lv: Vienmērīgs ilgstošs lietus ir raksturīgs siltajai frontei, nevis aukstajai.
      en: Steady prolonged rain is characteristic of a warm front, not a cold front.
      ru: Равномерный продолжительный дождь характерен для тёплого фронта, а не холодного.
    c:
      lv: Bezvēja apstākļi parasti seko augstspiediena rajonam, nevis aukstās frontes pārejai.
      en: Calm conditions typically follow a high-pressure system, not a cold-front passage.
      ru: Безветренные условия обычно следуют за антициклоном, а не за прохождением холодного фронта.
    d:
      lv: Aukstās frontes pārejas dēļ temperatūra pazeminās, nevis paaugstinās.
      en: Temperature drops after a cold-front passage, it does not rise.
      ru: После прохождения холодного фронта температура понижается, а не поднимается.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; fronts and air masses"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; ICAO Doc 8896 — fronts and air masses
- id: met-043
  image: met-043-isobars.png
  imageAlt:
    lv: 'Virszemes laikapstākļu karte ar izobārām: kreisajā pusē zema spiediena centrs (sarkans "L") ar vēja bultiņām pretpulksteņa virzienā, labajā pusē augsta spiediena centrs (zils "H") ar vēja bultiņām pulksteņa virzienā. Izobāras marķētas no 996 līdz 1028 hPa.'
    en: 'Surface weather map with isobars: a low-pressure centre (red "L") on the left with wind arrows curving counterclockwise, a high-pressure centre (blue "H") on the right with wind arrows curving clockwise. Isobars labelled from 996 to 1028 hPa.'
    ru: "Приземная карта погоды с изобарами: слева центр низкого давления (красный «L») со стрелками ветра против часовой стрелки, справа центр высокого давления (синий «H») со стрелками по часовой стрелке. Изобары размечены от 996 до 1028 гПа."
  stem:
    lv: Saskaņā ar laikapstākļu karti — kurā punktā ir prognozējams stiprāks vējš, un kāpēc?
    en: Based on the weather map — where would you expect stronger wind, and why?
    ru: По карте погоды — где будет более сильный ветер, и почему?
  options:
    - id: a
      text:
        lv: Pie "L" centra, jo zems spiediens vienmēr nozīmē stipru vēju.
        en: Near the "L" centre, because low pressure always means strong wind.
        ru: У центра «L», потому что низкое давление всегда означает сильный ветер.
    - id: b
      text:
        lv: Pie "L" centra, jo izobāras tur ir ciešāk kopā — lielāks spiediena gradients dod stiprāku vēju.
        en: Near the "L" centre, because the isobars are closer together there — a steeper pressure gradient produces stronger wind.
        ru: У центра «L», потому что изобары там расположены ближе друг к другу — крутой барический градиент даёт более сильный ветер.
    - id: c
      text:
        lv: Pie "H" centra, jo augsts spiediens izpūš gaisu ar lielu spēku.
        en: Near the "H" centre, because high pressure pushes air out with great force.
        ru: У центра «H», потому что высокое давление выталкивает воздух с большой силой.
    - id: d
      text:
        lv: Vējš ir vienāds visā kartē, jo izobāras parāda tikai spiedienu, nevis vēju.
        en: Wind is the same across the map, because isobars only show pressure, not wind.
        ru: Ветер одинаков на всей карте, потому что изобары показывают только давление, а не ветер.
  correctOptionId: b
  explanation:
    lv: |
      Vēja stiprums ir tieši proporcionāls spiediena gradientam — t.i., spiediena starpībai uz attāluma vienību. Kartē tas redzams kā izobāru "blīvums": ciešāk kopā izobāras = stiprāks vējs. Šajā kartē izobāras ap "L" ir ciešāk kopā (996, 1000, 1004 hPa tuvu viena otrai), tāpēc tur vējš ir stiprāks. Pie "H" izobāras ir tālāk viena no otras (1016, 1020, 1024, 1028 hPa izplatītas), tāpēc vējš ir vājāks. Kustības virzienu ziemeļu puslodē nosaka Koriolisa efekts: pretpulksteņa ap "L", pulksteņa ap "H".
    en: |
      Wind speed is directly proportional to the pressure gradient — i.e., the difference in pressure per unit distance. On a map this appears as isobar "spacing": closer isobars = stronger wind. In this map the isobars around "L" are closer together (996, 1000, 1004 hPa packed tightly), so wind is stronger there. Around "H" the isobars are further apart (1016, 1020, 1024, 1028 hPa spread out), so wind is weaker. The direction in the Northern Hemisphere is set by the Coriolis effect: counterclockwise around "L", clockwise around "H".
    ru: |
      Скорость ветра прямо пропорциональна барическому градиенту — разности давления на единицу расстояния. На карте это видно как «густота» изобар: чем ближе изобары, тем сильнее ветер. На этой карте вокруг «L» изобары расположены теснее (996, 1000, 1004 гПа близко друг к другу), поэтому ветер там сильнее. Вокруг «H» изобары разнесены (1016, 1020, 1024, 1028 гПа), поэтому ветер слабее. Направление в северном полушарии задаёт сила Кориолиса: против часовой стрелки вокруг «L», по часовой стрелке вокруг «H».
  distractorRationales:
    a:
      lv: Zems spiediens pats par sevi nenosaka vēja stiprumu — stiprumu nosaka spiediena gradients (izobāru blīvums).
      en: Low pressure alone does not determine wind speed — wind speed is determined by the pressure gradient (isobar spacing).
      ru: Низкое давление само по себе не определяет силу ветра — её определяет барический градиент (густота изобар).
    c:
      lv: Pie "H" centra izobāras ir tālāk viena no otras, tāpēc vējš tur ir vājāks, nevis stiprāks.
      en: Near the "H" centre, the isobars are spread out, so wind is weaker, not stronger.
      ru: У центра «H» изобары разнесены, поэтому ветер там слабее, а не сильнее.
    d:
      lv: Izobāras tieši nodod informāciju par vēja stiprumu un virzienu — to blīvums atspoguļo spiediena gradientu, kas dzen vēju.
      en: Isobars directly convey wind information — their spacing reflects the pressure gradient that drives the wind.
      ru: Изобары как раз показывают информацию о ветре — их густота отражает барический градиент, который и движет ветер.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; surface analysis charts"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: map
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; ICAO Doc 8896 — surface analysis charts
- id: met-044
  image: met-044-fog.png
  imageAlt:
    lv: Drons lido zemā augstumā tievā miglas slānī. Virs miglas slāņa skaidras debesis ar sauli. Redzamība miglā mazāk par 100 m, tālumā tikko saskatāmas pakalni un koki.
    en: A drone flying at low altitude in a thin fog layer. Above the fog layer there are clear skies with the sun. Visibility within the fog is less than 100 m; hills and trees are barely visible in the distance.
    ru: Дрон летит на низкой высоте в тонком слое тумана. Над слоем тумана — ясное небо с солнцем. Видимость в тумане менее 100 м; вдали едва различимы холмы и деревья.
  stem:
    lv: Pilots redz attēlā parādīto situāciju. Kuru EASA Open kategorijas pamatprasību šī operācija pārkāpj?
    en: A pilot is in the situation shown in the image. Which EASA Open-category core requirement does this operation violate?
    ru: Пилот находится в ситуации, показанной на изображении. Какое базовое требование EASA Open этот полёт нарушает?
  options:
    - id: a
      text:
        lv: Maksimālais augstums 120 m no zemes.
        en: Maximum altitude of 120 m above ground level.
        ru: Максимальная высота 120 м над землёй.
    - id: b
      text:
        lv: VLOS (Visual Line of Sight) — pilotam jāredz drons ar nepalielinātu redzi visā lidojuma laikā.
        en: VLOS (Visual Line of Sight) — the pilot must keep the drone visible with unaided vision at all times.
        ru: VLOS (Visual Line of Sight) — пилот должен видеть дрон невооружённым глазом на протяжении всего полёта.
    - id: c
      text:
        lv: Drona reģistrācija ar EASA.
        en: Drone registration with EASA.
        ru: Регистрация дрона в EASA.
    - id: d
      text:
        lv: Maksimālā droša attālums no cilvēkiem (30 m horizontāli).
        en: Maximum safe distance from people (30 m horizontal).
        ru: Максимальное безопасное расстояние от людей (30 м по горизонтали).
  correctOptionId: b
  explanation:
    lv: |
      EASA Open kategorija (Reg 2019/947, UAS.OPEN.060) pieprasa, lai pilots vai novērotājs vienmēr saglabā tiešu vizuālu kontaktu ar dronu ar nepalielinātu redzi (VLOS). Migla, kas samazina redzamību zem 100 m, padara to neiespējamu — drons attēlā jau ir grūti saskatāms. Šis ir VLOS pārkāpums, neatkarīgi no augstuma vai attāluma. Pirms lidojuma vienmēr pārbaudīt redzamību prognozes (METAR) un atturēties no lidojumiem miglā, sniegputenī, vai stiprā lietus.
    en: |
      EASA Open category (Reg 2019/947, UAS.OPEN.060) requires the pilot or observer to maintain continuous direct visual contact with the drone using unaided vision (VLOS). Fog reducing visibility below 100 m makes this impossible — the drone in the image is already hard to see. This violates VLOS regardless of altitude or distance. Always check visibility forecasts (METAR) before flight and refrain from flying in fog, snowfall, or heavy rain.
    ru: |
      Open-категория EASA (Reg 2019/947, UAS.OPEN.060) требует, чтобы пилот или наблюдатель постоянно сохранял прямой визуальный контакт с дроном невооружённым глазом (VLOS). Туман с видимостью менее 100 м делает это невозможным — дрон на изображении уже плохо различим. Это нарушение VLOS, независимо от высоты или расстояния. Всегда проверяйте прогноз видимости (METAR) перед полётом и не летайте в тумане, снегопаде или сильном дожде.
  distractorRationales:
    a:
      lv: 120 m augstuma limits ir spēkā, bet tas nav saistīts ar redzamības samazināšanos miglā. Galvenais pārkāpums šeit ir VLOS.
      en: The 120 m altitude limit applies, but is not related to reduced visibility from fog. The primary violation here is VLOS.
      ru: Лимит 120 м действует, но не связан со снижением видимости в тумане. Главное нарушение здесь — VLOS.
    c:
      lv: Drona reģistrācija ir administratīva prasība — tā nav saistīta ar redzamības apstākļiem.
      en: Drone registration is an administrative requirement — it is unrelated to visibility conditions.
      ru: Регистрация дрона — административное требование, не связанное с условиями видимости.
    d:
      lv: 30 m attālums no cilvēkiem A3 zonā ir spēkā, bet attēlā redzamā problēma ir tieši VLOS, nevis attālums no cilvēkiem.
      en: The 30 m distance from people in A3 applies, but the issue shown in the image is specifically VLOS, not horizontal distance from people.
      ru: Дистанция 30 м от людей в A3 действует, но проблема на изображении — именно VLOS, а не расстояние до людей.
  sourceRef: "Art. UAS.OPEN.060 | https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019R0947; VLOS definition | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: "docs/knowledge/eu-regulations/EU-2019-947-implementing-regulation-EN.pdf — Art. UAS.OPEN.060; docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — VLOS definition"
- id: met-045
  image: met-045-rotor.png
  imageAlt:
    lv: Vēja plūsma satriec šķērsli (ēku vai pakalnu) kreisajā pusē, izveidojot mehāniskās turbulences (rotora) zonu vēja virzienā lejup. Mazs drons rotora zonā ar brīdinājuma simbolu. Augšā gluda gaisa plūsma virs šķēršļa.
    en: Airflow hits an obstacle (a building or hill) on the left, creating a mechanical-turbulence (rotor) zone downwind. A small drone is shown in the rotor zone with a warning indicator. Smooth airflow continues above the obstacle.
    ru: Воздушный поток ударяется о препятствие (здание или холм) слева, образуя зону механической турбулентности (ротор) с подветренной стороны. Маленький дрон находится в зоне ротора с предупреждающим знаком. Над препятствием сохраняется ровный поток.
  stem:
    lv: Vējš pūš ar 15 kt. Saskaņā ar attēlu — kura zona ir visdrošākā lidojumam šādos apstākļos?
    en: The wind is blowing at 15 kt. According to the image — which zone is the safest for flight in such conditions?
    ru: Ветер дует со скоростью 15 узлов. Согласно изображению — какая зона самая безопасная для полёта в таких условиях?
  options:
    - id: a
      text:
        lv: Tieši aiz šķēršļa (rotora zonā) — šķērslis aizsedz no vēja.
        en: Directly behind the obstacle (in the rotor zone) — the obstacle shields from wind.
        ru: Прямо за препятствием (в зоне ротора) — препятствие защищает от ветра.
    - id: b
      text:
        lv: Augstu virs šķēršļa un skaidri ārpus pievēja rotora zonas — kur plūsma ir gludāka.
        en: High above the obstacle and clearly outside the lee rotor zone — where the airflow is smoother.
        ru: Высоко над препятствием и явно вне подветренной роторной зоны — там поток ровнее.
    - id: c
      text:
        lv: Šķēršļa pievēja pusē (no kuras puses pūš vējš), tikai pāris metru attālumā.
        en: On the windward side of the obstacle (the side the wind is coming from), only a few metres away.
        ru: С наветренной стороны препятствия (со стороны, откуда дует ветер), всего в нескольких метрах.
    - id: d
      text:
        lv: Tieši zem šķēršļa (ja tas ir pacelts virs zemes), kur vējš nesasniedz.
        en: Directly beneath the obstacle (if it is elevated above ground), where wind does not reach.
        ru: Прямо под препятствием (если оно приподнято над землёй), где ветер не достигает.
  correctOptionId: b
  explanation:
    lv: |
      Galvenā doma attēlā ir vienkārša: bīstamākā vieta ir tieši aiz šķēršļa, kur veidojas rotors un plūsma kļūst haotiska. No dotajām zonām drošākā ir augstāk un ārpus šīs turbulences, kur plūsma ir vienmērīgāka.
    en: |
      The key message in the diagram is simple: the most dangerous place is directly behind the obstacle, where the lee rotor forms and the airflow turns chaotic. Of the zones shown, the safest is above and clear of that turbulence.
    ru: |
      Главная мысль схемы проста: самое опасное место — сразу за препятствием, где формируется ротор и поток становится хаотичным. Из показанных зон безопаснее всего выше и вне этой турбулентной области.
  distractorRationales:
    a:
      lv: Tieši pretēji — tieši aiz šķēršļa ir rotora zona ar haotisku turbulenci, kas ir bīstamākā vieta lidojumam.
      en: Exactly the opposite — directly behind the obstacle is the rotor zone with chaotic turbulence, which is the most dangerous place to fly.
      ru: С точностью до наоборот — прямо за препятствием находится зона ротора с хаотичной турбулентностью, самое опасное место для полёта.
    c:
      lv: Pievēja pusē plūsma ir saspiesta un paātrināta, tas var izraisīt nestabilu lidojumu maziem droniem.
      en: On the windward side, the airflow is compressed and accelerated, which can cause unstable flight for small drones.
      ru: С наветренной стороны поток сжат и ускорен, что может привести к неустойчивости полёта малых дронов.
    d:
      lv: Pat ja šķērslis ir pacelts, vējš plūst ap to no visām pusēm, izveidojot turbulenci arī apakšā.
      en: Even if the obstacle is elevated, wind flows around it from all sides, creating turbulence underneath as well.
      ru: Даже если препятствие приподнято, ветер обтекает его со всех сторон, образуя турбулентность и снизу.
  sourceRef: "UAS.OPEN — environmental conditions | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; Pilot's Handbook of Aeronautical Knowledge, Ch. 12 (mechanical turbulence)"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS.OPEN — environmental conditions; FAA H-8083-25B — Pilot's Handbook of Aeronautical Knowledge, Ch. 12 (mechanical turbulence)
- id: met-046
  image: met-046-cumulus-humilis.png
  imageAlt:
    lv: Vairāki nelieli, izolēti pūkaini cumulus humilis mākoņi (labu laikapstākļu kumulusi) ar plakanu pamatu ~1500 m augstumā, zils debess starp tiem, saule pamatā redzama.
    en: A row of small, isolated, puffy cumulus humilis (fair-weather cumulus) clouds with flat bases at ~1500 m altitude, blue sky between them, sun visible.
    ru: Ряд небольших обособленных пухлых облаков cumulus humilis (кучевые ясной погоды) с плоским основанием на высоте ~1500 м, между ними синее небо, видно солнце.
  stem:
    lv: Attēlā redzams mākoņa veids. Ko tas norāda par lidojuma apstākļiem A1/A3 droniem?
    en: The image shows a cloud type. What does it indicate about flight conditions for an A1/A3 drone?
    ru: На изображении показан тип облака. О чём он говорит относительно условий полёта дрона A1/A3?
  options:
    - id: a
      text:
        lv: Stabili apstākļi un viegls termiskais aktivitātes līmenis — kopumā labi lidojuma apstākļi.
        en: Stable conditions with mild thermal activity — generally good flying conditions.
        ru: Стабильные условия и слабая термическая активность — в целом хорошие условия полёта.
    - id: b
      text:
        lv: Tūlītēja CB attīstība — drons jānolaiž.
        en: Imminent CB development — drone must land.
        ru: Скорое развитие CB — дрон должен сесть.
    - id: c
      text:
        lv: Stiprs vējš augstumā, tāpēc lidot nedrīkst.
        en: Strong wind aloft, flying is forbidden.
        ru: Сильный ветер на высоте, летать запрещено.
    - id: d
      text:
        lv: Apledojuma risks zem 200 m.
        en: Icing risk below 200 m.
        ru: Риск обледенения ниже 200 м.
  correctOptionId: a
  explanation:
    lv: |
      Cumulus humilis ("labu laikapstākļu" kumulusi) ir mazi, ar nelielu vertikālo attīstību un plakanu pamatu. Tie veidojas vidēji stabilā atmosfērā un norāda mērenu konvektīvo aktivitāti — bez stipras turbulences vai nokrišņiem. Pārbaudīt vēja prognozi un brāzmas, bet kopumā tie ir indikators labai lidojuma dienai.
    en: |
      Cumulus humilis ("fair-weather" cumulus) are small, with low vertical development and flat bases. They form in a moderately stable atmosphere and indicate mild convective activity — no severe turbulence or precipitation. Verify wind forecast and gusts, but overall they signal a good flying day.
    ru: |
      Cumulus humilis (кучевые «хорошей погоды») — небольшие, с малой вертикальной протяжённостью и плоским основанием. Образуются в умеренно устойчивой атмосфере и означают слабую конвективную активность — без сильной турбулентности или осадков. Проверить прогноз ветра и порывы, но в целом это признак хорошего лётного дня.
  distractorRationales:
    b:
      lv: Cumulus humilis nav CB. CB ir augsti, ar laktu un nokrišņu šaftu — vizuāli pavisam atšķirīgi.
      en: Cumulus humilis is not a CB. CB is tall with an anvil and rain shaft — visually very different.
      ru: Cumulus humilis — не CB. CB высокое, с наковальней и осадковым стволом — визуально очень разное.
    c:
      lv: Mākoņu forma neliecina par stipru vēju augstumā. Stipru vēju indikators ir lenticular vai cirrus uncinus.
      en: This cloud shape does not indicate strong wind aloft. Strong-wind indicators are lenticulars or cirrus uncinus.
      ru: Эта форма облаков не говорит о сильном ветре на высоте. Признаки сильного ветра — лентикулярные или cirrus uncinus.
    d:
      lv: Apledojuma risku nosaka temperatūra un mitrums, nevis mākoņu veids. Cumulus humilis pats par sevi nav apledojuma indikators.
      en: Icing risk is set by temperature and humidity, not by cloud type. Cumulus humilis itself is not an icing indicator.
      ru: Риск обледенения определяется температурой и влажностью, а не типом облака. Cumulus humilis сам по себе — не признак обледенения.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; cloud classification"
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; ICAO Doc 8896 — cloud classification
- id: met-047
  image: met-047-stratus.png
  imageAlt:
    lv: Plašs pelēks stratus mākoņu slānis pie virszemes (~200-400 m), kas pārklāj visu debesi, miglas/lietusgāzes hatching zem slāņa, ainavas elementi zem mākoņa neskaidri.
    en: Continuous grey stratus cloud layer at very low altitude (~200-400 m) covering the whole sky, mist/drizzle hatching under the layer, landscape barely visible.
    ru: Сплошной серый слой stratus у поверхности (~200-400 м) закрывающий всё небо, штриховка мороси под слоем, элементы пейзажа едва различимы.
  stem:
    lv: Pilots redz attēlā parādītos apstākļus. Vai šajā situācijā ir droši veikt A3 lidojumu?
    en: A pilot sees the conditions in the image. Is it safe to perform an A3 flight in this situation?
    ru: Пилот видит условия, показанные на изображении. Безопасно ли проводить полёт A3 в этой ситуации?
  options:
    - id: a
      text:
        lv: Jā, ja drons paliek zem mākoņiem.
        en: Yes, if the drone stays below the clouds.
        ru: Да, если дрон находится ниже облаков.
    - id: b
      text:
        lv: Nē — zema griestu, mitrums un slikta redzamība rada VLOS un apledojuma risku.
        en: No — low ceiling, humidity and poor visibility create VLOS and icing risks.
        ru: Нет — низкая нижняя граница, влажность и плохая видимость создают риски VLOS и обледенения.
    - id: c
      text:
        lv: Jā, jo stratus norāda stabilus apstākļus bez turbulences.
        en: Yes, because stratus indicates stable conditions without turbulence.
        ru: Да, потому что stratus означает стабильные условия без турбулентности.
    - id: d
      text:
        lv: Jā, ja izmanto FPV pārraidi attāluma pārvarēšanai.
        en: Yes, if using FPV transmission to extend range.
        ru: Да, если использовать FPV-передачу для увеличения дальности.
  correctOptionId: b
  explanation:
    lv: |
      Stratus ir zems, viendabīgs pelēks mākoņu slānis ar griestiem 200-400 m un bieži saistīts ar lietusgāzi, miglu un samazinātu redzamību. Pat ja drons paliek zem mākoņa, samazinātā horizontālā redzamība apdraud VLOS, un mitrums + zema temperatūra rada apledojuma risku uz propelleriem. FPV nav VLOS aizvietotājs — Open kategorijā tas nav atļauts bez novērotāja. Atturēties no lidojumiem stratus apstākļos.
    en: |
      Stratus is a low, uniform grey cloud layer with bases at 200-400 m, often associated with drizzle, mist, and reduced visibility. Even if the drone stays below the cloud, the reduced horizontal visibility threatens VLOS, and humidity + low temperature create propeller icing risk. FPV is not a VLOS substitute — in the Open category it is not allowed without an observer. Refrain from flying in stratus conditions.
    ru: |
      Stratus — низкий однородный серый слой облаков с основанием 200-400 м, часто сопровождается моросью, дымкой и сниженной видимостью. Даже если дрон ниже облаков, сниженная горизонтальная видимость угрожает VLOS, а влажность + низкая температура создают риск обледенения пропеллеров. FPV не заменяет VLOS — в категории Open это запрещено без наблюдателя. Воздержаться от полётов в условиях stratus.
  distractorRationales:
    a:
      lv: Pat zem mākoņa horizontālā redzamība bieži ir slikta — VLOS prasība var tikt pārkāpta.
      en: Even below the cloud, horizontal visibility is often poor — the VLOS requirement may be violated.
      ru: Даже под облаком горизонтальная видимость часто плохая — требование VLOS может нарушаться.
    c:
      lv: Stabilitāte nenozīmē drošību — stratus apstākļos galvenais risks ir redzamība un apledojums, nevis turbulence.
      en: Stability does not equal safety — in stratus the main risks are visibility and icing, not turbulence.
      ru: Стабильность не значит безопасность — в stratus главные риски это видимость и обледенение, а не турбулентность.
    d:
      lv: FPV bez novērotāja nav atļauts Open kategorijā — VLOS prasība paliek spēkā.
      en: FPV without an observer is not allowed in the Open category — the VLOS requirement still applies.
      ru: FPV без наблюдателя в категории Open не разрешён — требование VLOS остаётся.
  sourceRef: "UAS.OPEN.060 | https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019R0947; VLOS, FPV with observer | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: "docs/knowledge/eu-regulations/EU-2019-947-implementing-regulation-EN.pdf — UAS.OPEN.060; docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — VLOS, FPV with observer"
- id: met-048
  image: met-048-cirrus.png
  imageAlt:
    lv: Plāni, balti, šķietami matveida cirrus mākoņi augstu pie debess (~8-12 km augstumā), šķiedrainas joslas izliektas pār skaidri zilu debesi.
    en: Thin, white, hair-like cirrus clouds high in the sky (~8-12 km altitude), fibrous streaks arcing across a clear blue sky.
    ru: Тонкие, белые, словно волосовидные облака cirrus высоко в небе (~8-12 км), волокнистые полосы дугами по ясному синему небу.
  stem:
    lv: Pilots redz attēlā parādīto mākoņu veidu. Kā tie ietekmē plānoto A1/A3 dronu lidojumu?
    en: A pilot sees the cloud type shown in the image. How do they affect a planned A1/A3 drone flight?
    ru: Пилот видит тип облаков на изображении. Как они влияют на запланированный полёт дрона A1/A3?
  options:
    - id: a
      text:
        lv: Stipra turbulence drona augstumā — lidojums jāatceļ.
        en: Severe turbulence at drone altitude — flight must be cancelled.
        ru: Сильная турбулентность на высоте дрона — полёт нужно отменить.
    - id: b
      text:
        lv: Apledojuma risks droniem zem 50 m.
        en: Icing risk for drones below 50 m.
        ru: Риск обледенения для дронов ниже 50 м.
    - id: c
      text:
        lv: Nekādi tieši — cirrus ir 8-12 km augstumā, dziļi virs drona darbības zonas. Tomēr tie var liecināt par tuvojošos siltu fronti tuvākajās 24 stundās.
        en: No direct effect — cirrus is at 8-12 km altitude, well above drone operating range. However, they may signal an approaching warm front within the next 24 hours.
        ru: Никак напрямую — cirrus на высоте 8-12 км, значительно выше зоны работы дрона. Но они могут указывать на приближающийся тёплый фронт в ближайшие 24 часа.
    - id: d
      text:
        lv: GPS signāla zudums cirrus ledus kristālu dēļ.
        en: GPS signal loss due to cirrus ice crystals.
        ru: Потеря GPS-сигнала из-за ледяных кристаллов cirrus.
  correctOptionId: c
  explanation:
    lv: |
      Cirrus ir augsto mākoņu (vairāk nekā 6-8 km) ledus kristālu mākoņi, kas neietekmē drona apstākļus tieši — tie ir daudz augstāk par 120 m Open kategorijas limitu. Tomēr cirrus klāsts, kas pakāpeniski sabiezē par cirrostratus, ir klasiska zīme siltas frontes tuvošanai, ar uzlabotām lietusgāzēm 12-24 stundās. Tā ir noderīga prognozes informācija, bet ne tūlītējs lidojuma drauds.
    en: |
      Cirrus are high-altitude (above 6-8 km) ice-crystal clouds that do not affect drone conditions directly — they are far above the 120 m Open-category ceiling. However, a cirrus cover gradually thickening to cirrostratus is a classic sign of an approaching warm front, with light precipitation in 12-24 hours. This is useful forecast information, not an immediate flight threat.
    ru: |
      Cirrus — облака больших высот (выше 6-8 км) из ледяных кристаллов, которые напрямую не влияют на дрон — они значительно выше потолка 120 м для категории Open. Однако постепенно густеющий покров cirrus, переходящий в cirrostratus — классический признак приближающегося тёплого фронта со слабыми осадками через 12-24 часа. Это полезная прогнозная информация, но не непосредственная угроза полёту.
  distractorRationales:
    a:
      lv: Cirrus pats par sevi neizraisa turbulenci drona augstumā. Drons darbojas tūkstošiem metru zem cirrus.
      en: Cirrus itself does not cause turbulence at drone altitude. The drone operates thousands of metres below cirrus.
      ru: Cirrus сам по себе не вызывает турбулентность на высоте дрона. Дрон работает на тысячи метров ниже cirrus.
    b:
      lv: Apledojumu nosaka temperatūra un mitrums drona augstumā, nevis cirrus klātbūtne.
      en: Icing is determined by temperature and humidity at the drone altitude, not by cirrus presence.
      ru: Обледенение определяется температурой и влажностью на высоте дрона, а не наличием cirrus.
    d:
      lv: GPS signāls neuztver nekādu ietekmi no cirrus ledus kristāliem.
      en: GPS signal is not affected by cirrus ice crystals.
      ru: GPS-сигнал не подвержен влиянию ледяных кристаллов cirrus.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; cloud classification and frontal indicators"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: factual
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; ICAO Doc 8896 — cloud classification and frontal indicators
- id: met-049
  image: met-049-lenticular.png
  imageAlt:
    lv: Augsts kalns ar stipriem horizontāliem vēja arrows pār to; vēja virzienā lejā no virsotnes — sērija gludu, lēcas formas (lenticular) mākoņu, kas norāda kalna viļņa modeļa virsotnes.
    en: Tall mountain with strong horizontal wind arrows over it; downwind of the peak, a series of smooth lens-shaped (lenticular) clouds marking the crests of a mountain-wave pattern.
    ru: Высокая гора с сильными горизонтальными стрелками ветра над ней; с подветренной стороны вершины — серия гладких линзовидных (lenticular) облаков, отмечающих гребни картины горной волны.
  stem:
    lv: Pilots redz attēlā parādīto mākoņu veidu virs kalna. Ko tas norāda par lidojuma apstākļiem šajā reģionā?
    en: A pilot sees the cloud type in the image over a mountain. What does it indicate about flight conditions in this area?
    ru: Пилот видит тип облаков на изображении над горой. О чём он говорит относительно условий полёта в этом регионе?
  options:
    - id: a
      text:
        lv: Klusi, stabili apstākļi — labi lidojuma apstākļi.
        en: Calm, stable conditions — good flying conditions.
        ru: Тихие, стабильные условия — хорошие условия полёта.
    - id: b
      text:
        lv: Tuvojas miglas slānis — VLOS bojāts.
        en: Approaching fog layer — VLOS compromised.
        ru: Приближается слой тумана — VLOS под угрозой.
    - id: c
      text:
        lv: CB tuvumā — gaidāms zibens.
        en: Nearby CB — lightning expected.
        ru: Поблизости CB — ожидаются молнии.
    - id: d
      text:
        lv: Stipri vēji augstumā un smaga turbulence kalna vēja pusē — augsts risks droniem.
        en: Strong wind aloft and severe turbulence on the lee side of the mountain — high risk for drones.
        ru: Сильный ветер на высоте и тяжёлая турбулентность с подветренной стороны горы — высокий риск для дронов.
  correctOptionId: d
  explanation:
    lv: |
      Lenticulāri (lēcas formas) mākoņi veidojas kalna viļņa (mountain wave) sistēmas virsotnēs, kad stiprs vējš (parasti virs 25 kt) pūš pār kalnu. Lai gan pati lenticulāri ir gludi, telpa zem un starp tiem satur smagu turbulenci — sevišķi rotora zonā tieši aiz kalna. Tā ir klasiska brīdinājuma zīme aviācijai: lidojums kalna vēja pusē ar lenticulāriem ir augsta riska. Droniem — atturēties no lidojumiem šādos apstākļos.
    en: |
      Lenticular (lens-shaped) clouds form at the crests of a mountain-wave system when strong winds (typically > 25 kt) blow over a mountain. Although the lenticulars themselves are smooth, the space below and between them contains severe turbulence — especially in the rotor zone directly behind the mountain. This is a classic warning sign in aviation: flying on the lee side of a mountain with lenticulars is high-risk. For drones — refrain from operating in such conditions.
    ru: |
      Линзовидные (lenticular) облака формируются на гребнях системы горной волны, когда сильный ветер (обычно > 25 узлов) дует над горой. Хотя сами lenticular гладкие, пространство под ними и между ними содержит тяжёлую турбулентность — особенно в зоне ротора непосредственно за горой. Это классический предупреждающий знак авиации: полёт с подветренной стороны горы с lenticular — высокого риска. Для дронов — воздержаться от полётов в таких условиях.
  distractorRationales:
    a:
      lv: Lenticulāri vizuāli gludi, bet tie veidojas tikai stipra vēja un ievērojamas turbulences apstākļos — tas nav stabils laiks.
      en: Lenticulars look smooth, but they only form in strong-wind and significant-turbulence conditions — that is not stable weather.
      ru: Lenticular выглядят гладкими, но образуются только в условиях сильного ветра и значительной турбулентности — это не стабильная погода.
    b:
      lv: Lenticulāri nav miglas indikators. Migla veidojas pie virszemes, lenticulāri — kalna viļņa virsotnēs.
      en: Lenticulars are not a fog indicator. Fog forms at the surface; lenticulars at mountain-wave crests.
      ru: Lenticular не индикатор тумана. Туман образуется у поверхности, lenticular — на гребнях горной волны.
    c:
      lv: Lenticulāri nav CB tuvuma zīme. CB indikatori ir lielie vertikālie kumulusi ar laktu.
      en: Lenticulars are not a sign of nearby CB. CB indicators are large vertical cumulus with anvils.
      ru: Lenticular — не признак близкого CB. Признаки CB — большие вертикальные кучевые с наковальнями.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; mountain wave hazards"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; FAA H-8083-25B Ch. 12 — mountain wave hazards
- id: met-050
  image: met-050-altostratus.png
  imageAlt:
    lv: Viendabīgs pelēks-zilgans altostratus mākoņu slānis, kas pārklāj visu augšējo debesi ~3-5 km augstumā. Saule redzama caur to kā vāji difūzs disks ("ūdens" sauls efekts). Zem mākoņa — viegls nokrišņu hatching.
    en: A uniform grey-blue altostratus cloud layer covering the whole upper sky at ~3-5 km altitude. The sun is visible through it as a faint diffuse disc ("watery sun" effect). Below the cloud, light precipitation hatching.
    ru: Однородный серо-голубой слой altostratus на высоте ~3-5 км, закрывающий всё верхнее небо. Солнце видно сквозь него как слабый рассеянный диск (эффект «водянистого солнца»). Под облаком — лёгкая штриховка осадков.
  stem:
    lv: Pilots redz attēlā parādīto mākoņu veidu ar "ūdens" saules efektu. Ko tas norāda par tuvākajām 12-24 stundām?
    en: A pilot sees the cloud type in the image with a "watery sun" effect. What does it indicate about the next 12-24 hours?
    ru: Пилот видит тип облаков с эффектом «водянистого солнца». О чём это говорит на ближайшие 12-24 часа?
  options:
    - id: a
      text:
        lv: Sāksies bezmākoņu apstākļi.
        en: Cloud-free conditions will set in.
        ru: Наступят безоблачные условия.
    - id: b
      text:
        lv: Tuvojas siltā fronte — gaidāmi stabili nokrišņi un pasliktinās redzamība.
        en: A warm front is approaching — steady precipitation and worsening visibility are expected.
        ru: Приближается тёплый фронт — ожидаются устойчивые осадки и ухудшение видимости.
    - id: c
      text:
        lv: Apstākļi paliek nemainīgi visu nedēļu.
        en: Conditions will remain unchanged for the whole week.
        ru: Условия останутся неизменными всю неделю.
    - id: d
      text:
        lv: Tuvojas spēcīga aukstā fronte ar krusu.
        en: A strong cold front with hail is approaching.
        ru: Приближается сильный холодный фронт с градом.
  correctOptionId: b
  explanation:
    lv: |
      Altostratus ar "ūdens" saules efektu ir klasiska siltas frontes tuvošanās zīme. Mākoņu slāņi pakāpeniski sabiezē — sākumā cirrus, tad cirrostratus, pēc tam altostratus, beidzot nimbostratus. Altostratus stadijā parasti paliek 6-12 stundas līdz stabilai lietusgāzei un mākoņu pamats nokrītas. Plānot lidojumus laikā, kad cirrus parādās — pirms altostratus.
    en: |
      Altostratus with the "watery sun" effect is a classic sign of an approaching warm front. The cloud layers thicken progressively — first cirrus, then cirrostratus, then altostratus, finally nimbostratus. The altostratus stage typically lasts 6-12 hours before steady drizzle starts and the cloud base drops. Plan flights for when cirrus first appears — before altostratus arrives.
    ru: |
      Altostratus с эффектом «водянистого солнца» — классический признак приближения тёплого фронта. Слои облаков постепенно густеют: сначала cirrus, затем cirrostratus, потом altostratus, наконец nimbostratus. Стадия altostratus обычно длится 6-12 часов до устойчивой мороси и снижения нижней границы. Планировать полёты на время появления cirrus — до altostratus.
  distractorRationales:
    a:
      lv: Altostratus nav bezmākoņu apstākļu indikators — tieši pretēji, gaidāms vēl vairāk mākoņu un nokrišņi.
      en: Altostratus is not a sign of cloud-free weather — on the contrary, more clouds and precipitation are coming.
      ru: Altostratus не признак безоблачной погоды — наоборот, ожидается ещё больше облаков и осадки.
    c:
      lv: Altostratus ir frontes pārejas zīme — apstākļi mainās, nevis paliek nemainīgi.
      en: Altostratus is a sign of frontal passage — conditions change, not stay the same.
      ru: Altostratus — признак прохождения фронта, условия меняются, а не остаются прежними.
    d:
      lv: Aukstu fronti raksturo strauja kumulonimba attīstība un brāzmas, nevis altostratus klāsts.
      en: Cold fronts are characterised by rapid cumulonimbus development and gusts, not an altostratus cover.
      ru: Холодные фронты характеризуются быстрым развитием cumulonimbus и шквалами, а не покровом altostratus.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; warm-front cloud sequence"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; ICAO Doc 8896 — warm-front cloud sequence
- id: met-051
  image: met-051-warm-front.png
  imageAlt:
    lv: "Siltās frontes šķērsgriezums: maigs sekls siltā gaisa ķīlis, kas paceļas pār aukstā gaisa masu. Mākoņu sērija no labās uz kreiso: cirrus, cirrostratus, altostratus, nimbostratus ar stabilu lietusgāzi."
    en: "Cross-section of a warm front: a gentle shallow wedge of warm air rising over a cold air mass. Cloud sequence from right to left: cirrus, cirrostratus, altostratus, nimbostratus with steady drizzle."
    ru: "Поперечное сечение тёплого фронта: пологий клин тёплого воздуха, поднимающийся над холодной воздушной массой. Последовательность облаков справа налево: cirrus, cirrostratus, altostratus, nimbostratus с устойчивой моросью."
  stem:
    lv: Saskaņā ar attēlu — kāda ir siltās frontes pārejas laika tipiskā iezīme, kas atšķir to no aukstās frontes?
    en: According to the image — what typical feature of a warm-front passage distinguishes it from a cold front?
    ru: Согласно изображению — какой типичный признак прохождения тёплого фронта отличает его от холодного?
  options:
    - id: a
      text:
        lv: Stiprā brāzma 30-50 kt un krusas lietus.
        en: Strong 30-50 kt gusts and hail showers.
        ru: Сильные порывы 30-50 узлов и град.
    - id: b
      text:
        lv: Klaja debess un saule, kas turpinās 24 stundas.
        en: Clear sky and sun lasting 24 hours.
        ru: Ясное небо и солнце на 24 часа.
    - id: c
      text:
        lv: Lēnāka pāreja (12-24 stundas), pakāpeniski mākoņi (cirrus → nimbostratus) un stabili nokrišņi, nevis īsa, vardarbīga.
        en: A slower passage (12-24 hours), gradual cloud sequence (cirrus → nimbostratus) and steady precipitation, not a short and violent event.
        ru: Более медленное прохождение (12-24 часа), постепенная последовательность облаков (cirrus → nimbostratus) и устойчивые осадки, а не короткое и бурное событие.
    - id: d
      text:
        lv: Strauja temperatūras pazemināšanās par 10°C dažu minūšu laikā.
        en: Sudden temperature drop by 10°C within minutes.
        ru: Резкое падение температуры на 10°C за минуты.
  correctOptionId: c
  explanation:
    lv: |
      Siltā fronte kustas lēnāk (~15-25 km/h) un ar maigāku slīpumu nekā aukstā fronte. Tās tuvošanos var paredzēt 12-24 stundas iepriekš, sākot ar cirrus, tad cirrostratus, altostratus, beidzot nimbostratus ar stabilu lietusgāzi. Pretstatā aukstajai frontei, kura iziet 1-3 stundās ar brāzmām un krusas lietu. Droniem — siltā frontē galvenais risks ir zems mākoņu griestu un samazināta redzamība, nevis brāzmas.
    en: |
      A warm front moves more slowly (~15-25 km/h) and with a shallower slope than a cold front. Its approach can be forecast 12-24 hours ahead, starting with cirrus, then cirrostratus, altostratus, finally nimbostratus with steady drizzle. In contrast, a cold front passes in 1-3 hours with gusts and hail. For drones, the main risk during a warm front is low ceiling and reduced visibility, not gusts.
    ru: |
      Тёплый фронт движется медленнее (~15-25 км/ч) и с более пологим наклоном, чем холодный. Его приближение можно предсказать за 12-24 часа: сначала cirrus, затем cirrostratus, altostratus, наконец nimbostratus с устойчивой моросью. В отличие от холодного, который проходит за 1-3 часа со шквалами и градом. Для дронов главный риск тёплого фронта — низкая нижняя граница и сниженная видимость, а не шквалы.
  distractorRationales:
    a:
      lv: Brāzmas un krusas lietus ir aukstās frontes iezīmes, nevis siltās.
      en: Gusts and hail are features of a cold front, not a warm one.
      ru: Шквалы и град — признаки холодного фронта, а не тёплого.
    d:
      lv: Strauja temperatūras pazemināšanās ir aukstās frontes iezīme. Siltā fronte ceļ temperatūru lēni.
      en: A sudden temperature drop is a cold-front feature. A warm front raises temperature slowly.
      ru: Резкое падение температуры — признак холодного фронта. Тёплый фронт медленно повышает температуру.
    b:
      lv: Klaja debess seko aukstās frontes pārejai. Siltā frontē mākoņi paliek vairākas stundas.
      en: Clear skies follow a cold-front passage. In a warm front the clouds persist for many hours.
      ru: Ясное небо наступает после холодного фронта. При тёплом фронте облака сохраняются часами.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; fronts and air masses"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: factual
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; ICAO Doc 8896 — fronts and air masses
- id: met-052
  image: met-052-occluded-front.png
  imageAlt:
    lv: Okludētās frontes šķērsgriezums — aukstais frontes ķīlis (ātrāks) ir noķēris silto fronti, paceļot silto gaisa masu pilnībā no virszemes. Mākoņi un jaukti nokrišņi pa visu apvienoto fronti.
    en: Cross-section of an occluded front — the cold-front wedge (faster) has caught up with the warm front, lifting the warm air mass completely off the ground. Clouds and mixed precipitation along the merged front.
    ru: Поперечное сечение окклюдированного фронта — клин холодного фронта (более быстрый) догнал тёплый фронт, полностью подняв тёплую воздушную массу от поверхности. Облака и смешанные осадки вдоль объединённого фронта.
  stem:
    lv: Kāpēc okludētā fronte ir īpaši sarežģīta meteoroloģiskā situācija?
    en: Why is an occluded front an especially complex meteorological situation?
    ru: Почему окклюдированный фронт — особенно сложная метеорологическая ситуация?
  options:
    - id: a
      text:
        lv: Tā ir tikai siltās frontes variants ar nelielām atšķirībām.
        en: It is just a variant of a warm front with minor differences.
        ru: Это просто вариант тёплого фронта с небольшими отличиями.
    - id: b
      text:
        lv: Tās laikā nav nokrišņu.
        en: It produces no precipitation.
        ru: Во время него нет осадков.
    - id: c
      text:
        lv: Tā nepastāv ziemeļu platuma grādos.
        en: It does not exist in northern latitudes.
        ru: Его не бывает в северных широтах.
    - id: d
      text:
        lv: Apvieno aukstās un siltās frontes pazīmes — gan stabilu nokrišņus, gan brāzmas, gan turbulenci dažādās augstumos.
        en: It combines features of both cold and warm fronts — steady precipitation, gusts, and turbulence at different altitudes.
        ru: Сочетает признаки и холодного, и тёплого фронта — устойчивые осадки, шквалы и турбулентность на разных высотах.
  correctOptionId: d
  explanation:
    lv: |
      Okludētā fronte veidojas, kad ātri kustīgā aukstā fronte noķer lēnāko silto fronti, paceļot silto gaisa masu no virszemes. Tas apvieno gan stabilus, gan konvektīvus nokrišņus, gan zemus stratus tipa mākoņus, gan kumulonimba aktivitāti — atkarībā no augstuma slāņa. Laika apstākļi var ātri mainīties, un prognozēšana ir grūta. Droniem — pilnībā atturēties no lidojumiem okludētas frontes pārejas laikā.
    en: |
      An occluded front forms when a fast-moving cold front catches up with a slower warm front, lifting the warm air mass off the surface. This combines both stratus-type stable precipitation and cumulonimbus convective activity — depending on the altitude layer. Weather can change rapidly and is difficult to forecast. For drones — refrain entirely from flying during an occluded-front passage.
    ru: |
      Окклюдированный фронт образуется, когда быстро движущийся холодный фронт догоняет более медленный тёплый, поднимая тёплую воздушную массу от поверхности. Это сочетает устойчивые осадки stratus-типа и конвективную активность cumulonimbus — в зависимости от слоя высоты. Погода может быстро меняться, прогноз затруднён. Для дронов — полностью воздержаться от полётов во время прохождения окклюдированного фронта.
  distractorRationales:
    a:
      lv: Okludētā fronte ir atsevišķs frontes veids ar unikālām iezīmēm — tā nav vienkārši siltā fronte.
      en: An occluded front is its own type with unique features — it is not just a warm front.
      ru: Окклюдированный фронт — это отдельный тип со своими особенностями, а не просто тёплый фронт.
    c:
      lv: Okludētās frontes bieži veidojas ziemeļu platumos, sevišķi Atlantijas ciklonu sistēmās.
      en: Occluded fronts frequently form in northern latitudes, especially in Atlantic cyclone systems.
      ru: Окклюдированные фронты часто образуются в северных широтах, особенно в атлантических циклонах.
    b:
      lv: Tieši pretēji — okludētās frontes parasti ražo daudz un dažāda veida nokrišņus.
      en: On the contrary — occluded fronts typically produce abundant and varied precipitation.
      ru: Наоборот — окклюдированные фронты обычно дают обильные и разнообразные осадки.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; frontal occlusion"
  difficulty: 4
  cognitiveLevel: analyze
  scenarioType: factual
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; ICAO Doc 8896 — frontal occlusion
- id: met-053
  image: met-053-stationary-front.png
  imageAlt:
    lv: Stacionāras frontes šķērsgriezums — gandrīz vertikāla, nekustīga robeža starp aukstā gaisa masu (vienā pusē) un siltā gaisa masu (otrā pusē). Pastāvīgi mākoņi un stabila lietusgāze pa visu frontes garumu.
    en: Cross-section of a stationary front — a nearly vertical, motionless boundary between a cold air mass (one side) and a warm air mass (other side). Persistent clouds and steady drizzle along the entire front.
    ru: Поперечное сечение стационарного фронта — почти вертикальная, неподвижная граница между холодной воздушной массой (с одной стороны) и тёплой (с другой). Постоянные облака и устойчивая морось вдоль всего фронта.
  stem:
    lv: Kāda ir stacionāras frontes galvenā iezīme, kas to atšķir no kustīgām frontēm?
    en: What is the key feature of a stationary front that distinguishes it from a moving front?
    ru: Какова главная особенность стационарного фронта, отличающая его от движущихся фронтов?
  options:
    - id: a
      text:
        lv: Ātri pāriet pār reģionu 30 minūtēs.
        en: It passes over the area within 30 minutes.
        ru: Быстро проходит над регионом за 30 минут.
    - id: b
      text:
        lv: Tā veidojas tikai virs okeāniem.
        en: It only forms over oceans.
        ru: Образуется только над океанами.
    - id: c
      text:
        lv: Tā praktiski nekustas (< 5 kt) un izraisa ilgstošu, vairāku dienu mākoņu un nokrišņu periodu šajā reģionā.
        en: It barely moves (< 5 kt) and causes a multi-day cloud and precipitation period in the area.
        ru: Он практически не движется (< 5 узлов) и вызывает многодневный период облачности и осадков в регионе.
    - id: d
      text:
        lv: Tā vienmēr satur tornādo veidošanos.
        en: It always involves tornado formation.
        ru: В нём всегда происходит образование торнадо.
  correctOptionId: c
  explanation:
    lv: |
      Stacionāra fronte ir robeža starp divām pretējām gaisa masām, kur neviena nedominē — tā praktiski nekustas. Tas rada ilgstošu mākoņu un nokrišņu periodu (bieži vairākas dienas) reģionā, kas atrodas tuvu frontei. Tā var izveidoties, kad aukstā fronte palēninās un samazinās līdz mazākam ātrumam, sasniedzot līdzsvaru ar tuvojošos silto gaisa masu. Droniem — sliktas redzamības un mitruma dēļ lidot nav ieteicams visa stacionāras frontes laika.
    en: |
      A stationary front is a boundary between two opposing air masses where neither dominates — it barely moves. This produces a long-lasting period of clouds and precipitation (often several days) in the area near the front. It can form when a cold front decelerates and reaches equilibrium with the approaching warm air mass. For drones — due to poor visibility and humidity, flying is not advisable for the duration of a stationary front.
    ru: |
      Стационарный фронт — граница между двумя противоположными воздушными массами, где ни одна не доминирует — он практически не движется. Это создаёт длительный период облачности и осадков (часто несколько суток) в районе вблизи фронта. Может образоваться, когда холодный фронт замедляется и достигает равновесия с приближающейся тёплой массой. Для дронов — из-за плохой видимости и влажности летать не рекомендуется на всё время стационарного фронта.
  distractorRationales:
    a:
      lv: Ātra pāreja ir aukstās frontes iezīme. Stacionāra fronte pretēji — praktiski nekustas.
      en: A rapid passage is a feature of a cold front. A stationary front, on the contrary, hardly moves.
      ru: Быстрое прохождение — признак холодного фронта. Стационарный, напротив, практически не движется.
    d:
      lv: Tornādo veidošanās prasa specifiskus konvektīvos apstākļus, ne stacionāru fronti.
      en: Tornado formation requires specific convective conditions, not a stationary front.
      ru: Образование торнадо требует особых конвективных условий, а не стационарного фронта.
    b:
      lv: Stacionāras frontes veidojas gan virs okeāniem, gan kontinentālajiem reģioniem.
      en: Stationary fronts form both over oceans and continental regions.
      ru: Стационарные фронты образуются и над океанами, и над континентами.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; stationary front classification"
  difficulty: 3
  cognitiveLevel: recall
  scenarioType: factual
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; ICAO Doc 8896 — stationary front classification
- id: met-054
  image: met-054-metar-decode.png
  imageAlt:
    lv: 'METAR ziņojuma piemērs ar paskaidrojumiem: "EVRA 121200Z 24015G25KT 9999 SCT025 BKN040 15/08 Q1015" — sadalīts pa grupām ar to angļu valodas nozīmēm: lidlauks, datums/laiks, vējš, redzamība, mākoņi, temperatūra/rasas punkts, QNH.'
    en: 'A METAR example with annotations: "EVRA 121200Z 24015G25KT 9999 SCT025 BKN040 15/08 Q1015" — split into groups with their English meanings: airport, date/time, wind, visibility, clouds, temperature/dew point, QNH.'
    ru: 'Пример METAR с пояснениями: "EVRA 121200Z 24015G25KT 9999 SCT025 BKN040 15/08 Q1015" — разбит по группам с их английскими значениями: аэропорт, дата/время, ветер, видимость, облака, температура/точка росы, QNH.'
  stem:
    lv: Saskaņā ar attēlā parādīto METAR — kāds bija vējš ziņojuma laikā?
    en: According to the METAR shown in the image — what was the wind at the time of the report?
    ru: Согласно METAR на изображении — каким был ветер на момент сообщения?
  options:
    - id: a
      text:
        lv: Vējš no 250° ar ātrumu 15 kt.
        en: Wind from 250° at 15 kt.
        ru: Ветер с 250° со скоростью 15 узлов.
    - id: b
      text:
        lv: Vējš no 240° ar vidējo ātrumu 15 kt un brāzmām līdz 25 kt.
        en: Wind from 240° at a mean speed of 15 kt with gusts to 25 kt.
        ru: Ветер с 240° со средней скоростью 15 узлов и порывами до 25 узлов.
    - id: c
      text:
        lv: Vējš no 25° ar ātrumu 24015 kt.
        en: Wind from 25° at 24015 kt.
        ru: Ветер с 25° со скоростью 24015 узлов.
    - id: d
      text:
        lv: Bezvēja apstākļi.
        en: Calm conditions.
        ru: Безветренные условия.
  correctOptionId: b
  explanation:
    lv: |
      METAR vēja formāts ir "DDDFFGFFKT", kur DDD ir virziens grādos no ziemeļiem, FF ir vidējais ātrums, G atdalītājs un FF brāzmas. "24015G25KT" nozīmē 240° (rietumi-dienvidrietumi), vidējais ātrums 15 mezgli, brāzmas līdz 25 mezgliem. Tā ir nozīmīga vēja brāzmu atšķirība (10 kt), ko droni jāņem vērā.
    en: |
      The METAR wind format is "DDDFFGFFKT", where DDD is direction in degrees from north, FF is the mean speed, G is a separator, and FF is the gust speed. "24015G25KT" means 240° (west-southwest), mean speed 15 knots, gusts to 25 knots. This is a significant gust difference (10 kt) that drones must take into account.
    ru: |
      Формат ветра METAR — "DDDFFGFFKT", где DDD — направление в градусах от севера, FF — средняя скорость, G — разделитель, FF — порывы. "24015G25KT" означает 240° (запад-юго-запад), средняя скорость 15 узлов, порывы до 25 узлов. Это значительная разница в порывах (10 узлов), которую дроны должны учитывать.
  distractorRationales:
    a:
      lv: Virziens ir 240°, nevis 250°. Trīs pirmie cipari nosaka virzienu precīzi.
      en: The direction is 240°, not 250°. The first three digits specify the direction precisely.
      ru: Направление 240°, а не 250°. Первые три цифры точно задают направление.
    c:
      lv: Pirmie trīs cipari (240) ir virziens, nevis tikai divi. Atrumi nepārsniedz reālo robežu.
      en: The first three digits (240) are the direction, not just two. Speeds do not exceed realistic ranges.
      ru: Первые три цифры (240) — это направление, не две. Скорости не превышают реальных пределов.
    d:
      lv: Bezvēja apstākļus METAR norādītu kā "00000KT", nevis "24015G25KT".
      en: Calm conditions in METAR would be denoted "00000KT", not "24015G25KT".
      ru: Безветрие в METAR обозначалось бы как "00000KT", а не "24015G25KT".
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; METAR format"
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: numeric
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; ICAO Annex 3 — METAR format
- id: met-055
  image: met-055-cloud-coverage.png
  imageAlt:
    lv: 'METAR mākoņu pārklājuma kodu shēma: četri paneļi ar pieaugošo aizpildījumu — FEW (1-2 oktas), SCT (3-4 oktas, izklaidēti), BKN (5-7 oktas, lauzti), OVC (8 oktas, pilnīgs apmākums). Apakšā: "Pārklājums METAR tiek ziņots oktās (debess astotdaļās)".'
    en: 'METAR cloud-coverage codes chart: four panels with progressively more fill — FEW (1-2 oktas), SCT (3-4 oktas, scattered), BKN (5-7 oktas, broken), OVC (8 oktas, fully overcast). Bottom: "Coverage in METAR is reported in oktas (eighths of the sky)".'
    ru: 'Схема кодов покрытия облаками METAR: четыре панели с возрастающим заполнением — FEW (1-2 окты), SCT (3-4 окты, рассеянные), BKN (5-7 окт, разорванные), OVC (8 окт, сплошной). Внизу: "Покрытие в METAR указывается в октах (восьмые части неба)".'
  stem:
    lv: METAR ziņo "BKN025 OVC080". Saskaņā ar attēlā parādītajiem kodiem — kāds ir lidojuma griestu sapratums šajā ziņojumā?
    en: A METAR reports "BKN025 OVC080". Based on the codes shown in the image — what is the flying ceiling implication of this report?
    ru: METAR сообщает "BKN025 OVC080". Согласно показанным на изображении кодам — каково следствие для лётного «потолка» в этом сообщении?
  options:
    - id: a
      text:
        lv: Skaidri lidojuma apstākļi — neviens mākonis netraucē.
        en: Clear flying conditions — no clouds blocking.
        ru: Ясные условия полёта — облака не мешают.
    - id: b
      text:
        lv: Pirmais nozīmīgs mākoņu slānis (5+ oktas) ir 2500 ft (~760 m), bet zem 120 m drons paliek brīvs.
        en: There is no obstruction at A1/A3 altitude because the first significant cloud layer (5+ oktas) is at 2500 ft (~760 m), but below 120 m the drone is unobstructed.
        ru: "На высоте A1/A3 нет ограничений: первый значительный слой облаков (5+ окт) на 2500 фт (~760 м), но ниже 120 м дрон свободен."
    - id: c
      text:
        lv: Lidojuma griesti ir 2500 ft (~760 m) — pirmais "lauztais" (BKN, 5+ oktas) slānis. Drons paliek brīvs zem 120 m, bet jāņem vērā samazināta ambient gaisma un VLOS apstākļi.
        en: The flying ceiling is 2500 ft (~760 m) — the first "broken" (BKN, 5+ oktas) layer. The drone is unobstructed below 120 m, but reduced ambient light and VLOS conditions must be considered.
        ru: Лётный потолок — 2500 фт (~760 м), это первый «разорванный» слой (BKN, 5+ окт). Дрон свободен ниже 120 м, но нужно учитывать сниженное освещение и условия VLOS.
    - id: d
      text:
        lv: Pirmais nozīmīgais mākoņu slānis ir 8000 ft.
        en: The first significant cloud layer is at 8000 ft.
        ru: Первый значительный слой облаков на 8000 фт.
  correctOptionId: c
  explanation:
    lv: |
      METAR augstumi tiek ziņoti simtos pēdās virs lidlauka līmeņa (AGL). "BKN025" = lauzts pārklājums 2500 ft AGL (~760 m), "OVC080" = pilnīgs apmākums 8000 ft AGL (~2440 m). "Griesti" aviācijā nozīmē pirmais BKN vai OVC slānis. Šajā gadījumā tas ir 2500 ft. Drons darbojas zem 120 m, tāpēc fiziski mākoņi netraucē, bet samazināta saules gaisma un slikta horizontālā redzamība ietekmē VLOS.
    en: |
      METAR cloud heights are reported in hundreds of feet above aerodrome level (AGL). "BKN025" = broken at 2500 ft AGL (~760 m), "OVC080" = overcast at 8000 ft AGL (~2440 m). The "ceiling" in aviation is the first BKN or OVC layer — here, 2500 ft. The drone operates below 120 m so clouds do not physically interfere, but reduced sunlight and poor horizontal visibility affect VLOS.
    ru: |
      Высоты облаков в METAR указываются в сотнях футов над аэродромом (AGL). "BKN025" = разорванные на 2500 фт AGL (~760 м), "OVC080" = сплошные на 8000 фт AGL (~2440 м). «Потолок» в авиации — первый слой BKN или OVC, в данном случае 2500 фт. Дрон работает ниже 120 м, поэтому облака физически не мешают, но сниженный свет и плохая горизонтальная видимость влияют на VLOS.
  distractorRationales:
    a:
      lv: BKN un OVC nozīmē nozīmīgu mākoņu pārklājumu, nevis skaidras debesis.
      en: BKN and OVC denote significant cloud cover, not clear skies.
      ru: BKN и OVC означают значительное облачное покрытие, а не ясное небо.
    b:
      lv: Atbilde nedaudz nepatiess — pirmais nozīmīgais slānis ir uz 2500 ft (BKN), nevis OVC 8000 ft, kā netieši norāda atbilde "no first significant layer at A1/A3 altitude".
      en: This is partially incorrect — the first significant layer is at 2500 ft (BKN), not the OVC at 8000 ft.
      ru: Частично неверно — первый значительный слой на 2500 фт (BKN), а не OVC на 8000 фт.
    d:
      lv: '"Pirmais nozīmīgais slānis" ir BKN025 (2500 ft), nevis OVC080 (8000 ft). Aviācijā griestus definē pirmais BKN vai OVC.'
      en: The "first significant layer" is BKN025 (2500 ft), not OVC080 (8000 ft). In aviation, the ceiling is defined by the first BKN or OVC.
      ru: «Первый значительный слой» — это BKN025 (2500 фт), а не OVC080 (8000 фт). В авиации потолок определяется первым BKN или OVC.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; cloud coverage in oktas"
  difficulty: 4
  cognitiveLevel: apply
  scenarioType: numeric
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; ICAO Annex 3 — cloud coverage in oktas
- id: met-056
  image: met-056-sea-breeze.png
  imageAlt:
    lv: "Jūras vēja diagramma diurnāla cikla laikā: kreisajā pusē vēsa jūra un zila krāsa virs tās, labajā pusē silts saulains krasts un oranža krāsa virs tā. Gaisa cirkulācijas bultiņas: vēsais gaiss plūst no jūras uz krastu zemē, atgriežas no krasta uz jūru augstumā. Saule virspusē."
    en: "Sea-breeze diagram for a diurnal cycle: cool sea and blue tint above on the left, warm sunlit coast and orange tint above on the right. Air-circulation arrows: cool air flows from sea to coast at the surface, returns from coast to sea aloft. Sun overhead."
    ru: "Диаграмма морского бриза в суточном цикле: слева холодное море и синий оттенок над ним, справа тёплый солнечный берег и оранжевый оттенок над ним. Стрелки циркуляции воздуха: холодный воздух идёт с моря на берег у поверхности, возвращается с берега на море на высоте. Солнце над головой."
  stem:
    lv: Saskaņā ar attēlu — kad jūras vējš ir visstiprākais, un kāds ir tā efekts droniem?
    en: According to the image — when is the sea breeze strongest, and what is its effect on drones?
    ru: Согласно изображению — когда морской бриз сильнее всего и каков его эффект на дроны?
  options:
    - id: a
      text:
        lv: Naktī, kad krasta temperatūra ir augstāka par jūras.
        en: At night, when the coast is warmer than the sea.
        ru: Ночью, когда берег теплее моря.
    - id: b
      text:
        lv: Visu dienu vienlīdzīgi — temperatūras kontrasts paliek nemainīgs.
        en: All day equally — the temperature contrast stays constant.
        ru: Весь день равномерно — температурный контраст постоянен.
    - id: c
      text:
        lv: Rītā saulrieta laikā, kad veidojas zemes vēja apgriezīgs.
        en: At sunset, when the reverse land-breeze forms.
        ru: На закате, когда формируется обратный береговой бриз.
    - id: d
      text:
        lv: Pēcpusdienā, kad zeme ir spēcīgi sasilusi — pie krasta drons var sastapt stiprākas jūras puses brāzmas un pretvēju.
        en: In the afternoon, when the land has warmed strongly — a drone near the shore may meet stronger onshore gusts and headwind.
        ru: Во второй половине дня, когда суша сильно прогрелась, — у берега дрон может встретить более сильные порывы с моря и встречный ветер.
  correctOptionId: d
  explanation:
    lv: |
      Jūras vējš veidojas, kad zeme sasilst ātrāk nekā jūra. Pēcpusdienā temperatūras kontrasts parasti ir visizteiktākais, tāpēc arī piekrastes brāzmas kļūst jūtamākas. Dronam tas nozīmē lielāku pretvēju pie krasta un mazāku rezervi, ja lidojums plānots tikai pēc mierīgākās rīta ainas.
    en: |
      A sea breeze forms when land warms faster than the sea. The contrast is usually stronger in the afternoon, so coastal gusts become more noticeable then. For a drone pilot, that means more headwind near the shoreline and less margin if the flight was planned from a calmer morning picture.
    ru: |
      Морской бриз возникает, когда суша прогревается быстрее моря. Во второй половине дня этот контраст обычно сильнее, поэтому у берега заметнее и порывы. Для пилота дрона это означает более сильный встречный ветер у линии берега и меньший запас, если план строился по более спокойной утренней картине.
  distractorRationales:
    a:
      lv: Naktī veidojas pretējais — zemes vējš (land breeze), kad jūra ir siltāka par zemi. Jūras vējš darbojas dienā.
      en: At night the opposite forms — a land breeze, when the sea is warmer than the land. The sea breeze operates during the day.
      ru: Ночью образуется противоположный береговой бриз, когда море теплее суши. Морской бриз работает днём.
    b:
      lv: Jūras vējš ir diurnāls — tas mainās ar saules pozīciju un sasniedz maksimumu pēcpusdienā.
      en: The sea breeze is diurnal — it varies with the sun's position and peaks in the afternoon.
      ru: Морской бриз — суточный, он меняется с положением солнца и максимален во второй половине дня.
    c:
      lv: Saulrietā jūras vējš pakāpeniski izgaist, un veidojas pretējais zemes vējš tikai pēc 2-4 stundām.
      en: At sunset the sea breeze gradually dissipates, and the reverse land breeze only forms 2-4 hours later.
      ru: На закате морской бриз постепенно затухает, и обратный береговой бриз появляется только через 2-4 часа.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; local wind systems"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; ICAO Doc 8896 — local wind systems
- id: met-057
  image: met-057-mountain-wave.png
  imageAlt:
    lv: "Kalna viļņa (mountain wave) diagramma: kalns ar stipriem vēja arrows pret to, vēja virzienā lejup — vairāku posmu viļņains plūsmas modelis ar lenticular mākoņiem virsotnēs, un haotisks rotors tieši zem pirmā viļņa."
    en: "Mountain-wave (lee-wave) diagram: a mountain with strong wind arrows hitting it, downwind a multi-segment wavy airflow pattern with lenticular clouds at the crests, and a chaotic rotor zone directly below the first wave."
    ru: "Диаграмма горной волны (lee wave): гора с сильными стрелками ветра на неё, с подветренной стороны — многосегментный волнистый поток с lenticular облаками на гребнях, и хаотичная зона ротора непосредственно под первой волной."
  stem:
    lv: Drons jālido kalna vēja pusē (downwind), kur attēlā parādās mountain wave un rotor zona. Kur drons ir VISLIELĀKAJĀ riskā?
    en: A drone must fly on the lee (downwind) side of a mountain, where the image shows a mountain wave and rotor zone. Where is the drone at the GREATEST risk?
    ru: Дрон должен лететь с подветренной стороны горы, где на изображении видны горная волна и зона ротора. Где дрон в НАИБОЛЬШЕЙ опасности?
  options:
    - id: a
      text:
        lv: Tieši zem pirmā viļņa virsotnes, rotora zonā — haotisks plūsmas modelis var izraisīt pilnīgu kontroles zudumu.
        en: Directly below the first wave crest, in the rotor zone — the chaotic flow pattern can cause complete loss of control.
        ru: Прямо под гребнем первой волны, в зоне ротора — хаотичный поток может вызвать полную потерю управления.
    - id: b
      text:
        lv: Augstumā virs lenticular mākoņiem — tur plūsma ir gluda.
        en: At an altitude above the lenticular clouds — the flow is smooth there.
        ru: На высоте выше lenticular облаков — там поток ровный.
    - id: c
      text:
        lv: Otrās viļņa virsotnes attālumā no kalna — tur viļņa enerģija jau ir zaudēta.
        en: At the second wave crest's distance from the mountain — the wave energy is already lost there.
        ru: На расстоянии второго гребня от горы — энергия волны там уже потеряна.
    - id: d
      text:
        lv: Pretvēja pusē (windward) kalna — vēja kontakta zonā.
        en: On the windward side of the mountain — in the wind-contact zone.
        ru: С наветренной стороны горы — в зоне контакта с ветром.
  correctOptionId: a
  explanation:
    lv: |
      Attēlā visbīstamākā zona ir tieši zem pirmās viļņa virsotnes, kur veidojas rotors. Tieši tur plūsma ir haotiska, ar asām vēja virziena un stipruma izmaiņām, kas mazam dronam var ļoti ātri izraisīt kontroles zudumu.
    en: |
      In the diagram, the most dangerous area is directly below the first wave crest, where the rotor forms. That is where the airflow becomes chaotic and wind speed and direction can change abruptly enough to overwhelm a small drone.
    ru: |
      На схеме самая опасная зона — прямо под гребнем первой волны, где формируется ротор. Именно там поток хаотичен, а скорость и направление ветра могут меняться так резко, что малый дрон быстро теряет управляемость.
  distractorRationales:
    b:
      lv: Plūsma virs lenticular ir gluda un stabilā, kā arī attēlā skaidri redzams. Tas ir drošākais reģions, nevis bīstamākais.
      en: The flow above lenticulars is smooth and stable, as the image clearly shows. It is the safest region, not the most dangerous.
      ru: Поток над lenticular — ровный и стабильный, как ясно видно на изображении. Это самая безопасная зона, а не самая опасная.
    c:
      lv: Otrās viļņa virsotne ir mazāk turbulenta nekā pirmā rotora zona, un enerģija pakāpeniski zaudējas.
      en: The second wave crest is less turbulent than the first rotor zone, and the energy gradually dissipates.
      ru: Гребень второй волны менее турбулентен, чем первая зона ротора, и энергия постепенно теряется.
    d:
      lv: Pretvēja pusē plūsma ir stabilā un prognozējama. Bīstamība parādās tieši lejas pusē kalna.
      en: On the windward side the flow is stable and predictable. Danger appears specifically downwind of the mountain.
      ru: С наветренной стороны поток стабильный и предсказуемый. Опасность возникает именно с подветренной стороны горы.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; mountain-wave rotor"
  difficulty: 4
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; FAA H-8083-25B Ch. 12 — mountain-wave rotor
- id: met-058
  image: met-058-haze.png
  imageAlt:
    lv: 'Drons zema augstumā atklātā vietā; vidējā attālumā — koki, ēka un ceļš caur brūngani-pelēku miglas slāni (putekļi/dūmi); tālā attālumā — pakalni tikko saskatāmi. Augstumā skaidra zila debess. Vienots indikators: "Redzamība ~3 km".'
    en: 'A drone at low altitude in the open; in the middle distance — trees, a building, and a road through a brownish-grey haze layer (dust/smoke); in the far distance — hills barely visible. Above: a clear blue sky. Distance label: "Visibility ~3 km".'
    ru: 'Дрон на низкой высоте на открытой местности; в среднем плане — деревья, здание и дорога сквозь буровато-серый слой мглы (пыль/дым); вдали — холмы едва различимы. Сверху — ясное синее небо. Подпись: "Видимость ~3 км".'
  stem:
    lv: Pilots redz attēlā parādītos apstākļus — horizontāla redzamība ~3 km. Vai ir droši lidot A3 zonā 100 m attālumā?
    en: A pilot sees the conditions in the image — horizontal visibility ~3 km. Is it safe to fly in an A3 area at 100 m distance?
    ru: Пилот видит условия на изображении — горизонтальная видимость ~3 км. Безопасно ли летать в зоне A3 на расстоянии 100 м?
  options:
    - id: a
      text:
        lv: Jā, jo 3 km ir daudz vairāk par 100 m lidojuma attālumu.
        en: Yes, because 3 km is far more than the 100 m flight distance.
        ru: Да, потому что 3 км — намного больше, чем дальность полёта 100 м.
    - id: b
      text:
        lv: Nē, jo nepietiek redzamības, lai uztvertu citus gaisa kuģus laicīgi (VLOS un see-and-avoid prasība).
        en: No, because there is insufficient visibility to spot other aircraft in time (VLOS and see-and-avoid requirement).
        ru: Нет — недостаточно видимости, чтобы вовремя заметить другие воздушные суда (требование VLOS и see-and-avoid).
    - id: c
      text:
        lv: Jā, ja drons aprīkots ar collision-avoidance sensoriem.
        en: Yes, if the drone has collision-avoidance sensors.
        ru: Да, если дрон оснащён датчиками предотвращения столкновений.
    - id: d
      text:
        lv: Jā, ja izmanto FPV kamēras palielinātu attālumu.
        en: Yes, with an FPV camera the range is increased.
        ru: Да, при использовании FPV-камеры дальность увеличивается.
  correctOptionId: b
  explanation:
    lv: |
      3 km var izklausīties pietiekami 100 m lidojumam, taču dūmaka samazina kontrastu, spēju droši noteikt drona orientāciju un laikus pamanīt citu satiksmi. Šādā situācijā konservatīvā atbilde ir “nelidot”, jo FPV vai sensori neaizstāj VLOS.
    en: |
      3 km may sound ample for a 100 m flight, but haze reduces contrast, makes the drone harder to read, and leaves less margin to spot other traffic. In that situation the conservative answer is no-go, and FPV or sensors do not replace VLOS.
    ru: |
      3 км могут казаться достаточными для полёта на 100 м, но дымка снижает контраст, ухудшает восприятие ориентации дрона и оставляет меньше запаса на обнаружение другой воздушной обстановки. В такой ситуации консервативный ответ — не летать, а FPV и датчики VLOS не заменяют.
  distractorRationales:
    a:
      lv: VLOS nav tikai par drona redzamību — tas ir arī par citu lidaparātu uztveršanu un izvairīšanos no sadursmes.
      en: VLOS is not just about seeing the drone — it also includes spotting other aircraft and avoiding collisions.
      ru: VLOS — это не только видеть дрон, но и замечать другие воздушные суда и избегать столкновений.
    c:
      lv: Sensori palīdz, bet Open kategorijā tie nav VLOS aizstājēji. Pilotam jāspēj vizuāli redzēt citus lidaparātus.
      en: Sensors help, but in the Open category they are not a VLOS substitute. The pilot must be able to visually see other aircraft.
      ru: Датчики помогают, но в категории Open они не заменяют VLOS. Пилот должен визуально видеть другие воздушные суда.
    d:
      lv: FPV bez novērotāja nav atļauts Open kategorijā. Pat ar FPV pilots/novērotājs nedrīkst pārvarēt VLOS prasību.
      en: FPV without an observer is not allowed in the Open category. Even with FPV, the pilot/observer cannot override the VLOS requirement.
      ru: FPV без наблюдателя в категории Open не разрешён. Даже с FPV пилот/наблюдатель не может игнорировать требование VLOS.
  sourceRef: "UAS.OPEN.060 (VLOS) | https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32019R0947; see-and-avoid guidance | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu"
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: "docs/knowledge/eu-regulations/EU-2019-947-implementing-regulation-EN.pdf — UAS.OPEN.060 (VLOS); docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — see-and-avoid guidance"
- id: met-059
  image: met-059-microburst.png
  imageAlt:
    lv: "Microburst diagramma: kumulonimba mākoņa pamatā stiprs vertikāls lejas plūsmas stabs, kas pie virszemes izplatās radiāli visos virzienos ar izlīdzīgām bultiņām. Drons izlēkkājošā outflow zonā ar brīdinājuma simbolu."
    en: "Microburst diagram: at the base of a cumulonimbus cloud, a strong vertical downdraft column that spreads radially in all directions at the surface with outflow arrows. A drone in the radiating outflow zone with a warning indicator."
    ru: "Диаграмма микропорыва: у основания кучево-дождевого облака — мощный вертикальный нисходящий столб, который у поверхности расходится радиально во все стороны с выровненными стрелками. Дрон в зоне расходящегося потока с предупреждающим знаком."
  stem:
    lv: Saskaņā ar attēlu — kāda ir microburst galvenā briesmu īpatnība, kas to padara īpaši bīstamu maziem droniem?
    en: According to the image — what is the principal danger of a microburst that makes it especially hazardous to small drones?
    ru: Согласно изображению — какова основная опасность микропорыва, делающая его особенно угрожающим для малых дронов?
  options:
    - id: a
      text:
        lv: Microburst veidojas tikai virs okeāniem, tāpēc kontinentālajā Latvijā nav riska.
        en: Microbursts only form over oceans, so there is no risk in continental Latvia.
        ru: Микропорывы образуются только над океанами, поэтому в континентальной Латвии риска нет.
    - id: b
      text:
        lv: Strauja vēja virziena maiņa (līdz 180°) īsā attālumā un laikā (sekundēs) — drons var saņemt pretvēju, pēc tam pēkšņu līdzvēju, izraisot mehānisku pārslodzi.
        en: Sudden wind-direction reversal (up to 180°) over a short distance and time (seconds) — the drone may receive a headwind followed by a sudden tailwind, causing mechanical overload.
        ru: Резкая смена направления ветра (до 180°) на коротком расстоянии и за секунды — дрон может получить встречный ветер, а затем неожиданный попутный, что вызовет механическую перегрузку.
    - id: c
      text:
        lv: Microburst notiek tikai naktī.
        en: Microbursts only happen at night.
        ru: Микропорывы случаются только ночью.
    - id: d
      text:
        lv: Microburst rada tikai vāju lietusgāzi bez stipra vēja.
        en: Microbursts produce only light drizzle without strong wind.
        ru: Микропорывы дают только лёгкую морось без сильного ветра.
  correctOptionId: b
  explanation:
    lv: |
      Microburst galvenās briesmas ir ļoti strauja vēja virziena un stipruma maiņa dažu sekunžu laikā. Dronam tas nozīmē pēkšņu pāreju no pretvēja uz līdzvēju, krasu nestspējas maiņu un risku zaudēt kontroli vai nespēt atgriezties.
    en: |
      The key danger of a microburst is the abrupt change in wind direction and strength over seconds. For a drone, that can mean a sudden shift from headwind to tailwind, a sharp change in lift, and a very real risk of losing control or not making it back.
    ru: |
      Главная опасность микропорыва — резкая смена направления и силы ветра за секунды. Для дрона это означает внезапный переход от встречного ветра к попутному, резкое изменение несущей способности и высокий риск потери управления или невозможности вернуться.
  distractorRationales:
    a:
      lv: Microburst veidojas no jebkura kumulonimba — gan kontinentāli, gan piekrastē.
      en: Microbursts form from any cumulonimbus — both continental and coastal.
      ru: Микропорывы образуются от любых кучево-дождевых облаков — и в континентальных, и в прибрежных зонах.
    c:
      lv: Microburst notiek visā diennakts laikā, sevišķi pēcpusdienā un agrā vakarā, kad konvektīvā aktivitāte ir maksimālā.
      en: Microbursts occur at all times of day, especially in the afternoon and early evening when convective activity peaks.
      ru: Микропорывы случаются в любое время суток, особенно во второй половине дня и ранним вечером при максимуме конвекции.
    d:
      lv: Microburst nav “vāja lietusgāze” — tā galvenā bīstamība ir ļoti agresīvs vēja shear.
      en: A microburst is not a harmless drizzle event — the danger is violent wind shear.
      ru: Микропорыв — не безобидная морось; главная угроза в нём — резкий и агрессивный сдвиг ветра.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; microburst characteristics"
  difficulty: 4
  cognitiveLevel: analyze
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; FAA H-8083-25B Ch. 12 — microburst characteristics
- id: met-060
  image: met-060-gust-front.png
  imageAlt:
    lv: "Gust front diagramma: kreisajā pusē augsts kumulonimba mākonis ar smago lietus šaftu; zem un labajā pusē — vēsa gaisa ķīlis, kas plūst ārā pa virszemi (gust front). Vadošā mala ar dust un asu robežu. Drons priekšā ar brīdinājuma simbolu un izliektām vēja bultiņām."
    en: "Gust-front diagram: tall cumulonimbus cloud on the left with heavy rain shaft; below and to the right — a wedge of cool air flowing outward across the surface (the gust front). Leading edge with dust and a sharp boundary. A drone ahead of it with a warning indicator and curved wind arrows."
    ru: "Диаграмма фронта порывов: слева — высокое кучево-дождевое облако с тяжёлой полосой дождя; ниже и справа — клин холодного воздуха, растекающийся по поверхности (gust front). Передняя кромка с пылью и резкой границей. Дрон впереди фронта с предупреждающим знаком и изогнутыми стрелками ветра."
  stem:
    lv: Drons lido attēlā parādītajā situācijā — gust front pāris kilometru attālumā. Kāda ir pareizā darbība?
    en: A drone is in the situation shown in the image — a gust front a few kilometres away. What is the correct action?
    ru: Дрон находится в ситуации, показанной на изображении — gust front в нескольких километрах. Какое действие правильное?
  options:
    - id: a
      text:
        lv: Tūlīt nolaist dronu, jo gust front var sasniegt vietu ļoti ātri ar asām brāzmām un pēkšņu vēja maiņu.
        en: Land the drone immediately — a gust front can arrive very quickly with sharp gusts and a sudden wind shift.
        ru: Немедленно посадить дрон — gust front может дойти очень быстро с резкими порывами и внезапной сменой ветра.
    - id: b
      text:
        lv: Lidot pretī gust front, lai novērtētu tā stiprumu.
        en: Fly toward the gust front to assess its strength.
        ru: Лететь навстречу gust front, чтобы оценить его силу.
    - id: c
      text:
        lv: Palielināt drona augstumu, lai izvairītos no gust front.
        en: Increase the drone's altitude to avoid the gust front.
        ru: Увеличить высоту дрона, чтобы избежать gust front.
    - id: d
      text:
        lv: Turpināt lidojumu — gust front ietekmē tikai lielo aviāciju.
        en: Continue the flight — gust fronts only affect large aviation.
        ru: Продолжить полёт — gust front влияет только на крупную авиацию.
  correctOptionId: a
  explanation:
    lv: |
      Gust front ir negaisa izplūdes mala pie zemes. Tā var atnākt ātri, ar asām brāzmām, putekļiem un pēkšņu vēja virziena maiņu vēl pirms galvenajiem nokrišņiem. Mazam dronam tas nozīmē tūlītēju vadāmības risku, tāpēc pareizā darbība ir nekavējoties nolaisties.
    en: |
      A gust front is the leading edge of thunderstorm outflow at the surface. It can race ahead of the rain core and hit a drone with abrupt gusts, dust, and a sudden wind shift. A small drone has no useful margin in that situation, so the correct action is to land immediately.
    ru: |
      Фронт порывов — это передняя кромка грозового outflow у поверхности. Он может быстро прийти раньше основной зоны осадков и принести резкие порывы, пыль и внезапную смену направления ветра. Для малого дрона это означает почти мгновенную потерю запаса по управляемости, поэтому правильное действие — немедленно садиться.
  distractorRationales:
    b:
      lv: Lidot pretī gust front ir pretrunā ar drošības principu — nav iemesla pakļaut dronu paredzami bīstamai turbulencei.
      en: Flying toward a gust front contradicts the safety principle — there is no reason to expose the drone to predictable severe turbulence.
      ru: Лететь навстречу gust front противоречит принципу безопасности — нет смысла подвергать дрон ожидаемой сильной турбулентности.
    c:
      lv: Augstuma palielināšana nepalīdz — gust front izplatās līdz vairāku km augstumā, un Open kategorijas 120 m limits ievērojami zemāks.
      en: Increasing altitude does not help — the gust front extends to several km in height, and the 120 m Open-category limit is well below that.
      ru: Увеличение высоты не помогает — gust front простирается на несколько км вверх, а ограничение Open в 120 м намного ниже.
    d:
      lv: Gust front skar JEBKURU lidaparātu — sevišķi mazos droniem ar zemu masu un mehānisko pretestību.
      en: A gust front affects ANY aircraft — especially small drones with low mass and mechanical robustness.
      ru: Gust front воздействует на ЛЮБОЕ воздушное судно — особенно на малые дроны с низкой массой и механической устойчивостью.
  sourceRef: "UAS meteorology | https://www.easa.europa.eu/en/document-library/easy-access-rules/easy-access-rules-unmanned-aircraft-systems-regulations-eu; gust front and outflow boundary"
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
  internalRef: docs/knowledge/easa/EASA-Easy-Access-Rules-UAS-2024-07.pdf — UAS meteorology; FAA H-8083-25B Ch. 12 — gust front and outflow boundary
