- id: met-001
  stem:
    lv: Ko nozīmē METAR vēja ziņojums "27012G22KT"?
    en: What does the METAR wind report "27012G22KT" mean?
    ru: Что означает ветровой раздел METAR «27012G22KT»?
  options:
  - id: a
    text:
      lv: Vējš no 270° ar vidējo ātrumu 12 mezgli un brāzmām līdz 22 mezgliem.
      en: Wind from 270° at mean speed 12 knots, gusting to 22 knots.
      ru: Ветер с 270° со средней скоростью 12 узлов, порывы до 22 узлов.
  - id: b
    text:
      lv: Vējš no 270° ar vidējo ātrumu 22 mezgli un brāzmām 12 mezgļi.
      en: Wind from 270° at mean speed 22 knots, gusting to 12 knots.
      ru: Ветер с 270° со средней скоростью 22 узла, порывы до 12 узлов.
  - id: c
    text:
      lv: Vējš no 120° ar ātrumu 27 mezgli.
      en: Wind from 120° at 27 knots.
      ru: Ветер со 120° со скоростью 27 узлов.
  - id: d
    text:
      lv: Vēja attālums 2712 metru virzienā ar brāzmām 22 KT.
      en: Wind distance 2712 m in direction with gusts of 22 KT.
      ru: Ветровое расстояние 2712 м в направлении с порывами 22 KT.
  correctOptionId: a
  explanation:
    lv: 'METAR vēja formāts: [virziens 3 cipari]°[vidējais ātrums 2–3 cipari]G[brāzmas]KT. 27012G22KT: 270° (rietumi), vidējais ātrums 12 mezgļi, brāzmas līdz 22 mezgliem.

      '
    en: 'METAR wind format: [direction 3 digits]°[mean speed 2-3 digits]G[gusts]KT. 27012G22KT: 270° (west), mean 12 knots, gusting to 22 knots.

      '
    ru: 'Формат ветра METAR: [направление 3 цифры]°[средняя скорость 2-3 цифры]G[порывы]KT. 27012G22KT: 270° (запад), средняя 12 узлов, порывы до 22 узлов.

      '
  distractorRationales:
    b:
      lv: G nozīmē brāzmas — tas seko pēc vidējā ātruma. Brāzmas vienmēr ir augstākas par vidējo ātrumu.
      en: G stands for gusts — it follows the mean speed. Gusts are always higher than mean speed.
      ru: G означает порывы — следует после средней скорости. Порывы всегда выше средней скорости.
    c:
      lv: 270 ir vēja virziens (grādos no ziemeļiem pulksteņa rādītāja virzienā), nevis attālums.
      en: 270 is the wind direction (degrees clockwise from north), not distance.
      ru: 270 — это направление ветра (градусы по часовой стрелке от севера), а не расстояние.
    d:
      lv: METAR nesatur "attāluma" laukus. 270 ir virziens grādos, 12 ir ātrums mezglos, 22 ir brāzmu ātrums mezglos.
      en: METAR does not contain "distance" fields. 270 is direction in degrees, 12 is speed in knots, 22 is gust speed in knots.
      ru: METAR не содержит поля «расстояния». 270 — направление в градусах, 12 — скорость в узлах, 22 — скорость порывов в узлах.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — Meteorological Service for International Air Navigation; METAR format
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
- id: met-002
  stem:
    lv: Tavs drons ir novērtēts 10 m/s. METAR rāda 09008G18KT. Vai drīkst lidot?
    en: Your drone is rated at 10 m/s. METAR shows 09008G18KT. Is flight permitted?
    ru: Твой дрон рассчитан на 10 м/с. METAR показывает 09008G18KT. Разрешён ли полёт?
  options:
  - id: a
    text:
      lv: Jā — vidējais vējš (8 KT = 4,1 m/s) ir labi robežās.
      en: Yes — the mean wind (8 KT = 4.1 m/s) is well within limits.
      ru: Да — средний ветер (8 KT = 4,1 м/с) значительно в пределах нормы.
  - id: b
    text:
      lv: Nē — 18 KT ≈ 9,3 m/s pārsniedz 10 m/s limitu.
      en: No — 18 KT ≈ 9.3 m/s exceeds the 10 m/s limit.
      ru: Нет — 18 KT ≈ 9,3 м/с превышает предел 10 м/с.
  - id: c
    text:
      lv: Jā, ja lidojums ir zem 50 m augstuma.
      en: Yes if the flight stays below 50 m altitude.
      ru: Да, если полёт остаётся ниже 50 м.
  - id: d
    text:
      lv: Nē — brāzmas (18 KT ≈ 9,3 m/s) tuvojas 10 m/s limitam; drošāk atlikt.
      en: No — the gusts (18 KT ≈ 9.3 m/s) approach the 10 m/s limit; safer to postpone.
      ru: Нет — порывы (18 KT ≈ 9,3 м/с) приближаются к пределу 10 м/с; безопаснее отложить.
  correctOptionId: b
  explanation:
    lv: '18 KT × 0,514 ≈ 9,3 m/s. Tas NAV pārsniedzis 10 m/s limitu matemātiski, bet brāzmas ir pīķa slodzes, kas dronu spēj radikāli destabilizēt pat pie 9,3 m/s. Atbilde b ir piesardzīga (nenovērtē pīķus ienākošo slodžu dēļ), bet d ir precīzāka — 9,3 m/s ir ļoti tuvu 10 m/s, un jebkura papildu brāzma var pārsniegt. Pareizā atbilde ir d — 9,3 m/s ir nepieļaujami tuvu limitam.

      '
    en: '18 KT × 0.514 ≈ 9.3 m/s. This does NOT technically exceed the 10 m/s limit, but at 9.3 m/s the drone is operating extremely close to its rated maximum. Any additional gust spike can exceed the limit. The safest answer is d — operating at 93% of the rated maximum in gusty conditions is not safe practice.

      '
    ru: '18 KT × 0,514 ≈ 9,3 м/с. Технически это НЕ превышает предел 10 м/с, но при 9,3 м/с дрон работает крайне близко к расчётному максимуму. Любой дополнительный пик порыва может его превысить. Правильный ответ d — работа при 93% расчётного максимума в порывистых условиях не является безопасной практикой.

      '
  distractorRationales:
    a:
      lv: Vidējais vējš nenorāda pīķa slodzes — brāzmas ir pīķi. Pie 9,3 m/s brāzmām tuvumā pie 10 m/s limita drona vadāmības rezerve ir minimāla.
      en: Mean wind does not indicate peak loads — gusts are the peaks. At 9.3 m/s gusts close to the 10 m/s limit the drone's control margin is minimal.
      ru: Средний ветер не определяет пиковые нагрузки — порывы это и есть пики. При порывах 9,3 м/с близко к пределу 10 м/с запас управляемости дрона минимален.
    c:
      lv: Augstums nemaina brāzmu slodzi. Gust novērtējums attiecas uz visu darbības diapazonu, ne tikai augstu augstumu.
      en: Altitude does not change the gust load. The gust rating applies to the full operating range, not only high altitudes.
      ru: Высота не изменяет нагрузку от порывов. Расчёт порывов применяется ко всему рабочему диапазону, а не только к большим высотам.
    d:
      lv: Piesardzīgi pareizs — brāzmas 9,3 m/s ir bīstami tuvas 10 m/s maksimumam. Tomēr atbilde d ir precīzāka par to, ka 9,3 m/s ir pārāk tuvu.
      en: Cautiously correct — 9.3 m/s gusts are dangerously close to the 10 m/s maximum. However answer d is more precise that 9.3 m/s is too close.
      ru: 'Осторожно правильно — порывы 9,3 м/с опасно близко к максимуму 10 м/с. Однако ответ d точнее: 9,3 м/с слишком близко.'
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; manufacturer wind rating standards
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: met-003
  stem:
    lv: Kāds ir kumulonimba (Cb) mazākais drošais attālums UAS lidojumam?
    en: What is the minimum safe distance from a cumulonimbus (Cb) for UAS operations?
    ru: Каково минимальное безопасное расстояние от кучево-дождевого (Cb) для полётов UAS?
  options:
  - id: a
    text:
      lv: 1 km.
      en: 1 km.
      ru: 1 км.
  - id: b
    text:
      lv: 5 km.
      en: 5 km.
      ru: 5 км.
  - id: c
    text:
      lv: 10 km.
      en: 10 km.
      ru: 10 км.
  - id: d
    text:
      lv: 20 km.
      en: 20 km.
      ru: 20 км.
  correctOptionId: c
  explanation:
    lv: 'Minimālais ieteicamais attālums no aktīva kumulonimba ir 10 km. Zibens izlādes diapazons, stipra turbulence un lielgabarīta krusu risks pastāv ievērojami tālu ārpus redzamā mākoņa robežas. 10 km ir minimums — jo tāk, jo drošāk.

      '
    en: 'The minimum recommended distance from an active cumulonimbus is 10 km. Lightning discharge range, severe turbulence, and large hail risk extend significantly beyond the visible cloud boundary. 10 km is the minimum — further is always safer.

      '
    ru: 'Минимальное рекомендуемое расстояние от активного кучево-дождевого — 10 км. Радиус молниевого разряда, сильная турбулентность и риск крупного града распространяются значительно за пределы видимых границ облака. 10 км — минимум, дальше — безопаснее.

      '
  distractorRationales:
    a:
      lv: 1 km atrodas tieši kumulonimba bīstamākajā zonā — turbulence, brāzmas un zibens var skart UAS.
      en: 1 km is directly in the most dangerous zone of a cumulonimbus — turbulence, gusts, and lightning can reach the UAS.
      ru: 1 км — прямо в самой опасной зоне кучево-дождевого. Турбулентность, порывы и молния могут поразить UAS.
    b:
      lv: 5 km nav pietiekams — zibens un stipra turbulence var sasniegt UAS šajā attālumā no Cb.
      en: 5 km is not sufficient — lightning and severe turbulence can reach the UAS at this distance from Cb.
      ru: 5 км недостаточно — молния и сильная турбулентность могут достичь UAS на этом расстоянии.
    d:
      lv: 20 km ir vēl drošāk, bet 10 km ir atzītais minimums. 20 km nav operatīvi obligāts.
      en: 20 km is even safer, but 10 km is the recognised minimum. 20 km is not operationally required.
      ru: 20 км ещё безопаснее, но 10 км — признанный минимум. 20 км оперативно не требуется.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Doc 8896 — Manual of Aeronautical Meteorology; A2 syllabus meteorology
  difficulty: 1
  cognitiveLevel: recall
  scenarioType: factual
- id: met-004
  stem:
    lv: Kādā apstākļu kombinācijā veidojas propelleru apledojums?
    en: Under which combination of conditions does propeller icing form?
    ru: При каком сочетании условий формируется обледенение пропеллеров?
  options:
  - id: a
    text:
      lv: Temperatūra +20°C, augsts mitrums.
      en: Temperature +20°C, high humidity.
      ru: Температура +20°C, высокая влажность.
  - id: b
    text:
      lv: Temperatūra -5°C, sauss skaidrs gaiss.
      en: Temperature -5°C, dry clear air.
      ru: Температура -5°C, сухой чистый воздух.
  - id: c
    text:
      lv: Temperatūra +10°C, viegls lietus.
      en: Temperature +10°C, light rain.
      ru: Температура +10°C, лёгкий дождь.
  - id: d
    text:
      lv: Temperatūra +2°C, lidojums caur mākoni vai saldējoša migla.
      en: Temperature +2°C, flying through cloud or freezing drizzle.
      ru: Температура +2°C, полёт через облако или ледяная морось.
  correctOptionId: d
  explanation:
    lv: 'Apledojums prasa divus vienlaicīgus apstākļus: temperatūru tuvu vai zem 0°C UN redzamu mitrumu (mākoņu pilieni, saldējoša migla). +2°C mākonī pārsaldēti ūdens pilieni sasalst kontaktā ar propellera virsmu.

      '
    en: 'Icing requires two simultaneous conditions: temperature near or below 0°C AND visible moisture (cloud droplets, freezing drizzle). At +2°C in cloud, supercooled water droplets freeze on contact with the propeller surface.

      '
    ru: 'Обледенение требует двух одновременных условий: температуры около или ниже 0°C И видимой влаги (капли облака, ледяная морось). При +2°C в облаке переохлаждённые капли воды замерзают при контакте с поверхностью пропеллера.

      '
  distractorRationales:
    a:
      lv: +20°C ūdens ir šķidrs un nevar sasalt uz propellera virsmām.
      en: At +20°C water is liquid and cannot freeze on propeller surfaces.
      ru: При +20°C вода жидкая и не может замерзать на поверхностях пропеллеров.
    b:
      lv: Auksta temperatūra vien nav pietiekama — apledojumam nepieciešami pārsaldēti ūdens pilieni (redzams mitrums). Sausam gaisam pie -5°C šādu pilienu nav.
      en: Cold temperature alone is not sufficient — icing requires supercooled water droplets (visible moisture). Dry air at -5°C contains no such droplets.
      ru: Только холодная температура недостаточна — для обледенения нужны переохлаждённые капли (видимая влага). Сухой воздух при -5°C их не содержит.
    c:
      lv: +10°C ūdens paliek šķidrs — lietus nogulsnējas uz propelleriem, bet nesasalst.
      en: At +10°C water remains liquid — rain deposits on propellers but does not freeze.
      ru: При +10°C вода остаётся жидкой — дождь осаждается на пропеллерах, но не замерзает.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Doc 8896 — aeronautical meteorology; A2 syllabus icing conditions
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
- id: met-005
  stem:
    lv: Ko nozīmē TAF prognoze ar "TEMPO 1012/1014 29018G28KT"?
    en: What does a TAF forecast of "TEMPO 1012/1014 29018G28KT" mean?
    ru: Что означает прогноз TAF «TEMPO 1012/1014 29018G28KT»?
  options:
  - id: a
    text:
      lv: 'Pagaidu apstākļi: vējš no 290° ar 18 mezgliem un brāzmām 28 mezgļi, kas ilgst starp 12:00–14:00 UTC.'
      en: 'Temporary conditions: wind from 290° at 18 knots, gusting 28 knots, occurring between 12:00–14:00 UTC.'
      ru: 'Временны́е условия: ветер с 290° 18 узлов, порывы 28 узлов, в период 12:00–14:00 UTC.'
  - id: b
    text:
      lv: Pastāvīgs vējš 29018 mezgļi no 10. līdz 14. datumam.
      en: Permanent wind 29018 knots from the 10th to the 14th.
      ru: Постоянный ветер 29018 узлов с 10-го по 14-е.
  - id: c
    text:
      lv: Vēja izmaiņas uz 290° no 10:12 līdz 10:14 pēcpusdienas vietējā laikā.
      en: Wind change to 290° from 10:12 to 10:14 afternoon local time.
      ru: Изменение ветра до 290° с 10:12 до 10:14 после полудня местного времени.
  - id: d
    text:
      lv: Mainīgi vēji starp 290° un 180° ar ātrumu 28 mezgļi.
      en: Variable wind between 290° and 180° at 28 knots.
      ru: Переменный ветер между 290° и 180° со скоростью 28 узлов.
  correctOptionId: a
  explanation:
    lv: 'TEMPO nozīmē pagaidu apstākļi — īslaicīgi apstākļi, kas ir gaidāmi, bet neturpinās vairāk kā pusi no norādītā perioda. 1012/1014 ir laika logs: 10. datuma 12:00 UTC līdz 10. datuma 14:00 UTC. 29018G28KT: vējš no 290° ar 18 mezgliem un brāzmām 28 mezgļi.

      '
    en: 'TEMPO means temporary conditions — conditions expected to occur but last less than half of the indicated period. 1012/1014 is the time window: 10th 12:00 UTC to 10th 14:00 UTC. 29018G28KT: wind from 290° at 18 knots, gusting 28 knots.

      '
    ru: 'TEMPO означает временны́е условия — условия, которые ожидаются, но продолжаются менее половины указанного периода. 1012/1014 — временно́е окно: 10-е 12:00 UTC до 10-е 14:00 UTC. 29018G28KT: ветер с 290° 18 узлов, порывы 28 узлов.

      '
  distractorRationales:
    b:
      lv: TEMPO nenorāda pastāvīgus apstākļus — tā ir pagaidu parādība. Skaitlis arī nav interpretējams kā vēja ātrums.
      en: TEMPO indicates temporary, not permanent, conditions. The numbers also cannot be read as continuous wind speed.
      ru: TEMPO означает временны́е, а не постоянные условия. Числа также нельзя читать как непрерывную скорость ветра.
    c:
      lv: DDHH/DDHH formāts TAF ir dienas (DD) un stundas (HH) UTC, nevis minūtes vai vietējais laiks.
      en: The DDHH/DDHH format in TAF is day (DD) and hour (HH) UTC, not minutes or local time.
      ru: Формат DDHH/DDHH в TAF — день (DD) и час (HH) UTC, а не минуты или местное время.
    d:
      lv: 29018G28KT ir fiksēts vēja virziens (290°) ar ātrumu un brāzmām — nevis mainīgs starp diviem virzieniem.
      en: 29018G28KT is a fixed wind direction (290°) with speed and gusts — not variable between two directions.
      ru: 29018G28KT — фиксированное направление ветра (290°) со скоростью и порывами, а не переменное между двумя направлениями.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — TAF format; EASA meteorology module
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: factual
- id: met-006
  stem:
    lv: Pilotam ir lidojums plānots pulksten 11:00. METAR parāda apstākļus robežās. TAF rāda TEMPO starp 10:00 un 12:00 ar brāzmām, kas pārsniedz drona limitu. Kāda ir pareizā darbība?
    en: A pilot has a flight planned at 11:00. METAR shows conditions within limits. TAF shows TEMPO between 10:00 and 12:00 with gusts exceeding the drone's limit. What is the correct action?
    ru: Пилот планирует полёт на 11:00. METAR показывает условия в пределах. TAF показывает TEMPO между 10:00 и 12:00 с порывами, превышающими предел дрона. Правильное действие?
  options:
  - id: a
    text:
      lv: Lidot — pašreizējais METAR ir galvenais avots, TAF ir tikai prognoze.
      en: Fly — the current METAR is the primary source, TAF is only a forecast.
      ru: Лететь — текущий METAR является основным источником, TAF — только прогноз.
  - id: b
    text:
      lv: Pārcelt lidojumu uz laiku pēc 12:00 UTC, pārbaudot METAR apstiprinājumu.
      en: Reschedule to after 12:00 UTC, confirming with METAR at that time.
      ru: Перенести на после 12:00 UTC, подтвердив METAR в это время.
  - id: c
    text:
      lv: Lidot — TEMPO ir īss un iespējams nenotiks.
      en: Fly — TEMPO is brief and may not occur.
      ru: Лететь — TEMPO кратковременное и может не произойти.
  - id: d
    text:
      lv: Lidot zem 30 m augstuma, kur vējš parasti ir mazāks.
      en: Fly below 30 m altitude where wind is typically lower.
      ru: Лететь ниже 30 м, где ветер обычно слабее.
  correctOptionId: b
  explanation:
    lv: 'TAF TEMPO prognozē apstākļus, kas notiks plānotā lidojuma loga laikā. Kaut arī METAR pašlaik ir robežās, TEMPO norāda, ka apstākļi var kļūt bīstami jebkurā brīdī starp 10:00 un 12:00 UTC. Profesionālais padoms: pārcelt uz pēc 12:00 un apstiprināt ar tā brīža METAR.

      '
    en: 'The TAF TEMPO forecasts conditions that will occur during the planned flight window. Although the current METAR is within limits, TEMPO indicates conditions may become hazardous at any point between 10:00 and 12:00 UTC. Professional approach: reschedule to after 12:00 and confirm with the METAR at that time.

      '
    ru: 'TEMPO в TAF прогнозирует условия, которые произойдут в течение планового окна полёта. Хотя текущий METAR в пределах нормы, TEMPO указывает, что условия могут стать опасными в любой момент между 10:00 и 12:00 UTC. Профессиональный подход: перенести на после 12:00 и подтвердить METAR в это время.

      '
  distractorRationales:
    a:
      lv: METAR rāda pašreizējos apstākļus; TAF prognozē nākotnes apstākļus. Abi jālasa. TEMPO prognoze plānotā logā ir derīgs drošības apsvērums.
      en: METAR shows current conditions; TAF forecasts future conditions. Both must be read. A TEMPO forecast within the planned window is a valid safety consideration.
      ru: METAR показывает текущие условия; TAF прогнозирует будущие. Оба нужно читать. TEMPO в плановом окне — обоснованное соображение безопасности.
    c:
      lv: TEMPO prognozes nav "iespēja" — tās norāda apstākļus, kas notiks. "Iespējams nenotiks" nav derīgs drošības arguments.
      en: TEMPO forecasts are not possibilities — they indicate conditions that will occur. "May not occur" is not a valid safety argument.
      ru: Прогнозы TEMPO — это не возможности, а условия, которые произойдут. «Может не случиться» — не обоснованный довод безопасности.
    d:
      lv: Vēja ātruma limiti attiecas uz visu darbības augstumu diapazonu, ne tikai augstu augstumu. Lidojums zem 30 m nelikvidē TAF TEMPO apstākļus.
      en: Wind speed limits apply to the full operating altitude range, not only high altitudes. Flying below 30 m does not negate the TAF TEMPO conditions.
      ru: Ветровые пределы применяются ко всему рабочему диапазону высот. Полёт ниже 30 м не устраняет условия TEMPO по TAF.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; TAF interpretation
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: met-007
  stem:
    lv: Ko nozīmē "blīvuma augstums" drona lidojuma kontekstā?
    en: What does "density altitude" mean in the context of drone flight?
    ru: Что означает «плотностная высота» в контексте полёта дрона?
  options:
  - id: a
    text:
      lv: Faktiskais lidojuma augstums pār jūras līmeni.
      en: The actual flight altitude above sea level.
      ru: Фактическая высота полёта над уровнем моря.
  - id: b
    text:
      lv: Attālums no zemes, kuru drons var droši pārsniegt.
      en: The distance from the ground that the drone can safely exceed.
      ru: Расстояние от земли, которое дрон может безопасно превысить.
  - id: c
    text:
      lv: Gaisa blīvuma novērtējums, kas atspoguļo temperatūras, spiediena un mitruma ietekmi uz drona veiktspēju.
      en: An air density measure reflecting the effect of temperature, pressure, and humidity on drone performance.
      ru: Показатель плотности воздуха, отражающий влияние температуры, давления и влажности на характеристики дрона.
  - id: d
    text:
      lv: Minimālā drošā lidojuma augstums virs apdzīvotām zonām.
      en: The minimum safe flight altitude above populated areas.
      ru: Минимальная безопасная высота полёта над населёнными районами.
  correctOptionId: c
  explanation:
    lv: 'Blīvuma augstums apvieno temperatūru, atmosfēras spiedienu un mitrumu, lai atspoguļotu efektīvo gaisa blīvumu, kurā drons darbojas. Augsts blīvuma augstums (karsts, zems spiediens) nozīmē mazāku gaisa blīvumu, mazāk pacēluma katrā propellera apgriezienā, lielāku baterijas patēriņu un samazinātu vēja pretestību.

      '
    en: 'Density altitude combines temperature, atmospheric pressure, and humidity to express the effective air density in which the drone is operating. High density altitude (hot, low pressure) means less dense air, less lift per propeller revolution, more battery consumption, and reduced wind resistance.

      '
    ru: 'Плотностная высота объединяет температуру, атмосферное давление и влажность для выражения эффективной плотности воздуха, в которой работает дрон. Высокая плотностная высота (жара, низкое давление) означает менее плотный воздух, меньше подъёмной силы на оборот, больше расхода аккумулятора и сниженную ветровую нагрузку.

      '
  distractorRationales:
    a:
      lv: Augstums virs jūras līmeņa ir ģeogrāfisks fakts; blīvuma augstums ir fizisks gaisa blīvuma mērījums, kuru ietekmē arī temperatūra un spiediens.
      en: Altitude above sea level is a geographic fact; density altitude is a physical air density measure also influenced by temperature and pressure.
      ru: Высота над уровнем моря — географический факт; плотностная высота — физический показатель плотности воздуха, зависящий также от температуры и давления.
    b:
      lv: Drona maksimālais augstums ir noteikts regulā (120 m AGL Atvērtajā kategorijā); blīvuma augstums ir veiktspējas jēdziens, kas nav saistīts ar juridiskajiem augstuma limitiem.
      en: The drone's maximum altitude is set by regulation (120 m AGL in Open category); density altitude is a performance concept unrelated to legal altitude limits.
      ru: Максимальная высота дрона установлена правилами (120 м AGL в Открытой категории); плотностная высота — концепция характеристик, не связанная с юридическими пределами.
    d:
      lv: Minimālie augstumi virs apdzīvotām zonām ir tiesisks ierobežojums; blīvuma augstums ir meteoroloģisks veiktspējas faktors.
      en: Minimum altitudes above populated areas are a legal restriction; density altitude is a meteorological performance factor.
      ru: Минимальные высоты над населёнными районами — правовое ограничение; плотностная высота — метеорологический фактор характеристик.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; A2 syllabus meteorology
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
- id: met-008
  stem:
    lv: Cik stundu intervālos parasti tiek publicēts TAF?
    en: At what time intervals is a TAF typically published?
    ru: С какой периодичностью обычно публикуется TAF?
  options:
  - id: a
    text:
      lv: Ik 30 minūtes — tāpat kā METAR.
      en: Every 30 minutes — the same as METAR.
      ru: Каждые 30 минут — так же как METAR.
  - id: b
    text:
      lv: Ik 3 stundas.
      en: Every 3 hours.
      ru: Каждые 3 часа.
  - id: c
    text:
      lv: Vienu reizi dienā.
      en: Once a day.
      ru: Раз в сутки.
  - id: d
    text:
      lv: Ik 6 stundas (0000, 0600, 1200, 1800 UTC).
      en: Every 6 hours (0000, 0600, 1200, 1800 UTC).
      ru: Каждые 6 часов (0000, 0600, 1200, 1800 UTC).
  correctOptionId: d
  explanation:
    lv: 'TAF prognozes tiek publicētas četras reizes dienā UTC laika 0000, 0600, 1200 un 1800. Katra prognoze aptver 24–30 stundas. METAR tiek publicēts biežāk — parasti ik 30 vai 60 minūtes.

      '
    en: 'TAF forecasts are published four times per day at 0000, 0600, 1200, and 1800 UTC. Each forecast covers 24–30 hours. METAR is issued more frequently — typically every 30 or 60 minutes.

      '
    ru: 'Прогнозы TAF публикуются четыре раза в сутки в 0000, 0600, 1200 и 1800 UTC. Каждый прогноз охватывает 24–30 часов. METAR выпускается чаще — обычно каждые 30 или 60 минут.

      '
  distractorRationales:
    a:
      lv: METAR tiek publicēts ik 30–60 minūtes; TAF ir 6 stundu intervālos.
      en: METAR is published every 30–60 minutes; TAF is on 6-hour intervals.
      ru: METAR публикуется каждые 30–60 минут; TAF — с 6-часовыми интервалами.
    b:
      lv: 3 stundu intervāls ir SIGMET (nozīmīgu meteoroloģisko apstākļu informācija) publicēšanas biežums, nevis TAF.
      en: The 3-hour interval is the SIGMET (Significant Meteorological Information) update frequency, not TAF.
      ru: 3-часовой интервал — частота обновления SIGMET (сигнификантная метеорологическая информация), а не TAF.
    c:
      lv: Viena TAF dienā nenodrošinātu pietiekamu precizitāti laika apstākļu prognozēšanai aviācijai — tiek publicēts četras reizes dienā.
      en: One TAF per day would not provide sufficient precision for aviation weather forecasting — it is published four times per day.
      ru: Один TAF в сутки не обеспечил бы достаточной точности авиационного прогноза — публикуется четыре раза в сутки.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — Meteorological Service for International Air Navigation; TAF issuance
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
- id: met-009
  stem:
    lv: Pilots METAR lasa "CAVOK". Ko tas nozīmē?
    en: A pilot reads "CAVOK" in a METAR. What does it mean?
    ru: Пилот читает «CAVOK» в METAR. Что это означает?
  options:
  - id: a
    text:
      lv: Mākļu zem 5000 pēdām nav, redzamība ≥ 10 km, nav nozīmīgu laika apstākļu apdraudējumu.
      en: No cloud below 5,000 ft, visibility ≥ 10 km, no significant weather hazards.
      ru: Нет облаков ниже 5000 футов, видимость ≥ 10 км, нет значительных погодных угроз.
  - id: b
    text:
      lv: Redzamība ir zem 1500 m.
      en: Visibility is below 1500 m.
      ru: Видимость ниже 1500 м.
  - id: c
    text:
      lv: Kumulonimbs tuvumā.
      en: Cumulonimbus nearby.
      ru: Кучево-дождевое поблизости.
  - id: d
    text:
      lv: Celiņu un redzamību pārbauda — pagaidu ierobežojums lidostā.
      en: Runway and visibility check — temporary restriction at airport.
      ru: Проверка взлётной полосы и видимости — временное ограничение в аэропорту.
  correctOptionId: a
  explanation:
    lv: 'CAVOK (Ceiling And Visibility OK) nozīmē: redzamība ≥ 10 km, nav mākoņu zem 5000 pēdām (1500 m) vai zemāk par augstāko minimālo sektoru augstumu, un nav nozīmīgu laika apstākļu fenomenu. Lidotājiem tas ir labs laiks.

      '
    en: 'CAVOK (Ceiling And Visibility OK) means: visibility ≥ 10 km, no cloud below 5,000 ft (1,500 m) or below the highest minimum sector altitude, and no significant weather phenomena. For pilots this represents excellent conditions.

      '
    ru: 'CAVOK (Ceiling And Visibility OK) означает: видимость ≥ 10 км, нет облаков ниже 5000 футов (1500 м) или ниже минимальной высоты сектора, нет значительных метеорологических явлений. Для пилотов это отличные условия.

      '
  distractorRationales:
    b:
      lv: Zema redzamība METAR tiek ziņota kā skaitliska vērtība metros vai kilometros — ne CAVOK, kas apzīmē labus apstākļus.
      en: Low visibility is reported in METAR as a numeric value in metres or kilometres — not CAVOK, which denotes good conditions.
      ru: Низкая видимость в METAR указывается числовым значением в метрах или километрах, а не CAVOK, который означает хорошие условия.
    c:
      lv: Kumulonimbs METAR tiek ziņots kā CB mākoņu veids (piem., FEW020CB). CAVOK nozīmē labus apstākļus — bez nozīmīgu laika apstākļu draudiem.
      en: Cumulonimbus in METAR is reported as CB cloud type (e.g. FEW020CB). CAVOK means good conditions — no significant weather hazards.
      ru: Кучево-дождевое в METAR сообщается как тип облаков CB (например, FEW020CB). CAVOK означает хорошие условия без значительных угроз.
    d:
      lv: CAVOK nav saistīts ar lidostas darbības ierobežojumiem. Tas ir standartizēts starptautisks kods labiem laika apstākļiem METAR.
      en: CAVOK is not related to airport operational restrictions. It is a standardised international code for good weather conditions in METAR.
      ru: CAVOK не связан с ограничениями работы аэропорта. Это стандартизированный международный код хороших условий в METAR.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — METAR; CAVOK definition
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
- id: met-010
  stem:
    lv: Ar cik km skaita Latvijā minimālo redzamību praktiskai VLOS operācijai?
    en: What is the practical minimum visibility in km for VLOS operations in Latvia?
    ru: Какова практическая минимальная видимость в км для операций VLOS в Латвии?
  options:
  - id: a
    text:
      lv: 500 m.
      en: 500 m.
      ru: 500 м.
  - id: b
    text:
      lv: 3 km — lai uzturētu nepārtrauktu VLOS plānotajā maksimālajā attālumā.
      en: 3 km — to maintain continuous VLOS at the planned maximum range.
      ru: 3 км — для поддержания непрерывного VLOS на планируемой максимальной дистанции.
  - id: c
    text:
      lv: 1 km.
      en: 1 km.
      ru: 1 км.
  - id: d
    text:
      lv: 10 km.
      en: 10 km.
      ru: 10 км.
  correctOptionId: b
  explanation:
    lv: 'VLOS prasība ir funkcionāla: pilots spēj nepārtraukti un neapbruņotu aci noteikt UAS pozīciju, attieksmi un virzienu. Praksē 3 km redzamība ir praktiskais minimums jebkurai jēgpilnai VLOS operācijai. Pie zemākas redzamības VLOS prasību var nebūt iespējams izpildīt pat mazos attālumos.

      '
    en: 'The VLOS requirement is functional: the pilot can continuously and unaided determine the UAS position, attitude, and direction. In practice, 3 km visibility is the practical minimum for any meaningful VLOS operation. Below this VLOS may not be achievable even at short ranges.

      '
    ru: 'Требование VLOS функциональное: пилот может непрерывно и невооружённым глазом определять положение, ориентацию и направление UAS. На практике 3 км — практический минимум для любой содержательной операции VLOS. При меньшей видимости VLOS может быть недостижим даже на малых расстояниях.

      '
  distractorRationales:
    a:
      lv: 500 m redzamībā VLOS var uzturēt tikai ļoti īsam, fiksētam lidojumam pie fiksētas vietas. Tas ir nepraktiski lielākajai daļai operāciju.
      en: At 500 m visibility VLOS can only be maintained for a very short, fixed-position flight. This is impractical for most operations.
      ru: При 500 м видимости VLOS можно поддерживать только при очень коротком полёте с фиксированной позицией. Это нецелесообразно для большинства операций.
    c:
      lv: 1 km var būt pietiekams ļoti tuvajos operācijās (< 200 m), bet nav pietiekams vidējas attālinātības operācijām.
      en: 1 km may be adequate for very close-range operations (< 200 m) but is insufficient for medium-range operations.
      ru: 1 км может быть достаточен для операций очень близкого радиуса (< 200 м), но недостаточен для операций среднего радиуса.
    d:
      lv: 10 km ir maksimāli ziņojamā redzamība METAR, nevis minimums VLOS. Lielākā daļa VLOS operāciju notiek tuvāk par 1 km attālumā.
      en: 10 km is the maximum reportable visibility in METAR, not the VLOS minimum. Most VLOS operations take place at under 1 km range.
      ru: 10 км — максимальная отчётная видимость в METAR, а не минимум VLOS. Большинство операций VLOS происходит на расстоянии менее 1 км.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — Reg (EU) 2019/947 UAS.OPEN.060(3); EASA AMC1 UAS.OPEN.060 VLOS
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: regulatory
- id: met-011
  stem:
    lv: Pilots lido 80 m AGL. METAR virszemes vējš ir 5 m/s. Kādu vēja ātrumu jāplāno 80 m augstumā?
    en: A pilot flies at 80 m AGL. METAR surface wind is 5 m/s. What wind speed should be planned for at 80 m?
    ru: Пилот летит на 80 м AGL. Приземный ветер METAR — 5 м/с. Какую скорость ветра следует планировать на 80 м?
  options:
  - id: a
    text:
      lv: Tāpat 5 m/s — METAR mēra operatīvajā augstumā.
      en: The same 5 m/s — METAR measures at operational altitude.
      ru: Те же 5 м/с — METAR измеряет на рабочей высоте.
  - id: b
    text:
      lv: 3–4 m/s — vējš samazinās ar augstumu pilsētā.
      en: 3–4 m/s — wind decreases with altitude in the city.
      ru: 3–4 м/с — ветер ослабевает с высотой в городе.
  - id: c
    text:
      lv: 6,5–7,5 m/s — virszemes vējš × 1,3–1,5 koriģēšanai.
      en: 6.5–7.5 m/s — surface wind × 1.3–1.5 for altitude correction.
      ru: 6,5–7,5 м/с — приземный ветер × 1,3–1,5 для поправки по высоте.
  - id: d
    text:
      lv: 10+ m/s — vējš dubultosies katrās 40 m.
      en: 10+ m/s — wind doubles every 40 m.
      ru: 10+ м/с — ветер удваивается каждые 40 м.
  correctOptionId: c
  explanation:
    lv: 'METAR vējš mērīts 10 m AGL. Berzes slānis (aptuveni zemes 300 m) samazina vēja ātrumu tuvāk pie virszemes. 80 m AGL vēja ātrums parasti ir par 30–50 % lielāks nekā pie virszemes: 5 m/s × 1,3–1,5 ≈ 6,5–7,5 m/s. Šī korekcija ir īpaši svarīga bateriju plānošanā atgriešanās braucieniem pret vēju.

      '
    en: 'METAR wind is measured at 10 m AGL. The friction layer (approximately 300 m of surface atmosphere) reduces wind speed closer to the ground. At 80 m AGL wind speed is typically 30–50 % higher than at the surface: 5 m/s × 1.3–1.5 ≈ 6.5–7.5 m/s. This correction is especially important for battery planning on into-wind return legs.

      '
    ru: 'Ветер METAR измеряется на 10 м AGL. Слой трения (примерно 300 м атмосферы у поверхности) снижает скорость ветра ближе к земле. На 80 м AGL скорость ветра обычно на 30–50 % выше приземной: 5 м/с × 1,3–1,5 ≈ 6,5–7,5 м/с. Эта поправка особенно важна для планирования аккумулятора на возвратных курсах против ветра.

      '
  distractorRationales:
    a:
      lv: METAR mēra 10 m virs zemes — tas ir par 70 m zemāku par 80 m lidojuma augstumu. Berzes slānis nozīmē, ka vējš palielinās ar augstumu.
      en: METAR measures 10 m above the ground — this is 70 m lower than the 80 m flight altitude. The friction layer means wind increases with altitude.
      ru: METAR измеряет в 10 м над землёй — это на 70 м ниже высоты полёта 80 м. Слой трения означает, что ветер усиливается с высотой.
    b:
      lv: Vējš virs āra vides (lauks, jūra) palielinās ar augstumu. Tikai dažos pilsētas gadījumos var būt minimālas augstuma korekcijas ēku turbulences dēļ.
      en: Wind over open terrain (field, sea) increases with altitude. Only in some urban cases may there be minimal altitude corrections due to building turbulence.
      ru: Ветер над открытой местностью (поле, море) усиливается с высотой. Только в некоторых городских случаях могут быть минимальные поправки из-за турбулентности зданий.
    d:
      lv: Vēja ātruma dubultošanās katrās 40 m nav precīzs fizisks modelis. 30–50 % pieaugums no 10 m uz 80 m ir labākā piesarobeža.
      en: Wind speed doubling every 40 m is not an accurate physical model. A 30–50 % increase from 10 m to 80 m is the better approximation.
      ru: Удвоение скорости ветра каждые 40 м — неточная физическая модель. Увеличение на 30–50 % от 10 м до 80 м — лучшее приближение.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; wind profile standard atmosphere
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: numeric
- id: met-012
  stem:
    lv: Ko nozīmē TAF kods "BECMG 1022/1024 29018KT"?
    en: What does the TAF code "BECMG 1022/1024 29018KT" mean?
    ru: Что означает код TAF «BECMG 1022/1024 29018KT»?
  options:
  - id: a
    text:
      lv: Vējš momentāni mainīsies uz 290°/18 KT pulksten 22:00 UTC.
      en: Wind will instantly change to 290°/18 KT at 22:00 UTC.
      ru: Ветер мгновенно изменится до 290°/18 KT в 22:00 UTC.
  - id: b
    text:
      lv: Sākas uz 22 stundām laika apstākļu logs ar vēju 290°/18 KT.
      en: A 22-hour weather window with wind 290°/18 KT begins.
      ru: Начинается 22-часовое погодное окно с ветром 290°/18 KT.
  - id: c
    text:
      lv: Pagaidu vējš 290°/18 KT starp 22:00 un 24:00 UTC.
      en: Temporary wind 290°/18 KT between 22:00 and 24:00 UTC.
      ru: Временный ветер 290°/18 KT между 22:00 и 24:00 UTC.
  - id: d
    text:
      lv: Pakāpeniskas izmaiņas no 22:00 līdz 24:00 UTC — finālais vējš 290°/18 KT.
      en: Gradual change from 22:00 to 24:00 UTC — final wind 290°/18 KT.
      ru: Постепенное изменение с 22:00 до 24:00 UTC — итоговый ветер 290°/18 KT.
  correctOptionId: d
  explanation:
    lv: 'BECMG nozīmē pakāpeniskas, pastāvīgas izmaiņas sākas starp norādītajām stundām. 1022/1024 = 10. datums 22:00 UTC līdz 10. datums 24:00 UTC (= 11. datums 00:00 UTC). Pēc 24:00 UTC galīgais vējš ir 290°/18 KT. TEMPO ir pagaidu; BECMG ir pastāvīgas izmaiņas.

      '
    en: 'BECMG means gradual, permanent changes begin between the stated hours. 1022/1024 = 10th 22:00 UTC to 10th 24:00 UTC (= 11th 00:00 UTC). After 24:00 UTC the final wind is 290°/18 KT. TEMPO is temporary; BECMG is permanent change.

      '
    ru: 'BECMG означает постепенное, постоянное изменение, начинающееся в указанные часы. 1022/1024 = 10-е 22:00 UTC до 10-е 24:00 UTC (= 11-е 00:00 UTC). После 24:00 UTC итоговый ветер 290°/18 KT. TEMPO — временное; BECMG — постоянное изменение.

      '
  distractorRationales:
    a:
      lv: FM (from) norāda tūlītējas izmaiņas noteiktā laikā. BECMG norāda pakāpeniskas izmaiņas noteiktā laika logā.
      en: FM (from) indicates instantaneous changes at a specific time. BECMG indicates gradual changes over a time window.
      ru: FM (from) указывает мгновенные изменения в конкретное время. BECMG указывает постепенные изменения в течение временно́го окна.
    b:
      lv: BECMG laika logs norāda izmaiņu periodu, nevis kopējo laika apstākļu ilgumu. 1022/1024 ir divu stundu izmaiņu periods, ne 22 stundu.
      en: The BECMG time window indicates the change period, not total weather duration. 1022/1024 is a 2-hour change period, not 22 hours.
      ru: Временно́е окно BECMG указывает период изменения, а не общую продолжительность погоды. 1022/1024 — 2-часовой период изменения, а не 22 часа.
    c:
      lv: Pagaidu apstākļi ir TEMPO; BECMG norāda pastāvīgas izmaiņas, kas saglabāsies arī pēc norādītā laika loga.
      en: Temporary conditions are indicated by TEMPO; BECMG indicates permanent changes that persist after the time window.
      ru: Временны́е условия обозначаются TEMPO; BECMG указывает постоянные изменения, сохраняющиеся после временно́го окна.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — TAF format; BECMG vs TEMPO vs FM
  difficulty: 3
  cognitiveLevel: recall
  scenarioType: factual
- id: met-013
  stem:
    lv: Kāda mākoņu izohrona (kods) METAR norāda kumulonimbu?
    en: Which cloud type code in METAR indicates a cumulonimbus?
    ru: Какой код типа облаков в METAR указывает на кучево-дождевое?
  options:
  - id: a
    text:
      lv: CB — kumulonimbs, norādīts papildus mākoņu grupas koda aizmugurē.
      en: CB — cumulonimbus, appended after the cloud group code.
      ru: CB — кучево-дождевое, добавляется после кода группы облаков.
  - id: b
    text:
      lv: OVC — pārsegs.
      en: OVC — overcast.
      ru: OVC — сплошная.
  - id: c
    text:
      lv: BKN — plaukumi.
      en: BKN — broken.
      ru: BKN — разорванная.
  - id: d
    text:
      lv: TCU — torējoše kumuluss.
      en: TCU — towering cumulus.
      ru: TCU — мощно-кучевое.
  correctOptionId: a
  explanation:
    lv: 'Kumulonimbi METAR tiek norādīti ar "CB" sufiksu pēc mākoņu grupas koda. Piemērs: FEW010CB = daži kumulonimbi 1000 pēdu augstumā. TCU (torējoše kumuluss) ir atsevišķs kods, kas norāda attīstošus kumulusus — potenciālu Cb priekšteci.

      '
    en: 'Cumulonimbus clouds are indicated in METAR with the "CB" suffix after the cloud group code. Example: FEW010CB = few cumulonimbus at 1,000 ft. TCU (towering cumulus) is a separate code indicating developing cumulus — a potential Cb precursor.

      '
    ru: 'Кучево-дождевые в METAR указываются суффиксом «CB» после кода группы облаков. Пример: FEW010CB = незначительная кучево-дождевая облачность на 1000 футов. TCU (мощно-кучевое) — отдельный код, указывающий на развивающийся кумулюс — потенциальный предшественник Cb.

      '
  distractorRationales:
    b:
      lv: OVC nozīmē "pārsegs" — 8 astotdaļas debesu pārklājuma. Tas ir pārklājuma daudzums, nevis mākoņu veids.
      en: OVC means "overcast" — 8 eighths cloud cover. It is a coverage amount, not a cloud type indicator.
      ru: OVC означает «сплошная» — 8 октантов покрова. Это количество покрова, а не тип облаков.
    c:
      lv: BKN nozīmē "plaukumi" — 5–7 mākoņu astotdaļas debesu pārklājuma. Tas nenorāda mākoņu veidu.
      en: BKN means "broken" — 5–7 eighths cloud cover. It indicates coverage amount, not cloud type.
      ru: BKN означает «разорванная» — 5–7 октантов облачного покрова. Это указывает количество покрова, а не тип облаков.
    d:
      lv: TCU (torējoše kumuluss) norāda attīstošos kumulusus, kas var izveidoties kumulonimbā — bet TCU pats nav kumulonimbs. Pieredzējušam pilotam TCU jāuzskata par brīdinājumu.
      en: TCU (towering cumulus) indicates developing cumulus that may become a cumulonimbus — but TCU itself is not a cumulonimbus. An experienced pilot treats TCU as a warning.
      ru: TCU (мощно-кучевое) указывает на развивающийся кумулюс, который может стать кучево-дождевым, но сам по себе не является им. Опытный пилот воспринимает TCU как предупреждение.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — METAR cloud type codes; CB and TCU
  difficulty: 2
  cognitiveLevel: recall
  scenarioType: factual
- id: met-014
  stem:
    lv: Kāda ir temperatūras inversijas galvenā sekas UAS lidojumam?
    en: What is the primary consequence of a temperature inversion for UAS operations?
    ru: Каковы основные последствия температурной инверсии для полётов UAS?
  options:
  - id: a
    text:
      lv: Uzlabota drona veiktspēja augstumā.
      en: Improved drone performance at altitude.
      ru: Улучшенные характеристики дрона на высоте.
  - id: b
    text:
      lv: Samazināta redzamība un miglājs pie virszemes; turbulence zem inversijas slāņa.
      en: Reduced visibility and haze at the surface; turbulence below the inversion layer.
      ru: Пониженная видимость и дымка у поверхности; турбулентность под инверсионным слоем.
  - id: c
    text:
      lv: Pastiprināts GPS signāls.
      en: Enhanced GPS signal.
      ru: Усиленный GPS-сигнал.
  - id: d
    text:
      lv: Automātiska VLOS paplašināšanās inversijas slāņa refleksijas dēļ.
      en: Automatic VLOS extension due to inversion layer reflections.
      ru: Автоматическое расширение VLOS из-за отражений инверсионного слоя.
  correctOptionId: b
  explanation:
    lv: 'Temperatūras inversija "iesloga" mitru, piesārņotu gaisu pie virszemes, kas samazina redzamību un var izraisīt miglu. Turklāt inversijas slānis darbojas kā "vāks", kas intensificē turbulenci zem tā — sevišķi termisko turbulenci no virszemes sildīšanas. Inversijas bieži novērojamas Latvijas rudenī un ziemā, no rīta.

      '
    en: 'A temperature inversion "traps" moist, polluted air at the surface, reducing visibility and potentially causing fog. Additionally the inversion layer acts as a "lid" that intensifies turbulence below it — especially thermal turbulence from surface heating. Inversions are common in Latvia in autumn and winter, in the morning.

      '
    ru: 'Температурная инверсия «задерживает» влажный, загрязнённый воздух у поверхности, снижая видимость и потенциально вызывая туман. Кроме того, инверсионный слой действует как «крышка», усиливающая турбулентность под ним — особенно термическую от нагрева поверхности. Инверсии часты в Латвии осенью и зимой, по утрам.

      '
  distractorRationales:
    a:
      lv: Temperatūras inversija samazina gaisa blīvumu augstumā, bet galvenais efekts ir redzamības samazināšanās un turbulence pie virszemes, nevis uzlabota veiktspēja.
      en: Temperature inversion does not improve drone performance at altitude — its primary effects are visibility reduction and turbulence at the surface level.
      ru: 'Температурная инверсия не улучшает характеристики дрона на высоте — её основные эффекты: снижение видимости и турбулентность у поверхности.'
    c:
      lv: Temperatūras inversija neietekmē GPS signālu tādā veidā, kas uzlabotu tā uztveri.
      en: Temperature inversion does not affect GPS signals in a way that would improve reception.
      ru: Температурная инверсия не влияет на GPS-сигналы так, чтобы улучшить приём.
    d:
      lv: VLOS ir vizuāla prasība — to ietekmē vidējā optiskā redzamība, nevis atmosfēras optiskās refleksijas.
      en: VLOS is a visual requirement — it is affected by ambient optical visibility, not atmospheric optical reflections.
      ru: VLOS — визуальное требование, зависящее от фактической оптической видимости, а не атмосферных отражений.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; ICAO meteorology training
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: factual
- id: met-015
  stem:
    lv: Pilots plāno lidojumu pāri piejūras ezeram vēsā rudens rītā. Gaiss ir mitrs, temperatūra +3°C. Ko jāpārbauda papildus standarta laika pārbaudei?
    en: A pilot plans a flight over a coastal lake on a cool autumn morning. Air is damp, temperature +3°C. What should be checked in addition to the standard weather check?
    ru: Пилот планирует полёт над прибрежным озером прохладным осенним утром. Воздух влажный, температура +3°C. Что проверить дополнительно к стандартной проверке погоды?
  options:
  - id: a
    text:
      lv: Lidostas laikapstākļi tuvumā.
      en: Nearby airport weather.
      ru: Погода ближайшего аэропорта.
  - id: b
    text:
      lv: NOTAM par ūdens sporta aktivitātēm.
      en: NOTAMs for water sports activities.
      ru: NOTAM для водных спортивных мероприятий.
  - id: c
    text:
      lv: Apledojuma risku — +3°C + augsts mitrums tuvu ūdenim var radīt apledojumu uz propelleriem.
      en: Icing risk — +3°C + high humidity near water can create propeller icing.
      ru: Риск обледенения — +3°C + высокая влажность у воды может вызвать обледенение пропеллеров.
  - id: d
    text:
      lv: Nekas papildus — +3°C ir augstāk par 0°C, tāpēc apledojuma risks nav.
      en: Nothing additional — +3°C is above 0°C, so there is no icing risk.
      ru: Ничего дополнительного — +3°C выше 0°C, поэтому риска обледенения нет.
  correctOptionId: c
  explanation:
    lv: '+3°C ar augstu mitrumu tuvu ūdens virsmai ir potenciāls apledojuma scenārijs. Ūdens var radīt zemtemperatūras gaisa slāni tieši virs virsmas, kas var pazemināt faktisko propellera kontakttemperatūru zem 0°C. Pārsaldētu ūdens pilienu klātbūtne miglā vai plānas mākonīšu veidās virs ezera var radīt apledojumu pat +3°C gaisa temperatūrā. Pārbaudīt augšzemes virszemes temperatūru un miglas ziņojumus pirms pacelšanās.

      '
    en: '+3°C with high humidity near a water surface is a potential icing scenario. Water bodies can create a cold surface air layer directly above that can drive the actual propeller contact temperature below 0°C. Supercooled droplets in mist or thin cloud above the lake can cause icing even at +3°C ambient temperature. Check surface temperature and fog reports before departure.

      '
    ru: '+3°C с высокой влажностью вблизи водной поверхности — потенциальный сценарий обледенения. Водоёмы могут создавать холодный приземный слой воздуха, снижающий фактическую контактную температуру пропеллера ниже 0°C. Переохлаждённые капли в дымке или тонкой облачности над озером могут вызывать обледенение даже при +3°C. Проверить приземную температуру и сообщения о тумане до взлёта.

      '
  distractorRationales:
    a:
      lv: Lidostas laika apstākļi ir daļa no standarta pārbaudes, nevis papildu apledojuma specifiska pārbaude.
      en: Nearby airport weather is part of the standard check, not an icing-specific additional check.
      ru: Погода ближайшего аэропорта — часть стандартной проверки, а не специфическая дополнительная проверка обледенения.
    b:
      lv: Ūdens sporta NOTAM var būt aktuāls par drošu attālumu, bet tas nav galvenais drošības apsvērums šajā situācijā — tā ir apledojuma riski.
      en: Water sports NOTAMs may be relevant for safe distances, but are not the primary safety consideration in this scenario — icing is.
      ru: NOTAM для водных видов спорта может быть актуален для безопасного расстояния, но не является основным соображением безопасности в этом сценарии — это обледенение.
    d:
      lv: +3°C ir tuvu 0°C, un ūdens virsma var samazināt faktisko gaisa temperatūru zem 0°C tieši pie ezera. Apledojums iespējams pat pie +5°C pārsaldētu pilienu klātbūtnē.
      en: +3°C is close to 0°C, and the water surface can reduce the actual air temperature below 0°C right over the lake. Icing is possible even at +5°C in the presence of supercooled droplets.
      ru: +3°C близко к 0°C, и водная поверхность может снизить фактическую температуру воздуха ниже 0°C прямо над озером. Обледенение возможно даже при +5°C при наличии переохлаждённых капель.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Doc 8896 — icing conditions; A2 syllabus meteorology
  difficulty: 4
  cognitiveLevel: analyze
  scenarioType: decision
- id: met-016
  stem:
    lv: Pilots pamana, ka lidojuma laikā drons strauji maina ātrumu un augstumu, kaut gan vadības ievade nav mainīta. Kāds meteoroloģisks faktors to visbiežāk izraisa?
    en: A pilot notices the drone rapidly changes speed and altitude during flight despite no control input change. Which meteorological factor most commonly causes this?
    ru: Пилот замечает, что дрон резко меняет скорость и высоту в полёте, хотя ввод управления не изменился. Какой метеорологический фактор чаще всего это вызывает?
  options:
  - id: a
    text:
      lv: Temperatūras inversija, kas nomāc horizontālo vēja plūsmu.
      en: Temperature inversion suppressing horizontal air flow.
      ru: Температурная инверсия, подавляющая горизонтальный воздушный поток.
  - id: b
    text:
      lv: Saulriets, kas samazina gaisa temperatūru.
      en: Sunset reducing air temperature.
      ru: Закат, снижающий температуру воздуха.
  - id: c
    text:
      lv: Liels relatīvais mitrums, kas palielina gaisa blīvumu.
      en: High relative humidity increasing air density.
      ru: Высокая относительная влажность, увеличивающая плотность воздуха.
  - id: d
    text:
      lv: Vēja bīde — strauja vēja ātruma vai virziena maiņa īsā attālumā.
      en: Wind shear — a rapid change in wind speed or direction over a short distance.
      ru: Сдвиг ветра — резкое изменение скорости или направления ветра на коротком расстоянии.
  correctOptionId: d
  explanation:
    lv: 'Vēja bīde ir strauja vēja ātruma vai virziena maiņa uz īsu attālumu — horizontāli vai vertikāli. Kad drons šķērso bīdes slāni, tas iegūst vai zaudē ātrgaitu pēkšņi, liekot kontroles sistēmai kompensēt. Ar spēcīgu bīdi UAS var zaudēt stabilitāti.

      '
    en: 'Wind shear is a rapid change in wind speed or direction across a short distance — horizontal or vertical. When the drone crosses the shear layer it suddenly gains or loses airspeed, forcing the control system to compensate. With strong shear the UAS can lose stability entirely.

      '
    ru: 'Сдвиг ветра — резкое изменение скорости или направления ветра на коротком расстоянии — горизонтальном или вертикальном. При пересечении дроном слоя сдвига он внезапно набирает или теряет скорость, заставляя систему управления компенсировать. При сильном сдвиге UAS может полностью потерять стабильность.

      '
  distractorRationales:
    a:
      lv: Inversija kavē vertikālo sajaukšanos un bieži rada miglāju, bet nerada pēkšņas ātruma izmaiņas, kas raksturīgas bīdei.
      en: An inversion inhibits vertical mixing and often causes haze, but does not produce the sudden speed changes characteristic of shear.
      ru: Инверсия подавляет вертикальное перемешивание и часто вызывает дымку, но не создаёт резких изменений скорости, характерных для сдвига.
    b:
      lv: Saulriets pāris stundu laikā samazina temperatūru. Tas ir pārāk lēns, lai izskaidrotu pēkšņas izmaiņas lidojuma laikā.
      en: Sunset lowers temperature gradually over hours. This is far too slow to explain sudden in-flight changes.
      ru: Закат снижает температуру в течение нескольких часов — слишком медленно, чтобы объяснить внезапные изменения в полёте.
    c:
      lv: Augsts mitrums ietekmē baterijas un motorus pakāpeniski, nevis rada pēkšņas reaktīvas kustības. Tas arī nedaudz samazina gaisa blīvumu (mitrais gaiss ir vieglāks par sausu).
      en: High humidity degrades batteries and motors gradually, not producing sudden reactive movement. It also slightly decreases air density (moist air is lighter than dry).
      ru: Высокая влажность постепенно снижает работоспособность аккумуляторов и моторов, не создавая резких движений. Кроме того, она незначительно снижает плотность воздуха (влажный воздух легче сухого).
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules UAS 2024 — meteorology section; ICAO Annex 3
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: met-017
  stem:
    lv: Vasaras dienā pēc karstas rīta saules apspīdēšanas parādās augošas kumulusa mākoņu torņi. Kādu lidojuma apdraudējumu tas signalizē?
    en: On a summer afternoon after strong morning sunshine, growing cumulus cloud towers appear. What flight hazard does this signal?
    ru: Летним днём после сильного утреннего солнечного прогрева появляются башнеобразные кучевые облака. Какую лётную опасность это сигнализирует?
  options:
  - id: a
    text:
      lv: Termiskā turbulence un augošs konvektīvās aktivitātes risks, iespējams attīstoties kumulonimbā.
      en: Thermal turbulence and growing risk of convective activity, potentially developing into cumulonimbus.
      ru: Термическая турбулентность и нарастающий риск конвективной активности с возможным развитием кучево-дождевого облака.
  - id: b
    text:
      lv: Zema augstuma inversija, kas bloķē dūmus.
      en: Low-level inversion trapping smoke.
      ru: Приземная инверсия, удерживающая дым.
  - id: c
    text:
      lv: Samazināta redzamība miglāja dēļ.
      en: Reduced visibility due to haze.
      ru: Сниженная видимость из-за дымки.
  - id: d
    text:
      lv: Auksts fronts, kas nes ilgstošas lietusgāzes.
      en: Cold front bringing prolonged rain.
      ru: Холодный фронт, приносящий продолжительные дожди.
  correctOptionId: a
  explanation:
    lv: 'Augošu kumulusa torņu parādīšanās dienas siltākajā daļā pēc intensīvas saules apkarsēšanas norāda uz aktīviem termiskiem procesiem. Šādos apstākļos UAS var piedzīvot negaidītu turbulenci un straujas vertikālās plūsmas. Spēcīgi kumulusi var attīstīties par kumulonimbiem ar pērkona negaisu un zibeni. Ja mākoņi strauji aug — laiks beigt lidojumu.

      '
    en: 'Towering cumulus appearing in the warmest part of the afternoon following intense heating signals active thermal convection. UAS can encounter sudden turbulence and strong updrafts/downdrafts. Strong cumulus may develop into cumulonimbus with thunderstorm and lightning. If clouds are growing rapidly — time to end the flight.

      '
    ru: 'Появление башнеобразных кучевых облаков в самую тёплую часть дня после интенсивного прогрева свидетельствует об активной тепловой конвекции. UAS может встретить внезапную турбулентность и сильные восходящие/нисходящие потоки. Мощные кучевые облака могут развиться в кучево-дождевые с грозой и молниями. Если облака быстро растут — пора завершать полёт.

      '
  distractorRationales:
    b:
      lv: Inversijas dūmu slazds rada miglāju un horizontālu gaisa piesārņojumu, ne vertikāli augošus mākoņus. Kumulusa torņi norāda, ka inversijas nav.
      en: An inversion smoke trap produces haze and horizontal pollution, not vertically growing clouds. Towering cumulus signals the inversion is absent.
      ru: Ловушка дыма при инверсии создаёт горизонтальное загрязнение, а не вертикально растущие облака. Башнеобразные кучевые сигнализируют об отсутствии инверсии.
    c:
      lv: Miglājs veidojas pie temperatūras inversijas un mitruma, ne pie kumulusa torņiem. Kumulusa torņi norāda uz pretējo — aktīvu konvekciju un vertikālu sajaukšanos.
      en: Haze forms under temperature inversions with moisture, not under towering cumulus. Towering cumulus signals the opposite — active convection and vertical mixing.
      ru: Дымка образуется при температурной инверсии и влажности, а не при башнеобразных кучевых облаках. Башнеобразные кучевые указывают на противоположное — активную конвекцию.
    d:
      lv: Aukstā fronte parasti rada plakanus slāņveida mākoņus un ienesīgs ilgstošas lietusgāzes, ne kumulusa torņus. Kumulusa torņi ir lokālas konvektīvas aktivitātes pazīme, ne frontālas sistēmas.
      en: A cold front typically produces flat stratiform clouds and steady rain, not towering cumulus. Towering cumulus is a sign of local convective activity, not a frontal system.
      ru: Холодный фронт обычно формирует плоские слоистые облака и продолжительные осадки, а не башнеобразные кучевые. Башнеобразные кучевые — признак локальной конвективной активности, а не фронтальной системы.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules UAS 2024 — meteorology; ICAO Annex 3 cloud types
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: met-018
  stem:
    lv: Kumulonimba mākonis redzams 8 km uz ziemeļrietumiem. Vējš pastiprinās. Tev vēl 10 minūtes filmēšanas. Pareizā rīcība?
    en: A cumulonimbus cloud is visible 8 km to the northwest. Wind is picking up. You have 10 minutes of footage remaining. What is the correct action?
    ru: Кучево-дождевое облако видно в 8 км на северо-западе. Ветер усиливается. Осталось 10 минут съёмки. Правильное действие?
  options:
  - id: a
    text:
      lv: Turpināt — 8 km atrodas ārpus tūlītējās bīstamības zonas.
      en: Continue — 8 km is outside the immediate danger zone.
      ru: Продолжать — 8 км вне зоны непосредственной опасности.
  - id: b
    text:
      lv: Nekavējoties uzsākt atgriešanos — 8 km atrodas 10 km izslēgšanas zonā.
      en: Initiate return immediately — 8 km is within the 10 km exclusion zone.
      ru: Немедленно начать возврат — 8 км в зоне исключения 10 км.
  - id: c
    text:
      lv: Vērot un nolaisties tikai tad, ja mākonis pietuvojas 5 km.
      en: Monitor closely and land only if the cloud gets within 5 km.
      ru: Наблюдать и садиться только при приближении до 5 км.
  - id: d
    text:
      lv: Samazināt augstumu zem mākoņa pamata un turpināt filmēt.
      en: Reduce altitude to below the cloud base and continue filming.
      ru: Снизить высоту ниже основания облака и продолжать снимать.
  correctOptionId: b
  explanation:
    lv: 10 km noteikums prasa vismaz 10 km atdalīšanu no jebkura aktīva kumulonimba. 8 km atrodas bīstamajā zonā — zibens un stipra turbulence var sasniegt tevi pirms mākonis nonāk virs galvas. Nekavējoties uzsākt atgriešanos.
    en: The 10 km rule requires a minimum 10 km separation from any active cumulonimbus. At 8 km you are already within the risk zone — lightning and severe turbulence can reach you before the cloud arrives overhead. Initiate return now.
    ru: 'Правило 10 км требует минимум 10 км разделения от любого активного кучево-дождевого. 8 км — уже в зоне риска: молния и сильная турбулентность могут достичь тебя прежде, чем облако окажется над головой. Немедленно начать возврат.'
  distractorRationales:
    a:
      lv: 8 km atrodas iekšā, nevis ārpus 10 km izslēgšanas zonas. Risks jau pastāv.
      en: 8 km is inside, not outside, the 10 km exclusion zone. The risk is already present.
      ru: 8 км — внутри, а не вне зоны исключения 10 км. Риск уже существует.
    c:
      lv: Gaidīt, līdz 5 km, ir daudz par vēlu — 5 km brāzmu fronte un zibens risks ir kritisks. Slieksnis ir 10 km.
      en: Waiting until 5 km is far too late — at 5 km the gust front and lightning risk are critical. The threshold is 10 km.
      ru: Ждать до 5 км — слишком поздно. Шквалистый фронт и риск молнии при 5 км критичны. Порог — 10 км.
    d:
      lv: Augstuma samazināšana nesamazina zibens risku. Turbulence arī stiepjas lejup no Cb.
      en: Reducing altitude does not reduce the lightning risk — lightning discharges extend from cloud to ground regardless of the drone's altitude. Turbulence also extends downward from the Cb.
      ru: Снижение высоты не снижает риск молнии. Турбулентность тоже распространяется вниз от Cb.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: met-019
  stem:
    lv: Kura apstākļu kombinācija rada vislielāko propelleru apledojuma risku?
    en: Which combination of conditions creates the highest risk of propeller icing?
    ru: Какое сочетание условий создаёт наибольший риск обледенения пропеллеров?
  options:
  - id: a
    text:
      lv: Temperatūra +20°C, augsts mitrums.
      en: Temperature +20°C, high humidity.
      ru: Температура +20°C, высокая влажность.
  - id: b
    text:
      lv: Temperatūra -5°C, sauss un skaidrs gaiss.
      en: Temperature -5°C, dry clear air.
      ru: Температура -5°C, сухой чистый воздух.
  - id: c
    text:
      lv: Temperatūra +2°C, lidojums caur mākoni vai saldējoša migla.
      en: Temperature +2°C, flying through cloud or freezing drizzle.
      ru: Температура +2°C, полёт через облако или ледяная морось.
  - id: d
    text:
      lv: Temperatūra +10°C, viegls lietus.
      en: Temperature +10°C, light rain.
      ru: Температура +10°C, лёгкий дождь.
  correctOptionId: c
  explanation:
    lv: 'Apledojumam nepieciešami divi apstākļi vienlaicīgi: temperatūra tuvu vai zem 0°C UN redzams mitrums (mākoņu pilieni, saldējoša migla). +2°C mākonī vai saldējoša miglā pārsaldēti ūdens pilieni sasalst, nonākot saskarē ar propellera virsmu.'
    en: 'Icing requires two conditions simultaneously: temperature near or below 0°C AND visible moisture (cloud droplets, freezing drizzle). At +2°C in cloud or freezing drizzle, supercooled water droplets exist and freeze on contact with the propeller surface. -5°C in dry clear air has no moisture to form ice.'
    ru: 'Обледенение требует двух условий одновременно: температура около или ниже 0°C И видимая влага (капли облака, ледяная морось). При +2°C в облаке или ледяной мороси переохлаждённые капли воды замерзают при контакте с поверхностью пропеллера.'
  distractorRationales:
    a:
      lv: +20°C ūdens ir šķidrs un nevar sasalt uz propellera virsmām.
      en: At +20°C water is liquid and cannot freeze on propeller surfaces. High humidity at warm temperatures causes water deposition, not ice.
      ru: При +20°C вода жидкая и не может замерзать на поверхностях пропеллеров.
    b:
      lv: Auksta temperatūra viena nav pietiekama — apledojumam nepieciešami pārsaldēti ūdens pilieni (redzams mitrums). Sausam skaidram gaisam pie -5°C šādu pilienu nav.
      en: Cold temperature alone is not sufficient — icing requires the presence of supercooled water droplets (visible moisture). Dry clear air at -5°C carries no such droplets.
      ru: Только холодная температура недостаточна — для обледенения нужны переохлаждённые капли (видимая влага). Сухой чистый воздух при -5°C их не содержит.
    d:
      lv: +10°C ūdens paliek šķidrs. Viegls lietus nogulsnējas uz propelleriem, bet nesasalst.
      en: At +10°C water remains liquid. Light rain deposits water on the propellers but does not freeze. Icing risk is near or below 0°C.
      ru: При +10°C вода остаётся жидкой. Лёгкий дождь осаждается на пропеллерах, но не замерзает.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: met-020
  stem:
    lv: Kurš avots nodrošina 24 stundu aviācijas klases laika prognozi konkrētai Latvijas lidostai?
    en: Which source provides a 24-hour aviation-grade weather forecast for a specific airport in Latvia?
    ru: Какой источник предоставляет 24-часовой авиационный прогноз погоды для конкретного аэропорта Латвии?
  options:
  - id: a
    text:
      lv: DJI Fly lietotnes laika logrīks.
      en: The weather widget in the DJI Fly app.
      ru: Виджет погоды в приложении DJI Fly.
  - id: b
    text:
      lv: Google Weather tuvākajai pilsētai.
      en: Google Weather for the nearest city.
      ru: Google Weather для ближайшего города.
  - id: c
    text:
      lv: METAR tuvākajai lidostai.
      en: METAR for the nearest airport.
      ru: METAR ближайшего аэропорта.
  - id: d
    text:
      lv: TAF (Terminal Aerodrome Forecast) no meteo.lv vai NOAA aviationweather.gov.
      en: TAF (Terminal Aerodrome Forecast) from meteo.lv or NOAA aviationweather.gov.
      ru: TAF (Terminal Aerodrome Forecast) с meteo.lv или NOAA aviationweather.gov.
  correctOptionId: d
  explanation:
    lv: TAF (Terminal Aerodrome Forecast) ir standarta aviācijas klases 24–30 stundu prognoze lidostām. METAR nodrošina pašreizējos novērotos apstākļus, ne prognozi. Ražotāja lietotnes logrīki un vispārīgie patērētāju laika dienesti nav aviācijas klases avoti.
    en: A TAF (Terminal Aerodrome Forecast) is the standard aviation-grade 24–30 hour forecast for airports. METAR provides current observed conditions, not a forecast. Manufacturer app widgets and general consumer weather apps are not aviation-grade sources.
    ru: TAF — стандартный авиационный 24–30-часовой прогноз для аэродромов. METAR предоставляет только текущие наблюдения. Виджеты приложений производителей и потребительские сервисы погоды — не авиационные источники.
  distractorRationales:
    a:
      lv: Ražotāja lietotnes laika logrīki izmanto komerciālus prognožu API, nevis aviācijas klases datus.
      en: Manufacturer app weather widgets use commercial forecast APIs, not aviation-grade data. They are not reliable for pre-flight decision-making.
      ru: Виджеты погоды приложений производителей используют коммерческие API прогнозов, а не авиационные данные.
    b:
      lv: Patērētāju laika dienesti nesniedz aviācijas klases prognozes un tiem trūkst METAR/TAF precizitātes.
      en: Consumer weather services do not provide aviation-grade forecasts and lack the precision and standardisation of METAR/TAF.
      ru: Потребительские сервисы погоды не предоставляют авиационных прогнозов и не имеют точности METAR/TAF.
    c:
      lv: METAR nodrošina tikai pašreizējos apstākļus — jauns novērojums tiek izlaists aptuveni ik 30–60 minūtes. Tas neprognoze nākotnes apstākļus.
      en: METAR provides current conditions only — a new observation is issued approximately every 30–60 minutes. It does not forecast future conditions.
      ru: METAR предоставляет только текущие условия — новый отчёт выходит каждые 30–60 минут. Прогноз будущих условий он не даёт.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: met-021
  stem:
    lv: Virszemes METAR rāda 06008KT (8 mezgļi). Tavs drons novērtēts 12 m/s. Plāno lidot 100 m AGL. Kādu vēja ātrumu var gaidīt augstumā?
    en: The surface METAR shows 06008KT (8 knots). Your drone is rated at 12 m/s. You plan to fly at 100 m AGL. What wind speed should you expect at altitude?
    ru: METAR у поверхности показывает 06008KT (8 узлов). Дрон рассчитан на 12 м/с. Планируешь лететь на 100 м AGL. Какую скорость ветра ожидать на высоте?
  options:
  - id: a
    text:
      lv: Aptuveni 5,5–6,2 m/s — virszemes vējš (4,1 m/s) × 1,3–1,5.
      en: Approximately 5.5–6.2 m/s — surface wind (4.1 m/s) × 1.3–1.5.
      ru: Около 5,5–6,2 м/с — приземный ветер (4,1 м/с) × 1,3–1,5.
  - id: b
    text:
      lv: Aptuveni 4 m/s — tāpat kā pie virszemes.
      en: Approximately 4 m/s — the same as surface.
      ru: Около 4 м/с — то же, что у поверхности.
  - id: c
    text:
      lv: Aptuveni 4 m/s — vējš samazinās ar augstumu.
      en: Approximately 4 m/s — wind decreases with altitude.
      ru: Около 4 м/с — ветер уменьшается с высотой.
  - id: d
    text:
      lv: Tieši 8 mezgļi — METAR mēra lidojuma augstumā.
      en: Exactly 8 knots — METAR is measured at flight altitude.
      ru: Ровно 8 узлов — METAR измеряется на рабочей высоте.
  correctOptionId: a
  explanation:
    lv: METAR vējš mērīts 10 m AGL. 100 m AGL vēja ātrums parasti ir par 30–50 % lielāks nekā pie virszemes, jo samazinās berze no zemes šķēršļiem. 8 KT = 4,1 m/s × 1,5 ≈ 6,2 m/s augstumā.
    en: METAR wind is measured at 10 m AGL. At 100 m AGL wind speed is typically 30–50 % higher than at the surface due to decreasing friction from ground obstacles. 8 KT = 4.1 m/s × 1.5 = approximately 6.2 m/s at altitude. While within the drone's 12 m/s limit here, the adjustment matters for battery planning and performance margins.
    ru: METAR измеряет ветер на 10 м AGL. На 100 м AGL скорость ветра обычно на 30–50 % выше из-за уменьшения трения от наземных препятствий. 8 KT = 4,1 м/с × 1,5 ≈ 6,2 м/с на высоте.
  distractorRationales:
    b:
      lv: Vējš augstumā nav vienāds ar virszemi — METAR mēra 10 m augstumā, ne darbības augstumā.
      en: Wind at altitude is not the same as at the surface — METAR measures at 10 m, not at operational altitude.
      ru: Ветер на высоте не равен приземному — METAR измеряет на 10 м, а не на рабочей высоте.
    c:
      lv: Vējš parasti palielinās ar augstumu virszemes berzes samazināšanās dēļ, nevis samazinās.
      en: Wind generally increases with altitude due to decreasing surface friction, not decreases.
      ru: Ветер обычно усиливается с высотой из-за уменьшения приземного трения, а не ослабевает.
    d:
      lv: METAR pēc standarta mēra 10 m AGL, nevis 100 m. Tas ir virszemes novērojums, nevis mērījums augstumā.
      en: METAR is measured at 10 m AGL by standard, not at 100 m. It is a surface observation, not an aloft measurement.
      ru: METAR по стандарту измеряется на 10 м AGL, а не на 100 м. Это приземное наблюдение.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: met-022
  stem:
    lv: Ko dronu pilotam pasaka burts `G` kodā `18012G22KT`?
    en: What does the `G` in `18012G22KT` tell a drone pilot?
    ru: Что подсказывает пилоту дрона буква `G` в коде `18012G22KT`?
  options:
  - id: a
    text:
      lv: Ka vējš garantēti paliks 12 mezglu līmenī.
      en: That the wind is guaranteed to stay at 12 knots.
      ru: Что ветер гарантированно останется на 12 узлах.
  - id: b
    text:
      lv: Ka brāzmas var sasniegt 22 mezglus un mazam UAS tās var būt svarīgākas par vidējo vēju.
      en: That gusts may reach 22 knots and can matter more than the average wind.
      ru: Что порывы могут достигать 22 узлов и для маленького UAS это может быть важнее среднего ветра.
  - id: c
    text:
      lv: Ka vējš attiecas tikai uz lielajiem gaisa kuģiem.
      en: That the wind is only relevant to large aircraft.
      ru: Что эта информация относится только к большим самолётам.
  - id: d
    text:
      lv: Ka GPS uztveršana būs pasliktināta.
      en: That GPS reception will be degraded.
      ru: Что ухудшится GPS.
  correctOptionId: b
  explanation:
    lv: Brāzmu vērtība mazam UAS ir ļoti svarīga. Īsi stiprāka vēja uzplūdi var radīt vadības problēmas, pat ja noturīgais vējš šķiet pieņemams.
    en: The gust figure is crucial for small UAS. Short bursts of stronger wind can create control problems even if the sustained wind looks manageable.
    ru: Порывы критичны для лёгких UAS. Короткие усиления ветра могут создавать проблемы управления, даже если средний ветер выглядит приемлемым.
  distractorRationales:
    a:
      lv: Kods tieši parāda, ka vēja stiprums var pieaugt līdz brāzmu vērtībai.
      en: The code explicitly says wind is variable in strength up to the gust value.
      ru: Код как раз показывает, что сила ветра может расти до значения порывов.
    c:
      lv: Brāzmas ir ļoti svarīgas tieši vieglajiem droniem.
      en: Gusts are highly relevant to light drones.
      ru: Порывы очень важны именно для лёгких дронов.
    d:
      lv: Vēja kodējums tieši neapraksta GPS kvalitāti.
      en: Wind coding does not directly describe GPS performance.
      ru: Код ветра напрямую не описывает качество GPS.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — weather observation and decoding basics; docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology and pre-flight weather reading
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: met-023
  stem:
    lv: Kāpēc TAF ir noderīgs arī īsai drona misijai?
    en: Why is TAF useful to a drone pilot even for a short mission?
    ru: Почему TAF полезен даже для короткой миссии дроном?
  options:
  - id: a
    text:
      lv: Tāpēc, ka tas dod juridisku atļauju lidot.
      en: Because it gives a legal permission to fly.
      ru: Потому что даёт юридическое разрешение на полёт.
  - id: b
    text:
      lv: Tāpēc, ka tas aizvieto vajadzību paskatīties ārā.
      en: Because it replaces the need to check outside visually.
      ru: Потому что заменяет визуальную оценку погоды на месте.
  - id: c
    text:
      lv: Tāpēc, ka tas parāda iespējamo tendenci tavā reālajā lidojuma logā.
      en: Because it shows the likely trend across the planned flight window.
      ru: Потому что показывает вероятную тенденцию на реальное окно полёта.
  - id: d
    text:
      lv: Tāpēc, ka tas ir vajadzīgs tikai IFR satiksmei.
      en: Because it is only for IFR traffic.
      ru: Потому что он нужен только IFR-трафику.
  correctOptionId: c
  explanation:
    lv: TAF ir vērtīgs, jo dronu lidojumi notiek laikā, nevis vienā sastingušā sekundē. Tendence ir svarīga pacelšanās, uzdevuma un nolaišanās fāzēs.
    en: TAF is valuable because drone flights still happen over time, not at a frozen instant. Trend matters for launch, task, and recovery.
    ru: Полет происходит во времени, а не в одной секунде. TAF полезен именно тем, что показывает вероятное развитие условий в окне миссии.
  distractorRationales:
    a:
      lv: Laikapstākļu prognoze nav juridiska atļauja.
      en: A forecast is not a legal authorisation.
      ru: Прогноз погоды не является разрешением на полёт.
    b:
      lv: Prognoze palīdz, bet neaizvieto reālo apstākļu novērtējumu uz vietas.
      en: Forecasts help, but they do not replace looking at real conditions.
      ru: Прогноз помогает, но не заменяет реальную оценку на месте.
    d:
      lv: TAF nav “tikai IFR” informācija; tas ir noderīgs laikapstākļu avots daudz plašāk.
      en: TAF is not restricted to IFR decision-making; it is useful weather information broadly.
      ru: TAF полезен не только IFR; это общий источник структурированной погодной информации.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — weather observation and decoding basics; docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology and pre-flight weather reading
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: met-024
  stem:
    lv: METAR rāda 18015G25KT. Tavs drons ir novērtēts maksimumam 12 m/s. Vai lidojums ir droši?
    en: A METAR shows 18015G25KT. Your drone is rated for a maximum of 12 m/s. Is flight safe?
    ru: METAR показывает 18015G25KT. Твой дрон рассчитан на максимум 12 м/с. Безопасен ли полёт?
  options:
  - id: a
    text:
      lv: Jā — vidējais vējš (15 KT = 7,7 m/s) ir labi robežās.
      en: Yes — the mean wind (15 KT = 7.7 m/s) is well within limits.
      ru: Да — средний ветер (15 KT = 7,7 м/с) значительно в пределах нормы.
  - id: b
    text:
      lv: Jā, ja lidojums paliek zem 50 m, kur vējš ir mazāks.
      en: Yes, if the flight stays below 50 m where wind is lower.
      ru: Да, если полёт останется ниже 50 м, где ветер слабее.
  - id: c
    text:
      lv: Jā — METAR vēji ir konservatīvi; faktiskie apstākļi būs zemāki.
      en: Yes — METAR winds are conservative; actual conditions will be lower.
      ru: Да — данные METAR консервативны; реальные условия будут ниже.
  - id: d
    text:
      lv: Nē — brāzmas (25 KT = 12,9 m/s) pārsniedz 12 m/s limitu.
      en: No — the gusts (25 KT = 12.9 m/s) exceed the 12 m/s limit.
      ru: Нет — порывы (25 KT = 12,9 м/с) превышают предел 12 м/с.
  correctOptionId: d
  explanation:
    lv: 25 KT × 0,514 ≈ 12,9 m/s, kas pārsniedz 12 m/s drona limitu. Brāzmu vērtības, ne vidējais vējš, reprezentē pīķa slodzes. Lidojot brāzmainā vidē pie novērtētā maksimuma, pastāv vadības zaudēšanas vai strukturāla stresa risks.
    en: 25 KT × 0.514 ≈ 12.9 m/s, which exceeds the 12 m/s drone limit. Gust values, not mean wind, represent the peak loads the drone must survive. Flying in gusty conditions near the rated limit risks loss of control or structural stress.
    ru: 25 KT × 0,514 ≈ 12,9 м/с, что превышает предел дрона 12 м/с. Значения порывов, а не средний ветер, представляют пиковые нагрузки. Полёт в порывистых условиях у расчётного предела создаёт риск потери управления.
  distractorRationales:
    a:
      lv: Vidējā vēja robežu ievērošana nedara lidojumu drošu, ja brāzmas pārsniedz novērtēto maksimumu.
      en: Mean wind being within limits does not make flight safe when gusts exceed the rated maximum.
      ru: Средний ветер в норме не делает полёт безопасным, если порывы превышают расчётный максимум.
    b:
      lv: Vēja ātrums 50 m augstumā ne vienmēr ir mazāks, un brāzmas joprojām pārsniedz novērtēto limitu.
      en: Wind speed does not reliably decrease at 50 m in all conditions — and the gust still exceeds the rated limit regardless of altitude.
      ru: Скорость ветра на 50 м не всегда ниже, а порывы всё равно превышают расчётный предел вне зависимости от высоты.
    c:
      lv: METAR novērojumi ir precīzas mērītas vērtības, nevis konservatīvas aplēses.
      en: METAR observations are precise measured values, not conservative estimates. They should not be discounted.
      ru: Наблюдения METAR — точные измеренные значения, а не консервативные оценки. Их нельзя занижать.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: met-025
  stem:
    lv: Karstā vasaras dienā (35°C), kāda ir blīvuma augstuma ietekme uz dronu salīdzinājumā ar standarta dienu (15°C)?
    en: On a hot summer day (35°C), what effect does density altitude have on your drone compared to a standard day (15°C)?
    ru: В жаркий летний день (+35°C) как плотностная высота влияет на дрон по сравнению со стандартным днём (+15°C)?
  options:
  - id: a
    text:
      lv: Samazināta veiktspēja — propelleri rada mazāk pacēluma, baterijas iztukšojas ātrāk, vēja pretestība samazinās.
      en: Reduced performance — propellers generate less lift, batteries drain faster, wind resistance decreases.
      ru: Сниженные характеристики — пропеллеры создают меньше подъёмной силы, батарея разряжается быстрее, ветровая нагрузка снижается.
  - id: b
    text:
      lv: Nav ietekmes — droni ir elektriski un gaisa blīvums tos neietekmē.
      en: No effect — drones are electrically powered and not affected by air density.
      ru: Никак — дроны электрические и не зависят от плотности воздуха.
  - id: c
    text:
      lv: Uzlabota veiktspēja — karstais gaiss paceļas ātrāk un palīdz dronam turēt augstumu.
      en: Improved performance — hot air rises faster, helping the drone maintain altitude.
      ru: Улучшенные характеристики — горячий воздух поднимается быстрее, помогая дрону держать высоту.
  - id: d
    text:
      lv: Ietekmē tikai baterija — propellera efektivitāti temperatūra neietekmē.
      en: Only the battery is affected — propeller efficiency is unaffected by temperature.
      ru: Влияет только аккумулятор — эффективность пропеллеров от температуры не зависит.
  correctOptionId: a
  explanation:
    lv: Karstais gaiss ir mazāk blīvs. Propelleri strādā pret gaisa masu, lai radītu pacēlumu — mazāks gaisa blīvums nozīmē mazāk pacēluma katrā apgriezienā, nepieciešami lielāki RPM, kas ātrāk iztukšo bateriju. Maksimālā slodze un vēja pretestība arī samazinās.
    en: Hot air is less dense. Propellers work against the air mass to generate lift — lower air density means less lift per revolution, requiring higher RPM, which drains the battery faster. Maximum payload and wind resistance also decrease at high density altitude.
    ru: Горячий воздух менее плотный. Пропеллеры создают тягу, отталкиваясь от воздуха — меньшая плотность означает меньше подъёмной силы на оборот, больше оборотов, быстрее разряд. Максимальная нагрузка и ветровая нагрузка тоже снижаются.
  distractorRationales:
    b:
      lv: Elektriskais dzinējs joprojām balstās uz gaisa masu thrustu ģenerēšanai. Mazāks gaisa blīvums samazina vilkmes spēku neatkarīgi no dzinēja veida.
      en: Electric propulsion still relies on pushing against an air mass for thrust. Lower air density reduces thrust regardless of the power source.
      ru: Электрический двигатель всё равно создаёт тягу, отталкиваясь от воздушной массы. Меньшая плотность снижает тягу вне зависимости от источника питания.
    c:
      lv: Termiskie paceļošies strāvas no karstas zemes ir lokāli un neparedzami — ne uzticama veiktspējas uzlabošana.
      en: Thermal updrafts from hot ground are real, but they are localised and unpredictable — not a reliable performance boost. Overall propeller efficiency still decreases.
      ru: Термические потоки от горячей земли реальны, но локальны и непредсказуемы — не надёжное улучшение характеристик.
    d:
      lv: Ietekmē gan baterija, gan propellera efektivitāte. Mazāks gaisa blīvums nozīmē, ka propelleri jāgriež ātrāk, kas palielina strāvas patēriņu.
      en: Both the battery and propeller efficiency are affected. Reduced air density means propellers must spin faster for the same thrust, which increases current draw.
      ru: Влияет и аккумулятор, и эффективность пропеллеров. При меньшей плотности воздуха пропеллеры должны вращаться быстрее, что увеличивает потребление тока.
  sourceRef: docs/knowledge/training-guides/syllabus/A1-A3-detailed-syllabus.md — meteorology
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: met-026
  stem:
    en: On the morning weather briefing for a field flight near Jelgava, the METAR reports wind as 27012G22KT. How should the pilot read this wind information?
    lv: Rīta laikapstākļu pārskatā lidojumam pie Jelgavas METAR rāda vēju 27012G22KT. Kā pilotam jālasa šī vēja informācija?
    ru: В утреннем погодном брифинге для полёта возле Елгавы METAR показывает ветер 27012G22KT. Как пилот должен прочитать эту информацию о ветре?
  options:
  - id: a
    text:
      lv: Vējš no 120° ar ātrumu 27 mezgli.
      en: Wind from 120° at 27 knots.
      ru: Ветер со 120° со скоростью 27 узлов.
  - id: b
    text:
      lv: Vējš no 270° ar vidējo ātrumu 12 mezgli un brāzmām līdz 22 mezgliem.
      en: Wind from 270° at mean speed 12 knots, gusting to 22 knots.
      ru: Ветер с 270° со средней скоростью 12 узлов, порывы до 22 узлов.
  - id: c
    text:
      lv: Vēja attālums 2712 metru virzienā ar brāzmām 22 KT.
      en: Wind distance 2712 m in direction with gusts of 22 KT.
      ru: Ветровое расстояние 2712 м в направлении с порывами 22 KT.
  - id: d
    text:
      lv: Vējš no 270° ar vidējo ātrumu 22 mezgli un brāzmām 12 mezgļi.
      en: Wind from 270° at mean speed 22 knots, gusting to 12 knots.
      ru: Ветер с 270° со средней скоростью 22 узла, порывы до 12 узлов.
  correctOptionId: b
  explanation:
    lv: 'METAR vēja formāts: [virziens 3 cipari]°[vidējais ātrums 2–3 cipari]G[brāzmas]KT. 27012G22KT: 270° (rietumi), vidējais ātrums 12 mezgļi, brāzmas līdz 22 mezgliem.

      '
    en: 'METAR wind format: [direction 3 digits]°[mean speed 2-3 digits]G[gusts]KT. 27012G22KT: 270° (west), mean 12 knots, gusting to 22 knots.

      '
    ru: 'Формат ветра METAR: [направление 3 цифры]°[средняя скорость 2-3 цифры]G[порывы]KT. 27012G22KT: 270° (запад), средняя 12 узлов, порывы до 22 узлов.

      '
  distractorRationales:
    a:
      lv: 270 ir vēja virziens (grādos no ziemeļiem pulksteņa rādītāja virzienā), nevis attālums.
      en: 270 is the wind direction (degrees clockwise from north), not distance.
      ru: 270 — это направление ветра (градусы по часовой стрелке от севера), а не расстояние.
    c:
      lv: METAR nesatur "attāluma" laukus. 270 ir virziens grādos, 12 ir ātrums mezglos, 22 ir brāzmu ātrums mezglos.
      en: METAR does not contain "distance" fields. 270 is direction in degrees, 12 is speed in knots, 22 is gust speed in knots.
      ru: METAR не содержит поля «расстояния». 270 — направление в градусах, 12 — скорость в узлах, 22 — скорость порывов в узлах.
    d:
      lv: G nozīmē brāzmas — tas seko pēc vidējā ātruma. Brāzmas vienmēr ir augstākas par vidējo ātrumu.
      en: G stands for gusts — it follows the mean speed. Gusts are always higher than mean speed.
      ru: G означает порывы — следует после средней скорости. Порывы всегда выше средней скорости.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — Meteorological Service for International Air Navigation; METAR format
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: met-027
  stem:
    en: A small UAS is rated for 10 m/s wind. Before a coastal flight, the latest METAR shows 09008G18KT. What is the safest go/no-go decision?
    lv: Neliels UAS ir sertificēts vējam līdz 10 m/s. Pirms piekrastes lidojuma jaunākais METAR rāda 09008G18KT. Kāds ir drošākais lēmums lidot/nelidot?
    ru: Малый UAS рассчитан на ветер до 10 м/с. Перед полётом у побережья последний METAR показывает 09008G18KT. Какое самое безопасное решение go/no-go?
  options:
  - id: a
    text:
      lv: Jā, ja lidojums ir zem 50 m augstuma.
      en: Yes if the flight stays below 50 m altitude.
      ru: Да, если полёт остаётся ниже 50 м.
  - id: b
    text:
      lv: Jā — vidējais vējš (8 KT = 4,1 m/s) ir labi robežās.
      en: Yes — the mean wind (8 KT = 4.1 m/s) is well within limits.
      ru: Да — средний ветер (8 KT = 4,1 м/с) значительно в пределах нормы.
  - id: c
    text:
      lv: Nē — 18 KT ≈ 9,3 m/s pārsniedz 10 m/s limitu.
      en: No — 18 KT ≈ 9.3 m/s exceeds the 10 m/s limit.
      ru: Нет — 18 KT ≈ 9,3 м/с превышает предел 10 м/с.
  - id: d
    text:
      lv: Nē — brāzmas (18 KT ≈ 9,3 m/s) tuvojas 10 m/s limitam; drošāk atlikt.
      en: No — the gusts (18 KT ≈ 9.3 m/s) approach the 10 m/s limit; safer to postpone.
      ru: Нет — порывы (18 KT ≈ 9,3 м/с) приближаются к пределу 10 м/с; безопаснее отложить.
  correctOptionId: c
  explanation:
    lv: '18 KT × 0,514 ≈ 9,3 m/s. Tas NAV pārsniedzis 10 m/s limitu matemātiski, bet brāzmas ir pīķa slodzes, kas dronu spēj radikāli destabilizēt pat pie 9,3 m/s. Atbilde b ir piesardzīga (nenovērtē pīķus ienākošo slodžu dēļ), bet d ir precīzāka — 9,3 m/s ir ļoti tuvu 10 m/s, un jebkura papildu brāzma var pārsniegt. Pareizā atbilde ir d — 9,3 m/s ir nepieļaujami tuvu limitam.

      '
    en: '18 KT × 0.514 ≈ 9.3 m/s. This does NOT technically exceed the 10 m/s limit, but at 9.3 m/s the drone is operating extremely close to its rated maximum. Any additional gust spike can exceed the limit. The safest answer is d — operating at 93% of the rated maximum in gusty conditions is not safe practice.

      '
    ru: '18 KT × 0,514 ≈ 9,3 м/с. Технически это НЕ превышает предел 10 м/с, но при 9,3 м/с дрон работает крайне близко к расчётному максимуму. Любой дополнительный пик порыва может его превысить. Правильный ответ d — работа при 93% расчётного максимума в порывистых условиях не является безопасной практикой.

      '
  distractorRationales:
    a:
      lv: Augstums nemaina brāzmu slodzi. Gust novērtējums attiecas uz visu darbības diapazonu, ne tikai augstu augstumu.
      en: Altitude does not change the gust load. The gust rating applies to the full operating range, not only high altitudes.
      ru: Высота не изменяет нагрузку от порывов. Расчёт порывов применяется ко всему рабочему диапазону, а не только к большим высотам.
    b:
      lv: Vidējais vējš nenorāda pīķa slodzes — brāzmas ir pīķi. Pie 9,3 m/s brāzmām tuvumā pie 10 m/s limita drona vadāmības rezerve ir minimāla.
      en: Mean wind does not indicate peak loads — gusts are the peaks. At 9.3 m/s gusts close to the 10 m/s limit the drone's control margin is minimal.
      ru: Средний ветер не определяет пиковые нагрузки — порывы это и есть пики. При порывах 9,3 м/с близко к пределу 10 м/с запас управляемости дрона минимален.
    d:
      lv: Piesardzīgi pareizs — brāzmas 9,3 m/s ir bīstami tuvas 10 m/s maksimumam. Tomēr atbilde d ir precīzāka par to, ka 9,3 m/s ir pārāk tuvu.
      en: Cautiously correct — 9.3 m/s gusts are dangerously close to the 10 m/s maximum. However answer d is more precise that 9.3 m/s is too close.
      ru: 'Осторожно правильно — порывы 9,3 м/с опасно близко к максимуму 10 м/с. Однако ответ d точнее: 9,3 м/с слишком близко.'
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; manufacturer wind rating standards
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: met-028
  stem:
    en: A cumulonimbus cell is visible near the planned operating area, and the client asks for one short flight before rain arrives. What minimum separation should the pilot keep from the Cb cloud?
    lv: Plānotās darbības zonas tuvumā redzams cumulonimbus mākonis, un klients prasa īsu lidojumu pirms lietus. Kāda minimālā distance pilotam jāievēro no Cb mākoņa?
    ru: Рядом с планируемой зоной работы видна кучево-дождевая облачность, и клиент просит короткий полёт до дождя. Какую минимальную дистанцию пилот должен держать от Cb?
  options:
  - id: a
    text:
      lv: 20 km.
      en: 20 km.
      ru: 20 км.
  - id: b
    text:
      lv: 1 km.
      en: 1 km.
      ru: 1 км.
  - id: c
    text:
      lv: 5 km.
      en: 5 km.
      ru: 5 км.
  - id: d
    text:
      lv: 10 km.
      en: 10 km.
      ru: 10 км.
  correctOptionId: d
  explanation:
    lv: 'Minimālais ieteicamais attālums no aktīva kumulonimba ir 10 km. Zibens izlādes diapazons, stipra turbulence un lielgabarīta krusu risks pastāv ievērojami tālu ārpus redzamā mākoņa robežas. 10 km ir minimums — jo tāk, jo drošāk.

      '
    en: 'The minimum recommended distance from an active cumulonimbus is 10 km. Lightning discharge range, severe turbulence, and large hail risk extend significantly beyond the visible cloud boundary. 10 km is the minimum — further is always safer.

      '
    ru: 'Минимальное рекомендуемое расстояние от активного кучево-дождевого — 10 км. Радиус молниевого разряда, сильная турбулентность и риск крупного града распространяются значительно за пределы видимых границ облака. 10 км — минимум, дальше — безопаснее.

      '
  distractorRationales:
    a:
      lv: 20 km ir vēl drošāk, bet 10 km ir atzītais minimums. 20 km nav operatīvi obligāts.
      en: 20 km is even safer, but 10 km is the recognised minimum. 20 km is not operationally required.
      ru: 20 км ещё безопаснее, но 10 км — признанный минимум. 20 км оперативно не требуется.
    b:
      lv: 1 km atrodas tieši kumulonimba bīstamākajā zonā — turbulence, brāzmas un zibens var skart UAS.
      en: 1 km is directly in the most dangerous zone of a cumulonimbus — turbulence, gusts, and lightning can reach the UAS.
      ru: 1 км — прямо в самой опасной зоне кучево-дождевого. Турбулентность, порывы и молния могут поразить UAS.
    c:
      lv: 5 km nav pietiekams — zibens un stipra turbulence var sasniegt UAS šajā attālumā no Cb.
      en: 5 km is not sufficient — lightning and severe turbulence can reach the UAS at this distance from Cb.
      ru: 5 км недостаточно — молния и сильная турбулентность могут достичь UAS на этом расстоянии.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Doc 8896 — Manual of Aeronautical Meteorology; A2 syllabus meteorology
  difficulty: 2
  cognitiveLevel: apply
  scenarioType: decision
- id: met-029
  stem:
    en: A pilot plans a low-level flight through damp air after sunrise. Which temperature and moisture combination creates a realistic propeller-icing risk?
    lv: Pilots pēc saullēkta plāno zema augstuma lidojumu mitrā gaisā. Kura temperatūras un mitruma kombinācija rada reālu propelleru apledojuma risku?
    ru: Пилот планирует низкий полёт во влажном воздухе после восхода. Какая комбинация температуры и влаги создаёт реальный риск обледенения пропеллеров?
  options:
  - id: a
    text:
      lv: Temperatūra +2°C, lidojums caur mākoni vai saldējoša migla.
      en: Temperature +2°C, flying through cloud or freezing drizzle.
      ru: Температура +2°C, полёт через облако или ледяная морось.
  - id: b
    text:
      lv: Temperatūra -5°C, sauss skaidrs gaiss.
      en: Temperature -5°C, dry clear air.
      ru: Температура -5°C, сухой чистый воздух.
  - id: c
    text:
      lv: Temperatūra +10°C, viegls lietus.
      en: Temperature +10°C, light rain.
      ru: Температура +10°C, лёгкий дождь.
  - id: d
    text:
      lv: Temperatūra +20°C, augsts mitrums.
      en: Temperature +20°C, high humidity.
      ru: Температура +20°C, высокая влажность.
  correctOptionId: a
  explanation:
    lv: 'Apledojums prasa divus vienlaicīgus apstākļus: temperatūru tuvu vai zem 0°C UN redzamu mitrumu (mākoņu pilieni, saldējoša migla). +2°C mākonī pārsaldēti ūdens pilieni sasalst kontaktā ar propellera virsmu.

      '
    en: 'Icing requires two simultaneous conditions: temperature near or below 0°C AND visible moisture (cloud droplets, freezing drizzle). At +2°C in cloud, supercooled water droplets freeze on contact with the propeller surface.

      '
    ru: 'Обледенение требует двух одновременных условий: температуры около или ниже 0°C И видимой влаги (капли облака, ледяная морось). При +2°C в облаке переохлаждённые капли воды замерзают при контакте с поверхностью пропеллера.

      '
  distractorRationales:
    b:
      lv: Auksta temperatūra vien nav pietiekama — apledojumam nepieciešami pārsaldēti ūdens pilieni (redzams mitrums). Sausam gaisam pie -5°C šādu pilienu nav.
      en: Cold temperature alone is not sufficient — icing requires supercooled water droplets (visible moisture). Dry air at -5°C contains no such droplets.
      ru: Только холодная температура недостаточна — для обледенения нужны переохлаждённые капли (видимая влага). Сухой воздух при -5°C их не содержит.
    c:
      lv: +10°C ūdens paliek šķidrs — lietus nogulsnējas uz propelleriem, bet nesasalst.
      en: At +10°C water remains liquid — rain deposits on propellers but does not freeze.
      ru: При +10°C вода остаётся жидкой — дождь осаждается на пропеллерах, но не замерзает.
    d:
      lv: +20°C ūdens ir šķidrs un nevar sasalt uz propellera virsmām.
      en: At +20°C water is liquid and cannot freeze on propeller surfaces.
      ru: При +20°C вода жидкая и не может замерзать на поверхностях пропеллеров.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Doc 8896 — aeronautical meteorology; A2 syllabus icing conditions
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: met-030
  stem:
    en: The TAF for the nearest aerodrome includes TEMPO 1012/1014 29018G28KT during the intended operating window. What does that forecast element mean?
    lv: Tuvākās lidostas TAF paredzētajā darbības laikā satur TEMPO 1012/1014 29018G28KT. Ko nozīmē šis prognozes elements?
    ru: TAF ближайшего аэродрома на планируемое время работы содержит TEMPO 1012/1014 29018G28KT. Что означает этот элемент прогноза?
  options:
  - id: a
    text:
      lv: Vēja izmaiņas uz 290° no 10:12 līdz 10:14 pēcpusdienas vietējā laikā.
      en: Wind change to 290° from 10:12 to 10:14 afternoon local time.
      ru: Изменение ветра до 290° с 10:12 до 10:14 после полудня местного времени.
  - id: b
    text:
      lv: 'Pagaidu apstākļi: vējš no 290° ar 18 mezgliem un brāzmām 28 mezgļi, kas ilgst starp 12:00–14:00 UTC.'
      en: 'Temporary conditions: wind from 290° at 18 knots, gusting 28 knots, occurring between 12:00–14:00 UTC.'
      ru: 'Временны́е условия: ветер с 290° 18 узлов, порывы 28 узлов, в период 12:00–14:00 UTC.'
  - id: c
    text:
      lv: Pastāvīgs vējš 29018 mezgļi no 10. līdz 14. datumam.
      en: Permanent wind 29018 knots from the 10th to the 14th.
      ru: Постоянный ветер 29018 узлов с 10-го по 14-е.
  - id: d
    text:
      lv: Mainīgi vēji starp 290° un 180° ar ātrumu 28 mezgļi.
      en: Variable wind between 290° and 180° at 28 knots.
      ru: Переменный ветер между 290° и 180° со скоростью 28 узлов.
  correctOptionId: b
  explanation:
    lv: 'TEMPO nozīmē pagaidu apstākļi — īslaicīgi apstākļi, kas ir gaidāmi, bet neturpinās vairāk kā pusi no norādītā perioda. 1012/1014 ir laika logs: 10. datuma 12:00 UTC līdz 10. datuma 14:00 UTC. 29018G28KT: vējš no 290° ar 18 mezgliem un brāzmām 28 mezgļi.

      '
    en: 'TEMPO means temporary conditions — conditions expected to occur but last less than half of the indicated period. 1012/1014 is the time window: 10th 12:00 UTC to 10th 14:00 UTC. 29018G28KT: wind from 290° at 18 knots, gusting 28 knots.

      '
    ru: 'TEMPO означает временны́е условия — условия, которые ожидаются, но продолжаются менее половины указанного периода. 1012/1014 — временно́е окно: 10-е 12:00 UTC до 10-е 14:00 UTC. 29018G28KT: ветер с 290° 18 узлов, порывы 28 узлов.

      '
  distractorRationales:
    a:
      lv: DDHH/DDHH formāts TAF ir dienas (DD) un stundas (HH) UTC, nevis minūtes vai vietējais laiks.
      en: The DDHH/DDHH format in TAF is day (DD) and hour (HH) UTC, not minutes or local time.
      ru: Формат DDHH/DDHH в TAF — день (DD) и час (HH) UTC, а не минуты или местное время.
    c:
      lv: TEMPO nenorāda pastāvīgus apstākļus — tā ir pagaidu parādība. Skaitlis arī nav interpretējams kā vēja ātrums.
      en: TEMPO indicates temporary, not permanent, conditions. The numbers also cannot be read as continuous wind speed.
      ru: TEMPO означает временны́е, а не постоянные условия. Числа также нельзя читать как непрерывную скорость ветра.
    d:
      lv: 29018G28KT ir fiksēts vēja virziens (290°) ar ātrumu un brāzmām — nevis mainīgs starp diviem virzieniem.
      en: 29018G28KT is a fixed wind direction (290°) with speed and gusts — not variable between two directions.
      ru: 29018G28KT — фиксированное направление ветра (290°) со скоростью и порывами, а не переменное между двумя направлениями.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — TAF format; EASA meteorology module
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: met-031
  stem:
    en: The mission is planned for 11:00. Current METAR is within limits, but the TAF has TEMPO 10:00-12:00 with gusts above the aircraft limit. What should the pilot do?
    lv: Misija plānota 11:00. Pašreizējais METAR ir limitos, bet TAF rāda TEMPO 10:00-12:00 ar brāzmām virs lidaparāta limita. Kā pilotam jārīkojas?
    ru: Миссия запланирована на 11:00. Текущий METAR в пределах лимитов, но TAF даёт TEMPO 10:00-12:00 с порывами выше лимита аппарата. Что должен сделать пилот?
  options:
  - id: a
    text:
      lv: Lidot zem 30 m augstuma, kur vējš parasti ir mazāks.
      en: Fly below 30 m altitude where wind is typically lower.
      ru: Лететь ниже 30 м, где ветер обычно слабее.
  - id: b
    text:
      lv: Lidot — pašreizējais METAR ir galvenais avots, TAF ir tikai prognoze.
      en: Fly — the current METAR is the primary source, TAF is only a forecast.
      ru: Лететь — текущий METAR является основным источником, TAF — только прогноз.
  - id: c
    text:
      lv: Pārcelt lidojumu uz laiku pēc 12:00 UTC, pārbaudot METAR apstiprinājumu.
      en: Reschedule to after 12:00 UTC, confirming with METAR at that time.
      ru: Перенести на после 12:00 UTC, подтвердив METAR в это время.
  - id: d
    text:
      lv: Lidot — TEMPO ir īss un iespējams nenotiks.
      en: Fly — TEMPO is brief and may not occur.
      ru: Лететь — TEMPO кратковременное и может не произойти.
  correctOptionId: c
  explanation:
    lv: 'TAF TEMPO prognozē apstākļus, kas notiks plānotā lidojuma loga laikā. Kaut arī METAR pašlaik ir robežās, TEMPO norāda, ka apstākļi var kļūt bīstami jebkurā brīdī starp 10:00 un 12:00 UTC. Profesionālais padoms: pārcelt uz pēc 12:00 un apstiprināt ar tā brīža METAR.

      '
    en: 'The TAF TEMPO forecasts conditions that will occur during the planned flight window. Although the current METAR is within limits, TEMPO indicates conditions may become hazardous at any point between 10:00 and 12:00 UTC. Professional approach: reschedule to after 12:00 and confirm with the METAR at that time.

      '
    ru: 'TEMPO в TAF прогнозирует условия, которые произойдут в течение планового окна полёта. Хотя текущий METAR в пределах нормы, TEMPO указывает, что условия могут стать опасными в любой момент между 10:00 и 12:00 UTC. Профессиональный подход: перенести на после 12:00 и подтвердить METAR в это время.

      '
  distractorRationales:
    a:
      lv: Vēja ātruma limiti attiecas uz visu darbības augstumu diapazonu, ne tikai augstu augstumu. Lidojums zem 30 m nelikvidē TAF TEMPO apstākļus.
      en: Wind speed limits apply to the full operating altitude range, not only high altitudes. Flying below 30 m does not negate the TAF TEMPO conditions.
      ru: Ветровые пределы применяются ко всему рабочему диапазону высот. Полёт ниже 30 м не устраняет условия TEMPO по TAF.
    b:
      lv: METAR rāda pašreizējos apstākļus; TAF prognozē nākotnes apstākļus. Abi jālasa. TEMPO prognoze plānotā logā ir derīgs drošības apsvērums.
      en: METAR shows current conditions; TAF forecasts future conditions. Both must be read. A TEMPO forecast within the planned window is a valid safety consideration.
      ru: METAR показывает текущие условия; TAF прогнозирует будущие. Оба нужно читать. TEMPO в плановом окне — обоснованное соображение безопасности.
    d:
      lv: TEMPO prognozes nav "iespēja" — tās norāda apstākļus, kas notiks. "Iespējams nenotiks" nav derīgs drošības arguments.
      en: TEMPO forecasts are not possibilities — they indicate conditions that will occur. "May not occur" is not a valid safety argument.
      ru: Прогнозы TEMPO — это не возможности, а условия, которые произойдут. «Может не случиться» — не обоснованный довод безопасности.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; TAF interpretation
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: met-032
  stem:
    en: On a hot, humid day, the drone feels sluggish even though the launch altitude is modest. Which statement best explains density altitude for UAS performance?
    lv: Karstā, mitrā dienā drons reaģē gausi, lai gan starta augstums nav liels. Kurš apgalvojums vislabāk skaidro density altitude ietekmi uz UAS veiktspēju?
    ru: В жаркий влажный день дрон ведёт себя вяло, хотя высота старта невелика. Какое утверждение лучше всего объясняет density altitude для характеристик UAS?
  options:
  - id: a
    text:
      lv: Faktiskais lidojuma augstums pār jūras līmeni.
      en: The actual flight altitude above sea level.
      ru: Фактическая высота полёта над уровнем моря.
  - id: b
    text:
      lv: Attālums no zemes, kuru drons var droši pārsniegt.
      en: The distance from the ground that the drone can safely exceed.
      ru: Расстояние от земли, которое дрон может безопасно превысить.
  - id: c
    text:
      lv: Minimālā drošā lidojuma augstums virs apdzīvotām zonām.
      en: The minimum safe flight altitude above populated areas.
      ru: Минимальная безопасная высота полёта над населёнными районами.
  - id: d
    text:
      lv: Gaisa blīvuma novērtējums, kas atspoguļo temperatūras, spiediena un mitruma ietekmi uz drona veiktspēju.
      en: An air density measure reflecting the effect of temperature, pressure, and humidity on drone performance.
      ru: Показатель плотности воздуха, отражающий влияние температуры, давления и влажности на характеристики дрона.
  correctOptionId: d
  explanation:
    lv: 'Blīvuma augstums apvieno temperatūru, atmosfēras spiedienu un mitrumu, lai atspoguļotu efektīvo gaisa blīvumu, kurā drons darbojas. Augsts blīvuma augstums (karsts, zems spiediens) nozīmē mazāku gaisa blīvumu, mazāk pacēluma katrā propellera apgriezienā, lielāku baterijas patēriņu un samazinātu vēja pretestību.

      '
    en: 'Density altitude combines temperature, atmospheric pressure, and humidity to express the effective air density in which the drone is operating. High density altitude (hot, low pressure) means less dense air, less lift per propeller revolution, more battery consumption, and reduced wind resistance.

      '
    ru: 'Плотностная высота объединяет температуру, атмосферное давление и влажность для выражения эффективной плотности воздуха, в которой работает дрон. Высокая плотностная высота (жара, низкое давление) означает менее плотный воздух, меньше подъёмной силы на оборот, больше расхода аккумулятора и сниженную ветровую нагрузку.

      '
  distractorRationales:
    a:
      lv: Augstums virs jūras līmeņa ir ģeogrāfisks fakts; blīvuma augstums ir fizisks gaisa blīvuma mērījums, kuru ietekmē arī temperatūra un spiediens.
      en: Altitude above sea level is a geographic fact; density altitude is a physical air density measure also influenced by temperature and pressure.
      ru: Высота над уровнем моря — географический факт; плотностная высота — физический показатель плотности воздуха, зависящий также от температуры и давления.
    b:
      lv: Drona maksimālais augstums ir noteikts regulā (120 m AGL Atvērtajā kategorijā); blīvuma augstums ir veiktspējas jēdziens, kas nav saistīts ar juridiskajiem augstuma limitiem.
      en: The drone's maximum altitude is set by regulation (120 m AGL in Open category); density altitude is a performance concept unrelated to legal altitude limits.
      ru: Максимальная высота дрона установлена правилами (120 м AGL в Открытой категории); плотностная высота — концепция характеристик, не связанная с юридическими пределами.
    c:
      lv: Minimālie augstumi virs apdzīvotām zonām ir tiesisks ierobežojums; blīvuma augstums ir meteoroloģisks veiktspējas faktors.
      en: Minimum altitudes above populated areas are a legal restriction; density altitude is a meteorological performance factor.
      ru: Минимальные высоты над населёнными районами — правовое ограничение; плотностная высота — метеорологический фактор характеристик.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; A2 syllabus meteorology
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: met-033
  stem:
    en: The pilot wants a forecast product for the next operating window, not only the latest observation. How often is a standard TAF typically issued?
    lv: Pilotam vajadzīgs prognozes produkts nākamajam darbības logam, ne tikai pēdējais novērojums. Cik bieži parasti tiek izdots standarta TAF?
    ru: Пилоту нужен прогноз на следующее рабочее окно, а не только последнее наблюдение. Как часто обычно выпускается стандартный TAF?
  options:
  - id: a
    text:
      lv: Ik 6 stundas (0000, 0600, 1200, 1800 UTC).
      en: Every 6 hours (0000, 0600, 1200, 1800 UTC).
      ru: Каждые 6 часов (0000, 0600, 1200, 1800 UTC).
  - id: b
    text:
      lv: Vienu reizi dienā.
      en: Once a day.
      ru: Раз в сутки.
  - id: c
    text:
      lv: Ik 30 minūtes — tāpat kā METAR.
      en: Every 30 minutes — the same as METAR.
      ru: Каждые 30 минут — так же как METAR.
  - id: d
    text:
      lv: Ik 3 stundas.
      en: Every 3 hours.
      ru: Каждые 3 часа.
  correctOptionId: a
  explanation:
    lv: 'TAF prognozes tiek publicētas četras reizes dienā UTC laika 0000, 0600, 1200 un 1800. Katra prognoze aptver 24–30 stundas. METAR tiek publicēts biežāk — parasti ik 30 vai 60 minūtes.

      '
    en: 'TAF forecasts are published four times per day at 0000, 0600, 1200, and 1800 UTC. Each forecast covers 24–30 hours. METAR is issued more frequently — typically every 30 or 60 minutes.

      '
    ru: 'Прогнозы TAF публикуются четыре раза в сутки в 0000, 0600, 1200 и 1800 UTC. Каждый прогноз охватывает 24–30 часов. METAR выпускается чаще — обычно каждые 30 или 60 минут.

      '
  distractorRationales:
    b:
      lv: Viena TAF dienā nenodrošinātu pietiekamu precizitāti laika apstākļu prognozēšanai aviācijai — tiek publicēts četras reizes dienā.
      en: One TAF per day would not provide sufficient precision for aviation weather forecasting — it is published four times per day.
      ru: Один TAF в сутки не обеспечил бы достаточной точности авиационного прогноза — публикуется четыре раза в сутки.
    c:
      lv: METAR tiek publicēts ik 30–60 minūtes; TAF ir 6 stundu intervālos.
      en: METAR is published every 30–60 minutes; TAF is on 6-hour intervals.
      ru: METAR публикуется каждые 30–60 минут; TAF — с 6-часовыми интервалами.
    d:
      lv: 3 stundu intervāls ir SIGMET (nozīmīgu meteoroloģisko apstākļu informācija) publicēšanas biežums, nevis TAF.
      en: The 3-hour interval is the SIGMET (Significant Meteorological Information) update frequency, not TAF.
      ru: 3-часовой интервал — частота обновления SIGMET (сигнификантная метеорологическая информация), а не TAF.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — Meteorological Service for International Air Navigation; TAF issuance
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: met-034
  stem:
    lv: Pirms lidojuma pilots METAR redz kodu CAVOK. Ko tas nozīmē praktiskai laikapstākļu novērtēšanai?
    en: Before flight, the pilot sees CAVOK in a METAR. What does it mean for practical weather assessment?
    ru: Перед полётом пилот видит CAVOK в METAR. Что это означает для практической оценки погоды?
  options:
  - id: a
    text:
      lv: Celiņu un redzamību pārbauda — pagaidu ierobežojums lidostā.
      en: Runway and visibility check — temporary restriction at airport.
      ru: Проверка взлётной полосы и видимости — временное ограничение в аэропорту.
  - id: b
    text:
      lv: Mākļu zem 5000 pēdām nav, redzamība ≥ 10 km, nav nozīmīgu laika apstākļu apdraudējumu.
      en: No cloud below 5,000 ft, visibility ≥ 10 km, no significant weather hazards.
      ru: Нет облаков ниже 5000 футов, видимость ≥ 10 км, нет значительных погодных угроз.
  - id: c
    text:
      lv: Redzamība ir zem 1500 m.
      en: Visibility is below 1500 m.
      ru: Видимость ниже 1500 м.
  - id: d
    text:
      lv: Kumulonimbs tuvumā.
      en: Cumulonimbus nearby.
      ru: Кучево-дождевое поблизости.
  correctOptionId: b
  explanation:
    lv: 'CAVOK (Ceiling And Visibility OK) nozīmē: redzamība ≥ 10 km, nav mākoņu zem 5000 pēdām (1500 m) vai zemāk par augstāko minimālo sektoru augstumu, un nav nozīmīgu laika apstākļu fenomenu. Lidotājiem tas ir labs laiks.

      '
    en: 'CAVOK (Ceiling And Visibility OK) means: visibility ≥ 10 km, no cloud below 5,000 ft (1,500 m) or below the highest minimum sector altitude, and no significant weather phenomena. For pilots this represents excellent conditions.

      '
    ru: 'CAVOK (Ceiling And Visibility OK) означает: видимость ≥ 10 км, нет облаков ниже 5000 футов (1500 м) или ниже минимальной высоты сектора, нет значительных метеорологических явлений. Для пилотов это отличные условия.

      '
  distractorRationales:
    a:
      lv: CAVOK nav saistīts ar lidostas darbības ierobežojumiem. Tas ir standartizēts starptautisks kods labiem laika apstākļiem METAR.
      en: CAVOK is not related to airport operational restrictions. It is a standardised international code for good weather conditions in METAR.
      ru: CAVOK не связан с ограничениями работы аэропорта. Это стандартизированный международный код хороших условий в METAR.
    c:
      lv: Zema redzamība METAR tiek ziņota kā skaitliska vērtība metros vai kilometros — ne CAVOK, kas apzīmē labus apstākļus.
      en: Low visibility is reported in METAR as a numeric value in metres or kilometres — not CAVOK, which denotes good conditions.
      ru: Низкая видимость в METAR указывается числовым значением в метрах или километрах, а не CAVOK, который означает хорошие условия.
    d:
      lv: Kumulonimbs METAR tiek ziņots kā CB mākoņu veids (piem., FEW020CB). CAVOK nozīmē labus apstākļus — bez nozīmīgu laika apstākļu draudiem.
      en: Cumulonimbus in METAR is reported as CB cloud type (e.g. FEW020CB). CAVOK means good conditions — no significant weather hazards.
      ru: Кучево-дождевое в METAR сообщается как тип облаков CB (например, FEW020CB). CAVOK означает хорошие условия без значительных угроз.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — METAR; CAVOK definition
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: met-035
  stem:
    lv: Pilots salīdzina METAR un TAF pirms došanās uz objektu. Ar cik km skaita Latvijā minimālo redzamību praktiskai VLOS operācijai?
    en: A pilot compares METAR and TAF before leaving for the site. What is the practical minimum visibility in km for VLOS operations in Latvia?
    ru: Пилот сравнивает METAR и TAF перед выездом на площадку. Какова практическая минимальная видимость в км для операций VLOS в Латвии?
  options:
  - id: a
    text:
      lv: 1 km.
      en: 1 km.
      ru: 1 км.
  - id: b
    text:
      lv: 10 km.
      en: 10 km.
      ru: 10 км.
  - id: c
    text:
      lv: 3 km — lai uzturētu nepārtrauktu VLOS plānotajā maksimālajā attālumā.
      en: 3 km — to maintain continuous VLOS at the planned maximum range.
      ru: 3 км — для поддержания непрерывного VLOS на планируемой максимальной дистанции.
  - id: d
    text:
      lv: 500 m.
      en: 500 m.
      ru: 500 м.
  correctOptionId: c
  explanation:
    lv: 'VLOS prasība ir funkcionāla: pilots spēj nepārtraukti un neapbruņotu aci noteikt UAS pozīciju, attieksmi un virzienu. Praksē 3 km redzamība ir praktiskais minimums jebkurai jēgpilnai VLOS operācijai. Pie zemākas redzamības VLOS prasību var nebūt iespējams izpildīt pat mazos attālumos.

      '
    en: 'The VLOS requirement is functional: the pilot can continuously and unaided determine the UAS position, attitude, and direction. In practice, 3 km visibility is the practical minimum for any meaningful VLOS operation. Below this VLOS may not be achievable even at short ranges.

      '
    ru: 'Требование VLOS функциональное: пилот может непрерывно и невооружённым глазом определять положение, ориентацию и направление UAS. На практике 3 км — практический минимум для любой содержательной операции VLOS. При меньшей видимости VLOS может быть недостижим даже на малых расстояниях.

      '
  distractorRationales:
    a:
      lv: 1 km var būt pietiekams ļoti tuvajos operācijās (< 200 m), bet nav pietiekams vidējas attālinātības operācijām.
      en: 1 km may be adequate for very close-range operations (< 200 m) but is insufficient for medium-range operations.
      ru: 1 км может быть достаточен для операций очень близкого радиуса (< 200 м), но недостаточен для операций среднего радиуса.
    b:
      lv: 10 km ir maksimāli ziņojamā redzamība METAR, nevis minimums VLOS. Lielākā daļa VLOS operāciju notiek tuvāk par 1 km attālumā.
      en: 10 km is the maximum reportable visibility in METAR, not the VLOS minimum. Most VLOS operations take place at under 1 km range.
      ru: 10 км — максимальная отчётная видимость в METAR, а не минимум VLOS. Большинство операций VLOS происходит на расстоянии менее 1 км.
    d:
      lv: 500 m redzamībā VLOS var uzturēt tikai ļoti īsam, fiksētam lidojumam pie fiksētas vietas. Tas ir nepraktiski lielākajai daļai operāciju.
      en: At 500 m visibility VLOS can only be maintained for a very short, fixed-position flight. This is impractical for most operations.
      ru: При 500 м видимости VLOS можно поддерживать только при очень коротком полёте с фиксированной позицией. Это нецелесообразно для большинства операций.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — Reg (EU) 2019/947 UAS.OPEN.060(3); EASA AMC1 UAS.OPEN.060 VLOS
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: met-036
  stem:
    lv: METAR pie zemes rāda 5 m/s vēju, bet pilots plāno lidojumu 80 m AGL. Kādu vēja rezervi jāņem vērā šajā augstumā?
    en: METAR shows 5 m/s wind at the surface, but the pilot plans to fly at 80 m AGL. What wind margin should be considered at that height?
    ru: METAR показывает ветер 5 м/с у земли, но пилот планирует полёт на 80 м AGL. Какой запас по ветру нужно учитывать на этой высоте?
  options:
  - id: a
    text:
      lv: 3–4 m/s — vējš samazinās ar augstumu pilsētā.
      en: 3–4 m/s — wind decreases with altitude in the city.
      ru: 3–4 м/с — ветер ослабевает с высотой в городе.
  - id: b
    text:
      lv: 10+ m/s — vējš dubultosies katrās 40 m.
      en: 10+ m/s — wind doubles every 40 m.
      ru: 10+ м/с — ветер удваивается каждые 40 м.
  - id: c
    text:
      lv: Tāpat 5 m/s — METAR mēra operatīvajā augstumā.
      en: The same 5 m/s — METAR measures at operational altitude.
      ru: Те же 5 м/с — METAR измеряет на рабочей высоте.
  - id: d
    text:
      lv: 6,5–7,5 m/s — virszemes vējš × 1,3–1,5 koriģēšanai.
      en: 6.5–7.5 m/s — surface wind × 1.3–1.5 for altitude correction.
      ru: 6,5–7,5 м/с — приземный ветер × 1,3–1,5 для поправки по высоте.
  correctOptionId: d
  explanation:
    lv: 'METAR vējš mērīts 10 m AGL. Berzes slānis (aptuveni zemes 300 m) samazina vēja ātrumu tuvāk pie virszemes. 80 m AGL vēja ātrums parasti ir par 30–50 % lielāks nekā pie virszemes: 5 m/s × 1,3–1,5 ≈ 6,5–7,5 m/s. Šī korekcija ir īpaši svarīga bateriju plānošanā atgriešanās braucieniem pret vēju.

      '
    en: 'METAR wind is measured at 10 m AGL. The friction layer (approximately 300 m of surface atmosphere) reduces wind speed closer to the ground. At 80 m AGL wind speed is typically 30–50 % higher than at the surface: 5 m/s × 1.3–1.5 ≈ 6.5–7.5 m/s. This correction is especially important for battery planning on into-wind return legs.

      '
    ru: 'Ветер METAR измеряется на 10 м AGL. Слой трения (примерно 300 м атмосферы у поверхности) снижает скорость ветра ближе к земле. На 80 м AGL скорость ветра обычно на 30–50 % выше приземной: 5 м/с × 1,3–1,5 ≈ 6,5–7,5 м/с. Эта поправка особенно важна для планирования аккумулятора на возвратных курсах против ветра.

      '
  distractorRationales:
    a:
      lv: Vējš virs āra vides (lauks, jūra) palielinās ar augstumu. Tikai dažos pilsētas gadījumos var būt minimālas augstuma korekcijas ēku turbulences dēļ.
      en: Wind over open terrain (field, sea) increases with altitude. Only in some urban cases may there be minimal altitude corrections due to building turbulence.
      ru: Ветер над открытой местностью (поле, море) усиливается с высотой. Только в некоторых городских случаях могут быть минимальные поправки из-за турбулентности зданий.
    b:
      lv: Vēja ātruma dubultošanās katrās 40 m nav precīzs fizisks modelis. 30–50 % pieaugums no 10 m uz 80 m ir labākā piesarobeža.
      en: Wind speed doubling every 40 m is not an accurate physical model. A 30–50 % increase from 10 m to 80 m is the better approximation.
      ru: Удвоение скорости ветра каждые 40 м — неточная физическая модель. Увеличение на 30–50 % от 10 м до 80 м — лучшее приближение.
    c:
      lv: METAR mēra 10 m virs zemes — tas ir par 70 m zemāku par 80 m lidojuma augstumu. Berzes slānis nozīmē, ka vējš palielinās ar augstumu.
      en: METAR measures 10 m above the ground — this is 70 m lower than the 80 m flight altitude. The friction layer means wind increases with altitude.
      ru: METAR измеряет в 10 м над землёй — это на 70 м ниже высоты полёта 80 м. Слой трения означает, что ветер усиливается с высотой.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; wind profile standard atmosphere
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: met-037
  stem:
    lv: Laikapstākļu plānošanas laikā pilotam jāizlemj, vai lidaparātam vēl būs pietiekama rezerve. Ko nozīmē TAF kods "BECMG 1022/1024 29018KT"?
    en: During weather planning, the pilot must decide whether the aircraft will still have enough margin. What does the TAF code "BECMG 1022/1024 29018KT" mean?
    ru: При погодном планировании пилот должен решить, останется ли у аппарата достаточный запас. Что означает код TAF «BECMG 1022/1024 29018KT»?
  options:
  - id: a
    text:
      lv: Pakāpeniskas izmaiņas no 22:00 līdz 24:00 UTC — finālais vējš 290°/18 KT.
      en: Gradual change from 22:00 to 24:00 UTC — final wind 290°/18 KT.
      ru: Постепенное изменение с 22:00 до 24:00 UTC — итоговый ветер 290°/18 KT.
  - id: b
    text:
      lv: Vējš momentāni mainīsies uz 290°/18 KT pulksten 22:00 UTC.
      en: Wind will instantly change to 290°/18 KT at 22:00 UTC.
      ru: Ветер мгновенно изменится до 290°/18 KT в 22:00 UTC.
  - id: c
    text:
      lv: Sākas uz 22 stundām laika apstākļu logs ar vēju 290°/18 KT.
      en: A 22-hour weather window with wind 290°/18 KT begins.
      ru: Начинается 22-часовое погодное окно с ветром 290°/18 KT.
  - id: d
    text:
      lv: Pagaidu vējš 290°/18 KT starp 22:00 un 24:00 UTC.
      en: Temporary wind 290°/18 KT between 22:00 and 24:00 UTC.
      ru: Временный ветер 290°/18 KT между 22:00 и 24:00 UTC.
  correctOptionId: a
  explanation:
    lv: 'BECMG nozīmē pakāpeniskas, pastāvīgas izmaiņas sākas starp norādītajām stundām. 1022/1024 = 10. datums 22:00 UTC līdz 10. datums 24:00 UTC (= 11. datums 00:00 UTC). Pēc 24:00 UTC galīgais vējš ir 290°/18 KT. TEMPO ir pagaidu; BECMG ir pastāvīgas izmaiņas.

      '
    en: 'BECMG means gradual, permanent changes begin between the stated hours. 1022/1024 = 10th 22:00 UTC to 10th 24:00 UTC (= 11th 00:00 UTC). After 24:00 UTC the final wind is 290°/18 KT. TEMPO is temporary; BECMG is permanent change.

      '
    ru: 'BECMG означает постепенное, постоянное изменение, начинающееся в указанные часы. 1022/1024 = 10-е 22:00 UTC до 10-е 24:00 UTC (= 11-е 00:00 UTC). После 24:00 UTC итоговый ветер 290°/18 KT. TEMPO — временное; BECMG — постоянное изменение.

      '
  distractorRationales:
    b:
      lv: FM (from) norāda tūlītējas izmaiņas noteiktā laikā. BECMG norāda pakāpeniskas izmaiņas noteiktā laika logā.
      en: FM (from) indicates instantaneous changes at a specific time. BECMG indicates gradual changes over a time window.
      ru: FM (from) указывает мгновенные изменения в конкретное время. BECMG указывает постепенные изменения в течение временно́го окна.
    c:
      lv: BECMG laika logs norāda izmaiņu periodu, nevis kopējo laika apstākļu ilgumu. 1022/1024 ir divu stundu izmaiņu periods, ne 22 stundu.
      en: The BECMG time window indicates the change period, not total weather duration. 1022/1024 is a 2-hour change period, not 22 hours.
      ru: Временно́е окно BECMG указывает период изменения, а не общую продолжительность погоды. 1022/1024 — 2-часовой период изменения, а не 22 часа.
    d:
      lv: Pagaidu apstākļi ir TEMPO; BECMG norāda pastāvīgas izmaiņas, kas saglabāsies arī pēc norādītā laika loga.
      en: Temporary conditions are indicated by TEMPO; BECMG indicates permanent changes that persist after the time window.
      ru: Временны́е условия обозначаются TEMPO; BECMG указывает постоянные изменения, сохраняющиеся после временно́го окна.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — TAF format; BECMG vs TEMPO vs FM
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: met-038
  stem:
    lv: Pilots salīdzina METAR un TAF pirms došanās uz objektu. Kāda mākoņu izohrona (kods) METAR norāda kumulonimbu?
    en: A pilot compares METAR and TAF before leaving for the site. Which cloud type code in METAR indicates a cumulonimbus?
    ru: Пилот сравнивает METAR и TAF перед выездом на площадку. Какой код типа облаков в METAR указывает на кучево-дождевое?
  options:
  - id: a
    text:
      lv: OVC — pārsegs.
      en: OVC — overcast.
      ru: OVC — сплошная.
  - id: b
    text:
      lv: CB — kumulonimbs, norādīts papildus mākoņu grupas koda aizmugurē.
      en: CB — cumulonimbus, appended after the cloud group code.
      ru: CB — кучево-дождевое, добавляется после кода группы облаков.
  - id: c
    text:
      lv: TCU — torējoše kumuluss.
      en: TCU — towering cumulus.
      ru: TCU — мощно-кучевое.
  - id: d
    text:
      lv: BKN — plaukumi.
      en: BKN — broken.
      ru: BKN — разорванная.
  correctOptionId: b
  explanation:
    lv: 'Kumulonimbi METAR tiek norādīti ar "CB" sufiksu pēc mākoņu grupas koda. Piemērs: FEW010CB = daži kumulonimbi 1000 pēdu augstumā. TCU (torējoše kumuluss) ir atsevišķs kods, kas norāda attīstošus kumulusus — potenciālu Cb priekšteci.

      '
    en: 'Cumulonimbus clouds are indicated in METAR with the "CB" suffix after the cloud group code. Example: FEW010CB = few cumulonimbus at 1,000 ft. TCU (towering cumulus) is a separate code indicating developing cumulus — a potential Cb precursor.

      '
    ru: 'Кучево-дождевые в METAR указываются суффиксом «CB» после кода группы облаков. Пример: FEW010CB = незначительная кучево-дождевая облачность на 1000 футов. TCU (мощно-кучевое) — отдельный код, указывающий на развивающийся кумулюс — потенциальный предшественник Cb.

      '
  distractorRationales:
    a:
      lv: OVC nozīmē "pārsegs" — 8 astotdaļas debesu pārklājuma. Tas ir pārklājuma daudzums, nevis mākoņu veids.
      en: OVC means "overcast" — 8 eighths cloud cover. It is a coverage amount, not a cloud type indicator.
      ru: OVC означает «сплошная» — 8 октантов покрова. Это количество покрова, а не тип облаков.
    c:
      lv: TCU (torējoše kumuluss) norāda attīstošos kumulusus, kas var izveidoties kumulonimbā — bet TCU pats nav kumulonimbs. Pieredzējušam pilotam TCU jāuzskata par brīdinājumu.
      en: TCU (towering cumulus) indicates developing cumulus that may become a cumulonimbus — but TCU itself is not a cumulonimbus. An experienced pilot treats TCU as a warning.
      ru: TCU (мощно-кучевое) указывает на развивающийся кумулюс, который может стать кучево-дождевым, но сам по себе не является им. Опытный пилот воспринимает TCU как предупреждение.
    d:
      lv: BKN nozīmē "plaukumi" — 5–7 mākoņu astotdaļas debesu pārklājuma. Tas nenorāda mākoņu veidu.
      en: BKN means "broken" — 5–7 eighths cloud cover. It indicates coverage amount, not cloud type.
      ru: BKN означает «разорванная» — 5–7 октантов облачного покрова. Это указывает количество покрова, а не тип облаков.
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — ICAO Annex 3 — METAR cloud type codes; CB and TCU
  difficulty: 3
  cognitiveLevel: apply
  scenarioType: decision
- id: met-039
  stem:
    lv: Laikapstākļi starta vietā izskatās pieņemami, bet prognozē ir ierobežojoša detaļa. Kāda ir temperatūras inversijas galvenā sekas UAS lidojumam?
    en: Weather at the launch point looks acceptable, but the forecast contains a limiting detail. What is the primary consequence of a temperature inversion for UAS operations?
    ru: Погода в точке старта выглядит приемлемой, но в прогнозе есть ограничивающая деталь. Каковы основные последствия температурной инверсии для полётов UAS?
  options:
  - id: a
    text:
      lv: Pastiprināts GPS signāls.
      en: Enhanced GPS signal.
      ru: Усиленный GPS-сигнал.
  - id: b
    text:
      lv: Automātiska VLOS paplašināšanās inversijas slāņa refleksijas dēļ.
      en: Automatic VLOS extension due to inversion layer reflections.
      ru: Автоматическое расширение VLOS из-за отражений инверсионного слоя.
  - id: c
    text:
      lv: Samazināta redzamība un miglājs pie virszemes; turbulence zem inversijas slāņa.
      en: Reduced visibility and haze at the surface; turbulence below the inversion layer.
      ru: Пониженная видимость и дымка у поверхности; турбулентность под инверсионным слоем.
  - id: d
    text:
      lv: Uzlabota drona veiktspēja augstumā.
      en: Improved drone performance at altitude.
      ru: Улучшенные характеристики дрона на высоте.
  correctOptionId: c
  explanation:
    lv: 'Temperatūras inversija "iesloga" mitru, piesārņotu gaisu pie virszemes, kas samazina redzamību un var izraisīt miglu. Turklāt inversijas slānis darbojas kā "vāks", kas intensificē turbulenci zem tā — sevišķi termisko turbulenci no virszemes sildīšanas. Inversijas bieži novērojamas Latvijas rudenī un ziemā, no rīta.

      '
    en: 'A temperature inversion "traps" moist, polluted air at the surface, reducing visibility and potentially causing fog. Additionally the inversion layer acts as a "lid" that intensifies turbulence below it — especially thermal turbulence from surface heating. Inversions are common in Latvia in autumn and winter, in the morning.

      '
    ru: 'Температурная инверсия «задерживает» влажный, загрязнённый воздух у поверхности, снижая видимость и потенциально вызывая туман. Кроме того, инверсионный слой действует как «крышка», усиливающая турбулентность под ним — особенно термическую от нагрева поверхности. Инверсии часты в Латвии осенью и зимой, по утрам.

      '
  distractorRationales:
    a:
      lv: Temperatūras inversija neietekmē GPS signālu tādā veidā, kas uzlabotu tā uztveri.
      en: Temperature inversion does not affect GPS signals in a way that would improve reception.
      ru: Температурная инверсия не влияет на GPS-сигналы так, чтобы улучшить приём.
    b:
      lv: VLOS ir vizuāla prasība — to ietekmē vidējā optiskā redzamība, nevis atmosfēras optiskās refleksijas.
      en: VLOS is a visual requirement — it is affected by ambient optical visibility, not atmospheric optical reflections.
      ru: VLOS — визуальное требование, зависящее от фактической оптической видимости, а не атмосферных отражений.
    d:
      lv: Temperatūras inversija samazina gaisa blīvumu augstumā, bet galvenais efekts ir redzamības samazināšanās un turbulence pie virszemes, nevis uzlabota veiktspēja.
      en: Temperature inversion does not improve drone performance at altitude — its primary effects are visibility reduction and turbulence at the surface level.
      ru: 'Температурная инверсия не улучшает характеристики дрона на высоте — её основные эффекты: снижение видимости и турбулентность у поверхности.'
  sourceRef: docs/knowledge/training-guides/Montenegro-CAA-A1-A3-theoretical-knowledge-training.pdf — EASA Easy Access Rules — AMC1 UAS.OPEN.030; ICAO meteorology training
  difficulty: 3
  cognitiveLevel: analyze
  scenarioType: decision
- id: met-040
  stem:
    lv: 'Plānots lidojums virs piekrastes ezera vēsā rudens rītā: mitrs gaiss un +3 °C. Kas jāpārbauda papildus standarta laikapstākļu pārbaudei?'
    en: A flight is planned over a coastal lake on a cool autumn morning with damp air and +3°C. What should be checked in addition to the standard weather check?
    ru: 'Полёт запланирован над прибрежным озером прохладным осенним утром: влажный воздух и +3 °C. Что нужно проверить дополнительно к стандартной погодной проверке?'
  options:
  - id: a
    text:
      lv: Nekas papildus — +3°C ir augstāk par 0°C, tāpēc apledojuma risks nav.
      en: Nothing additional — +3°C is above 0°C, so there is no icing risk.
      ru: Ничего дополнительного — +3°C выше 0°C, поэтому риска обледенения нет.
  - id: b
    text:
      lv: Lidostas laikapstākļi tuvumā.
      en: Nearby airport weather.
      ru: Погода ближайшего аэропорта.
  - id: c
    text:
      lv: NOTAM par ūdens sporta aktivitātēm.
      en: NOTAMs for water sports activities.
      ru: NOTAM для водных спортивных мероприятий.
  - id: d
    text:
      lv: Apledojuma risku — +3°C + augsts mitrums tuvu ūdenim var radīt apledojumu uz propelleriem.
      en: Icing risk — +3°C + high humidity near water can create propeller icing.
      ru: Риск обледенения — +3°C + высокая влажность у воды может вызвать обледенение пропеллеров.
  correctOptionId: d
  explanation:
    lv: '+3°C ar augstu mitrumu tuvu ūdens virsmai ir potenciāls apledojuma scenārijs. Ūdens var radīt zemtemperatūras gaisa slāni tieši virs virsmas, kas var pazemināt faktisko propellera kontakttemperatūru zem 0°C. Pārsaldētu ūdens pilienu klātbūtne miglā vai plānas mākonīšu veidās virs ezera var radīt apledojumu pat +3°C gaisa temperatūrā. Pārbaudīt augšzemes virszemes temperatūru un miglas ziņojumus pirms pacelšanās.

      '
    en: '+3°C with high humidity near a water surface is a potential icing scenario. Water bodies can create a cold surface air layer directly above that can drive the actual propeller contact temperature below 0°C. Supercooled droplets in mist or thin cloud above the lake can cause icing even at +3°C ambient temperature. Check surface temperature and fog reports before departure.

      '
    ru: '+3°C с высокой влажностью вблизи водной поверхности — потенциальный сценарий обледенения. Водоёмы могут создавать холодный приземный слой воздуха, снижающий фактическую контактную температуру пропеллера ниже 0°C. Переохлаждённые капли в дымке или тонкой облачности над озером могут вызывать обледенение даже при +3°C. Проверить приземную температуру и сообщения о тумане до взлёта.

      '
  distractorRationales:
    a:
      lv: +3°C ir tuvu 0°C, un ūdens virsma var samazināt faktisko gaisa temperatūru zem 0°C tieši pie ezera. Apledojums iespējams pat pie +5°C pārsaldētu pilienu klātbūtnē.
      en: +3°C is close to 0°C, and the water surface can reduce the actual air temperature below 0°C right over the lake. Icing is possible even at +5°C in the presence of supercooled droplets.
      ru: +3°C близко к 0°C, и водная поверхность может снизить фактическую температуру воздуха ниже 0°C прямо над озером. Обледенение возможно даже при +5°C при наличии переохлаждённых капель.
    b:
      lv: Lidostas laika apstākļi ir daļa no standarta pārbaudes, nevis papildu apledojuma specifiska pārbaude.
      en: Nearby airport weather is part of the standard check, not an icing-specific additional check.
      ru: Погода ближайшего аэропорта — часть стандартной проверки, а не специфическая дополнительная проверка обледенения.
    c:
      lv: Ūdens sporta NOTAM var būt aktuāls par drošu attālumu, bet tas nav galvenais drošības apsvērums šajā situācijā — tā ir apledojuma riski.
      en: Water sports NOTAMs may be relevant for safe distances, but are not the primary safety consideration in this scenario — icing is.
      ru: NOTAM для водных видов спорта может быть актуален для безопасного расстояния, но не является основным соображением безопасности в этом сценарии — это обледенение.
