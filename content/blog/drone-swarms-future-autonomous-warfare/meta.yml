title:
  lv: "Dronu spieti un autonomās karadarbības nākotne"
  en: "Drone Swarms and the Future of Autonomous Warfare"
  ru: "Рои дронов и будущее автономной войны"
excerpt:
  lv: Dronu spieti nav tikai “daudz dronu vienā reizē”. Īstā izmaiņa ir komandvadība, cilvēka–mašīnas sadarbība, attritable masa un spēja koordinēt desmitiem vai simtiem platformu zem viena operacionālā nodoma.
  en: Drone swarms are not simply many drones flying together. The real shift is command-and-control, human-machine teaming, attritable mass, and the ability to coordinate dozens or hundreds of platforms under one operational intent.
  ru: Рой дронов — это не просто много аппаратов в воздухе одновременно. Настоящий сдвиг связан с командованием, связкой человек-машина, attritable-массой и способностью координировать десятки и сотни платформ под единым замыслом.
