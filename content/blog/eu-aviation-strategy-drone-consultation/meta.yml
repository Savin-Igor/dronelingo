excerpt:
  lv: ES atvēra jaunas aviācijas stratēģijas apspriešanu līdz 2026. gada 21. maijam. Dronu nozarei tas ir brīdis ietekmēt noteikumu valodu pirms tā pāriet sertifikācijā.
  en: The EU opened its new aviation strategy consultation until May 21, 2026. For the drone sector, this is the moment to influence policy language before it moves into certification.
  ru: ЕС открыл консультацию по новой авиационной стратегии до 21 мая 2026 года. Для дроновой отрасли это шанс повлиять на язык политики до его перехода в сертификацию.
