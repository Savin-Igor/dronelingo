excerpt:
  lv: Trīs apakškategorijas Open kategorijā nosaka, kur drīkst lidot, kāda apliecība vajadzīga un cik tuvu cilvēkiem. Visu trīs salīdzinājums vienā rakstā.
  en: Three subcategories inside Open define where you can fly, which licence you need, and how close to people. All three compared in one place.
  ru: Три подкатегории внутри Open определяют, где можно летать, какая лицензия нужна и насколько близко к людям. Все три в одном сравнении.
