title:
  lv: Kā droni atrod ceļu mājup bez GPS un kartēm, iedvesmojoties no bitēm
  en: How Bee-Inspired Drones Find Their Way Home Without GPS or Maps
  ru: Как дроны находят дорогу домой без GPS и карт, вдохновляясь пчёлами
authorBio: null
excerpt:
  lv: Bee-Nav no TU Delft nav “maģisks autopilots”. Tas ir viegls atgriešanās mājup risinājums GPS liegtiem lidojumiem, kas apvieno īsu mācību lidojumu, odometriju un kompaktu vizuālo atmiņu.
  en: TU Delft’s Bee-Nav is not a magic autopilot. It is a lightweight return-home strategy for GPS-denied flight that combines a short learning flight, odometry, and compact visual memory.
  ru: Bee-Nav от TU Delft — не «магический автопилот», а лёгкая стратегия возврата домой для полётов без GPS, которая сочетает короткий обучающий облёт, одометрию и компактную визуальную память.
