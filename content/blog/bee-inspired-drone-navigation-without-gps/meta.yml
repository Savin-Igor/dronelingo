heroImageAlt:
  lv: Redakcionāla hero aina ar nelielu pētniecisku kvadrokopteri, kas zelta stundā atgriežas pie nolaišanās laukuma atklātā laukā; tuvumā lido dažas bites, bet kadrā redzami smalki vizuālās atmiņas un homing trajektoriju pārklājumi vēsi zilganpelēkā un dabīgi zaļā paletē.
  en: Editorial hero scene of a small research quadcopter returning to its landing pad over an open field at golden hour, with a few honeybees nearby and subtle visual-memory and homing-trajectory overlays in a cool blue-grey and natural green palette.
  ru: Редакционная hero-сцена: небольшой исследовательский квадрокоптер возвращается к посадочной площадке над открытым полем в золотой час; рядом видны несколько пчёл и тонкие наложения визуальной памяти и траектории возврата в холодной синевато-серой и естественно-зелёной палитре.
