socialTeaser:
  lv: Bites neatgriežas stropā ar detalizētu 3D karti. TU Delft pētnieki parāda, ka arī dronam mājupceļam var pietikt ar īsu mācību lidojumu, odometriju un ļoti mazu vizuālo atmiņu.
  en: Honeybees do not return to the hive with a detailed 3D map. TU Delft’s Bee-Nav suggests a drone may also get home with a short learning flight, odometry, and a very small visual memory.
  ru: Пчёлы не возвращаются в улей по подробной 3D-карте. Bee-Nav от TU Delft показывает, что дрону для возвращения домой тоже может хватить короткого обучающего облёта, одометрии и очень маленькой визуальной памяти.
