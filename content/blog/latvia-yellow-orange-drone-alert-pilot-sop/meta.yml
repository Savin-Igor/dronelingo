title:
  lv: Dzeltenā un Oranžā trauksme Latvijā — ko darīt drona pilotam
  en: Latvia's Yellow and Orange Drone Alerts — What Pilots Need to Do
  ru: Жёлтая и оранжевая тревога в Латвии — что делать дрон-пилоту
authorBio: null
excerpt:
  lv: NBS no 2026. gada 23. maija sūta šūnu raidsistēmas trauksmes divās pakāpēs. Dzeltenā informē par iespējamu apdraudējumu; oranžā nozīmē nekavējoties rīkoties. Šeit izskaidrojam abas pakāpes un piedāvājam mūsu lasījumu pilotiem.
  en: NBS has been sending cell-broadcast alerts in two tiers since 23 May 2026. Yellow informs about a possible threat; Orange means act immediately. Here is what each level means and our reading of it for drone pilots.
  ru: "С 23 мая 2026 года NBS рассылает сотовые оповещения двух уровней. Жёлтый информирует о возможной угрозе; оранжевый требует немедленных действий. Разбираем оба уровня и предлагаем наше прочтение для дрон-пилотов."
