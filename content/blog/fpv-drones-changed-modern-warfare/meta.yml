excerpt:
  lv: FPV droni nav tikai lēta improvizācija. Tie mainīja trieciena ekonomiku, izlūkošanas ciklu, elektronisko karadarbību un visa frontes līmeņa taktiku 2025–2026. 
  en: FPV drones are no longer a cheap improvisation. They changed strike economics, ISR workflows, electronic warfare, and frontline tactics in 2025–2026.
  ru: FPV-дроны давно перестали быть дешёвой импровизацией. Они изменили экономику удара, цикл ISR, электронную войну и тактику фронта в 2025–2026 годах.
