socialTeaser:
  lv: Autonomie kaujas UAV kļūst svarīgi nevis tāpēc, ka pilnībā aizstās pilotus, bet tāpēc, ka tie maina gaisa spēka masu, izmaksas, risku sadalījumu un cilvēka lomu kaujas ciklā.
  en: Autonomous combat UAVs matter not because they fully replace pilots, but because they change airpower mass, cost, risk distribution, and the human role in the combat loop.
  ru: Автономные боевые UAV важны не потому, что полностью заменят пилотов, а потому, что меняют массу воздушной силы, стоимость, распределение риска и роль человека в боевом цикле.
