excerpt:
  lv: Autonomie kaujas UAV vairs nav tikai tāla nākotnes ideja. 2026. gadā tie arvien skaidrāk ienāk militārajā plānošanā caur collaborative combat aircraft, atvērtām autonomijas arhitektūrām un cilvēka–mašīnas komandu gaisa kaujā.
  en: Autonomous combat UAVs are no longer a distant concept. In 2026 they are moving into real military planning through collaborative combat aircraft, open autonomy architectures, and human-machine teaming in high-end air combat.
  ru: Автономные боевые UAV уже перестают быть далёкой концепцией. В 2026 году они всё заметнее входят в реальное военное планирование через collaborative combat aircraft, открытые архитектуры автономии и связку человек-машина в воздушном бою высокого уровня.
