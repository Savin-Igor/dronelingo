title:
  lv: Optiskās šķiedras droni un kāpēc tos nevar noslāpēt ar klasisku RF traucēšanu
  en: Fiber Optic Drones and Why They Cannot Be Jammed
  ru: Дроны на оптоволокне и почему их не заглушить обычной РЭБ
excerpt:
  lv: "Optiskās šķiedras droni nav “neuzvarami”, taču tie sagrauj vienu no ērtākajiem pieņēmumiem par pret-UAS aizsardzību: ka pietiek pārraut radio saiti. 2025–2026. gadā tas vairs nav drošs pieņēmums."
  en: "Fiber optic drones are not invincible, but they do break one of the most comfortable assumptions in counter-UAS: that severing the RF link is enough. By 2025–2026, that assumption no longer holds."
  ru: "Оптоволоконные дроны не неуязвимы, но они ломают одно из самых удобных предположений в counter-UAS: что достаточно оборвать радиоканал. К 2025–2026 годам это уже не работает как раньше."
