title:
  lv: "Antidronu sistēmas un elektroniskā karadarbība"
  en: "Anti-Drone Systems and Electronic Warfare"
  ru: "Антидроновые системы и радиоэлектронная борьба"
excerpt:
  lv: Efektīva aizsardzība pret droniem vairs nav viena ierīce vai viens jammeris. Tā kļūst par slāņveida sistēmu, kur apvienojas sensori, battle management, elektroniskā karadarbība un kinētiskais pārtveršanas slānis.
  en: Effective anti-drone defense is no longer one jammer or one interceptor. It is becoming a layered system that combines sensors, battle management, electronic warfare, and kinetic defeat.
  ru: Эффективная защита от дронов — это уже не один jammer и не один перехватчик. Она превращается в многослойную систему, где сочетаются сенсоры, battle management, радиоэлектронная борьба и кинетическое поражение.
