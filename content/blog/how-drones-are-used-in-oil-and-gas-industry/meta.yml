title:
  lv: "Kā droni tiek izmantoti naftas un gāzes nozarē"
  en: "How Drones Are Used in Oil & Gas Industry"
  ru: "Как дроны используются в нефтегазовой отрасли"
excerpt:
  lv: Naftas un gāzes nozarē droni vairs nav tikai vizuālai apskatei. Tie kļūst par darba instrumentu cauruļvadu patrulēšanai, degļtorņu pārbaudei, tvertņu iekšējai inspekcijai, avāriju novērtēšanai un attālinātai objektu uzraudzībai.
  en: In oil and gas, drones are no longer just flying cameras for visual checks. They are becoming operating tools for pipeline patrol, flare stack review, tank inspection, incident response, and remote facility monitoring.
  ru: В нефтегазовой отрасли дроны уже давно не сводятся к визуальной съёмке. Они становятся рабочим инструментом для патрулирования трубопроводов, осмотра flare stack, инспекции резервуаров, оценки инцидентов и удалённого мониторинга площадок.
