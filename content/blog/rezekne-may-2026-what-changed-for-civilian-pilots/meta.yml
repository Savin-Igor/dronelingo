authorBio: null
excerpt:
  lv: Latgales gaisa telpa 2026. gada maijā mainījās būtiski. Kara darbības droni, pagaidu augstuma ierobežojumi un mobilās pretdroniu komandas — lūk, kas tagad ir jauns un ko tas nozīmē katram pilotam.
  en: The Latgale operating picture shifted materially in May 2026. Errant military drones, temporary altitude caps, and mobile intercept teams on the ground — here is what changed and what it means for civilian pilots.
  ru: "Операционная картина в Латгалии кардинально изменилась в мае 2026 года. Заблудившиеся военные дроны, временные высотные ограничения и мобильные перехватчики у границы — разбираем, что это значит для гражданских пилотов."
