  lv: 2026. gads militārajos dronos vairs nav tikai par jauniem aparātiem. Galvenie trendi ir mērogs, attritable masa, launched effects, counter-drone integrācija, ātrāka iepirkšana un doktrīnas pārbūve.
  en: Military drone trends in 2026 are no longer only about new aircraft. The dominant themes are scale, attritable mass, launched effects, counter-drone integration, faster procurement, and doctrine rewrites.
