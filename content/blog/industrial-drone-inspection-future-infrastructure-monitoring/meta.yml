title:
  lv: "Dronu inspekcija infrastruktūrai un industrijai: monitoringa nākotne"
  en: "Industrial Drone Inspection: Future of Infrastructure Monitoring"
  ru: "Промышленная инспекция дронами: будущее мониторинга инфраструктуры"
excerpt:
  lv: Runa vairs nav tikai par “droniem ar kameru”. Modernā infrastruktūras inspekcija balstās uz atkārtojamību, datu kvalitāti, autonomām misijām, termāliem sensoriem un mazāku dīkstāvi kritiskajiem aktīviem.
  en: Industrial drone inspection is no longer about flying a camera near an asset. It is about repeatability, data quality, remote operations, thermal context, and reducing downtime across critical infrastructure.
  ru: Промышленная инспекция дронами — это уже не просто полёт с камерой рядом с объектом. Речь идёт о повторяемости, качестве данных, удалённых операциях, термоконтексте и снижении простоя критической инфраструктуры.
