authorBio:
excerpt:
  lv: 2026. gadā autonomie droni vairs nav tikai slaids prezentācijā. Jautājums ir cits — kur autonomija jau strādā, kur sākas cilvēka kontrole un kur tirgus vēl joprojām pārdod hype.
  en: In 2026, autonomous drones are no longer just a slide deck promise. The real question is where autonomy already works, where human control still matters, and where the market is still selling hype.
  ru: В 2026 году автономные дроны — это уже не только обещание в презентации. Реальный вопрос в том, где автономия уже работает, где всё ещё критичен человек и где рынок пока продаёт hype.
