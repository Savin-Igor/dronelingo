name: Deploy

# Tag-driven deploy.
# Push to main → CI only (see ci.yml).
# Pushing a tag matching v* → build + push image to GHCR + deploy to Hetzner.
#
# Cut a release:
#   git tag v0.1.0
#   git push origin v0.1.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Build & push image to GHCR ──────────────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    # Skip until application code (and Dockerfile that references real source)
    # actually exists. The Dockerfile is committed early, but `docker build`
    # would fail without package.json. Drop this guard after first code commit.
    if: hashFiles('package.json') != ''
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to Hetzner VPS ───────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner
    needs: build
    runs-on: ubuntu-latest
    environment: production
    if: needs.build.result == 'success'

    steps:
      - uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: IMAGE_TAG,GITHUB_REPOSITORY,POSTGRES_PASSWORD,NEXTAUTH_SECRET,RESEND_API_KEY,ADMIN_EMAIL,GHCR_TOKEN
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /opt/dronelingo

            # ── Write .env from secrets ───────────────────────────────────
            umask 077
            cat > .env <<EOF
            # Generated by GitHub Actions deploy. Do not edit by hand.
            DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/dronelingo
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

            NODE_ENV=production
            NEXTAUTH_URL=https://dronelingo.eu
            NEXTAUTH_SECRET=${NEXTAUTH_SECRET}

            EMAIL_SERVER_HOST=smtp.resend.com
            EMAIL_SERVER_PORT=587
            EMAIL_SERVER_USER=resend
            EMAIL_SERVER_PASSWORD=${RESEND_API_KEY}
            EMAIL_FROM=dronelingo <noreply@dronelingo.eu>
            ADMIN_EMAIL=${ADMIN_EMAIL}

            APP_VERSION=${IMAGE_TAG}
            IMAGE_TAG=${IMAGE_TAG}
            GITHUB_REPOSITORY=${GITHUB_REPOSITORY}
            EOF

            # ── Authenticate to GHCR (private images) ──────────────────────
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u github-actions --password-stdin

            # ── Pre-deploy DB backup with rotation ─────────────────────────
            mkdir -p /mnt/data/dronelingo/backups
            BACKUP_FILE="/mnt/data/dronelingo/backups/backup-$(date -u +%Y%m%d-%H%M%S).sql.gz"
            if docker compose ps -q db | grep -q .; then
              echo "Backing up DB to ${BACKUP_FILE}..."
              docker compose exec -T db pg_dump -U postgres dronelingo | gzip > "${BACKUP_FILE}" || {
                echo "WARNING: pre-deploy backup failed, continuing anyway"
                rm -f "${BACKUP_FILE}"
              }
              ls -1t /mnt/data/dronelingo/backups/backup-*.sql.gz 2>/dev/null | tail -n +11 | xargs -r rm -f
            else
              echo "DB not running yet — skipping pre-deploy backup (first deploy)"
            fi

            # ── Pull and restart ──────────────────────────────────────────
            docker compose pull app
            docker compose up -d --remove-orphans

            # ── Wait for /api/health to return 200 (max 90s) ──────────────
            echo "Waiting for /api/health..."
            ok=0
            for i in $(seq 1 30); do
              if curl -fsS --max-time 5 http://127.0.0.1:3030/api/health > /dev/null; then
                echo "App healthy after ${i} attempts"
                ok=1
                break
              fi
              sleep 3
            done

            if [ "${ok}" != "1" ]; then
              echo "===== DEPLOY FAILED — health probe never returned 200 ====="
              docker compose logs app --tail 100 || true
              docker compose logs db --tail 50 || true
              exit 1
            fi

            docker image prune -f
            echo "Deployed dronelingo ${IMAGE_TAG}"
